  <rect x="16" y="24" width="32" height="18" rx="3" fill="#B45309" opacity="0.15" stroke="#B45309" stroke-width="2.5"/>
  <!-- Antennas / connected nodes -->
  <circle cx="20" cy="12" r="4" fill="#B45309"/>
  <circle cx="44" cy="12" r="4" fill="#B45309"/>
  <circle cx="32" cy="56" r="4" fill="#B45309"/>
  <!-- Links -->
  <line x1="20" y1="16" x2="24" y2="24" stroke="#B45309" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="16" x2="40" y2="24" stroke="#B45309" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="32" y2="52" stroke="#B45309" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Router indicator lights -->
  <circle cx="24" cy="33" r="2" fill="#B45309"/>
  <circle cx="32" cy="33" r="2" fill="#B45309"/>
  <circle cx="40" cy="33" r="2" fill="#B45309"/>
</svg>
