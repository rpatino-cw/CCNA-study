<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Days Till Exam — CCNA 200-301</title>
<meta name="theme-color" content="#FAF7F2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
  body { padding-bottom: 80px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

  h1 { font-family: var(--font-display); font-size: 1.9rem; margin: 0 0 4px; }
  .sub { color: var(--ink-muted); margin-bottom: 6px; font-size: 0.92rem; }
  .src-row { font-size: 0.78rem; color: var(--ink-muted); font-family: var(--font-mono, monospace); margin-bottom: 24px; }
  .src-row a { color: var(--accent); text-decoration: none; }
  .src-row a:hover { text-decoration: underline; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 18px; padding: 12px 14px; border: 1px solid var(--border); background: var(--bg-surface); border-radius: var(--radius); }
  .toolbar button { padding: 6px 12px; border: 1px solid var(--border); background: var(--bg-base); border-radius: 6px; cursor: pointer; font: inherit; font-size: 0.85rem; color: var(--ink-primary); }
  .toolbar button:hover { background: var(--bg-recessed); }
  .toolbar .meter { margin-left: auto; font-family: var(--font-mono, monospace); font-size: 0.8rem; color: var(--ink-muted); }
  .toolbar .meter strong { color: var(--accent); font-size: 0.95rem; }

  .countdown-banner { padding: 10px 14px; margin-bottom: 18px; background: rgba(220, 95, 45, 0.06); border: 1px solid var(--accent); border-radius: var(--radius); font-size: 0.88rem; color: var(--ink-primary); }
  .countdown-banner strong { color: var(--accent); }

  .day-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg, 8px); padding: 16px 18px; margin-bottom: 14px; }
  .day-card.heavy { border-left: 4px solid #DC2626; }
  .day-card.medium { border-left: 4px solid #CA8A04; }
  .day-card.light { border-left: 4px solid #16A34A; }
  .day-card.cram { border-left: 4px solid var(--accent); background: rgba(220, 95, 45, 0.04); }

  .card-head { display: flex; gap: 14px; align-items: baseline; flex-wrap: wrap; margin-bottom: 8px; }
  .card-head .num { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--ink-primary); min-width: 64px; }
  .card-head .num small { font-size: 0.7rem; font-weight: 500; color: var(--ink-muted); display: block; margin-top: -4px; }
  .card-head .theme { font-weight: 600; font-size: 1.02rem; color: var(--ink-primary); flex: 1; min-width: 180px; }
  .card-head .density { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; background: var(--bg-base); color: var(--ink-muted); }
  .card-head .density.heavy { background: #FEE2E2; color: #991B1B; }
  .card-head .density.medium { background: #FEF3C7; color: #92400E; }
  .card-head .density.light { background: #DCFCE7; color: #166534; }
  .card-head .density.cram { background: rgba(220, 95, 45, 0.15); color: var(--accent); }

  .src-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; font-size: 0.72rem; font-family: var(--font-mono, monospace); color: var(--ink-muted); }
  .src-badges span { padding: 2px 6px; border-radius: 3px; background: var(--bg-base); border: 1px solid var(--border); }

  .card-progress { height: 4px; background: var(--bg-base); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
  .card-progress .fill { height: 100%; background: var(--accent); transition: width 0.25s; }

  details.src-day { margin-top: 6px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-base); overflow: hidden; }
  details.src-day summary { padding: 8px 12px; cursor: pointer; font-family: var(--font-mono, monospace); font-size: 0.82rem; color: var(--ink-primary); display: flex; gap: 10px; align-items: center; user-select: none; }
  details.src-day summary:hover { background: var(--bg-recessed); }
  details.src-day summary::-webkit-details-marker { display: none; }
  details.src-day summary::before { content: '▸'; color: var(--ink-muted); transition: transform 0.18s; display: inline-block; }
  details.src-day[open] summary::before { transform: rotate(90deg); }
  details.src-day summary .src-day-num { font-weight: 700; color: var(--accent); min-width: 56px; }
  details.src-day summary .src-day-title { flex: 1; }
  details.src-day summary .src-link { font-size: 0.7rem; color: var(--ink-muted); text-decoration: none; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; }
  details.src-day summary .src-link:hover { background: var(--accent); color: white; border-color: var(--accent); }
  details.src-day .src-body { padding: 14px 18px; border-top: 1px solid var(--border); font-family: var(--font-body, 'Crimson Pro', serif); font-size: 0.95rem; line-height: 1.6; }
  details.src-day .src-body h1, details.src-day .src-body h2, details.src-day .src-body h3 { font-family: var(--font-display); margin: 14px 0 6px; }
  details.src-day .src-body h1 { font-size: 1.25rem; }
  details.src-day .src-body h2 { font-size: 1.1rem; }
  details.src-day .src-body h3 { font-size: 1rem; }
  details.src-day .src-body p { margin: 6px 0; }
  details.src-day .src-body code { font-family: var(--font-mono, monospace); font-size: 0.85em; background: var(--bg-recessed); padding: 1px 5px; border-radius: 3px; }
  details.src-day .src-body pre { background: var(--bg-recessed); padding: 10px; border-radius: 4px; overflow-x: auto; font-family: var(--font-mono, monospace); font-size: 0.82rem; line-height: 1.45; }
  details.src-day .src-body pre code { background: transparent; padding: 0; }
  details.src-day .src-body table { border-collapse: collapse; margin: 8px 0; }
  details.src-day .src-body th, details.src-day .src-body td { border: 1px solid var(--border); padding: 4px 8px; font-size: 0.88rem; }
  details.src-day .src-body img { max-width: 100%; height: auto; }
  details.src-day .src-body ul, details.src-day .src-body ol { padding-left: 24px; }
  details.src-day .src-body blockquote { border-left: 3px solid var(--border); padding-left: 12px; color: var(--ink-muted); margin: 6px 0; }
  details.src-day .loading { color: var(--ink-muted); font-style: italic; }
  details.src-day .err { color: #991B1B; font-size: 0.85rem; }
  details.src-day .err a { color: var(--accent); }

  .src-foot { margin-top: 14px; padding-top: 10px; border-top: 1px dashed var(--border); display: flex; gap: 10px; align-items: center; font-size: 0.82rem; }
  .src-foot label { display: flex; gap: 6px; align-items: center; cursor: pointer; }
  .src-foot input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }
  .src-foot label.done { text-decoration: line-through; opacity: 0.6; }

  @media print {
    nav.top-nav, .toolbar, .countdown-banner, .src-link { display: none !important; }
    body { font-size: 10pt; }
    .day-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #ccc; box-shadow: none; }
    details.src-day { break-inside: avoid; page-break-inside: avoid; }
    details.src-day .src-body { display: block !important; }
    details.src-day summary::before { display: none; }
    details.src-day[open] > summary, details.src-day:not([open]) > summary { display: block; }
    details.src-day:not([open]) > .src-body { display: block !important; }
  }
</style>
</head>
<body>
<nav class="top-nav" id="main-nav"></nav>
<div id="nav-placeholder"></div>
<script defer src="js/nav.js"></script>

<main class="wrap">
  <h1>30 Days Till Exam</h1>
  <p class="sub">Jeremy's IT Lab notes — 63 days merged into 30. Heavy concept days kept singleton, light days grouped. No content removed.</p>
  <div class="src-row">Source: <a href="https://github.com/psaumur/CCNA_Course_Notes" target="_blank" rel="noopener">github.com/psaumur/CCNA_Course_Notes</a> · notes fetched live · attribution: psaumur</div>

  <div class="countdown-banner" id="countdown-banner"></div>

  <div class="toolbar">
    <button id="btn-expand">Expand all</button>
    <button id="btn-collapse">Collapse all</button>
    <button id="btn-reset">Reset progress</button>
    <button id="btn-print" onclick="window.print()">Print</button>
    <span class="meter"><strong id="meter-done">0</strong> / <strong id="meter-total">0</strong> source-days complete</span>
  </div>

  <div id="plan-container"></div>
</main>

<script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var EXAM_DATE = new Date('2026-05-28T00:00:00');
  var RAW_BASE = 'https://raw.githubusercontent.com/psaumur/CCNA_Course_Notes/main/Course_Notes/';
  var REPO_TREE = 'https://github.com/psaumur/CCNA_Course_Notes/blob/main/Course_Notes/';
  var KEY_PREFIX = 'ccna_30day_d';
  var SESSION_PREFIX = 'ccna_30day_md_';

  function isDone(srcDay) { return localStorage.getItem(KEY_PREFIX + srcDay) === '1'; }
  function setDone(srcDay, on) {
    if (on) localStorage.setItem(KEY_PREFIX + srcDay, '1');
    else localStorage.removeItem(KEY_PREFIX + srcDay);
  }

  function renderCountdown() {
    var today = new Date(); today.setHours(0,0,0,0);
    var diff = Math.round((EXAM_DATE - today) / 86400000);
    var el = document.getElementById('countdown-banner');
    if (diff < 0) {
      el.innerHTML = '<strong>Exam day passed.</strong> Reset this page if studying for retake.';
    } else if (diff === 0) {
      el.innerHTML = '<strong>Today is exam day.</strong> Good luck.';
    } else {
      el.innerHTML = '<strong>' + diff + ' day' + (diff === 1 ? '' : 's') + '</strong> till exam (Thu May 28, 2026). ' +
        (diff < 30 ? 'Plan is 30 days — compress where you can or start at Day ' + (30 - diff + 1) + '.' : 'You have buffer time.');
    }
  }

  function densityBadge(d) { return '<span class="density ' + d + '">' + d + '</span>'; }

  function renderCard(day) {
    var card = document.createElement('article');
    card.className = 'day-card ' + day.density;
    card.dataset.dayN = day.n;

    var head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML =
      '<div class="num">Day ' + day.n + '<small>of 30</small></div>' +
      '<div class="theme">' + day.theme + '</div>' +
      densityBadge(day.density);
    card.appendChild(head);

    var badges = document.createElement('div');
    badges.className = 'src-badges';
    badges.innerHTML = day.sources.map(function (s) {
      return '<span>Day ' + s.day + '/63 — ' + s.title + '</span>';
    }).join('');
    card.appendChild(badges);

    var prog = document.createElement('div');
    prog.className = 'card-progress';
    prog.innerHTML = '<div class="fill" style="width:0"></div>';
    card.appendChild(prog);

    day.sources.forEach(function (s) {
      var det = document.createElement('details');
      det.className = 'src-day';
      det.dataset.sourceDay = s.day;
      det.dataset.file = s.file;

      var sum = document.createElement('summary');
      sum.innerHTML =
        '<span class="src-day-num">Day ' + s.day + '/63</span>' +
        '<span class="src-day-title">' + s.title + '</span>' +
        '<a class="src-link" href="' + REPO_TREE + s.file + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">view raw</a>';
      det.appendChild(sum);

      var body = document.createElement('div');
      body.className = 'src-body';
      body.innerHTML = '<div class="loading">Notes load on first expand…</div>';
      det.appendChild(body);

      var foot = document.createElement('div');
      foot.className = 'src-foot';
      var checked = isDone(s.day);
      foot.innerHTML =
        '<label class="' + (checked ? 'done' : '') + '">' +
        '<input type="checkbox" ' + (checked ? 'checked' : '') + ' data-src-day="' + s.day + '"> ' +
        'Mark Day ' + s.day + ' complete</label>';
      body.appendChild(foot);

      det.addEventListener('toggle', function () {
        if (det.open && !det.dataset.loaded) loadNotes(det, s.file, body);
      });

      card.appendChild(det);
    });

    card.addEventListener('change', function (e) {
      if (e.target.matches('input[type=checkbox][data-src-day]')) {
        var n = parseInt(e.target.dataset.srcDay, 10);
        setDone(n, e.target.checked);
        e.target.closest('label').classList.toggle('done', e.target.checked);
        updateProgress();
      }
    });

    return card;
  }

  function loadNotes(det, file, body) {
    var cached = sessionStorage.getItem(SESSION_PREFIX + file);
    if (cached) {
      injectMarkdown(body, cached);
      det.dataset.loaded = '1';
      return;
    }
    fetch(RAW_BASE + encodeURIComponent(file))
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function (md) {
        sessionStorage.setItem(SESSION_PREFIX + file, md);
        injectMarkdown(body, md);
        det.dataset.loaded = '1';
      })
      .catch(function (err) {
        var foot = body.querySelector('.src-foot');
        body.innerHTML =
          '<p class="err">Failed to load <code>' + file + '</code>: ' + err.message +
          '. <a href="' + REPO_TREE + file + '" target="_blank" rel="noopener">View on GitHub</a></p>';
        if (foot) body.appendChild(foot);
        det.dataset.loaded = '1';
      });
  }

  function injectMarkdown(body, md) {
    var foot = body.querySelector('.src-foot');
    var html = (window.marked ? window.marked.parse(md) : ('<pre>' + escapeHtml(md) + '</pre>'));
    body.innerHTML = html;
    if (foot) body.appendChild(foot);
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  var TOTAL_SRC = 0;
  function updateProgress() {
    var done = 0;
    document.querySelectorAll('input[type=checkbox][data-src-day]').forEach(function (cb) {
      if (cb.checked) done++;
    });
    document.getElementById('meter-done').textContent = done;
    document.getElementById('meter-total').textContent = TOTAL_SRC;
    document.querySelectorAll('.day-card').forEach(function (card) {
      var boxes = card.querySelectorAll('input[type=checkbox][data-src-day]');
      var checked = card.querySelectorAll('input[type=checkbox][data-src-day]:checked');
      var pct = boxes.length ? (checked.length / boxes.length * 100) : 0;
      var fill = card.querySelector('.card-progress .fill');
      if (fill) fill.style.width = pct + '%';
    });
  }

  fetch('data/30-day-mapping.json?v=1')
    .then(function (r) { return r.json(); })
    .then(function (plan) {
      var container = document.getElementById('plan-container');
      plan.days.forEach(function (d) {
        TOTAL_SRC += d.sources.length;
        container.appendChild(renderCard(d));
      });
      document.getElementById('meter-total').textContent = TOTAL_SRC;
      updateProgress();
      renderCountdown();
    })
    .catch(function (err) {
      document.getElementById('plan-container').innerHTML =
        '<p class="err" style="color:#991B1B">Failed to load mapping: ' + err.message + '</p>';
    });

  document.getElementById('btn-expand').addEventListener('click', function () {
    document.querySelectorAll('details.src-day').forEach(function (d) { d.open = true; });
  });
  document.getElementById('btn-collapse').addEventListener('click', function () {
    document.querySelectorAll('details.src-day').forEach(function (d) { d.open = false; });
  });
  document.getElementById('btn-reset').addEventListener('click', function () {
    if (!confirm('Clear all completion checkmarks for the 30-day plan?')) return;
    for (var i = 1; i <= 66; i++) localStorage.removeItem(KEY_PREFIX + i);
    document.querySelectorAll('input[type=checkbox][data-src-day]').forEach(function (cb) {
      cb.checked = false;
      cb.closest('label').classList.remove('done');
    });
    updateProgress();
  });
});
</script>
</body>
</html>
