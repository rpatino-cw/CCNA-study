<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>STRAT CORE — Romeo's Strategy Overview</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
  #guidePill{display:none!important}

  /* Layout — match core */
  .container-wide{max-width:900px;padding:0 var(--s-xl);position:relative}
  .core-header{padding:var(--s-xl) 0 var(--s-md);margin-bottom:var(--s-md);text-align:center}
  .core-title{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;line-height:1;color:var(--ink)}
  .core-meta{display:flex;justify-content:center;gap:var(--s-lg);font-family:var(--font-display);font-size:.72rem;color:var(--ink-muted);letter-spacing:.06em;text-transform:uppercase;margin-top:12px;flex-wrap:wrap}
  .core-meta .countdown{color:var(--accent);font-weight:600}
  .core-meta .progress-stat{color:var(--ink-secondary);font-weight:500}

  /* Mode toggle — same shape as core */
  .mode-toggle{display:inline-flex;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;letter-spacing:.04em}
  .mode-toggle a,.mode-toggle button{font:inherit;font-size:.62rem;font-weight:600;padding:3px 9px;background:transparent;color:var(--ink-muted);border:none;cursor:pointer;text-transform:uppercase;letter-spacing:inherit;transition:background .15s,color .15s;text-decoration:none;display:inline-block}
  .mode-toggle a.active{background:var(--ink);color:var(--bg)}
  .mode-toggle a:not(.active):hover{background:var(--accent);color:#fff}

  /* Banner */
  .strat-banner{padding:10px 14px;background:linear-gradient(135deg,var(--accent-dim),rgba(180,83,9,.08));color:var(--ink);border:1px solid var(--accent);border-radius:var(--radius);font-family:var(--font-display);font-size:.82rem;margin:14px 0;display:flex;align-items:center;gap:12px}
  .strat-banner .sb-tag{font-family:var(--font-mono);font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);padding:3px 8px;background:#fff;border:1px solid var(--accent);border-radius:10px;flex-shrink:0}
  .strat-banner .sb-body{flex:1;color:var(--ink-secondary);font-size:.82rem;line-height:1.4}
  .strat-banner .sb-body strong{color:var(--ink)}

  /* Eval status chips */
  .eval-chip{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:.06em;text-transform:uppercase;border:1px solid transparent;white-space:nowrap}
  .eval-chip.locked{background:#F5F5F4;color:#A8A29E;border-color:#E7E5E4}
  .eval-chip.unlocked{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
  .eval-chip.pass{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}
  .eval-chip.fail{background:#FEE2E2;color:#991B1B;border-color:#FCA5A5}
  .eval-chip.inconclusive{background:#E0E7FF;color:#3730A3;border-color:#A5B4FC}

  /* Domain section — same as core */
  .domain-section{margin-bottom:0;padding:0;scroll-margin-top:80px;contain:layout style}
  .ds-head{display:flex;align-items:baseline;justify-content:space-between;padding:14px 0;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
  .ds-title{font-family:var(--font-display);font-size:.88rem;font-weight:700;letter-spacing:.01em}
  .ds-meta{display:flex;align-items:baseline;gap:10px;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted)}
  .ds-pct{font-weight:600}
  .ds-weight{color:var(--ink-faint);font-weight:400}
  .ds-toggle{font-size:.75rem;color:var(--ink-faint);transition:transform .3s var(--ease-out)}
  .ds-toggle.open{transform:rotate(180deg)}
  .ds-body{display:none;padding:4px 0 20px}
  .ds-body.open{display:block}

  /* Objective rows */
  .obj-card{margin:0;overflow:hidden;contain:layout style;border-radius:var(--radius);transition:background .2s}
  .obj-card+.obj-card{margin-top:2px}
  .obj-card:hover{background:var(--bg-hover)}
  .obj-card.passed{opacity:.85}
  .obj-card.passed .obj-name{color:var(--ink-muted)}
  .obj-card.passed:hover{opacity:1}
  .obj-card.passed:hover .obj-name{color:var(--ink)}
  .obj-head{display:flex;align-items:center;gap:14px;padding:11px 14px;cursor:pointer}
  .obj-id{font-family:var(--font-mono);font-size:.72rem;font-weight:500;color:var(--ink-faint);min-width:36px}
  .obj-name{font-family:var(--font-display);font-size:.88rem;font-weight:500;flex:1;color:var(--ink-secondary)}
  .obj-card:hover .obj-name{color:var(--ink)}

  /* Mode dots — 5 dots in head row */
  .obj-modes{display:flex;gap:3px;align-items:center}
  .mode-dot{width:8px;height:8px;border-radius:50%;background:var(--bg-recessed);border:1px solid var(--border)}
  .mode-dot.passed{background:var(--prof-strong);border-color:var(--prof-strong)}
  .obj-prof{width:60px;display:flex;align-items:center;gap:6px}
  .obj-bar{flex:1;height:2px;background:var(--bg-recessed);border-radius:1px;overflow:hidden}
  .obj-fill{height:100%;border-radius:1px;background:var(--accent);width:0;transition:width .4s var(--ease-out)}
  .obj-pct{font-family:var(--font-mono);font-size:.65rem;font-weight:400;min-width:28px;text-align:right;color:var(--ink-faint)}

  /* Expanded body */
  .obj-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .4s var(--ease-out)}
  .obj-body.open{grid-template-rows:1fr}
  .obj-body-inner{overflow:hidden;min-height:0;padding:0 14px 0 64px}
  .obj-body.open .obj-body-inner{padding:8px 14px 18px 64px}

  .mode-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
  .mode-cell{padding:8px 6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-surface);text-align:center;font-family:var(--font-display);font-size:.66rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-muted)}
  .mode-cell.passed{border-color:var(--prof-strong);background:var(--prof-strong-bg);color:var(--prof-strong)}
  .mode-cell .mc-score{display:block;font-family:var(--font-mono);font-size:.7rem;font-weight:500;margin-top:2px;letter-spacing:0;text-transform:none}

  .obj-meta-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .obj-meta-left{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted)}

  .drill-cta{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-display);font-size:.78rem;font-weight:700;padding:7px 14px;border-radius:var(--radius);background:var(--ink);color:var(--bg);text-decoration:none;transition:opacity .15s}
  .drill-cta:hover{opacity:.85}
  .drill-cta.resume{background:var(--accent);color:#fff}
  .drill-cta.start{background:var(--ink);color:var(--bg)}

  /* Empty/loading */
  .empty-note{padding:40px var(--s-md);text-align:center;color:var(--ink-muted);font-family:var(--font-display);font-size:.9rem}
</style>
</head>
<body>
<div class="container-wide">
  <nav class="top-nav" id="main-nav"></nav>

  <header class="core-header">
    <h1 class="core-title">Romeo's Strategy — Drill Overview</h1>
    <div class="core-meta">
      <span>Strat Dashboard</span>
      <span id="progressStat" class="progress-stat"></span>
      <span id="examTarget" style="cursor:pointer;border-bottom:1px dashed var(--ink-muted)" onclick="document.getElementById('examDatePicker').showPicker()">Exam target: set date</span>
      <input type="date" id="examDatePicker" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;">
      <span class="countdown" id="countdown"></span>
      <span id="modeToggle" class="mode-toggle" title="Switch to study overview"></span>
    </div>
  </header>

  <div class="strat-banner">
    <span class="sb-tag">Strat</span>
    <span class="sb-body">5 quiz modes per objective &middot; pass <strong>3 of 5</strong> at 80%+ to unlock eval &middot; eval PASS marks objective done. Click any row to resume drill.</span>
  </div>

  <div id="domainSections"></div>
</div>

<script defer src="data/topics-data.js"></script>
<script defer src="js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){

  var MODE_NAMES = ['terminology','glossary','scenario','command','table'];
  var MODE_LABELS = {terminology:'Term',glossary:'Gloss',scenario:'Scen',command:'Cmd',table:'Tbl'};
  var PASS_THRESHOLD_SCORE = 8; // score is 0..10 in strat-state.js; pass = >=8 (80%)
  var UNLOCK_PASSED_MODES = 3;

  function loadStrat(){
    try{
      var raw = localStorage.getItem('strat');
      if(!raw) return {};
      var obj = JSON.parse(raw);
      return (obj && typeof obj==='object') ? obj : {};
    }catch(_){ return {}; }
  }

  function getObjState(all, objId){
    var cur = all[objId];
    var modes = {};
    MODE_NAMES.forEach(function(n){
      modes[n] = (cur && cur.modes && cur.modes[n]) || {score:0,attempts:0,passed:false};
    });
    var ev = (cur && cur.eval) || {verdict:null,score:0};
    var composite = (cur && typeof cur.masteryComposite==='number') ? cur.masteryComposite : 0;
    return {modes:modes, eval:ev, composite:composite};
  }

  function passedCount(state){
    return MODE_NAMES.reduce(function(n,m){
      var mode = state.modes[m];
      var p = mode.passed || (mode.score && mode.score >= PASS_THRESHOLD_SCORE);
      return n + (p ? 1 : 0);
    }, 0);
  }

  function evalStatus(state){
    var v = state.eval && state.eval.verdict;
    if (v === 'PASS') return 'pass';
    if (v === 'FAIL') return 'fail';
    if (v === 'INCONCLUSIVE') return 'inconclusive';
    return passedCount(state) >= UNLOCK_PASSED_MODES ? 'unlocked' : 'locked';
  }

  function evalLabel(s){
    return {locked:'eval locked',unlocked:'eval ready',pass:'eval ✓ pass',fail:'eval ✗ fail',inconclusive:'eval ?'}[s];
  }

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function renderObj(t, state){
    var passed = passedCount(state);
    var es = evalStatus(state);
    var rowClass = (es === 'pass') ? 'obj-card passed' : 'obj-card';
    var dots = MODE_NAMES.map(function(n){
      var m = state.modes[n];
      var p = m.passed || (m.score && m.score >= PASS_THRESHOLD_SCORE);
      return '<span class="mode-dot'+(p?' passed':'')+'" title="'+esc(MODE_LABELS[n])+(p?' ✓':'')+'"></span>';
    }).join('');

    var modeCells = MODE_NAMES.map(function(n){
      var m = state.modes[n];
      var p = m.passed || (m.score && m.score >= PASS_THRESHOLD_SCORE);
      var scoreText = m.attempts ? (m.score+'/10') : '—';
      return '<div class="mode-cell'+(p?' passed':'')+'">'+esc(MODE_LABELS[n])+'<span class="mc-score">'+scoreText+'</span></div>';
    }).join('');

    var ctaClass = (es==='pass') ? 'drill-cta' : (state.composite>0 ? 'drill-cta resume' : 'drill-cta start');
    var ctaLabel = (es==='pass') ? 'Review drill' : (state.composite>0 ? 'Resume drill →' : 'Start drill →');

    return '<div class="'+rowClass+'" id="obj-'+t.id+'">'+
      '<div class="obj-head" onclick="toggleObj(\''+t.id+'\')">'+
        '<span class="obj-id">'+t.id+'</span>'+
        '<span class="obj-name">'+esc(t.name)+'</span>'+
        '<span class="obj-modes">'+dots+'</span>'+
        '<span class="obj-prof"><span class="obj-bar"><span class="obj-fill" style="width:'+state.composite+'%"></span></span><span class="obj-pct">'+state.composite+'%</span></span>'+
      '</div>'+
      '<div class="obj-body" id="objbody-'+t.id+'"><div class="obj-body-inner">'+
        '<div class="mode-grid">'+modeCells+'</div>'+
        '<div class="obj-meta-row">'+
          '<div class="obj-meta-left">'+
            '<span class="eval-chip '+es+'">'+evalLabel(es)+'</span>'+
            '<span>'+passed+' / 5 modes passed</span>'+
          '</div>'+
          '<a href="strat.html?obj='+encodeURIComponent(t.id)+'" class="'+ctaClass+'">'+ctaLabel+'</a>'+
        '</div>'+
      '</div></div>'+
    '</div>';
  }

  function render(){
    var data = window.topicsData;
    var host = document.getElementById('domainSections');
    if(!data || !data.domains){ host.innerHTML = '<div class="empty-note">topics-data.js not loaded</div>'; return; }
    var all = loadStrat();

    var totalObjs = 0, totalPass = 0, totalEvalPass = 0;

    var html = data.domains.map(function(d){
      var topicsHtml = d.topics.map(function(t){
        var state = getObjState(all, t.id);
        totalObjs++;
        if(passedCount(state) >= UNLOCK_PASSED_MODES) totalPass++;
        if(state.eval && state.eval.verdict === 'PASS') totalEvalPass++;
        return renderObj(t, state);
      }).join('');

      var avgComposite = Math.round(d.topics.reduce(function(s,t){
        return s + getObjState(all, t.id).composite;
      },0) / d.topics.length);

      return '<div class="domain-section" id="domain-'+d.id+'">'+
        '<div class="ds-head" onclick="toggleDomain(\''+d.id+'\')">'+
          '<div class="ds-title">'+esc(d.name)+'</div>'+
          '<div class="ds-meta"><span class="ds-weight">'+d.weight+'%</span><span class="ds-pct">'+avgComposite+'%</span><span class="ds-toggle" id="dtoggle-'+d.id+'">&#9662;</span></div>'+
        '</div>'+
        '<div class="ds-body" id="dbody-'+d.id+'">'+topicsHtml+'</div></div>';
    }).join('');

    host.innerHTML = html;

    // Auto-open first domain that has any progress; otherwise first domain
    var openDomain = null;
    for (var i = 0; i < data.domains.length; i++){
      var d = data.domains[i];
      var has = d.topics.some(function(t){ return getObjState(all, t.id).composite > 0; });
      if (has){ openDomain = d.id; break; }
    }
    if (!openDomain && data.domains[0]) openDomain = data.domains[0].id;
    if (openDomain){
      var body = document.getElementById('dbody-'+openDomain);
      var tog = document.getElementById('dtoggle-'+openDomain);
      if (body) body.classList.add('open');
      if (tog) tog.classList.add('open');
    }

    var stat = document.getElementById('progressStat');
    if (stat) stat.textContent = totalEvalPass+' / '+totalObjs+' objectives done · '+totalPass+' eval-ready';
  }

  window.toggleDomain = function(id){
    var b = document.getElementById('dbody-'+id);
    var t = document.getElementById('dtoggle-'+id);
    if (b) b.classList.toggle('open');
    if (t) t.classList.toggle('open');
  };
  window.toggleObj = function(id){
    var b = document.getElementById('objbody-'+id);
    if (b) b.classList.toggle('open');
  };

  // Mode toggle (link back to core study overview)
  (function(){
    var el = document.getElementById('modeToggle');
    if (!el) return;
    el.innerHTML =
      '<a href="core.html">Default</a>'+
      '<a href="strat-core.html" class="active">Romeo\'s Strategy</a>';
  })();

  // Exam date picker + countdown
  (function(){
    var picker = document.getElementById('examDatePicker');
    var targetEl = document.getElementById('examTarget');
    var countdownEl = document.getElementById('countdown');
    var saved = localStorage.getItem('ccna_exam_date');
    if (saved) picker.value = saved;
    function update(){
      if (!saved && !picker.value){ targetEl.textContent='Set exam date'; countdownEl.textContent=''; return; }
      var val = saved || picker.value;
      var d = new Date(val+'T00:00:00');
      if (isNaN(d.getTime())) return;
      targetEl.textContent = 'Exam: '+d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      var diff = Math.round((d - new Date(new Date().toDateString())) / 86400000);
      countdownEl.textContent = diff>0 ? diff+' days remaining' : diff===0 ? 'Exam day' : 'Exam passed';
    }
    picker.addEventListener('change', function(){
      saved = this.value;
      localStorage.setItem('ccna_exam_date', saved);
      update();
    });
    update();
  })();

  render();
});
</script>
<script defer src="js/tutor.js"></script>
</body>
</html>
