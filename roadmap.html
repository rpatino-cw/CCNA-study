<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  .gc-bar,.gc-chat-panel,#guidePill{display:none!important}

  .rm-page{max-width:680px;margin:0 auto;padding:0 var(--s-lg) var(--s-3xl)}

  /* Header */
  .rm-head{padding:var(--s-xl) 0 var(--s-lg);border-bottom:2px solid var(--ink);margin-bottom:var(--s-xl)}
  .rm-head h1{font-family:var(--font-display);font-size:2rem;font-weight:800;letter-spacing:-.04em;margin-bottom:6px}
  .rm-meta{display:flex;gap:var(--s-lg);font-family:var(--font-mono);font-size:.75rem;color:var(--ink-muted);flex-wrap:wrap}
  .rm-meta strong{color:var(--ink)}
  .rm-bar{height:4px;background:var(--bg-recessed);border-radius:2px;margin-top:12px}
  .rm-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .6s var(--ease-out)}

  /* "You are here" label */
  .rm-here-label{font-family:var(--font-mono);font-size:.62rem;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-top:8px}

  /* Rail */
  .rail{position:relative;padding-left:32px;margin-top:var(--s-lg)}
  .rail::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--border)}

  /* ── Node base ── */
  .nd{position:relative;padding:7px 0;cursor:pointer;-webkit-user-select:none;user-select:none}
  .nd::before{
    content:'';position:absolute;left:-32px;top:13px;
    width:12px;height:12px;border-radius:50%;
    border:2px solid var(--border-strong);background:var(--bg);
    z-index:1;transition:border-color .2s,background .2s,transform .15s;
  }
  .nd:hover::before{transform:scale(1.15)}

  /* Phase node — larger dot */
  .nd-phase::before{width:14px;height:14px;left:-33px;top:12px}
  .nd-phase.done::before{background:var(--prof-strong);border-color:var(--prof-strong)}
  .nd-phase.partial::before{background:var(--prof-mid);border-color:var(--prof-mid)}
  .nd-phase.weak::before{background:var(--prof-weak);border-color:var(--prof-weak)}

  /* Milestone node — diamond */
  .nd-mile::before{
    width:10px;height:10px;border-radius:2px;
    border-color:var(--accent);background:var(--accent-dim);
    transform:rotate(45deg);left:-30px;top:14px;
  }
  .nd-mile:hover::before{transform:rotate(45deg) scale(1.15)}
  .nd-mile.checked::before{background:var(--accent);border-color:var(--accent)}

  /* Final node — star/large */
  .nd-final::before{
    width:16px;height:16px;border-radius:50%;left:-34px;top:11px;
    border:3px solid var(--accent);background:var(--accent-dim);
  }

  /* "You are here" marker */
  .nd-here{cursor:default;padding:4px 0;margin:2px 0}
  .nd-here::before{
    width:8px;height:8px;left:-29px;top:10px;
    border:none;background:var(--accent);border-radius:50%;
    box-shadow:0 0 0 3px rgba(var(--accent-rgb),.2);
    animation:here-pulse 2s ease-in-out infinite;
  }
  @keyframes here-pulse{0%,100%{box-shadow:0 0 0 3px rgba(var(--accent-rgb),.2)}50%{box-shadow:0 0 0 6px rgba(var(--accent-rgb),.1)}}
  .nd-here .nd-head{font-family:var(--font-mono);font-size:.65rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em}

  /* Node header row */
  .nd-head{display:flex;align-items:baseline;gap:8px;line-height:1.3}
  .nd-label{font-family:var(--font-display);font-size:.88rem;font-weight:600;color:var(--ink)}
  .nd-week{font-family:var(--font-mono);font-size:.62rem;color:var(--ink-muted)}
  .nd-pct{font-family:var(--font-mono);font-size:.72rem;font-weight:700;margin-left:auto;white-space:nowrap}
  .nd-desc{font-family:var(--font-body);font-size:.75rem;color:var(--ink-muted);margin-top:1px;line-height:1.4}

  .nd-mile .nd-label{font-size:.8rem;font-weight:700;color:var(--accent)}
  .nd-final .nd-label{font-size:1rem;color:var(--accent)}

  /* Expand/collapse animation */
  .nd-children{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s var(--ease-out)}
  .nd.open>.nd-children{grid-template-rows:1fr}
  .nd-inner{overflow:hidden}

  /* Chevron */
  .nd-chev{font-size:.55rem;color:var(--ink-faint);transition:transform .2s var(--ease-out);flex-shrink:0}
  .nd.open>.nd-head .nd-chev{transform:rotate(90deg)}

  /* ── Level 1: Topics inside expanded phase ── */
  .sub-rail{padding-left:22px;position:relative;margin:4px 0 2px}
  .sub-rail::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:var(--border)}

  .nd-topic{position:relative;padding:5px 0;cursor:pointer}
  .nd-topic::before{
    content:'';position:absolute;left:-22px;top:11px;
    width:8px;height:8px;border-radius:50%;
    border:2px solid var(--border);background:var(--bg);z-index:1;
    transition:border-color .15s,background .15s;
  }
  .nd-topic.t-done::before{background:var(--prof-strong);border-color:var(--prof-strong)}
  .nd-topic.t-mid::before{background:var(--prof-mid);border-color:var(--prof-mid)}
  .nd-topic.t-weak::before{background:var(--prof-weak);border-color:var(--prof-weak)}

  .nd-topic .nd-head{font-size:.82rem}
  .nd-topic .nd-label{font-size:.82rem;font-weight:500}
  .nd-topic .nd-pct{font-size:.68rem}

  /* Action links inside expanded phase */
  .nd-action{position:relative;padding:4px 0}
  .nd-action::before{
    content:'';position:absolute;left:-22px;top:11px;
    width:6px;height:6px;border-radius:50%;
    background:var(--border);z-index:1;
  }
  .nd-action a{
    font-family:var(--font-display);font-size:.75rem;color:var(--ink-muted);
    text-decoration:none;transition:color .12s;
  }
  .nd-action a:hover{color:var(--accent)}
  .nd-action a::after{content:' \2192';opacity:.4}

  /* ── Level 2: Subtopics inside expanded topic ── */
  .sub-rail2{padding-left:18px;position:relative;margin:2px 0}
  .sub-rail2::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:1px;background:var(--border);opacity:.5}

  .nd-sub{position:relative;padding:3px 0}
  .nd-sub::before{
    content:'';position:absolute;left:-18px;top:10px;
    width:5px;height:5px;border-radius:50%;background:var(--border);z-index:1;
  }
  .nd-sub a{
    font-family:var(--font-body);font-size:.75rem;color:var(--ink-secondary);
    text-decoration:none;line-height:1.3;transition:color .12s;
  }
  .nd-sub a:hover{color:var(--accent)}

  .nd-quiz-link{
    display:inline-block;margin-top:4px;
    font-family:var(--font-display);font-size:.7rem;font-weight:700;
    color:var(--accent);text-decoration:none;padding:4px 10px;
    border:1px solid var(--accent);border-radius:4px;transition:all .15s;
  }
  .nd-quiz-link:hover{background:var(--accent);color:#fff}

  /* Exam date picker */
  .rm-date{display:flex;align-items:center;gap:6px;margin-top:8px;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted)}
  .rm-date input{font-family:var(--font-mono);font-size:.7rem;border:1px solid var(--border);border-radius:var(--radius);padding:3px 8px;background:var(--bg-surface);color:var(--ink);cursor:pointer}
  .rm-date input:focus{outline:2px solid var(--accent);outline-offset:1px}

  /* ── Responsive ── */
  @media(max-width:540px){
    .rm-page{padding:0 var(--s-md) var(--s-2xl)}
    .rail{padding-left:26px}
    .nd-phase::before{width:12px;height:12px;left:-30px}
    .nd-label{font-size:.82rem}
  }
</style>
</head>
<body>
<nav class="top-nav" id="main-nav"></nav>

<div class="rm-page">
  <header class="rm-head">
    <h1>Roadmap</h1>
    <div class="rm-meta" id="rmMeta"></div>
    <div class="rm-bar"><div class="rm-bar-fill" id="rmBar" style="width:0"></div></div>
    <div class="rm-here-label" id="rmHere"></div>
    <div class="rm-date">
      <label for="examDate">Exam date:</label>
      <input type="date" id="examDate">
    </div>
  </header>

  <div class="rail" id="rail"></div>
</div>

<script src="data/topics-data.js"></script>
<script src="js/store.js"></script>
<script src="js/nav.js"></script>
<script>
(function(){
  /* ── Config ── */
  var START = localStorage.getItem('ccna_start_date') || '2026-03-31';
  var EXAM  = localStorage.getItem('ccna_exam_date')  || '2026-06-15';
  var startD = new Date(START), examD = new Date(EXAM), now = new Date();
  var totalWeeks = Math.max(1, Math.round((examD - startD) / 604800000));
  var currentWeek = Math.max(0, Math.round((now - startD) / 604800000));
  var daysLeft = Math.max(0, Math.ceil((examD - now) / 86400000));

  /* Exam date picker */
  var datePicker = document.getElementById('examDate');
  datePicker.value = EXAM;
  datePicker.addEventListener('change', function(){
    localStorage.setItem('ccna_exam_date', datePicker.value);
    location.reload();
  });

  /* ── Proficiency ── */
  store.initProficiency(window.topicsData);
  var prof = store.getAllProficiency();
  var mastered = JSON.parse(localStorage.getItem('ccna_core_mastered') || '{}');
  var domains = window.topicsData.domains;
  var domMap = {};
  domains.forEach(function(d){ domMap[d.id] = d; });

  function pColor(v){ return v >= .7 ? 'var(--prof-strong)' : v >= .4 ? 'var(--prof-mid)' : 'var(--prof-weak)' }
  function pClass(v){ return v >= .7 ? 'done' : v >= .4 ? 'partial' : 'weak' }
  function tClass(v){ return v >= .7 ? 't-done' : v >= .4 ? 't-mid' : 't-weak' }
  function pct(v){ return Math.round(v * 100) + '%' }
  function esc(s){ var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function domainAvg(id){
    var d = domMap[id]; if(!d) return 0;
    var s = 0; d.topics.forEach(function(t){ s += (prof[t.id]||0); });
    return d.topics.length ? s / d.topics.length : 0;
  }
  function multiDomainAvg(ids){
    var s = 0, c = 0;
    ids.forEach(function(id){ var d = domMap[id]; if(d) d.topics.forEach(function(t){ s += (prof[t.id]||0); c++; }); });
    return c ? s / c : 0;
  }

  /* ── Overall stats ── */
  var totalP = 0, totalT = 0, totalM = 0;
  domains.forEach(function(d){ d.topics.forEach(function(t){
    totalT++; totalP += (prof[t.id]||0);
    if(mastered[t.id] || (prof[t.id]||0) >= .7) totalM++;
  })});
  var overall = totalT ? totalP / totalT : 0;

  document.getElementById('rmMeta').innerHTML =
    '<span>Week <strong>' + currentWeek + '</strong> of ' + totalWeeks + '</span>' +
    '<span><strong>' + daysLeft + '</strong> days to exam</span>' +
    '<span>Mastered <strong>' + totalM + '/' + totalT + '</strong></span>' +
    '<span>Overall <strong>' + pct(overall) + '</strong></span>';
  document.getElementById('rmBar').style.width = pct(overall);
  document.getElementById('rmHere').textContent = daysLeft <= 0 ? 'Exam day!' :
    'You are in week ' + currentWeek + ' — ' + (totalWeeks - currentWeek) + ' weeks remaining';

  /* ── Roadmap nodes ── */
  var NODES = [
    { type:'mile', week:0, label:'Setup', desc:'Read objectives + install Packet Tracer',
      links:[{t:'Exam Objectives',h:'objectives.html'},{t:'Strategy',h:'strategy.html'}] },
    { type:'mile', week:0, label:'Baseline Diagnostic', desc:'Take before studying — maps your weak spots',
      links:[{t:'Take Diagnostic',h:'diagnostic.html'}] },

    { type:'phase', week:1, ew:2, label:'Network Fundamentals', domain:'1',
      actions:[
        {t:'Subnetting Cheat Sheet',h:'subnetting-visual.html'},
        {t:'Console Labs 01-02',h:'console-labs.html'},
        {t:'PT Lab 0 + 3',h:'labs/index.html'},
      ]},

    { type:'phase', week:3, ew:4, label:'Network Access', domain:'2',
      actions:[
        {t:'Console Labs 03-05',h:'console-labs.html'},
        {t:'PT Lab 1 + 2',h:'labs/index.html'},
        {t:'Devices Map',h:'devices.html'},
      ]},

    { type:'phase', week:5, ew:6, label:'IP Connectivity', domain:'3',
      actions:[
        {t:'OSPF Mastery',h:'ospf-mastery.html'},
        {t:'Console Labs 06-07 + 09',h:'console-labs.html'},
        {t:'PT Lab 4 + 5',h:'labs/index.html'},
      ]},

    { type:'mile', week:6, label:'Retake Diagnostic', desc:'Should be 50%+ by now',
      links:[{t:'Diagnostic',h:'diagnostic.html'}] },

    { type:'phase', week:7, ew:8, label:'IP Services', domain:'4',
      actions:[
        {t:'Console Labs 08 + 12',h:'console-labs.html'},
        {t:'PT Lab 6 — NAT/DHCP',h:'labs/index.html'},
      ]},

    { type:'phase', week:7, ew:8, label:'Security Fundamentals', domain:'5',
      actions:[
        {t:'Console Labs 10-11',h:'console-labs.html'},
        {t:'PT Lab 7 — ACLs + Port Security',h:'labs/index.html'},
      ]},

    { type:'phase', week:9, ew:9, label:'Automation & Programmability', domain:'6',
      actions:[
        {t:'PT Lab 8 — JSON + REST',h:'labs/index.html'},
        {t:'Glossary Quiz — automation terms',h:'glossary.html'},
      ]},

    { type:'mile', week:9, label:'Start Boson ExSim', desc:'$99 — the closest practice to the real exam' },

    { type:'phase', week:10, ew:11, label:'Final Review',
      actions:[
        {t:'Subnet Speed Drills',h:'subnetting-mastery.html'},
        {t:'All Packet Race Scenarios',h:'packet-race.html'},
        {t:'Glossary — full drill',h:'glossary.html'},
        {t:'Weakest domain quiz blitz',h:'quiz.html'},
      ]},

    { type:'mile', week:10, label:'Practice Exam 1',
      links:[{t:'Exam Simulator',h:'exam-sim.html'}] },
    { type:'mile', week:11, label:'Practice Exam 2',
      links:[{t:'Full Exam Replica',h:'exam-replica.html'}] },

    { type:'final', week:totalWeeks, label:'Exam Day',
      desc: examD.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) },
  ];

  /* ── Render ── */
  var rail = document.getElementById('rail');
  var html = '';
  var hereInserted = false;

  NODES.forEach(function(n, i){
    /* Insert "you are here" marker */
    if(!hereInserted && n.week > currentWeek){
      html += '<div class="nd nd-here"><div class="nd-head">You are here — Week ' + currentWeek + '</div></div>';
      hereInserted = true;
    }

    if(n.type === 'mile'){
      var isChecked = localStorage.getItem('rm_mile_' + i) === '1';
      html += '<div class="nd nd-mile' + (isChecked ? ' checked' : '') + '" data-mile="' + i + '">';
      html += '<div class="nd-head">';
      html += '<span class="nd-label">' + esc(n.label) + '</span>';
      html += '<span class="nd-week">Wk ' + n.week + '</span>';
      html += '<span class="nd-chev">&#9654;</span>';
      html += '</div>';
      html += '<div class="nd-children"><div class="nd-inner">';
      if(n.desc) html += '<div class="nd-desc" style="margin:4px 0">' + esc(n.desc) + '</div>';
      if(n.links) n.links.forEach(function(l){
        html += '<div class="nd-action"><a href="' + l.h + '">' + esc(l.t) + '</a></div>';
      });
      html += '<label style="display:flex;align-items:center;gap:6px;margin-top:6px;font-family:var(--font-mono);font-size:.65rem;color:var(--ink-muted);cursor:pointer">' +
        '<input type="checkbox"' + (isChecked ? ' checked' : '') + ' data-mcheck="' + i + '"> Done</label>';
      html += '</div></div></div>';
    }

    else if(n.type === 'phase'){
      var avg = n.domain ? domainAvg(n.domain) : 0;
      var cls = pClass(avg);
      var wkLabel = n.ew && n.ew !== n.week ? 'Wk ' + n.week + '-' + n.ew : 'Wk ' + n.week;
      var domData = n.domain ? domMap[n.domain] : null;

      html += '<div class="nd nd-phase ' + cls + '" data-phase>';
      html += '<div class="nd-head">';
      html += '<span class="nd-label">' + esc(n.label) + '</span>';
      html += '<span class="nd-week">' + wkLabel + '</span>';
      if(n.domain) html += '<span class="nd-pct" style="color:' + pColor(avg) + '">' + pct(avg) + '</span>';
      html += '<span class="nd-chev">&#9654;</span>';
      html += '</div>';

      html += '<div class="nd-children"><div class="nd-inner">';

      /* Topics from data */
      if(domData){
        html += '<div class="sub-rail">';
        domData.topics.forEach(function(t){
          var tp = prof[t.id] || 0;
          var hasSubs = t.subtopics && t.subtopics.length;
          html += '<div class="nd-topic ' + tClass(tp) + '"' + (hasSubs ? ' data-topic' : '') + '>';
          html += '<div class="nd-head">';
          html += '<span class="nd-label">' + esc(t.id) + ' ' + esc(t.name) + '</span>';
          html += '<span class="nd-pct" style="color:' + pColor(tp) + '">' + pct(tp) + '</span>';
          if(hasSubs) html += '<span class="nd-chev">&#9654;</span>';
          html += '</div>';

          /* Level 2: subtopics */
          if(hasSubs){
            html += '<div class="nd-children"><div class="nd-inner">';
            html += '<div class="sub-rail2">';
            t.subtopics.forEach(function(st){
              html += '<div class="nd-sub"><a href="quiz.html?learn=' + t.id + '">' + esc(st.id) + ' ' + esc(st.name) + '</a></div>';
            });
            html += '<div style="padding:4px 0"><a class="nd-quiz-link" href="quiz.html?learn=' + t.id + '">Quiz ' + t.id + '</a></div>';
            html += '</div>';
            html += '</div></div>';
          }
          html += '</div>';
        });
        html += '</div>';
      }

      /* Action items */
      if(n.actions && n.actions.length){
        html += '<div class="sub-rail" style="margin-top:2px">';
        n.actions.forEach(function(a){
          html += '<div class="nd-action"><a href="' + a.h + '">' + esc(a.t) + '</a></div>';
        });
        html += '</div>';
      }

      html += '</div></div></div>';
    }

    else if(n.type === 'final'){
      html += '<div class="nd nd-final">';
      html += '<div class="nd-head"><span class="nd-label">' + esc(n.label) + '</span></div>';
      if(n.desc) html += '<div class="nd-desc">' + esc(n.desc) + '</div>';
      html += '</div>';
    }
  });

  if(!hereInserted){
    html += '<div class="nd nd-here"><div class="nd-head">You are here — Week ' + currentWeek + '</div></div>';
  }

  rail.innerHTML = html;

  /* ── Toggle expand/collapse ── */
  rail.addEventListener('click', function(e){
    /* Checkbox — don't toggle node */
    if(e.target.type === 'checkbox'){
      var idx = e.target.getAttribute('data-mcheck');
      if(idx !== null){
        localStorage.setItem('rm_mile_' + idx, e.target.checked ? '1' : '0');
        e.target.closest('.nd-mile').classList.toggle('checked', e.target.checked);
      }
      return;
    }
    /* Links — navigate */
    if(e.target.tagName === 'A' || e.target.closest('a')) return;

    /* Find clickable node */
    var nd = e.target.closest('[data-phase],[data-topic],[data-mile]');
    if(!nd) return;
    nd.classList.toggle('open');
  });

})();
</script>
</body>
</html>
