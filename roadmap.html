<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css">
<style>
  .gc-bar,.gc-chat-panel,#guidePill{display:none!important}

  .rm-page{max-width:860px;margin:0 auto;padding:0 var(--s-xl) var(--s-3xl)}

  /* Header */
  .rm-head{padding:var(--s-2xl) 0 var(--s-xl);border-bottom:2px solid var(--ink);margin-bottom:var(--s-2xl)}
  .rm-head h1{font-family:var(--font-display);font-size:2.4rem;font-weight:800;letter-spacing:-.04em;margin-bottom:12px}
  .rm-meta{display:flex;gap:var(--s-xl);font-family:var(--font-mono);font-size:.85rem;color:var(--ink-muted);flex-wrap:wrap}
  .rm-meta strong{color:var(--ink)}
  .rm-bar{height:5px;background:var(--bg-recessed);border-radius:3px;margin-top:20px}
  .rm-bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .8s var(--ease-out)}
  .rm-sub{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-top:16px}
  .rm-here-label{font-family:var(--font-mono);font-size:.72rem;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
  .rm-date{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:.78rem;color:var(--ink-muted)}
  .rm-date input{font-family:var(--font-mono);font-size:.78rem;border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;background:var(--bg-surface);color:var(--ink)}

  /* ── Trail — center line ── */
  .trail{position:relative;padding:var(--s-xl) 0}
  .trail::before{
    content:'';position:absolute;left:50%;top:0;bottom:0;width:3px;
    transform:translateX(-50%);
    background:repeating-linear-gradient(
      to bottom,var(--border-strong) 0,var(--border-strong) 8px,transparent 8px,transparent 14px
    );
  }

  /* ── Waypoint — one stop on the path ── */
  .wp{position:relative;padding:22px 0;min-height:72px}

  /* Dot on center line */
  .wp-dot{
    position:absolute;left:50%;top:16px;
    width:28px;height:28px;border-radius:50%;
    border:3px solid var(--border-strong);background:var(--bg-surface);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:.6rem;font-weight:800;color:var(--ink-muted);
    transform:translateX(-50%);z-index:2;
    transition:all .2s;cursor:pointer;
  }
  .wp:hover .wp-dot{border-color:var(--accent);transform:translateX(-50%) scale(1.1)}

  /* Proficiency dot colors */
  .wp.w-done .wp-dot{background:var(--prof-strong);border-color:var(--prof-strong);color:#fff}
  .wp.w-mid .wp-dot{background:var(--prof-mid);border-color:var(--prof-mid);color:#fff}
  .wp.w-weak .wp-dot{background:var(--prof-weak);border-color:var(--prof-weak);color:#fff}

  /* Milestone — diamond */
  .wp.w-mile .wp-dot{
    width:22px;height:22px;border-radius:3px;
    border-color:var(--accent);background:var(--accent-dim);
    transform:translateX(-50%) rotate(45deg);top:18px;
  }
  .wp.w-mile .wp-dot span{transform:rotate(-45deg);font-size:.55rem}
  .wp.w-mile:hover .wp-dot{transform:translateX(-50%) rotate(45deg) scale(1.1)}
  .wp.w-mile.checked .wp-dot{background:var(--accent);border-color:var(--accent);color:#fff}

  /* Final — big star */
  .wp.w-final .wp-dot{
    width:36px;height:36px;border:3px solid var(--accent);
    background:linear-gradient(135deg,var(--accent-dim),var(--accent-light));
    font-size:.85rem;top:12px;
  }

  /* "You are here" pulse */
  .wp.w-here .wp-dot{box-shadow:0 0 0 5px rgba(var(--accent-rgb),.18);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 5px rgba(var(--accent-rgb),.18)}50%{box-shadow:0 0 0 10px rgba(var(--accent-rgb),.06)}}

  /* Connector arm from dot to card */
  .wp-arm{
    position:absolute;top:28px;height:2px;background:var(--border);z-index:1;
  }

  /* Card — the label + expand area */
  .wp-card{
    width:calc(50% - 40px);cursor:pointer;
    -webkit-user-select:none;user-select:none;position:relative;z-index:1;
  }

  /* Alternating sides */
  .wp.side-l .wp-card{margin-right:auto}
  .wp.side-l .wp-arm{right:50%;left:auto;width:calc(50% - 40px + 14px);right:calc(50% - 14px);left:auto;
    /* simplified: */ left:auto;right:50%;width:26px;margin-right:-14px;
  }
  .wp.side-r .wp-card{margin-left:auto}
  .wp.side-r .wp-arm{left:50%;width:26px;margin-left:-14px}

  /* Card content */
  .wp-name{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);line-height:1.35}
  .wp-info{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);margin-top:6px}
  .wp-desc{font-family:var(--font-body);font-size:.85rem;color:var(--ink-muted);margin-top:8px;line-height:1.55}
  .wp.w-mile .wp-name{color:var(--accent);font-size:.92rem}
  .wp.w-final .wp-name{color:var(--accent);font-size:1.15rem}
  .wp-chev{font-size:.55rem;color:var(--ink-faint);display:inline-block;transition:transform .3s var(--ease-out);margin-left:6px}
  .wp.open .wp-chev{transform:rotate(90deg)}

  /* Expand panel */
  .wp-expand{display:grid;grid-template-rows:0fr;transition:grid-template-rows .4s var(--ease-out)}
  .wp.open>.wp-card>.wp-expand{grid-template-rows:1fr}
  .wp-exp-inner{overflow:hidden}
  .wp-exp-content{padding:16px 0 10px;margin-top:14px;border-top:1px solid var(--border)}

  /* Topic rows */
  .xt{display:flex;align-items:baseline;gap:10px;padding:8px 0;cursor:pointer}
  .xt-dot{width:7px;height:7px;border-radius:50%;border:2px solid var(--border);flex-shrink:0}
  .xt.t-done .xt-dot{background:var(--prof-strong);border-color:var(--prof-strong)}
  .xt.t-mid .xt-dot{background:var(--prof-mid);border-color:var(--prof-mid)}
  .xt.t-weak .xt-dot{background:var(--prof-weak);border-color:var(--prof-weak)}
  .xt-id{font-family:var(--font-mono);font-size:.75rem;color:var(--ink-muted);flex-shrink:0}
  .xt-name{font-family:var(--font-display);font-size:.85rem;font-weight:500;color:var(--ink-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .xt-pct{font-family:var(--font-mono);font-size:.72rem;font-weight:700;flex-shrink:0}

  /* Subtopics expand */
  .xt-subs{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s var(--ease-out)}
  .xt.open>.xt-subs{grid-template-rows:1fr}
  .xt-subs-inner{overflow:hidden}
  .xt-sub{padding:5px 0 5px 20px}
  .xt-sub a{font-family:var(--font-body);font-size:.8rem;color:var(--ink-muted);text-decoration:none;transition:color .2s var(--ease-out)}
  .xt-sub a:hover{color:var(--accent)}
  .xt-quiz{display:inline-block;margin:8px 0 4px 20px;font-family:var(--font-display);font-size:.72rem;font-weight:700;color:var(--accent);text-decoration:none;padding:5px 12px;border:1px solid var(--accent);border-radius:4px;transition:all .2s var(--ease-out)}
  .xt-quiz:hover{background:var(--accent);color:#fff}

  /* Action links */
  .xa{padding:6px 0}
  .xa a{font-family:var(--font-display);font-size:.82rem;color:var(--ink-muted);text-decoration:none;transition:color .2s var(--ease-out)}
  .xa a:hover{color:var(--accent)}
  .xa a::after{content:' \2192';opacity:.4;transition:opacity .2s}
  .xa a:hover::after{opacity:.7}

  /* Milestone checkbox */
  .xcheck{display:flex;align-items:center;gap:8px;margin-top:8px;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted);cursor:pointer}

  /* ── Responsive — collapse to single column ── */
  @media(max-width:640px){
    .trail::before{left:16px}
    .wp-dot{left:16px!important;width:24px!important;height:24px!important;font-size:.55rem!important}
    .wp.w-mile .wp-dot{width:18px!important;height:18px!important}
    .wp.w-final .wp-dot{width:30px!important;height:30px!important}
    .wp-arm{display:none}
    .wp-card{width:auto!important;margin-left:44px!important;margin-right:0!important}
    .wp.side-l .wp-card,.wp.side-r .wp-card{margin-left:44px!important}
  }
</style>
</head>
<body>
<nav class="top-nav" id="main-nav"></nav>

<div class="rm-page">
  <header class="rm-head">
    <h1>Roadmap</h1>
    <div class="rm-meta" id="rmMeta"></div>
    <div class="rm-bar"><div class="rm-bar-fill" id="rmBar" style="width:0"></div></div>
    <div class="rm-sub">
      <div class="rm-here-label" id="rmHere"></div>
      <div class="rm-date">
        <label for="examDate">Exam:</label>
        <input type="date" id="examDate">
      </div>
    </div>
  </header>

  <div class="trail" id="trail"></div>
</div>

<script src="data/topics-data.js"></script>
<script src="js/store.js"></script>
<script src="js/nav.js"></script>
<script>
(function(){
  var START = localStorage.getItem('ccna_start_date') || '2026-03-31';
  var EXAM  = localStorage.getItem('ccna_exam_date')  || '2026-06-15';
  var startD = new Date(START), examD = new Date(EXAM), now = new Date();
  var totalWeeks = Math.max(1, Math.round((examD - startD) / 604800000));
  var currentWeek = Math.max(0, Math.round((now - startD) / 604800000));
  var daysLeft = Math.max(0, Math.ceil((examD - now) / 86400000));

  var datePicker = document.getElementById('examDate');
  datePicker.value = EXAM;
  datePicker.addEventListener('change', function(){
    localStorage.setItem('ccna_exam_date', datePicker.value);
    location.reload();
  });

  store.initProficiency(window.topicsData);
  var prof = store.getAllProficiency();
  var mastered = JSON.parse(localStorage.getItem('ccna_core_mastered') || '{}');
  var domains = window.topicsData.domains;
  var domMap = {};
  domains.forEach(function(d){ domMap[d.id] = d; });

  function pColor(v){ return v >= .7 ? 'var(--prof-strong)' : v >= .4 ? 'var(--prof-mid)' : 'var(--prof-weak)' }
  function wClass(v){ return v >= .7 ? 'w-done' : v >= .4 ? 'w-mid' : 'w-weak' }
  function tClass(v){ return v >= .7 ? 't-done' : v >= .4 ? 't-mid' : 't-weak' }
  function pct(v){ return Math.round(v * 100) }
  function esc(s){ var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function domainAvg(id){
    var d = domMap[id]; if(!d) return 0;
    var s = 0; d.topics.forEach(function(t){ s += (prof[t.id]||0); });
    return d.topics.length ? s / d.topics.length : 0;
  }

  var totalP = 0, totalT = 0, totalM = 0;
  domains.forEach(function(d){ d.topics.forEach(function(t){
    totalT++; totalP += (prof[t.id]||0);
    if(mastered[t.id] || (prof[t.id]||0) >= .7) totalM++;
  })});
  var overall = totalT ? totalP / totalT : 0;

  document.getElementById('rmMeta').innerHTML =
    '<span>Week <strong>' + currentWeek + '</strong> of ' + totalWeeks + '</span>' +
    '<span><strong>' + daysLeft + '</strong> days to exam</span>' +
    '<span>Mastered <strong>' + totalM + '/' + totalT + '</strong></span>' +
    '<span>Overall <strong>' + pct(overall) + '%</strong></span>';
  document.getElementById('rmBar').style.width = pct(overall) + '%';
  document.getElementById('rmHere').textContent = daysLeft <= 0 ? 'Exam day!' :
    'Week ' + currentWeek + ' — ' + (totalWeeks - currentWeek) + ' weeks left';

  var NODES = [
    { type:'mile', week:0, label:'Setup', desc:'Read objectives + install PT',
      links:[{t:'Exam Objectives',h:'objectives.html'},{t:'Strategy',h:'strategy.html'}] },
    { type:'mile', week:0, label:'Baseline Diagnostic', desc:'Take before studying',
      links:[{t:'Take Diagnostic',h:'diagnostic.html'}] },
    { type:'phase', week:1, ew:2, label:'Network Fundamentals', domain:'1',
      actions:[{t:'Subnetting Cheat Sheet',h:'subnetting-visual.html'},{t:'Console Labs 01-02',h:'console-labs.html'},{t:'PT Lab 0 + 3',h:'labs/index.html'}] },
    { type:'phase', week:3, ew:4, label:'Network Access', domain:'2',
      actions:[{t:'Console Labs 03-05',h:'console-labs.html'},{t:'PT Lab 1 + 2',h:'labs/index.html'},{t:'Devices Map',h:'devices.html'}] },
    { type:'phase', week:5, ew:6, label:'IP Connectivity', domain:'3',
      actions:[{t:'OSPF Mastery',h:'ospf-mastery.html'},{t:'Console Labs 06-07 + 09',h:'console-labs.html'},{t:'PT Lab 4 + 5',h:'labs/index.html'}] },
    { type:'mile', week:6, label:'Retake Diagnostic', desc:'Should be 50%+ by now',
      links:[{t:'Diagnostic',h:'diagnostic.html'}] },
    { type:'phase', week:7, ew:8, label:'IP Services', domain:'4',
      actions:[{t:'Console Labs 08 + 12',h:'console-labs.html'},{t:'PT Lab 6',h:'labs/index.html'}] },
    { type:'phase', week:7, ew:8, label:'Security Fundamentals', domain:'5',
      actions:[{t:'Console Labs 10-11',h:'console-labs.html'},{t:'PT Lab 7',h:'labs/index.html'}] },
    { type:'phase', week:9, ew:9, label:'Automation', domain:'6',
      actions:[{t:'PT Lab 8 — JSON + REST',h:'labs/index.html'},{t:'Glossary Quiz',h:'glossary.html'}] },
    { type:'mile', week:9, label:'Start Boson ExSim', desc:'$99 — closest to real exam' },
    { type:'phase', week:10, ew:11, label:'Final Review',
      actions:[{t:'Subnet Speed Drills',h:'subnetting-mastery.html'},{t:'Packet Race — all scenarios',h:'packet-race.html'},{t:'Weakest domain blitz',h:'quiz.html'}] },
    { type:'mile', week:10, label:'Practice Exam 1', links:[{t:'Exam Simulator',h:'exam-sim.html'}] },
    { type:'mile', week:11, label:'Practice Exam 2', links:[{t:'Full Exam Replica',h:'exam-replica.html'}] },
    { type:'final', week:totalWeeks, label:'Exam Day',
      desc: examD.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) },
  ];

  var trail = document.getElementById('trail');
  var html = '';
  var hereInserted = false;

  NODES.forEach(function(n, i){
    var side = i % 2 === 0 ? 'side-l' : 'side-r';
    var isHere = false;
    if(!hereInserted){
      var next = NODES[i + 1];
      if(!next || next.week > currentWeek){ isHere = true; hereInserted = true; }
    }

    if(n.type === 'mile'){
      var ck = localStorage.getItem('rm_mile_' + i) === '1';
      html += '<div class="wp w-mile ' + side + (ck ? ' checked' : '') + (isHere ? ' w-here' : '') + '" data-mile="' + i + '">';
      html += '<div class="wp-dot"><span>&#9670;</span></div><div class="wp-arm"></div>';
      html += '<div class="wp-card">';
      html += '<div class="wp-name">' + esc(n.label) + '<span class="wp-chev">&#9654;</span></div>';
      html += '<div class="wp-info">Wk ' + n.week + '</div>';
      html += '<div class="wp-expand"><div class="wp-exp-inner"><div class="wp-exp-content">';
      if(n.desc) html += '<div class="wp-desc">' + esc(n.desc) + '</div>';
      if(n.links) n.links.forEach(function(l){ html += '<div class="xa"><a href="' + l.h + '">' + esc(l.t) + '</a></div>'; });
      html += '<label class="xcheck"><input type="checkbox"' + (ck ? ' checked' : '') + ' data-mcheck="' + i + '"> Done</label>';
      html += '</div></div></div></div></div>';
    }

    else if(n.type === 'phase'){
      var avg = n.domain ? domainAvg(n.domain) : 0;
      var wk = n.ew && n.ew !== n.week ? 'Wk ' + n.week + '-' + n.ew : 'Wk ' + n.week;
      var domData = n.domain ? domMap[n.domain] : null;

      html += '<div class="wp ' + wClass(avg) + ' ' + side + (isHere ? ' w-here' : '') + '" data-phase>';
      html += '<div class="wp-dot">' + pct(avg) + '</div><div class="wp-arm"></div>';
      html += '<div class="wp-card">';
      html += '<div class="wp-name">' + esc(n.label) + '<span class="wp-chev">&#9654;</span></div>';
      html += '<div class="wp-info">' + wk + (n.domain ? ' &middot; Domain ' + n.domain : '') + '</div>';

      html += '<div class="wp-expand"><div class="wp-exp-inner"><div class="wp-exp-content">';
      if(domData){
        domData.topics.forEach(function(t){
          var tp = prof[t.id] || 0;
          var hasSubs = t.subtopics && t.subtopics.length;
          html += '<div class="xt ' + tClass(tp) + '"' + (hasSubs ? ' data-topic' : '') + '>';
          html += '<span class="xt-dot"></span>';
          html += '<span class="xt-id">' + esc(t.id) + '</span>';
          html += '<span class="xt-name">' + esc(t.name) + '</span>';
          html += '<span class="xt-pct" style="color:' + pColor(tp) + '">' + pct(tp) + '%</span>';
          if(hasSubs){
            html += '<div class="xt-subs"><div class="xt-subs-inner">';
            t.subtopics.forEach(function(st){
              html += '<div class="xt-sub"><a href="quiz.html?learn=' + t.id + '">' + esc(st.id) + ' ' + esc(st.name) + '</a></div>';
            });
            html += '<a class="xt-quiz" href="quiz.html?learn=' + t.id + '">Quiz ' + esc(t.id) + '</a>';
            html += '</div></div>';
          }
          html += '</div>';
        });
      }
      if(n.actions) n.actions.forEach(function(a){
        html += '<div class="xa"><a href="' + a.h + '">' + esc(a.t) + '</a></div>';
      });
      html += '</div></div></div></div></div>';
    }

    else if(n.type === 'final'){
      html += '<div class="wp w-final ' + side + (isHere ? ' w-here' : '') + '">';
      html += '<div class="wp-dot">&#9733;</div><div class="wp-arm"></div>';
      html += '<div class="wp-card">';
      html += '<div class="wp-name">' + esc(n.label) + '</div>';
      if(n.desc) html += '<div class="wp-desc">' + esc(n.desc) + '</div>';
      html += '</div></div>';
    }
  });

  trail.innerHTML = html;

  /* Stagger entrance */
  trail.querySelectorAll('.wp').forEach(function(w, i){
    w.style.opacity = '0';
    w.style.transform = 'translateY(20px) scale(0.97)';
    w.style.transition = 'none';
    setTimeout(function(){
      w.style.transition = 'opacity .55s var(--ease-out), transform .55s var(--ease-out)';
      w.style.opacity = '';
      w.style.transform = '';
    }, 100 + i * 65);
  });

  /* Click handling */
  trail.addEventListener('click', function(e){
    if(e.target.type === 'checkbox'){
      var idx = e.target.getAttribute('data-mcheck');
      if(idx !== null){
        localStorage.setItem('rm_mile_' + idx, e.target.checked ? '1' : '0');
        e.target.closest('.wp').classList.toggle('checked', e.target.checked);
      }
      return;
    }
    if(e.target.tagName === 'A' || e.target.closest('a')) return;
    var topic = e.target.closest('[data-topic]');
    if(topic){ topic.classList.toggle('open'); return; }
    var wp = e.target.closest('[data-phase],[data-mile]');
    if(wp) wp.classList.toggle('open');
  });

})();
</script>
</body>
</html>
