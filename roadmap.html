<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  .gc-bar,.gc-chat-panel,#guidePill{display:none!important}

  .rm-page{max-width:780px;margin:0 auto;padding:0 var(--s-lg) var(--s-3xl)}

  /* Header */
  .rm-head{padding:var(--s-xl) 0 var(--s-lg);border-bottom:2px solid var(--ink);margin-bottom:var(--s-lg)}
  .rm-head h1{font-family:var(--font-display);font-size:2rem;font-weight:800;letter-spacing:-.04em;margin-bottom:6px}
  .rm-meta{display:flex;gap:var(--s-lg);font-family:var(--font-mono);font-size:.75rem;color:var(--ink-muted);flex-wrap:wrap}
  .rm-meta strong{color:var(--ink)}
  .rm-bar{height:4px;background:var(--bg-recessed);border-radius:2px;margin-top:12px}
  .rm-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .6s var(--ease-out)}
  .rm-here-label{font-family:var(--font-mono);font-size:.62rem;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-top:8px}
  .rm-date{display:flex;align-items:center;gap:6px;margin-top:8px;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted)}
  .rm-date input{font-family:var(--font-mono);font-size:.7rem;border:1px solid var(--border);border-radius:var(--radius);padding:3px 8px;background:var(--bg-surface);color:var(--ink)}

  /* ── Map container ── */
  .map{position:relative;padding:var(--s-xl) 0}

  /* SVG path behind everything */
  .map-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .map-path{fill:none;stroke:var(--border);stroke-width:3;stroke-linecap:round}
  .map-path-walked{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;opacity:.35}
  .map-path-dashed{fill:none;stroke:var(--border);stroke-width:2;stroke-dasharray:8 6;stroke-linecap:round;opacity:.4}

  /* ── Rows — zig-zag layout ── */
  .map-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;position:relative;z-index:1}
  .map-row.rtl{flex-direction:row-reverse}
  .map-row.rtl .stop-label{text-align:right}
  .map-row.rtl .stop-expand{align-items:flex-end}

  /* Turn connector between rows */
  .map-turn{height:28px;position:relative;z-index:0;margin-bottom:20px}

  /* ── Stop (node on the path) ── */
  .stop{flex:1;max-width:220px;cursor:pointer;-webkit-user-select:none;user-select:none;position:relative}
  .stop-dot{
    width:32px;height:32px;border-radius:50%;
    border:3px solid var(--border-strong);background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:.65rem;font-weight:800;color:var(--ink-muted);
    transition:all .2s;flex-shrink:0;position:relative;z-index:2;
  }
  .stop:hover .stop-dot{transform:scale(1.1);border-color:var(--accent)}

  /* Proficiency states */
  .stop.s-done .stop-dot{background:var(--prof-strong);border-color:var(--prof-strong);color:#fff}
  .stop.s-mid .stop-dot{background:var(--prof-mid);border-color:var(--prof-mid);color:#fff}
  .stop.s-weak .stop-dot{background:var(--prof-weak);border-color:var(--prof-weak);color:#fff}

  /* Milestone stops — diamond shape */
  .stop.s-mile .stop-dot{
    width:26px;height:26px;border-radius:4px;
    transform:rotate(45deg);border-color:var(--accent);background:var(--accent-dim);
  }
  .stop.s-mile .stop-dot span{transform:rotate(-45deg)}
  .stop.s-mile:hover .stop-dot{transform:rotate(45deg) scale(1.1)}
  .stop.s-mile.checked .stop-dot{background:var(--accent);border-color:var(--accent);color:#fff}

  /* Final stop — treasure */
  .stop.s-final .stop-dot{
    width:40px;height:40px;border:3px solid var(--accent);
    background:linear-gradient(135deg,var(--accent-dim),var(--accent-light));
    font-size:.9rem;
  }

  /* "You are here" pulse */
  .stop.s-here .stop-dot{
    box-shadow:0 0 0 4px rgba(var(--accent-rgb),.2);
    animation:here-pulse 2s ease-in-out infinite;
  }
  @keyframes here-pulse{0%,100%{box-shadow:0 0 0 4px rgba(var(--accent-rgb),.2)}50%{box-shadow:0 0 0 8px rgba(var(--accent-rgb),.08)}}

  .stop-label{flex:1;min-width:0}
  .stop-name{font-family:var(--font-display);font-size:.82rem;font-weight:700;color:var(--ink);line-height:1.3}
  .stop-week{font-family:var(--font-mono);font-size:.58rem;color:var(--ink-muted);margin-top:1px}
  .stop-desc{font-family:var(--font-body);font-size:.7rem;color:var(--ink-muted);line-height:1.4;margin-top:2px}

  .stop.s-mile .stop-name{color:var(--accent);font-size:.78rem}
  .stop.s-final .stop-name{color:var(--accent);font-size:.95rem}

  /* Chevron */
  .stop-chev{font-size:.5rem;color:var(--ink-faint);display:inline-block;transition:transform .2s var(--ease-out);margin-left:4px}
  .stop.open .stop-chev{transform:rotate(90deg)}

  /* ── Expand panel ── */
  .stop-expand{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s var(--ease-out)}
  .stop.open>.stop-expand{grid-template-rows:1fr}
  .stop-expand-inner{overflow:hidden}
  .stop-expand-content{padding:8px 0 4px;border-left:2px solid var(--border);margin-left:14px;padding-left:14px;margin-top:6px}

  /* Topic rows inside expanded phase */
  .ex-topic{display:flex;align-items:baseline;gap:6px;padding:4px 0;cursor:pointer;position:relative}
  .ex-topic::before{
    content:'';position:absolute;left:-21px;top:9px;
    width:6px;height:6px;border-radius:50%;border:2px solid var(--border);background:var(--bg);
  }
  .ex-topic.t-done::before{background:var(--prof-strong);border-color:var(--prof-strong)}
  .ex-topic.t-mid::before{background:var(--prof-mid);border-color:var(--prof-mid)}
  .ex-topic.t-weak::before{background:var(--prof-weak);border-color:var(--prof-weak)}
  .ex-topic-id{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted);flex-shrink:0}
  .ex-topic-name{font-family:var(--font-display);font-size:.75rem;font-weight:500;color:var(--ink-secondary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ex-topic-pct{font-family:var(--font-mono);font-size:.65rem;font-weight:700;flex-shrink:0}

  /* Sub-expand for subtopics */
  .ex-subs{display:grid;grid-template-rows:0fr;transition:grid-template-rows .2s var(--ease-out)}
  .ex-topic.open>.ex-subs{grid-template-rows:1fr}
  .ex-subs-inner{overflow:hidden}
  .ex-sub{padding:2px 0 2px 18px}
  .ex-sub a{font-family:var(--font-body);font-size:.7rem;color:var(--ink-muted);text-decoration:none;transition:color .12s}
  .ex-sub a:hover{color:var(--accent)}
  .ex-quiz{display:inline-block;margin:4px 0 2px 18px;font-family:var(--font-display);font-size:.65rem;font-weight:700;color:var(--accent);text-decoration:none;padding:3px 8px;border:1px solid var(--accent);border-radius:3px;transition:all .12s}
  .ex-quiz:hover{background:var(--accent);color:#fff}

  /* Action links */
  .ex-action{padding:3px 0}
  .ex-action a{font-family:var(--font-display);font-size:.72rem;color:var(--ink-muted);text-decoration:none;transition:color .12s}
  .ex-action a:hover{color:var(--accent)}
  .ex-action a::after{content:' \2192';opacity:.4}

  /* Milestone checkbox */
  .ex-check{display:flex;align-items:center;gap:6px;margin-top:4px;font-family:var(--font-mono);font-size:.62rem;color:var(--ink-muted);cursor:pointer}

  /* ── Responsive ── */
  @media(max-width:600px){
    .map-row{flex-wrap:nowrap;gap:8px}
    .stop{max-width:none}
    .stop-dot{width:26px;height:26px;font-size:.55rem}
    .stop.s-mile .stop-dot{width:22px;height:22px}
    .stop.s-final .stop-dot{width:32px;height:32px}
    .stop-name{font-size:.78rem}
  }
</style>
</head>
<body>
<nav class="top-nav" id="main-nav"></nav>

<div class="rm-page">
  <header class="rm-head">
    <h1>Roadmap</h1>
    <div class="rm-meta" id="rmMeta"></div>
    <div class="rm-bar"><div class="rm-bar-fill" id="rmBar" style="width:0"></div></div>
    <div class="rm-here-label" id="rmHere"></div>
    <div class="rm-date">
      <label for="examDate">Exam date:</label>
      <input type="date" id="examDate">
    </div>
  </header>

  <div class="map" id="map"></div>
</div>

<script src="data/topics-data.js"></script>
<script src="js/store.js"></script>
<script src="js/nav.js"></script>
<script>
(function(){
  /* ── Config ── */
  var START = localStorage.getItem('ccna_start_date') || '2026-03-31';
  var EXAM  = localStorage.getItem('ccna_exam_date')  || '2026-06-15';
  var startD = new Date(START), examD = new Date(EXAM), now = new Date();
  var totalWeeks = Math.max(1, Math.round((examD - startD) / 604800000));
  var currentWeek = Math.max(0, Math.round((now - startD) / 604800000));
  var daysLeft = Math.max(0, Math.ceil((examD - now) / 86400000));

  var datePicker = document.getElementById('examDate');
  datePicker.value = EXAM;
  datePicker.addEventListener('change', function(){
    localStorage.setItem('ccna_exam_date', datePicker.value);
    location.reload();
  });

  /* ── Proficiency ── */
  store.initProficiency(window.topicsData);
  var prof = store.getAllProficiency();
  var mastered = JSON.parse(localStorage.getItem('ccna_core_mastered') || '{}');
  var domains = window.topicsData.domains;
  var domMap = {};
  domains.forEach(function(d){ domMap[d.id] = d; });

  function pColor(v){ return v >= .7 ? 'var(--prof-strong)' : v >= .4 ? 'var(--prof-mid)' : 'var(--prof-weak)' }
  function sClass(v){ return v >= .7 ? 's-done' : v >= .4 ? 's-mid' : 's-weak' }
  function tClass(v){ return v >= .7 ? 't-done' : v >= .4 ? 't-mid' : 't-weak' }
  function pct(v){ return Math.round(v * 100) }
  function esc(s){ var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function domainAvg(id){
    var d = domMap[id]; if(!d) return 0;
    var s = 0; d.topics.forEach(function(t){ s += (prof[t.id]||0); });
    return d.topics.length ? s / d.topics.length : 0;
  }

  /* ── Overall stats ── */
  var totalP = 0, totalT = 0, totalM = 0;
  domains.forEach(function(d){ d.topics.forEach(function(t){
    totalT++; totalP += (prof[t.id]||0);
    if(mastered[t.id] || (prof[t.id]||0) >= .7) totalM++;
  })});
  var overall = totalT ? totalP / totalT : 0;

  document.getElementById('rmMeta').innerHTML =
    '<span>Week <strong>' + currentWeek + '</strong> of ' + totalWeeks + '</span>' +
    '<span><strong>' + daysLeft + '</strong> days to exam</span>' +
    '<span>Mastered <strong>' + totalM + '/' + totalT + '</strong></span>' +
    '<span>Overall <strong>' + pct(overall) + '%</strong></span>';
  document.getElementById('rmBar').style.width = pct(overall) + '%';
  document.getElementById('rmHere').textContent = daysLeft <= 0 ? 'Exam day!' :
    'You are in week ' + currentWeek + ' — ' + (totalWeeks - currentWeek) + ' weeks remaining';

  /* ── Roadmap nodes ── */
  var NODES = [
    { type:'mile', week:0, label:'Setup', desc:'Read objectives + install PT',
      links:[{t:'Exam Objectives',h:'objectives.html'},{t:'Strategy',h:'strategy.html'}] },
    { type:'mile', week:0, label:'Baseline Diagnostic', desc:'Take before studying',
      links:[{t:'Take Diagnostic',h:'diagnostic.html'}] },
    { type:'phase', week:1, ew:2, label:'Network Fundamentals', domain:'1',
      actions:[{t:'Subnetting Cheat Sheet',h:'subnetting-visual.html'},{t:'Console Labs 01-02',h:'console-labs.html'},{t:'PT Lab 0 + 3',h:'labs/index.html'}] },
    { type:'phase', week:3, ew:4, label:'Network Access', domain:'2',
      actions:[{t:'Console Labs 03-05',h:'console-labs.html'},{t:'PT Lab 1 + 2',h:'labs/index.html'},{t:'Devices Map',h:'devices.html'}] },
    { type:'phase', week:5, ew:6, label:'IP Connectivity', domain:'3',
      actions:[{t:'OSPF Mastery',h:'ospf-mastery.html'},{t:'Console Labs 06-07 + 09',h:'console-labs.html'},{t:'PT Lab 4 + 5',h:'labs/index.html'}] },
    { type:'mile', week:6, label:'Retake Diagnostic', desc:'Should be 50%+ by now',
      links:[{t:'Diagnostic',h:'diagnostic.html'}] },
    { type:'phase', week:7, ew:8, label:'IP Services', domain:'4',
      actions:[{t:'Console Labs 08 + 12',h:'console-labs.html'},{t:'PT Lab 6',h:'labs/index.html'}] },
    { type:'phase', week:7, ew:8, label:'Security Fundamentals', domain:'5',
      actions:[{t:'Console Labs 10-11',h:'console-labs.html'},{t:'PT Lab 7',h:'labs/index.html'}] },
    { type:'phase', week:9, ew:9, label:'Automation', domain:'6',
      actions:[{t:'PT Lab 8 — JSON + REST',h:'labs/index.html'},{t:'Glossary Quiz',h:'glossary.html'}] },
    { type:'mile', week:9, label:'Start Boson ExSim', desc:'$99 — closest to real exam' },
    { type:'phase', week:10, ew:11, label:'Final Review',
      actions:[{t:'Subnet Speed Drills',h:'subnetting-mastery.html'},{t:'Packet Race — all scenarios',h:'packet-race.html'},{t:'Weakest domain blitz',h:'quiz.html'}] },
    { type:'mile', week:10, label:'Practice Exam 1', links:[{t:'Exam Simulator',h:'exam-sim.html'}] },
    { type:'mile', week:11, label:'Practice Exam 2', links:[{t:'Full Exam Replica',h:'exam-replica.html'}] },
    { type:'final', week:totalWeeks, label:'Exam Day',
      desc: examD.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) },
  ];

  /* ── Zig-zag layout: 3 stops per row, alternating direction ── */
  var COLS = 3;
  var rows = [];
  for(var i = 0; i < NODES.length; i += COLS){
    rows.push(NODES.slice(i, i + COLS));
  }

  var map = document.getElementById('map');
  var html = '';
  var hereInserted = false;

  rows.forEach(function(row, ri){
    var isRtl = ri % 2 === 1;
    /* Reverse items in RTL rows so the path snakes correctly */
    var items = isRtl ? row.slice().reverse() : row;

    html += '<div class="map-row' + (isRtl ? ' rtl' : '') + '">';

    items.forEach(function(n, ci){
      var globalIdx = ri * COLS + (isRtl ? (row.length - 1 - ci) : ci);

      /* "You are here" check */
      var isHere = false;
      if(!hereInserted){
        var nextNode = NODES[globalIdx + 1];
        if(!nextNode || nextNode.week > currentWeek){
          isHere = true;
          hereInserted = true;
        }
      }

      if(n.type === 'mile'){
        var isChecked = localStorage.getItem('rm_mile_' + globalIdx) === '1';
        html += '<div class="stop s-mile' + (isChecked ? ' checked' : '') + (isHere ? ' s-here' : '') + '" data-mile="' + globalIdx + '">';
        html += '<div style="display:flex;align-items:center;gap:10px">';
        html += '<div class="stop-dot"><span>&#9670;</span></div>';
        html += '<div class="stop-label">';
        html += '<div class="stop-name">' + esc(n.label) + '<span class="stop-chev">&#9654;</span></div>';
        html += '<div class="stop-week">Wk ' + n.week + '</div>';
        html += '</div></div>';
        html += '<div class="stop-expand"><div class="stop-expand-inner"><div class="stop-expand-content">';
        if(n.desc) html += '<div class="stop-desc">' + esc(n.desc) + '</div>';
        if(n.links) n.links.forEach(function(l){
          html += '<div class="ex-action"><a href="' + l.h + '">' + esc(l.t) + '</a></div>';
        });
        html += '<label class="ex-check"><input type="checkbox"' + (isChecked ? ' checked' : '') + ' data-mcheck="' + globalIdx + '"> Done</label>';
        html += '</div></div></div></div>';
      }

      else if(n.type === 'phase'){
        var avg = n.domain ? domainAvg(n.domain) : 0;
        var wk = n.ew && n.ew !== n.week ? 'Wk ' + n.week + '-' + n.ew : 'Wk ' + n.week;
        var domData = n.domain ? domMap[n.domain] : null;

        html += '<div class="stop ' + sClass(avg) + (isHere ? ' s-here' : '') + '" data-phase>';
        html += '<div style="display:flex;align-items:center;gap:10px">';
        html += '<div class="stop-dot">' + pct(avg) + '</div>';
        html += '<div class="stop-label">';
        html += '<div class="stop-name">' + esc(n.label) + '<span class="stop-chev">&#9654;</span></div>';
        html += '<div class="stop-week">' + wk + (n.domain ? ' &middot; Domain ' + n.domain : '') + '</div>';
        html += '</div></div>';

        html += '<div class="stop-expand"><div class="stop-expand-inner"><div class="stop-expand-content">';

        if(domData){
          domData.topics.forEach(function(t){
            var tp = prof[t.id] || 0;
            var hasSubs = t.subtopics && t.subtopics.length;
            html += '<div class="ex-topic ' + tClass(tp) + '"' + (hasSubs ? ' data-topic' : '') + '>';
            html += '<span class="ex-topic-id">' + esc(t.id) + '</span>';
            html += '<span class="ex-topic-name">' + esc(t.name) + '</span>';
            html += '<span class="ex-topic-pct" style="color:' + pColor(tp) + '">' + pct(tp) + '%</span>';
            if(hasSubs) html += '<span class="stop-chev">&#9654;</span>';

            if(hasSubs){
              html += '<div class="ex-subs"><div class="ex-subs-inner">';
              t.subtopics.forEach(function(st){
                html += '<div class="ex-sub"><a href="quiz.html?learn=' + t.id + '">' + esc(st.id) + ' ' + esc(st.name) + '</a></div>';
              });
              html += '<a class="ex-quiz" href="quiz.html?learn=' + t.id + '">Quiz ' + esc(t.id) + '</a>';
              html += '</div></div>';
            }
            html += '</div>';
          });
        }

        if(n.actions){
          n.actions.forEach(function(a){
            html += '<div class="ex-action"><a href="' + a.h + '">' + esc(a.t) + '</a></div>';
          });
        }

        html += '</div></div></div></div>';
      }

      else if(n.type === 'final'){
        html += '<div class="stop s-final' + (isHere ? ' s-here' : '') + '">';
        html += '<div style="display:flex;align-items:center;gap:10px">';
        html += '<div class="stop-dot">&#9733;</div>';
        html += '<div class="stop-label">';
        html += '<div class="stop-name">' + esc(n.label) + '</div>';
        if(n.desc) html += '<div class="stop-desc">' + esc(n.desc) + '</div>';
        html += '</div></div></div>';
      }
    });

    html += '</div>';

    /* Turn spacer between rows */
    if(ri < rows.length - 1){
      html += '<div class="map-turn"></div>';
    }
  });

  map.innerHTML = html;

  /* ── Draw SVG path connecting all stop dots ── */
  requestAnimationFrame(function(){
    var dots = map.querySelectorAll('.stop-dot');
    if(dots.length < 2) return;

    var mapRect = map.getBoundingClientRect();
    var points = [];
    dots.forEach(function(dot){
      var r = dot.getBoundingClientRect();
      points.push({
        x: r.left + r.width/2 - mapRect.left,
        y: r.top + r.height/2 - mapRect.top
      });
    });

    var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('class','map-svg');
    svg.setAttribute('viewBox','0 0 ' + mapRect.width + ' ' + mapRect.height);
    svg.style.width = mapRect.width + 'px';
    svg.style.height = mapRect.height + 'px';

    /* Build smooth path */
    var d = 'M ' + points[0].x + ' ' + points[0].y;
    for(var i = 1; i < points.length; i++){
      var prev = points[i-1], curr = points[i];
      var midY = (prev.y + curr.y) / 2;
      d += ' C ' + prev.x + ' ' + midY + ', ' + curr.x + ' ' + midY + ', ' + curr.x + ' ' + curr.y;
    }

    /* Full path (dashed, behind) */
    var pathBg = document.createElementNS('http://www.w3.org/2000/svg','path');
    pathBg.setAttribute('class','map-path-dashed');
    pathBg.setAttribute('d', d);
    svg.appendChild(pathBg);

    /* Walked path (solid, up to "here") */
    var walkedIdx = 0;
    var allStops = map.querySelectorAll('.stop');
    allStops.forEach(function(s, idx){ if(s.classList.contains('s-here')) walkedIdx = idx; });

    if(walkedIdx > 0 && walkedIdx < points.length){
      var dw = 'M ' + points[0].x + ' ' + points[0].y;
      for(var j = 1; j <= walkedIdx; j++){
        var pv = points[j-1], cu = points[j];
        var my = (pv.y + cu.y) / 2;
        dw += ' C ' + pv.x + ' ' + my + ', ' + cu.x + ' ' + my + ', ' + cu.x + ' ' + cu.y;
      }
      var pathWalked = document.createElementNS('http://www.w3.org/2000/svg','path');
      pathWalked.setAttribute('class','map-path-walked');
      pathWalked.setAttribute('d', dw);
      svg.appendChild(pathWalked);
    }

    map.insertBefore(svg, map.firstChild);
  });

  /* ── Click handling ── */
  map.addEventListener('click', function(e){
    if(e.target.type === 'checkbox'){
      var idx = e.target.getAttribute('data-mcheck');
      if(idx !== null){
        localStorage.setItem('rm_mile_' + idx, e.target.checked ? '1' : '0');
        e.target.closest('.stop').classList.toggle('checked', e.target.checked);
      }
      return;
    }
    if(e.target.tagName === 'A' || e.target.closest('a')) return;

    var topic = e.target.closest('[data-topic]');
    if(topic){ topic.classList.toggle('open'); return; }

    var stop = e.target.closest('[data-phase],[data-mile]');
    if(stop) stop.classList.toggle('open');
  });

  /* Stagger entrance */
  requestAnimationFrame(function(){
    map.querySelectorAll('.stop').forEach(function(s, i){
      s.style.opacity = '0';
      s.style.transform = 'translateY(12px)';
      s.style.transition = 'none';
      setTimeout(function(){
        s.style.transition = 'opacity .4s var(--ease-out), transform .4s var(--ease-out)';
        s.style.opacity = '';
        s.style.transform = '';
      }, 60 + i * 50);
    });
  });

})();
</script>
</body>
</html>
