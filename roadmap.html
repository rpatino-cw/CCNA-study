<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  .gc-bar,.gc-chat-panel,#guidePill{display:none!important}

  /* ── Page Layout ──────────────────────────────────────────── */
  .roadmap-page{
    max-width:1600px;margin:0 auto;padding:0 var(--s-xl) var(--s-3xl);
    min-height:100vh;
  }
  .rm-header{
    padding:var(--s-xl) 0 var(--s-lg);
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:2px solid var(--ink);margin-bottom:var(--s-xl);
    flex-wrap:wrap;gap:12px;
  }
  .rm-title{
    font-family:var(--font-display);font-size:clamp(1.6rem,3.5vw,2.6rem);
    font-weight:800;letter-spacing:-.05em;color:var(--ink);line-height:1;
  }
  .rm-title span{color:var(--accent);font-weight:400;font-size:.6em;letter-spacing:0;margin-left:8px}
  .rm-stats{
    display:flex;gap:var(--s-lg);font-family:var(--font-mono);font-size:.78rem;color:var(--ink-muted);
  }
  .rm-stats strong{color:var(--ink)}
  .rm-back{
    font-family:var(--font-display);font-size:.78rem;color:var(--ink-muted);
    text-decoration:none;letter-spacing:.02em;
  }
  .rm-back:hover{color:var(--accent)}

  /* ── Legend ────────────────────────────────────────────────── */
  .rm-legend{
    display:flex;gap:var(--s-lg);align-items:center;
    margin-bottom:var(--s-xl);font-family:var(--font-display);font-size:.72rem;
    color:var(--ink-muted);flex-wrap:wrap;
  }
  .rm-legend-dot{
    width:10px;height:10px;border-radius:2px;display:inline-block;
    margin-right:4px;vertical-align:middle;
  }

  /* ── Flow container — the main roadmap ────────────────────── */
  .rm-flow{
    position:relative;
    display:flex;flex-direction:column;align-items:center;
    gap:0;
  }

  /* Vertical connector between domain groups */
  .rm-connector{
    width:3px;height:56px;
    background:repeating-linear-gradient(
      to bottom,var(--border-strong) 0,var(--border-strong) 6px,transparent 6px,transparent 12px
    );
    flex-shrink:0;
  }
  .rm-connector-fork{
    display:flex;align-items:flex-start;justify-content:center;
    position:relative;width:100%;max-width:1500px;height:56px;flex-shrink:0;
  }
  .rm-connector-fork::before{
    content:'';position:absolute;top:0;left:50%;
    width:3px;height:28px;background:var(--accent);opacity:.35;transform:translateX(-50%);
  }
  .rm-connector-fork::after{
    content:'';position:absolute;top:28px;
    left:calc(25% - 1px);right:calc(25% - 1px);
    height:3px;background:var(--accent);opacity:.35;
  }
  .rm-fork-legs{
    position:absolute;top:28px;left:25%;right:25%;
    display:flex;justify-content:space-between;
  }
  .rm-fork-leg{
    width:3px;height:28px;background:var(--accent);opacity:.35;
  }

  /* Merge connector (two columns back to one) */
  .rm-connector-merge{
    display:flex;align-items:flex-end;justify-content:center;
    position:relative;width:100%;max-width:1500px;height:56px;flex-shrink:0;
  }
  .rm-connector-merge::before{
    content:'';position:absolute;bottom:0;left:50%;
    width:3px;height:28px;background:var(--accent);opacity:.35;transform:translateX(-50%);
  }
  .rm-connector-merge::after{
    content:'';position:absolute;bottom:28px;
    left:calc(25% - 1px);right:calc(25% - 1px);
    height:3px;background:var(--accent);opacity:.35;
  }
  .rm-merge-legs{
    position:absolute;bottom:28px;left:25%;right:25%;
    display:flex;justify-content:space-between;
  }
  .rm-merge-leg{
    width:3px;height:28px;background:var(--accent);opacity:.35;
  }

  /* ── Domain group box ─────────────────────────────────────── */
  .rm-domain{
    width:100%;max-width:720px;
    border:2px solid var(--border);
    border-radius:var(--radius-lg);
    overflow:hidden;
    transition:border-color .2s;
  }
  .rm-domain:hover{border-color:var(--border-strong)}

  .rm-domain-head{
    padding:16px 24px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);
  }
  .rm-domain-label{
    font-family:var(--font-display);font-size:.78rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;
  }
  .rm-domain-progress{
    font-family:var(--font-mono);font-size:.88rem;font-weight:700;
  }
  .rm-domain-bar{
    height:4px;background:var(--bg-recessed);
  }
  .rm-domain-bar-fill{
    height:100%;transition:width .6s var(--ease-out);
  }

  /* Two-column row */
  .rm-row-2{
    display:grid;grid-template-columns:1fr 1fr;
    gap:var(--s-2xl);width:100%;max-width:1500px;
  }
  .rm-row-2 .rm-domain{max-width:none}

  /* ── Topic nodes inside domain ────────────────────────────── */
  .rm-topics{
    padding:14px 16px;
    display:flex;flex-direction:column;gap:4px;
  }

  .rm-node{
    display:grid;
    grid-template-columns:52px 1fr 60px 40px;
    align-items:center;gap:0;
    padding:13px 18px;
    border-radius:var(--radius);
    text-decoration:none;color:var(--ink);
    transition:background .12s,transform .12s;
    cursor:pointer;position:relative;
  }
  .rm-node:hover{
    background:var(--bg-recessed);
    transform:translateX(3px);
  }
  .rm-node:active{transform:translateX(1px)}

  .rm-node-id{
    font-family:var(--font-mono);font-size:.82rem;font-weight:700;
    color:var(--ink-muted);
  }
  .rm-node-name{
    font-family:var(--font-display);font-size:.92rem;font-weight:600;
    line-height:1.35;
    overflow:hidden;text-overflow:ellipsis;
    padding-right:12px;
  }
  .rm-node-pct{
    font-family:var(--font-mono);font-size:.82rem;font-weight:700;
    text-align:right;padding-right:10px;
  }
  .rm-node-ring{
    width:34px;height:34px;position:relative;
  }
  .rm-node-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
  .rm-node-ring circle{fill:none;stroke-width:3.5}
  .rm-node-ring .track{stroke:var(--bg-recessed)}
  .rm-node-ring .fill{transition:stroke-dashoffset .6s var(--ease-out)}
  .rm-node-check{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;color:var(--prof-strong);
    opacity:0;transition:opacity .2s;
  }
  .rm-node.mastered .rm-node-check{opacity:1}
  .rm-node.mastered{opacity:.7}
  .rm-node.mastered:hover{opacity:1}

  /* ── Prereq indicator arrow on nodes ──────────────────────── */
  .rm-node::before{
    content:'';position:absolute;left:-2px;top:50%;
    width:4px;height:4px;
    border-left:2px solid transparent;border-bottom:2px solid transparent;
    transform:translateY(-50%) rotate(-45deg);
    opacity:0;transition:opacity .15s;
  }
  .rm-node:hover::before{
    border-color:var(--accent);opacity:.5;
  }

  /* ── Overall progress ring (big, top-right) ───────────────── */
  .rm-overall{
    position:fixed;top:20px;right:20px;z-index:10;
    width:72px;height:72px;
    background:var(--bg-surface);
    border:1px solid var(--border);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 12px rgba(0,0,0,.06);
  }
  .rm-overall svg{width:60px;height:60px;transform:rotate(-90deg)}
  .rm-overall circle{fill:none;stroke-width:4}
  .rm-overall .track{stroke:var(--bg-recessed)}
  .rm-overall .fill{stroke:var(--accent);transition:stroke-dashoffset 1s var(--ease-out)}
  .rm-overall-pct{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:.82rem;font-weight:800;color:var(--ink);
  }

  /* ── Tooltip on hover ─────────────────────────────────────── */
  .rm-tip{
    display:none;position:absolute;z-index:100;
    left:100%;top:50%;transform:translateY(-50%);margin-left:12px;
    background:var(--ink);color:var(--bg);
    padding:8px 14px;border-radius:var(--radius);
    font-family:var(--font-body);font-size:.75rem;line-height:1.5;
    white-space:nowrap;pointer-events:none;
    box-shadow:0 4px 16px rgba(0,0,0,.15);
  }
  .rm-tip::before{
    content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);
    border:5px solid transparent;border-right-color:var(--ink);
  }
  .rm-node:hover .rm-tip{display:block}

  /* ── Footer CTA ───────────────────────────────────────────── */
  .rm-cta{
    text-align:center;padding:var(--s-2xl) 0 var(--s-lg);
  }
  .rm-cta a{
    display:inline-block;font-family:var(--font-display);
    font-size:.88rem;font-weight:700;color:#fff;background:var(--accent);
    padding:14px 40px;border-radius:var(--radius-lg);text-decoration:none;
    transition:all .2s;
  }
  .rm-cta a:hover{background:#92400E;transform:translateY(-2px);box-shadow:0 6px 20px rgba(180,83,9,.25)}
  .rm-cta p{
    font-family:var(--font-body);font-size:.78rem;color:var(--ink-muted);margin-top:var(--s-sm);
  }

  /* ── Responsive ───────────────────────────────────────────── */
  @media(max-width:860px){
    .rm-row-2{grid-template-columns:1fr;gap:0}
    .rm-row-2 .rm-domain{max-width:580px;margin:0 auto}
    .rm-connector-fork,.rm-connector-merge,
    .rm-fork-legs,.rm-merge-legs{display:none}
    .rm-row-2::before{
      content:'';display:block;width:3px;height:32px;margin:0 auto;
      background:var(--border-strong);
    }
    .rm-overall{width:56px;height:56px;top:12px;right:12px}
    .rm-overall svg{width:44px;height:44px}
    .rm-overall-pct{font-size:.7rem}
    .rm-tip{display:none !important}
  }

  @media(max-width:540px){
    .rm-node{grid-template-columns:42px 1fr 48px 30px;padding:10px 12px}
    .rm-node-name{font-size:.8rem}
    .rm-node-ring{width:26px;height:26px}
  }
</style>
</head>
<body>
<nav class="top-nav" id="main-nav"></nav>

<!-- Fixed overall progress ring -->
<div class="rm-overall" id="overallRing" title="Overall proficiency">
  <svg viewBox="0 0 60 60">
    <circle class="track" cx="30" cy="30" r="26"/>
    <circle class="fill" cx="30" cy="30" r="26" stroke-dasharray="163.36" stroke-dashoffset="163.36"/>
  </svg>
  <div class="rm-overall-pct" id="overallPct">0%</div>
</div>

<div class="roadmap-page">
  <header class="rm-header">
    <div>
      <h1 class="rm-title">Roadmap<span>CCNA 200-301</span></h1>
    </div>
    <div style="display:flex;align-items:baseline;gap:var(--s-xl)">
      <div class="rm-stats" id="rmStats"></div>
      <a href="core.html" class="rm-back">&larr; Dashboard</a>
    </div>
  </header>

  <div class="rm-legend">
    <span><span class="rm-legend-dot" style="background:var(--prof-weak)"></span> &lt;40% — Weak</span>
    <span><span class="rm-legend-dot" style="background:var(--prof-mid)"></span> 40-69% — Learning</span>
    <span><span class="rm-legend-dot" style="background:var(--prof-strong)"></span> 70%+ — Mastered</span>
    <span style="margin-left:auto;font-family:var(--font-mono);font-size:.65rem;color:var(--ink-faint)">Click any topic to quiz</span>
  </div>

  <div class="rm-flow" id="rmFlow"></div>

  <div class="rm-cta" id="rmCta"></div>
</div>

<script src="data/topics-data.js"></script>
<script src="js/store.js"></script>
<script src="js/nav.js"></script>
<script>
(function(){
  /* ── Constants ──────────────────────────────────────────── */
  var COLORS = ['','#2563EB','#16A34A','#D97706','#7C3AED','#DC2626','#0891B2'];
  var CIRC = 2 * Math.PI * 13; /* ring circumference r=13 */
  var CIRC_BIG = 2 * Math.PI * 26; /* overall ring r=26 */

  /* ── Helpers ────────────────────────────────────────────── */
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function profColor(v){return v>=.7?'var(--prof-strong)':v>=.4?'var(--prof-mid)':'var(--prof-weak)'}
  function pctStr(v){return Math.round(v*100)+'%'}

  /* ── Build a single topic node ──────────────────────────── */
  function buildNode(topic, prof, mastered, domainColor){
    var p = prof[topic.id] || 0;
    var pct = Math.round(p * 100);
    var color = profColor(p);
    var isMastered = mastered[topic.id] || p >= 0.7;
    var offset = CIRC - (CIRC * p);

    var subs = '';
    if(topic.subtopics && topic.subtopics.length){
      subs = topic.subtopics.slice(0,3).map(function(s){return esc(s.name)}).join(' · ');
      if(topic.subtopics.length > 3) subs += ' +' + (topic.subtopics.length - 3) + ' more';
    }

    return '<a href="quiz.html?learn=' + topic.id + '" class="rm-node' + (isMastered ? ' mastered' : '') + '">' +
      '<span class="rm-node-id" style="color:' + domainColor + '">' + esc(topic.id) + '</span>' +
      '<span class="rm-node-name">' + esc(topic.name) + '</span>' +
      '<span class="rm-node-pct" style="color:' + color + '">' + pct + '%</span>' +
      '<span class="rm-node-ring">' +
        '<svg viewBox="0 0 34 34">' +
          '<circle class="track" cx="17" cy="17" r="13"/>' +
          '<circle class="fill" cx="17" cy="17" r="13" stroke="' + color + '" stroke-dasharray="' + CIRC.toFixed(2) + '" stroke-dashoffset="' + offset.toFixed(2) + '" stroke-linecap="round"/>' +
        '</svg>' +
        '<span class="rm-node-check">&check;</span>' +
      '</span>' +
      (subs ? '<span class="rm-tip">' + subs + '</span>' : '') +
    '</a>';
  }

  /* ── Build a domain group box ───────────────────────────── */
  function buildDomain(domain, prof, mastered){
    var color = COLORS[parseInt(domain.id)] || '#888';
    var totalP = 0;
    var count = 0;
    var masteredCount = 0;
    domain.topics.forEach(function(t){
      var p = prof[t.id] || 0;
      totalP += p;
      count++;
      if(mastered[t.id] || p >= 0.7) masteredCount++;
    });
    var avgP = count ? totalP / count : 0;
    var pct = Math.round(avgP * 100);

    var html = '<div class="rm-domain" style="border-color:' + color + '22">' +
      '<div class="rm-domain-head" style="background:' + color + '08">' +
        '<span class="rm-domain-label" style="color:' + color + '">Domain ' + domain.id + ' &mdash; ' + esc(domain.name) + ' <span style="font-weight:400;opacity:.6">(' + domain.weight + '%)</span></span>' +
        '<span class="rm-domain-progress" style="color:' + color + '">' + masteredCount + '/' + count + '</span>' +
      '</div>' +
      '<div class="rm-domain-bar"><div class="rm-domain-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '<div class="rm-topics">';

    domain.topics.forEach(function(t){
      html += buildNode(t, prof, mastered, color);
    });

    html += '</div></div>';
    return html;
  }

  /* ── Main render ────────────────────────────────────────── */
  function render(){
    store.initProficiency(window.topicsData);
    var prof = store.getAllProficiency();
    var mastered = JSON.parse(localStorage.getItem('ccna_core_mastered') || '{}');
    var domains = window.topicsData.domains;

    /* Auto-master at 70%+ */
    var changed = false;
    domains.forEach(function(d){d.topics.forEach(function(t){
      if((prof[t.id]||0) >= 0.7 && !mastered[t.id]){mastered[t.id]=true;changed=true;}
    })});
    if(changed) localStorage.setItem('ccna_core_mastered', JSON.stringify(mastered));

    /* Overall stats */
    var totalP = 0, totalT = 0, totalM = 0;
    domains.forEach(function(d){d.topics.forEach(function(t){
      totalT++; totalP += (prof[t.id]||0);
      if(mastered[t.id] || (prof[t.id]||0) >= 0.7) totalM++;
    })});
    var overallPct = totalT ? totalP / totalT : 0;

    document.getElementById('rmStats').innerHTML =
      '<span>Mastered: <strong>' + totalM + '/' + totalT + '</strong></span>' +
      '<span>Overall: <strong>' + Math.round(overallPct*100) + '%</strong></span>';

    /* Overall ring */
    var bigOffset = CIRC_BIG - (CIRC_BIG * overallPct);
    var ringFill = document.querySelector('.rm-overall .fill');
    ringFill.style.strokeDashoffset = bigOffset.toFixed(2);
    ringFill.style.stroke = profColor(overallPct);
    document.getElementById('overallPct').textContent = Math.round(overallPct*100) + '%';

    /* ── Build the flow layout ────────────────────────────── */
    /*
     *     [Domain 1 — Network Fundamentals]        (full width, foundation)
     *                    |
     *           /                 \
     * [Domain 2 — Access]    [Domain 3 — IP Conn]  (two columns)
     *           \                 /
     *            \               /
     *  [Domain 4 — Services]   [Domain 5 — Security] (two columns)
     *              \           /
     *      [Domain 6 — Automation]                  (full width, capstone)
     */

    var d = {};
    domains.forEach(function(dom){ d[dom.id] = dom; });

    var flow = document.getElementById('rmFlow');
    var html = '';

    /* Row 1: Domain 1 (full width) */
    html += buildDomain(d['1'], prof, mastered);

    /* Fork connector */
    html += '<div class="rm-connector-fork"><div class="rm-fork-legs"><div class="rm-fork-leg"></div><div class="rm-fork-leg"></div></div></div>';

    /* Row 2: Domain 2 + Domain 3 */
    html += '<div class="rm-row-2">';
    html += buildDomain(d['2'], prof, mastered);
    html += buildDomain(d['3'], prof, mastered);
    html += '</div>';

    /* Merge + Fork */
    html += '<div class="rm-connector-merge"><div class="rm-merge-legs"><div class="rm-merge-leg"></div><div class="rm-merge-leg"></div></div></div>';
    html += '<div class="rm-connector-fork"><div class="rm-fork-legs"><div class="rm-fork-leg"></div><div class="rm-fork-leg"></div></div></div>';

    /* Row 3: Domain 4 + Domain 5 */
    html += '<div class="rm-row-2">';
    html += buildDomain(d['4'], prof, mastered);
    html += buildDomain(d['5'], prof, mastered);
    html += '</div>';

    /* Merge connector */
    html += '<div class="rm-connector-merge"><div class="rm-merge-legs"><div class="rm-merge-leg"></div><div class="rm-merge-leg"></div></div></div>';

    /* Row 4: Domain 6 (full width) */
    html += buildDomain(d['6'], prof, mastered);

    flow.innerHTML = html;

    /* CTA */
    var weakest = null, weakestP = 1;
    domains.forEach(function(dom){dom.topics.forEach(function(t){
      var p = prof[t.id] || 0;
      if(p < weakestP){weakestP = p; weakest = t;}
    })});

    if(weakest){
      document.getElementById('rmCta').innerHTML =
        '<a href="quiz.html?learn=' + weakest.id + '">Study Weakest Topic: ' + esc(weakest.id) + ' &mdash; ' + esc(weakest.name) + '</a>' +
        '<p>Currently at ' + Math.round(weakestP*100) + '% &mdash; get it to 70% to master it</p>';
    }

    /* Staggered entrance animation */
    requestAnimationFrame(function(){
      var nodes = document.querySelectorAll('.rm-node');
      nodes.forEach(function(n, i){
        n.style.opacity = '0';
        n.style.transform = 'translateX(-8px)';
        n.style.transition = 'none';
        setTimeout(function(){
          n.style.transition = 'opacity .35s var(--ease-out), transform .35s var(--ease-out)';
          n.style.opacity = '';
          n.style.transform = '';
        }, 30 + i * 15);
      });
    });
  }

  render();
})();
</script>
</body>
</html>
