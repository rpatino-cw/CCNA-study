<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Journey of a Packet — CCNA 200-301</title>
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F0EDE7!important;color:#1C1917;font-family:'Space Grotesk',system-ui,sans-serif;overflow:hidden}
.container,.container-wide{max-width:none;padding:0}
canvas{display:block}

/* ── Back Link ────────────────────────────────────── */
.back{position:fixed;top:16px;left:16px;z-index:30}
.back a{color:#78716C;text-decoration:none;font-size:.72rem;letter-spacing:.03em;text-transform:uppercase;transition:color .2s}
.back a:hover{color:#1C1917}

/* ── Step Indicator (top-left) ────────────────────── */
.step-indicator{position:fixed;top:44px;left:16px;z-index:20;display:flex;align-items:center;gap:10px;opacity:0;transition:opacity .5s}
.step-indicator.visible{opacity:1}
.step-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:#78716C;letter-spacing:.04em}
.step-dots{display:flex;gap:5px}
.step-dot{width:8px;height:8px;border-radius:50%;background:#D6D3D1;border:1px solid #C7C3BC;transition:all .4s}
.step-dot.active{background:#B45309;border-color:#B45309;box-shadow:0 0 8px rgba(180,83,9,.5)}
.step-dot.done{background:#00ff88;border-color:#00ff88;box-shadow:0 0 6px rgba(0,255,136,.3)}

/* ── Speed Control (bottom-left) ──────────────────── */
.speed-ctrl{position:fixed;bottom:20px;left:16px;z-index:310;display:flex;gap:4px;opacity:0;transition:opacity .5s}
.beta-badge,.beta-badge *,#guidePill,.gc-bar,.gc-chat-panel{display:none!important}
.speed-ctrl.visible{opacity:1}
.speed-btn{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.1);color:#78716C;padding:4px 10px;border-radius:6px;font-size:.68rem;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s}
.speed-btn:hover{color:#1C1917;background:rgba(0,0,0,.08)}
.speed-btn.active{background:rgba(180,83,9,.12);border-color:#B45309;color:#B45309}

/* ── Free Look Toggle (top-right) ─────────────────── */
.controls-panel{position:fixed;top:16px;right:16px;z-index:20;display:flex;gap:8px;opacity:0;transition:opacity .5s}
.controls-panel.visible{opacity:1}
.ctrl-btn{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.1);color:#78716C;padding:6px 14px;border-radius:6px;font-size:.72rem;font-family:inherit;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.ctrl-btn:hover{color:#1C1917;background:rgba(0,0,0,.08)}
.ctrl-btn.active{background:rgba(180,83,9,.12);border-color:#B45309;color:#B45309}

/* ── Narration Box (bottom center) ────────────────── */
.narration{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:20;width:92%;max-width:620px;backdrop-filter:blur(12px);background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:18px 24px;opacity:0;transition:opacity .5s,transform .5s;pointer-events:none;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.narration.visible{opacity:1;pointer-events:auto}
.narration-step{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:#B45309;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.narration-title{font-size:1rem;font-weight:700;color:#1C1917;margin-bottom:6px}
.narration-text{font-size:.82rem;color:#57534E;line-height:1.65}
.narration-text .hl{color:#B45309;font-family:'JetBrains Mono',monospace;font-weight:600}
.narration-text .hl-amber{color:#92400E;font-family:'JetBrains Mono',monospace;font-weight:600}
.narration-text .hl-green{color:#15803D;font-family:'JetBrains Mono',monospace;font-weight:600}
.narration-actions{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.narr-skip{background:none;border:none;color:#78716C;font-size:.7rem;cursor:pointer;text-decoration:underline;font-family:inherit;padding:4px 0}
.narr-skip:hover{color:#1C1917}
.narr-next{background:#B45309;color:#fff;border:none;padding:7px 22px;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.02em}
.narr-next:hover{background:#92400E;box-shadow:0 0 16px rgba(180,83,9,.4)}

/* ── Overlay Table (MAC / Routing) ────────────────── */
.overlay-table{position:fixed;top:50%;right:24px;transform:translateY(-50%);z-index:20;backdrop-filter:blur(12px);background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.1);border-radius:10px;padding:14px 18px;opacity:0;transition:opacity .5s;pointer-events:none;min-width:240px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.overlay-table.visible{opacity:1}
.overlay-table h3{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:#B45309;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.overlay-table table{width:100%;border-collapse:collapse}
.overlay-table th{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#78716C;text-align:left;padding:3px 8px 3px 0;border-bottom:1px solid rgba(0,0,0,.08);text-transform:uppercase;letter-spacing:.05em}
.overlay-table td{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#1C1917;padding:4px 8px 4px 0}
.overlay-table tr.highlight td{color:#B45309}

/* ── Start Screen ─────────────────────────────────── */
.start-screen{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(240,237,231,.92);transition:opacity .8s}
.start-screen.hidden{opacity:0;pointer-events:none}
.start-title{font-size:2.2rem;font-weight:700;color:#1C1917;letter-spacing:-.03em;margin-bottom:6px;text-align:center}
.start-sub{font-size:.88rem;color:#57534E;margin-bottom:32px;text-align:center;max-width:440px;line-height:1.6}
.start-btn{background:#B45309;color:#fff;border:none;padding:14px 40px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em;transition:all .3s;box-shadow:0 4px 24px rgba(180,83,9,.3)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(180,83,9,.5)}
.start-topo{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#6b7394;margin-top:24px;letter-spacing:.06em}

/* ── End Buttons ──────────────────────────────────── */
.end-btns{display:flex;gap:10px}
.end-btn{padding:7px 22px;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;border:none;letter-spacing:.02em}
.end-btn.replay{background:#B45309;color:#fff}
.end-btn.replay:hover{background:#92400E;box-shadow:0 0 16px rgba(180,83,9,.4)}
.end-btn.explore{background:rgba(0,0,0,.04);color:#57534E;border:1px solid rgba(0,0,0,.12)}
.end-btn.explore:hover{background:rgba(0,0,0,.08)}

/* ── CSS2D Label Styles ───────────────────────────── */
.device-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:#57534E;text-transform:uppercase;letter-spacing:.06em;pointer-events:none;text-align:center;white-space:nowrap;text-shadow:0 0 6px rgba(255,255,255,.8)}

/* ── TLDR line ────────────────────────────────── */
.narration-tldr{font-size:.75rem;color:#78716C;line-height:1.5;margin-top:10px;padding:8px 12px;background:rgba(180,83,9,.05);border-radius:6px;border-left:2px solid #B45309;font-style:italic}
.narration-tldr::before{content:'TLDR: ';font-style:normal;font-weight:700;color:#B45309;font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.04em}

/* ── Terminal Panel ──────────────────────────── */
.terminal-panel{position:fixed;top:80px;left:24px;z-index:30;width:420px;backdrop-filter:blur(16px);background:rgba(20,20,30,.95);border:1px solid rgba(180,83,9,.3);border-radius:10px;opacity:0;transition:opacity .4s;pointer-events:none;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.terminal-panel.visible{opacity:1;pointer-events:auto}
.terminal-header{background:rgba(180,83,9,.1);padding:8px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(180,83,9,.2)}
.terminal-dots{display:flex;gap:4px}
.terminal-dot{width:8px;height:8px;border-radius:50%}
.terminal-title{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:#B45309;margin-left:8px;font-weight:600}
.terminal-body{padding:16px;font-family:'JetBrains Mono',monospace;font-size:.78rem;line-height:1.7;color:#c8d0e8;white-space:pre;overflow-x:auto;max-height:400px}
.terminal-body .prompt{color:#00ff88;font-weight:600}
.terminal-body .highlight{color:#FDE68A;font-weight:600}
.terminal-body .comment{color:#6b7394}

@media(max-width:600px){
  .narration{bottom:0;width:100%;max-width:100%;border-radius:12px 12px 0 0}
  .start-title{font-size:1.6rem}
  .overlay-table{right:8px;left:8px;transform:translateY(-50%);min-width:auto}
  .terminal-panel{left:8px;right:8px;width:auto;top:auto;bottom:200px;transform:none}
}
</style>
</head>

<div class="back"><a href="core.html">&larr; Back to Dashboard</a></div>

  <div class="start-sub">PC1 (10.0.1.10) sends a packet to Server1 (10.0.2.100) across two switches and a router. ARP, MAC tables, routing table lookups, TTL, frame re-encapsulation — every hop visualized.</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ══════════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════════
const CYAN    = 0x00d4ff;
const AMBER   = 0xff9500;
const GREEN   = 0x00ff88;
const DARK_BG = 0xe8e4de;

const DEVICE_POSITIONS = {
  PC1:     new THREE.Vector3(-8, 0.15, 0),
  SW1:     new THREE.Vector3(-4, 0.075, 0),
  R1:      new THREE.Vector3( 0, 0.2,  0),
  SW2:     new THREE.Vector3( 4, 0.075, 0),
  SERVER1: new THREE.Vector3( 8, 0.4,  0),
};

// ══════════════════════════════════════════════════════════════
// SCENE SETUP
// ══════════════════════════════════════════════════════════════
const scene    = new THREE.Scene();
scene.background = new THREE.Color(DARK_BG);
scene.fog = new THREE.FogExp2(DARK_BG, 0.004);

const camera   = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 8, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
document.body.appendChild(renderer.domElement);

// CSS2D for labels
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enabled = false;

// Post-processing
const composer  = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight), 0.4, 0.4, 0.5
);
composer.addPass(bloomPass);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  labelRenderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ══════════════════════════════════════════════════════════════
// LIGHTING
// ══════════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xccbbaa, 2.5));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
keyLight.position.set(5, 12, 8);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xddc8a0, 0.8);
fillLight.position.set(-5, 6, -4);
scene.add(fillLight);

// ══════════════════════════════════════════════════════════════
// FLOOR GRID
// ══════════════════════════════════════════════════════════════
const floorGeo = new THREE.PlaneGeometry(60, 30);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0xddd8d0, roughness: 0.95, metalness: 0
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
scene.add(floor);

// Grid lines
const gridHelper = new THREE.GridHelper(60, 30, 0xc7c3bc, 0xd4d0c8);
gridHelper.position.y = 0.0;
scene.add(gridHelper);

// ══════════════════════════════════════════════════════════════
// DEVICE BUILDERS
// ══════════════════════════════════════════════════════════════
const devices = {};
const deviceGlows = {};

function makeEdgeGlow(geometry, color, parent) {
  const edges = new THREE.EdgesGeometry(geometry);
  const line = new THREE.LineSegments(
    edges,
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6 })
  );
  parent.add(line);
  return line;
}

function addLabel(text, parent, yOffset) {
  const div = document.createElement('div');
  div.className = 'device-label';
  div.textContent = text;
  const label = new CSS2DObject(div);
  label.position.set(0, yOffset, 0);
  parent.add(label);
}

function createPC(name, pos) {
  const group = new THREE.Group();
  const geo = new THREE.BoxGeometry(1.0, 0.6, 1.0);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x3a3d5e, roughness: 0.5, metalness: 0.3, emissive: CYAN, emissiveIntensity: 0.15
  });
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);
  const glow = makeEdgeGlow(geo, CYAN, group);
  group.position.copy(pos);
  addLabel(name, group, 0.35);
  scene.add(group);
  devices[name] = group;
  deviceGlows[name] = { edges: glow, mesh, originalColor: 0x2a2d3e };
  return group;
}

function createSwitch(name, pos) {
  const group = new THREE.Group();
  const geo = new THREE.BoxGeometry(2.0, 0.3, 1.2);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x1a2744, roughness: 0.5, metalness: 0.4, emissive: 0x2563EB, emissiveIntensity: 0.1
  });
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);
  const glow = makeEdgeGlow(geo, 0x2563EB, group);
  // Port indicators
  const portGeo = new THREE.SphereGeometry(0.04, 8, 8);
  for (let i = 0; i < 6; i++) {
    const portMat = new THREE.MeshStandardMaterial({
      color: 0x22C55E, emissive: 0x22C55E, emissiveIntensity: 0.8
    });
    const port = new THREE.Mesh(portGeo, portMat);
    port.position.set(-0.35 + i * 0.14, 0, 0.31);
    group.add(port);
  }
  group.position.copy(pos);
  addLabel(name, group, 0.25);
  scene.add(group);
  devices[name] = group;
  deviceGlows[name] = { edges: glow, mesh, originalColor: 0x1a2744 };
  return group;
}

function createRouter(name, pos) {
  const group = new THREE.Group();
  const geo = new THREE.CylinderGeometry(0.6, 0.6, 0.8, 24);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x3a2520, roughness: 0.5, metalness: 0.4, emissive: AMBER, emissiveIntensity: 0.15
  });
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);
  // Amber ring glow
  const ringGeo = new THREE.TorusGeometry(0.65, 0.03, 8, 32);
  const ringMat = new THREE.MeshStandardMaterial({
    color: AMBER, emissive: AMBER, emissiveIntensity: 1.5
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 0.0;
  group.add(ring);
  group.position.copy(pos);
  addLabel(name, group, 0.8);
  scene.add(group);
  devices[name] = group;
  deviceGlows[name] = { ring, mesh, originalColor: 0x2a2020 };
  return group;
}

function createServer(name, pos) {
  const group = new THREE.Group();
  const geo = new THREE.BoxGeometry(1.0, 1.6, 1.0);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x3a3d5e, roughness: 0.5, metalness: 0.3, emissive: GREEN, emissiveIntensity: 0.1
  });
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);
  const glow = makeEdgeGlow(geo, GREEN, group);
  // Status LED
  const ledGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const ledMat = new THREE.MeshStandardMaterial({
    color: GREEN, emissive: GREEN, emissiveIntensity: 1.5
  });
  const led = new THREE.Mesh(ledGeo, ledMat);
  led.position.set(0, 0.6, 0.52);
  group.add(led);
  group.position.copy(pos);
  addLabel(name, group, 1.1);
  scene.add(group);
  devices[name] = group;
  deviceGlows[name] = { edges: glow, mesh, led, originalColor: 0x2a2d3e };
  return group;
}

// Build all devices
createPC('PC1', DEVICE_POSITIONS.PC1);
createSwitch('SW1', DEVICE_POSITIONS.SW1);
createRouter('R1', DEVICE_POSITIONS.R1);
createSwitch('SW2', DEVICE_POSITIONS.SW2);
createServer('Server1', DEVICE_POSITIONS.SERVER1);

// ══════════════════════════════════════════════════════════════
// CABLES (CatmullRomCurve3 tubes)
// ══════════════════════════════════════════════════════════════
const cables = {};
const cableMeshes = {};

function createCable(nameA, nameB) {
  const a = DEVICE_POSITIONS[nameA] || devices[nameA]?.position;
  const b = DEVICE_POSITIONS[nameB] || devices[nameB]?.position;
  if (!a || !b) return;
  const mid = new THREE.Vector3().lerpVectors(a, b, 0.5);
  mid.y += 0.15;
  const curve = new THREE.CatmullRomCurve3([
    a.clone(), mid, b.clone()
  ]);
  const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.04, 8, false);
  const tubeMat = new THREE.MeshStandardMaterial({
    color: 0x78716C, roughness: 0.5, metalness: 0.2,
    emissive: 0x57534E, emissiveIntensity: 0.1
  });
  const mesh = new THREE.Mesh(tubeGeo, tubeMat);
  scene.add(mesh);
  const key = nameA + '-' + nameB;
  cables[key] = curve;
  cableMeshes[key] = mesh;
  return { curve, mesh };
}

createCable('PC1', 'SW1');
createCable('SW1', 'R1');
createCable('R1', 'SW2');
createCable('SW2', 'Server1');

// ══════════════════════════════════════════════════════════════
// PACKET (glowing sphere + point light + trail)
// ══════════════════════════════════════════════════════════════
const packetGroup = new THREE.Group();
const packetGeo = new THREE.SphereGeometry(0.08, 16, 16);
const packetMat = new THREE.MeshStandardMaterial({
  color: CYAN, emissive: CYAN, emissiveIntensity: 2.0
});
const packetMesh = new THREE.Mesh(packetGeo, packetMat);
packetGroup.add(packetMesh);

const packetLight = new THREE.PointLight(CYAN, 2, 3);
packetGroup.add(packetLight);

packetGroup.visible = false;
scene.add(packetGroup);

// Trail particles
const TRAIL_COUNT = 20;
const trailPositions = [];
const trailMeshes = [];
for (let i = 0; i < TRAIL_COUNT; i++) {
  const s = 0.04 * (1 - i / TRAIL_COUNT);
  const geo = new THREE.SphereGeometry(s, 6, 6);
  const mat = new THREE.MeshStandardMaterial({
    color: CYAN, emissive: CYAN, emissiveIntensity: 1.5,
    transparent: true, opacity: 1 - i / TRAIL_COUNT
  });
  const m = new THREE.Mesh(geo, mat);
  m.visible = false;
  scene.add(m);
  trailMeshes.push(m);
  trailPositions.push(new THREE.Vector3(0, -10, 0));
}

function setPacketColor(color) {
  packetMat.color.setHex(color);
  packetMat.emissive.setHex(color);
  packetLight.color.setHex(color);
  trailMeshes.forEach(m => {
    m.material.color.setHex(color);
    m.material.emissive.setHex(color);
  });
}

function updateTrail(pos) {
  for (let i = TRAIL_COUNT - 1; i > 0; i--) {
    trailPositions[i].copy(trailPositions[i - 1]);
  }
  trailPositions[0].copy(pos);
  trailMeshes.forEach((m, i) => {
    m.position.copy(trailPositions[i]);
    m.visible = packetGroup.visible;
  });
}

function showPacket(show) {
  packetGroup.visible = show;
  trailMeshes.forEach(m => m.visible = show);
  if (!show) trailPositions.forEach(p => p.set(0, -10, 0));
}

function highlightDevice(name, color, intensity = 1.5) {
  const info = deviceGlows[name];
  if (!info) return;
  if (info.edges) {
    info.edges.material.color.setHex(color);
    info.edges.material.opacity = 1.0;
  }
  if (info.ring) {
    info.ring.material.emissive.setHex(color);
    info.ring.material.emissiveIntensity = intensity;
  }
  info.mesh.material.emissive = new THREE.Color(color);
  info.mesh.material.emissiveIntensity = 0.3;
}

function resetDevice(name) {
  const info = deviceGlows[name];
  if (!info) return;
  if (info.edges) {
    info.edges.material.opacity = 0.6;
    if (name === 'PC1') info.edges.material.color.setHex(CYAN);
    else if (name === 'Server1') info.edges.material.color.setHex(GREEN);
    else info.edges.material.color.setHex(0x2563EB);
  }
  if (info.ring) {
    info.ring.material.emissive.setHex(AMBER);
    info.ring.material.emissiveIntensity = 1.0;
  }
  info.mesh.material.emissive = new THREE.Color(0x000000);
  info.mesh.material.emissiveIntensity = 0;
}

function resetAllDevices() {
  Object.keys(devices).forEach(resetDevice);
}

function glowCable(key, color) {
  const m = cableMeshes[key];
  if (!m) return;
  m.material.emissive.setHex(color);
  m.material.emissiveIntensity = 0.8;
}

function resetCable(key) {
  const m = cableMeshes[key];
  if (!m) return;
  m.material.emissive.setHex(0x000000);
  m.material.emissiveIntensity = 0;
}

function resetAllCables() {
  Object.keys(cableMeshes).forEach(resetCable);
}

// PARTICLE BURST (for delivery)
// ══════════════════════════════════════════════════════════════
const burstParticles = [];
const BURST_COUNT = 30;
for (let i = 0; i < BURST_COUNT; i++) {
  const geo = new THREE.SphereGeometry(0.03, 6, 6);
  const mat = new THREE.MeshStandardMaterial({
    color: GREEN, emissive: GREEN, emissiveIntensity: 2,
    transparent: true, opacity: 1
  });
  const m = new THREE.Mesh(geo, mat);
  m.visible = false;
  scene.add(m);
  burstParticles.push({
    mesh: m, vel: new THREE.Vector3(), life: 0, active: false
  });
}

function triggerBurst(pos, color = GREEN) {
  burstParticles.forEach(p => {
    p.mesh.position.copy(pos);
    p.vel.set(
      (Math.random() - 0.5) * 4,
      Math.random() * 3 + 1,
      (Math.random() - 0.5) * 4
    );
    p.life = 1.0;
    p.active = true;
    p.mesh.visible = true;
    p.mesh.material.color.setHex(color);
    p.mesh.material.emissive.setHex(color);
  });
}

function updateBurst(dt) {
  burstParticles.forEach(p => {
    if (!p.active) return;
    p.life -= dt * 1.2;
    if (p.life <= 0) { p.active = false; p.mesh.visible = false; return; }
    p.vel.y -= 5 * dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mesh.material.opacity = p.life;
    const s = p.life * 0.8;
    p.mesh.scale.setScalar(s);
  });
}

function showNarration(step, title, text, showNext = true, endBtns = false, tldr = '') {
  narrStep.textContent = 'Step ' + step + ' of 7';
  narrTitle.textContent = title;
  narrText.innerHTML = text + (tldr ? '<div class="narration-tldr">' + tldr + '</div>' : '');
  narrationEl.classList.add('visible');
  stepLabel.textContent = 'Step ' + step + ' of 7';
  const dots = stepDots.querySelectorAll('.step-dot');
  dots.forEach((d, i) => {
    d.classList.remove('active', 'done');
    if (i < step - 1) d.classList.add('done');
    if (i === step - 1) d.classList.add('active');
  });

  if (endBtns) {
    narrActions.innerHTML = `
      <button class="narr-skip" id="narrSkip">Back to Dashboard</button>
      <div class="end-btns">
        <button class="end-btn explore" id="endExplore">Explore</button>
        <button class="end-btn replay" id="endReplay">Replay</button>
      </div>`;
    document.getElementById('endReplay').addEventListener('click', () => { startTour(); });
    document.getElementById('endExplore').addEventListener('click', () => {
      hideNarration();

      btnFreeLook.classList.add('active');
      setCameraTarget(new THREE.Vector3(0, 8, 18), new THREE.Vector3(0, 0, 0));

    document.getElementById('narrSkip').addEventListener('click', () => {

// ANIMATION HELPERS
// ══════════════════════════════════════════════════════════════
let activeAnimations = [];

function animatePacketAlongCable(cableKey, duration, color = CYAN) {
  return new Promise(resolve => {
    const curve = cables[cableKey];
    if (!curve) { resolve(); return; }
    setPacketColor(color);
    showPacket(true);
    glowCable(cableKey, color);
    const anim = {
      type: 'cable', curve, t: 0,
      duration, cableKey, resolve, done: false
    };
    activeAnimations.push(anim);
  });
}

function animatePacketToPoint(from, to, duration, color = CYAN) {
  return new Promise(resolve => {
    const curve = new THREE.CatmullRomCurve3([
      from.clone(),
      new THREE.Vector3().lerpVectors(from, to, 0.5).add(new THREE.Vector3(0, 0.1, 0)),
      to.clone()
    ]);
    setPacketColor(color);
    showPacket(true);
    const anim = {
      type: 'cable', curve, t: 0,
      duration, cableKey: null, resolve, done: false
    };
    activeAnimations.push(anim);
  });
}

function wait(ms) {
  return new Promise(r => setTimeout(r, ms / speedMultiplier));
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

        ], 0);
      highlightDevice('SW2', CYAN);
      showTerminal('SW2 — Console', '<span class="prompt">SW2#</span> show mac address-table\n          Mac Address Table\n-------------------------------------------\nVlan    Mac Address       Type        Ports\n----    -----------       --------    -----\n   1    <span class="highlight">0050.7966.6801</span>    DYNAMIC     <span class="highlight">Fa0/1</span>\n   1    dd44.ee55.ff66    DYNAMIC     Fa0/24\n<span class="comment">! Destination MAC matches Fa0/1 → forward to Server1</span>');
      // Quick pass — already arrived at SW2 from step 4
      highlightDevice('SW2', AMBER);
      await wait(500);
      highlightDevice('SW2', CYAN);
      await wait(300);
      await animatePacketAlongCable('SW2-Server1', 1000, CYAN);
      showPacket(false);
      resetDevice('SW2');
      hideOverlay();
    }
  },
  // Step 6: Server receives
  {
    camera: { pos: new THREE.Vector3(8.5, 3, 4), look: DEVICE_POSITIONS.SERVER1 },
    title: 'Arrival — Server Processes the Packet',
    text: 'Server1 receives the frame, strips Layer 2, processes the Layer 3 packet. The data reaches the application. The server prepares a response — and the <span class="hl-green">journey reverses</span>.',
    tldr: 'Package delivered! Server1 opens it up, reads the data, and starts preparing a response to send back the same way.',
    run: async () => {
      highlightDevice('Server1', GREEN, 2);
      setPacketColor(GREEN);
      showPacket(true);
      packetGroup.position.copy(DEVICE_POSITIONS.SERVER1);
      await wait(500);
      showPacket(false);
      // Burst
      triggerBurst(DEVICE_POSITIONS.SERVER1.clone().add(new THREE.Vector3(0, 0.4, 0)), GREEN);
      await wait(1500);
    }
  },
  // Step 7: Complete picture
  {
    camera: { pos: new THREE.Vector3(0, 10, 20), look: new THREE.Vector3(0, 0, 0) },
    title: 'Full Path — End to End',
    text: 'L2 forwarding at each switch, L3 routing decision at R1, new source MAC at every hop, TTL decremented once. The return path is identical in reverse — Server1 already has PC1\'s info cached from the original ARP exchange.',
    tldr: 'The whole trip: two switches forwarded at Layer 2, the router made the big decision at Layer 3, and the packet arrived with one less life (TTL). The return trip works the same way, just backwards.',
    run: async () => {
      // Light up full path simultaneously
      Object.keys(cableMeshes).forEach(k => glowCable(k, CYAN));
      highlightDevice('PC1', CYAN);
      highlightDevice('SW1', CYAN);
      highlightDevice('R1', AMBER, 2);
      highlightDevice('SW2', CYAN);
      highlightDevice('Server1', GREEN, 2);

      // Trail animation across entire path
      setPacketColor(CYAN);
      showPacket(true);
      const segments = ['PC1-SW1', 'SW1-R1', 'R1-SW2', 'SW2-Server1'];
      for (const seg of segments) {
        await animatePacketAlongCable(seg, 800, CYAN);
      }
      setPacketColor(GREEN);
      triggerBurst(DEVICE_POSITIONS.SERVER1.clone().add(new THREE.Vector3(0, 0.4, 0)), GREEN);
      showPacket(false);
      await wait(800);
    }
  },
];

async function runStep(idx) {
  const step = STEPS[idx];
  if (!step) return;
  currentStep = idx;

  // Reset state
  resetAllDevices();
  resetAllCables();
  hideOverlay();
  // Only hide terminal if this step doesn't have one (steps 3,4,5 have terminals)
  if (![2,3,4].includes(idx)) hideTerminal();
  showPacket(false);
  frameShell.visible = false;
  newFrameShell.visible = false;

  // Camera — smooth glide to new position and look target
  if (!freeLookOn) {
    setCameraTarget(step.camera.pos, step.camera.look, idx === 0 ? 0.04 : 0.07);
  }

  // Show narration (Next disabled during animation)
  const isLast = idx === STEPS.length - 1;
  showNarration(idx + 1, step.title, step.text, false, false, step.tldr || '');

  // Wait for camera to glide into position
  await wait(1200);

  // Run animation
  await step.run();

  // Enable Next or show end buttons
  if (isLast) {
    showNarration(idx + 1, step.title, step.text, false, true, step.tldr || '');
  } else {
    enableNextButton();
  }
}

function advanceStep() {
  if (currentStep < STEPS.length - 1) {
    runStep(currentStep + 1);
  }
}

function startTour() {
  tourActive = true;
  currentStep = 0;
  freeLookOn = false;
  controls.enabled = false;
  btnFreeLook.classList.remove('active');
  // Animate camera from wide establishing shot to PC1 (step 1)
  startScreen.classList.add('hidden');
  stepIndicator.classList.add('visible');
  speedCtrl.classList.add('visible');
  controlsPanel.classList.add('visible');
  resetAllDevices();
  resetAllCables();
  showPacket(false);
  hideOverlay();
  runStep(0);
}

function endTour() {
  tourActive = false;
  hideNarration();
  hideOverlay();
  hideTerminal();
  showPacket(false);
  resetAllDevices();
  resetAllCables();
  freeLookOn = true;
  controls.enabled = true;
  btnFreeLook.classList.add('active');
  setCameraTarget(new THREE.Vector3(0, 8, 18), new THREE.Vector3(0, 0, 0));
}

startBtn.addEventListener('click', startTour);

// ══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ══════════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const rawDt = clock.getDelta();
  const dt = rawDt * speedMultiplier;

  // Process active animations
  activeAnimations = activeAnimations.filter(a => {
    if (a.done) return false;

    if (a.type === 'cable') {
      const speed = 1 / (a.duration / 1000);
      if (a.reverse) {
        a.t -= speed * dt;
        if (a.t <= 0) {
          a.t = 0; a.done = true;
          if (a.cableKey) resetCable(a.cableKey);
          if (a.resolve) a.resolve();
          return false;
        }
      } else {
        a.t += speed * dt;
        if (a.t >= 1) {
          a.t = 1; a.done = true;
          if (a.cableKey) resetCable(a.cableKey);
          if (a.resolve) a.resolve();
          return false;
        }
      }
      const eased = easeInOutCubic(a.t);
      const pos = a.curve.getPointAt(Math.max(0, Math.min(1, eased)));
      packetGroup.position.copy(pos);
      updateTrail(pos);
      return true;
    }

    if (a.type === 'frameStrip') {
      const speed = 1 / (a.duration / 1000);
      a.t += speed * dt;
      if (a.t >= 1) {
        a.done = true;
        if (a.resolve) a.resolve();
        return false;
      }
      frameShell.scale.setScalar(1 + a.t * 1.5);
      frameShellMat.opacity = 0.6 * (1 - a.t);
      return true;
    }

    if (a.type === 'frameWrap') {
      const speed = 1 / (a.duration / 1000);
      a.t += speed * dt;
      if (a.t >= 1) {
        a.done = true;
        if (a.resolve) a.resolve();
        return false;
      }
      newFrameShell.scale.setScalar(2 - a.t * 1.2);
      newFrameShellMat.opacity = a.t * 0.6;
      return true;
    }

    return true;
  });

  // Broadcast packets
  broadcastPackets.forEach(bp => {
    if (!bp.active) return;
    bp.t += dt * 2;
    if (bp.t >= 1) {
      bp.active = false;
      bp.mesh.visible = false;
      return;
    }
    const pos = new THREE.Vector3().lerpVectors(bp.from, bp.to, easeInOutCubic(bp.t));
    bp.mesh.position.copy(pos);
    bp.mesh.material.opacity = 1 - bp.t * 0.5;
  });

  // Burst particles
  updateBurst(dt);

  // Camera — smooth position + smooth lookAt target
  if (!freeLookOn) {
    camera.position.lerp(camTarget, camLerp);
    camLookAtCur.lerp(camLookAt, camLerp * 1.5);
    camera.lookAt(camLookAtCur);
    // Sync OrbitControls target so it doesn't fight the lerp
    controls.target.copy(camLookAtCur);
  }

  if (freeLookOn) controls.update();
  composer.render();
  labelRenderer.render(scene, camera);
}

animate();
</script>
