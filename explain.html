<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explain Like I'm Cisco — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  .page-header{padding:var(--s-xl) 0 var(--s-lg);margin-bottom:var(--s-lg);border-bottom:2px solid var(--ink)}
  .page-header h1{font-size:2.4rem;margin-bottom:4px}
  .page-header .subtitle{font-family:var(--font-body);color:var(--ink-secondary);font-size:.95rem;font-style:italic}

  .game-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;max-width:680px;margin:0 auto var(--s-lg)}

  /* Topic prompt */
  .topic-card{background:#1C1917;border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:var(--s-lg);text-align:center}
  .topic-label{font-family:var(--font-display);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#A8A29E;margin-bottom:6px}
  .topic-text{font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:#FAF7F2;line-height:1.4}
  .topic-domain{font-family:var(--font-mono);font-size:.68rem;color:#FDE68A;margin-top:8px}

  /* Timer */
  .timer-bar{height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden;margin-bottom:var(--s-md)}
  .timer-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .5s linear}
  .timer-fill.danger{background:#DC2626}
  .timer-text{font-family:var(--font-mono);font-size:.82rem;color:var(--ink-muted);text-align:right;margin-bottom:4px}

  /* Text area */
  .answer-area{width:100%;min-height:160px;padding:14px;border:2px solid var(--border);border-radius:var(--radius-lg);font-family:var(--font-body);font-size:.92rem;line-height:1.6;color:var(--ink);background:var(--bg-surface);resize:vertical;outline:none;transition:border-color .15s}
  .answer-area:focus{border-color:var(--accent)}
  .answer-area:disabled{opacity:.5;cursor:not-allowed}
  .word-count{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted);text-align:right;margin-top:4px}

  /* Submit */
  .submit-row{display:flex;justify-content:space-between;align-items:center;margin-top:var(--s-md)}
  .skip-btn{font-family:var(--font-display);font-size:.75rem;color:var(--ink-muted);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px}

  /* Score card */
  .score-card{display:none;text-align:center}
  .score-card.show{display:block}
  .score-grade{font-family:var(--font-display);font-size:3rem;font-weight:900;margin-bottom:4px}
  .score-grade.a{color:#16A34A}.score-grade.b{color:#2563EB}.score-grade.c{color:#D97706}.score-grade.d{color:#DC2626}.score-grade.f{color:#DC2626}
  .score-total{font-family:var(--font-mono);font-size:1.2rem;color:var(--ink-secondary);margin-bottom:var(--s-md)}
  .score-cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:var(--s-lg);text-align:left}
  .score-cat{padding:10px 14px;background:var(--bg-recessed);border-radius:var(--radius);border-left:3px solid var(--border)}
  .score-cat-name{font-family:var(--font-display);font-size:.72rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
  .score-cat-val{font-family:var(--font-mono);font-size:1.1rem;font-weight:800}
  .score-cat.good{border-left-color:#16A34A}.score-cat.ok{border-left-color:#D97706}.score-cat.bad{border-left-color:#DC2626}

  /* Feedback */
  .feedback-box{text-align:left;padding:16px;background:var(--bg-recessed);border-radius:var(--radius-lg);margin-bottom:var(--s-md)}
  .feedback-box h4{font-family:var(--font-display);font-size:.85rem;margin-bottom:8px}
  .feedback-text{font-family:var(--font-body);font-size:.85rem;color:var(--ink-secondary);line-height:1.6;white-space:pre-wrap}
  .feedback-text strong{color:var(--ink)}

  /* Stats bar */
  .stats-bar{display:flex;justify-content:center;gap:24px;margin-bottom:var(--s-lg);font-family:var(--font-mono);font-size:.78rem;color:var(--ink-muted)}
  .stats-bar strong{color:var(--ink)}

  /* Loading */
  .judging{text-align:center;padding:40px;font-family:var(--font-display);color:var(--ink-muted)}
  .judging .dots{display:inline-flex;gap:4px}
  .judging .dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:judgeBounce 1s infinite}
  .judging .dots span:nth-child(2){animation-delay:.15s}
  .judging .dots span:nth-child(3){animation-delay:.3s}
  @keyframes judgeBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

  @media(max-width:500px){.score-cats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container-wide">
  <nav class="top-nav" id="main-nav"></nav>

  <header class="page-header">
    <h1>Explain Like I'm Cisco</h1>
    <p class="subtitle">No multiple choice. No hints. Explain the concept in your own words. The AI judges you like a strict Cisco instructor.</p>
  </header>

  <div class="stats-bar" id="statsBar">
    <span>Round: <strong id="roundNum">1</strong>/10</span>
    <span>Score: <strong id="totalScore">0</strong>/200</span>
    <span>Avg: <strong id="avgGrade">—</strong></span>
  </div>

  <!-- Topic prompt -->
  <div class="topic-card" id="topicCard">
    <div class="topic-label">Explain this concept</div>
    <div class="topic-text" id="topicText"></div>
    <div class="topic-domain" id="topicDomain"></div>
  </div>

  <!-- Answer area -->
  <div class="game-card" id="answerCard">
    <div class="timer-text" id="timerText">60s</div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <textarea class="answer-area" id="answerInput" placeholder="Type your explanation here... Use proper Cisco terminology. Be specific." maxlength="1500"></textarea>
    <div class="word-count" id="wordCount">0 words</div>
    <div class="submit-row">
      <button class="skip-btn" onclick="skipTopic()">Skip this one</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">Submit for Judging</button>
    </div>
  </div>

  <!-- Judging -->
  <div class="game-card judging" id="judgingCard" style="display:none">
    <div>The Cisco instructor is reading your answer</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <!-- Score card -->
  <div class="game-card score-card" id="scoreCard">
    <div class="score-grade" id="scoreGrade"></div>
    <div class="score-total" id="scoreLine"></div>
    <div class="score-cats" id="scoreCats"></div>
    <div class="feedback-box">
      <h4>Instructor Feedback</h4>
      <div class="feedback-text" id="feedbackText"></div>
    </div>
    <button class="btn btn-primary" onclick="nextTopic()">Next Topic</button>
  </div>

  <!-- Final results -->
  <div class="game-card" id="finalCard" style="display:none;text-align:center">
    <div style="font-family:var(--font-display);font-size:1.3rem;font-weight:800;margin-bottom:8px" id="finalTitle"></div>
    <div style="font-family:var(--font-mono);font-size:2rem;font-weight:900;margin-bottom:4px" id="finalScore"></div>
    <div style="font-family:var(--font-display);font-size:.85rem;color:var(--ink-secondary);margin-bottom:var(--s-lg)" id="finalSub"></div>
    <div id="finalBreakdown" style="text-align:left;margin-bottom:var(--s-lg)"></div>
    <button class="btn btn-primary" onclick="startGame()">Play Again</button>
    <a href="index.html" class="btn btn-secondary" style="margin-left:8px">Back to Dashboard</a>
  </div>
</div>

<script src="js/nav.js"></script>
<script src="js/store.js"></script>
<script src="data/topics-data.js"></script>
<script>
var API='https://ccna-tutor.rpatino-cw.workers.dev';
var DOMAIN_NAMES={'1':'Net Fundamentals','2':'Net Access','3':'IP Connectivity','4':'IP Services','5':'Security','6':'Automation'};

var TOPICS=[
  {id:'1.1',q:'Explain the difference between a router, a switch, and a hub.',domain:'1'},
  {id:'1.5',q:'Explain the TCP 3-way handshake. What happens at each step and why?',domain:'1'},
  {id:'1.5b',q:'Compare TCP and UDP. When would you use each one?',domain:'1',topic:'1.5'},
  {id:'1.6',q:'Explain subnetting. What does a /26 subnet mask mean and how many hosts can it support?',domain:'1'},
  {id:'1.7',q:'What are RFC 1918 private IP addresses and why do they exist?',domain:'1'},
  {id:'1.8',q:'How does IPv6 addressing differ from IPv4? What is a link-local address?',domain:'1'},
  {id:'1.13',q:'Explain how a switch learns MAC addresses and makes forwarding decisions.',domain:'1'},
  {id:'2.1',q:'What is a VLAN and why would you use one? How does traffic cross between VLANs?',domain:'2'},
  {id:'2.2',q:'Explain 802.1Q trunking. What is a native VLAN and why does it matter?',domain:'2'},
  {id:'2.5',q:'How does Spanning Tree Protocol prevent Layer 2 loops? Explain the root bridge election.',domain:'2'},
  {id:'2.4',q:'What is EtherChannel and what problem does it solve? Compare LACP and PAgP.',domain:'2'},
  {id:'2.6',q:'Explain the difference between autonomous APs and lightweight APs with a WLC.',domain:'2'},
  {id:'3.1',q:'How does a router decide where to forward a packet? Explain longest prefix match.',domain:'3'},
  {id:'3.2',q:'What is administrative distance and how does it affect routing decisions?',domain:'3'},
  {id:'3.4',q:'Explain how OSPF works. What are areas, DR/BDR, and how does the SPF algorithm find the best path?',domain:'3'},
  {id:'3.4b',q:'How does OSPF elect a Designated Router? What happens if the DR fails?',domain:'3',topic:'3.4'},
  {id:'3.5',q:'What is HSRP and why is first-hop redundancy important?',domain:'3'},
  {id:'3.3',q:'Explain static routes vs dynamic routing. What is a floating static route?',domain:'3'},
  {id:'4.1',q:'Explain NAT and PAT. How does a router translate private IPs to public IPs?',domain:'4'},
  {id:'4.3',q:'Walk through the DHCP DORA process. What does each step do?',domain:'4'},
  {id:'4.3b',q:'What is a DHCP relay agent and when do you need one?',domain:'4',topic:'4.3'},
  {id:'4.5',q:'Explain syslog severity levels. What is level 0 vs level 7?',domain:'4'},
  {id:'4.7',q:'What is QoS? Explain classification, marking, and queuing.',domain:'4'},
  {id:'4.8',q:'Why should you use SSH instead of Telnet? What steps are needed to configure SSH?',domain:'4'},
  {id:'5.6',q:'Explain Access Control Lists. What is the difference between standard and extended ACLs?',domain:'5'},
  {id:'5.6b',q:'How does ACL processing work? What is the implicit deny?',domain:'5',topic:'5.6'},
  {id:'5.7',q:'Explain port security. What are the three violation modes?',domain:'5'},
  {id:'5.7b',q:'What is DHCP snooping and how does it prevent rogue DHCP servers?',domain:'5',topic:'5.7'},
  {id:'5.8',q:'Explain AAA. What is the difference between RADIUS and TACACS+?',domain:'5'},
  {id:'5.5',q:'What is an IPsec VPN? Explain the difference between site-to-site and remote access.',domain:'5'},
  {id:'6.3',q:'What is Software-Defined Networking? Explain the control plane vs data plane separation.',domain:'6'},
  {id:'6.5',q:'Explain REST APIs. What are the four HTTP methods and what does each do?',domain:'6'},
  {id:'6.6',q:'What is Ansible and how is it different from Puppet? Why is it popular for network automation?',domain:'6'},
];

var currentRound=0, totalRounds=10, totalPts=0, roundResults=[];
var currentTopic=null, timer=null, timeLeft=60;
var usedTopics=new Set();

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function pickTopic(){
  var avail=TOPICS.filter(function(t){return!usedTopics.has(t.id);});
  if(avail.length===0){usedTopics.clear();avail=TOPICS.slice();}
  var t=avail[Math.floor(Math.random()*avail.length)];
  usedTopics.add(t.id);
  return t;
}

function startGame(){
  currentRound=0;totalPts=0;roundResults=[];usedTopics.clear();
  document.getElementById('finalCard').style.display='none';
  nextTopic();
}

function nextTopic(){
  if(currentRound>=totalRounds){showFinalResults();return;}
  currentRound++;
  currentTopic=pickTopic();
  document.getElementById('roundNum').textContent=currentRound;
  document.getElementById('topicText').textContent=currentTopic.q;
  var tid=currentTopic.topic||currentTopic.id.replace(/[a-z]$/,'');
  document.getElementById('topicDomain').textContent='Topic '+tid+' · Domain '+currentTopic.domain+' — '+(DOMAIN_NAMES[currentTopic.domain]||'');
  document.getElementById('answerInput').value='';
  document.getElementById('answerInput').disabled=false;
  document.getElementById('wordCount').textContent='0 words';
  document.getElementById('submitBtn').disabled=false;
  document.getElementById('answerCard').style.display='';
  document.getElementById('scoreCard').classList.remove('show');
  document.getElementById('judgingCard').style.display='none';
  document.getElementById('topicCard').style.display='';
  timeLeft=60;startTimer();
  document.getElementById('answerInput').focus();
}

function startTimer(){
  clearInterval(timer);
  document.getElementById('timerFill').style.width='100%';
  document.getElementById('timerFill').classList.remove('danger');
  document.getElementById('timerText').textContent='60s';
  timer=setInterval(function(){
    timeLeft-=0.5;
    var pct=Math.max(0,(timeLeft/60)*100);
    document.getElementById('timerFill').style.width=pct+'%';
    document.getElementById('timerText').textContent=Math.ceil(timeLeft)+'s';
    if(timeLeft<=15)document.getElementById('timerFill').classList.add('danger');
    if(timeLeft<=0){clearInterval(timer);submitAnswer();}
  },500);
}

document.getElementById('answerInput').addEventListener('input',function(){
  var words=this.value.trim().split(/\s+/).filter(function(w){return w.length>0;});
  document.getElementById('wordCount').textContent=words.length+' words';
});

function skipTopic(){
  clearInterval(timer);
  roundResults.push({topic:currentTopic,score:0,grade:'F',skipped:true});
  nextTopic();
}

async function submitAnswer(){
  clearInterval(timer);
  var answer=document.getElementById('answerInput').value.trim();
  if(!answer||answer.length<10){skipTopic();return;}

  document.getElementById('answerInput').disabled=true;
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('answerCard').style.display='none';
  document.getElementById('judgingCard').style.display='';

  var tid=currentTopic.topic||currentTopic.id.replace(/[a-z]$/,'');
  var prompt='You are a strict Cisco CCNA instructor grading a student\'s explanation.\n\n'+
    'TOPIC: "'+currentTopic.q+'"\n\n'+
    'STUDENT\'S ANSWER:\n"'+answer+'"\n\n'+
    'Score this answer on exactly 4 categories (0-5 each):\n'+
    '1. ACCURACY — Are the facts correct? Any errors?\n'+
    '2. COMPLETENESS — Did they cover all key points?\n'+
    '3. CLARITY — Would a beginner understand this?\n'+
    '4. CISCO TERMINOLOGY — Did they use proper terms (not "the main router" instead of "DR")?\n\n'+
    'Respond in EXACTLY this JSON format, nothing else:\n'+
    '{"accuracy":N,"completeness":N,"clarity":N,"terminology":N,"feedback":"2-3 sentences: what they got right, what they missed, one specific thing to study."}';

  try{
    var res=await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:prompt,history:[]})
    });
    var data=await res.json();
    var reply=data.reply||'';

    // Extract JSON from reply
    var jsonMatch=reply.match(/\{[\s\S]*\}/);
    if(!jsonMatch)throw new Error('No JSON');
    var scores=JSON.parse(jsonMatch[0]);

    var total=scores.accuracy+scores.completeness+scores.clarity+scores.terminology;
    var grade=total>=18?'A':total>=14?'B':total>=10?'C':total>=6?'D':'F';
    totalPts+=total;

    // Update proficiency
    if(window.store){store.updateProficiency(tid,total>=10);}

    roundResults.push({topic:currentTopic,score:total,grade:grade,scores:scores});

    // Show score card
    document.getElementById('judgingCard').style.display='none';
    document.getElementById('scoreCard').classList.add('show');
    document.getElementById('scoreGrade').textContent=grade;
    document.getElementById('scoreGrade').className='score-grade '+grade.toLowerCase();
    document.getElementById('scoreLine').textContent=total+' / 20';
    document.getElementById('totalScore').textContent=totalPts;
    document.getElementById('avgGrade').textContent=grade;

    var cats=[
      {name:'Accuracy',val:scores.accuracy},
      {name:'Completeness',val:scores.completeness},
      {name:'Clarity',val:scores.clarity},
      {name:'Terminology',val:scores.terminology}
    ];
    document.getElementById('scoreCats').innerHTML=cats.map(function(c){
      var cls=c.val>=4?'good':c.val>=3?'ok':'bad';
      return'<div class="score-cat '+cls+'"><div class="score-cat-name">'+c.name+'</div><div class="score-cat-val" style="color:'+(c.val>=4?'#16A34A':c.val>=3?'#D97706':'#DC2626')+'">'+c.val+'/5</div></div>';
    }).join('');
    document.getElementById('feedbackText').textContent=scores.feedback||'No feedback available.';

  }catch(e){
    document.getElementById('judgingCard').style.display='none';
    roundResults.push({topic:currentTopic,score:0,grade:'?',error:true});
    nextTopic();
  }
}

function showFinalResults(){
  document.getElementById('answerCard').style.display='none';
  document.getElementById('scoreCard').classList.remove('show');
  document.getElementById('topicCard').style.display='none';
  document.getElementById('finalCard').style.display='';

  var avg=Math.round(totalPts/totalRounds);
  var finalGrade=avg>=18?'A':avg>=14?'B':avg>=10?'C':avg>=6?'D':'F';
  document.getElementById('finalTitle').textContent=
    finalGrade==='A'?'Cisco Certified!':
    finalGrade==='B'?'Solid Knowledge':
    finalGrade==='C'?'Getting There':
    'Keep Studying';
  document.getElementById('finalScore').textContent=totalPts+' / '+(totalRounds*20);
  document.getElementById('finalSub').textContent='Average: '+avg+'/20 ('+finalGrade+') across '+totalRounds+' topics';

  var bd=roundResults.map(function(r,i){
    var color=r.grade==='A'?'#16A34A':r.grade==='B'?'#2563EB':r.grade==='C'?'#D97706':'#DC2626';
    return'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'+
      '<span style="font-family:var(--font-mono);font-size:.75rem;color:var(--ink-muted);min-width:20px">'+(i+1)+'</span>'+
      '<span style="font-family:var(--font-display);font-size:.82rem;flex:1">'+(r.skipped?'(Skipped)':r.topic.q.substring(0,60)+'...')+'</span>'+
      '<span style="font-family:var(--font-mono);font-size:.88rem;font-weight:800;color:'+color+'">'+r.grade+'</span>'+
      '<span style="font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted)">'+r.score+'/20</span>'+
    '</div>';
  }).join('');
  document.getElementById('finalBreakdown').innerHTML=bd;
}

startGame();
</script>
<script src="js/tutor.js"></script>
<script src="js/group-chat.js"></script>
</body>
</html>
