<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Path — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  /* ── Page header ──────────────────────────────────────────────── */
  .page-header { padding: var(--s-xl) 0 var(--s-lg); margin-bottom: var(--s-lg); border-bottom: 2px solid var(--ink); }
  .page-header .subtitle { font-family: var(--font-body); color: var(--ink-secondary); font-size: 0.95rem; font-style: italic; max-width: 60ch; }

  /* ── Starting point card ──────────────────────────────────────── */
  .start-card { background: var(--accent-dim); border-left: 5px solid var(--accent); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; padding: var(--s-lg); margin-bottom: var(--s-xl); }
  .start-card h3 { font-family: var(--font-display); font-size: 1.05rem; margin-bottom: 6px; }
  .start-card p { font-size: 0.88rem; color: var(--ink-secondary); margin-bottom: 10px; line-height: 1.5; }
  .start-card .tier-badge { display: inline-block; font-family: var(--font-display); font-size: 0.78rem; font-weight: 700; padding: 5px 14px; border-radius: 14px; color: #fff; letter-spacing: 0.02em; }

  /* ── Legend ────────────────────────────────────────────────────── */
  .graph-legend { display: flex; flex-wrap: wrap; align-items: center; gap: 12px 20px; margin-bottom: var(--s-lg); padding: 12px 18px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .legend-item { display: flex; align-items: center; gap: 7px; font-family: var(--font-display); font-size: 0.74rem; color: var(--ink-secondary); white-space: nowrap; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .legend-line { width: 22px; height: 3px; border-radius: 2px; }
  .legend-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

  /* ── Zoom controls ────────────────────────────────────────────── */
  .graph-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .graph-controls button {
    font-family: var(--font-display); font-size: 0.78rem; font-weight: 600;
    padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg-surface); color: var(--ink-secondary); cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .graph-controls button:hover { background: var(--bg-hover); color: var(--ink); border-color: var(--border-strong); }
  .graph-controls button.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .graph-controls .zoom-label { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-muted); min-width: 40px; text-align: center; }
  .graph-controls .sep { width: 1px; height: 20px; background: var(--border); }

  /* ── Graph container ──────────────────────────────────────────── */
  .graph-wrap {
    position: relative; background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); overflow: auto; margin-bottom: var(--s-2xl);
    -webkit-overflow-scrolling: touch; cursor: grab;
  }
  .graph-wrap.grabbing { cursor: grabbing; }
  .graph-wrap svg { display: block; }

  /* ── SVG styles ───────────────────────────────────────────────── */
  .tier-bg { opacity: 0.7; }
  .tier-sep { stroke: var(--border); stroke-width: 0.5; opacity: 0.6; }
  .tier-label { font-family: 'Space Grotesk', sans-serif; font-weight: 700; fill: #78716C; letter-spacing: 0.6px; text-transform: uppercase; }

  .node-group { cursor: pointer; }
  .node-rect { transition: filter 0.25s var(--ease-out), stroke-width 0.25s, stroke 0.25s; stroke: transparent; stroke-width: 0; }
  .node-group:hover .node-rect { filter: brightness(1.12); }
  .node-text { font-family: 'Space Grotesk', sans-serif; fill: #fff; font-weight: 600; pointer-events: none; }
  .node-id { font-family: 'JetBrains Mono', monospace; fill: rgba(255,255,255,0.6); pointer-events: none; }
  .node-mastered .node-rect { fill: #16A34A !important; }
  .node-weak { opacity: 0.45; }

  .edge-line { fill: none; stroke: #C7C3BC; stroke-width: 1.8; transition: stroke 0.3s, stroke-width 0.3s, opacity 0.3s; }

  /* ── Hover highlight system ───────────────────────────────────── */
  /* Ancestors = everything BEFORE hovered node */
  .edge-line.ancestor-highlight { stroke: #2563EB; stroke-width: 3.5; opacity: 1 !important; filter: drop-shadow(0 0 4px rgba(37,99,235,0.35)); }
  /* Descendants = everything AFTER hovered node */
  .edge-line.descendant-highlight { stroke: #B45309; stroke-width: 3; opacity: 1 !important; filter: drop-shadow(0 0 3px rgba(180,83,9,0.3)); }
  /* The hovered node itself */
  .node-group.hovered-node .node-rect { filter: brightness(1.15) drop-shadow(0 0 8px rgba(0,0,0,0.2)); stroke: #1C1917; stroke-width: 2.5; }
  /* Ancestor nodes */
  .node-group.ancestor-node .node-rect { filter: brightness(1.08); stroke: #2563EB; stroke-width: 2; }
  /* Descendant nodes */
  .node-group.descendant-node .node-rect { filter: brightness(1.05); stroke: #B45309; stroke-width: 2; stroke-dasharray: 4,3; }

  /* Dim everything not in the chain */
  .graph-dimmed .edge-line:not(.ancestor-highlight):not(.descendant-highlight) { opacity: 0.06; }
  .graph-dimmed .node-group:not(.hovered-node):not(.ancestor-node):not(.descendant-node) { opacity: 0.12; }

  /* Critical path */
  .critical-edge { stroke: #B45309; stroke-width: 2.8; stroke-dasharray: 8,4; animation: critFlow 1.5s linear infinite; filter: drop-shadow(0 0 3px rgba(180,83,9,0.3)); }
  @keyframes critFlow { to { stroke-dashoffset: -24; } }
  @keyframes recPulse { 0%,100% { stroke-opacity: 0.3; stroke-width: 2.5; } 50% { stroke-opacity: 1; stroke-width: 4.5; } }
  .node-recommended .node-rect { stroke: #B45309; stroke-width: 2; animation: recPulse 2s ease-in-out infinite; }

  /* ── Tooltip ──────────────────────────────────────────────────── */
  .graph-tooltip { pointer-events: none; opacity: 0; transition: opacity 0.15s; }
  .graph-tooltip.visible { opacity: 1; }
  .tt-bg { fill: #1C1917; }
  .tt-text { font-family: 'Space Grotesk', sans-serif; fill: #FAF7F2; font-weight: 600; }
  .tt-sub { font-family: 'JetBrains Mono', monospace; fill: #A8A29E; }
  .tt-prereq { font-family: 'Space Grotesk', sans-serif; fill: #93C5FD; font-weight: 500; }
  .tt-next { font-family: 'Space Grotesk', sans-serif; fill: #FCD34D; font-weight: 500; }

  /* ── Tier detail sections ─────────────────────────────────────── */
  .tier-detail { margin-bottom: var(--s-2xl); }
  .tier-detail h2 { font-size: 1.15rem; margin-bottom: var(--s-sm); padding-bottom: var(--s-sm); border-bottom: 1px solid var(--rule); }
  .tier-detail p { font-size: 0.88rem; color: var(--ink-secondary); margin-bottom: var(--s-md); max-width: 60ch; }
  .tier-topics { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .tier-topic { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg-recessed); border-radius: var(--radius); border-left: 3px solid transparent; font-family: var(--font-display); font-size: 0.82rem; transition: background 0.15s, border-color 0.15s; }
  .tier-topic:hover { background: var(--bg-hover); }
  .tier-topic .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tier-topic .tid { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-muted); min-width: 30px; }
  .tier-topic .tname { color: var(--ink); flex: 1; }
  .tier-topic .tpct { margin-left: auto; font-family: var(--font-mono); font-size: 0.72rem; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ── Entrance animation ────────────────────────────────────────── */
  @keyframes nodeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes edgeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes labelIn { from { opacity: 0; } to { opacity: 1; } }
  .node-group { opacity: 0; }
  .node-group.entered { animation: nodeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .edge-line { opacity: 0; }
  .edge-line.entered { animation: edgeIn 0.35s ease forwards; }
  .tier-label { opacity: 0; }
  .tier-label.entered { animation: labelIn 0.3s ease forwards; }
  /* Kill animation forwards-fill so CSS opacity rules actually work */
  .entrance-done .node-group,
  .entrance-done .edge-line,
  .entrance-done .tier-label { animation: none !important; opacity: 1; }
  .entrance-done .node-weak { opacity: 0.45; }
  /* Dimmed state — force animation:none to break forwards-fill lock */
  .graph-dimmed .node-group { animation: none !important; opacity: 1; }
  .graph-dimmed .node-weak { opacity: 0.45; }
  .graph-dimmed .edge-line { animation: none !important; opacity: 1; }

  @media (prefers-reduced-motion: reduce) {
    .critical-edge, .node-recommended .node-rect { animation: none; }
    .node-group, .edge-line, .tier-label { opacity: 1; animation: none; }
    .node-group.entered, .edge-line.entered, .tier-label.entered { animation: none; opacity: 1; }
  }
  @media (max-width: 600px) {
    .graph-legend { gap: 8px 12px; padding: 10px 14px; }
    .legend-sep { display: none; }
    .tier-topics { grid-template-columns: 1fr; }
    .graph-controls { flex-wrap: wrap; }
  }
</style>

<script>
// ── Data ──────────────────────────────────────────────────────
const TIERS = [
  { id: 'foundation', name: 'Foundation', color: '#2563EB', bg: '#EFF6FF', desc: 'The bedrock. IP addressing, binary, TCP/UDP, switching basics, cabling. Everything else builds on this.' },
  { id: 'layer2',     name: 'Layer 2',    color: '#16A34A', bg: '#F0FDF4', desc: 'VLANs, trunking, STP, EtherChannel, wireless architecture. The switching layer.' },
  { id: 'layer3',     name: 'Layer 3',    color: '#D97706', bg: '#FFFBEB', desc: 'Routing tables, static routes, OSPF, FHRP. How packets find their way across networks.' },
  { id: 'services',   name: 'Services',   color: '#7C3AED', bg: '#F5F3FF', desc: 'NAT, DHCP, DNS, NTP, SNMP, Syslog, QoS, SSH. The services that make networks usable.' },
  { id: 'security',   name: 'Security',   color: '#DC2626', bg: '#FEF2F2', desc: 'ACLs, port security, DHCP snooping, DAI, AAA, VPNs, wireless security.' },
  { id: 'automation', name: 'Automation',  color: '#0891B2', bg: '#ECFEFF', desc: 'SDN, REST APIs, JSON, Ansible, Terraform. The future of network management.' },
];

const NODES = [
  // Foundation — row 1 (addressing & transport)
  { id:'1.1',  tier:'foundation', row:0, name:'Network Components' },
  { id:'1.2',  tier:'foundation', row:0, name:'Topologies' },
  { id:'1.3',  tier:'foundation', row:0, name:'Cabling & Physical' },
  { id:'1.4',  tier:'foundation', row:0, name:'Interface Issues' },
  { id:'1.5',  tier:'foundation', row:0, name:'TCP vs UDP' },
  { id:'1.6',  tier:'foundation', row:0, name:'IPv4 Subnetting' },
  { id:'1.7',  tier:'foundation', row:0, name:'Private IPv4' },
  // Foundation — row 2 (IPv6, wireless, virt, switching)
  { id:'1.8',  tier:'foundation', row:1, name:'IPv6 Addressing' },
  { id:'1.9',  tier:'foundation', row:1, name:'IPv6 Types' },
  { id:'1.10', tier:'foundation', row:1, name:'Verify IP (OS)' },
  { id:'1.11', tier:'foundation', row:1, name:'Wireless Basics' },
  { id:'1.12', tier:'foundation', row:1, name:'Virtualization' },
  { id:'1.13', tier:'foundation', row:1, name:'Switching Concepts' },
  // Layer 2
  { id:'2.1',  tier:'layer2', name:'VLANs' },
  { id:'2.2',  tier:'layer2', name:'Trunking / 802.1Q' },
  { id:'2.3',  tier:'layer2', name:'CDP / LLDP' },
  { id:'2.4',  tier:'layer2', name:'EtherChannel' },
  { id:'2.5',  tier:'layer2', name:'STP / RSTP' },
  { id:'2.6',  tier:'layer2', name:'Wireless Arch' },
  { id:'2.7',  tier:'layer2', name:'WLAN Infra' },
  { id:'2.8',  tier:'layer2', name:'Device Mgmt' },
  { id:'2.9',  tier:'layer2', name:'WLAN GUI' },
  // Layer 3
  { id:'3.1',  tier:'layer3', name:'Routing Table' },
  { id:'3.2',  tier:'layer3', name:'Forwarding' },
  { id:'3.3',  tier:'layer3', name:'Static Routing' },
  { id:'3.4',  tier:'layer3', name:'OSPF' },
  { id:'3.5',  tier:'layer3', name:'FHRP / HSRP' },
  // Services
  { id:'4.1',  tier:'services', name:'NAT / PAT' },
  { id:'4.2',  tier:'services', name:'NTP' },
  { id:'4.3',  tier:'services', name:'DHCP / DNS' },
  { id:'4.4',  tier:'services', name:'SNMP' },
  { id:'4.5',  tier:'services', name:'Syslog' },
  { id:'4.6',  tier:'services', name:'DHCP Relay' },
  { id:'4.7',  tier:'services', name:'QoS' },
  { id:'4.8',  tier:'services', name:'SSH' },
  { id:'4.9',  tier:'services', name:'TFTP / FTP' },
  // Security
  { id:'5.1',  tier:'security', row:0, name:'Security Concepts' },
  { id:'5.2',  tier:'security', row:0, name:'Security Programs' },
  { id:'5.3',  tier:'security', row:0, name:'Passwords' },
  { id:'5.4',  tier:'security', row:0, name:'Password Policy' },
  { id:'5.5',  tier:'security', row:0, name:'VPNs / IPsec' },
  { id:'5.6',  tier:'security', row:1, name:'ACLs' },
  { id:'5.7',  tier:'security', row:1, name:'L2 Security' },
  { id:'5.8',  tier:'security', row:1, name:'AAA' },
  { id:'5.9',  tier:'security', row:1, name:'Wireless Sec' },
  { id:'5.10', tier:'security', row:1, name:'WPA2 Config' },
  // Automation
  { id:'6.1',  tier:'automation', name:'Automation Impact' },
  { id:'6.2',  tier:'automation', name:'Trad vs SDN' },
  { id:'6.3',  tier:'automation', name:'SDN Architecture' },
  { id:'6.4',  tier:'automation', name:'AI / ML Ops' },
  { id:'6.5',  tier:'automation', name:'REST APIs' },
  { id:'6.6',  tier:'automation', name:'Ansible / Terraform' },
  { id:'6.7',  tier:'automation', name:'JSON' },
];

// [from, to] = "must know FROM before TO"
const EDGES = [
  // Foundation internal
  ['1.1','1.2'], ['1.1','1.12'], ['1.3','1.4'], ['1.6','1.7'], ['1.8','1.9'], ['1.6','1.10'], ['1.8','1.10'],
  // Foundation → Layer 2
  ['1.6','2.1'], ['1.13','2.1'], ['1.13','2.5'], ['1.13','2.3'], ['1.11','2.6'],
  // Layer 2 internal
  ['2.1','2.2'], ['2.2','2.4'], ['2.1','2.5'], ['2.6','2.7'], ['2.7','2.9'], ['2.6','2.8'],
  // → Layer 3
  ['1.6','3.1'], ['1.8','3.1'], ['3.1','3.2'], ['3.1','3.3'], ['3.3','3.4'], ['3.4','3.5'],
  // → Services
  ['3.3','4.1'], ['3.3','4.3'], ['3.3','4.6'], ['1.5','4.2'], ['1.5','4.7'], ['4.3','4.6'],
  ['4.5','4.4'], ['4.3','4.9'],
  // → Security
  ['5.1','5.2'], ['2.8','5.3'], ['5.3','5.4'], ['5.3','4.8'], ['5.1','5.5'], ['5.1','5.8'],
  ['2.6','5.9'], ['5.9','5.10'], ['3.3','5.6'], ['2.5','5.7'],
  // → Automation
  ['6.1','6.2'], ['6.1','6.4'], ['6.2','6.3'], ['1.12','6.3'], ['6.3','6.5'], ['6.5','6.6'], ['6.5','6.7'],
];

// ── Layout Engine ─────────────────────────────────────────────
const ROW_H = 90;         // height per node row
const TIER_GAP = 30;      // gap between tiers
const TIER_PAD = 28;
const NODE_W = 140;
const NODE_H = 56;
const LEFT_LABEL = 110;
const SVG_CONTENT_W = 1700;

// Compute how many rows a tier needs (nodes with row property, or 1 row)
function tierRows(tierId) {
  const nodes = NODES.filter(n => n.tier === tierId);
  const maxRow = nodes.reduce((mx, n) => Math.max(mx, n.row || 0), 0);
  return maxRow + 1;
}

function layoutGraph() {
  const positions = {};
  const tierYMap = {};   // tier.id → { y, height }
  let y = TIER_PAD;

  TIERS.forEach(tier => {
    const rows = tierRows(tier.id);
    const h = rows * ROW_H + TIER_GAP;
    tierYMap[tier.id] = { y, height: h };

    for (let r = 0; r < rows; r++) {
      const rowNodes = NODES.filter(n => n.tier === tier.id && (n.row || 0) === r);
      const rowY = y + (r + 0.5) * ROW_H + TIER_GAP / 2;
      const availW = SVG_CONTENT_W - LEFT_LABEL;
      const gap = availW / (rowNodes.length + 1);
      rowNodes.forEach((node, ni) => {
        positions[node.id] = { x: LEFT_LABEL + gap * (ni + 1), y: rowY };
      });
    }
    y += h;
  });

  return { positions, tierYMap, totalH: y + TIER_PAD };
}

function bezierPath(x1, y1, x2, y2) {
  const dy = y2 - y1;
  if (Math.abs(dy) < ROW_H * 0.8) {
    // Same row — arc above
    const mx = (x1 + x2) / 2;
    const my = Math.min(y1, y2) - 32;
    return `M${x1},${y1} Q${mx},${my} ${x2},${y2}`;
  }
  // Different rows — smooth S-curve
  const cp = Math.min(Math.abs(dy) * 0.4, 70);
  return `M${x1},${y1 + NODE_H/2} C${x1},${y1 + NODE_H/2 + cp} ${x2},${y2 - NODE_H/2 - cp} ${x2},${y2 - NODE_H/2}`;
}

// ── Critical Path ─────────────────────────────────────────────
function findCriticalPath() {
  const adj = {}; const dist = {}; const prev = {};
  NODES.forEach(n => { adj[n.id] = []; dist[n.id] = 0; prev[n.id] = null; });
  const inDeg = {}; NODES.forEach(n => inDeg[n.id] = 0);
  EDGES.forEach(([f,t]) => { adj[f].push(t); inDeg[t]++; });
  const q = Object.keys(inDeg).filter(k => inDeg[k] === 0);
  while (q.length) {
    const u = q.shift();
    for (const v of adj[u]) {
      if (dist[u] + 1 > dist[v]) { dist[v] = dist[u] + 1; prev[v] = u; }
      if (--inDeg[v] === 0) q.push(v);
    }
  }
  let end = Object.keys(dist).reduce((a,b) => dist[a] > dist[b] ? a : b);
  const path = []; while (end) { path.unshift(end); end = prev[end]; }
  const edgeSet = new Set();
  for (let i = 0; i < path.length - 1; i++) edgeSet.add(path[i] + '→' + path[i+1]);
  return edgeSet;
}

// ── Recommended Next ──────────────────────────────────────────
function findRecommended(prof) {
  const prereqs = {};
  NODES.forEach(n => prereqs[n.id] = []);
  EDGES.forEach(([f,t]) => prereqs[t].push(f));
  const candidates = NODES.filter(n => {
    const score = prof[n.id] ?? 0;
    if (score >= 0.7) return false;
    return prereqs[n.id].every(p => (prof[p] ?? 0) >= 0.7);
  });
  if (candidates.length === 0) return null;
  candidates.sort((a,b) => (prof[a.id] ?? 0) - (prof[b.id] ?? 0));
  return candidates[0].id;
}

// ── Render ────────────────────────────────────────────────────
function render() {
  store.initProficiency(window.topicsData);
  const prof = store.getAllProficiency();
  const { positions: pos, tierYMap, totalH } = layoutGraph();
  const critEdges = findCriticalPath();
  const recId = findRecommended(prof);

  const svgW = 1800;
  const svgH = totalH;
  const svg = document.getElementById('mainGraph');
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', 'CCNA topic dependency graph — shows prerequisites and learning order across 6 tiers');

  let html = '';

  // Defs
  html += `<defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#D4D0C8"/></marker>
    <marker id="arrowCrit" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#B45309"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563EB"/></marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#B45309"/></marker>
    <filter id="nodeShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>`;

  // Tier backgrounds — use computed heights
  TIERS.forEach((tier, i) => {
    const tm = tierYMap[tier.id];
    html += `<rect x="0" y="${tm.y}" width="${svgW}" height="${tm.height}" fill="${tier.bg}" class="tier-bg"/>`;
    if (i > 0) html += `<line x1="0" y1="${tm.y}" x2="${svgW}" y2="${tm.y}" class="tier-sep"/>`;
    html += `<text x="18" y="${tm.y + 24}" class="tier-label" style="font-size:14px">${tier.name}</text>`;
  });

  // Edges
  const nodeTierIdx = {};
  NODES.forEach(n => { nodeTierIdx[n.id] = TIERS.findIndex(t => t.id === n.tier); });
  EDGES.forEach(([from, to]) => {
    const p1 = pos[from], p2 = pos[to];
    if (!p1 || !p2) return;
    const isCrit = critEdges.has(from + '→' + to);
    const cls = isCrit ? 'edge-line critical-edge' : 'edge-line';
    const marker = isCrit ? 'url(#arrowCrit)' : 'url(#arrow)';
    const eTier = Math.max(nodeTierIdx[from] ?? 0, nodeTierIdx[to] ?? 0);
    html += `<path d="${bezierPath(p1.x, p1.y, p2.x, p2.y)}" class="${cls}" data-from="${from}" data-to="${to}" data-tier-idx="${eTier}" marker-end="${marker}"/>`;
  });

  // Nodes
  NODES.forEach(n => {
    const p = pos[n.id];
    if (!p) return;
    const tier = TIERS.find(t => t.id === n.tier);
    const score = prof[n.id] ?? 0;
    const mastered = score >= 0.7;
    const weak = score < 0.1;
    const fill = mastered ? '#16A34A' : tier.color;
    const cls = ['node-group', mastered ? 'node-mastered' : '', weak ? 'node-weak' : '', n.id === recId ? 'node-recommended' : ''].join(' ');

    const tierIdx = TIERS.findIndex(t => t.id === n.tier);
    html += `<g class="${cls}" data-id="${n.id}" data-name="${n.name}" data-score="${Math.round(score*100)}" data-tier="${n.tier}" data-tier-idx="${tierIdx}">`;
    html += `<rect class="node-rect" x="${p.x - NODE_W/2}" y="${p.y - NODE_H/2}" width="${NODE_W}" height="${NODE_H}" rx="8" fill="${fill}" filter="url(#nodeShadow)"/>`;
    html += `<text class="node-id" x="${p.x}" y="${p.y - 7}" text-anchor="middle" style="font-size:11px">${n.id}</text>`;
    html += `<text class="node-text" x="${p.x}" y="${p.y + 13}" text-anchor="middle" style="font-size:12.5px">${n.name}</text>`;
    if (mastered) html += `<text x="${p.x + NODE_W/2 - 16}" y="${p.y - NODE_H/2 + 16}" style="font-size:13px;fill:rgba(255,255,255,0.9);font-weight:700" aria-label="mastered">&#10003;</text>`;
    html += `</g>`;
  });

  // Tooltip group — richer info
  html += `<g class="graph-tooltip" id="graphTooltip">
    <rect class="tt-bg" width="260" height="80" x="0" y="0" rx="8"/>
    <text class="tt-text" x="14" y="22" id="ttName" style="font-size:13px"></text>
    <text class="tt-sub" x="14" y="40" id="ttScore" style="font-size:10.5px"></text>
    <text class="tt-prereq" x="14" y="56" id="ttPrereq" style="font-size:10px"></text>
    <text class="tt-next" x="14" y="72" id="ttNext" style="font-size:10px"></text>
  </g>`;

  svg.innerHTML = html;

  // ── Staggered entrance ─────────────────────────────────────
  requestAnimationFrame(() => {
    const BASE = 80;
    const NODE_STAGGER = 30;
    let maxDelay = 0;

    svg.querySelectorAll('.tier-label').forEach((el, i) => {
      const d = i * BASE;
      setTimeout(() => el.classList.add('entered'), d);
      maxDelay = Math.max(maxDelay, d);
    });

    svg.querySelectorAll('.node-group').forEach(g => {
      const ti = parseInt(g.dataset.tierIdx);
      const siblings = [...svg.querySelectorAll(`.node-group[data-tier-idx="${ti}"]`)];
      const ni = siblings.indexOf(g);
      const d = (ti * BASE) + 60 + (ni * NODE_STAGGER);
      setTimeout(() => g.classList.add('entered'), d);
      maxDelay = Math.max(maxDelay, d);
    });

    svg.querySelectorAll('.edge-line').forEach(edge => {
      const ti = parseInt(edge.dataset.tierIdx);
      const d = (ti * BASE) + 250;
      setTimeout(() => edge.classList.add('entered'), d);
      maxDelay = Math.max(maxDelay, d);
    });

    setTimeout(() => svg.classList.add('entrance-done'), maxDelay + 450);
  });

  // Build adjacency
  const fwdAdj = {}, revAdj = {};
  NODES.forEach(n => { fwdAdj[n.id] = []; revAdj[n.id] = []; });
  EDGES.forEach(([f, t]) => { fwdAdj[f].push(t); revAdj[t].push(f); });

  function getAncestors(nodeId) {
    const visited = new Set();
    const edges = new Set();
    function walk(id) { if (visited.has(id)) return; visited.add(id); for (const p of revAdj[id] || []) { edges.add(p + '|' + id); walk(p); } }
    walk(nodeId);
    visited.delete(nodeId); // don't include self
    return { nodes: visited, edges };
  }

  function getDescendants(nodeId) {
    const visited = new Set();
    const edges = new Set();
    function walk(id) { if (visited.has(id)) return; visited.add(id); for (const c of fwdAdj[id] || []) { edges.add(id + '|' + c); walk(c); } }
    walk(nodeId);
    visited.delete(nodeId);
    return { nodes: visited, edges };
  }

  // Build prereq/next lookup for tooltip
  const prereqOf = {}, nextOf = {};
  NODES.forEach(n => { prereqOf[n.id] = []; nextOf[n.id] = []; });
  EDGES.forEach(([f, t]) => { prereqOf[t].push(f); nextOf[f].push(t); });

  // ── Hover Events ───────────────────────────────────────────
  // Single cleanup function — called BEFORE applying new highlights AND on leave
  function clearHighlights() {
    document.getElementById('graphTooltip').classList.remove('visible');
    svg.classList.remove('graph-dimmed');
    svg.querySelectorAll('.hovered-node').forEach(n => n.classList.remove('hovered-node'));
    svg.querySelectorAll('.ancestor-node').forEach(n => n.classList.remove('ancestor-node'));
    svg.querySelectorAll('.descendant-node').forEach(n => n.classList.remove('descendant-node'));
    svg.querySelectorAll('.ancestor-highlight, .descendant-highlight').forEach(edge => {
      edge.classList.remove('ancestor-highlight', 'descendant-highlight');
      var from = edge.dataset.from, to = edge.dataset.to;
      var isCrit = critEdges.has(from + '→' + to);
      edge.setAttribute('marker-end', isCrit ? 'url(#arrowCrit)' : 'url(#arrow)');
    });
  }

  svg.querySelectorAll('.node-group').forEach(g => {
    g.addEventListener('mouseenter', () => {
      // Force entrance-done so forwards-fill doesn't block dimming
      svg.classList.add('entrance-done');
      // Clean any stale highlights from rapid mouse movement
      clearHighlights();

      const id = g.dataset.id;
      const ancestors = getAncestors(id);
      const descendants = getDescendants(id);

      // Tooltip
      const tt = document.getElementById('graphTooltip');
      document.getElementById('ttName').textContent = `${id} — ${g.dataset.name}`;
      document.getElementById('ttScore').textContent = `Proficiency: ${g.dataset.score}%`;

      const pNames = prereqOf[id].map(pid => { const n = NODES.find(x => x.id === pid); return n ? n.name : pid; });
      const nNames = nextOf[id].map(nid => { const n = NODES.find(x => x.id === nid); return n ? n.name : nid; });
      document.getElementById('ttPrereq').textContent = pNames.length ? `Prereqs: ${pNames.join(', ')}` : 'No prerequisites';
      document.getElementById('ttNext').textContent = nNames.length ? `Unlocks: ${nNames.join(', ')}` : 'Terminal topic';

      const rect = g.querySelector('.node-rect');
      const x = parseFloat(rect.getAttribute('x'));
      const y = parseFloat(rect.getAttribute('y')) - 88;
      tt.setAttribute('transform', `translate(${x},${Math.max(4, y)})`);
      tt.classList.add('visible');

      // Apply dimming + highlights
      svg.classList.add('graph-dimmed');
      g.classList.add('hovered-node');

      svg.querySelectorAll('.node-group').forEach(ng => {
        const nid = ng.dataset.id;
        if (ancestors.nodes.has(nid)) ng.classList.add('ancestor-node');
        if (descendants.nodes.has(nid)) ng.classList.add('descendant-node');
      });

      svg.querySelectorAll('.edge-line').forEach(edge => {
        const key = edge.dataset.from + '|' + edge.dataset.to;
        if (ancestors.edges.has(key)) {
          edge.classList.add('ancestor-highlight');
          edge.setAttribute('marker-end', 'url(#arrowBlue)');
        }
        if (descendants.edges.has(key)) {
          edge.classList.add('descendant-highlight');
          edge.setAttribute('marker-end', 'url(#arrowAmber)');
        }
      });
    });

    g.addEventListener('mouseleave', () => { clearHighlights(); });

    g.addEventListener('click', () => {
      const tierId = g.dataset.tier;
      const el = document.getElementById('tier-' + tierId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  // ── Zoom & Pan ─────────────────────────────────────────────
  const wrap = document.getElementById('graphWrap');
  let currentZoom = 100;
  const ZOOM_STEP = 20;
  const ZOOM_MIN = 60;
  const ZOOM_MAX = 200;

  function applyZoom(pct) {
    currentZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, pct));
    const scale = currentZoom / 100;
    svg.style.width = (svgW * scale) + 'px';
    svg.style.height = (svgH * scale) + 'px';
    document.getElementById('zoomLabel').textContent = currentZoom + '%';
    document.querySelectorAll('.graph-controls button').forEach(b => b.classList.remove('active'));
    if (currentZoom === 100) document.getElementById('zoomReset').classList.add('active');
  }

  document.getElementById('zoomIn').addEventListener('click', () => applyZoom(currentZoom + ZOOM_STEP));
  document.getElementById('zoomOut').addEventListener('click', () => applyZoom(currentZoom - ZOOM_STEP));
  document.getElementById('zoomReset').addEventListener('click', () => applyZoom(100));
  document.getElementById('zoomFit').addEventListener('click', () => {
    const fitPct = Math.round((wrap.clientWidth / svgW) * 100);
    applyZoom(fitPct);
  });

  // Pan with drag
  let isPanning = false, panStart = { x: 0, y: 0 }, scrollStart = { x: 0, y: 0 };
  wrap.addEventListener('mousedown', e => {
    if (e.target.closest('.node-group')) return;
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY };
    scrollStart = { x: wrap.scrollLeft, y: wrap.scrollTop };
    wrap.classList.add('grabbing');
  });
  window.addEventListener('mousemove', e => {
    if (!isPanning) return;
    wrap.scrollLeft = scrollStart.x - (e.clientX - panStart.x);
    wrap.scrollTop = scrollStart.y - (e.clientY - panStart.y);
  });
  window.addEventListener('mouseup', () => { isPanning = false; wrap.classList.remove('grabbing'); });

  // Zoom with scroll wheel
  wrap.addEventListener('wheel', e => {
    if (!e.ctrlKey && !e.metaKey) return;
    e.preventDefault();
    applyZoom(currentZoom + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
  }, { passive: false });

  // Initial size
  applyZoom(100);

  renderStartCard(prof, recId);
  renderTierDetails(prof);
}

function renderStartCard(prof, recId) {
  const card = document.getElementById('startCard');
  if (!recId) {
    card.style.display = 'none';
    return;
  }
  const node = NODES.find(n => n.id === recId);
  const tier = TIERS.find(t => t.id === node.tier);
  const score = Math.round((prof[recId] ?? 0) * 100);
  card.style.display = '';
  card.innerHTML = `
    <h3>Your next focus: <strong>${node.id} — ${node.name}</strong></h3>
    <p>You're at ${score}% on this topic. Its prerequisites are met — this is the highest-impact thing to study right now.</p>
    <span class="tier-badge" style="background:${tier.color}">${tier.name} tier</span>
  `;
}

function renderTierDetails(prof) {
  const container = document.getElementById('tierDetails');
  let html = '';
  TIERS.forEach(tier => {
    const tierNodes = NODES.filter(n => n.tier === tier.id);
    html += `<div class="tier-detail" id="tier-${tier.id}">`;
    html += `<h2 style="color:${tier.color}">${tier.name}</h2>`;
    html += `<p>${tier.desc}</p>`;
    html += `<div class="tier-topics">`;
    tierNodes.forEach(n => {
      const score = prof[n.id] ?? 0;
      const pct = Math.round(score * 100);
      const dotColor = score >= 0.7 ? '#16A34A' : score >= 0.4 ? '#CA8A04' : '#DC2626';
      const pctColor = score >= 0.7 ? 'var(--prof-strong)' : score >= 0.4 ? 'var(--prof-mid)' : 'var(--prof-weak)';
      html += `<div class="tier-topic" style="--tier-color:${tier.color}" onmouseenter="this.style.borderLeftColor=this.style.getPropertyValue('--tier-color')" onmouseleave="this.style.borderLeftColor='transparent'">
        <div class="dot" style="background:${dotColor}"></div>
        <span class="tid">${n.id}</span>
        <span class="tname">${n.name}</span>
        <span class="tpct" style="color:${pctColor}">${pct}%</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

render();
</script>
<script src="js/tutor.js"></script>
</body>
</html>
