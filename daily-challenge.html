<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Challenge — CCNA 200-301</title>
  <link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* ── Daily header ──────────────────────────────────────────── */
    .daily-header {
      text-align: center;
      margin-bottom: var(--s-xl);
    }
    .daily-date {
      font-family: var(--font-display);
      font-size: 0.72rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--s-xs);
    }
    .daily-type {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent);
      margin-top: var(--s-sm);
    }
    .daily-tagline {
      font-family: var(--font-body);
      font-style: italic;
      color: var(--ink-secondary);
      font-size: 0.92rem;
      margin-top: var(--s-xs);
    }

    /* ── Streak ────────────────────────────────────────────────── */
    .streak-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--s-lg);
      margin-bottom: var(--s-lg);
    }
    .streak-item {
      text-align: center;
    }
    .streak-val {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--ink);
    }
    .streak-label {
      font-family: var(--font-display);
      font-size: 0.72rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Start button ──────────────────────────────────────────── */
    .start-area {
      text-align: center;
      margin: var(--s-lg) 0;
    }

    /* ── Already completed ─────────────────────────────────────── */
    .completed-card {
      background: var(--correct-bg);
      border: 1px solid var(--correct);
      border-radius: var(--radius-lg);
      padding: var(--s-lg);
      text-align: center;
      margin-bottom: var(--s-lg);
    }
    .completed-card h3 {
      color: var(--correct);
      margin-bottom: var(--s-sm);
    }
    .completed-score {
      font-family: var(--font-mono);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--ink);
    }
    .completed-time {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--ink-secondary);
    }

    /* ── Leaderboard ───────────────────────────────────────────── */
    .leaderboard {
      max-width: 500px;
      margin: 0 auto var(--s-lg);
    }
    .leaderboard h3 {
      font-size: 0.95rem;
      margin-bottom: var(--s-sm);
    }
    .lb-entry {
      display: flex;
      align-items: center;
      gap: var(--s-sm);
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .lb-rank {
      font-family: var(--font-mono);
      font-weight: 700;
      width: 32px;
      color: var(--ink-muted);
    }
    .lb-rank.gold { color: #B45309; }
    .lb-rank.silver { color: #6B7280; }
    .lb-rank.bronze { color: #92400E; }
    .lb-name { flex: 1; font-family: var(--font-display); font-weight: 500; }
    .lb-score { font-family: var(--font-mono); font-weight: 700; }
    .lb-time {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--ink-muted);
      width: 60px;
      text-align: right;
    }
    .lb-you { background: var(--accent-dim); margin: 0 -8px; padding: 8px; border-radius: var(--radius); }

    /* ── Share ──────────────────────────────────────────────────── */
    .share-row {
      text-align: center;
      margin-top: var(--s-md);
    }
    .share-text {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-secondary);
      background: var(--bg-recessed);
      padding: 8px 14px;
      border-radius: var(--radius);
      display: inline-block;
      cursor: pointer;
      transition: background 0.15s;
    }
    .share-text:hover { background: var(--bg-hover); }

    /* ── Game containers ───────────────────────────────────────── */
    .game-container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* ── What's Wrong (inline) ─────────────────────────────────── */
    .wr-command-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-muted);
      margin-bottom: var(--s-xs);
    }
    .wr-output {
      background: #1C1917;
      color: #A7F3D0;
      font-family: var(--font-mono);
      font-size: 0.76rem;
      padding: var(--s-md) var(--s-lg);
      border-radius: var(--radius-lg);
      overflow-x: auto;
      margin-bottom: var(--s-md);
      line-height: 1.65;
      white-space: pre;
    }
    .wr-output .error-line { color: #FCA5A5; font-weight: 700; }
    .wr-question {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: var(--s-md);
    }
    .wr-round-label {
      font-family: var(--font-display);
      font-size: 0.75rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--s-sm);
    }

    /* ── Timer bar (shared) ────────────────────────────────────── */
    .timer-bar-wrap {
      height: 6px;
      background: var(--bg-recessed);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: var(--s-lg);
    }
    .timer-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--prof-strong);
      transition: width 0.1s linear, background 0.3s;
    }
    .timer-bar-fill.warning { background: var(--prof-mid); }
    .timer-bar-fill.danger { background: var(--prof-weak); }

    /* ── Speedrun (inline) ─────────────────────────────────────── */
    .sr-task-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--s-lg);
      margin-bottom: var(--s-md);
      text-align: center;
    }
    .sr-mode {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--s-sm);
    }
    .sr-task {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
    }
    .terminal-wrap {
      background: #1C1917;
      border-radius: var(--radius-lg);
      padding: var(--s-md) var(--s-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: var(--s-md);
    }
    .terminal-prompt {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: #A7F3D0;
      white-space: nowrap;
    }
    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: #FAF7F2;
      caret-color: #FDE68A;
    }
    .terminal-input::placeholder { color: #57534E; }

    /* ── Progress dots ─────────────────────────────────────────── */
    .progress-dots {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: var(--s-md);
      justify-content: center;
    }
    .progress-dot {
      width: 24px;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-recessed);
      transition: background 0.3s;
    }
    .progress-dot.correct { background: var(--prof-strong); }
    .progress-dot.wrong { background: var(--prof-weak); }
    .progress-dot.current { background: var(--accent); }

    /* ── Feedback ──────────────────────────────────────────────── */
    .feedback-bar {
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px;
      border-radius: var(--radius);
      min-height: 38px;
      opacity: 0;
      transition: opacity 0.2s;
      margin-bottom: var(--s-md);
    }
    .feedback-bar.show { opacity: 1; }
    .feedback-bar.correct-fb { background: var(--correct-bg); color: var(--correct); }
    .feedback-bar.wrong-fb { background: var(--wrong-bg); color: var(--wrong); }

    /* ── Quick Config (inline) ─────────────────────────────────── */
    .qc-objectives {
      margin-bottom: var(--s-lg);
    }
    .qc-objective {
      display: flex;
      align-items: center;
      gap: var(--s-sm);
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .qc-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .qc-check.done {
      background: var(--prof-strong);
      border-color: var(--prof-strong);
    }
    .qc-check.fail {
      background: var(--prof-weak);
      border-color: var(--prof-weak);
    }

    /* ── Results ───────────────────────────────────────────────── */
    .daily-result {
      text-align: center;
      padding: var(--s-xl) 0;
    }
    .daily-result h2 {
      border: none;
      margin-top: 0;
    }
    .result-stats {
      display: flex;
      justify-content: center;
      gap: var(--s-xl);
      margin: var(--s-lg) 0;
    }
    .result-stat .value {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 800;
    }
    .result-stat .label {
      font-family: var(--font-display);
      font-size: 0.72rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="top-nav"></nav>

    <div class="page-header">
      <h1>Daily Challenge</h1>
      <p class="subtitle">One puzzle per day. Same for everyone. How do you stack up?</p>
    </div>

    <!-- Pre-game: header + start / already done -->
    <div id="pre-game">
      <div class="daily-header">
        <div class="daily-date" id="daily-date"></div>
        <div class="daily-type" id="daily-type"></div>
        <div class="daily-tagline" id="daily-tagline"></div>
      </div>

      <div class="streak-row">
        <div class="streak-item">
          <div class="streak-val" id="daily-streak">0</div>
          <div class="streak-label">Day Streak</div>
        </div>
        <div class="streak-item">
          <div class="streak-val" id="daily-best-streak">0</div>
          <div class="streak-label">Best Streak</div>
        </div>
        <div class="streak-item">
          <div class="streak-val" id="daily-total">0</div>
          <div class="streak-label">Challenges Done</div>
        </div>
      </div>

      <!-- If already completed today -->
      <div id="already-done" class="hidden">
        <div class="completed-card">
          <h3>Today's Challenge Complete</h3>
          <div class="completed-score" id="completed-score"></div>
          <div class="completed-time" id="completed-time"></div>
        </div>
        <div class="share-row">
          <span class="share-text" id="share-text" onclick="copyShare()"></span>
          <div style="font-size:.68rem;color:var(--ink-muted);margin-top:4px">Click to copy</div>
        </div>
      </div>

      <!-- Start button (if not yet done) -->
      <div id="start-area" class="start-area">
        <button class="btn btn-primary btn-lg" onclick="startChallenge()">Start Today's Challenge</button>
      </div>

      <!-- Leaderboard -->
      <div class="leaderboard" id="leaderboard-area">
        <h3>Study Group Leaderboard</h3>
        <div id="leaderboard-list">
          <div style="color:var(--ink-muted);font-size:.82rem;padding:12px 0">Join a study group on the <a href="peers.html" style="color:var(--accent)">Peers</a> page to see the leaderboard.</div>
        </div>
      </div>
    </div>

    <!-- Game area (dynamically filled) -->
    <div id="game-area" class="game-container hidden"></div>

    <!-- Results -->
    <div id="results-area" class="hidden"></div>
  </div>

  <script src="data/topics-data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/tutor.js"></script>
  <script>
/* ═══════════════════════════════════════════════════════════════════
   DAILY CHALLENGE — One puzzle per day
   ═══════════════════════════════════════════════════════════════════ */

var API = 'https://ccna-tutor.rpatino-cw.workers.dev';

// ── Date seed ────────────────────────────────────────────────────
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function yesterdayStr() {
  var d = new Date();
  d.setDate(d.getDate() - 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDate(str) {
  var d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

// Seeded random from date string
function seededRandom(seed) {
  var h = 0;
  for (var i = 0; i < seed.length; i++) {
    h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
  }
  return function() {
    h = (h * 1103515245 + 12345) & 0x7fffffff;
    return (h % 10000) / 10000;
  };
}

function seededShuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ── Storage ──────────────────────────────────────────────────────
var DC_PREFIX = 'ccna_daily_challenge_';
var DC_STREAK_KEY = 'ccna_daily_streak';

function getDailyResult(date) {
  try { return JSON.parse(localStorage.getItem(DC_PREFIX + date)); } catch(e) { return null; }
}

function saveDailyResult(date, result) {
  localStorage.setItem(DC_PREFIX + date, JSON.stringify(result));
  updateStreak(date);
}

function getStreakData() {
  try { return JSON.parse(localStorage.getItem(DC_STREAK_KEY) || '{}'); } catch(e) { return {}; }
}

function updateStreak(date) {
  var data = getStreakData();
  var yesterday = yesterdayStr();
  if (data.lastDate === date) return; // already counted
  data.total = (data.total || 0) + 1;
  if (data.lastDate === yesterday) {
    data.current = (data.current || 0) + 1;
  } else if (data.lastDate !== date) {
    data.current = 1;
  }
  if ((data.current || 0) > (data.best || 0)) data.best = data.current;
  data.lastDate = date;
  localStorage.setItem(DC_STREAK_KEY, JSON.stringify(data));
}

// ── Scenario pools (embedded, smaller than full game pools) ──────

// What's Wrong scenarios for daily
var WR_POOL = [
  { command:'show ip ospf neighbor', output:'Neighbor ID  Pri  State           Dead Time  Address      Interface\n1.1.1.1       1   INIT/DROTHER    00:00:38   10.0.1.1     Gi0/0\n2.2.2.2       1   FULL/DR         00:00:33   10.0.1.2     Gi0/0', errorLines:[1], question:'What is wrong with the OSPF neighbor table?', options:['Neighbor stuck in INIT — not forming adjacency','Dead timer too low','Both should be DR','Too many neighbors on Gi0/0'], correct:0, explanation:'INIT state means the router sees Hello packets from 1.1.1.1 but its own RID is not in the neighbor\'s Hello. Usually a hello/dead timer mismatch or ACL blocking multicasts.', topic:'3.4' },
  { command:'show vlan brief', output:'VLAN Name                  Status    Ports\n---- ---------------------- --------- -------------------\n1    default                active    Gi0/1, Gi0/2, Gi0/3\n10   SALES                  active    Fa0/1, Fa0/2\n20   ENGINEERING            active    Fa0/3, Fa0/4', errorLines:[2], question:'PC on Gi0/1 (meant for SALES VLAN 10) cannot reach the sales server.', options:['Gi0/1 is in VLAN 1 instead of VLAN 10','VLAN 20 has too few ports','Trunk port is missing','Too many VLANs'], correct:0, explanation:'Gi0/1 is in VLAN 1 (default). Assign it with "switchport access vlan 10".', topic:'2.2' },
  { command:'show ip route', output:'Codes: C - connected, S - static, O - OSPF\n\nGateway of last resort is not set\n\n      10.0.0.0/24 is subnetted, 3 subnets\nC        10.0.1.0 is directly connected, Gi0/0\nC        10.0.2.0 is directly connected, Gi0/1\nO        10.0.3.0 [110/2] via 10.0.1.2, 00:12:05, Gi0/0', errorLines:[2], question:'Why can\'t this router reach the internet?', options:['OSPF AD 110 is wrong','No default route — gateway not set','Connected routes in wrong subnet','Gi0/0 and Gi0/1 conflict'], correct:1, explanation:'No default route (0.0.0.0/0). Add "ip route 0.0.0.0 0.0.0.0 <next-hop>" or OSPF "default-information originate".', topic:'3.3' },
  { command:'show interfaces trunk', output:'Port      Mode     Encapsulation  Status     Native vlan\nGi0/1     on       802.1q         trunking   1\n\nPort      Vlans allowed on trunk\nGi0/1     1,10\n\nPort      Vlans allowed and active in management domain\nGi0/1     1,10', errorLines:[4], question:'VLAN 20 and 30 traffic is not passing through this trunk.', options:['Native VLAN should not be 1','Should be ISL not 802.1q','Only VLANs 1,10 allowed — 20 and 30 are filtered','Trunk should be auto mode'], correct:2, explanation:'Only VLANs 1 and 10 are in the allowed list. Fix: "switchport trunk allowed vlan add 20,30".', topic:'2.2' },
  { command:'show access-lists', output:'Extended IP access list 101\n    10 permit tcp 10.0.1.0 0.0.0.255 any eq 80 (0 matches)\n    20 permit tcp 10.0.1.0 0.0.0.255 any eq 443 (0 matches)\n    30 deny ip any any (4521 matches)', errorLines:[1,2], question:'ACL allows web traffic but users cannot browse.', options:['Deny should be first','ACL has 0 matches on permits — wrong direction or wrong interface','Wildcard 0.0.0.255 is wrong','Should use UDP for web'], correct:1, explanation:'Permit lines have 0 matches while deny has thousands. The ACL is likely applied in the wrong direction or on the wrong interface.', topic:'5.5' },
  { command:'show ip nat statistics', output:'Total active translations: 0 (0 static, 0 dynamic; 0 extended)\nOutside interfaces:\n  GigabitEthernet0/0\nInside interfaces:\n  GigabitEthernet0/1\nHits: 0  Misses: 0', errorLines:[2,4], question:'Gi0/0 faces LAN, Gi0/1 faces ISP. NAT has 0 translations.', options:['ACL not matching traffic','Inside/outside interfaces are reversed','NAT pool empty','Need to reboot'], correct:1, explanation:'Gi0/0 (LAN) should be "ip nat inside" and Gi0/1 (ISP) should be "ip nat outside". They are swapped.', topic:'4.1' },
  { command:'show ntp status', output:'Clock is unsynchronized, stratum 16, no reference clock\nnominal freq is 250.0000 Hz, actual freq is 250.0000 Hz, precision is 2**10\nreference is 0.0.0.0', errorLines:[0], question:'The router\'s clock is wrong. What does this show?', options:['Frequency is wrong','NTP unsynchronized — stratum 16 means no valid source','Root delay too low','Drift file corrupt'], correct:1, explanation:'Stratum 16 = unsynchronized. No NTP server reachable. Check "ntp server" config, routing, and ACLs.', topic:'4.9' },
  { command:'show port-security interface Fa0/5', output:'Port Security              : Enabled\nPort Status                : Secure-shutdown\nViolation Mode             : Shutdown\nMaximum MAC Addresses      : 1\nSticky MAC Addresses       : 1\nSecurity Violation Count   : 3', errorLines:[1,5], question:'User plugged in a second device and lost connectivity.', options:['Aging time wrong','Port security shutdown — violation count is 3','Sticky MAC misconfigured','Max 1 MAC is fine'], correct:1, explanation:'Port security (max 1 MAC, shutdown mode) triggered. A second MAC caused shutdown. Fix: resolve violation, then shut/no shut.', topic:'5.7' },
  { command:'show spanning-tree vlan 10', output:'VLAN0010\n  Root ID    Priority    61450\n             Address     aabb.cc00.0100\n             This bridge is the root\n  Bridge ID  Priority    61450', errorLines:[1,2], question:'This is an access-layer switch. What is wrong?', options:['Should use rapid-pvst','Access switch should not be root — lower another switch priority','Access switch IS root — its priority should be higher','sys-id-ext incorrect'], correct:2, explanation:'Access switches should not be root bridge. Set distribution/core switch priority lower (e.g. 4096).', topic:'2.4' },
];

// Speedrun commands for daily (10 per daily run)
var SR_POOL = [
  { task:'Set hostname to DAILY-RTR', accepted:['hostname DAILY-RTR','hostname daily-rtr'], mode:'config', topic:'1.1' },
  { task:'Enable password encryption', accepted:['service password-encryption'], mode:'config', topic:'5.3' },
  { task:'Assign IP 10.0.1.1/24 to this interface', accepted:['ip address 10.0.1.1 255.255.255.0','ip addr 10.0.1.1 255.255.255.0'], mode:'config-if', topic:'1.6' },
  { task:'Bring this interface up', accepted:['no shutdown','no shut'], mode:'config-if', topic:'1.1' },
  { task:'Create VLAN 10', accepted:['vlan 10'], mode:'config', topic:'2.2' },
  { task:'Set this port as an access port', accepted:['switchport mode access'], mode:'config-if', topic:'2.2' },
  { task:'Assign this port to VLAN 10', accepted:['switchport access vlan 10'], mode:'config-if', topic:'2.2' },
  { task:'Configure this port as a trunk', accepted:['switchport mode trunk'], mode:'config-if', topic:'2.2' },
  { task:'Add a default route via 10.0.1.1', accepted:['ip route 0.0.0.0 0.0.0.0 10.0.1.1'], mode:'config', topic:'3.3' },
  { task:'Enter OSPF process 1', accepted:['router ospf 1'], mode:'config', topic:'3.4' },
  { task:'Advertise 10.0.1.0/24 in OSPF area 0', accepted:['network 10.0.1.0 0.0.0.255 area 0'], mode:'config-router', topic:'3.4' },
  { task:'Set SSH as transport input', accepted:['transport input ssh'], mode:'config-line', topic:'6.4' },
  { task:'Generate 2048-bit RSA keys', accepted:['crypto key generate rsa modulus 2048','crypto key generate rsa general-keys modulus 2048'], mode:'config', topic:'6.4' },
  { task:'Set NTP server to 10.0.1.100', accepted:['ntp server 10.0.1.100'], mode:'config', topic:'4.9' },
  { task:'Create standard ACL 10 permitting 10.0.1.0/24', accepted:['access-list 10 permit 10.0.1.0 0.0.0.255'], mode:'config', topic:'5.5' },
  { task:'Apply ACL 100 inbound', accepted:['ip access-group 100 in'], mode:'config-if', topic:'5.5' },
  { task:'Mark interface as NAT inside', accepted:['ip nat inside'], mode:'config-if', topic:'4.1' },
  { task:'Enable port security', accepted:['switchport port-security'], mode:'config-if', topic:'5.7' },
  { task:'Enable PortFast on this access port', accepted:['spanning-tree portfast'], mode:'config-if', topic:'2.4' },
  { task:'Save running config to startup', accepted:['copy running-config startup-config','copy run start','write memory','wr','wr mem'], mode:'privileged', topic:'1.1' },

// ═══════════════════════════════════════════════════════════════════
// DETERMINE TODAY'S CHALLENGE
// ═══════════════════════════════════════════════════════════════════
var today = todayStr();
var rng = seededRandom(today);
var dayNum = Math.floor((new Date(today + 'T12:00:00').getTime() - new Date('2026-01-01T12:00:00').getTime()) / 86400000);
var challengeType = dayNum % 3; // 0=whats-wrong, 1=speedrun, 2=quick-config

var TYPE_NAMES = ["What's Wrong?", "Config Speedrun", "Quick Config"];
var TYPE_TAGLINES = [
  "3 rounds of output reading. Spot every error.",

];

// ═══════════════════════════════════════════════════════════════════
// INIT PAGE
// ═══════════════════════════════════════════════════════════════════
function initPage() {
  document.getElementById('daily-date').textContent = formatDate(today);
  document.getElementById('daily-type').textContent = "Today: " + TYPE_NAMES[challengeType];
  document.getElementById('daily-tagline').textContent = TYPE_TAGLINES[challengeType];

  var streakData = getStreakData();
  document.getElementById('daily-streak').textContent = streakData.lastDate === today || streakData.lastDate === yesterdayStr() ? (streakData.current || 0) : 0;
  document.getElementById('daily-best-streak').textContent = streakData.best || 0;
  document.getElementById('daily-total').textContent = streakData.total || 0;

  var result = getDailyResult(today);
  if (result) {
    showCompleted(result);
  }

  loadLeaderboard();
}

function showCompleted(result) {
  document.getElementById('start-area').classList.add('hidden');
  document.getElementById('already-done').classList.remove('hidden');
  document.getElementById('completed-score').textContent = result.score + '/' + result.total;
  document.getElementById('completed-time').textContent = result.time + 's';

  var shareMsg = 'CCNA Daily Challenge ' + today + ' — ' + result.score + '/' + result.total + ' in ' + result.time + 's';
  document.getElementById('share-text').textContent = shareMsg;
}

function copyShare() {
  var text = document.getElementById('share-text').textContent;
  navigator.clipboard.writeText(text).then(function() {
    document.getElementById('share-text').textContent = 'Copied!';
    setTimeout(function() {
      document.getElementById('share-text').textContent = text;
    }, 1500);
  });
}

// ═══════════════════════════════════════════════════════════════════
// LEADERBOARD (Study Group)
// ═══════════════════════════════════════════════════════════════════
function getGroupCode() { return localStorage.getItem('ccna_group_code') || ''; }
function getMemberId() { return localStorage.getItem('ccna_peer_id') || ''; }
function getMyName() { return localStorage.getItem('ccna_peer_name') || 'You'; }

async function loadLeaderboard() {
  var code = getGroupCode();
  if (!code) return;
  try {
    var res = await fetch(API + '/api/group/' + code);
    if (!res.ok) return;
    var data = await res.json();
    if (!data.group || !data.group.events) return;
    var entries = data.group.events.filter(function(e) {
      return e.eventType === 'daily_challenge' && e.date === today;
    });
    if (entries.length === 0) {
      document.getElementById('leaderboard-list').innerHTML = '<div style="color:var(--ink-muted);font-size:.82rem;padding:12px 0">No group results for today yet. Be the first!</div>';
      return;
    }
    entries.sort(function(a, b) {
      if (b.score !== a.score) return b.score - a.score;
      return a.time - b.time;
    });
    var myId = getMemberId();
    var html = '';
    entries.forEach(function(e, i) {
      var rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      var isMe = e.memberId === myId;
      html += '<div class="lb-entry' + (isMe ? ' lb-you' : '') + '">';
      html += '<span class="lb-rank ' + rankClass + '">#' + (i + 1) + '</span>';
      html += '<span class="lb-name">' + escapeHtml(e.name || 'Anonymous') + '</span>';
      html += '<span class="lb-score">' + e.score + '/' + e.total + '</span>';
      html += '<span class="lb-time">' + e.time + 's</span>';
      html += '</div>';
    });
    document.getElementById('leaderboard-list').innerHTML = html;
  } catch(e) { /* silent */ }
}

async function pushToLeaderboard(score, total, time) {
  var code = getGroupCode();
  if (!code) return;
  try {
    await fetch(API + '/api/group/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code: code,
        action: 'event',
        eventType: 'daily_challenge',
        memberId: getMemberId(),
        name: getMyName(),
        score: score,
        total: total,
        time: time,
        date: today
      })
    });
  } catch(e) { /* silent */ }
}

// ═══════════════════════════════════════════════════════════════════
// START CHALLENGE
// ═══════════════════════════════════════════════════════════════════
function startChallenge() {
  if (getDailyResult(today)) return;

  document.getElementById('pre-game').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');

  if (challengeType === 0) startWhatsWrong();
  else if (challengeType === 1) startSpeedrun();
  else startQuickConfig();
}

// ═══════════════════════════════════════════════════════════════════
// TYPE 0: WHAT'S WRONG (3 rounds)
// ═══════════════════════════════════════════════════════════════════
var wrState = { rounds:[], idx:0, correct:0, total:3, startTime:0, timerInterval:null, timeLeft:10, answered:false };

function startWhatsWrong() {
  var pool = seededShuffle(WR_POOL, rng);
  wrState.rounds = pool.slice(0, 3);
  wrState.idx = 0;
  wrState.correct = 0;
  wrState.startTime = Date.now();
  showWRRound();
}

function showWRRound() {
  var s = wrState.rounds[wrState.idx];
  wrState.answered = false;
  wrState.timeLeft = 10;

  var ga = document.getElementById('game-area');
  var html = '<div class="wr-round-label">Round ' + (wrState.idx + 1) + ' of 3</div>';
  html += '<div class="timer-bar-wrap"><div class="timer-bar-fill" id="wr-timer-bar" style="width:100%"></div></div>';
  html += '<div class="wr-command-label">' + escapeHtml(s.command) + '</div>';
  html += '<div class="wr-output" id="wr-output">' + escapeHtml(s.output) + '</div>';
  html += '<div class="wr-question">' + escapeHtml(s.question) + '</div>';
  html += '<div id="wr-options" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">';
  var letters = ['A','B','C','D'];
  s.options.forEach(function(opt, i) {
    html += '<button class="quiz-option" onclick="wrAnswer(' + i + ')"><span class="option-letter">' + letters[i] + '</span><span>' + escapeHtml(opt) + '</span></button>';
  });
  html += '</div>';
  html += '<div id="wr-explain"></div>';
  ga.innerHTML = html;

  // Timer
  clearInterval(wrState.timerInterval);
  wrState.timerInterval = setInterval(function() {
    wrState.timeLeft -= 0.1;
    if (wrState.timeLeft <= 0) {
      wrState.timeLeft = 0;
      clearInterval(wrState.timerInterval);
      wrTimeUp();
    }
    var pct = (wrState.timeLeft / 10) * 100;
    var bar = document.getElementById('wr-timer-bar');
    if (bar) {
      bar.style.width = pct + '%';
      bar.classList.remove('warning','danger');
      if (wrState.timeLeft <= 3) bar.classList.add('danger');
      else if (wrState.timeLeft <= 5) bar.classList.add('warning');
    }
  }, 100);
}

function wrTimeUp() {
  if (wrState.answered) return;
  wrState.answered = true;
  wrHighlight(-1);
  wrAdvance();
}

function wrAnswer(idx) {
  if (wrState.answered) return;
  wrState.answered = true;
  clearInterval(wrState.timerInterval);
  var s = wrState.rounds[wrState.idx];
  var correct = idx === s.correct;
  if (correct) wrState.correct++;
  wrHighlight(idx);
  if (window.store && s.topic) store.updateProficiency(s.topic, correct);
  wrAdvance();
}

function wrHighlight(chosen) {
  var s = wrState.rounds[wrState.idx];
  var opts = document.getElementById('wr-options');
  if (!opts) return;
  var btns = opts.querySelectorAll('.quiz-option');
  btns.forEach(function(btn, i) {
    btn.classList.add('disabled');
    btn.onclick = null;
    if (i === s.correct) btn.classList.add('correct');
    if (i === chosen && chosen !== s.correct) btn.classList.add('wrong');
  });
  // Show error lines
  var outEl = document.getElementById('wr-output');
  if (outEl) {
    var lines = s.output.split('\n');
    outEl.innerHTML = lines.map(function(line, i) {
      if (s.errorLines.indexOf(i) >= 0) return '<span class="error-line">' + escapeHtml(line) + '</span>';
      return escapeHtml(line);
    }).join('\n');
  }
  // Explanation
  var ex = document.getElementById('wr-explain');
  if (ex) {
    ex.innerHTML = '<div class="explanation-box"><strong>' + (chosen === s.correct ? 'Correct!' : 'Not quite.') + '</strong> ' + escapeHtml(s.explanation) + '</div>';
  }
}

function wrAdvance() {
  setTimeout(function() {
    wrState.idx++;
    if (wrState.idx >= 3) {
      finishChallenge(wrState.correct, 3, Math.round((Date.now() - wrState.startTime) / 1000));
    } else {
      showWRRound();
    }
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════════
// TYPE 1: SPEEDRUN (10 commands)
// ═══════════════════════════════════════════════════════════════════
var srState = { commands:[], idx:0, correct:0, total:10, startTime:0, cmdStart:0, timerInterval:null };

function startSpeedrun() {
  var pool = seededShuffle(SR_POOL, rng);
  srState.commands = pool.slice(0, 10);
  srState.idx = 0;
  srState.correct = 0;
  srState.startTime = Date.now();

  // Timer
  clearInterval(srState.timerInterval);
  srState.timerInterval = setInterval(function() {
    var el = document.getElementById('sr-timer');
    if (el) {
      var elapsed = (Date.now() - srState.startTime) / 1000;
      var m = Math.floor(elapsed / 60);
      var s = Math.floor(elapsed % 60);
      el.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }
  }, 100);

  showSRCommand();
}

function showSRCommand() {
  var cmd = srState.commands[srState.idx];
  srState.cmdStart = Date.now();
  var prompt = MODE_PROMPTS[cmd.mode] || 'Router#';

  var ga = document.getElementById('game-area');
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<span style="font-family:var(--font-mono);font-size:.82rem;color:var(--ink-secondary)" id="sr-timer">00:00</span>';
  html += '<span style="font-family:var(--font-mono);font-size:.82rem;font-weight:700">' + srState.correct + '/' + srState.total + '</span>';
  html += '</div>';

  html += '<div class="progress-dots" id="sr-dots">';
  for (var i = 0; i < 10; i++) {
    var cls = i < srState.idx ? (srState.commands[i]._correct ? 'correct' : 'wrong') : (i === srState.idx ? 'current' : '');
    html += '<div class="progress-dot ' + cls + '"></div>';
  }
  html += '</div>';

  html += '<div class="sr-task-card"><div class="sr-mode">' + prompt + '</div><div class="sr-task">' + escapeHtml(cmd.task) + '</div></div>';
  html += '<div class="terminal-wrap"><span class="terminal-prompt">' + prompt + ' </span><input type="text" class="terminal-input" id="sr-input" placeholder="Type command..." autocomplete="off" autocapitalize="off" spellcheck="false"></div>';
  html += '<div class="feedback-bar" id="sr-feedback"></div>';
  ga.innerHTML = html;

  var input = document.getElementById('sr-input');
  input.focus();
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitSR(); }
  });
}

function submitSR() {
  var input = document.getElementById('sr-input');
  if (!input) return;
  var value = input.value.trim();
  if (!value) return;
  input.disabled = true;

  var cmd = srState.commands[srState.idx];
  var norm = value.replace(/\s+/g, ' ').toLowerCase();
  var correct = false;
  for (var i = 0; i < cmd.accepted.length; i++) {
    if (cmd.accepted[i].replace(/\s+/g, ' ').toLowerCase() === norm) { correct = true; break; }
  }
  cmd._correct = correct;
  if (correct) srState.correct++;

  var fb = document.getElementById('sr-feedback');
  if (fb) {
    fb.className = 'feedback-bar show ' + (correct ? 'correct-fb' : 'wrong-fb');
    fb.innerHTML = correct ? 'Correct!' : 'Incorrect — ' + escapeHtml(cmd.accepted[0]);
  }

  if (window.store && cmd.topic) store.updateProficiency(cmd.topic, correct);

  setTimeout(function() {
    srState.idx++;
    if (srState.idx >= 10) {
      clearInterval(srState.timerInterval);
      finishChallenge(srState.correct, 10, Math.round((Date.now() - srState.startTime) / 1000));
    } else {
      showSRCommand();
    }
  }, correct ? 800 : 2000);
}

// ═══════════════════════════════════════════════════════════════════
// TYPE 2: QUICK CONFIG (5 objectives)
// ═══════════════════════════════════════════════════════════════════
var qcState = { config:null, idx:0, correct:0, total:5, startTime:0 };

function startQuickConfig() {
  var pool = seededShuffle(QC_POOL, rng);
  qcState.config = pool[0];
  qcState.idx = 0;
  qcState.correct = 0;
  qcState.startTime = Date.now();
  showQCObjective();
}

function showQCObjective() {
  var obj = qcState.config.objectives[qcState.idx];
  var prompt = MODE_PROMPTS[obj.mode] || 'Router#';

  var ga = document.getElementById('game-area');
  var html = '<div style="font-family:var(--font-display);font-size:.85rem;font-weight:600;margin-bottom:12px">Configure the device — Objective ' + (qcState.idx + 1) + ' of 5</div>';

  // Show all objectives with checkmarks
  html += '<div class="qc-objectives">';
  qcState.config.objectives.forEach(function(o, i) {
    var checkCls = '';
    if (i < qcState.idx) checkCls = o._correct ? 'done' : 'fail';
    html += '<div class="qc-objective">';
    html += '<div class="qc-check ' + checkCls + '"></div>';
    html += '<span style="' + (i === qcState.idx ? 'font-weight:600' : 'color:var(--ink-muted)') + '">' + escapeHtml(o.desc) + '</span>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="terminal-wrap"><span class="terminal-prompt">' + prompt + ' </span><input type="text" class="terminal-input" id="qc-input" placeholder="Type command..." autocomplete="off" autocapitalize="off" spellcheck="false"></div>';
  html += '<div class="feedback-bar" id="qc-feedback"></div>';
  ga.innerHTML = html;

  var input = document.getElementById('qc-input');
  input.focus();
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitQC(); }
  });
}

function submitQC() {
  var input = document.getElementById('qc-input');
  if (!input) return;
  var value = input.value.trim();
  if (!value) return;
  input.disabled = true;

  var obj = qcState.config.objectives[qcState.idx];
  var norm = value.replace(/\s+/g, ' ').toLowerCase();
  var correct = false;
  for (var i = 0; i < obj.accepted.length; i++) {
    if (obj.accepted[i].replace(/\s+/g, ' ').toLowerCase() === norm) { correct = true; break; }
  }
  obj._correct = correct;
  if (correct) qcState.correct++;

  var fb = document.getElementById('qc-feedback');
  if (fb) {
    fb.className = 'feedback-bar show ' + (correct ? 'correct-fb' : 'wrong-fb');
    fb.innerHTML = correct ? 'Correct!' : 'Expected: ' + escapeHtml(obj.accepted[0]);
  }

  if (window.store && qcState.config.topic) store.updateProficiency(qcState.config.topic, correct);

  setTimeout(function() {
    qcState.idx++;
    if (qcState.idx >= 5) {
      finishChallenge(qcState.correct, 5, Math.round((Date.now() - qcState.startTime) / 1000));
    } else {
      showQCObjective();
    }
  }, correct ? 800 : 2000);
}

// ═══════════════════════════════════════════════════════════════════
// FINISH
// ═══════════════════════════════════════════════════════════════════
function finishChallenge(score, total, time) {
  var result = { score: score, total: total, time: time, type: TYPE_NAMES[challengeType], date: today };
  saveDailyResult(today, result);

  // Push to study group
  pushToLeaderboard(score, total, time);

  // Update store
  if (window.store) {
    store.updateStreak();
    store.logStudyTime(Math.max(1, Math.round(time / 60)));
    store.addQuizSession({
      date: new Date().toISOString(),
      type: 'daily-challenge',
      score: score,
      total: total,
      time: time
    });
  }

  // Show results
  document.getElementById('game-area').classList.add('hidden');
  document.getElementById('results-area').classList.remove('hidden');

  var pct = total > 0 ? Math.round((score / total) * 100) : 0;
  var streakData = getStreakData();

  var html = '<div class="daily-result">';
  html += '<h2>' + (pct === 100 ? 'Perfect!' : pct >= 70 ? 'Well Done' : 'Keep Practicing') + '</h2>';
  html += '<div class="result-stats">';
  html += '<div class="result-stat"><div class="value">' + score + '/' + total + '</div><div class="label">Score</div></div>';
  html += '<div class="result-stat"><div class="value">' + time + 's</div><div class="label">Time</div></div>';
  html += '<div class="result-stat"><div class="value">' + (streakData.current || 1) + '</div><div class="label">Day Streak</div></div>';
  html += '</div>';

  var shareMsg = 'CCNA Daily Challenge ' + today + ' — ' + score + '/' + total + ' in ' + time + 's';
  html += '<div class="share-row"><span class="share-text" onclick="copyShareResult(this)">' + escapeHtml(shareMsg) + '</span>';
  html += '<div style="font-size:.68rem;color:var(--ink-muted);margin-top:4px">Click to copy</div></div>';

  html += '<div style="margin-top:var(--s-lg)"><a href="daily-challenge.html" class="btn btn-secondary">Back to Daily Challenge</a></div>';
  html += '</div>';
  document.getElementById('results-area').innerHTML = html;
}

function copyShareResult(el) {
  var text = el.textContent;
  navigator.clipboard.writeText(text).then(function() {
    el.textContent = 'Copied!';
    setTimeout(function() { el.textContent = text; }, 1500);
  });
}

// ═══════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════
function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
