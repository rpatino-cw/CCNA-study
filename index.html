<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCNA 200-301 — Study Dashboard</title>
  <meta name="color-scheme" content="light">
  <meta property="og:title" content="CCNA 200-301 Study System">
  <meta property="og:description" content="Interactive study guide with 97 objectives, quizzes, cheat sheets, and labs — matching the official Cisco exam blueprint.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rpatino-cw.github.io/CCNA-study/">
  <link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* ── Dashboard editorial layout ──────────────────────────── */

    .masthead {
      padding: var(--s-xl) 0 var(--s-lg);
      border-bottom: 2px solid var(--ink);
      margin-bottom: var(--s-2xl);
    }

    .masthead h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .masthead-meta {
      display: flex;
      align-items: baseline;
      gap: var(--s-lg);
      font-family: var(--font-display);
      font-size: 0.82rem;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-top: var(--s-sm);
    }

    .masthead-meta .countdown {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Brief — the "what to do now" section ──────────────── */

    .brief {
      margin-bottom: var(--s-2xl);
    }

    .brief-kicker {
      font-family: var(--font-display);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      margin-bottom: var(--s-xs);
    }

    .brief h2 {
      font-size: 1.8rem;
      border: none;
      padding: 0;
      margin: 0 0 var(--s-sm);
      line-height: 1.2;
    }

    .brief p {
      color: var(--ink-secondary);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: var(--s-lg);
    }

    .brief-actions {
      display: flex;
      gap: var(--s-md);
      flex-wrap: wrap;
    }

    /* ── Metrics strip — inline, not cards ─────────────────── */

    .metrics {
      display: flex;
      gap: var(--s-2xl);
      padding: var(--s-lg) 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      margin-bottom: var(--s-2xl);
      flex-wrap: wrap;
    }

    .metric {
      display: flex;
      flex-direction: column;
    }

    .metric-value {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .metric-label {
      font-family: var(--font-display);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-top: 6px;
    }

    /* ── Domain progress table ─────────────────────────────── */

    .domain-table {
      width: 100%;
      margin-bottom: var(--s-xl);
    }

    .domain-row {
      display: grid;
      grid-template-columns: 36px 1fr 100px 60px 80px;
      align-items: center;
      gap: var(--s-md);
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .domain-row:last-child { border-bottom: none; }

    .domain-row {
      border-radius: var(--radius);
      margin: 0 calc(-1 * var(--s-sm));
      padding-left: var(--s-sm);
      padding-right: var(--s-sm);
      transition: background var(--transition);
    }

    .domain-row:hover { background: var(--bg-recessed); }

    .domain-num {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink-muted);
    }

    .domain-info { min-width: 0; }

    .domain-info .name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.92rem;
      line-height: 1.3;
    }

    .domain-info .weight {
      font-size: 0.78rem;
      color: var(--ink-muted);
    }

    .domain-bar-cell {
      display: flex;
      align-items: center;
      gap: var(--s-sm);
    }

    .domain-pct {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9rem;
      text-align: right;
    }

    .domain-action {
      text-align: right;
    }

    .domain-action a {
      font-family: var(--font-display);
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .domain-action a:hover { text-decoration: underline; }

    @media (max-width: 700px) {
      .domain-row {
        grid-template-columns: 28px 1fr 60px;
      }
      .domain-bar-cell, .domain-action { display: none; }
    }

    /* ── Calendar — compact, collapsed by default ──────────── */

    .calendar-toggle {
      background: none; border: none; cursor: pointer;
      font-family: var(--font-display); font-size: 0.82rem;
      color: var(--ink-secondary); padding: 0;
      text-decoration: underline; text-underline-offset: 3px;
    }

    .calendar-toggle:hover { color: var(--ink); }

    .calendar-body { display: none; margin-top: var(--s-lg); }
    .calendar-body.open { display: block; }

    .week-block { margin-bottom: var(--s-xl); }

    .week-title {
      font-family: var(--font-display);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-bottom: var(--s-sm);
    }

    .day-row {
      display: flex;
      align-items: baseline;
      gap: var(--s-md);
      padding: 6px 0;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--bg-recessed);
    }

    .day-date {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-muted);
      width: 70px;
      flex-shrink: 0;
    }

    .day-topic {
      flex: 1;
      color: var(--ink-secondary);
    }

    .day-row.today { font-weight: 600; }
    .day-row.today .day-topic { color: var(--ink); }
    .day-row.today .day-date { color: var(--accent); font-weight: 600; }

    .day-row.past { opacity: 0.45; }
    .day-row.done .day-topic::after {
      content: ' done';
      font-family: var(--font-display);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--prof-strong);
      margin-left: 8px;
    }

    .day-row.exam-day .day-topic {
      font-weight: 700;
      color: var(--accent);
    }

    /* ── Links section ─────────────────────────────────────── */

    .links-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: var(--s-xl);
    }

    .link-item {
      display: block;
      background: var(--bg-surface);
      padding: var(--s-lg);
      text-decoration: none;
      color: var(--ink);
      transition: background var(--transition);
    }

    .link-item:hover { background: var(--bg-recessed); }
    .link-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    .link-item .link-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .link-item .link-desc {
      font-size: 0.82rem;
      color: var(--ink-muted);
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .links-grid { grid-template-columns: 1fr; }
      .metrics { gap: var(--s-xl); }
      .masthead h1 { font-size: 2.2rem; }
      .brief h2 { font-size: 1.4rem; }
    }

    /* ── Footer ────────────────────────────────────────────── */

    .footer {
      margin-top: var(--s-3xl);
      padding: var(--s-lg) 0;
      border-top: 1px solid var(--rule);
      font-family: var(--font-display);
      font-size: 0.75rem;
      color: var(--ink-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--s-sm);
    }

    .footer button {
      background: none; border: none; cursor: pointer;
      font: inherit; color: var(--accent);
      text-decoration: underline; text-underline-offset: 2px;
    }

    /* ── Welcome modal ─────────────────────────────────── */

    .welcome-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28, 25, 23, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s var(--ease-out) forwards;
    }

    .welcome-modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--s-xl) var(--s-xl) var(--s-lg);
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .welcome-modal h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      border: none;
      margin: 0 0 var(--s-md);
      padding: 0;
    }

    .welcome-modal p {
      font-family: var(--font-body);
      color: var(--ink-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
      margin: 0 auto var(--s-lg);
      max-width: 38ch;
    }

    .welcome-actions {
      display: flex;
      gap: var(--s-md);
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 700px) {
      .study-path-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Navigation -->
    <nav class="top-nav"></nav>
    <script src="js/nav.js?v=3"></script>

    <!-- Masthead -->
    <header class="masthead">
      <h1>CCNA 200-301</h1>
      <div class="masthead-meta">
        <span>Study Dashboard</span>
        <span id="examTarget" style="cursor:pointer;border-bottom:1px dashed var(--ink-muted)" onclick="document.getElementById('examDatePicker').showPicker()">Exam target: set date</span>
        <input type="date" id="examDatePicker" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;" />
        <span class="countdown" id="countdown"></span>
      </div>
    </header>

    <!-- App renders here -->
    <div id="app">
      <p style="color:var(--ink-muted);font-style:italic;">Loading...</p>
    </div>

    <footer class="footer">
      <span>CCNA 200-301 Study System</span>
      <button id="btn-export" onclick="handleExport()">Export progress</button>
      <button onclick="handleImport()">Import progress</button>
      <button onclick="resetEntireSite()">Reset All Stats</button>
    </footer>
  </div>

  <script src="./data/topics-data.js?v=4"></script>
  <script src="./data/questions-data.js?v=4"></script>
  <script src="./js/store.js?v=4"></script>
  <script src="./js/quiz-engine.js?v=4"></script>
  <script>
    const START_DATE = new Date();
    const savedExamDate = localStorage.getItem('ccna_exam_date');
    const EXAM_DATE = savedExamDate ? new Date(savedExamDate) : null;

    // Wire up native date picker
    const datePicker = document.getElementById('examDatePicker');
    if (savedExamDate) datePicker.value = savedExamDate;
    datePicker.addEventListener('change', function() {
      const val = this.value;
      if (!val) return;
      const d = new Date(val + 'T00:00:00');
      if (isNaN(d.getTime())) return;
      localStorage.setItem('ccna_exam_date', val);
      location.reload();
    });

    function updateExamDisplay() {
      const el = document.getElementById('examTarget');
      if (EXAM_DATE) {
        el.textContent = 'Exam: ' + EXAM_DATE.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      } else {
        el.textContent = 'Set exam date';
      }
    }

    const SCHEDULE = [
      { week: 1, label: 'Week 1 — Diagnostic + IOS + VLANs', range: '', days: [
        { topic: 'Take Diagnostic Assessment', desc: 'Map your strengths and weaknesses across all six domains.' },
        { topic: 'Cisco IOS CLI — modes & navigation', desc: 'User EXEC, privileged EXEC, global config, interface config.' },
        { topic: 'Cisco IOS CLI — show commands & config', desc: 'show running-config, show interfaces, copy commands.' },
        { topic: 'VLANs — creating, assigning, verifying', desc: 'Create VLANs, assign access ports, show vlan brief.' },
        { topic: '802.1Q Trunking — config, native VLAN', desc: 'Trunk ports, native VLAN, DTP negotiation.' },
        { topic: 'Lab — Build multi-VLAN topology', desc: 'Packet Tracer: create VLANs, assign ports, configure trunks.' },
        { topic: 'Subnetting drills + review', desc: 'IPv4 subnetting practice. Review Week 1 topics.' },
      ]},
      { week: 2, label: 'Week 2 — STP + EtherChannel + Wireless', range: '', days: [
        { topic: 'STP — root bridge election, port states', desc: 'Bridge priority, root/designated/blocking ports.' },
        { topic: 'STP/RSTP — PortFast, BPDU Guard', desc: 'PortFast, BPDU Guard, RSTP convergence improvements.' },
        { topic: 'EtherChannel — LACP config', desc: 'Port-channel with LACP active, show etherchannel summary.' },
        { topic: 'Wireless — WLC, CAPWAP, AP modes', desc: 'WLC architecture, CAPWAP tunnels, AP modes.' },
        { topic: 'Wireless — WLAN config, WPA2/WPA3', desc: 'WLAN via WLC GUI, WPA2 PSK and Enterprise.' },
        { topic: 'Lab — STP + EtherChannel topology', desc: 'Packet Tracer: STP root election, LACP port-channels.' },
        { topic: 'Review Quiz — Weeks 1–2', desc: 'IOS, VLANs, STP, EtherChannel, wireless.' },
      ]},
      { week: 3, label: 'Week 3 — IPv4/IPv6 + Inter-VLAN Routing', range: '', days: [
        { topic: 'IPv4 subnetting deep dive — CIDR, VLSM', desc: 'Subnetting math, variable-length subnet masks, practice.' },
        { topic: 'IPv6 — address types, GUA, link-local', desc: 'GUA (2000::/3), link-local (FE80::/10), multicast.' },
        { topic: 'IPv6 — SLAAC, NDP, EUI-64', desc: 'Stateless autoconfiguration, Neighbor Discovery Protocol.' },
        { topic: 'Inter-VLAN routing — Router-on-a-Stick', desc: 'Subinterfaces with encapsulation dot1Q.' },
        { topic: 'Inter-VLAN routing — L3 switches, SVIs', desc: 'Switch Virtual Interfaces for inter-VLAN routing.' },
        { topic: 'Lab — IPv6 + inter-VLAN routing', desc: 'Packet Tracer: configure IPv6, RoaS, SVIs.' },
        { topic: 'Retake Diagnostic — measure improvement', desc: 'Compare against Week 1 baseline. Identify remaining gaps.' },
      ]},
      { week: 4, label: 'Week 4 — Static Routing + OSPF Foundations', range: '', days: [
        { topic: 'Static routing — default, network, host', desc: 'ip route for default, network, and host static routes.' },
        { topic: 'Administrative distance + routing table', desc: 'AD values, show ip route interpretation, longest prefix match.' },
        { topic: 'OSPF — neighbor adjacency states, timers', desc: 'Down, Init, 2-Way, ExStart, Exchange, Loading, Full.' },
        { topic: 'OSPF — DR/BDR election, cost', desc: 'DR/BDR on broadcast networks, reference bandwidth, cost calc.' },
        { topic: 'OSPF — single-area config', desc: 'router ospf, network statements, show ip ospf neighbor.' },
        { topic: 'Lab — Multi-router OSPF topology', desc: 'Packet Tracer: 4+ routers, single-area OSPF, verify adjacencies.' },
        { topic: 'Review Quiz — Routing core', desc: 'Static routing, AD, OSPF neighbor states, DR/BDR.' },
      ]},
      { week: 5, label: 'Week 5 — OSPF Deep Dive + FHRP', range: '', days: [
        { topic: 'OSPF — troubleshooting adjacencies', desc: 'Common issues: mismatched timers, areas, network types, MTU.' },
        { topic: 'OSPF — show commands mastery', desc: 'show ip ospf, show ip ospf interface, show ip ospf database.' },
        { topic: 'OSPFv3 — IPv6 OSPF basics', desc: 'OSPFv3 config differences, address families.' },
        { topic: 'HSRP — active/standby, priority', desc: 'HSRP groups, priority election, preemption, virtual IP.' },
        { topic: 'Floating static routes + prefix match', desc: 'Backup routes with higher AD, longest prefix match drill.' },
        { topic: 'Lab — Break and fix OSPF', desc: 'Packet Tracer: find and fix 6 hidden OSPF issues.' },
        { topic: 'Review Quiz — IP Connectivity domain', desc: 'Full IP Connectivity domain (25% of exam).' },
      ]},
      { week: 6, label: 'Week 6 — IP Services', range: '', days: [
        { topic: 'NAT/PAT — static, dynamic, overload', desc: 'Static NAT, dynamic NAT pools, PAT with overload keyword.' },
        { topic: 'DHCP — server config, relay, DORA', desc: 'ip dhcp pool, excluded-addresses, ip helper-address.' },
        { topic: 'DNS concepts + NTP configuration', desc: 'DNS resolution flow, NTP server/client, clock set.' },
        { topic: 'Syslog + SNMP (v2c/v3)', desc: 'Syslog severity levels, SNMP community strings, traps.' },
        { topic: 'SSH config + QoS concepts', desc: 'SSH setup, DSCP values, classification, marking, queuing.' },
        { topic: 'Lab — NAT/PAT + DHCP config', desc: 'Packet Tracer: configure NAT overload, DHCP server + relay.' },
        { topic: 'Review Quiz — IP Services', desc: 'NAT, DHCP, DNS, NTP, Syslog, SNMP, QoS.' },
      ]},
      { week: 7, label: 'Week 7 — Security Fundamentals', range: '', days: [
        { topic: 'ACLs — standard, numbered', desc: 'Standard ACLs (source only), permit/deny syntax, placement.' },
        { topic: 'ACLs — extended, named, placement', desc: 'Extended ACLs, named ACLs, inbound vs outbound placement.' },
        { topic: 'Port security — violation modes', desc: 'switchport port-security, restrict/protect/shutdown modes.' },
        { topic: 'DHCP snooping + DAI', desc: 'Enable snooping, trusted ports, Dynamic ARP Inspection.' },
        { topic: 'AAA + 802.1X + VPN types', desc: 'AAA concepts, 802.1X port-based auth, site-to-site vs remote.' },
        { topic: 'Lab — ACLs + port security', desc: 'Packet Tracer: write and apply ACLs, configure port security.' },
        { topic: 'Review Quiz — Security domain', desc: 'ACLs, port security, DHCP snooping, DAI, VPN, AAA.' },
      ]},
      { week: 8, label: 'Week 8 — Automation + Programmability', range: '', days: [
        { topic: 'REST APIs — methods and payloads', desc: 'GET, POST, PUT, DELETE, status codes, headers.' },
        { topic: 'JSON data format + API practice', desc: 'JSON structure, nested objects, arrays, parsing.' },
        { topic: 'SDN — controller-based networking', desc: 'Underlay vs overlay, northbound/southbound APIs.' },
        { topic: 'Cisco DNA Center + SD-WAN/SD-Access', desc: 'Intent-based networking, SD architecture, fabric.' },
        { topic: 'Ansible + v1.1 additions', desc: 'Playbooks, modules, idempotency. GenAI/cloud concepts.' },
        { topic: 'Lab — JSON + REST API practice', desc: 'Read/write JSON payloads, practice API calls.' },
        { topic: 'Full domain review quiz — all 6 domains', desc: 'Comprehensive review. Identify remaining weak areas.' },
      ]},
      { week: 9, label: 'Week 9 — Practice Exams Begin', range: '', days: [
        { topic: 'Exam simulation #1', desc: 'Timed 120-minute, 102-question simulation.' },
        { topic: 'Review exam #1 — drill wrong answers', desc: 'Analyze every wrong answer. Study underlying concepts.' },
        { topic: 'Exam simulation #2', desc: 'Second full-length simulation. Track improvement.' },
        { topic: 'Review exam #2 — drill wrong answers', desc: 'Pattern recognition on weak areas across both exams.' },
        { topic: 'Targeted weak area quizzes', desc: 'Focus on lowest-scoring domains from simulations.' },
        { topic: 'Targeted weak area quizzes', desc: 'Continue drilling weak areas. Subnetting speed drills.' },
        { topic: 'Subnetting speed drills', desc: 'Rapid-fire: IP/mask to network/broadcast/range. Target <30s.' },
      ]},
      { week: 10, label: 'Week 10 — Boson + Drilling', range: '', days: [
        { topic: 'Boson ExSim practice exam #1', desc: 'Full Boson exam. Read every explanation — they are gold.' },
        { topic: 'Review Boson #1 — deep explanations', desc: 'Study Boson explanations for every question, right or wrong.' },
        { topic: 'Boson ExSim practice exam #2', desc: 'Second Boson exam. Track score improvement.' },
        { topic: 'Review Boson #2', desc: 'Focus on patterns in wrong answers.' },
        { topic: 'Cisco command rapid-fire review', desc: 'Quick-reference review of all critical show/config commands.' },
        { topic: 'Targeted weak domain drilling', desc: 'Final push on weakest areas. Flash cards.' },
        { topic: 'Schedule exam when scoring 850+', desc: 'Book your Pearson VUE slot. You should be ready.' },
      ]},
      { week: 11, label: 'Week 11 — Final Push', range: '', days: [
        { topic: 'Final exam simulation — aim for 85%+', desc: 'Last full simulation. Confidence builder.' },
        { topic: 'Subnetting speed drills', desc: 'Target <30 seconds per question. Build automaticity.' },
        { topic: 'Cisco show command review', desc: 'Final review of all IOS commands you need to know.' },
        { topic: 'Light review — flash cards only', desc: 'Brief review. Do not cram. Stay confident.' },
        { topic: 'Very light review — rest', desc: 'Very light review only. Focus on sleep and rest.' },
        { topic: 'Rest — prep exam logistics', desc: 'No studying. Prepare ID, directions, exam logistics.' },
        { topic: 'EXAM DAY', desc: 'You are ready. Trust your preparation.' },
      ]},
    ];

    // ── Utilities ─────────────────────────────────────────
    function getToday() { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()); }
    function dateDiffDays(a, b) { return Math.round((b - a) / 86400000); }
    function formatDateShort(d) { return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()] + ' ' + d.getDate(); }
    function getScheduleDate(w, d) { const dt = new Date(START_DATE); dt.setDate(dt.getDate() + w * 7 + d); return dt; }
    function getCurrentSchedulePosition() {
      const ds = dateDiffDays(START_DATE, getToday());
      return ds < 0 ? { week: 0, day: 0, daysSinceStart: ds } : { week: Math.floor(ds / 7), day: ds % 7, daysSinceStart: ds };
    }
    function getDaysUntilExam() { return EXAM_DATE ? dateDiffDays(getToday(), EXAM_DATE) : null; }
    function isFirstVisit() { return Object.keys(store.getAllProficiency()).length === 0 && store.getQuizHistory().length === 0 && !store.getDiagnostic(); }
    function profColor(s) { return s >= 0.7 ? 'green' : s >= 0.4 ? 'yellow' : 'red'; }
    function profColorVar(s) { return s >= 0.7 ? 'var(--prof-strong)' : s >= 0.4 ? 'var(--prof-mid)' : 'var(--prof-weak)'; }

    // ── Render ────────────────────────────────────────────
    function renderCountdown() {
      const d = getDaysUntilExam(), el = document.getElementById('countdown');
      if (d === null) { el.textContent = ''; return; }
      el.textContent = d > 0 ? `${d} days remaining` : d === 0 ? 'Exam day' : 'Exam completed';
    }

    function renderApp(topicsData) {
      store.initProficiency(topicsData);
      const app = document.getElementById('app');
      const domains = topicsData.domains;
      const stats = quizEngine.getStudyStats(domains);
      const pos = getCurrentSchedulePosition();

      let html = '';
      html += isFirstVisit() ? renderWelcome() : renderBrief(pos);
      html += renderMetrics(stats);
      html += renderDailyGoals(stats);
      html += renderIntro();
      html += renderDomains(domains);
      html += renderLinks();
      html += renderCalendar();
      app.innerHTML = html;

      const calToggle = document.getElementById('cal-toggle');
      const calBody = document.getElementById('cal-body');
      if (calToggle && calBody) {
        calToggle.addEventListener('click', () => {
          const open = calBody.classList.toggle('open');

      for (let w = 0; w < SCHEDULE.length; w++) {
        const wk = SCHEDULE[w];
        html += `<div class="week-block"><div class="week-title">${wk.label} &middot; ${wk.range}</div>`;
        for (let d = 0; d < wk.days.length; d++) {
          const dd = wk.days[d];
          const date = getScheduleDate(w, d);
          const ds = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
          const isToday = date.getTime() === today.getTime();
          const isPast = date < today && !isToday;
          const isDone = studied.has(ds);
          const isExam = dd.topic === 'EXAM DAY';
          let cls = 'day-row';
          if (isToday) cls += ' today';

          const dl = d < 7 ? dayLabels[d] : 'Mon';
          html += `<div class="${cls}"><span class="day-date">${dl} ${formatDateShort(date)}</span><span class="day-topic">${dd.topic}</span></div>`;
        }
        html += '</div>';
      }
      return html + '</div>';

            store.importAll(ev.target.result);
            location.reload();
          } catch (err) {
            alert('Invalid progress file: ' + err.message);

        };
        reader.readAsText(file);
      });
      input.click();

    // ── Guided Tour ───────────────────────────────────────────
    (function guidedTour() {
      if (localStorage.getItem('ccna_tour_done')) return;
      // Wait a beat for DOM to settle
      setTimeout(startTour, 800);

      const STEPS = [
        { el: '#examTarget',   text: 'Set your exam date here — you\'ll get a live countdown.', pos: 'below' },
        { el: 'nav.top-nav',   text: 'Navigate between tools: quizzes, labs, visuals, strategy.', pos: 'below' },
        { el: 'nav.top-nav a[href="diagnostic.html"]', text: 'Start with the Diagnostic to find your weak spots.', pos: 'below' },
        { el: 'nav.top-nav a[href="learn-visually.html"]', text: 'Learn Visually — every concept drawn as a diagram.', pos: 'below' },
      ];

      let current = 0;
      let backdrop, tooltip, skipBtn;

      function startTour() {
        // Inject styles once
        const style = document.createElement('style');
        style.textContent = `
          .tour-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.25); z-index:9998; transition:opacity 0.3s; }
          .tour-tooltip {
            position:absolute; z-index:9999; max-width:280px; padding:12px 16px;
            background:var(--bg-surface,#fff); border:1px solid var(--border,#E2DFD9);
            border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.12);
            font-family:var(--font-display,'Space Grotesk',sans-serif); font-size:0.85rem;
            color:var(--ink,#1C1917); line-height:1.5; opacity:0; transition:opacity 0.35s, transform 0.35s;
            transform:translateY(8px); pointer-events:auto;
          }
          .tour-tooltip.visible { opacity:1; transform:translateY(0); }
          .tour-tooltip::before {
            content:''; position:absolute; top:-6px; left:24px;
            width:12px; height:12px; background:var(--bg-surface,#fff);
            border-left:1px solid var(--border,#E2DFD9); border-top:1px solid var(--border,#E2DFD9);
            transform:rotate(45deg);
          }
          .tour-actions { display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:8px; }
          .tour-next { font-family:var(--font-display); font-size:0.78rem; font-weight:600; padding:5px 14px;
            background:var(--ink,#1C1917); color:var(--bg,#FAF7F2); border:none; border-radius:4px; cursor:pointer; }
          .tour-skip { font-family:var(--font-display); font-size:0.72rem; color:var(--ink-muted,#A8A29E);
            background:none; border:none; cursor:pointer; text-decoration:underline; text-underline-offset:2px; }
          .tour-step { font-family:var(--font-mono); font-size:0.68rem; color:var(--ink-muted,#A8A29E); }
          .tour-highlight { position:relative; z-index:9999; }
        `;
        document.head.appendChild(style);

        backdrop = document.createElement('div');
        backdrop.className = 'tour-backdrop';
        backdrop.addEventListener('click', endTour);
        document.body.appendChild(backdrop);

        tooltip = document.createElement('div');
        tooltip.className = 'tour-tooltip';
        document.body.appendChild(tooltip);

        showStep(0);
      }

      function showStep(i) {
        current = i;
        if (i >= STEPS.length) { endTour(); return; }

        const step = STEPS[i];
        const target = document.querySelector(step.el);
        if (!target) { showStep(i + 1); return; } // skip if element missing

        // Remove previous highlight
        document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
        target.classList.add('tour-highlight');

        // Scroll into view
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // Position tooltip
        tooltip.classList.remove('visible');
        tooltip.innerHTML = `
          <div>${step.text}</div>
          <div class="tour-actions">
            <button class="tour-skip" onclick="this.closest('.tour-tooltip').__endTour()">Skip tour</button>
            <span class="tour-step">${i + 1}/${STEPS.length}</span>
            <button class="tour-next" onclick="this.closest('.tour-tooltip').__nextStep()">${i === STEPS.length - 1 ? 'Done' : 'Next'}</button>
          </div>
        `;
        tooltip.__endTour = endTour;
        tooltip.__nextStep = () => showStep(i + 1);

        // Position below target
        requestAnimationFrame(() => {
          const rect = target.getBoundingClientRect();
          tooltip.style.top = (window.scrollY + rect.bottom + 10) + 'px';
          tooltip.style.left = Math.max(12, Math.min(rect.left, window.innerWidth - 300)) + 'px';
          requestAnimationFrame(() => tooltip.classList.add('visible'));
        });
      }

      function endTour() {
        localStorage.setItem('ccna_tour_done', '1');
        document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
        if (tooltip) { tooltip.classList.remove('visible'); setTimeout(() => tooltip.remove(), 350); }
        if (backdrop) { backdrop.style.opacity = '0'; setTimeout(() => backdrop.remove(), 300); }
      }
    })();
  </script>
<script src="js/tutor.js"></script>
</body>
</html>
