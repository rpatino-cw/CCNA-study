<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCNA 200-301 — Study Dashboard</title>
  <meta name="color-scheme" content="light">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* ── Dashboard editorial layout ──────────────────────────── */

    .masthead {
      padding: var(--s-xl) 0 var(--s-lg);
      border-bottom: 2px solid var(--ink);
      margin-bottom: var(--s-2xl);
    }

    .masthead h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .masthead-meta {
      display: flex;
      align-items: baseline;
      gap: var(--s-lg);
      font-family: var(--font-display);
      font-size: 0.82rem;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-top: var(--s-sm);
    }

    .masthead-meta .countdown {
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Brief — the "what to do now" section ──────────────── */

    .brief {
      margin-bottom: var(--s-2xl);
    }

    .brief-kicker {
      font-family: var(--font-display);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      margin-bottom: var(--s-xs);
    }

    .brief h2 {
      font-size: 1.8rem;
      border: none;
      padding: 0;
      margin: 0 0 var(--s-sm);
      line-height: 1.2;
    }

    .brief p {
      color: var(--ink-secondary);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: var(--s-lg);
    }

    .brief-actions {
      display: flex;
      gap: var(--s-md);
      flex-wrap: wrap;
    }

    /* ── Metrics strip — inline, not cards ─────────────────── */

    .metrics {
      display: flex;
      gap: var(--s-2xl);
      padding: var(--s-lg) 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      margin-bottom: var(--s-2xl);
      flex-wrap: wrap;
    }

    .metric {
      display: flex;
      flex-direction: column;
    }

    .metric-value {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .metric-label {
      font-family: var(--font-display);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-top: 6px;
    }

    /* ── Domain progress table ─────────────────────────────── */

    .domain-table {
      width: 100%;
      margin-bottom: var(--s-xl);
    }

    .domain-row {
      display: grid;
      grid-template-columns: 36px 1fr 100px 60px 80px;
      align-items: center;
      gap: var(--s-md);
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .domain-row:last-child { border-bottom: none; }

    .domain-row {
      border-radius: var(--radius);
      margin: 0 calc(-1 * var(--s-sm));
      padding-left: var(--s-sm);
      padding-right: var(--s-sm);
      transition: background var(--transition);
    }

    .domain-row:hover { background: var(--bg-recessed); }

    .domain-num {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink-muted);
    }

    .domain-info { min-width: 0; }

    .domain-info .name {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.92rem;
      line-height: 1.3;
    }

    .domain-info .weight {
      font-size: 0.78rem;
      color: var(--ink-muted);
    }

    .domain-bar-cell {
      display: flex;
      align-items: center;
      gap: var(--s-sm);
    }

    .domain-pct {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9rem;
      text-align: right;
    }

    .domain-action {
      text-align: right;
    }

    .domain-action a {
      font-family: var(--font-display);
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .domain-action a:hover { text-decoration: underline; }

    @media (max-width: 700px) {
      .domain-row {
        grid-template-columns: 28px 1fr 60px;
      }
      .domain-bar-cell, .domain-action { display: none; }
    }

    /* ── Calendar — compact, collapsed by default ──────────── */

    .calendar-toggle {
      background: none; border: none; cursor: pointer;
      font-family: var(--font-display); font-size: 0.82rem;
      color: var(--ink-secondary); padding: 0;
      text-decoration: underline; text-underline-offset: 3px;
    }

    .calendar-toggle:hover { color: var(--ink); }

    .calendar-body { display: none; margin-top: var(--s-lg); }
    .calendar-body.open { display: block; }

    .week-block { margin-bottom: var(--s-xl); }

    .week-title {
      font-family: var(--font-display);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-bottom: var(--s-sm);
    }

    .day-row {
      display: flex;
      align-items: baseline;
      gap: var(--s-md);
      padding: 6px 0;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--bg-recessed);
    }

    .day-date {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-muted);
      width: 70px;
      flex-shrink: 0;
    }

    .day-topic {
      flex: 1;
      color: var(--ink-secondary);
    }

    .day-row.today { font-weight: 600; }
    .day-row.today .day-topic { color: var(--ink); }
    .day-row.today .day-date { color: var(--accent); font-weight: 600; }

    .day-row.past { opacity: 0.45; }
    .day-row.done .day-topic::after {
      content: ' done';
      font-family: var(--font-display);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--prof-strong);
      margin-left: 8px;
    }

    .day-row.exam-day .day-topic {
      font-weight: 700;
      color: var(--accent);
    }

    /* ── Links section ─────────────────────────────────────── */

    .links-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: var(--s-xl);
    }

    .link-item {
      display: block;
      background: var(--bg-surface);
      padding: var(--s-lg);
      text-decoration: none;
      color: var(--ink);
      transition: background var(--transition);
    }

    .link-item:hover { background: var(--bg-recessed); }
    .link-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    .link-item .link-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .link-item .link-desc {
      font-size: 0.82rem;
      color: var(--ink-muted);
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .links-grid { grid-template-columns: 1fr; }
      .metrics { gap: var(--s-xl); }
      .masthead h1 { font-size: 2.2rem; }
      .brief h2 { font-size: 1.4rem; }
    }

    /* ── Footer ────────────────────────────────────────────── */

    .footer {
      margin-top: var(--s-3xl);
      padding: var(--s-lg) 0;
      border-top: 1px solid var(--rule);
      font-family: var(--font-display);
      font-size: 0.75rem;
      color: var(--ink-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--s-sm);
    }

    .footer button {
      background: none; border: none; cursor: pointer;
      font: inherit; color: var(--accent);
      text-decoration: underline; text-underline-offset: 2px;
    }
  </style>
</head>

  <div class="container">
    <!-- Navigation -->
    <nav class="top-nav">
      <a class="active" href="index.html">Dashboard</a>
      <a href="knowledge-map.html">Knowledge Map</a>
      <a href="diagnostic.html">Diagnostic</a>

    <!-- Masthead -->
    <header class="masthead">
      <h1>CCNA 200-301</h1>
      <div class="masthead-meta">
        <span>Study Dashboard</span>
        <span>Exam target: June 15, 2026</span>
        <span class="countdown" id="countdown"></span>
      </div>
    </header>

    <!-- App renders here -->
    <div id="app">
      <p style="color:var(--ink-muted);font-style:italic;">Loading...</p>
    </div>

    <footer class="footer">
      <span>CCNA 200-301 Study System</span>
      <button id="btn-export" onclick="handleExport()">Export progress</button>
      <button onclick="resetEntireSite()">Reset All Stats</button>
    </footer>
  </div>

  <script src="./data/topics-data.js"></script>
  <script src="./data/questions-data.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/quiz-engine.js"></script>
  <script>
    const START_DATE = new Date(2026, 2, 31);
    const EXAM_DATE  = new Date(2026, 5, 15);

    const SCHEDULE = [
      { week: 1, label: 'Week 1 — Diagnostic + IOS + VLANs', range: 'Mar 31–Apr 6', days: [
        { topic: 'Take Diagnostic Assessment', desc: 'Map your strengths and weaknesses across all six domains.' },
        { topic: 'Cisco IOS CLI — modes & navigation', desc: 'User EXEC, privileged EXEC, global config, interface config.' },
        { topic: 'Cisco IOS CLI — show commands & config', desc: 'show running-config, show interfaces, copy commands.' },
        { topic: 'VLANs — creating, assigning, verifying', desc: 'Create VLANs, assign access ports, show vlan brief.' },
        { topic: '802.1Q Trunking — config, native VLAN', desc: 'Trunk ports, native VLAN, DTP negotiation.' },
        { topic: 'Lab — Build multi-VLAN topology', desc: 'Packet Tracer: create VLANs, assign ports, configure trunks.' },
        { topic: 'Subnetting drills + review', desc: 'IPv4 subnetting practice. Review Week 1 topics.' },
      ]},
      { week: 2, label: 'Week 2 — STP + EtherChannel + Wireless', range: 'Apr 7–13', days: [
        { topic: 'STP — root bridge election, port states', desc: 'Bridge priority, root/designated/blocking ports.' },
        { topic: 'STP/RSTP — PortFast, BPDU Guard', desc: 'PortFast, BPDU Guard, RSTP convergence improvements.' },
        { topic: 'EtherChannel — LACP config', desc: 'Port-channel with LACP active, show etherchannel summary.' },
        { topic: 'Wireless — WLC, CAPWAP, AP modes', desc: 'WLC architecture, CAPWAP tunnels, AP modes.' },
        { topic: 'Wireless — WLAN config, WPA2/WPA3', desc: 'WLAN via WLC GUI, WPA2 PSK and Enterprise.' },
        { topic: 'Lab — STP + EtherChannel topology', desc: 'Packet Tracer: STP root election, LACP port-channels.' },
        { topic: 'Review Quiz — Weeks 1–2', desc: 'IOS, VLANs, STP, EtherChannel, wireless.' },
      ]},
      { week: 3, label: 'Week 3 — IPv4/IPv6 + Inter-VLAN Routing', range: 'Apr 14–20', days: [
        { topic: 'IPv4 subnetting deep dive — CIDR, VLSM', desc: 'Subnetting math, variable-length subnet masks, practice.' },
        { topic: 'IPv6 — address types, GUA, link-local', desc: 'GUA (2000::/3), link-local (FE80::/10), multicast.' },
        { topic: 'IPv6 — SLAAC, NDP, EUI-64', desc: 'Stateless autoconfiguration, Neighbor Discovery Protocol.' },
        { topic: 'Inter-VLAN routing — Router-on-a-Stick', desc: 'Subinterfaces with encapsulation dot1Q.' },
        { topic: 'Inter-VLAN routing — L3 switches, SVIs', desc: 'Switch Virtual Interfaces for inter-VLAN routing.' },
        { topic: 'Lab — IPv6 + inter-VLAN routing', desc: 'Packet Tracer: configure IPv6, RoaS, SVIs.' },
        { topic: 'Retake Diagnostic — measure improvement', desc: 'Compare against Week 1 baseline. Identify remaining gaps.' },
      ]},
      { week: 4, label: 'Week 4 — Static Routing + OSPF Foundations', range: 'Apr 21–27', days: [
        { topic: 'Static routing — default, network, host', desc: 'ip route for default, network, and host static routes.' },
        { topic: 'Administrative distance + routing table', desc: 'AD values, show ip route interpretation, longest prefix match.' },
        { topic: 'OSPF — neighbor adjacency states, timers', desc: 'Down, Init, 2-Way, ExStart, Exchange, Loading, Full.' },
        { topic: 'OSPF — DR/BDR election, cost', desc: 'DR/BDR on broadcast networks, reference bandwidth, cost calc.' },
        { topic: 'OSPF — single-area config', desc: 'router ospf, network statements, show ip ospf neighbor.' },
        { topic: 'Lab — Multi-router OSPF topology', desc: 'Packet Tracer: 4+ routers, single-area OSPF, verify adjacencies.' },
        { topic: 'Review Quiz — Routing core', desc: 'Static routing, AD, OSPF neighbor states, DR/BDR.' },
      ]},
      { week: 5, label: 'Week 5 — OSPF Deep Dive + FHRP', range: 'Apr 28–May 4', days: [
        { topic: 'OSPF — troubleshooting adjacencies', desc: 'Common issues: mismatched timers, areas, network types, MTU.' },
        { topic: 'OSPF — show commands mastery', desc: 'show ip ospf, show ip ospf interface, show ip ospf database.' },
        { topic: 'OSPFv3 — IPv6 OSPF basics', desc: 'OSPFv3 config differences, address families.' },
        { topic: 'HSRP — active/standby, priority', desc: 'HSRP groups, priority election, preemption, virtual IP.' },
        { topic: 'Floating static routes + prefix match', desc: 'Backup routes with higher AD, longest prefix match drill.' },
        { topic: 'Lab — Break and fix OSPF', desc: 'Packet Tracer: find and fix 6 hidden OSPF issues.' },
        { topic: 'Review Quiz — IP Connectivity domain', desc: 'Full IP Connectivity domain (25% of exam).' },
      ]},
      { week: 6, label: 'Week 6 — IP Services', range: 'May 5–11', days: [
        { topic: 'NAT/PAT — static, dynamic, overload', desc: 'Static NAT, dynamic NAT pools, PAT with overload keyword.' },
        { topic: 'DHCP — server config, relay, DORA', desc: 'ip dhcp pool, excluded-addresses, ip helper-address.' },
        { topic: 'DNS concepts + NTP configuration', desc: 'DNS resolution flow, NTP server/client, clock set.' },
        { topic: 'Syslog + SNMP (v2c/v3)', desc: 'Syslog severity levels, SNMP community strings, traps.' },
        { topic: 'SSH config + QoS concepts', desc: 'SSH setup, DSCP values, classification, marking, queuing.' },
        { topic: 'Lab — NAT/PAT + DHCP config', desc: 'Packet Tracer: configure NAT overload, DHCP server + relay.' },
        { topic: 'Review Quiz — IP Services', desc: 'NAT, DHCP, DNS, NTP, Syslog, SNMP, QoS.' },
      ]},
      { week: 7, label: 'Week 7 — Security Fundamentals', range: 'May 12–18', days: [
        { topic: 'ACLs — standard, numbered', desc: 'Standard ACLs (source only), permit/deny syntax, placement.' },
        { topic: 'ACLs — extended, named, placement', desc: 'Extended ACLs, named ACLs, inbound vs outbound placement.' },
        { topic: 'Port security — violation modes', desc: 'switchport port-security, restrict/protect/shutdown modes.' },
        { topic: 'DHCP snooping + DAI', desc: 'Enable snooping, trusted ports, Dynamic ARP Inspection.' },
        { topic: 'AAA + 802.1X + VPN types', desc: 'AAA concepts, 802.1X port-based auth, site-to-site vs remote.' },
        { topic: 'Lab — ACLs + port security', desc: 'Packet Tracer: write and apply ACLs, configure port security.' },
        { topic: 'Review Quiz — Security domain', desc: 'ACLs, port security, DHCP snooping, DAI, VPN, AAA.' },
      ]},
      { week: 8, label: 'Week 8 — Automation + Programmability', range: 'May 19–25', days: [
        { topic: 'REST APIs — methods and payloads', desc: 'GET, POST, PUT, DELETE, status codes, headers.' },
        { topic: 'JSON data format + API practice', desc: 'JSON structure, nested objects, arrays, parsing.' },
        { topic: 'SDN — controller-based networking', desc: 'Underlay vs overlay, northbound/southbound APIs.' },
        { topic: 'Cisco DNA Center + SD-WAN/SD-Access', desc: 'Intent-based networking, SD architecture, fabric.' },
        { topic: 'Ansible + v1.1 additions', desc: 'Playbooks, modules, idempotency. GenAI/cloud concepts.' },
        { topic: 'Lab — JSON + REST API practice', desc: 'Read/write JSON payloads, practice API calls.' },
        { topic: 'Full domain review quiz — all 6 domains', desc: 'Comprehensive review. Identify remaining weak areas.' },
      ]},
      { week: 9, label: 'Week 9 — Practice Exams Begin', range: 'May 26–Jun 1', days: [
        { topic: 'Exam simulation #1', desc: 'Timed 120-minute, 102-question simulation.' },
        { topic: 'Review exam #1 — drill wrong answers', desc: 'Analyze every wrong answer. Study underlying concepts.' },
        { topic: 'Exam simulation #2', desc: 'Second full-length simulation. Track improvement.' },
        { topic: 'Review exam #2 — drill wrong answers', desc: 'Pattern recognition on weak areas across both exams.' },
        { topic: 'Targeted weak area quizzes', desc: 'Focus on lowest-scoring domains from simulations.' },
        { topic: 'Targeted weak area quizzes', desc: 'Continue drilling weak areas. Subnetting speed drills.' },
        { topic: 'Subnetting speed drills', desc: 'Rapid-fire: IP/mask to network/broadcast/range. Target <30s.' },
      ]},
      { week: 10, label: 'Week 10 — Boson + Drilling', range: 'Jun 2–8', days: [
        { topic: 'Boson ExSim practice exam #1', desc: 'Full Boson exam. Read every explanation — they are gold.' },
        { topic: 'Review Boson #1 — deep explanations', desc: 'Study Boson explanations for every question, right or wrong.' },
        { topic: 'Boson ExSim practice exam #2', desc: 'Second Boson exam. Track score improvement.' },
        { topic: 'Review Boson #2', desc: 'Focus on patterns in wrong answers.' },
        { topic: 'Cisco command rapid-fire review', desc: 'Quick-reference review of all critical show/config commands.' },
        { topic: 'Targeted weak domain drilling', desc: 'Final push on weakest areas. Flash cards.' },
        { topic: 'Schedule exam when scoring 850+', desc: 'Book your Pearson VUE slot. You should be ready.' },
      ]},
      { week: 11, label: 'Week 11 — Final Push', range: 'Jun 9–15', days: [
        { topic: 'Final exam simulation — aim for 85%+', desc: 'Last full simulation. Confidence builder.' },
        { topic: 'Subnetting speed drills', desc: 'Target <30 seconds per question. Build automaticity.' },
        { topic: 'Cisco show command review', desc: 'Final review of all IOS commands you need to know.' },
        { topic: 'Light review — flash cards only', desc: 'Brief review. Do not cram. Stay confident.' },
        { topic: 'Very light review — rest', desc: 'Very light review only. Focus on sleep and rest.' },
        { topic: 'Rest — prep exam logistics', desc: 'No studying. Prepare ID, directions, exam logistics.' },
        { topic: 'EXAM DAY', desc: 'You are ready. Trust your preparation.' },
      ]},
    ];

    // ── Utilities ─────────────────────────────────────────
    function getToday() { const n = new Date(); return new Date(n.getFullYear(), n.getMonth(), n.getDate()); }
    function dateDiffDays(a, b) { return Math.round((b - a) / 86400000); }
    function formatDateShort(d) { return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()] + ' ' + d.getDate(); }
    function getScheduleDate(w, d) { const dt = new Date(START_DATE); dt.setDate(dt.getDate() + w * 7 + d); return dt; }
    function getCurrentSchedulePosition() {
      const ds = dateDiffDays(START_DATE, getToday());
      return ds < 0 ? { week: 0, day: 0, daysSinceStart: ds } : { week: Math.floor(ds / 7), day: ds % 7, daysSinceStart: ds };
    }
    function getDaysUntilExam() { return dateDiffDays(getToday(), EXAM_DATE); }
    function isFirstVisit() { return Object.keys(store.getAllProficiency()).length === 0 && store.getQuizHistory().length === 0 && !store.getDiagnostic(); }
    function profColor(s) { return s >= 0.7 ? 'green' : s >= 0.4 ? 'yellow' : 'red'; }
    function profColorVar(s) { return s >= 0.7 ? 'var(--prof-strong)' : s >= 0.4 ? 'var(--prof-mid)' : 'var(--prof-weak)'; }

    // ── Render ────────────────────────────────────────────
    function renderCountdown() {
      const d = getDaysUntilExam(), el = document.getElementById('countdown');
      el.textContent = d > 0 ? `${d} days remaining` : d === 0 ? 'Exam day' : 'Exam completed';
    }

    function renderApp(topicsData) {
      store.initProficiency(topicsData);
      const app = document.getElementById('app');
      const domains = topicsData.domains;
      const stats = quizEngine.getStudyStats(domains);
      const pos = getCurrentSchedulePosition();

      let html = '';
      html += isFirstVisit() ? renderWelcome() : renderBrief(pos);
      html += renderMetrics(stats);
      html += renderDomains(domains);
      html += renderLinks();
      html += renderCalendar();
      app.innerHTML = html;

      const calToggle = document.getElementById('cal-toggle');
      const calBody = document.getElementById('cal-body');
      if (calToggle && calBody) {
        calToggle.addEventListener('click', () => {
          const open = calBody.classList.toggle('open');
          calToggle.textContent = open ? 'hide calendar' : 'show calendar';
        });
      }
    }

    function renderWelcome() {
      return `
        <div class="brief">
          <div class="brief-kicker">Getting started</div>
          <h2>Take the Diagnostic Assessment</h2>
          <p>You have 7 years of IT experience and a stack of certs. The diagnostic will figure out exactly what you already know and what the CCNA will actually test you on — so you don't waste time on topics you've already mastered.</p>
          <div class="brief-actions">
            <a href="diagnostic.html" class="btn btn-primary btn-lg">Start Diagnostic</a>
            <a href="quiz.html?mode=random" class="btn btn-secondary">Skip to a quick quiz</a>
          </div>
        </div>
      `;
    }

    const DOMAIN_NAMES = {
      '1': 'Network Fundamentals', '2': 'Network Access',
      '3': 'IP Connectivity',      '4': 'IP Services',
      '5': 'Security',             '6': 'Automation',
    };

    function getSprintHint() {
      const diag = store.getDiagnostic();
      if (!diag || !diag.domainScores) return '';
      const weakest = Object.entries(diag.domainScores)
        .sort((a, b) => a[1] - b[1])
        .slice(0, 2)
        .map(([id, score]) => `D${id} ${DOMAIN_NAMES[id] || id} (${Math.round(score * 100)}%)`);
      return `<div style="margin-top:var(--s-md);font-family:var(--font-display);font-size:0.8rem;color:var(--accent);font-weight:600;">
        ▶ Next sprint: ${weakest.join(' · ')}
        <a href="strategy.html" style="color:var(--ink-muted);font-weight:400;margin-left:8px;text-decoration:underline;text-underline-offset:2px;">see strategy</a>
      </div>`;
    }

    function renderBrief(pos) {
      const { week, day, daysSinceStart } = pos;

      if (daysSinceStart < 0) {
        return `<div class="brief">
          <div class="brief-kicker">Starting ${formatDateShort(START_DATE)}</div>
          <h2>Your study plan hasn't started yet</h2>
          <p>Take the Diagnostic Assessment to get your baseline before the schedule begins.</p>
          <div class="brief-actions"><a href="diagnostic.html" class="btn btn-primary">Take Diagnostic</a></div>
        </div>`;
      }

      if (week >= SCHEDULE.length) {
        const d = getDaysUntilExam();
        return `<div class="brief">
          <div class="brief-kicker">Final stretch</div>
          <h2>${d > 0 ? `${d} days to exam` : d === 0 ? 'Exam day' : 'Schedule complete'}</h2>
          <p>The study plan is done. Light review, rest, and trust what you've built.</p>
          <div class="brief-actions">
            <a href="quiz.html?mode=weak" class="btn btn-primary">Review quiz</a>
            <a href="knowledge-map.html" class="btn btn-secondary">Knowledge map</a>
          </div>
        </div>`;
      }

      const weekData = SCHEDULE[week];
      const dayData = weekData.days[Math.min(day, weekData.days.length - 1)];

      let link = 'quiz.html?mode=weak', label = 'Start today\'s quiz';
      if (dayData.topic.includes('Diagnostic')) { link = 'diagnostic.html'; label = 'Take diagnostic'; }
      else if (dayData.topic.includes('simulation') || dayData.topic.includes('Exam sim')) { link = 'quiz.html?mode=exam'; label = 'Start exam simulation'; }
      else if (dayData.topic === 'Rest' || dayData.topic.includes('Light review')) { link = ''; label = ''; }

      const sprintHint = getSprintHint();

      return `
        <div class="brief">
          <div class="brief-kicker">Week ${week + 1}, Day ${Math.min(day, weekData.days.length - 1) + 1}</div>
          <h2>${dayData.topic}</h2>
          <p>${dayData.desc}</p>
          <div class="brief-actions">
            ${link ? `<a href="${link}" class="btn btn-primary">${label}</a>` : ''}
            <a href="knowledge-map.html" class="btn btn-secondary">Knowledge map</a>
          </div>
          ${sprintHint}
        </div>
      `;
    }

    function renderMetrics(stats) {
      const rColor = profColorVar(stats.readiness / 100);
      const h = Math.floor(stats.totalMinutes / 60);
      const m = stats.totalMinutes % 60;
      const time = stats.totalMinutes > 0 ? (h > 0 ? `${h}h ${m}m` : `${m}m`) : '0m';

      return `
        <div class="metrics">
          <div class="metric">
            <div class="metric-value" style="color:${rColor}">${stats.readiness}%</div>
            <div class="metric-label">Readiness</div>
          </div>
          <div class="metric">
            <div class="metric-value">${stats.streak}</div>
            <div class="metric-label">Day streak${stats.bestStreak > stats.streak ? ` (best: ${stats.bestStreak})` : ''}</div>
          </div>
          <div class="metric">
            <div class="metric-value">${time}</div>
            <div class="metric-label">Study time</div>
          </div>
          <div class="metric">
            <div class="metric-value">${stats.quizzesTaken}</div>
            <div class="metric-label">Quizzes${stats.quizzesTaken > 0 ? ` (avg ${stats.avgScore}%)` : ''}</div>
          </div>
          <div class="metric" style="display:flex;align-items:flex-end">
            <button class="btn btn-ghost btn-sm" onclick="resetEntireSite()" style="color:var(--prof-weak);font-size:0.72rem">Reset All Stats</button>
          </div>
        </div>
      `;
    }

    function renderDomains(domains) {
      const prof = store.getAllProficiency();
      let rows = '';
      for (const d of domains) {
        let sum = 0;
        for (const t of d.topics) sum += prof[t.id] ?? 0;
        const avg = d.topics.length > 0 ? sum / d.topics.length : 0;
        const pct = Math.round(avg * 100);
        const c = profColor(avg);
        rows += `
          <div class="domain-row">
            <div class="domain-num">${d.id}</div>
            <div class="domain-info">
              <div class="name">${d.name}</div>
              <div class="weight">${d.weight}% of exam</div>
            </div>
            <div class="domain-bar-cell">
              <div class="progress-bar" style="flex:1"><div class="fill ${c}" style="width:${pct}%"></div></div>
            </div>
            <div class="domain-pct" style="color:${profColorVar(avg)}">${pct}%</div>
            <div class="domain-action"><a href="quiz.html?mode=domain&domain=${d.id}">Study &rarr;</a></div>
          </div>`;
      }
      return `<h2>Domain Progress</h2><div class="domain-table">${rows}</div>`;
    }

    function renderLinks() {
      const items = [
        { href: 'labs/lab1-campus-build.html', title: 'Lab: Build a Campus Network', desc: '12-step hands-on lab. Configure VLANs, trunking, OSPF, ACLs, NAT from scratch.' },
        { href: 'labs/lab2-troubleshoot.html', title: 'Lab: Troubleshoot a Broken Network', desc: 'Find and fix 8 hidden issues. OSPF, STP, ACLs, port security — diagnostic thinking required.' },
        { href: 'diagnostic.html', title: 'Diagnostic Assessment', desc: '60 questions to map your strengths and weaknesses.' },
        { href: 'quiz.html?mode=weak', title: 'Adaptive Quiz', desc: 'Focus on your weakest topics with 20 questions.' },
        { href: 'quiz.html?mode=exam', title: 'Exam Simulation', desc: '102 questions, 120 minutes. Real exam conditions.' },
        { href: 'knowledge-map.html', title: 'Knowledge Map', desc: 'Visual overview of all 53 topics by proficiency.' },
        { href: 'visuals/subnetting.html', title: 'Subnetting Tool', desc: 'Calculator, speed drills, and cheat sheet.' },
        { href: 'visuals/ospf.html', title: 'OSPF Visualizer', desc: 'Neighbor states, DR/BDR election, cost calculator.' },
        { href: 'visuals/stp.html', title: 'STP State Machine', desc: 'Port states, root bridge election, PortFast.' },
        { href: 'visuals/vlan.html', title: 'VLAN & Trunking', desc: '802.1Q tagging, inter-VLAN routing diagrams.' },
        { href: 'visuals/ipv6.html', title: 'IPv6 Addressing', desc: 'Address types, EUI-64, SLAAC/NDP flows.' },
        { href: 'visuals/acl.html', title: 'ACL Logic', desc: 'Flowchart, wildcard calculator, ACL builder.' },
      ];
      let html = '<h2>Tools & Visualizers</h2><div class="links-grid">';
      for (const it of items) {
        html += `<a href="${it.href}" class="link-item"><div class="link-title">${it.title}</div><div class="link-desc">${it.desc}</div></a>`;
      }
      return html + '</div>';
    }

    function renderCalendar() {
      const today = getToday();
      const history = store.getQuizHistory();
      const studied = new Set();
      for (const s of history) {
        if (s.date) { const d = new Date(s.date); studied.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`); }
      }
      const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

      let html = `<h2 style="display:flex;align-items:baseline;justify-content:space-between;">
        Schedule <button class="calendar-toggle" id="cal-toggle">show calendar</button></h2>
        <div class="calendar-body" id="cal-body">`;

      for (let w = 0; w < SCHEDULE.length; w++) {
        const wk = SCHEDULE[w];
        html += `<div class="week-block"><div class="week-title">${wk.label} &middot; ${wk.range}</div>`;
        for (let d = 0; d < wk.days.length; d++) {
          const dd = wk.days[d];
          const date = getScheduleDate(w, d);
          const ds = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
          const isToday = date.getTime() === today.getTime();
          const isPast = date < today && !isToday;
          const isDone = studied.has(ds);
          const isExam = dd.topic === 'EXAM DAY';
          let cls = 'day-row';
          if (isToday) cls += ' today';
          if (isPast) cls += ' past';
          if (isDone) cls += ' done';
          if (isExam) cls += ' exam-day';
          const dl = d < 7 ? dayLabels[d] : 'Mon';
          html += `<div class="${cls}"><span class="day-date">${dl} ${formatDateShort(date)}</span><span class="day-topic">${dd.topic}</span></div>`;
        }
        html += '</div>';
      }
      return html + '</div>';
    }

    // ── Export ────────────────────────────────────────────
    function handleExport() {
      const json = store.exportAll();
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `ccna-progress-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function resetEntireSite() {
      if (!confirm('Reset ALL progress across the entire site? Quiz scores, proficiency ratings, study logs — everything goes to zero. This cannot be undone.')) return;
      store.clearAll();
      localStorage.removeItem('ccna-objectives-v2');
      location.reload();
    }

    // ── Init ─────────────────────────────────────────────
    renderCountdown();
    try {
      renderApp(window.topicsData);
    } catch (err) {
      console.error(err);
      document.getElementById('app').innerHTML = `<p style="color:var(--prof-weak)">Error: ${err.message}</p>`;
    }
  </script>
</body>
</html>
