<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600;700&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<title>NCP-AIN Mega Lab -- NVIDIA AI Networking Capstone</title>
<style>
:root { --ncp: #76B900; --ncp-rgb: 118,185,0; --ncp-light: #A4D65E; --ncp-dark: #5A8C00; }

/* Hide shared chrome -- immersive page */
.beta-badge,.beta-badge *,#guidePill,.gc-bar,.gc-chat-panel { display: none !important; }

/* Layout */
.lab-page { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.lab-page nav.top-nav { flex-shrink: 0; margin-bottom: 0; }
.lab-workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.top-pane { display: flex; flex: 0 0 auto; min-height: 200px; max-height: 50vh; overflow: hidden; border-bottom: 2px solid var(--ink); }
.bottom-pane { flex: 1; display: flex; flex-direction: column; min-height: 0; }

/* Topology */
.topology-panel { flex: 1; min-width: 0; padding: var(--s-md); display: flex; align-items: center; justify-content: center; background: var(--bg); }
.topology-panel svg { width: 100%; height: 100%; max-height: 340px; }
.topo-device { cursor: pointer; }
.topo-device:hover rect, .topo-device:hover circle { filter: brightness(1.1); }
.topo-device.selected rect, .topo-device.selected circle {
  stroke: #F59E0B; stroke-width: 3; filter: drop-shadow(0 0 6px rgba(245,158,11,0.5));
}
.topo-link { stroke: var(--ink-muted); stroke-width: 2; fill: none; }
.topo-link.rail0 { stroke: #76B900; stroke-width: 2; }
.topo-link.rail1 { stroke: #2563EB; stroke-width: 2; }
.topo-port-label { font-family: var(--font-mono); font-size: 9px; fill: var(--ink-muted); }
.topo-device-label { font-family: var(--font-display); font-size: 12px; font-weight: 700; fill: #fff; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
.topo-device-sublabel { font-family: var(--font-mono); font-size: 9px; fill: var(--ink-muted); text-anchor: middle; }

/* Objectives panel */
.objectives-panel {
  width: 290px; flex-shrink: 0;
  border-left: 1px solid var(--rule);
  padding: var(--s-md);
  overflow-y: auto;
  background: var(--bg-surface);
}
.objectives-panel h3 {
  font-size: 0.82rem; margin-bottom: var(--s-md);
  text-transform: uppercase; letter-spacing: 0.06em; color: var(--ncp-dark);
}
.obj-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0; font-family: var(--font-display); font-size: 0.78rem;
  color: var(--ink-secondary); line-height: 1.4;
}
.obj-check {
  width: 16px; height: 16px; border: 2px solid var(--border-strong);
  border-radius: 3px; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent; transition: all 0.2s;
}
.obj-item.done .obj-check { border-color: var(--ncp); background: var(--ncp); color: #fff; }
.obj-item.done .obj-text { color: var(--ink-muted); text-decoration: line-through; }
.obj-hint-btn {
  font-family: var(--font-mono); font-size: 0.65rem;
  color: var(--ink-muted); background: none; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 2px 6px; cursor: pointer;
  margin-left: auto; flex-shrink: 0; transition: all var(--transition);
}
.obj-hint-btn:hover { border-color: var(--ncp); color: var(--ncp); }
.hint-toast {
  margin-top: var(--s-sm); padding: 8px 10px;
  background: rgba(var(--ncp-rgb),0.08); border-left: 3px solid var(--ncp);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-family: var(--font-mono); font-size: 0.75rem; color: var(--ncp-dark);
}
.obj-progress { margin-top: var(--s-md); padding-top: var(--s-md); border-top: 1px solid var(--border); }
.obj-progress .progress-text {
  font-family: var(--font-display); font-size: 0.72rem;
  color: var(--ink-muted); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.obj-progress-bar { height: 4px; background: var(--bg-recessed); border-radius: 2px; overflow: hidden; }
.obj-progress-fill { height: 100%; background: var(--ncp); border-radius: 2px; transition: width 0.3s; }
.hints-remaining { font-family: var(--font-display); font-size: 0.72rem; color: var(--ink-muted); margin-top: var(--s-sm); }
.lab-complete-banner {
  margin-top: var(--s-md); padding: 12px;
  background: rgba(var(--ncp-rgb),0.1); border: 1px solid var(--ncp);
  border-radius: var(--radius-lg); text-align: center;
  font-family: var(--font-display); font-size: 0.82rem;
  font-weight: 600; color: var(--ncp-dark); display: none;
}

/* Device tabs */
.device-tabs { flex-shrink: 0; display: flex; flex-wrap: nowrap; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; border-bottom: 1px solid #292524; background: #292524; }
.device-tab {
  font-family: var(--font-mono); font-size: 0.75rem; font-weight: 600;
  padding: 8px 16px; cursor: pointer; flex-shrink: 0; white-space: nowrap;
  color: #a8a29e; background: #292524;
  border: none; border-right: 1px solid #1c1917;
  transition: all 0.1s;
}
.device-tab:hover { color: #76B900; background: #3a3633; }
.device-tab.active { color: #76B900; background: #1c1917; }

/* Terminal */
.term-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.term-wrap { flex: 1; background: #1c1917; overflow-y: auto; padding: 12px 16px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.5; cursor: text; }
.term-line { color: #d6d3d1; white-space: pre-wrap; word-break: break-all; }
.term-line.cmd { color: #a5d6ff; }
.term-line.success { color: #4ade80; }
.term-line.error { color: #f87171; }
.term-line.info { color: #60a5fa; }
.term-line.system { color: #76B900; font-style: italic; }
.term-input-row { display: flex; align-items: center; padding: 0 16px 12px; background: #1c1917; flex-shrink: 0; }
.term-prompt { color: #a8a29e; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; white-space: pre; flex-shrink: 0; }
.term-input { flex: 1; background: transparent; border: none; outline: none; color: #a5d6ff; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; caret-color: #76B900; }

/* Welcome / lab menu */
.welcome-screen { flex: 1; display: flex; align-items: center; justify-content: center; background: var(--bg-recessed); overflow-y: auto; }
.welcome-inner { text-align: left; max-width: 640px; padding: var(--s-xl); max-height: 100%; margin: auto; }
.welcome-inner h2 { font-size: 1.5rem; margin-bottom: var(--s-sm); border: none; padding: 0; color: var(--ncp-dark); }
.welcome-inner p { color: var(--ink-secondary); font-size: 0.9rem; margin: 0 0 var(--s-md); }
.ncp-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(var(--ncp-rgb),0.1); border: 1px solid rgba(var(--ncp-rgb),0.3);
  border-radius: var(--radius); padding: 4px 12px;
  font-family: var(--font-display); font-size: 0.78rem; font-weight: 700;
  color: var(--ncp-dark); margin-bottom: var(--s-md);
}
.ncp-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ncp); }

/* Lab menu */
.lab-menu { max-width: 580px; margin: 0 auto; padding: var(--s-lg) var(--s-md); }
.lab-menu-header { margin-bottom: var(--s-xl); }
.lab-menu-header h1 { font-size: 1.8rem; margin-bottom: 6px; border: none; padding: 0; }
.lab-menu-header p { font-family: var(--font-body); font-size: 0.9rem; color: var(--ink-secondary); line-height: 1.6; }
.lab-menu-back-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-display); font-size: 0.82rem; font-weight: 600;
  color: var(--ink-muted); text-decoration: none;
  margin-bottom: var(--s-md);
  transition: color var(--transition);
}
.lab-menu-back-link:hover { color: var(--ncp); }
.lab-menu-labs { display: flex; flex-direction: column; gap: 8px; max-height: calc(100vh - 280px); overflow-y: auto; }
.lab-menu-lab {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; background: var(--bg-surface);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  cursor: pointer; transition: all 0.15s;
}
.lab-menu-lab:hover { border-color: var(--ncp); background: var(--bg-hover); }
.lab-menu-lab.completed { border-color: rgba(var(--ncp-rgb),0.4); }
.lml-diff { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.lml-diff.topology { background: #2563EB; }
.lml-diff.config { background: var(--ncp); }
.lml-diff.validate { background: #7C3AED; }
.lml-diff.troubleshoot { background: #DC2626; }
.lml-info { flex: 1; }
.lml-name { font-family: var(--font-display); font-size: 0.88rem; font-weight: 700; margin-bottom: 2px; }
.lml-detail { font-family: var(--font-body); font-size: 0.78rem; color: var(--ink-secondary); }
.lml-start { font-family: var(--font-display); font-size: 0.75rem; font-weight: 700; color: var(--ncp-dark); flex-shrink: 0; }
.lab-menu-lab.completed .lml-name::after { content: ' \2713'; color: var(--ncp); }

/* Mode badge in minibar */
.mode-badge {
  font-family: var(--font-mono); font-size: 0.66rem; font-weight: 700;
  padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.06em;
}
.mode-badge.topology { background: rgba(37,99,235,0.12); color: #1D4ED8; }
.mode-badge.config { background: rgba(var(--ncp-rgb),0.12); color: var(--ncp-dark); }
.mode-badge.validate { background: rgba(124,58,237,0.12); color: #6D28D9; }
.mode-badge.troubleshoot { background: rgba(220,38,38,0.12); color: #B91C1C; }

/* Mini active-lab bar */
.lab-minibar {
  display: none; align-items: center; gap: 12px;
  padding: 10px var(--s-lg); border-bottom: 1px solid var(--rule);
  background: var(--bg); flex-shrink: 0;
}
.lab-minibar.visible { display: flex; }
.lab-back-btn {
  font-family: var(--font-display); font-size: 0.78rem; font-weight: 600;
  color: var(--ink-muted); background: none; border: none; cursor: pointer; padding: 0;
}
.lab-back-btn:hover { color: var(--ncp); }
.lab-name-span { font-family: var(--font-display); font-size: 0.92rem; font-weight: 700; color: var(--ink); }

/* Legend */
.topo-legend { font-family: var(--font-mono); font-size: 0.68rem; fill: var(--ink-muted); }

@media (max-width: 768px) {
  .top-pane { flex-direction: column; max-height: 60vh; }
  .objectives-panel { width: 100%; max-height: 240px; border-left: none; border-top: 1px solid var(--rule); }
  .term-input { font-size: 16px; }
  .topology-panel { max-height: 200px; overflow: hidden; }
  .device-tab { min-height: 44px; }
}
/* Visible keyboard focus on all interactive controls */
.device-tab:focus-visible,
.lab-menu-lab:focus-visible,
.obj-hint-btn:focus-visible,
.lab-back-btn:focus-visible,
.topo-device:focus-visible { outline: 2px solid var(--ncp); outline-offset: 2px; }
.topo-device:focus-visible { outline-offset: 0; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
</style>
</head>
<body>
<div class="lab-page">
  <nav class="top-nav"></nav>

  <!-- Mini bar shown when a mission is active -->
  <div class="lab-minibar" id="labMinibar">
    <button class="lab-back-btn" id="labBackBtn">&#8592; Missions</button>
    <span class="lab-name-span" id="miniLabName"></span>
    <span class="mode-badge" id="miniModeBadge"></span>
  </div>

  <!-- Workspace -->
  <div class="lab-workspace" id="labWorkspace">

    <!-- Welcome / mission menu -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-inner">
        <div class="lab-menu" id="labMenu">
          <a class="lab-menu-back-link" href="ncp-ain-hub.html">&#8592; NCP-AIN Hub</a>
          <div class="lab-menu-header">
            <div class="ncp-badge"><span class="ncp-dot"></span>NCP-AIN Capstone</div>
            <h1>Mega Lab</h1>
            <p>9-mission rail-optimized fabric capstone. Build the fabric, bring up the SM, configure RoCE lossless, validate health, and troubleshoot four fault scenarios using the real IB/NVUE CLI.</p>
          </div>
          <div class="lab-menu-labs" id="missionList"></div>
        </div>
      </div>
    </div>

    <!-- Active lab state -->
    <div class="top-pane" id="topPane" style="display:none">
      <div class="topology-panel" id="topologyPanel">
        <!-- 8-device rail-optimized fat-tree SVG -->
        <svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" aria-label="8-device rail-optimized IB fabric topology">

          <!-- Legend -->
          <text x="10" y="14" class="topo-legend">Rail-0 links (mlx5_0)</text>
          <line x1="130" y1="10" x2="155" y2="10" stroke="#76B900" stroke-width="2"/>
          <text x="160" y="14" class="topo-legend">Rail-1 links (mlx5_1)</text>
          <line x1="240" y1="10" x2="265" y2="10" stroke="#2563EB" stroke-width="2"/>

          <!-- Rail-0 links: DGX mlx5_0 -> leaf-0 (green) -->
          <!-- dgx-01 mlx5_0 -> leaf-0 -->
          <line x1="95" y1="210" x2="190" y2="155" class="topo-link rail0"/>
          <!-- dgx-02 mlx5_0 -> leaf-0 -->
          <line x1="215" y1="210" x2="200" y2="155" class="topo-link rail0"/>
          <!-- dgx-03 mlx5_0 -> leaf-0 -->
          <line x1="335" y1="210" x2="210" y2="155" class="topo-link rail0"/>
          <!-- dgx-04 mlx5_0 -> leaf-0 -->
          <line x1="455" y1="210" x2="220" y2="155" class="topo-link rail0"/>

          <!-- Rail-1 links: DGX mlx5_1 -> leaf-1 (blue) -->
          <!-- dgx-01 mlx5_1 -> leaf-1 -->
          <line x1="110" y1="210" x2="480" y2="155" class="topo-link rail1"/>
          <!-- dgx-02 mlx5_1 -> leaf-1 -->
          <line x1="230" y1="210" x2="490" y2="155" class="topo-link rail1"/>
          <!-- dgx-03 mlx5_1 -> leaf-1 -->
          <line x1="350" y1="210" x2="500" y2="155" class="topo-link rail1"/>
          <!-- dgx-04 mlx5_1 -> leaf-1 -->
          <line x1="470" y1="210" x2="510" y2="155" class="topo-link rail1"/>

          <!-- Leaf to spine links -->
          <line x1="205" y1="130" x2="285" y2="65" class="topo-link" stroke="#a8a29e" stroke-width="1.5"/>
          <line x1="205" y1="130" x2="415" y2="65" class="topo-link" stroke="#a8a29e" stroke-width="1.5"/>
          <line x1="495" y1="130" x2="285" y2="65" class="topo-link" stroke="#a8a29e" stroke-width="1.5"/>
          <line x1="495" y1="130" x2="415" y2="65" class="topo-link" stroke="#a8a29e" stroke-width="1.5"/>

          <!-- UFM/SM to spine-0 -->
          <line x1="285" y1="65" x2="350" y2="30" class="topo-link" stroke="#a8a29e" stroke-width="1.5" stroke-dasharray="4,3"/>

          <!-- UFM/SM host (circle, blue, lid 1 SM) -->
          <g class="topo-device" id="topo-ufm-sm" data-device="ufm-sm">
            <circle cx="350" cy="22" r="18" fill="#2563EB" stroke="#1D4ED8" stroke-width="1.5"/>
            <text x="350" y="22" class="topo-device-label" font-size="8">UFM/SM</text>
          </g>

          <!-- spine-0 (QM9700 NDR, green) -->
          <g class="topo-device" id="topo-spine-0" data-device="spine-0">
            <rect x="240" y="45" width="90" height="36" rx="4" fill="#16A34A" stroke="#15803D" stroke-width="1.5"/>
            <text x="285" y="63" class="topo-device-label">spine-0</text>
          </g>

          <!-- spine-1 (drawn for fat-tree realism, not a clickable tab) -->
          <g id="topo-spine-1-static">
            <rect x="370" y="45" width="90" height="36" rx="4" fill="#15803D" stroke="#166534" stroke-width="1" stroke-dasharray="3,2"/>
            <text x="415" y="63" class="topo-device-label" font-size="10" opacity="0.7">spine-1</text>
          </g>

          <!-- leaf-0 (QM9700, rail-0 leaf, green) -->
          <g class="topo-device" id="topo-leaf-0" data-device="leaf-0">
            <rect x="160" y="118" width="90" height="34" rx="4" fill="#16A34A" stroke="#15803D" stroke-width="1.5"/>
            <text x="205" y="135" class="topo-device-label">leaf-0</text>
          </g>

          <!-- leaf-1 (QM9700, rail-1 leaf, blue-green) -->
          <g class="topo-device" id="topo-leaf-1" data-device="leaf-1">
            <rect x="450" y="118" width="90" height="34" rx="4" fill="#0D9488" stroke="#0F766E" stroke-width="1.5"/>
            <text x="495" y="135" class="topo-device-label">leaf-1</text>
          </g>

          <!-- DGX nodes (compute, 92x50) -->
          <!-- dgx-01 -->
          <g class="topo-device" id="topo-dgx-01" data-device="dgx-01">
            <rect x="48" y="196" width="92" height="50" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
            <text x="94" y="218" class="topo-device-label" font-size="11">dgx-01</text>
            <text x="94" y="233" class="topo-device-sublabel">DGX H100</text>
          </g>

          <!-- dgx-02 -->
          <g class="topo-device" id="topo-dgx-02" data-device="dgx-02">
            <rect x="168" y="196" width="92" height="50" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
            <text x="214" y="218" class="topo-device-label" font-size="11">dgx-02</text>
            <text x="214" y="233" class="topo-device-sublabel">DGX H100</text>
          </g>

          <!-- dgx-03 -->
          <g class="topo-device" id="topo-dgx-03" data-device="dgx-03">
            <rect x="288" y="196" width="92" height="50" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
            <text x="334" y="218" class="topo-device-label" font-size="11">dgx-03</text>
            <text x="334" y="233" class="topo-device-sublabel">DGX H100</text>
          </g>

          <!-- dgx-04 -->
          <g class="topo-device" id="topo-dgx-04" data-device="dgx-04">
            <rect x="408" y="196" width="92" height="50" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
            <text x="454" y="218" class="topo-device-label" font-size="11">dgx-04</text>
            <text x="454" y="233" class="topo-device-sublabel">DGX H100</text>
          </g>

          <!-- Port labels: rail-0 -->
          <text x="80" y="200" class="topo-port-label">mlx5_0</text>
          <text x="200" y="200" class="topo-port-label">mlx5_0</text>
          <text x="320" y="200" class="topo-port-label">mlx5_0</text>
          <text x="440" y="200" class="topo-port-label">mlx5_0</text>

          <!-- Port labels: rail-1 -->
          <text x="105" y="207" class="topo-port-label" fill="#60a5fa">mlx5_1</text>
          <text x="225" y="207" class="topo-port-label" fill="#60a5fa">mlx5_1</text>
          <text x="345" y="207" class="topo-port-label" fill="#60a5fa">mlx5_1</text>
          <text x="465" y="207" class="topo-port-label" fill="#60a5fa">mlx5_1</text>

          <!-- Port count label leaf-0 -->
          <text x="163" y="160" class="topo-port-label">swp1-4</text>
          <!-- Port count label leaf-1 -->
          <text x="453" y="160" class="topo-port-label">swp1-4</text>
        </svg>
      </div>
      <div class="objectives-panel" id="objectivesPanel">
        <h3 id="objPanelTitle">Objectives</h3>
        <div id="objList"></div>
        <div class="obj-progress" id="objProgress" style="display:none">
          <div class="progress-text" id="objProgressText"></div>
          <div class="obj-progress-bar"><div class="obj-progress-fill" id="objProgressFill" style="width:0%"></div></div>
          <div class="hints-remaining" id="hintsRemaining"></div>
          <div class="lab-complete-banner" id="labCompleteBanner">Mission complete! Well done.</div>
        </div>
      </div>
    </div>

    <div class="bottom-pane" id="bottomPane" style="display:none">
      <div class="device-tabs" id="deviceTabs"></div>
      <div class="term-container" id="termContainer">
        <div class="term-wrap" id="termMount">
          <div class="term-output"></div>
          <div class="term-input-row">
            <span class="term-prompt"></span>
            <span class="term-input" contenteditable="true" spellcheck="false" autocorrect="off" autocapitalize="off" aria-label="terminal command input"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script defer src="js/store.js"></script>
<script defer src="js/lab-engine.js"></script>
<script defer src="js/ib-tools.js"></script>
<script defer src="js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
'use strict';

// ============================================================
// FROZEN INTERFACE DOCUMENTATION (Agents B / C / D code to this)

// IB diagnostic commands route to the IBTools fabric simulator (not the shell
// commandMap) and mark the matching "ran it" flag for objective predicates.
var IB_DIAG_RE = /^(ibstat|ibstatus|iblinkinfo|ibhosts|ibnetdiscover|ibdiagnet|perfquery|sminfo|ibping|ibportstate)\b/;

function markIbDiag(raw, dev) {
  if (!dev) return;
  dev.custom = dev.custom || {};
  var first = raw.split(/\s+/)[0];
  if (first === 'ibdiagnet' && raw.indexOf('--sharp') !== -1) dev.custom.sharpDone = true;
  else if (first === 'ibdiagnet') dev.custom.ibdiagnetDone = true;
  else if (first === 'ibnetdiscover') dev.custom.ibnetdiscoverDone = true;
  else if (first === 'iblinkinfo') dev.custom.iblinkinfoDone = true;
  else if (first === 'ibhosts') dev.custom.ibhostsDone = true;
  else if (first === 'sminfo') dev.custom.sminfoDone = true;
}

// Mount the engine terminal on the shared DOM node.
lab.initTerminal(document.getElementById('termMount'));

// Wrap processCommand so the engine Terminal's executeCommand path also does:
// (1) IB-diag delegation to IBTools + objective flags, (2) mutable-counter fix
// via applyFix, (3) the page objective check. The Terminal echoes the prompt
// line and writes the returned output itself.
var _origProcessCommand = window.Lab.LabBase.prototype.processCommand;
lab.processCommand = function (raw) {
  var trimmed = String(raw).trim();
  var dev = this.activeDevice;
  var out;
  if (IB_DIAG_RE.test(trimmed)) {
    out = (window.IBTools && window.IBTools.run) ? window.IBTools.run(trimmed) : 'IBTools unavailable';
    markIbDiag(trimmed, dev);
  } else {
    out = _origProcessCommand.call(this, raw);
  }
  var fixMsg = maybeApplyFix(trimmed, out);
  if (fixMsg) out = fixMsg;
  checkObjectives();
  return out;
};

// Shims so the rest of the page (loadMission banners, tab switching) keeps
// working against the engine Terminal instance.
function updatePrompt() { if (lab.terminal) lab.terminal.updatePrompt(); }
function clearTerm() { if (lab.terminal) lab.terminal.clear(); }
function addTermLine(text, cls) {
  if (!lab.terminal) return;
  String(text).split('\n').forEach(function (line) { lab.terminal.writeLine(line, cls || ''); });
  lab.terminal.scrollToBottom();
}

// Save/restore per-device scrollback + command history on tab switch.
function saveDeviceHistory(name) {
  if (!lab.terminal) return;
  deviceHistory[name] = {
    html: lab.terminal.outputEl.innerHTML,
    history: lab.terminal.history.slice(),
  };
}
function restoreDeviceHistory(name) {
  if (!lab.terminal) return;
  var s = deviceHistory[name];
  lab.terminal.outputEl.innerHTML = s ? s.html : '';
  lab.terminal.history = s ? s.history : [];
  lab.terminal.historyIdx = -1;
  lab.terminal.scrollToBottom();
}

// ============================================================

var TAB_ORDER = ['ufm-sm', 'dgx-01', 'dgx-02', 'dgx-03', 'dgx-04', 'leaf-0', 'leaf-1'];

function buildTabs() {
  var container = document.getElementById('deviceTabs');
  container.innerHTML = '';
  TAB_ORDER.forEach(function (name) {
    var btn = document.createElement('button');
    btn.className = 'device-tab' + (name === lab.activeDeviceName ? ' active' : '');
    btn.textContent = name;
    btn.dataset.device = name;
    btn.addEventListener('click', function () {
      switchTab(name);
    });
    container.appendChild(btn);
  });
}

function switchTab(name) {
  if (!lab.devices[name]) return;
  var prev = lab.activeDeviceName;
  if (prev) saveDeviceHistory(prev);
  lab.activeDeviceName = name;
  document.querySelectorAll('.device-tab').forEach(function (btn) {
    btn.classList.toggle('active', btn.dataset.device === name);
  });
  restoreDeviceHistory(name);
  updatePrompt();
  if (lab.terminal) lab.terminal.focus();
  updateTopoSelection(name);
}

// ============================================================
// TOPOLOGY SELECTION SYNC
// ============================================================

function updateTopoSelection(deviceName) {
  document.querySelectorAll('.topo-device').forEach(function (el) {
    el.classList.toggle('selected', el.dataset.device === deviceName);
  });
}

document.querySelectorAll('.topo-device').forEach(function (el) {
  var name = el.dataset.device;
  var selectable = TAB_ORDER.indexOf(name) !== -1;
  if (selectable) {
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', 'Select device ' + name);
  }
  el.addEventListener('click', function () {
    if (selectable) switchTab(name);
  });
  el.addEventListener('keydown', function (e) {
    if (selectable && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); switchTab(name); }
  });
});

// ============================================================

function renderMissionMenu() {
  var list = document.getElementById('missionList');
  list.innerHTML = '';
  MEGA_LABS.forEach(function (m) {
    var done = isMissionComplete(m);
    var row = document.createElement('div');
    row.className = 'lab-menu-lab' + (done ? ' completed' : '');
    row.setAttribute('role', 'button');
    row.setAttribute('tabindex', '0');
    row.setAttribute('aria-label', 'Start mission ' + m.name);
    row.innerHTML =
      '<span class="lml-diff ' + m.startMode + '"></span>' +
      '<span class="lml-info">' +
        '<div class="lml-name">' + esc(m.name) + '</div>' +
        '<div class="lml-detail">' + esc(stepLabel(m)) + '</div>' +
      '</span>' +
      '<span class="lml-start">Start</span>';
    row.addEventListener('click', function () { loadMission(m); });
    row.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); loadMission(m); } });
    list.appendChild(row);
  });
}

function stepLabel(m) {
  return m.steps.length + ' step' + (m.steps.length !== 1 ? 's' : '') + ' \xb7 ' + m.startMode;
}

function isMissionComplete(m) {
  if (!m._completedSet) return false;
  return m.steps.every(function (_, i) { return m._completedSet.has(i); });
}

// LOAD MISSION (state machine)
// ============================================================

function loadMission(m) {
  activeMission = m;

  // Reset per-mission state
  m._completedSet = new Set();
  deviceHistory = {};

  // If troubleshoot: set the fault
  if (m.fault && window.IBTools) {
    window.IBTools.setFault(m.fault);
  } else if (window.IBTools) {
    window.IBTools.clearFault();
  }

  // Reset device custom state
  TAB_ORDER.forEach(function (name) {
    if (lab.devices[name]) {
      lab.devices[name].custom = {};
    }
  });

  // Seed prerequisite fabric state: every mission after SM bring-up assumes a
  // running subnet manager, so its commands (saquery, PKey, validation) work
  // when the mission is entered standalone.
  if (m.id !== 'm1-place-wire' && m.id !== 'm2-sm-bringup' && lab.devices['ufm-sm']) {
    lab.devices['ufm-sm'].custom.smStarted = true;
    lab.devices['ufm-sm'].custom.smPriority15 = true;
  }

  // Set starting device
  lab.activeDeviceName = m.device || TAB_ORDER[0];

  // Build objectives for this mission
  lab.objectives = m.steps.map(function (step, i) {
    return { index: i, text: step.objective, hint: step.hint, done: false };
  });
  lab.completedObjectives = new Set();

  // Show lab UI
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('topPane').style.display = '';
  document.getElementById('bottomPane').style.display = '';
  document.getElementById('labMinibar').classList.add('visible');
  document.getElementById('miniLabName').textContent = m.name;

  var badge = document.getElementById('miniModeBadge');
  badge.className = 'mode-badge ' + m.startMode;
  badge.textContent = m.startMode;

  buildTabs();
  clearTerm();
  updatePrompt();
  renderObjectives();
  updateTopoSelection(lab.activeDeviceName);

  // Welcome message
  addTermLine('=== ' + m.name + ' ===', 'system');
  addTermLine('Device: ' + lab.activeDeviceName + '  |  Mode: ' + m.startMode, 'info');
  if (m.fault) addTermLine('[FAULT ACTIVE: ' + m.fault + '] Use diagnostics to identify the issue.', 'error');
  addTermLine('Type commands below. Use hint buttons for guidance.', 'info');
  addTermLine('', '');

  if (lab.terminal) lab.terminal.focus();
}

function exitMission() {
  activeMission = null;
  if (window.IBTools) window.IBTools.clearFault();
  document.getElementById('welcomeScreen').style.display = '';
  document.getElementById('topPane').style.display = 'none';
  document.getElementById('bottomPane').style.display = 'none';
  document.getElementById('labMinibar').classList.remove('visible');
  renderMissionMenu();
}

document.getElementById('labBackBtn').addEventListener('click', exitMission);

// ============================================================
// OBJECTIVE STATE MACHINE
// checkObjectives() -- called after every command
// Predicates read dev.custom.* and IBTools state readers.
// ============================================================

function checkObjectives() {
  if (!activeMission) return;
  var m = activeMission;

  // Sequential gating: a step can complete only after all earlier steps are done.
  // This orders the read -> fix -> reverify flow correctly (the read and reverify
  // steps share the same perfquery command).
  for (var i = 0; i < m.steps.length; i++) {
    if (m._completedSet.has(i)) continue; // already done, move on

    var step = m.steps[i];
    var dev = lab.devices[step.device] || lab.activeDevice;
    var predicate = false;

    // FIX steps (action != null) -- check IBTools.portFrozen or fault cleared
    if (step.action) {
      if (step.action === 'resolve-sm') {
        predicate = !!(window.IBTools && !window.IBTools.activeFault());
      } else {
        var lidForAction = lidFromAction(step.action);
        predicate = !!(window.IBTools && lidForAction !== null && window.IBTools.portFrozen(lidForAction));
      }
    } else {
      // READ/BUILD/VERIFY steps -- check custom flags set by commandMap handlers
      predicate = evalStepPredicate(step, dev, i, m);
    }

    if (predicate) {
      m._completedSet.add(i);
      lab.completedObjectives.add(i);
      lab.objectives[i].done = true;
      renderObjectives();
    } else {
      break; // do not evaluate later steps until this one is satisfied
    }
  }
}

function lidFromAction(action) {
  if (action === 'replace-cable') return 7;
  if (action === 'fix-pkey') return 5;
  if (action === 'fix-congestion') return 2;
  return null;
}

function evalStepPredicate(step, dev, idx, m) {
  var cmd = step.cmd || '';
  // Discovery / read steps: check custom flags that commandMap handlers set
  if (cmd === 'ibnetdiscover') return !!(dev && dev.custom.ibnetdiscoverDone);
  if (cmd === 'iblinkinfo') return !!(dev && dev.custom.iblinkinfoDone);
  if (cmd === 'ibhosts') return !!(dev && dev.custom.ibhostsDone);
  if (cmd === 'systemctl start opensm') return !!(dev && dev.custom.smStarted);
  if (cmd === 'opensm -p 15') return !!(dev && dev.custom.smPriority15);
  if (cmd === 'sminfo') return !!(dev && dev.custom.sminfoDone);
  if (cmd === 'saquery -p 0x8001') return !!(dev && dev.custom.sakeySet);
  if (cmd === 'saquery --pkey') return !!(dev && dev.custom.pkeyConfirmed);
  if (cmd === 'nv set qos roce mode lossless') return !!(dev && dev.custom.roceLossless);
  if (cmd.indexOf('pfc-priority') !== -1) return !!(dev && dev.custom.rocePfc);
  if (cmd.indexOf('pcp,dscp') !== -1) return !!(dev && dev.custom.roceTrust);
  if (cmd === 'nv config apply') return !!(dev && dev.custom.nvueApplied);
  if (cmd === 'nv show qos roce') return !!(dev && dev.custom.roceShowDone);
  if (cmd === 'ibdiagnet') return !!(dev && dev.custom.ibdiagnetDone);
  if (cmd === 'ib_write_bw dgx-02') return !!(dev && dev.custom.bwDone);
  if (cmd === 'ibdiagnet --sharp') return !!(dev && dev.custom.sharpDone);
  if (cmd === 'nccl all_reduce_perf') return !!(dev && dev.custom.ncclDone);
  // perfquery steps: a "read" (no prior fix on this lid) completes after 2 reads
  // show the counter climbing; a "reverify" (a fix step earlier in the mission
  // targets this lid) completes once that fix has frozen the counter.
  if (/^perfquery\s+(\d+)/.test(cmd)) {
    var lid = parseInt(cmd.match(/^perfquery\s+(\d+)/)[1], 10);
    var priorFix = false;
    for (var k = 0; k < idx; k++) {
      var ps = m.steps[k];
      if (ps.action && lidFromAction(ps.action) === lid) { priorFix = true; break; }
    }
    if (priorFix) {
      return !!(window.IBTools && window.IBTools.portFrozen && window.IBTools.portFrozen(lid));
    }
    return !!(window.IBTools && window.IBTools.portReads && window.IBTools.portReads(lid) >= 2);
  }
  return false;
}

// Mega-lab fix wiring: if the active mission has a fix step whose cmd matches
// this command, apply the remedy to the live fabric state via IBTools.applyFix.
function maybeApplyFix(raw, result) {
  if (!activeMission || !window.IBTools || !window.IBTools.applyFix) return null;
  var step = null;
  for (var i = 0; i < activeMission.steps.length; i++) {
    var s = activeMission.steps[i];
    if (s.action && raw === s.cmd) { step = s; break; }
  }
  if (!step) return null;
  var lid = lidFromAction(step.action);
  var res = window.IBTools.applyFix(lid, step.action);
  var notFound = !result || /command not found|Invalid input|Unrecognized|not found/i.test(result);
  if (notFound) {
    return (res && res.msg) ? res.msg : ('[fix] ' + step.cmd + ' applied (' + step.action + ').');
  }
  return null;
}

// ============================================================
// RENDER OBJECTIVES
// ============================================================

function renderObjectives() {
  var m = activeMission;
  var list = document.getElementById('objList');
  var progress = document.getElementById('objProgress');
  var progressText = document.getElementById('objProgressText');
  var progressFill = document.getElementById('objProgressFill');
  var completeBanner = document.getElementById('labCompleteBanner');

  if (!m) { list.innerHTML = ''; progress.style.display = 'none'; return; }

  var doneCount = m._completedSet ? m._completedSet.size : 0;
  var total = m.steps.length;

  list.innerHTML = '';
  m.steps.forEach(function (step, i) {
    var done = m._completedSet && m._completedSet.has(i);
    var item = document.createElement('div');
    item.className = 'obj-item' + (done ? ' done' : '');
    item.dataset.idx = i;

    var check = document.createElement('div');
    check.className = 'obj-check';
    check.textContent = done ? '✓' : '';

    var textEl = document.createElement('div');
    textEl.className = 'obj-text';
    textEl.textContent = step.objective;

    var hintBtn = document.createElement('button');
    hintBtn.className = 'obj-hint-btn';
    hintBtn.textContent = 'hint';
    hintBtn.setAttribute('aria-label', 'Show hint for step ' + (i + 1));
    hintBtn.addEventListener('click', function () { toggleHint(item, step.hint, i); });

    item.appendChild(check);
    item.appendChild(textEl);
    item.appendChild(hintBtn);
    list.appendChild(item);
  });

  progress.style.display = '';
  progressText.textContent = doneCount + ' / ' + total + ' complete';
  progressFill.style.width = (total ? Math.round(doneCount / total * 100) : 0) + '%';
  completeBanner.style.display = (doneCount === total && total > 0) ? 'block' : 'none';
}

function toggleHint(itemEl, hintText, idx) {
  var existing = itemEl.querySelector('.hint-toast');
  if (existing) { existing.remove(); return; }
  var toast = document.createElement('div');
  toast.className = 'hint-toast';
  toast.textContent = hintText;
  itemEl.appendChild(toast);
}

// ============================================================
// UTILITY
// ============================================================

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ============================================================
// INIT
// ============================================================

renderMissionMenu();
});
