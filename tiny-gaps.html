<style>

  .tg-myth-label { font-family: var(--font-mono); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--prof-weak); margin-bottom: 6px; text-align: center; }
  .tg-myth { font-family: var(--font-body); font-size: 1.32rem; line-height: 1.45; color: var(--ink); margin: 0 auto var(--s-md); max-width: 560px; text-align: center; }

  .tg-i-fact code, .tg-i-myth code { font-family: var(--font-mono); font-size: 0.82rem; background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 3px; }

  .tg-foot { margin-top: var(--s-2xl); text-align: center; }

<script>
/* ===== GAP DATASET — injected from research =====
   shape: { id, dom:'1'..'6', obj:'2.4', topic:'STP', myth:'what people think / the cue',
            fact:'the correct fact', why:'optional exam note', code:true(optional) } */
window.TG_GAPS = [
/* ===== DOMAIN 1 — Network Fundamentals ===== */
{id:'d1-frame-min', dom:'1', obj:'1.3', topic:'Ethernet', myth:'The smallest Ethernet frame is whatever the data happens to be.', fact:'Minimum frame is **64 bytes**; anything smaller is a **runt** (collision fragment) and is padded up to 64. Max untagged frame is **1518** bytes (over that = **giant**).', why:'Runts/giants show up in `show interfaces` counters as physical-layer trouble.'},
{id:'d1-mtu-vs-frame', dom:'1', obj:'1.3', topic:'Ethernet', myth:'MTU 1500 is the maximum frame size.', fact:'**1500 is the L3 payload (MTU)**. The full frame is **1518** (14-byte header + 4-byte FCS), or **1522** with an 802.1Q tag. Jumbo frames ~9000.', why:'Header = 6 dst MAC + 6 src MAC + 2 EtherType = 14; FCS is a 4-byte trailer, not header.'},
{id:'d1-duplex-mismatch', dom:'1', obj:'1.3', topic:'Duplex', myth:'A duplex mismatch makes the link go down.', fact:'The link stays **up/up**. You get late collisions, CRC/FCS errors, and runts on the full-duplex side under load. It looks like intermittent slowness, not an outage.', why:'Classic "everything is up but slow" troubleshooting question.'},
{id:'d1-mac-bits', dom:'1', obj:'1.3', topic:'MAC', myth:'A MAC address is just a vendor ID.', fact:'48 bits = 6 bytes = 12 hex digits. First **24 bits = OUI** (vendor), last 24 = device. Broadcast MAC = `FFFF.FFFF.FFFF`. The I/G and U/L bits live in the first octet.', why:'The U/L bit is the one EUI-64 flips.'},
{id:'d1-tcp-udp-53', dom:'1', obj:'1.4', topic:'DNS', myth:'DNS is UDP 53.', fact:'DNS uses **both** UDP 53 (queries) **and** TCP 53 (zone transfers + responses over 512 bytes). Listing only UDP is the trap.', why:'A "select all ports DNS uses" item expects both.'},
{id:'d1-subnet-minus2', dom:'1', obj:'1.5', topic:'Subnetting', myth:'A /26 gives 64 hosts.', fact:'Usable hosts = **2^(host bits) − 2** (network + broadcast reserved). /26 = **62** usable, /25 = 126, /24 = 254. Subnet *count* is 2^(borrowed bits) with **no** −2.', why:'Subtract 2 for hosts, never for subnets (ip subnet-zero is the default).'},
{id:'d1-magic', dom:'1', obj:'1.5', topic:'Subnetting', myth:'Block size = 256 minus the prefix length.', fact:'Block size (magic number) = **256 − the mask value in the interesting octet**. /26 = mask 192 → block 64 → subnets .0, .64, .128, .192.', why:'Pearson VUE gives only a whiteboard, no calculator. Do this by hand.'},
{id:'d1-broadcast-calc', dom:'1', obj:'1.5', topic:'Subnetting', myth:'Finding the broadcast address needs binary every time.', fact:'Broadcast = **next subnet network − 1**; last usable = broadcast − 1; first usable = network + 1. For 192.168.1.0/26: net .0, first .1, last .62, bcast .63, next .64.', why:''},
{id:'d1-31', dom:'1', obj:'1.5', topic:'Subnetting', myth:'A /31 is useless because it has 0 usable hosts.', fact:'**RFC 3021**: a /31 has 2 addresses, **both usable** on a point-to-point link. No network/broadcast reserved. Applying the −2 rule to /31 is wrong.', why:'Saves addresses on router-to-router links.'},
{id:'d1-32', dom:'1', obj:'1.5', topic:'Subnetting', myth:'A /32 mask is an error.', fact:'`/32` (255.255.255.255) is a valid **single-host route** — used for loopbacks and host routes.', why:''},
{id:'d1-down-to-20', dom:'1', obj:'1.5', topic:'Subnetting', myth:'Only practice /24 and longer.', fact:'The exam questions masks down to about **/20** (and into the 3rd octet). Memorize powers of 2 and be fast across the whole range.', why:''},
{id:'d1-classful', dom:'1', obj:'1.5', topic:'Addressing', myth:'Address classes are obsolete and untested.', fact:'Default masks still appear: **A 1-126 (/8), B 128-191 (/16), C 192-223 (/24)**, D 224-239 multicast, E 240-255 experimental. **127** = loopback (not usable Class A).', why:'Some passers report classes barely show — but the default masks do.'},
{id:'d1-rfc1918', dom:'1', obj:'1.6', topic:'Private IPv4', myth:'The private 172 range is 172.16.0.0/16.', fact:'It is **172.16.0.0/12** = 172.16.0.0 through **172.31.255.255**. Plus 10.0.0.0/8 and 192.168.0.0/16. The /12 boundary is the trap.', why:''},
{id:'d1-apipa', dom:'1', obj:'1.6', topic:'APIPA', myth:'169.254.x.x is just another private range.', fact:'**169.254.0.0/16 (APIPA / link-local, RFC 3927)** is auto-assigned when DHCP fails. It is not routable. Seeing it = "DHCP didn\'t answer."', why:'Common "host can\'t reach anything" diagnosis.'},
{id:'d1-eui64', dom:'1', obj:'1.7', topic:'IPv6 EUI-64', myth:'EUI-64 just inserts FFFE into the MAC.', fact:'Insert **FFFE** in the middle of the 48-bit MAC **AND flip the 7th bit (U/L) of the first octet**. e.g. `00` → `02`, `AA` → `A8`. Forgetting the bit flip is the classic miss.', why:'Only the 2nd-least-significant bit of the first octet changes.'},
{id:'d1-slaac', dom:'1', obj:'1.7', topic:'IPv6 SLAAC', myth:'SLAAC gets its address from a DHCPv6 server.', fact:'SLAAC is **stateless**: the host hears a **Router Advertisement (RA)**, takes the **/64 prefix**, and builds the interface ID itself (EUI-64 or random). No server tracks it. DHCPv6 is separate/optional.', why:''},
{id:'d1-v6-linklocal', dom:'1', obj:'1.8', topic:'IPv6 types', myth:'Link-local is FE80::/64.', fact:'Link-local is **FE80::/10** (covers FE80–FEBF). It is auto-generated on every IPv6 interface and never routed off-link. Addresses commonly *appear* as FE80::/64.', why:''},
{id:'d1-v6-ula', dom:'1', obj:'1.8', topic:'IPv6 types', myth:'Unique-local addresses are FC00::/8.', fact:'ULA is **FC00::/7**, but only **FD00::/8** is actually used (L-bit set = locally assigned). It is the IPv6 equivalent of RFC1918.', why:''},
{id:'d1-v6-gua', dom:'1', obj:'1.8', topic:'IPv6 types', myth:'Global unicast means it starts with 2001.', fact:'Global unicast = **2000::/3** (anything 2000–3FFF in the first hextet). `2001:db8::/32` is the documentation range.', why:''},
{id:'d1-v6-loopback', dom:'1', obj:'1.8', topic:'IPv6 types', myth:'IPv6 loopback is a /8 block like 127.', fact:'IPv6 loopback is the single address **::1/128**. `::` (all zeros) is the separate **unspecified** address.', why:''},
{id:'d1-v6-nobroadcast', dom:'1', obj:'1.8', topic:'IPv6 types', myth:'IPv6 has a broadcast address.', fact:'IPv6 has **no broadcast** — its three types are **unicast, multicast, anycast**. "Broadcast" behavior uses multicast. Anycast is formatted identically to unicast (nearest node wins).', why:''},
{id:'d1-v6-mcast', dom:'1', obj:'1.8', topic:'IPv6 multicast', myth:'All you need is FF02::1.', fact:'Multicast = **FF00::/8**. **FF02::1** = all nodes, **FF02::2** = all routers, **FF02::5/6** = OSPFv3, **FF02::1:FFxx:xxxx** = solicited-node (used by NDP to replace ARP).', why:''},
{id:'d1-ndp', dom:'1', obj:'1.7', topic:'IPv6 NDP', myth:'IPv6 still uses ARP.', fact:'ARP is replaced by **NDP** using ICMPv6: **NS/NA (135/136)** for address resolution to the solicited-node multicast, **RS/RA (133/134)** for router discovery and SLAAC.', why:''},

/* ===== DOMAIN 2 — Network Access ===== */
{id:'d2-default-vs-native', dom:'2', obj:'2.1', topic:'VLAN', myth:'Default VLAN and native VLAN are the same thing.', fact:'**Default VLAN = always VLAN 1** (can\'t be deleted/renamed). **Native VLAN** = the VLAN whose frames ride **untagged** on a trunk; it defaults to 1 but is changeable. They merely share a default value.', why:''},
{id:'d2-native-untagged', dom:'2', obj:'2.1', topic:'Trunk', myth:'Every VLAN on a trunk is tagged.', fact:'On an 802.1Q trunk the **native VLAN travels untagged**; every other VLAN is tagged. An untagged frame is assigned to *the receiving switch\'s* native VLAN.', why:''},
{id:'d2-native-mismatch', dom:'2', obj:'2.2', topic:'Trunk', myth:'A native VLAN mismatch brings the trunk down.', fact:'The trunk **stays up** but silently **merges traffic between the two native VLANs** (security/loop risk) and logs a CDP warning. Native VLAN only has to match on the two ends of one link.', why:'`vlan dot1q tag native` forces tagging to avoid this.'},
{id:'d2-allowed-replace', dom:'2', obj:'2.2', topic:'Trunk', myth:'`switchport trunk allowed vlan X` adds VLAN X.', fact:'It **replaces** the entire allowed list (default 1-4094), silently cutting every other VLAN. Use `...allowed vlan add X` to append.', why:'Real-config foot-gun and an exam distractor.'},
{id:'d2-dtp', dom:'2', obj:'2.2', topic:'DTP', myth:'A port is an access port unless you make it a trunk.', fact:'Default is **dynamic auto/desirable (DTP)**. `dynamic auto` + `dynamic auto` = stays access; `desirable` actively forms a trunk. For a true access port use `switchport mode access` to disable DTP (VLAN-hopping defense).', why:''},
{id:'d2-cdp-lldp-default', dom:'2', obj:'2.3', topic:'CDP/LLDP', myth:'CDP and LLDP are both on by default.', fact:'**CDP** = Cisco-proprietary, **on by default**, advertises every 60s / holdtime 180s. **LLDP** = open (802.1AB), **off by default** (`lldp run`), advertises 30s / holdtime **120s (4x, not 3x)**.', why:''},
{id:'d2-cdp-local-remote', dom:'2', obj:'2.3', topic:'CDP', myth:'In `show cdp neighbors`, Port ID is your port.', fact:'**Local Intrfce = your port**; **Port ID = the neighbor\'s port**. Students reverse them. `detail` adds neighbor IP and IOS version.', why:''},
{id:'d2-ec-modes', dom:'2', obj:'2.4', topic:'EtherChannel', myth:'Setting mode `on` gives you LACP.', fact:'`on` = **static, no negotiation** (not LACP). **LACP = active/passive** (open standard); **PAgP = desirable/auto** (Cisco). passive+passive and auto+auto **never** form. Both ends must use the same protocol.', why:'If a question says "use LACP," `on` is wrong.'},
{id:'d2-ec-consistency', dom:'2', obj:'2.4', topic:'EtherChannel', myth:'EtherChannel just needs matching modes.', fact:'Every member port must also match **speed, duplex, allowed VLANs, native VLAN, and access/trunk mode**. One mismatch excludes or err-disables the port.', why:''},
{id:'d2-stp-timers', dom:'2', obj:'2.5', topic:'STP', myth:'STP converges instantly.', fact:'802.1D: **Hello 2s, Forward Delay 15s (×2 for listening + learning), Max Age 20s** → blocking-to-forwarding takes ~**30-50s**. RSTP converges in seconds. Don\'t hand-tune timers (mismatch discards BPDUs).', why:''},
{id:'d2-stp-root', dom:'2', obj:'2.5', topic:'STP', myth:'The root bridge is the fastest switch.', fact:'Root = **lowest Bridge ID** = priority (default 32768) + extended system ID (VLAN) + MAC. Priority tie → **lowest MAC** wins. Priority is set in **increments of 4096**.', why:'`spanning-tree vlan X root primary` or `priority 4096`.'},
{id:'d2-portfast-bpdu', dom:'2', obj:'2.5', topic:'STP', myth:'PortFast and BPDU Guard are the same protection.', fact:'**PortFast** = edge/access ports only, skips listening/learning (never on a trunk). **BPDU Guard** err-disables a PortFast port the instant it receives **any** BPDU. **Root Guard** blocks a port only on a **superior** BPDU.', why:''},
{id:'d2-svi-noshut', dom:'2', obj:'2.1', topic:'Switch mgmt', myth:'A management SVI comes up on its own.', fact:'`interface vlan 1` (or any SVI) is **admin-down by default** — needs `no shutdown` **and** an active access port in that VLAN to go up/up.', why:''},

/* ===== DOMAIN 3 — IP Connectivity ===== */
{id:'d3-longest-prefix', dom:'3', obj:'3.2', topic:'Routing', myth:'The route with the lowest AD is always used.', fact:'Forwarding always uses the **longest-prefix (most specific) match** first. A /32 beats a /24 even from a higher-AD protocol. **AD and metric only break ties between routes to the SAME prefix.**', why:'Order: prefix length → AD → metric.'},
{id:'d3-ad-vs-metric', dom:'3', obj:'3.2', topic:'Routing', myth:'AD and metric do the same job.', fact:'**AD** picks which *source/protocol* to trust when multiple offer the same prefix. **Metric** picks the best path *within* one protocol. Different layers of the decision.', why:''},
{id:'d3-ad-table', dom:'3', obj:'3.2', topic:'Admin Distance', myth:'Lower AD just means "better."', fact:'Memorize: **Connected 0, Static 1, EIGRP-summary 5, eBGP 20, EIGRP 90, OSPF 110, IS-IS 115, RIP 120, EIGRP-external 170, iBGP 200, unreachable 255.**', why:''},
{id:'d3-eigrp-external', dom:'3', obj:'3.2', topic:'Admin Distance', myth:'EIGRP always beats OSPF.', fact:'**Internal EIGRP (90)** beats OSPF (110), but **external/redistributed EIGRP (170)** *loses* to OSPF. Same protocol, very different AD.', why:''},
{id:'d3-bgp-ad', dom:'3', obj:'3.2', topic:'Admin Distance', myth:'BGP has one AD.', fact:'**eBGP = 20** (very trusted, beats IGPs); **iBGP = 200** (least trusted routing protocol). AD **255** = route is never installed.', why:''},
{id:'d3-no-cross-protocol-lb', dom:'3', obj:'3.2', topic:'Routing', myth:'Set two protocols to equal AD and they load-balance.', fact:'Load balancing only happens across **equal-cost paths within the same protocol**. Matching AD across protocols never load-balances — the lower-AD protocol simply wins.', why:''},
{id:'d3-c-vs-l', dom:'3', obj:'3.1', topic:'show ip route', myth:'C and L in the routing table mean the same thing.', fact:'**`C`** = the connected **network/subnet**; **`L`** = the **local /32 host route** for the interface\'s own IP. Both appear per active interface.', why:''},
{id:'d3-route-codes', dom:'3', obj:'3.1', topic:'show ip route', myth:'O and O IA are interchangeable.', fact:'**`O`** = OSPF intra-area, **`O IA`** = inter-area (via ABR), **`O E1/E2`** = external. **`D`** = EIGRP (DUAL), **`D EX`** = EIGRP external. **`S*`** = static default / gateway of last resort.', why:'Exhibits often strip the "Codes:" legend — recognize them cold.'},
{id:'d3-int-states', dom:'3', obj:'3.1', topic:'show ip int brief', myth:'up/down means the cable is unplugged.', fact:'**up/up** = working. **up/down** = L1 OK, L2 problem (encapsulation/keepalive/clock-rate). **down/down** = L1 (cable, speed/duplex, missing `no shut` on far side). **administratively down** = local `shutdown`.', why:'Status = L1, Protocol = L2.'},
{id:'d3-static-floating', dom:'3', obj:'3.3', topic:'Static routes', myth:'A static route is always a backup.', fact:'Default static AD = **1** (very preferred). A **floating static** is just a static with a manually raised AD (e.g. `ip route ... 200`) so it installs only when the primary route dies.', why:''},
{id:'d3-ip-routing-off', dom:'3', obj:'3.1', topic:'Inter-VLAN', myth:'A multilayer switch routes between VLANs out of the box.', fact:'`ip routing` is **OFF by default** on a switch. Inter-VLAN routing via SVIs does nothing until you enable `ip routing` globally.', why:''},
{id:'d3-default-gw-vs-route', dom:'3', obj:'3.1', topic:'Default route', myth:'`ip default-gateway` and `ip route 0.0.0.0` are interchangeable.', fact:'`ip default-gateway` works **only when `ip routing` is disabled** (L2 switch mgmt). Once routing is on, use `ip route 0.0.0.0 0.0.0.0 <next-hop>`.', why:''},
{id:'d3-ospf-network-wild', dom:'3', obj:'3.4', topic:'OSPF', myth:'The OSPF `network` statement uses a subnet mask and advertises routes.', fact:'It uses a **wildcard mask** and merely **selects which interfaces run OSPF** (any interface whose IP falls in the range). It does not "add routes."', why:'`network 10.0.0.0 0.0.0.255 area 0` ← wildcard.'},
{id:'d3-ospf-rid', dom:'3', obj:'3.4', topic:'OSPF RID', myth:'A router without a configured RID has no Router ID.', fact:'There is always a RID: **(1) configured `router-id`, else (2) highest up loopback IP, else (3) highest up physical IP.** It is locked at process start and won\'t change until OSPF is cleared.', why:''},
{id:'d3-ospf-dr-segment', dom:'3', obj:'3.4', topic:'OSPF DR/BDR', myth:'DR/BDR is elected per area.', fact:'DR/BDR is elected **per multi-access (broadcast) segment**, not per area. **Point-to-point links have no DR/BDR.** A router can be DR on one segment and DROther on another.', why:''},
{id:'d3-ospf-nonpreempt', dom:'3', obj:'3.4', topic:'OSPF DR/BDR', myth:'A higher-priority router will take over as DR.', fact:'OSPF election is **non-preemptive**. Highest **priority** wins first (default 1), RID is the tiebreaker. **Priority 0 = never DR/BDR.** A new high-priority router waits for the current DR to fail.', why:''},
{id:'d3-ospf-timers', dom:'3', obj:'3.4', topic:'OSPF', myth:'OSPF Hello/Dead timers are global.', fact:'They are **per-interface** and **must match neighbors** to form adjacency. **Broadcast/P2P: Hello 10 / Dead 40. NBMA: 30 / 120.** Dead = 4× Hello.', why:''},
{id:'d3-ospf-cost', dom:'3', obj:'3.4', topic:'OSPF cost', myth:'Faster links always get a lower OSPF cost.', fact:'Cost = **10^8 / bandwidth (bps)**. Default reference is 100 Mbps, so Fa, Gig, and 10Gig **all round to cost 1** until you raise `auto-cost reference-bandwidth`.', why:''},
{id:'d3-ospf-scope', dom:'3', obj:'3.4', topic:'OSPF scope', myth:'CCNA OSPF includes multi-area, stub/NSSA, LSA types, redistribution.', fact:'CCNA is **single-area OSPFv2 only**: adjacency, RID, DR/BDR, network types, cost. ABR/ASBR, stub/NSSA, LSA types, redistribution are **ENCOR-level**.', why:'Don\'t over-study the wrong depth.'},
{id:'d3-ospf-default-orig', dom:'3', obj:'3.4', topic:'OSPF', myth:'OSPF advertises a default route automatically.', fact:'OSPF only injects a default when **`default-information originate`** is set on the ASBR; it arrives at neighbors with AD 110.', why:''},
{id:'d3-fhrp', dom:'3', obj:'3.5', topic:'FHRP', myth:'HSRP, VRRP, and GLBP all behave the same.', fact:'**HSRP** (Cisco, 1 active/1 standby, **preempt OFF** by default, priority 100). **VRRP** (open, master/backup, **preempt ON** by default, owner priority 255). **GLBP** (Cisco, **load-balances** across up to 4 AVFs).', why:'The preempt default flip and "which load-balances" are the traps.'},
{id:'d3-return-path', dom:'3', obj:'3.1', topic:'Connectivity', myth:'If the forward path works, the ping works.', fact:'Connectivity needs a **working return path**. A ping fails if the destination has no route back to the source, even when the forward path is fine.', why:''},

/* ===== DOMAIN 4 — IP Services ===== */
{id:'d4-nat-terms', dom:'4', obj:'4.1', topic:'NAT', myth:'Inside/outside and local/global are about public vs private.', fact:'**Local = how the *inside* network sees an address; Global = how the *outside* sees it.** Inside Local = private host IP; **Inside Global = its translated public IP**; Outside Global = the remote server\'s real IP; Outside Local = how that server appears inside.', why:'The single most-confused NAT topic.'},
{id:'d4-nat-pat', dom:'4', obj:'4.1', topic:'PAT', myth:'PAT and static NAT are configured the same.', fact:'**PAT (NAT overload)** maps many hosts to one public IP using unique source ports — needs the **`overload`** keyword. NAT does nothing until each interface is tagged **`ip nat inside`** / **`ip nat outside`**.', why:'Forgetting the interface tags is the silent failure.'},
{id:'d4-ntp', dom:'4', obj:'4.2', topic:'NTP', myth:'NTP runs over TCP.', fact:'**NTP = UDP 123.** Lower stratum number = closer to the authoritative clock source (stratum 0). A device syncs to the lowest reachable stratum.', why:''},
{id:'d4-dhcp-ports', dom:'4', obj:'4.6', topic:'DHCP', myth:'DHCP uses one port.', fact:'**Server UDP 67, client UDP 68.** Sequence is **DORA**: Discover (bcast), Offer, Request (bcast, names the server), Ack. Renewal at T1 (50%) is **unicast**; rebind at T2 (87.5%) is broadcast.', why:''},
{id:'d4-dhcp-relay', dom:'4', obj:'4.6', topic:'DHCP relay', myth:'`ip helper-address` only forwards DHCP, and goes on the server side.', fact:'It goes on the interface **facing the clients** and converts the client broadcast to unicast. By default it relays **8 UDP services** (DHCP 67/68, TFTP 69, DNS 53, TIME, NetBIOS 137/138, TACACS 49).', why:'Routers don\'t forward the broadcast Discover without it.'},
{id:'d4-dhcp-exclude', dom:'4', obj:'4.6', topic:'DHCP', myth:'`ip dhcp excluded-address` goes inside the pool.', fact:'It is a **global** command (outside the pool) and must reserve the gateway/static IPs so clients don\'t lease them.', why:''},
{id:'d4-snmp-v3', dom:'4', obj:'4.4', topic:'SNMP', myth:'SNMP is secure if you set a community string.', fact:'**SNMPv1/v2c send community strings in clear text.** Only **SNMPv3** adds authentication **and** encryption (authPriv). Poll = UDP **161**, trap = UDP **162**.', why:'"Secure SNMP" → v3 every time.'},
{id:'d4-syslog-sev', dom:'4', obj:'4.5', topic:'Syslog', myth:'Higher severity number = more serious.', fact:'**Lower = more severe: 0 Emergency … 7 Debugging.** ("Every Awesome Cisco Engineer Will Need Ice cream Daily.") Setting level 5 logs 0-5. Syslog = UDP **514**.', why:''},
{id:'d4-qos', dom:'4', obj:'4.7', topic:'QoS', myth:'CoS and DSCP are the same marking.', fact:'**CoS** = L2, 3 bits, lives in the 802.1Q tag. **DSCP** = L3, 6 bits in the IP header. **EF (DSCP 46)** = voice. Policing **drops/remarks**; shaping **buffers/delays**.', why:''},
{id:'d4-ports', dom:'4', obj:'4.9', topic:'Ports', myth:'FTP, TFTP, and SSH ports are easy to keep straight.', fact:'**FTP 20/21 TCP, TFTP 69 UDP** (not 21, not TCP). **SSH 22 vs Telnet 23** is the classic swap. Also: SMTP 25, POP3 110, IMAP 143, HTTP 80, HTTPS 443, LDAP 389 / LDAPS 636.', why:''},
{id:'d4-port-ranges', dom:'4', obj:'4.9', topic:'Ports', myth:'There is one big range of ports.', fact:'**Well-known 0-1023, registered 1024-49151, ephemeral/dynamic 49152-65535.** The ephemeral start (49152) is the often-missed boundary.', why:''},

/* ===== DOMAIN 5 — Security Fundamentals ===== */
{id:'d5-enable-secret', dom:'5', obj:'5.3', topic:'Passwords', myth:'`enable password` and `enable secret` are redundant.', fact:'If both are set, **`enable secret` (hashed) always wins** and `enable password` (plaintext) is ignored. Always configure secret.', why:''},
{id:'d5-pw-encryption', dom:'5', obj:'5.3', topic:'Passwords', myth:'`service password-encryption` secures your passwords.', fact:'It only applies **type 7 (Vigenère)** encryption, which is **trivially reversible**. It stops shoulder-surfing only. `enable secret` uses real hashing.', why:''},
{id:'d5-login-local', dom:'5', obj:'5.3', topic:'Line access', myth:'`login` and `login local` do the same thing.', fact:'`login` checks the **line password**; `login local` checks the **local username database**. **SSH requires `login local`** (or AAA), not bare `login`.', why:''},
{id:'d5-ssh-prereq', dom:'5', obj:'4.8', topic:'SSH', myth:'You just turn SSH on under the vty lines.', fact:'SSH needs **global** setup first: a non-default **hostname** + **`ip domain-name`** + **`crypto key generate rsa`** (modulus ≥768 for v2, use 1024+) + `ip ssh version 2` + a local user. Under `line vty`: `login local` and **`transport input ssh`**.', why:''},
{id:'d5-acl-firstmatch', dom:'5', obj:'5.6', topic:'ACL', myth:'An ACL evaluates all lines and picks the best match.', fact:'ACLs are **top-down, first-match-wins**. The moment a packet matches a line, evaluation stops. A broad line above a specific one makes the specific line unreachable — **order matters**.', why:''},
{id:'d5-acl-implicit', dom:'5', obj:'5.6', topic:'ACL', myth:'An ACL with only permits lets the rest through.', fact:'Every ACL ends with an invisible **`deny ip any any`**. Anything not explicitly permitted is dropped. An all-permit ACL still blocks everything else.', why:''},
{id:'d5-acl-placement', dom:'5', obj:'5.6', topic:'ACL', myth:'Put every ACL close to the source.', fact:'**Standard ACL** (source only) → place near the **destination**. **Extended ACL** (src+dst+proto+port) → place near the **source**. People reverse this.', why:''},
{id:'d5-acl-wildcard', dom:'5', obj:'5.6', topic:'ACL wildcard', myth:'ACLs use a subnet mask.', fact:'They use a **wildcard mask** (inverse of subnet mask): **0 = must match, 1 = ignore**. `host x` = `x 0.0.0.0`; `any` = `0.0.0.0 255.255.255.255`. Wildcards can even be **discontiguous** (e.g. 0.0.0.254 = even hosts).', why:''},
{id:'d5-acl-ranges', dom:'5', obj:'5.6', topic:'ACL', myth:'Any ACL number works for any ACL type.', fact:'**Standard = 1-99 and 1300-1999. Extended = 100-199 and 2000-2699.** Named ACLs are editable by sequence number; numbered legacy ACLs are not.', why:''},
{id:'d5-portsec-default', dom:'5', obj:'5.7', topic:'Port security', myth:'The default port-security violation mode is restrict.', fact:'Default is **shutdown** (err-disables the port, sends trap+log). **restrict** drops+logs but stays up; **protect** drops silently. Default max secure MAC = **1**. Recover err-disable with `shut`/`no shut`.', why:''},
{id:'d5-portsec-sticky', dom:'5', obj:'5.7', topic:'Port security', myth:'Sticky MACs are saved automatically.', fact:'`switchport port-security mac-address sticky` adds learned MACs to the **running-config** — you still must **`copy run start`** or they\'re lost on reload.', why:''},
{id:'d5-aaa', dom:'5', obj:'5.8', topic:'AAA', myth:'RADIUS and TACACS+ are basically the same.', fact:'**TACACS+** (Cisco, **TCP 49**) encrypts the **whole packet** and separates A/A/A. **RADIUS** (open, **UDP 1812/1813**) encrypts **only the password** and merges authentication+authorization.', why:''},
{id:'d5-wpa', dom:'5', obj:'5.9', topic:'WLAN security', myth:'WPA2 Personal and Enterprise are configured the same.', fact:'**Personal (PSK)** = one shared passphrase. **Enterprise (802.1X)** = per-user auth via a **RADIUS** server. WPA3 is current; WEP/open are insecure distractors.', why:''},
{id:'d5-vlan-hop', dom:'5', obj:'5.7', topic:'L2 security', myth:'Leaving the native VLAN at 1 is harmless.', fact:'It enables **double-tagging VLAN-hopping** attacks. Best practice: set the native VLAN to an **unused** VLAN with no access ports, and hard-set access ports to `switchport mode access`.', why:''},

/* ===== EXAM TECHNIQUE (cross-domain) ===== */
{id:'x-no-back', dom:'1', obj:'exam', topic:'Exam logistics', myth:'You can flag a question and come back to it.', fact:'The CCNA has **no Back button** — you cannot return to or change a previous question. Answer each fully before advancing, especially sims/exhibits.', why:''},
{id:'x-no-calc', dom:'1', obj:'exam', topic:'Exam logistics', myth:'There\'s a calculator for subnetting.', fact:'Pearson VUE gives only an **erasable whiteboard** — no calculator. Memorize powers of 2 and a subnet cheat sheet so you can do binary math by hand under time.', why:''},
{id:'x-stem-first', dom:'1', obj:'exam', topic:'Test technique', myth:'Read the exhibit and answers, then the question.', fact:'Read the **question stem first** — it tells you the single detail that matters before you drown in the topology and distractors.', why:''},
{id:'x-distractors', dom:'1', obj:'exam', topic:'Test technique', myth:'If an answer is a true fact, it might be correct.', fact:'Cisco pads answer sets with facts that are **true but irrelevant** to this stem (often from a different step of the same process). "True" ≠ "the answer." Watch the exact noun: **best / most secure / most likely / least config**.', why:''},
{id:'x-quantity', dom:'1', obj:'exam', topic:'Test technique', myth:'Partial credit if you pick some right answers.', fact:'When the stem says **"Choose two/three,"** you must select **exactly** that many — too few or too many is marked wrong, no partial credit.', why:''}
]; /*__GAPS__*/
</script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var GAPS = window.TG_GAPS || [];
  var DOMAINS = {
    '1': { name: 'Network Fundamentals', pct: '20%' },
    '2': { name: 'Network Access',       pct: '20%' },
    '3': { name: 'IP Connectivity',      pct: '25%' },
    '4': { name: 'IP Services',          pct: '10%' },
    '5': { name: 'Security Fundamentals',pct: '15%' },
    '6': { name: 'Automation & Programmability', pct: '10%' }
  };
  var LS_KEY = 'tg_progress_v1';

  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
  // allow inline `code` and **bold** in source strings, after escaping
  function rich(s){ return esc(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>'); }

  function loadProg(){ try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){ return {}; } }
  function saveProg(p){ try { localStorage.setItem(LS_KEY, JSON.stringify(p)); } catch(e){} }
  var prog = loadProg();

  /* ---------- state ---------- */
  var scope = 'all';     // 'all' | domain key
  var view = 'drill';    // 'drill' | 'teach'
  var queue = [], qi = 0, revealed = false;

  function inScope(g){ return scope === 'all' || g.dom === scope; }
  function scoped(){ return GAPS.filter(inScope); }

  /* ---------- meta + pills ---------- */
  function countByDom(){
    var c = {};
    GAPS.forEach(function(g){ c[g.dom] = (c[g.dom]||0)+1; });
    return c;
  }
  function renderScope(){
    var c = countByDom();
    var pills = ['<button class="tg-pill'+(scope==='all'?' active':'')+'" data-s="all">All<span class="n">'+GAPS.length+'</span></button>'];
    Object.keys(DOMAINS).forEach(function(k){
      if (!c[k]) return;
      pills.push('<button class="tg-pill'+(scope===k?' active':'')+'" data-s="'+k+'">D'+k+'<span class="n">'+c[k]+'</span></button>');
    });
    document.getElementById('tg-scope').innerHTML = pills.join('');
  }
  function renderMeta(){
    var s = scoped();
    var mastered = s.filter(function(g){ return (prog[g.id]||{}).got >= 2; }).length;
    document.getElementById('tg-meta').innerHTML =
      '<b>'+mastered+'</b> / '+s.length+' tiny gaps locked in';
  }

  /* ---------- drill ---------- */
  function buildQueue(){
    // weight: never-seen and missed first, mastered last
    var s = scoped().slice();
    function w(g){ var p = prog[g.id]||{}; if((p.got||0) >= 2) return 3; if(p.miss) return 0; if(p.got) return 2; return 1; }
    // shuffle within weight buckets using id-derived jitter (no Math.random dependency needed but fine here)
    s.sort(function(a,b){ var d = w(a)-w(b); return d !== 0 ? d : (a.id < b.id ? -1 : 1); });
    queue = s; qi = 0; revealed = false;
  }
  function renderDrill(){
    var host = document.getElementById('tg-drill');
    if (!queue.length){ host.innerHTML = '<div class="tg-card" style="text-align:center;color:var(--ink-muted)">No gaps in this scope.</div>'; return; }
    if (qi >= queue.length){
      host.innerHTML = '<div class="tg-card" style="text-align:center">'+
        '<div class="tg-myth-label" style="color:var(--prof-strong)">Round complete</div>'+
        '<p class="tg-myth">You cycled every gap in scope.</p>'+
        '<div class="tg-actions"><button class="tg-btn primary" id="tg-again">Go again</button></div></div>';
      document.getElementById('tg-again').onclick = function(){ buildQueue(); renderDrill(); };
      return;
    }
    var g = queue[qi];
    var d = DOMAINS[g.dom] || {name:'?'};
    host.innerHTML =
      '<div class="tg-card">'+
        '<div class="tg-chip-row"><span class="tg-chip">'+esc(g.topic)+'</span><span class="tg-chip obj">'+esc(g.obj)+' · D'+g.dom+'</span></div>'+
        '<div class="tg-myth-label">Most people think</div>'+
        '<p class="tg-myth">'+rich(g.myth)+'</p>'+
        '<div class="tg-reveal" id="tg-rev">'+
          '<div class="tg-fact"><span class="lbl">Actually</span>'+rich(g.fact)+'</div>'+
          (g.why ? '<p class="tg-why">'+rich(g.why)+'</p>' : '')+
        '</div>'+
        '<div class="tg-actions" id="tg-act">'+
          '<button class="tg-btn primary" id="tg-show">Reveal<span class="k">space</span></button>'+
        '</div>'+
        '<div class="tg-progress" id="tg-prog"></div>'+
      '</div>';
    revealed = false;
    updateProgLine();
    document.getElementById('tg-show').onclick = doReveal;
  }
  function doReveal(){
    if (revealed) return;
    revealed = true;
    document.getElementById('tg-rev').classList.add('show');
    document.getElementById('tg-act').innerHTML =
      '<button class="tg-btn miss" id="tg-miss">Missed it<span class="k">1</span></button>'+
      '<button class="tg-btn got" id="tg-got">Knew it<span class="k">2</span></button>';
    document.getElementById('tg-miss').onclick = function(){ score(false); };
    document.getElementById('tg-got').onclick = function(){ score(true); };
  }
  function score(ok){
    var g = queue[qi];
    var p = prog[g.id] || { got:0, miss:0 };
    if (ok) p.got = (p.got||0)+1; else { p.miss = (p.miss||0)+1; p.got = 0; }
    prog[g.id] = p; saveProg(prog);
    qi++; renderDrill(); renderMeta();
  }
  function updateProgLine(){
    var el = document.getElementById('tg-prog'); if(!el) return;
    var p = prog[queue[qi].id] || {};
    el.innerHTML = (qi+1)+' / '+queue.length+'  ·  '+
      '<b>'+(p.got||0)+' right</b>  ·  <span class="m">'+(p.miss||0)+' missed</span>';
  }

  /* ---------- teach ---------- */
  function renderTeach(){
    var host = document.getElementById('tg-teach');
    var byDom = {};
    scoped().forEach(function(g){ (byDom[g.dom] = byDom[g.dom] || []).push(g); });
    var html = '';
    Object.keys(DOMAINS).forEach(function(k){
      var items = byDom[k]; if(!items || !items.length) return;
      var d = DOMAINS[k];
      html += '<div class="tg-sec-head"><h2>D'+k+' · '+esc(d.name)+'</h2><span class="pct">'+d.pct+'</span><span class="desc">'+items.length+' gaps</span></div>';
      items.forEach(function(g){
        html += '<div class="tg-item" data-id="'+esc(g.id)+'">'+
          '<div class="tg-i-head"><span class="tg-i-obj">'+esc(g.obj)+'</span>'+
            '<span class="tg-i-title">'+rich(g.topic)+' — '+rich(g.myth)+'</span>'+
            '<span class="tg-i-toggle">▾</span></div>'+
          '<div class="tg-i-body"><div class="tg-i-inner"><div class="tg-i-pad">'+
            '<div class="tg-i-myth"><b>Gap:</b> '+rich(g.myth)+'</div>'+
            '<div class="tg-i-fact">'+rich(g.fact)+'</div>'+
            (g.why ? '<p class="tg-i-why">'+rich(g.why)+'</p>' : '')+
          '</div></div></div></div>';
      });
    });
    host.innerHTML = html;
    host.querySelectorAll('.tg-i-head').forEach(function(h){
      h.onclick = function(){ h.parentElement.classList.toggle('open'); };
    });
  }

  /* ---------- view + scope wiring ---------- */
  function setView(v){
    view = v;
    document.querySelectorAll('.tg-view').forEach(function(b){ b.classList.toggle('active', b.dataset.view === v); });
    document.body.classList.toggle('teachmode', v === 'teach');
    if (v === 'drill'){ buildQueue(); renderDrill(); } else { renderTeach(); }
  }
  document.querySelectorAll('.tg-view').forEach(function(b){
    b.onclick = function(){ setView(b.dataset.view); };
  });
  document.getElementById('tg-scope').onclick = function(e){
    var b = e.target.closest('.tg-pill'); if(!b) return;
    scope = b.dataset.s; renderScope(); renderMeta();
    if (view === 'drill'){ buildQueue(); renderDrill(); } else renderTeach();
  };
  document.getElementById('tg-reset').onclick = function(){
    if (!confirm('Reset all Tiny Gaps drill progress?')) return;
    prog = {}; saveProg(prog); renderMeta();
    if (view === 'drill'){ buildQueue(); renderDrill(); }
  };

  /* keyboard */
  document.addEventListener('keydown', function(e){
    if (view !== 'drill') return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space'){ e.preventDefault(); if(!revealed) doReveal(); }
    else if (revealed && e.key === '1') score(false);
    else if (revealed && e.key === '2') score(true);
  });

  /* init */
  if (!GAPS.length){ document.getElementById('tg-meta').textContent = 'no gaps loaded'; return; }
  renderScope(); renderMeta(); buildQueue(); renderDrill();
});
</script>
