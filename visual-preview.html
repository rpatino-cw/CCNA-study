<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Visual Renderer Preview — CCNA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --accent: #B45309; }
  body {
    font-family: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    background: #f6f3ee;
    color: #1c1917;
    margin: 0; padding: 40px;
    max-width: 900px; margin: 0 auto;
  }
  h1 { font-size: 24px; margin: 0 0 8px; color: var(--accent); }
  p.sub { color: #78716c; margin: 0 0 32px; }
  section { margin-bottom: 32px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: #78716c; margin: 0 0 8px; font-weight: 600; }
  .sv-wrap {
    background: #fff;
    border: 1px solid #e7e5e4;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
<h1>Visual Renderer Preview</h1>
<p class="sub">13 renderer types · pure SVG · entrance via IntersectionObserver</p>
<div id="grid"></div>
<script src="js/subtopic-visuals.js"></script>
<script>
const samples = [
  ['packet-flow', { type: 'packet-flow', params: { nodes: ['Host A', 'R1', 'R2', 'Host B'], color: '#3b82f6', ttl: 64 } }],
  ['layer-stack (OSI)', { type: 'layer-stack', params: { layers: ['Application','Presentation','Session','Transport','Network','Data Link','Physical'], highlight: 3 } }],
  ['comparison', { type: 'comparison', params: { left: { label: 'TCP', items: ['Connection-oriented','Reliable','Ordered','3-way handshake'] }, right: { label: 'UDP', items: ['Connectionless','Best-effort','No handshake','Low overhead'] } } }],
  ['handshake (TCP)', { type: 'handshake', params: { leftLabel: 'Client', rightLabel: 'Server', steps: ['SYN →', '← SYN-ACK', 'ACK →'], extras: ['SEQ=100','SEQ=400 ACK=101','SEQ=101 ACK=401'] } }],
  ['hierarchy (campus)', { type: 'hierarchy', params: { root: 'Core', children: [
    { name: 'Dist-A', children: [{name:'Access-1'},{name:'Access-2'}] },
    { name: 'Dist-B', children: [{name:'Access-3'},{name:'Access-4'}] }
  ] } }],
  ['encapsulation', { type: 'encapsulation', params: {} }],
  ['state-machine (OSPF)', { type: 'state-machine', params: { states: ['Down','Init','2-Way','ExStart','Exchange','Full'], active: 5, transitionLabels: ['Hello','Hello w/ RID','DR elect','DBD','LSR/LSU','Sync'] } }],
  ['binary-breakdown (/26)', { type: 'binary-breakdown', params: { bits: '11111111.11111111.11111111.11000000', label: 'Subnet mask /26 = 255.255.255.192', prefix: 26 } }],
  ['shield', { type: 'shield', params: { items: ['Port security','BPDU Guard','DHCP Snooping','DAI'] } }],
  ['gauge', { type: 'gauge', params: { level: 78, label: 'Link utilization', threshold: 80 } }],
  ['protocol-timeline (DHCP DORA)', { type: 'protocol-timeline', params: {
    actors: ['Client', 'Server'],
    events: [
      { from: 0, to: 1, label: 'DISCOVER', size: 342 },
      { from: 1, to: 0, label: 'OFFER', size: 342 },
      { from: 0, to: 1, label: 'REQUEST', size: 342 },
      { from: 1, to: 0, label: 'ACK', size: 342 }
    ]
  } }],
  ['subnet-ruler (/26)', { type: 'subnet-ruler', params: { prefix: 26 } }],
  ['topology-live', { type: 'topology-live', params: {
    nodes: [
      { id: 'PC-A', x: 0.1, y: 0.3, kind: 'host' },
      { id: 'SW1',  x: 0.35, y: 0.6, kind: 'switch' },
      { id: 'R1',   x: 0.55, y: 0.3, kind: 'router' },
      { id: 'SW2',  x: 0.75, y: 0.6, kind: 'switch' },
      { id: 'PC-B', x: 0.95, y: 0.3, kind: 'host' }
    ],
    links: [
      { from: 0, to: 1 }, { from: 1, to: 2 }, { from: 2, to: 3 }, { from: 3, to: 4 }
    ]
  } }],
  ['routing-table', { type: 'routing-table', params: {} }],
  ['acl-ladder', { type: 'acl-ladder', params: {} }],
  ['stp-tree', { type: 'stp-tree', params: {} }],
  ['nat-table', { type: 'nat-table', params: {} }],
  ['cam-table', { type: 'cam-table', params: {} }],
  ['lsa-flood (OSPF)', { type: 'lsa-flood', params: {} }],
  ['qos-queues', { type: 'qos-queues', params: {} }],
  ['trunk-tagging', { type: 'trunk-tagging', params: { leftVlan: 10, rightVlan: 10, native: 1 } }],
  ['rf-heatmap', { type: 'rf-heatmap', params: {} }],
  ['subnet-divide', { type: 'subnet-divide', params: {} }],
  ['dhcp-dora', { type: 'dhcp-dora', params: {} }],
  ['tcp-window', { type: 'tcp-window', params: {} }],
  ['etherchannel (LACP)', { type: 'etherchannel', params: { links: 4, protocol: 'LACP' } }],
  ['ospf-neighbor FSM', { type: 'ospf-neighbor', params: { current: 6 } }],
  ['spine-leaf fabric', { type: 'spine-leaf', params: { spines: 3, leaves: 4 } }],
  ['hsrp-failover', { type: 'hsrp-failover', params: {} }],
  ['dns-resolution', { type: 'dns-resolution', params: {} }],
  ['ipsec-tunnel', { type: 'ipsec-tunnel', params: {} }],
  ['syslog-severity', { type: 'syslog-severity', params: { active: 5 } }],
  ['traceroute-ladder', { type: 'traceroute-ladder', params: {} }],
  ['cert-chain', { type: 'cert-chain', params: {} }],
  ['rstp-states', { type: 'rstp-states', params: { active: 4 } }],
  ['wire-packet', { type: 'wire-packet', params: {} }],
  ['arp-resolve', { type: 'arp-resolve', params: {} }],
  ['cdp-neighbor', { type: 'cdp-neighbor', params: {} }],
  ['port-security (shutdown)', { type: 'port-security', params: { maxMacs: 2, action: 'shutdown' } }],
  ['eigrp-metric', { type: 'eigrp-metric', params: {} }],
  ['vlan-colors', { type: 'vlan-colors', params: {} }],
  ['aaa-flow (TACACS+)', { type: 'aaa-flow', params: {} }],
  ['api-request (REST)', { type: 'api-request', params: {} }],
  ['json-tree', { type: 'json-tree', params: {} }],
  ['ipv6-slaac', { type: 'ipv6-slaac', params: {} }],
  ['ospf-dr-bdr', { type: 'ospf-dr-bdr', params: {} }],
  ['ntp-stratum', { type: 'ntp-stratum', params: {} }],
  ['bgp-neighbor', { type: 'bgp-neighbor', params: { active: 5 } }],
  ['ssh-handshake', { type: 'ssh-handshake', params: {} }],
  ['radius-auth (802.1X)', { type: 'radius-auth', params: {} }],
  ['pvst+', { type: 'pvst', params: {} }],
  ['osi-troubleshoot', { type: 'osi-troubleshoot', params: {} }],
  ['cloud-stack', { type: 'cloud-stack', params: {} }],
  ['capwap-tunnel', { type: 'capwap-tunnel', params: {} }],
  ['tcp-flags (SYN+ACK)', { type: 'tcp-flags', params: {} }],
  ['ad-comparison', { type: 'ad-comparison', params: {} }],
  ['cli-terminal', { type: 'cli-terminal', params: {} }],
  ['ipv6-types', { type: 'ipv6-types', params: {} }]
];
const grid = document.getElementById('grid');
samples.forEach(([label, vis]) => {
  const sec = document.createElement('section');
  sec.innerHTML = `<h2>${label}</h2>${SubtopicVisuals.render(vis)}`;
  grid.appendChild(sec);
});
</script>
</body>
</html>
