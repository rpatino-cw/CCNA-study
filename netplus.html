<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE — Network+ N10-009 Study System</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  .gc-bar,.gc-chat-panel,#guidePill{display:none!important}
  :root{--np:#DC2626;--np-rgb:220,38,38;--np-light:#F87171;--np-dark:#991B1B}

  .core-header{padding:var(--s-lg) 0 var(--s-md);border-bottom:3px solid var(--np);margin-bottom:var(--s-md)}
  .core-title{font-size:2.4rem;font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:6px;color:var(--np)}
  .core-meta{display:flex;align-items:baseline;gap:var(--s-lg);font-family:var(--font-display);font-size:.82rem;color:var(--ink-muted);letter-spacing:.02em;text-transform:uppercase;margin-top:var(--s-sm)}
  .core-meta .countdown{color:var(--np);font-weight:600}

  .hero-action{max-width:640px;margin:0 auto var(--s-2xl);padding:var(--s-xl) var(--s-xl);text-align:center}
  .ha-label{font-family:var(--font-mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-muted);margin-bottom:var(--s-sm)}
  .ha-title{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:var(--s-sm);line-height:1.3}
  .ha-sub{font-family:var(--font-body);font-size:.88rem;color:var(--ink-secondary);margin-bottom:var(--s-lg);line-height:1.6}
  .ha-bar-wrap{max-width:320px;margin:0 auto var(--s-sm)}
  .ha-bar{height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
  .ha-bar-fill{height:100%;background:var(--np);border-radius:3px;transition:width .8s var(--ease-out)}
  .ha-pct{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);margin-bottom:var(--s-lg)}
  .ha-btn{display:inline-block;font-family:var(--font-display);font-size:.88rem;font-weight:700;color:#fff;background:var(--np);padding:12px 36px;border-radius:var(--radius-lg);text-decoration:none;transition:all .2s;border:none;cursor:pointer}
  .ha-btn:hover{background:var(--np-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(220,38,38,.25)}
  .ha-review{font-family:var(--font-body);font-size:.78rem;color:var(--ink-muted);margin-top:var(--s-sm)}

  .stats-line{display:flex;justify-content:center;gap:var(--s-xl);padding:var(--s-md) 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:var(--s-2xl);font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);flex-wrap:wrap}
  .stats-line strong{color:var(--ink)}

  .domain-heat{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:var(--s-xl)}
  .dh-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer;transition:border-color .15s}
  .dh-card:hover{border-color:var(--np)}
  .dh-pct{font-family:var(--font-mono);font-size:1.4rem;font-weight:800}
  .dh-name{font-family:var(--font-display);font-size:.62rem;color:var(--ink-muted);margin-top:2px}
  .dh-bar{height:4px;background:var(--bg-recessed);border-radius:2px;margin-top:6px;overflow:hidden}
  .dh-fill{height:100%;border-radius:2px}

  .domain-section{margin-bottom:var(--s-2xl);scroll-margin-top:80px}
  .ds-head{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:2px solid var(--border-strong);cursor:pointer;user-select:none}
  .ds-title{font-family:var(--font-display);font-size:1.15rem;font-weight:800}
  .ds-meta{display:flex;align-items:center;gap:12px}
  .ds-pct{font-family:var(--font-mono);font-size:.88rem;font-weight:700}
  .ds-weight{font-family:var(--font-mono);font-size:.65rem;color:var(--ink-muted)}
  .ds-toggle{font-size:1.2rem;color:var(--ink-muted);transition:transform .2s}
  .ds-toggle.open{transform:rotate(180deg)}
  .ds-body{display:none;padding-top:var(--s-lg)}
  .ds-body.open{display:block}

  .obj-card{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;transition:border-color .15s}
  .obj-card.mastered{border-left:3px solid var(--prof-strong)}
  .obj-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;transition:background .1s}
  .obj-head:hover{background:var(--bg-recessed)}
  .obj-id{font-family:var(--font-mono);font-size:.78rem;font-weight:700;color:var(--np);min-width:40px}
  .obj-name{font-family:var(--font-display);font-size:.92rem;font-weight:600;flex:1}
  .obj-prof{width:80px;display:flex;align-items:center;gap:6px}
  .obj-bar{flex:1;height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
  .obj-fill{height:100%;border-radius:3px;transition:width .3s}
  .obj-pct{font-family:var(--font-mono);font-size:.68rem;font-weight:600;min-width:32px;text-align:right}

  .obj-body{display:none;padding:12px 20px 20px;border-top:1px solid var(--border)}
  .obj-body.open{display:block}
  .obj-subs{font-family:var(--font-body);font-size:.8rem;color:var(--ink-secondary);line-height:1.6;margin-bottom:16px;padding-left:16px}
  .obj-subs li{margin-bottom:5px}

  /* Quick Path — same as core.html */
  .quick-path{background:rgba(220,38,38,.04);border:1px solid rgba(220,38,38,.15);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:14px}
  .qp-label{font-family:var(--font-display);font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--np);font-weight:700;margin-bottom:8px}
  .qp-steps{display:flex;flex-direction:column;gap:10px}
  .qp-step{display:flex;align-items:center;gap:8px;font-family:var(--font-body);font-size:.82rem;color:var(--ink-secondary)}
  .qp-num{font-family:var(--font-mono);font-size:.65rem;font-weight:700;color:var(--np);background:rgba(220,38,38,.1);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .qp-step a{color:var(--ink);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(220,38,38,.3)}
  .qp-step a:hover{color:var(--np)}
  .qp-pass{font-family:var(--font-display);font-size:.72rem;color:var(--ink-muted);margin-top:6px;padding-left:26px}

  /* Practice shortcuts — same as core.html */
  .obj-shortcuts{display:flex;gap:6px;flex-wrap:wrap}
  .obj-sc{font-family:var(--font-display);font-size:.72rem;padding:6px 12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--ink-secondary);text-decoration:none;transition:all .15s}
  .obj-sc:hover{border-color:var(--np);color:var(--np)}

  .res-section{margin-bottom:16px}
  .res-title{font-family:var(--font-display);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);margin-bottom:6px}
  .res-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);font-size:.8rem;transition:background .1s}
  .res-row:hover{background:var(--bg-recessed)}
  .res-row a{color:var(--ink-secondary);text-decoration:none;font-family:var(--font-body)}
  .res-row a:hover{color:var(--np)}
  .res-tag{font-family:var(--font-mono);font-size:.62rem;padding:3px 8px;border-radius:3px;font-weight:600;flex-shrink:0}
  .res-tag.video{background:rgba(220,38,38,.08);color:#DC2626}
  .res-tag.article{background:rgba(37,99,235,.08);color:#2563EB}
  .res-tag.site{background:rgba(22,163,74,.08);color:#16A34A}
  .res-tag.drill{background:rgba(180,83,9,.08);color:#B45309}
  .res-tag.lab{background:rgba(8,145,178,.08);color:#0891B2}

  .res-toggle{font-family:var(--font-display);font-size:.68rem;color:var(--ink-muted);cursor:pointer;padding:6px 0;margin-bottom:4px;display:flex;align-items:center;gap:4px}
  .res-toggle:hover{color:var(--ink)}
  .res-toggle .caret{transition:transform .2s;font-size:.6rem}
  .res-toggle .caret.open{transform:rotate(90deg)}
  .res-all{display:none}
  .res-all.open{display:block}

  @media(max-width:640px){.domain-heat{grid-template-columns:repeat(3,1fr)}.obj-prof{width:60px}}
  @media print{.hero-action,.stats-line,.ds-toggle,nav.top-nav{display:none!important}.ds-body,.obj-body{display:block!important}.obj-card{break-inside:avoid;border:1px solid #ccc}body{font-size:10pt}}
</style>
</head>

/* ── Exam Countdown ── */
(function(){
  var saved=localStorage.getItem('np_exam_target'),picker=document.getElementById('examDatePicker'),label=document.getElementById('examTarget'),cd=document.getElementById('countdown');
  function update(ds){if(!ds){label.textContent='Exam target: set date';cd.textContent='';return;}var d=new Date(ds+'T00:00:00'),diff=Math.ceil((d-new Date())/(864e5));label.textContent='Exam: '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});cd.textContent=diff>0?diff+' days left':diff===0?'Today!':Math.abs(diff)+' days ago';}
  picker.addEventListener('change',function(){localStorage.setItem('np_exam_target',picker.value);update(picker.value);});
  if(saved){picker.value=saved;update(saved);}
})();

/* ── Toggle helpers (same as core.html) ── */
function toggleObj(id){
  var el=document.getElementById('objbody-'+id);
  if(el)el.classList.toggle('open');
}
function openAndScroll(objId,domId){
  var body=document.getElementById('ds-body-'+domId);
  if(body&&!body.classList.contains('open')){body.classList.add('open');body.previousElementSibling.querySelector('.ds-toggle').classList.add('open');}
  setTimeout(function(){
    var obj=document.getElementById('obj-'+objId);
    if(obj){obj.scrollIntoView({behavior:'smooth',block:'center'});
    var ob=document.getElementById('objbody-'+objId);if(ob&&!ob.classList.contains('open'))ob.classList.add('open');}
  },200);
}

/* ── Quick Path builder (same pattern as core.html) ── */
function buildQuickPath(objId,r){
  var prof=npProf[objId]||0;
  var p=Math.round(prof*100);
  var passed=p>=70;
  var vidTitle='',vidUrl='';
  if(r.videos&&r.videos.length){vidTitle=r.videos[0].t;vidUrl=r.videos[0].u;}

  var stepNum=1;
  var html='<div class="quick-path"><div class="qp-label">Quick Path to Pass</div><div class="qp-steps">';
  if(vidUrl){html+='<div class="qp-step"><span class="qp-num">'+stepNum+'</span>Watch <a href="'+vidUrl+'" target="_blank">'+esc(vidTitle)+'</a></div>';stepNum++;}
  html+='<div class="qp-step"><span class="qp-num">'+stepNum+'</span><a href="netplus-quiz.html">Quick Quiz</a> — score 70%+ to pass this objective</div>';
  if(passed){html+='<div class="qp-step"><span class="qp-num" style="background:rgba(22,163,74,.15);color:#16A34A">&#10003;</span><span style="color:#16A34A;font-weight:600">You\'re at '+p+'% — move to the next objective</span></div>';}
  else{stepNum++;html+='<div class="qp-step"><span class="qp-num">'+stepNum+'</span>Below 70%? Review weak areas, retake quiz</div>';}
  html+='</div>';
  if(passed)html+='<div class="qp-pass">You can move on. Come back for review before the exam.</div>';
  html+='</div>';
  return html;
}

function countResources(r){var n=0;if(r.videos)n+=r.videos.length;if(r.articles)n+=r.articles.length;if(r.site)n+=r.site.length;if(r.drills)n+=r.drills.length;return n;}

/* ── Proficiency (localStorage, same key pattern) ── */
var npProf=JSON.parse(localStorage.getItem('np_proficiency')||'{}');
var npMastered=JSON.parse(localStorage.getItem('np_core_mastered')||'{}');

/* ── Main Render ── */
function render(){
  var allObjs=[];NP_DOMAINS.forEach(function(d){d.objs.forEach(function(id){allObjs.push(id);});});

  // Auto-master at 70%
  var mc=false;allObjs.forEach(function(id){if((npProf[id]||0)>=0.7&&!npMastered[id]){npMastered[id]=true;mc=true;}});
  if(mc)localStorage.setItem('np_core_mastered',JSON.stringify(npMastered));

  var totalMastered=allObjs.filter(function(id){return npMastered[id];}).length;
  var readiness=0;allObjs.forEach(function(id){readiness+=(npProf[id]||0);});
  readiness=allObjs.length?Math.round(readiness/allObjs.length*100):0;

  // Hero
  var heroEl=document.getElementById('heroAction');
  var hasAny=allObjs.some(function(id){return(npProf[id]||0)>0;});
  if(!hasAny){
    heroEl.innerHTML='<div class="ha-label">Welcome</div><div class="ha-title">Let\'s get you Network+ ready</div><div class="ha-sub">Start with Domain 1 — expand the objectives below and follow the Quick Path for each one.</div><a href="guide.html" class="ha-btn">Begin with the Guide</a>';
  } else {
    var lowestId=null,lowestP=Infinity,lowestDom='';
    NP_DOMAINS.forEach(function(d){d.objs.forEach(function(id){if(!npMastered[id]&&(npProf[id]||0)<lowestP){lowestP=npProf[id]||0;lowestId=id;lowestDom=d.name;}});});
    if(lowestId){
      var pct=Math.round(lowestP*100);
      var lowestDomId=lowestId.split('.')[0];
      heroEl.innerHTML='<div class="ha-label">Your next step</div><div class="ha-title">'+lowestId+' '+esc(NP_NAMES[lowestId])+'</div><div class="ha-sub">'+esc(lowestDom)+' — '+pct+'% proficiency</div><div class="ha-bar-wrap"><div class="ha-bar"><div class="ha-bar-fill" style="width:'+pct+'%"></div></div></div><div class="ha-pct">'+pct+'% mastered</div><button class="ha-btn" onclick="openAndScroll(\''+lowestId+'\',\''+lowestDomId+'\')">Study Now</button>';
    } else {
      heroEl.innerHTML='<div class="ha-label">All objectives mastered</div><div class="ha-title">You\'ve covered every objective</div><div class="ha-sub">Take practice exams to confirm readiness.</div><a href="netplus-exam.html" class="ha-btn">Take Practice Exam</a>';
    }
  }

  // Stats
  document.getElementById('statsLine').innerHTML='<span><strong>'+totalMastered+'</strong>/'+allObjs.length+' mastered</span><span>Readiness: <strong>'+readiness+'%</strong></span><span>'+NP_DOMAINS.length+' domains</span>';

  // Heatmap
  var heatWeakId='1',heatWeakAvg=Infinity;
  document.getElementById('domainHeat').innerHTML=NP_DOMAINS.map(function(d){
    var sum=0;d.objs.forEach(function(id){sum+=(npProf[id]||0);});
    var avg=Math.round(sum/d.objs.length*100);
    if(avg<heatWeakAvg){heatWeakAvg=avg;heatWeakId=d.id;}
    return'<div class="dh-card" onclick="document.getElementById(\'domain-'+d.id+'\').scrollIntoView({behavior:\'smooth\'})"><div class="dh-pct" style="color:'+profColor(avg/100)+'">'+avg+'%</div><div class="dh-name">D'+d.id+' '+esc(d.name)+'</div><div class="dh-bar"><div class="dh-fill" style="width:'+avg+'%;background:'+profColor(avg/100)+'"></div></div></div>';
  }).join('');
  document.getElementById('domainHeatMeta').textContent='Weakest: D'+heatWeakId+' ('+heatWeakAvg+'%)';

  // Filter bar
  var storedFilter=localStorage.getItem('np_core_filter')||'';
  var filterMode=storedFilter;
  var showWeak=filterMode==='weak';
  var weakCount=allObjs.filter(function(id){return(npProf[id]||0)<0.7;}).length;
  function fbtn(mode,label){var active=filterMode===mode;return'<button style="font-family:var(--font-display);font-size:.72rem;padding:6px 14px;background:'+(active?'var(--np)':'var(--bg-surface)')+';color:'+(active?'#fff':'var(--ink-muted)')+';border:1px solid '+(active?'var(--np)':'var(--border)')+';border-radius:var(--radius);cursor:pointer" onclick="localStorage.setItem(\'np_core_filter\',\''+mode+'\');render()">'+label+'</button>';}
  document.getElementById('filterBar').innerHTML='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+fbtn('','Show All')+fbtn('weak','Weak Only ('+weakCount+')')+'</div>';

  // Domain sections
  document.getElementById('domainSections').innerHTML=NP_DOMAINS.map(function(d){
    var sum=0;d.objs.forEach(function(id){sum+=(npProf[id]||0);});
    var avg=Math.round(sum/d.objs.length*100);

    var topicsHtml=d.objs.map(function(id){
      var p=Math.round((npProf[id]||0)*100);
      var isMastered=!!npMastered[id];
      var hideCard=showWeak&&(isMastered||(npProf[id]||0)>=0.7);
      var r=NP_RES[id]||{};
      var obj=NP_OBJ[id]||{};
      var subs=obj.subs?'<ul class="obj-subs">'+obj.subs.map(function(s){return'<li>'+esc(s)+'</li>';}).join('')+'</ul>':'';

      // Resources HTML
      var resHtml='';
      if(r.videos)r.videos.forEach(function(v){resHtml+='<div class="res-row"><span class="res-tag video">VIDEO</span><a href="'+v.u+'" target="_blank">'+esc(v.t)+'</a></div>';});
      if(r.articles)r.articles.forEach(function(a){resHtml+='<div class="res-row"><span class="res-tag article">READ</span><a href="'+a.u+'" target="_blank">'+esc(a.t)+'</a></div>';});
      if(r.drills)r.drills.forEach(function(dr){var href=dr.h||dr.u||'#';resHtml+='<div class="res-row"><span class="res-tag drill">DRILL</span><a href="'+href+'"'+(dr.u?' target="_blank"':'')+'>'+esc(dr.t)+'</a></div>';});

      // Shortcut buttons
      var siteHtml='<div class="obj-shortcuts">';
      if(r.site)r.site.forEach(function(s){siteHtml+='<a class="obj-sc" href="'+s.h+'">'+esc(s.t)+'</a>';});
      siteHtml+='</div>';

      return'<div class="obj-card'+(isMastered?' mastered':'')+'" id="obj-'+id+'"'+(hideCard?' style="display:none"':'')+'>'+
        '<div class="obj-head" onclick="toggleObj(\''+id+'\')">'+
          '<span class="obj-id">'+id+'</span>'+
          '<span class="obj-name">'+esc(NP_NAMES[id])+'</span>'+
          '<div class="obj-prof"><div class="obj-bar"><div class="obj-fill" style="width:'+p+'%;background:'+profColor(p/100)+'"></div></div><span class="obj-pct" style="color:'+profColor(p/100)+'">'+p+'%</span></div>'+
        '</div>'+
        '<div class="obj-body" id="objbody-'+id+'">'+
          subs+
          buildQuickPath(id,r)+
          '<div class="res-section"><div class="res-title">Practice on This Site</div>'+siteHtml+'</div>'+
          '<div class="res-toggle" onclick="var el=this.nextElementSibling;el.classList.toggle(\'open\');this.querySelector(\'.caret\').classList.toggle(\'open\')"><span class="caret">&#9656;</span> All Resources ('+countResources(r)+')</div>'+
          '<div class="res-all"><div class="res-section">'+resHtml+'</div></div>'+
        '</div></div>';
    }).join('');

    return'<div class="domain-section" id="domain-'+d.id+'">'+
      '<div class="ds-head" onclick="var b=document.getElementById(\'ds-body-'+d.id+'\');b.classList.toggle(\'open\');this.querySelector(\'.ds-toggle\').classList.toggle(\'open\')">'+
        '<div class="ds-title">'+d.id+'.0 '+esc(d.name)+'</div>'+
        '<div class="ds-meta"><span class="ds-weight">'+d.weight+'%</span><span class="ds-pct" style="color:'+profColor(avg/100)+'">'+avg+'%</span><span class="ds-toggle">&#9662;</span></div>'+
      '</div>'+
      '<div class="ds-body" id="ds-body-'+d.id+'">'+topicsHtml+'</div></div>';
  }).join('');
}

if(localStorage.getItem('ccna_cert_track')!=='net+'){

  var ns=document.createElement('script');ns.src='js/nav.js';document.body.appendChild(ns);
} else {
  render();
}
