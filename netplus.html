<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE — Network+ N10-009 Study System</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  .gc-bar,.gc-chat-panel,#guidePill{display:none!important}
  :root{--np:#DC2626;--np-rgb:220,38,38;--np-light:#F87171;--np-dark:#991B1B}

  .core-header{padding:var(--s-lg) 0 var(--s-md);border-bottom:3px solid var(--np);margin-bottom:var(--s-md)}
  .core-title{font-size:2.4rem;font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:6px;color:var(--np)}
  .core-meta{display:flex;align-items:baseline;gap:var(--s-lg);font-family:var(--font-display);font-size:.82rem;color:var(--ink-muted);letter-spacing:.02em;text-transform:uppercase;margin-top:var(--s-sm)}
  .core-meta .countdown{color:var(--np);font-weight:600}

  .hero-action{max-width:640px;margin:0 auto var(--s-2xl);padding:var(--s-xl) var(--s-xl);text-align:center}
  .ha-label{font-family:var(--font-mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-muted);margin-bottom:var(--s-sm)}
  .ha-title{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:var(--s-sm);line-height:1.3}
  .ha-sub{font-family:var(--font-body);font-size:.88rem;color:var(--ink-secondary);margin-bottom:var(--s-lg);line-height:1.6}
  .ha-bar-wrap{max-width:320px;margin:0 auto var(--s-sm)}
  .ha-bar{height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
  .ha-bar-fill{height:100%;background:var(--np);border-radius:3px;transition:width .8s var(--ease-out)}
  .ha-pct{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);margin-bottom:var(--s-lg)}
  .ha-btn{display:inline-block;font-family:var(--font-display);font-size:.88rem;font-weight:700;color:#fff;background:var(--np);padding:12px 36px;border-radius:var(--radius-lg);text-decoration:none;transition:all .2s;border:none;cursor:pointer}
  .ha-btn:hover{background:var(--np-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(220,38,38,.25)}

  .stats-line{display:flex;justify-content:center;gap:var(--s-xl);padding:var(--s-md) 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:var(--s-2xl);font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);flex-wrap:wrap}
  .stats-line strong{color:var(--ink)}

  .domain-heat{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:var(--s-xl)}
  .dh-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer;transition:border-color .15s}
  .dh-card:hover{border-color:var(--np)}
  .dh-pct{font-family:var(--font-mono);font-size:1.4rem;font-weight:800}
  .dh-name{font-family:var(--font-display);font-size:.62rem;color:var(--ink-muted);margin-top:2px}
  .dh-bar{height:4px;background:var(--bg-recessed);border-radius:2px;margin-top:6px;overflow:hidden}
  .dh-fill{height:100%;border-radius:2px}

  .domain-section{margin-bottom:var(--s-2xl);scroll-margin-top:80px}
  .ds-head{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:2px solid var(--border-strong);cursor:pointer;user-select:none}
  .ds-title{font-family:var(--font-display);font-size:1.15rem;font-weight:800}
  .ds-meta{display:flex;align-items:center;gap:12px}
  .ds-pct{font-family:var(--font-mono);font-size:.88rem;font-weight:700}
  .ds-weight{font-family:var(--font-mono);font-size:.65rem;color:var(--ink-muted)}
  .ds-toggle{font-size:1.2rem;color:var(--ink-muted);transition:transform .2s}
  .ds-toggle.open{transform:rotate(180deg)}
  .ds-body{display:none;padding-top:var(--s-lg)}
  .ds-body.open{display:block}

  .obj-card{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;transition:border-color .15s}
  .obj-card.mastered{border-left:3px solid var(--prof-strong)}
  .obj-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;transition:background .1s}
  .obj-head:hover{background:var(--bg-recessed)}
  .obj-id{font-family:var(--font-mono);font-size:.78rem;font-weight:700;color:var(--np);min-width:40px}
  .obj-name{font-family:var(--font-display);font-size:.92rem;font-weight:600;flex:1}
  .obj-prof{width:80px;display:flex;align-items:center;gap:6px}
  .obj-bar{flex:1;height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
  .obj-fill{height:100%;border-radius:3px;transition:width .3s}
  .obj-pct{font-family:var(--font-mono);font-size:.68rem;font-weight:600;min-width:32px;text-align:right}
  .obj-check{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;flex-shrink:0;cursor:pointer;transition:all .15s}
  .obj-check.done{border-color:var(--prof-strong);background:var(--prof-strong);color:#fff}

  .obj-body{display:none;padding:12px 20px 20px;border-top:1px solid var(--border)}
  .obj-body.open{display:block}
  .obj-subs{font-family:var(--font-body);font-size:.8rem;color:var(--ink-secondary);line-height:1.6;margin-bottom:16px;padding-left:16px}
  .obj-subs li{margin-bottom:5px}

  .res-section{margin-bottom:16px}
  .res-title{font-family:var(--font-display);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);margin-bottom:6px}
  .res-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);font-size:.8rem;transition:background .1s}
  .res-row:hover{background:var(--bg-recessed)}
  .res-row a{color:var(--ink-secondary);text-decoration:none;font-family:var(--font-body)}
  .res-row a:hover{color:var(--np)}
  .res-tag{font-family:var(--font-mono);font-size:.62rem;padding:3px 8px;border-radius:3px;font-weight:600;flex-shrink:0}
  .res-tag.video{background:rgba(220,38,38,.08);color:#DC2626}
  .res-tag.article{background:rgba(37,99,235,.08);color:#2563EB}
  .res-tag.site{background:rgba(22,163,74,.08);color:#16A34A}
  .res-tag.drill{background:rgba(180,83,9,.08);color:#B45309}
  .res-tag.lab{background:rgba(8,145,178,.08);color:#0891B2}
  .res-tag.book{background:rgba(180,83,9,.08);color:#B45309}

  .mark-btn{font-family:var(--font-display);font-size:.72rem;padding:6px 14px;background:none;border:1px solid var(--prof-strong);color:var(--prof-strong);border-radius:var(--radius);cursor:pointer;margin-top:8px;transition:all .15s}
  .mark-btn:hover{background:var(--prof-strong);color:#fff}
  .mark-btn.done{background:var(--prof-strong);color:#fff}

  @media(max-width:640px){
    .domain-heat{grid-template-columns:repeat(3,1fr)}
    .obj-prof{width:60px}
  }
  @media print{
    .hero-action,.stats-line,.ds-toggle,nav.top-nav{display:none!important}
    .ds-body,.obj-body{display:block!important}
    .obj-card{break-inside:avoid;border:1px solid #ccc}
    body{font-size:10pt}
  }
</style>
</head>

/* ── Proficiency Storage ── */
var npProf=JSON.parse(localStorage.getItem('np_proficiency')||'{}');
var npChecks=JSON.parse(localStorage.getItem('np_obj_checks_core')||'{}');
function getNpProf(id){return npProf[id]||0;}
function setNpProf(id,val){npProf[id]=val;localStorage.setItem('np_proficiency',JSON.stringify(npProf));}
function toggleNpCheck(id){npChecks[id]=!npChecks[id];localStorage.setItem('np_obj_checks_core',JSON.stringify(npChecks));}
function profColor(p){if(p>=.8)return'var(--prof-strong,#16A34A)';if(p>=.4)return'var(--prof-mid,#CA8A04)';return'var(--prof-weak,#DC2626)';}

/* ── Exam Countdown ── */
(function(){
  var saved=localStorage.getItem('np_exam_target'),picker=document.getElementById('examDatePicker'),label=document.getElementById('examTarget'),cd=document.getElementById('countdown');
  function update(ds){if(!ds){label.textContent='Exam target: set date';cd.textContent='';return;}var d=new Date(ds+'T00:00:00'),diff=Math.ceil((d-new Date())/(864e5));label.textContent='Exam: '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});cd.textContent=diff>0?diff+' days left':diff===0?'Today!':Math.abs(diff)+' days ago';}
  picker.addEventListener('change',function(){localStorage.setItem('np_exam_target',picker.value);update(picker.value);});
  if(saved){picker.value=saved;update(saved);}
})();

/* ── Main Render ── */
function renderDashboard(){
  var allObjs=[];NP_DOMAINS.forEach(function(d){d.objectives.forEach(function(o){allObjs.push(o);});});
  var totalProf=0;allObjs.forEach(function(o){totalProf+=getNpProf(o.id);});
  var readiness=allObjs.length?Math.round(totalProf/allObjs.length*100):0;
  var mastered=allObjs.filter(function(o){return getNpProf(o.id)>=.8;}).length;
  var weak=allObjs.filter(function(o){return getNpProf(o.id)<.4;}).length;

  // Hero
  var weakest=null,weakVal=1;allObjs.forEach(function(o){var p=getNpProf(o.id);if(p<weakVal){weakVal=p;weakest=o;}});
  var ha=document.getElementById('heroAction');
  if(readiness>=80){
    ha.innerHTML='<div class="ha-label">EXAM READY</div><div class="ha-title">You\'re looking strong</div><div class="ha-sub">'+mastered+' of '+allObjs.length+' objectives mastered. Take a practice exam.</div><div class="ha-bar-wrap"><div class="ha-bar"><div class="ha-bar-fill" style="width:'+readiness+'%"></div></div></div><div class="ha-pct">'+readiness+'% readiness</div><a href="netplus-exam.html" class="ha-btn">Take Practice Exam</a>';
  } else if(weakest){
    ha.innerHTML='<div class="ha-label">FOCUS AREA</div><div class="ha-title">'+weakest.id+' — '+esc(weakest.name.split('.')[0])+'</div><div class="ha-sub">Weakest objective at '+Math.round(weakVal*100)+'%. Study it next.</div><div class="ha-bar-wrap"><div class="ha-bar"><div class="ha-bar-fill" style="width:'+readiness+'%"></div></div></div><div class="ha-pct">'+readiness+'% overall readiness</div><button class="ha-btn" onclick="document.getElementById(\'obj-'+weakest.id+'\').scrollIntoView({behavior:\'smooth\'});setTimeout(function(){document.getElementById(\'obj-'+weakest.id+'\').querySelector(\'.obj-head\').click()},400)">Study '+weakest.id+'</button>';
  }

  // Stats
  document.getElementById('statsLine').innerHTML='<span>Readiness: <strong>'+readiness+'%</strong></span><span>Objectives: <strong>'+allObjs.length+'</strong></span><span>Mastered: <strong>'+mastered+'</strong></span><span>Need work: <strong>'+weak+'</strong></span><span>Domains: <strong>5</strong></span>';

  // Heatmap
  var hh='';NP_DOMAINS.forEach(function(d){var s=0;d.objectives.forEach(function(o){s+=getNpProf(o.id);});var avg=d.objectives.length?Math.round(s/d.objectives.length*100):0;hh+='<div class="dh-card" onclick="document.getElementById(\'dom-'+d.id+'\').scrollIntoView({behavior:\'smooth\'})"><div class="dh-pct" style="color:'+profColor(avg/100)+'">'+avg+'%</div><div class="dh-name">'+esc(d.name)+' ('+d.weight+'%)</div><div class="dh-bar"><div class="dh-fill" style="width:'+avg+'%;background:'+profColor(avg/100)+'"></div></div></div>';});
  document.getElementById('domainHeat').innerHTML=hh;
  document.getElementById('domainHeatMeta').textContent=readiness+'% overall';

  // Domain sections
  var html='';
  NP_DOMAINS.forEach(function(d){
    var dP=0;d.objectives.forEach(function(o){dP+=getNpProf(o.id);});var dPct=d.objectives.length?Math.round(dP/d.objectives.length*100):0;
    html+='<div class="domain-section" id="dom-'+d.id+'"><div class="ds-head" onclick="this.nextElementSibling.classList.toggle(\'open\');this.querySelector(\'.ds-toggle\').classList.toggle(\'open\')"><div class="ds-title">'+d.id+' '+esc(d.name)+'</div><div class="ds-meta"><span class="ds-weight">'+d.weight+'%</span><span class="ds-pct" style="color:'+profColor(dPct/100)+'">'+dPct+'%</span><span class="ds-toggle">&#9662;</span></div></div><div class="ds-body">';
    d.objectives.forEach(function(o){
      var p=getNpProf(o.id),pPct=Math.round(p*100),chk=npChecks[o.id],res=NP_RES[o.id]||{};
      html+='<div class="obj-card'+(p>=.8?' mastered':'')+'" id="obj-'+o.id+'"><div class="obj-head" onclick="var b=this.nextElementSibling;b.classList.toggle(\'open\')"><span class="obj-id">'+o.id+'</span><span class="obj-name">'+esc(o.name)+'</span><div class="obj-prof"><div class="obj-bar"><div class="obj-fill" style="width:'+pPct+'%;background:'+profColor(p)+'"></div></div><span class="obj-pct" style="color:'+profColor(p)+'">'+pPct+'%</span></div><div class="obj-check'+(chk?' done':'')+'" onclick="event.stopPropagation();toggleNpCheck(\''+o.id+'\');this.classList.toggle(\'done\')">'+(chk?'&#10003;':'')+'</div></div>';
      html+='<div class="obj-body">';
      if(o.subs&&o.subs.length){html+='<ul class="obj-subs">';o.subs.forEach(function(s){html+='<li>'+esc(s)+'</li>';});html+='</ul>';}
      if(res.videos&&res.videos.length){html+='<div class="res-section"><div class="res-title">VIDEOS</div>';res.videos.forEach(function(v){html+='<div class="res-row"><span class="res-tag video">VIDEO</span><a href="'+v.u+'" target="_blank" rel="noopener">'+esc(v.t)+'</a></div>';});html+='</div>';}
      if(res.articles&&res.articles.length){html+='<div class="res-section"><div class="res-title">ARTICLES</div>';res.articles.forEach(function(a){html+='<div class="res-row"><span class="res-tag article">ARTICLE</span><a href="'+a.u+'" target="_blank" rel="noopener">'+esc(a.t)+'</a></div>';});html+='</div>';}
      if(res.site&&res.site.length){html+='<div class="res-section"><div class="res-title">SITE TOOLS</div>';res.site.forEach(function(s){html+='<div class="res-row"><span class="res-tag site">SITE</span><a href="'+s.h+'">'+esc(s.t)+'</a></div>';});html+='</div>';}
      if(res.drills&&res.drills.length){html+='<div class="res-section"><div class="res-title">PRACTICE</div>';res.drills.forEach(function(dr){var href=dr.h||dr.u||'#';html+='<div class="res-row"><span class="res-tag drill">DRILL</span><a href="'+href+'"'+(dr.u?' target="_blank" rel="noopener"':'')+'>'+esc(dr.t)+'</a></div>';});html+='</div>';}
      html+='<button class="mark-btn'+(p>=.8?' done':'')+'" onclick="var v=getNpProf(\''+o.id+'\')>=.8?0:1;setNpProf(\''+o.id+'\',v);renderDashboard()">'+(p>=.8?'Marked Mastered':'Mark as Mastered')+'</button>';
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('domainSections').innerHTML=html;
}

// Gate check
if(localStorage.getItem('ccna_cert_track')!=='net+'){
  document.querySelector('.container-wide').innerHTML='<nav class="top-nav" id="main-nav"></nav><div style="text-align:center;padding:var(--s-xl)"><h1 style="font-size:2rem;margin-bottom:8px;color:var(--ink-muted)">Network+ Locked</h1><p style="font-family:var(--font-body);font-size:.92rem;color:var(--ink-secondary);margin-bottom:var(--s-md)">Select <strong>CompTIA Network+</strong> as your cert track in the <a href="peers.html" style="color:var(--np)">Study Group</a> to unlock.</p><p style="font-family:var(--font-body);font-size:.82rem;color:var(--ink-muted)">Or <button onclick="localStorage.setItem(\'ccna_cert_track\',\'net+\');location.reload()" style="color:var(--np);background:none;border:none;cursor:pointer;text-decoration:underline;font-size:.82rem">switch to Network+ now</button></p></div>';
  var ns=document.createElement('script');ns.src='js/nav.js';document.body.appendChild(ns);
} else {
  renderDashboard();
}
</script>
