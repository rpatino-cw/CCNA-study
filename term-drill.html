<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Term Drill — CCNA 200-301</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="css/shared.css">
<style>
  :root {
    --correct: #16a34a;
    --correct-bg: rgba(22, 163, 74, 0.08);
    --wrong: #dc2626;
    --wrong-bg: rgba(220, 38, 38, 0.08);
  }
  body { padding-bottom: 60px; }
  .drill-wrap { max-width: 860px; margin: 0 auto; padding: 30px 20px; }
  h1 { font-family: var(--font-display); font-size: 1.6rem; margin: 0 0 4px; }
  .sub { color: var(--ink-muted); font-size: 0.85rem; margin-bottom: 24px; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 14px; background: var(--bg-surface); border-radius: var(--radius); }
  .controls label { font-size: 0.8rem; color: var(--ink-muted); display: flex; flex-direction: column; gap: 4px; }
  .controls select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-base); font: inherit; }
  .controls button { padding: 8px 16px; border: none; border-radius: 6px; background: var(--accent); color: white; cursor: pointer; font: inherit; }
  .controls button:hover { filter: brightness(1.1); }

  .stats { display: flex; gap: 18px; margin-bottom: 18px; font-size: 0.82rem; color: var(--ink-muted); }
  .stats .val { color: var(--ink-primary); font-weight: 700; }
  .progress-bar { height: 6px; background: var(--bg-surface); border-radius: 3px; overflow: hidden; margin-bottom: 24px; }
  .progress-bar .fill { height: 100%; background: var(--accent); transition: width 0.3s; }

  .q-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
  .q-meta { font-family: var(--font-mono, monospace); font-size: 0.72rem; color: var(--ink-muted); margin-bottom: 10px; display: flex; gap: 12px; }
  .q-meta .weight { padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
  .q-meta .weight.high { background: rgba(239, 68, 68, 0.12); color: #ef4444; }
  .q-meta .weight.med  { background: rgba(234, 179, 8, 0.12); color: #eab308; }
  .q-meta .weight.low  { background: rgba(100, 116, 139, 0.12); color: #64748b; }
  .q-text { font-size: 1.05rem; line-height: 1.5; margin-bottom: 18px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt { padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-base); cursor: pointer; text-align: left; font: inherit; color: var(--ink-primary); line-height: 1.45; transition: all 0.15s; }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: var(--bg-surface); }
  .opt:disabled { cursor: default; }
  .opt.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); font-weight: 600; }
  .opt.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }
  .opt .key { font-family: var(--font-mono, monospace); font-weight: 700; margin-right: 10px; color: var(--ink-muted); }
  .opt.correct .key { color: var(--correct); }
  .opt.wrong .key { color: var(--wrong); }

  .feedback { margin-top: 16px; padding: 14px; border-radius: var(--radius); background: var(--bg-recessed); font-size: 0.88rem; line-height: 1.5; }
  .feedback.correct { background: var(--correct-bg); border-left: 3px solid var(--correct); }
  .feedback.wrong { background: var(--wrong-bg); border-left: 3px solid var(--wrong); }
  .next-btn { margin-top: 16px; padding: 10px 20px; border: none; border-radius: 6px; background: var(--accent); color: white; cursor: pointer; font: inherit; font-weight: 600; }
  .next-btn:hover { filter: brightness(1.1); }

  .empty { text-align: center; padding: 60px 20px; color: var(--ink-muted); }
  .empty h2 { font-family: var(--font-display); color: var(--ink-primary); }
</style>
</head>
<body>
<div id="nav-placeholder"></div>
<script defer src="js/nav.js"></script>

<main class="drill-wrap">
  <h1>Term Drill</h1>
  <p class="sub">Auto-generated MCQs from HIGH-weight Key Terms. Practice the skill the exam actually tests: picking the right option under time pressure.</p>

  <div class="controls">
    <label>Domain
      <select id="filter-domain">
        <option value="">All</option>
        <option value="1">1 — Network Fundamentals</option>
        <option value="2">2 — Network Access</option>
        <option value="3">3 — IP Connectivity</option>
        <option value="4">4 — IP Services</option>
        <option value="5">5 — Security</option>
        <option value="6">6 — Automation</option>
      </select>
    </label>
    <label>Template
      <select id="filter-template">
        <option value="">Both</option>
        <option value="A">A — Which describes [term]?</option>
        <option value="B">B — Which term fits [definition]?</option>
      </select>
    </label>
    <label>Session size
      <select id="filter-count">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </label>
    <label style="align-self: end;">&nbsp;
      <button id="start-btn">Start drill</button>
    </label>
  </div>

  <div id="stats-bar" class="stats" hidden>
    <div>Q <span class="val" id="stat-current">0</span> / <span id="stat-total">0</span></div>
    <div>Correct: <span class="val" id="stat-correct">0</span></div>
    <div>Wrong: <span class="val" id="stat-wrong">0</span></div>
    <div>Accuracy: <span class="val" id="stat-accuracy">—</span></div>
  </div>
  <div class="progress-bar" hidden id="progress-bar"><div class="fill" id="progress-fill" style="width: 0"></div></div>

  <div id="q-container"></div>
</main>

<script>
  let allQuestions = [];
  let session = { queue: [], answered: [], correct: 0, wrong: 0, idx: 0 };

  async function loadQuestions() {
    const res = await fetch('data/term-mcqs.json');
    const data = await res.json();
    allQuestions = data.questions;
    document.getElementById('q-container').innerHTML = `<p class="sub">Loaded ${allQuestions.length} questions. Click Start drill to begin.</p>`;
  }

  function shuffle(a) { const r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }

  function startDrill() {
    const domain = document.getElementById('filter-domain').value;
    const tpl = document.getElementById('filter-template').value;
    const count = parseInt(document.getElementById('filter-count').value, 10);
    let pool = allQuestions;
    if (domain) pool = pool.filter(q => q.domain === domain);
    if (tpl) pool = pool.filter(q => q.tpl === tpl);
    if (pool.length === 0) {
      document.getElementById('q-container').innerHTML = '<div class="empty"><h2>No questions match</h2><p>Relax the filters and try again.</p></div>';
      return;
    }
    session = {
      queue: shuffle(pool).slice(0, count),
      answered: [],
      correct: 0,
      wrong: 0,
      idx: 0,
    };
    document.getElementById('stats-bar').hidden = false;
    document.getElementById('progress-bar').hidden = false;
    document.getElementById('stat-total').textContent = session.queue.length;
    renderQuestion();
  }

  function renderQuestion() {
    const q = session.queue[session.idx];
    if (!q) return renderSummary();

    const weightClass = q.id.includes('tmcq') ? 'high' : 'med';
    const html = `
      <div class="q-card">
        <div class="q-meta">
          <span>Q ${session.idx + 1} of ${session.queue.length}</span>
          <span>${q.subtopic}</span>
          <span class="weight ${weightClass}">${weightClass}</span>
          <span>Template ${q.tpl}</span>
        </div>
        <div class="q-text">${escapeHtml(q.question)}</div>
        <div class="options">
          ${q.options.map((opt, i) => `
            <button class="opt" data-idx="${i}">
              <span class="key">${String.fromCharCode(65 + i)}</span>${escapeHtml(opt)}
            </button>
          `).join('')}
        </div>
        <div class="feedback" id="feedback" hidden></div>
      </div>
    `;
    document.getElementById('q-container').innerHTML = html;
    document.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx, 10)));
    });
    updateStats();
  }

  function handleAnswer(selectedIdx) {
    const q = session.queue[session.idx];
    const isCorrect = selectedIdx === q.correctIndex;
    session.answered.push({ qId: q.id, selected: selectedIdx, correct: isCorrect });
    if (isCorrect) session.correct++; else session.wrong++;

    document.querySelectorAll('.opt').forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.correctIndex) btn.classList.add('correct');
      if (i === selectedIdx && !isCorrect) btn.classList.add('wrong');
    });

    const fb = document.getElementById('feedback');
    fb.hidden = false;
    fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
    fb.innerHTML = `
      <strong>${isCorrect ? '✓ Correct' : '✗ Not quite'}</strong><br>
      ${escapeHtml(q.explanation)}
      <br><br>
      <button class="next-btn" id="next-btn">${session.idx + 1 < session.queue.length ? 'Next →' : 'See results'}</button>
    `;
    document.getElementById('next-btn').addEventListener('click', () => {
      session.idx++;
      renderQuestion();
    });

    updateStats();
    saveProgress();
  }

  function updateStats() {
    document.getElementById('stat-current').textContent = session.idx + 1;
    document.getElementById('stat-correct').textContent = session.correct;
    document.getElementById('stat-wrong').textContent = session.wrong;
    const total = session.correct + session.wrong;
    document.getElementById('stat-accuracy').textContent = total ? Math.round(100 * session.correct / total) + '%' : '—';
    const pct = ((session.idx) / session.queue.length) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function renderSummary() {
    const total = session.queue.length;
    const pct = Math.round(100 * session.correct / total);
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('q-container').innerHTML = `
      <div class="q-card" style="text-align: center; padding: 40px;">
        <h2 style="font-family: var(--font-display); margin: 0 0 10px;">Session complete</h2>
        <p style="font-size: 2rem; font-weight: 700; margin: 0;">${pct}%</p>
        <p class="sub" style="margin: 6px 0 20px;">${session.correct} correct · ${session.wrong} wrong</p>
        <button class="next-btn" onclick="location.reload()">New session</button>
      </div>
    `;
    saveProgress({ sessionEnd: true });
  }

  function saveProgress(extra = {}) {
    try {
      const history = JSON.parse(localStorage.getItem('termDrillHistory') || '[]');
      if (extra.sessionEnd) {
        history.push({
          date: new Date().toISOString(),
          correct: session.correct,
          wrong: session.wrong,
          total: session.queue.length,
        });
        localStorage.setItem('termDrillHistory', JSON.stringify(history.slice(-50)));
      }
    } catch (e) { /* ignore */ }
  }

  function escapeHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  document.getElementById('start-btn').addEventListener('click', startDrill);
  loadQuestions();
</script>
</body>
</html>
