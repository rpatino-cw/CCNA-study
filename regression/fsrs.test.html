<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FSRS regression harness</title>
<style>
  body{font-family:ui-monospace,Menlo,monospace;max-width:880px;margin:40px auto;padding:0 20px;color:#1c1917;background:#fafaf9}
  h1{font-size:1.1rem;margin:0 0 8px}
  h2{font-size:.85rem;margin:24px 0 6px;color:#44403c}
  .pass{color:#15803d}.fail{color:#b91c1c;font-weight:700}
  pre{background:#fff;border:1px solid #e7e5e4;padding:10px;font-size:.78rem;line-height:1.55;overflow-x:auto;border-radius:4px}
  .summary{padding:10px 14px;border-radius:6px;font-weight:700}
  .summary.ok{background:#dcfce7;color:#166534}
  .summary.bad{background:#fee2e2;color:#991b1b}
  table{border-collapse:collapse;font-size:.76rem;width:100%;margin-top:8px}
  th,td{padding:4px 8px;border:1px solid #e7e5e4;text-align:right}
  th{background:#f5f5f4;text-align:left}
  td:first-child{text-align:left}
</style>
<link rel="stylesheet" href="../css/shared.css?v=4.56">
<script defer src="../js/nav.js"></script>
</head>
<body>
<nav class="top-nav" id="main-nav"></nav>
<h1>FSRS-4 regression harness</h1>
<p style="font-size:.82rem;color:#57534e">Verifies that <code>window.fsrs</code> produces monotonic-stability curves under the "Good" rating, resets under "Again", and that retrievability decays toward 0 over time. Open this file in a browser — pass/fail results inline.</p>
<div id="summary" class="summary">running…</div>
<div id="out"></div>

<script src="../js/fsrs.js"></script>
<script>
var results = [];
function check(name, cond, detail) {
  results.push({ name: name, pass: !!cond, detail: detail || '' });
}

// ── Test 1: init from Good rating produces valid state ────────
var c = fsrs.init(3, 1000);
check('init(Good) returns stability ≥ 1', c.stability >= 1, 'S=' + c.stability.toFixed(2));
check('init(Good) returns difficulty 1..10', c.difficulty >= 1 && c.difficulty <= 10, 'D=' + c.difficulty.toFixed(2));
check('init sets due in future', c.due > 1000, 'due=+' + ((c.due - 1000) / 86400000).toFixed(1) + 'd');
check('init reps=1, lapses=0', c.reps === 1 && c.lapses === 0);

// ── Test 2: Again rating increments lapses ────────────────────
var again = fsrs.init(1, 1000);
check('init(Again) lapses=1', again.lapses === 1, 'lapses=' + again.lapses);

// ── Test 3: Good-chain — stability grows monotonically ────────
var card = fsrs.init(3, 0);
var now = 0;
var chain = [{ day: 0, S: card.stability, D: card.difficulty, due: card.due / 86400000 }];
var monotonic = true;
for (var i = 0; i < 8; i++) {
  now = card.due; // always review exactly when due
  var prev = card.stability;
  card = fsrs.next(card, 3, now);
  if (card.stability <= prev) monotonic = false;
  chain.push({ day: (now / 86400000).toFixed(1), S: card.stability.toFixed(2), D: card.difficulty.toFixed(2), due: (card.due / 86400000).toFixed(1) });
}
check('Good-chain stability grows monotonically', monotonic, 'final S=' + card.stability.toFixed(2));
check('Good-chain reaches ≥ 30d interval by rep 8', card.stability >= 15, 'S=' + card.stability.toFixed(2));

// ── Test 4: Again resets stability sharply ────────────────────
var primed = fsrs.init(3, 0);
for (var j = 0; j < 3; j++) primed = fsrs.next(primed, 3, primed.due);
var beforeFail = primed.stability;
var failed = fsrs.next(primed, 1, primed.due);
check('Again shrinks stability', failed.stability < beforeFail, beforeFail.toFixed(1) + ' → ' + failed.stability.toFixed(2));
check('Again bumps lapses', failed.lapses === primed.lapses + 1, 'lapses=' + failed.lapses);

// ── Test 5: Retrievability decays over time ───────────────────
var rcard = fsrs.init(3, 0);
var DAY = 86400000;
var rAt0 = fsrs.retrievability(rcard, 0);
var rAtDue = fsrs.retrievability(rcard, rcard.due);
// 100 days past lastReview (~50x stability) — well past forgetting horizon
var rFarFuture = fsrs.retrievability(rcard, rcard.lastReview + 100 * DAY);
check('retrievability at t=0 equals 1', Math.abs(rAt0 - 1) < 0.01, 'r=' + rAt0.toFixed(3));
check('retrievability at due ≈ 0.9', Math.abs(rAtDue - 0.9) < 0.05, 'r=' + rAtDue.toFixed(3));
check('retrievability far future (100d, S=2.4) < 0.25', rFarFuture < 0.25, 'r=' + rFarFuture.toFixed(3));

// ── Test 6: ratingFromPct boundaries ──────────────────────────
check('pct 0.5 → Again', fsrs.ratingFromPct(0.5) === 1);
check('pct 0.7 → Hard', fsrs.ratingFromPct(0.7) === 2);
check('pct 0.85 → Good', fsrs.ratingFromPct(0.85) === 3);
check('pct 1.0 → Easy', fsrs.ratingFromPct(1.0) === 4);

// ── Render ───────────────────────────────────────────────────
var out = document.getElementById('out');
var passCount = results.filter(function(r){return r.pass;}).length;
var sum = document.getElementById('summary');
sum.className = 'summary ' + (passCount === results.length ? 'ok' : 'bad');
sum.textContent = passCount + '/' + results.length + ' tests passed';

var html = '<h2>Test results</h2><pre>';
results.forEach(function(r){
  html += (r.pass ? '<span class="pass">PASS</span>' : '<span class="fail">FAIL</span>')
       + '  ' + r.name + (r.detail ? '   <span style="color:#78716c">' + r.detail + '</span>' : '') + '\n';
});
html += '</pre>';

html += '<h2>Good-rating growth chain</h2><table><tr><th>rep</th><th>day</th><th>stability</th><th>difficulty</th><th>next due (d)</th></tr>';
chain.forEach(function(row, i){
  html += '<tr><td>' + i + '</td><td>' + row.day + '</td><td>' + row.S + '</td><td>' + row.D + '</td><td>' + row.due + '</td></tr>';
});
html += '</table>';
out.innerHTML = html;
</script>
</body>
</html>
