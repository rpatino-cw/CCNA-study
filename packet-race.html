<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Packet Race — CCNA 200-301</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
canvas{display:block;width:100%;height:100%}
.back{position:fixed;top:16px;left:16px;z-index:50}
.back a{color:#94a3b8;text-decoration:none;font-size:.82rem;opacity:.7;transition:opacity .2s}
.back a:hover{opacity:1;color:#e2e8f0}

/* Glass panel base */
.glass{background:rgba(15,17,25,.88);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#e2e8f0}

/* Title HUD */
.title-hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:40;padding:8px 24px;font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;pointer-events:none}

/* Timer */
.timer-hud{position:fixed;top:16px;right:16px;z-index:40;padding:8px 16px;font-family:monospace;font-size:1.1rem;font-weight:700}

/* Panels */
.panel{position:fixed;z-index:100;display:none}
.panel.active{display:flex}

/* Lobby */
#panel-lobby{top:50%;left:50%;transform:translate(-50%,-50%);flex-direction:column;align-items:center;padding:32px 40px;min-width:520px;max-width:90vw;max-height:85vh;overflow-y:auto;gap:20px}
.lobby-title{font-size:1.8rem;font-weight:800;letter-spacing:.05em;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lobby-sub{font-size:.82rem;color:#94a3b8;text-align:center}
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.scenario-card{padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:8px;cursor:pointer;transition:all .2s;text-align:left}
.scenario-card:hover{border-color:#f59e0b;background:rgba(245,158,11,.05)}
.scenario-card.selected{border-color:#f59e0b;background:rgba(245,158,11,.1)}
.sc-title{font-size:.88rem;font-weight:700;margin-bottom:2px}
.sc-desc{font-size:.72rem;color:#94a3b8;margin-bottom:4px}
.sc-meta{font-size:.65rem;font-family:monospace}
.sc-easy{color:#4ade80}.sc-medium{color:#facc15}.sc-hard{color:#f87171}.sc-mixed{color:#60a5fa}
.sc-mode{display:inline-block;font-size:.55rem;padding:2px 6px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-left:6px}
.sc-mode.trivia{background:rgba(96,165,250,.15);color:#60a5fa}
.sc-mode.config{background:rgba(74,222,128,.15);color:#4ade80}
.player-list{width:100%;padding:10px 14px;border:1px solid rgba(255,255,255,.06);border-radius:8px}
.player-list h4{font-size:.75rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.pl-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.85rem}
.pl-dot{width:10px;height:10px;border-radius:50%}
.lobby-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{padding:10px 24px;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.05em}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,158,11,.3)}
.btn-primary:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
.btn-secondary{background:rgba(255,255,255,.06);color:#94a3b8;border:1px solid rgba(255,255,255,.1)}
.btn-secondary:hover{border-color:#94a3b8;color:#e2e8f0}
.btn-solo{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.lobby-err{color:#f87171;font-size:.78rem;text-align:center}
.lobby-nogroup{text-align:center;padding:20px}
.lobby-nogroup a{color:#f59e0b;text-decoration:underline}

/* Countdown */
#panel-countdown{top:0;left:0;width:100%;height:100%;align-items:center;justify-content:center;background:rgba(0,0,0,.7);flex-direction:column}
.cd-number{font-size:12rem;font-weight:900;opacity:0;animation:cdPop .8s ease-out forwards;line-height:1}
.cd-go{color:#4ade80;font-size:8rem}
@keyframes cdPop{0%{transform:scale(2);opacity:0}50%{opacity:1}100%{transform:scale(.9);opacity:0}}
@keyframes cdGo{0%{transform:scale(2);opacity:0}40%{opacity:1;transform:scale(1)}100%{transform:scale(1);opacity:0}}
.cd-route{font-size:1rem;color:#94a3b8;margin-top:16px}

/* Question panel */
#panel-question{top:50%;right:20px;transform:translateY(-50%);width:360px;padding:20px;flex-direction:column;gap:12px}
.q-device{display:flex;justify-content:space-between;align-items:center}
.q-hostname{font-family:monospace;font-size:.88rem;font-weight:700;color:#f59e0b}
.q-type{font-size:.68rem;color:#94a3b8;text-transform:uppercase}
.q-timer{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.q-timer-bar{height:100%;background:#f59e0b;border-radius:2px;transition:width .1s linear;width:100%}
.q-timer-bar.danger{background:#f87171}
.q-context{font-size:.72rem;color:#64748b;font-style:italic}
.q-text{font-size:.92rem;line-height:1.5;font-weight:500}
.q-opts{display:flex;flex-direction:column;gap:6px}
.q-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.03);cursor:pointer;transition:all .15s;font-size:.85rem;text-align:left;color:#e2e8f0}
.q-opt:hover{border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.06)}
.q-opt.correct{border-color:#4ade80;background:rgba(74,222,128,.15);color:#4ade80}
.q-opt.wrong{border-color:#f87171;background:rgba(248,113,113,.15);color:#f87171}
.q-opt .letter{font-family:monospace;font-weight:700;font-size:.75rem;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:rgba(255,255,255,.08);flex-shrink:0}
.q-feedback{font-size:.82rem;font-weight:600;text-align:center;min-height:20px}
.q-cooldown{color:#f87171;font-size:1.1rem;font-weight:700;text-align:center;padding:8px}

/* Results */
#panel-results{top:50%;left:50%;transform:translate(-50%,-50%);flex-direction:column;align-items:center;padding:32px 40px;min-width:400px;gap:16px}
.results-title{font-size:1.6rem;font-weight:800}
.results-winner{font-size:1.1rem;color:#f59e0b;font-weight:700}
.results-list{width:100%}
.result-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.result-rank{font-family:monospace;font-size:1.2rem;font-weight:800;min-width:28px;text-align:center}
.result-rank.gold{color:#f59e0b}.result-rank.silver{color:#94a3b8}.result-rank.bronze{color:#92400e}
.result-name{font-weight:600;flex:1}
.result-stats{font-size:.72rem;color:#94a3b8;font-family:monospace}

/* Progress HUD */
#race-hud{position:fixed;bottom:0;left:0;right:0;z-index:40;padding:12px 20px;display:none;background:rgba(15,17,25,.85);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.06)}
#race-hud.active{display:block}
.hud-route{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:6px;position:relative}
.hud-hop{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.15);position:relative;z-index:2;transition:all .3s}
.hud-hop.reached{background:#f59e0b;border-color:#f59e0b}
.hud-hop.current{background:#f59e0b;border-color:#fff;box-shadow:0 0 10px rgba(245,158,11,.5)}
.hud-link{width:40px;height:2px;background:rgba(255,255,255,.1);z-index:1}
.hud-link.reached{background:#f59e0b}
.hud-labels{display:flex;justify-content:center;gap:4px;font-size:.55rem;font-family:monospace;color:#64748b}
.hud-players{display:flex;justify-content:center;gap:16px;margin-top:6px}
.hud-player{display:flex;align-items:center;gap:4px;font-size:.72rem}
.hud-player-dot{width:8px;height:8px;border-radius:50%}
.hud-player-hop{font-family:monospace;color:#94a3b8}

/* Dropped overlay */
.dropped-overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:90;font-size:2.5rem;font-weight:900;color:#f87171;text-transform:uppercase;letter-spacing:.1em;pointer-events:none;opacity:0;animation:dropAnim 1.5s ease-out forwards}
@keyframes dropAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%)}}
</style>
</head>

scene.add(new THREE.AmbientLight(0x404060,.6));

// Build topology meshes
const meshes=[],posMap={},lineMeshes=[],deviceMap={};
DEVICES.forEach(d=>{
  const t=TYPES[d.type];if(!t)return;
  const mat=new THREE.MeshPhysicalMaterial({color:t.color,roughness:.4,metalness:.1,transparent:true,opacity:.88});
  let geo;
  if(t.shape==='cylinder')geo=new THREE.CylinderGeometry(t.r,t.r,t.h,16);
  else if(t.shape==='sphere')geo=new THREE.SphereGeometry(t.r,16,16);
  else geo=new THREE.BoxGeometry(t.w||1,t.h||1,t.d||1);
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(d.x,d.y,d.z);
  mesh.userData={id:d.id,type:d.type,...d.info};
  scene.add(mesh);meshes.push(mesh);
  posMap[d.id]={x:d.x,y:d.y,z:d.z};
  deviceMap[d.id]=d;
  // Label
  const c2=document.createElement('canvas');c2.width=256;c2.height=64;
  const ctx=c2.getContext('2d');ctx.fillStyle='#ffffff';ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.fillText(d.info.hostname,128,36);
  const tex=new THREE.CanvasTexture(c2);
  const smat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:.7});
  const spr=new THREE.Sprite(smat);spr.scale.set(3,.75,1);
  spr.position.set(d.x,d.y+(t.h||t.r||1)*.5+.6,d.z);
  scene.add(spr);
});

LINKS.forEach(([a,b,meta])=>{
  const pa=posMap[a],pb=posMap[b];if(!pa||!pb)return;
  const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(pa.x,pa.y,pa.z),new THREE.Vector3(pb.x,pb.y,pb.z)]);
  const mat=meta.dashed?new THREE.LineDashedMaterial({color:meta.color||0x4a5568,dashSize:.3,gapSize:.15,transparent:true,opacity:.5}):new THREE.LineBasicMaterial({color:meta.color||0x4a5568,transparent:true,opacity:.6});
  const line=new THREE.Line(geo,mat);if(meta.dashed)line.computeLineDistances();
  line.userData={fromId:a,toId:b};scene.add(line);lineMeshes.push(line);
});

// PACKET CREATION

function createPacket(colorHex){
  const color=new THREE.Color(colorHex);
  const group=new THREE.Group();
  const sphere=new THREE.Mesh(new THREE.SphereGeometry(.35,16,16),new THREE.MeshPhysicalMaterial({color,emissive:color,emissiveIntensity:.6,roughness:.2,metalness:.3,transparent:true,opacity:.9}));
  group.add(sphere);
  const glow=new THREE.Mesh(new THREE.SphereGeometry(.6,16,16),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.15,side:THREE.BackSide}));
  group.add(glow);
  const light=new THREE.PointLight(color,.8,4);group.add(light);
  scene.add(group);
  // Trail
  const TRAIL=30;
  const tGeo=new THREE.BufferGeometry();
  const tPos=new Float32Array(TRAIL*3);
  const tAlpha=new Float32Array(TRAIL);
  tGeo.setAttribute('position',new THREE.BufferAttribute(tPos,3));
  const tMat=new THREE.PointsMaterial({color,size:.12,transparent:true,opacity:.6,sizeAttenuation:true});
  const trail=new THREE.Points(tGeo,tMat);
  scene.add(trail);
  return{group,trail,trailPositions:tPos,trailLength:TRAIL,sphere};
}

function updateTrail(pkt){
  const pos=pkt.group.position;
  for(let i=pkt.trailLength-1;i>0;i--){
    pkt.trailPositions[i*3]=pkt.trailPositions[(i-1)*3];
    pkt.trailPositions[i*3+1]=pkt.trailPositions[(i-1)*3+1];
    pkt.trailPositions[i*3+2]=pkt.trailPositions[(i-1)*3+2];
  }
  pkt.trailPositions[0]=pos.x;pkt.trailPositions[1]=pos.y;pkt.trailPositions[2]=pos.z;
  pkt.trail.geometry.attributes.position.needsUpdate=true;
}

// ═══════════════════════════════════════════════════════════════
// ARC MOVEMENT
// ═══════════════════════════════════════════════════════════════
let arcAnim=null;
function arcMove(pkt,fromId,toId,dur=800){
  return new Promise(resolve=>{
    const a=posMap[fromId],b=posMap[toId];
    const start=new THREE.Vector3(a.x,a.y,a.z);
    const end=new THREE.Vector3(b.x,b.y,b.z);
    const mid=new THREE.Vector3().lerpVectors(start,end,.5);
    mid.y+=start.distanceTo(end)*.35;
    const t0=performance.now();
    arcAnim={pkt,start,mid,end,t0,dur,resolve};
  });
}

function tickArc(now){
  if(!arcAnim)return;
  const{pkt,start,mid,end,t0,dur,resolve}=arcAnim;
  let t=Math.min((now-t0)/dur,1);
  const e=1-Math.pow(1-t,3);
  const a=new THREE.Vector3().lerpVectors(start,mid,e);
  const b=new THREE.Vector3().lerpVectors(mid,end,e);
  const p=new THREE.Vector3().lerpVectors(a,b,e);
  pkt.group.position.copy(p);
  if(t>=1){arcAnim=null;resolve();}
}

const CAM_OFFSET=new THREE.Vector3(4,5,8);
let followCam=false;

function animCam(tp,tt,dur=900){
  const sp=camera.position.clone(),st=controls.target.clone();
  const s=performance.now();
  return new Promise(resolve=>{
    (function f(now){
      const t=Math.min((now-s)/dur,1),e=1-Math.pow(1-t,3);
      camera.position.lerpVectors(sp,new THREE.Vector3(...tp),e);
      controls.target.lerpVectors(st,new THREE.Vector3(...tt),e);
      controls.update();
      if(t<1)requestAnimationFrame(f);else resolve();
    })(s);
  });
}

// HIGHLIGHT ROUTE
// ═══════════════════════════════════════════════════════════════
function highlightRoute(route){
  const rSet=new Set(route);
  meshes.forEach(m=>{
    const on=rSet.has(m.userData.id);
    m.material.opacity=on?.95:.15;
    m.material.emissive=new THREE.Color(on?0x222244:0x000000);
  });
  lineMeshes.forEach(l=>{
    const both=rSet.has(l.userData.fromId)&&rSet.has(l.userData.toId);
    l.material.opacity=both?.7:.04;
  });
}

function resetHighlight(){
  meshes.forEach(m=>{m.material.opacity=.88;m.material.emissive=new THREE.Color(0);});
  lineMeshes.forEach(l=>{l.material.opacity=.6;});
}

// ═══════════════════════════════════════════════════════════════
let usedTriviaIdx=new Set();
function getHopQuestion(scenarioIdx, hopIdx){
  // Trivia mode (scenario 0) — random from pool
  if(SCENARIOS[scenarioIdx]?.mode==='trivia'){
    const pool=TRIVIA.filter((_,i)=>!usedTriviaIdx.has(i));
    if(pool.length===0){usedTriviaIdx.clear();return getHopQuestion(scenarioIdx,hopIdx);}
    const idx=Math.floor(Math.random()*pool.length);
    const origIdx=TRIVIA.indexOf(pool[idx]);
    usedTriviaIdx.add(origIdx);
    return pool[idx];
  }
  // Config mode — hop-specific
  const qs=HOP_QUESTIONS[scenarioIdx];
  if(!qs||hopIdx>=qs.length)return null;
  return qs[hopIdx];
}

      '<button class="btn btn-secondary" id="btnCancelRace">Cancel Race</button>'+
      '</div>'
    :
      '<div class="scenario-grid">'+SCENARIOS.map((s,i)=>'<div class="scenario-card'+(i===selectedScenario?' selected':'')+'" data-idx="'+i+'"><div class="sc-title">'+s.title+'</div><div class="sc-desc">'+s.desc+'</div><div class="sc-meta sc-'+s.diff.toLowerCase()+'">'+s.diff+' | '+(s.route.length-1)+' hops <span class="sc-mode '+(s.mode||'config')+'">'+(s.mode==='trivia'?'TRIVIA':'CONFIG')+'</span></div></div>').join('')+'</div>'+
      '<div class="lobby-actions"><button class="btn btn-primary" id="btnCreateRace">Create Race</button><button class="btn btn-solo" id="btnSolo">Solo Practice</button></div>'
    );

  el.querySelectorAll('.scenario-card').forEach(c=>c.onclick=()=>{selectedScenario=+c.dataset.idx;renderLobby(raceData);});
  document.getElementById('btnCreateRace')?.addEventListener('click',createRace);

}

  if(res.group?.race)renderLobby(res.group.race);
}
async function startRace(){
  const res=await apiAction('race_start',{memberId:getMemberId()});
  if(res.group?.race){
    remoteRace=res.group.race;
    beginCountdown(res.group.race);
  }
}
document.getElementById('btnCancelLive').addEventListener('click', cancelRace);

async function cancelRace(){
  if(!soloMode) await apiAction('race_cancel',{});
  cleanup();
  gameState='lobby';
  document.getElementById('btnCancelLive').style.display='none';
  document.getElementById('race-hud').classList.remove('active');
  document.getElementById('timerHud').style.display='none';
  resetHighlight();
  showPanel('lobby');
  renderLobby(null);
  loadLobby();
}

function startSolo(){
  soloMode=true;
  const s=SCENARIOS[selectedScenario];
  currentRoute=s.route;
  beginCountdown(null);
}

// ═══════════════════════════════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════════════════════════════
function beginCountdown(raceData){
  gameState='countdown';
  showPanel('countdown');
  const route=raceData?raceData.route:currentRoute;
  if(!soloMode)currentRoute=route;
  highlightRoute(route);

  // Camera to start device
  const startDev=posMap[route[0]];
  if(startDev)animCam([startDev.x+5,startDev.y+4,startDev.z+8],[startDev.x,startDev.y,startDev.z]);

  const cdEl=document.getElementById('panel-countdown');
  let count=3;
  cdEl.innerHTML='<div class="cd-number" style="color:#60a5fa">3</div><div class="cd-route">'+route.map(id=>{const d=deviceMap[id];return d?d.info.hostname:id;}).join(' → ')+'</div>';

  const cdInterval=setInterval(()=>{
    count--;
    if(count>0){
      cdEl.innerHTML='<div class="cd-number" style="color:'+(count===2?'#facc15':'#f97316')+'">'+count+'</div><div class="cd-route">'+route.map(id=>{const d=deviceMap[id];return d?d.info.hostname:id;}).join(' → ')+'</div>';
    }else if(count===0){
      cdEl.innerHTML='<div class="cd-number cd-go" style="animation:cdGo .8s ease-out forwards">GO!</div>';
    }else{
      clearInterval(cdInterval);
      beginRacing();
    }
  },1000);
}

// ═══════════════════════════════════════════════════════════════
// RACING
// ═══════════════════════════════════════════════════════════════
function beginRacing(){
  gameState='racing';
  showPanel('question');
  document.getElementById('race-hud').classList.add('active');
  document.getElementById('timerHud').style.display='';
  document.getElementById('btnCancelLive').style.display='';

  myHop=0;myQuestionsAnswered=0;myQuestionsCorrect=0;
  usedQuestionIdx.clear();
  raceStartTime=Date.now();
  followCam=true;

  // Create my packet
  const myColor=soloMode?'#f59e0b':(remoteRace?.players?.[getMemberId()]?.color||'#f59e0b');
  packets[getMemberId()]=createPacket(myColor);
  const startPos=posMap[currentRoute[0]];
  packets[getMemberId()].group.position.set(startPos.x,startPos.y,startPos.z);
  // Init trail
  for(let i=0;i<packets[getMemberId()].trailLength;i++){
    packets[getMemberId()].trailPositions[i*3]=startPos.x;
    packets[getMemberId()].trailPositions[i*3+1]=startPos.y;
    packets[getMemberId()].trailPositions[i*3+2]=startPos.z;
  }

  // Create remote packets
  if(!soloMode&&remoteRace){
    for(const[id,p]of Object.entries(remoteRace.players)){
      if(id===getMemberId())continue;
      packets[id]=createPacket(p.color);
      packets[id].group.position.set(startPos.x,startPos.y,startPos.z);
      for(let i=0;i<packets[id].trailLength;i++){
        packets[id].trailPositions[i*3]=startPos.x;
        packets[id].trailPositions[i*3+1]=startPos.y;
        packets[id].trailPositions[i*3+2]=startPos.z;
      }
    }
  }

  // Start timer
  timerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-raceStartTime)/1000);
    const m=String(Math.floor(elapsed/60)).padStart(2,'0');
    const s=String(elapsed%60).padStart(2,'0');
    document.getElementById('timerHud').textContent=m+':'+s;
  },200);

  // Start polling
  if(!soloMode){
    pollTimer=setInterval(async()=>{
      const group=await apiGet('/api/group/'+getGroupCode());
      if(group?.race){
        remoteRace=group.race;
        syncRemotePackets(group.race);
        if(group.race.state==='finished'&&gameState==='racing')finishRace();
      }
    },2000);
  }

  renderHud();
  showQuestion();
}

// ═══════════════════════════════════════════════════════════════
// QUESTION UI
// ═══════════════════════════════════════════════════════════════
function showQuestion(){
  if(myHop>=currentRoute.length-1){finishRace();return;}
  const nextDevId=currentRoute[myHop+1];
  const dev=deviceMap[nextDevId];
  currentQuestion=getHopQuestion(selectedScenario, myHop);
  if(!currentQuestion)return;
  questionLocked=false;
  questionTimeLeft=15;

  const el=document.getElementById('panel-question');
  el.innerHTML='<div class="q-device"><span class="q-hostname">'+(dev?.info?.hostname||nextDevId)+'</span><span class="q-type">'+(dev?.type?.replace(/_/g,' ')||'')+'</span></div>'+
    '<div class="q-timer"><div class="q-timer-bar" id="qTimerBar"></div></div>'+
    '<div class="q-context">You are at '+(dev?.info?.hostname||nextDevId)+' ('+(dev?.info?.desc||'')+')</div>'+
    '<div class="q-text">'+esc(currentQuestion.q)+'</div>'+
    '<div class="q-opts">'+currentQuestion.opts.map((o,i)=>'<button class="q-opt" data-idx="'+i+'"><span class="letter">'+['A','B','C','D'][i]+'</span>'+esc(o)+'</button>').join('')+'</div>'+
    '<div class="q-feedback" id="qFeedback"></div>';

  el.querySelectorAll('.q-opt').forEach(btn=>btn.onclick=()=>answerQuestion(+btn.dataset.idx));

  // Timer
  clearInterval(questionTimerInterval);
  questionTimerInterval=setInterval(()=>{
    questionTimeLeft-=.1;
    const bar=document.getElementById('qTimerBar');
    if(bar){
      bar.style.width=(questionTimeLeft/15*100)+'%';
      if(questionTimeLeft<5)bar.classList.add('danger');else bar.classList.remove('danger');
    }
    if(questionTimeLeft<=0){clearInterval(questionTimerInterval);if(!questionLocked)answerQuestion(-1);}
  },100);
}

async function answerQuestion(idx){
  if(questionLocked)return;
  questionLocked=true;
  clearInterval(questionTimerInterval);
  myQuestionsAnswered++;

  const correct=idx===currentQuestion.ans;
  const opts=document.querySelectorAll('#panel-question .q-opt');
  opts.forEach((o,i)=>{
    if(i===currentQuestion.ans)o.classList.add('correct');
    if(i===idx&&!correct)o.classList.add('wrong');
  });

  // Update knowledge map proficiency
  if(window.store&&currentQuestion.topic){
    try{window.store.updateProficiency(currentQuestion.topic,correct);}catch(e){}
  }

  if(correct){
    myQuestionsCorrect++;
    document.getElementById('qFeedback').innerHTML='<span style="color:#4ade80">Correct! Advancing...</span>';
    // Flash device green
    const devMesh=meshes.find(m=>m.userData.id===currentRoute[myHop+1]);
    if(devMesh){const origE=devMesh.material.emissive.clone();devMesh.material.emissive.set(0x00ff00);setTimeout(()=>devMesh.material.emissive.copy(origE),400);}
    // Scale packet
    const myPkt=packets[getMemberId()];
    if(myPkt){myPkt.group.scale.set(1.3,1.3,1.3);setTimeout(()=>myPkt.group.scale.set(1,1,1),200);}

    await new Promise(r=>setTimeout(r,500));
    // Arc move
    await arcMove(packets[getMemberId()],currentRoute[myHop],currentRoute[myHop+1]);
    myHop++;
    renderHud();

    // Report to server
    if(!soloMode){
      apiAction('race_move',{memberId:getMemberId(),hop:myHop,questionsAnswered:myQuestionsAnswered,questionsCorrect:myQuestionsCorrect});
    }

    showQuestion();
  }else{
    document.getElementById('qFeedback').innerHTML='<span style="color:#f87171">Packet Dropped! Retry in 3s...</span>';
    // Shake packet
    const myPkt=packets[getMemberId()];
    if(myPkt){
      const orig=myPkt.group.position.clone();
      let shakes=0;
      const shakeI=setInterval(()=>{myPkt.group.position.x=orig.x+(Math.random()-.5)*.3;shakes++;if(shakes>6){clearInterval(shakeI);myPkt.group.position.copy(orig);}},50);
      myPkt.sphere.material.emissive.set(0xff0000);setTimeout(()=>myPkt.sphere.material.emissive.set(new THREE.Color(myPkt.sphere.material.color)),400);
    }
    // Show dropped overlay
    const dropEl=document.createElement('div');dropEl.className='dropped-overlay';dropEl.textContent='DROPPED';document.body.appendChild(dropEl);
    setTimeout(()=>dropEl.remove(),1500);
    // Cooldown
    let cd=3;
    const cdEl=document.getElementById('qFeedback');
    cooldownTimer=setInterval(()=>{cd--;if(cd<=0){clearInterval(cooldownTimer);showQuestion();}else{cdEl.innerHTML='<span style="color:#f87171">Retry in '+cd+'s...</span>';}},1000);
  }
}

// ═══════════════════════════════════════════════════════════════
// SYNC REMOTE PACKETS
// ═══════════════════════════════════════════════════════════════
function syncRemotePackets(race){
  for(const[id,p]of Object.entries(race.players)){
    if(id===getMemberId())continue;
    if(!packets[id])continue;
    const targetHop=Math.min(p.hop,currentRoute.length-1);
    const targetPos=posMap[currentRoute[targetHop]];
    if(targetPos){
      packets[id].group.position.lerp(new THREE.Vector3(targetPos.x,targetPos.y,targetPos.z),.15);
    }
    // Gray out dropped
    if(p.status==='dropped'){packets[id].group.visible=false;}
  }
}

// ═══════════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════════
function renderHud(){
  const el=document.getElementById('race-hud');
  const hops=currentRoute.map((id,i)=>{
    const reached=i<=myHop;const isCurrent=i===myHop;
    return'<div class="hud-hop'+(reached?' reached':'')+(isCurrent?' current':'')+'"></div>'+(i<currentRoute.length-1?'<div class="hud-link'+(i<myHop?' reached':'')+'"></div>':'');
  }).join('');
  const labels=currentRoute.map(id=>{const d=deviceMap[id];return d?d.info.hostname.split('-').pop():id;}).join(' ');

  let playersHtml='';
  if(!soloMode&&remoteRace){
    playersHtml=Object.entries(remoteRace.players).map(([id,p])=>{
      const isMe=id===getMemberId();
      const hop=isMe?myHop:p.hop;
      return'<div class="hud-player"><div class="hud-player-dot" style="background:'+p.color+'"></div>'+esc(p.name)+' <span class="hud-player-hop">hop '+hop+'/'+(currentRoute.length-1)+'</span></div>';
    }).join('');
  }else{
    playersHtml='<div class="hud-player"><div class="hud-player-dot" style="background:#f59e0b"></div>You <span class="hud-player-hop">hop '+myHop+'/'+(currentRoute.length-1)+'</span></div>';
  }

  el.innerHTML='<div class="hud-route">'+hops+'</div><div class="hud-players">'+playersHtml+'</div>';
}

// ═══════════════════════════════════════════════════════════════
// FINISH
// ═══════════════════════════════════════════════════════════════
function finishRace(){
  if(gameState==='finished')return;
  gameState='finished';
  followCam=false;
  clearInterval(timerInterval);
  clearInterval(pollTimer);
  clearInterval(questionTimerInterval);
  clearInterval(cooldownTimer);
  document.getElementById('race-hud').classList.remove('active');
  document.getElementById('timerHud').style.display='none';
  showPanel('results');

  const elapsed=Math.floor((Date.now()-raceStartTime)/1000);
  const m=String(Math.floor(elapsed/60)).padStart(2,'0');
  const s=String(elapsed%60).padStart(2,'0');

  const el=document.getElementById('panel-results');
  if(soloMode){
    el.innerHTML='<div class="results-title">Race Complete!</div>'+
      '<div class="results-winner">Time: '+m+':'+s+'</div>'+
      '<div class="results-list"><div class="result-row"><span class="result-name">'+esc(getName())+'</span><span class="result-stats">'+myQuestionsCorrect+'/'+myQuestionsAnswered+' correct ('+Math.round(myQuestionsCorrect/Math.max(myQuestionsAnswered,1)*100)+'%)</span></div></div>'+
      '<br><div class="lobby-actions"><button class="btn btn-primary" id="btnPlayAgain">Play Again</button><button class="btn btn-secondary" id="btnBackLobby">Back to Lobby</button></div>';
  }else{
    const race=remoteRace;
    const sorted=race?race.finishOrder.map((id,i)=>{const p=race.players[id];return{id,name:p?.name||'?',rank:i+1,correct:p?.questionsCorrect||0,answered:p?.questionsAnswered||0,time:p?.finishTime};}):[{id:getMemberId(),name:getName(),rank:1,correct:myQuestionsCorrect,answered:myQuestionsAnswered}];
    // Add unfinished
    if(race){
      for(const[id,p]of Object.entries(race.players)){
        if(!race.finishOrder.includes(id))sorted.push({id,name:p.name,rank:sorted.length+1,correct:p.questionsCorrect,answered:p.questionsAnswered,dnf:true});
      }
    }

    el.innerHTML='<div class="results-title">Race Complete!</div>'+
      (sorted.length>0?'<div class="results-winner">Winner: '+esc(sorted[0].name)+'</div>':'')+
      '<div class="results-list">'+sorted.map((r,i)=>{
        const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
        return'<div class="result-row"><span class="result-rank '+rankCls+'">#'+(i+1)+'</span><span class="result-name">'+esc(r.name)+(r.id===getMemberId()?' (you)':'')+(r.dnf?' [DNF]':'')+'</span><span class="result-stats">'+r.correct+'/'+r.answered+' correct</span></div>';
      }).join('')+'</div>'+
      '<br><div class="lobby-actions"><button class="btn btn-primary" id="btnPlayAgain">Play Again</button><button class="btn btn-secondary" id="btnBackLobby">Back to Lobby</button></div>';
  }

  document.getElementById('btnPlayAgain')?.addEventListener('click',()=>{cleanup();startSolo();});
  document.getElementById('btnBackLobby')?.addEventListener('click',()=>{cleanup();gameState='lobby';showPanel('lobby');resetHighlight();renderLobby(null);loadLobby();});

  // Win effect — animate camera up
  animCam([0,25,25],[0,2,0],1200);
}

function cleanup(){
  for(const[id,pkt]of Object.entries(packets)){scene.remove(pkt.group);scene.remove(pkt.trail);}
  packets={};remoteRace=null;
  clearInterval(timerInterval);clearInterval(pollTimer);clearInterval(questionTimerInterval);clearInterval(cooldownTimer);
  arcAnim=null;
}

// ═══════════════════════════════════════════════════════════════
// PANEL MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function showPanel(name){
  ['lobby','countdown','question','results'].forEach(n=>{
    document.getElementById('panel-'+n).classList.toggle('active',n===name);
  });
}

// ═══════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════
(function anim(now){
  requestAnimationFrame(anim);
  tickArc(now);
  // Update trails
  for(const pkt of Object.values(packets))updateTrail(pkt);
  // Follow camera
  if(followCam&&packets[getMemberId()]){
    const p=packets[getMemberId()].group.position;
    const target=p.clone().add(CAM_OFFSET);
    camera.position.lerp(target,.04);
    controls.target.lerp(p,.06);
  }
  controls.update();
  renderer.render(scene,camera);
})(0);

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

async function loadLobby(){
  const code=getGroupCode();
  if(!code){renderLobby(null);return;}
  try{
    const group=await apiGet('/api/group/'+code);
    if(group?.race&&group.race.state!=='finished'){
      remoteRace=group.race;
      // Auto-join if in the race and it's already started
      if(group.race.players[getMemberId()]&&(group.race.state==='countdown'||group.race.state==='racing')){
        currentRoute=group.race.route;
        myHop=group.race.players[getMemberId()].hop||0;
        beginCountdown(group.race);
        return;
      }
      renderLobby(group.race);
    }else{
      renderLobby(null);
    }
    // Poll lobby
    if(gameState==='lobby'){
      pollTimer=setInterval(async()=>{
        if(gameState!=='lobby')return clearInterval(pollTimer);
        const g=await apiGet('/api/group/'+code);
        if(g?.race){
          remoteRace=g.race;
          if(g.race.state==='countdown'||g.race.state==='racing'){
            if(g.race.players[getMemberId()]){
              clearInterval(pollTimer);
              currentRoute=g.race.route;
              beginCountdown(g.race);
              return;
            }
          }
          renderLobby(g.race);
        }
      },3000);
    }
  }catch(e){renderLobby(null);}
}

loadLobby();
</script>
