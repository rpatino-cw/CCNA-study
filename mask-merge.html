<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Mask Merge — CCNA</title>
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<link rel="stylesheet" href="css/mobile-game.css?v=1">
<style>
.game-wrap{max-width:480px;margin:0 auto;padding:14px 14px 80px;display:flex;flex-direction:column;align-items:center}
.title{font-family:var(--font-display);font-weight:700;font-size:1.3rem;text-align:center;margin:6px 0}
.sub{text-align:center;font-family:var(--font-body);font-style:italic;color:var(--ink-muted);font-size:.85rem;margin-bottom:10px}
.hud{display:flex;justify-content:space-between;width:100%;max-width:360px;margin-bottom:10px;font-family:var(--font-mono);font-size:.78rem}
.hud .stat{display:flex;flex-direction:column;align-items:center}
.hud .stat .v{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--accent)}
.hud .stat .l{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted)}
.board{position:relative;width:min(92vw,360px);height:min(92vw,360px);background:var(--bg-recessed);border-radius:14px;padding:8px;touch-action:none;user-select:none}
.tile{position:absolute;width:calc(25% - 12px);height:calc(25% - 12px);margin:6px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#fff;transition:left .15s,top .15s,transform .12s;font-size:1rem}
.tile .n{font-size:1.4rem;line-height:1}
.tile .h{font-size:.55rem;opacity:.8;margin-top:2px;letter-spacing:.04em}
.tile.merge{transform:scale(1.1)}
.btns{display:flex;gap:10px;margin-top:14px}
.btns button{padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--bg-surface);font-family:var(--font-display);font-weight:700;font-size:.85rem;cursor:pointer}
.over{position:absolute;inset:0;background:rgba(255,255,255,.94);display:none;align-items:center;justify-content:center;flex-direction:column;border-radius:14px;padding:20px;text-align:center}
.over.show{display:flex}
.over h2{font-family:var(--font-display);font-size:1.3rem;margin-bottom:8px}
.over p{font-family:var(--font-body);color:var(--ink-secondary);margin-bottom:14px}
.over button{padding:12px 22px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:var(--font-display);font-weight:700;cursor:pointer}
.help{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);text-align:center;margin-top:10px;max-width:340px}
</style>
</head>
<body>
<nav class="top-nav"></nav>
<div class="game-wrap">
  <div class="title">Mask Merge</div>
  <div class="sub">Merge two equal /N tiles → /(N-1). Reach /8.</div>
  <div class="hud">
    <div class="stat"><div class="v" id="score">0</div><div class="l">Score</div></div>
    <div class="stat"><div class="v" id="best">0</div><div class="l">Best</div></div>
    <div class="stat"><div class="v" id="lowest">/30</div><div class="l">Lowest /N</div></div>
  </div>
  <div class="board" id="board">
    <div class="over" id="over"><h2 id="overTitle">Game over</h2><p id="overMsg"></p><button onclick="newGame()">New game</button></div>
  </div>
  <div class="btns">
    <button onclick="newGame()">Restart</button>
    <button onclick="undo()">Undo</button>
  </div>
  <div class="help">Swipe (or arrow keys). Tiles slide; matching /N tiles merge into next-bigger network. /24 + /24 = /23.</div>
</div>
<script defer src="js/store.js"></script>
<script defer src="js/nav.js"></script>
<script defer src="js/tutor.js?v=7.15.8"></script>
<script defer src="js/mobile-lights.js?v=1"></script>
<script>document.addEventListener('DOMContentLoaded',function(){
const KEY='ccna_merge_v1';
const SIZE=4;
let grid=[],score=0,best=parseInt(localStorage.getItem(KEY+'_best')||'0'),history=[];
const COLORS={30:'#94a3b8',29:'#64748b',28:'#3b82f6',27:'#2563eb',26:'#8b5cf6',25:'#a855f7',24:'#ec4899',23:'#f43f5e',22:'#ef4444',21:'#f97316',20:'#f59e0b',19:'#eab308',18:'#84cc16',17:'#22c55e',16:'#10b981',15:'#14b8a6',14:'#06b6d4',13:'#0ea5e9',12:'#6366f1',11:'#a78bfa',10:'#d946ef',9:'#f0abfc',8:'#fbbf24'};
function hostsFor(p){const h=32-p;return Math.max(0,Math.pow(2,h)-2)}

function emptyGrid(){return Array.from({length:SIZE},()=>Array(SIZE).fill(0))}
function spawn(){
  const empty=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!grid[r][c])empty.push([r,c]);
  if(!empty.length)return false;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.85?30:29; // start with /30 mostly, sometimes /29
  return true;
}

function render(){
  const board=document.getElementById('board');
  // remove existing tiles (keep .over)
  Array.from(board.querySelectorAll('.tile')).forEach(t=>t.remove());
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const v=grid[r][c];if(!v)continue;
    const t=document.createElement('div');t.className='tile';
    t.style.background=COLORS[v]||'#1c1917';
    t.style.left=(c*25)+'%';t.style.top=(r*25)+'%';
    t.innerHTML='<div style="display:flex;flex-direction:column;align-items:center"><div class="n">/'+v+'</div><div class="h">'+hostsFor(v).toLocaleString()+' h</div></div>';
    board.appendChild(t);
  }
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
  let lowest=30;for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]&&grid[r][c]<lowest)lowest=grid[r][c];
  document.getElementById('lowest').textContent='/'+lowest;
}

function slide(line){
  const filtered=line.filter(v=>v);
  const out=[];
  for(let i=0;i<filtered.length;i++){
    if(i+1<filtered.length&&filtered[i]===filtered[i+1]){
      const merged=filtered[i]-1;
      out.push(merged);score+=hostsFor(merged);
      i++;
    }else out.push(filtered[i]);
  }
  while(out.length<SIZE)out.push(0);
  return out;
}

function buzz(ms){if(navigator.vibrate)try{navigator.vibrate(ms)}catch(e){}}
function move(dir){
  history.push({grid:grid.map(r=>r.slice()),score:score});
  let moved=false,mergedThisMove=false;
  const beforeScore=score;
  if(dir==='L'){for(let r=0;r<SIZE;r++){const n=slide(grid[r]);if(n.join()!==grid[r].join())moved=true;grid[r]=n}}
  else if(dir==='R'){for(let r=0;r<SIZE;r++){const n=slide(grid[r].slice().reverse()).reverse();if(n.join()!==grid[r].join())moved=true;grid[r]=n}}
  else if(dir==='U'){for(let c=0;c<SIZE;c++){const col=grid.map(r=>r[c]);const n=slide(col);for(let r=0;r<SIZE;r++){if(grid[r][c]!==n[r])moved=true;grid[r][c]=n[r]}}}
  else if(dir==='D'){for(let c=0;c<SIZE;c++){const col=grid.map(r=>r[c]).reverse();const n=slide(col).reverse();for(let r=0;r<SIZE;r++){if(grid[r][c]!==n[r])moved=true;grid[r][c]=n[r]}}}
  if(moved){spawn();if(score>best){best=score;localStorage.setItem(KEY+'_best',best)}if(score>beforeScore)buzz(20);else buzz(8);render();checkEnd()}
  else history.pop();
}

function canMove(){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!grid[r][c])return true;
    if(c+1<SIZE&&grid[r][c]===grid[r][c+1])return true;
    if(r+1<SIZE&&grid[r][c]===grid[r+1][c])return true;
  }
  return false;
}
function checkEnd(){
  let hasGoal=false;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(grid[r][c]===8)hasGoal=true;
  if(hasGoal){showOver('Reached /8 — entire Class A!','You win — score '+score)}
  else if(!canMove()){showOver('Out of moves','Final score '+score)}
}
function showOver(t,m){document.getElementById('overTitle').textContent=t;document.getElementById('overMsg').textContent=m;document.getElementById('over').classList.add('show')}

window.newGame=function(){grid=emptyGrid();score=0;history=[];spawn();spawn();document.getElementById('over').classList.remove('show');render()}
window.undo=function(){if(history.length){const h=history.pop();grid=h.grid;score=h.score;render()}}

// keyboard
document.addEventListener('keydown',e=>{
  const k={ArrowLeft:'L',ArrowRight:'R',ArrowUp:'U',ArrowDown:'D'}[e.key];
  if(k){e.preventDefault();move(k)}
});
// touch
let tx=0,ty=0;
document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.getElementById('board').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))<25)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'R':'L');
  else move(dy>0?'D':'U');
});

newGame();
});</script>
</body>
</html>
