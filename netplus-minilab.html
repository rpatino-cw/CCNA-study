<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Labs — Network+ Practice</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/netplus.css">
<style>
/* ═══════════════════════════════════════════════════════════════
   NET+ MINI LABS — 25 Interactive Labs
   ═══════════════════════════════════════════════════════════════ */

/* ── Topic Grid ──────────────────────────────────────────────── */
#topicGrid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: var(--s-xl);
}
.topic-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px 10px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  text-decoration: none;
  display: block;
}
.topic-card:hover {
  border-color: var(--np);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(220,38,38,0.08);
}
.topic-card.active {
  border-color: var(--np);
  background: var(--np-dim);
  box-shadow: 0 0 0 2px rgba(var(--np-rgb),0.15);
}
.topic-card .tc-id {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--np);
  display: block;
  margin-bottom: 4px;
}
.topic-card .tc-name {
  font-family: var(--font-display);
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}
.topic-card .tc-score {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--prof-strong);
  margin-top: 4px;
  display: block;
}
.domain-label {
  grid-column: 1 / -1;
  font-family: var(--font-display);
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-muted);
  padding: 8px 0 2px;
  border-bottom: 1px solid var(--rule);
  margin-top: 8px;
}
.domain-label:first-child { margin-top: 0; }

@media (max-width: 900px) { #topicGrid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px) { #topicGrid { grid-template-columns: repeat(2, 1fr); } }

/* ── Lab Area ────────────────────────────────────────────────── */
#labArea {
  animation: fadeIn 0.3s var(--ease-out) both;
}
.lab-header {
  margin-bottom: var(--s-lg);
}
.lab-header h2 {
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--np);
  margin: 0 0 4px;
  padding: 0;
  border: none;
}
.lab-header .lab-desc {
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--ink-secondary);
  max-width: 60ch;
}
.lab-header .lab-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--np);
  background: var(--np-dim);
  padding: 2px 10px;
  border-radius: 100px;
  margin-bottom: 8px;
}

/* ── Score bar ───────────────────────────────────────────────── */
.lab-scorebar {
  display: flex;
  align-items: center;
  gap: var(--s-lg);
  margin-bottom: var(--s-lg);
  padding: 10px 18px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  flex-wrap: wrap;
}
.sb-item {
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.sb-val {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 800;
  line-height: 1;
}
.sb-lbl {
  font-family: var(--font-display);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-muted);
}
.sb-correct .sb-val { color: var(--prof-strong); }
.sb-wrong .sb-val { color: var(--prof-weak); }
.sb-total .sb-val { color: var(--ink); }

/* ── Shared lab UI ───────────────────────────────────────────── */
.lab-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.lab-btn-primary {
  background: var(--np);
  color: #fff;
  border-color: var(--np);
}
.lab-btn-primary:hover { background: var(--np-dark); }
.lab-btn-secondary {
  background: transparent;
  color: var(--ink);
  border-color: var(--border-strong);
}
.lab-btn-secondary:hover {
  background: var(--bg-hover);
  border-color: var(--ink-muted);
}
.lab-actions {
  display: flex;
  gap: var(--s-md);
  margin-top: var(--s-xl);
  flex-wrap: wrap;
}

/* ── Feedback chips ──────────────────────────────────────────── */
.fb-correct {
  color: var(--prof-strong);
  background: var(--prof-strong-bg);
  border: 1px solid var(--prof-strong);
  border-radius: var(--radius);
  padding: 8px 14px;
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 600;
  margin-top: 8px;
}
.fb-wrong {
  color: var(--prof-weak);
  background: var(--prof-weak-bg);
  border: 1px solid var(--prof-weak);
  border-radius: var(--radius);
  padding: 8px 14px;
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 600;
  margin-top: 8px;
}

/* ── Terminal style ──────────────────────────────────────────── */
.term-box {
  background: #0d0d1a;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid #2a2a3e;
}
.term-titlebar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: #151528;
  border-bottom: 1px solid #2a2a3e;
}
.term-dots { display: flex; gap: 6px; }
.term-dot { width: 10px; height: 10px; border-radius: 50%; }
.term-dot.r { background: #ff5f57; }
.term-dot.y { background: #febc2e; }
.term-dot.g { background: #28c840; }
.term-title {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: #6b6b8a;
  margin-left: 8px;
}
.term-body {
  padding: 16px 20px;
  min-height: 200px;
  max-height: 450px;
  overflow-y: auto;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.7;
  color: #e0e0ff;
}
.term-line { white-space: pre-wrap; word-break: break-all; }
.term-line.out { color: #8b8baa; }
.term-line.ok { color: #00ff88; }
.term-line.err { color: #ff5f57; }
.term-line.warn { color: #febc2e; }
.term-line.hint { color: #7b7baa; font-style: italic; font-size: 0.78rem; }
.term-input-row {
  display: flex;
  align-items: center;
  margin-top: 6px;
}
.term-prompt {
  color: #00ff88;
  white-space: nowrap;
  font-weight: 600;
}
.term-input {
  background: none;
  border: none;
  outline: none;
  color: #e0e0ff;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  flex: 1;
  caret-color: #00ff88;
  padding: 0;
  margin: 0;
}
.term-input::placeholder { color: #3b3b5e; }

/* ── Option grid / buttons ───────────────────────────────────── */
.opt-grid {
  display: grid;
  gap: 10px;
  margin: var(--s-md) 0;
}
.opt-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.opt-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.opt-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
.opt-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  text-align: left;
  padding: 12px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--ink);
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  line-height: 1.4;
}
.opt-btn:hover:not(.locked) {
  border-color: var(--np);
  background: var(--np-dim);
}
.opt-btn.selected {
  border-color: var(--np);
  background: var(--np-dim);
}
.opt-btn.correct {
  border-color: var(--prof-strong);
  background: var(--prof-strong-bg);
}
.opt-btn.wrong {
  border-color: var(--prof-weak);
  background: var(--prof-weak-bg);
}
.opt-btn.locked {
  cursor: default;
  opacity: 0.7;
}
@media (max-width: 600px) {
  .opt-grid.cols-2, .opt-grid.cols-3, .opt-grid.cols-4 {
    grid-template-columns: 1fr;
  }
}

/* ── Scenario card ───────────────────────────────────────────── */
.scenario-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--np);
  border-radius: var(--radius-lg);
  padding: var(--s-lg);
  margin-bottom: var(--s-md);
  font-family: var(--font-body);
  font-size: 0.92rem;
  line-height: 1.6;
}

/* ── Category buttons (for sorters) ──────────────────────────── */
.cat-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: var(--s-md);
}
.cat-btn {
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid var(--border-strong);
  background: var(--bg-surface);
  color: var(--ink);
  transition: background 0.15s, border-color 0.15s;
}
.cat-btn:hover {
  border-color: var(--np);
  background: var(--np-dim);
}

/* ── Item list (for service model sorter) ────────────────────── */
.item-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: var(--s-lg);
}
.item-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  transition: border-color 0.15s, background 0.15s;
}
.item-row.done {
  opacity: 0.5;
  pointer-events: none;
}
.item-row.correct-done {
  border-color: var(--prof-strong);
  background: var(--prof-strong-bg);
}
.item-row.wrong-done {
  border-color: var(--prof-weak);
  background: var(--prof-weak-bg);
}
.item-row .ir-text {
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 500;
  flex: 1;
}
.item-row .ir-result {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
}

/* ── Fill-in fields ──────────────────────────────────────────── */
.fill-field {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.fill-field label {
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--ink-secondary);
  min-width: 120px;
}
.fill-input {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 8px 12px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  background: var(--bg-input);
  color: var(--ink);
  width: 200px;
  outline: none;
  transition: border-color 0.15s;
}
.fill-input:focus {
  border-color: var(--np);
}
.fill-input.correct {
  border-color: var(--prof-strong);
  background: var(--prof-strong-bg);
}
.fill-input.wrong {
  border-color: var(--prof-weak);
  background: var(--prof-weak-bg);
}
@media (max-width: 600px) {
  .fill-field { flex-direction: column; align-items: flex-start; gap: 4px; }
  .fill-field label { min-width: unset; }
  .fill-input { width: 100%; }
}

/* ── Rack builder ────────────────────────────────────────────── */
.rack-visual {
  background: #1C1917;
  border-radius: var(--radius-lg);
  padding: var(--s-md);
  margin-bottom: var(--s-md);
}
.rack-slot {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  margin-bottom: 4px;
  border: 1px dashed #57534E;
  border-radius: var(--radius);
  min-height: 42px;
  color: #A8A29E;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  transition: border-color 0.15s, background 0.15s;
}
.rack-slot .ru-label {
  font-weight: 700;
  color: #57534E;
  min-width: 36px;
}
.rack-slot.filled {
  border-style: solid;
  border-color: var(--np);
  background: rgba(220,38,38,0.08);
  color: #e0e0e0;
}
.rack-slot.correct-slot {
  border-color: var(--prof-strong);
  background: rgba(22,163,74,0.1);
}
.rack-slot.wrong-slot {
  border-color: var(--prof-weak);
  background: rgba(220,38,38,0.1);
}
.device-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: var(--s-lg);
}
.device-chip {
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid var(--border-strong);
  background: var(--bg-surface);
  color: var(--ink);
  transition: background 0.15s, border-color 0.15s, opacity 0.15s;
}
.device-chip:hover:not(.used) {
  border-color: var(--np);
  background: var(--np-dim);
}
.device-chip.used {
  opacity: 0.3;
  cursor: default;
}
.device-chip.selected {
  border-color: var(--np);
  background: var(--np-dim);
}

/* ── Channel planner grid ────────────────────────────────────── */
.floor-plan {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--s-lg);
  margin-bottom: var(--s-md);
  position: relative;
}
.ap-node {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px;
  margin: 6px;
  background: var(--bg-recessed);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  min-width: 80px;
  transition: border-color 0.15s;
}
.ap-node.conflict { border-color: var(--prof-weak); background: var(--prof-weak-bg); }
.ap-node.ok { border-color: var(--prof-strong); background: var(--prof-strong-bg); }
.ap-label {
  font-family: var(--font-display);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--ink);
}
.ch-select {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 600;
  padding: 4px 8px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  background: var(--bg-input);
  color: var(--ink);
  cursor: pointer;
}

/* ── Checklist style ─────────────────────────────────────────── */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-family: var(--font-display);
  font-size: 0.88rem;
}
.check-item:hover {
  border-color: var(--np);
}
.check-item.checked {
  border-color: var(--np);
  background: var(--np-dim);
}
.check-item .ck-box {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-strong);
  border-radius: 3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  font-size: 0.7rem;
  transition: all 0.15s;
}
.check-item.checked .ck-box {
  background: var(--np);
  border-color: var(--np);
  color: #fff;
}

/* ── Log lines ───────────────────────────────────────────────── */
.log-line {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  line-height: 1.8;
  padding: 2px 8px;
  border-radius: 2px;
}
.log-line.sev-emergency { background: #FEF2F2; color: #991B1B; font-weight: 700; }
.log-line.sev-alert { background: #FEF2F2; color: #B91C1C; }
.log-line.sev-critical { background: #FEF2F2; color: #DC2626; }
.log-line.sev-error { background: #FFFBEB; color: #92400E; }
.log-line.sev-warning { background: #FFFBEB; color: #A16207; }
.log-line.sev-notice { background: #F0FDF4; color: #166534; }
.log-line.sev-info { color: var(--ink-secondary); }
.log-line.sev-debug { color: var(--ink-muted); }

/* ── Timer ───────────────────────────────────────────────────── */
.lab-timer {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink-secondary);
  margin-left: auto;
}
.lab-timer.warn { color: var(--prof-mid); }
.lab-timer.danger { color: var(--prof-weak); }

/* ── Tool belt ───────────────────────────────────────────────── */
.tool-belt {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: var(--s-md) 0;
}
.tool-item {
  padding: 10px 16px;
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 600;
  text-align: center;
  transition: border-color 0.15s, background 0.15s;
  min-width: 100px;
}
.tool-item:hover:not(.locked) {
  border-color: var(--np);
  background: var(--np-dim);
}
.tool-item.selected {
  border-color: var(--np);
  background: var(--np-dim);
}
.tool-item.correct {
  border-color: var(--prof-strong);
  background: var(--prof-strong-bg);
}
.tool-item.wrong {
  border-color: var(--prof-weak);
  background: var(--prof-weak-bg);
}
.tool-item.locked { cursor: default; opacity: 0.6; }

/* ── Explanation ─────────────────────────────────────────────── */
.explain-box {
  margin-top: var(--s-md);
  padding: var(--s-md) var(--s-lg);
  background: var(--bg-recessed);
  border-left: 3px solid var(--np);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 0.88rem;
  line-height: 1.7;
}

/* ── Progress bar ────────────────────────────────────────────── */
.lab-progress {
  width: 100%;
  height: 6px;
  background: var(--bg-recessed);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: var(--s-lg);
}
.lab-progress .fill {
  height: 100%;
  border-radius: 3px;
  background: var(--np);
  transition: width 0.5s var(--ease-out);
}

/* ── Step indicators ─────────────────────────────────────────── */
.step-indicator {
  font-family: var(--font-display);
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-muted);
  margin-bottom: var(--s-sm);
}

/* ── Cable diagram ───────────────────────────────────────────── */
.cable-diagram {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--s-lg);
  margin-bottom: var(--s-md);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.8;
  color: var(--ink);
  text-align: center;
}

/* ── Monitoring dashboard ────────────────────────────────────── */
.mon-dashboard {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: var(--s-md);
}
.mon-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
}
.mon-card .mon-label {
  font-family: var(--font-display);
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-muted);
  margin-bottom: 4px;
}
.mon-card .mon-val {
  font-family: var(--font-mono);
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--ink);
}
.mon-card .mon-val.warn { color: var(--prof-mid); }
.mon-card .mon-val.crit { color: var(--prof-weak); }
.mon-bar {
  height: 8px;
  background: var(--bg-recessed);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 6px;
}
.mon-bar .bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
@media (max-width: 600px) {
  .mon-dashboard { grid-template-columns: 1fr; }
}

/* ── Topology thumbnails ─────────────────────────────────────── */
.topo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: var(--s-md) 0;
}
.topo-thumb {
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 10px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, background 0.15s;
}
.topo-thumb:hover:not(.locked) {
  border-color: var(--np);
  background: var(--np-dim);
}
.topo-thumb.correct {
  border-color: var(--prof-strong);
  background: var(--prof-strong-bg);
}
.topo-thumb.wrong {
  border-color: var(--prof-weak);
  background: var(--prof-weak-bg);
}
.topo-thumb.locked { cursor: default; opacity: 0.6; }
.topo-thumb .topo-art {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  line-height: 1.3;
  white-space: pre;
  margin-bottom: 6px;
  color: var(--ink-secondary);
}
.topo-thumb .topo-name {
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 700;
}
@media (max-width: 600px) {
  .topo-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── Number sequencer ────────────────────────────────────────── */
.seq-step {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin-bottom: 8px;
}
.seq-step .seq-text {
  flex: 1;
  font-family: var(--font-display);
  font-size: 0.88rem;
  font-weight: 500;
}
.seq-num-input {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 700;
  width: 40px;
  text-align: center;
  padding: 6px;
  border: 2px solid var(--border-strong);
  border-radius: var(--radius);
  background: var(--bg-input);
  color: var(--ink);
}
.seq-num-input:focus {
  border-color: var(--np);
  outline: none;
}
.seq-num-input.correct {
  border-color: var(--prof-strong);
  background: var(--prof-strong-bg);
}
.seq-num-input.wrong {
  border-color: var(--prof-weak);
  background: var(--prof-weak-bg);
}

/* ── Animations ──────────────────────────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes correctPop {
  0% { transform: scale(1); }
  30% { transform: scale(1.06); }
  100% { transform: scale(1); }
}
@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<div class="container">
  <nav class="top-nav"></nav>
  <header class="page-header">
    <h1>Mini Labs</h1>
    <p class="subtitle">25 interactive hands-on labs — one per N10-009 objective. No drag-and-drop, all typing and clicking.</p>
  </header>
  <div id="topicGrid"></div>
  <div id="labArea"></div>
</div>
<script defer src="js/nav.js"></script>
<script defer src="js/tutor.js"></script>
<script defer src="js/group-chat.js"></script>
<script>document.addEventListener('DOMContentLoaded',function(){

/* ═══════════════════════════════════════════════════════════════════
   NET+ MINI LABS ENGINE — 25 Unique Interactive Labs
   All data, validation, and rendering self-contained.
   ═══════════════════════════════════════════════════════════════════ */
(function(){
'use strict';

/* ── Helpers ──────────────────────────────────────────────────── */
var $ = function(s,c){return(c||document).querySelector(s)};
var el = function(tag,attrs,kids){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==='className') e.className=attrs[k];
    else if(k==='innerHTML') e.innerHTML=attrs[k];
    else if(k==='textContent') e.textContent=attrs[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(kids) kids.forEach(function(c){if(c) e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return e;
};
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}

/* ── Lab registry (populated below, routed at bottom) ─────────── */
var LABS = {};

/* ── Score persistence ────────────────────────────────────────── */
var SKEY='np_minilab_';
function loadScore(id){try{return JSON.parse(localStorage.getItem(SKEY+id))||null}catch(e){return null}}
function saveScore(id,correct,total){
  var pct=Math.round(correct/total*100);
  var prev=loadScore(id);
  if(!prev||pct>prev.pct) localStorage.setItem(SKEY+id,JSON.stringify({pct:pct,correct:correct,total:total,date:new Date().toISOString()}));
}

/* ── Topic definitions ────────────────────────────────────────── */
var TOPICS = [
  {d:'Domain 1 — Networking Concepts'},
  {id:'1.1',name:'OSI Model',type:'Terminal Classifier'},
  {id:'1.2',name:'Appliances',type:'Scenario Picker'},
  {id:'1.3',name:'Cloud',type:'Service Model Sorter'},
  {id:'1.4',name:'Ports',type:'Firewall Rule Builder'},
  {id:'1.5',name:'Cables',type:'Cable Selector'},
  {id:'1.6',name:'Topologies',type:'Network Builder'},
  {id:'1.7',name:'IPv4',type:'Subnet Calculator'},
  {id:'1.8',name:'Modern',type:'Technology Matcher'},
  {d:'Domain 2 — Network Implementation'},
  {id:'2.1',name:'Routing',type:'Route Table Builder'},
  {id:'2.2',name:'Switching',type:'VLAN Console'},
  {id:'2.3',name:'Wireless',type:'Channel Planner'},
  {id:'2.4',name:'Physical',type:'Rack Builder'},
  {d:'Domain 3 — Network Operations'},
  {id:'3.1',name:'Processes',type:'Change Mgmt Sim'},
  {id:'3.2',name:'Monitoring',type:'Log Analyzer'},
  {id:'3.3',name:'DR',type:'Backup Calculator'},
  {id:'3.4',name:'Services',type:'DNS Record Builder'},
  {id:'3.5',name:'Access',type:'Access Method Selector'},
  {d:'Domain 4 — Network Security'},
  {id:'4.1',name:'Security',type:'Violation Detector'},
  {id:'4.2',name:'Attacks',type:'Attack Identifier'},
  {id:'4.3',name:'Solutions',type:'Defense Builder'},
  {d:'Domain 5 — Network Troubleshooting'},
  {id:'5.1',name:'Methodology',type:'Step Sequencer'},
  {id:'5.2',name:'Cabling',type:'Interface Debugger'},
  {id:'5.3',name:'Services',type:'CLI Troubleshooter'},
  {id:'5.4',name:'Performance',type:'Bottleneck Finder'},
  {id:'5.5',name:'Tools',type:'Tool Picker'},
];

/* ── Build topic grid ─────────────────────────────────────────── */
var grid=$('#topicGrid');
var labArea=$('#labArea');
var params=new URLSearchParams(window.location.search);
var activeTopic=params.get('topic')||'';

TOPICS.forEach(function(t){
  if(t.d){
    var dl=el('div',{className:'domain-label',textContent:t.d});
    grid.appendChild(dl);
    return;
  }
  var sc=loadScore(t.id);
  var card=el('a',{
    className:'topic-card'+(activeTopic===t.id?' active':''),
    href:'netplus-minilab.html?topic='+t.id
  });
  card.innerHTML='<span class="tc-id">'+t.id+'</span><span class="tc-name">'+t.name+'</span>'+(sc?'<span class="tc-score">'+sc.pct+'%</span>':'');
  grid.appendChild(card);
});

/* ═══════════════════════════════════════════════════════════════════
   LAB IMPLEMENTATIONS — Each lab is a self-contained function
   ═══════════════════════════════════════════════════════════════════ */

function labHeader(area,id,name,desc,type){
  var h=el('div',{className:'lab-header'});
  h.innerHTML='<span class="lab-tag">'+id+' — '+type+'</span><h2>'+name+'</h2><p class="lab-desc">'+desc+'</p>';
  area.appendChild(h);
}
function labScorebar(area){
  var sb=el('div',{className:'lab-scorebar',innerHTML:'<div class="sb-item sb-correct"><span class="sb-val" id="sbCorrect">0</span><span class="sb-lbl">Correct</span></div><div class="sb-item sb-wrong"><span class="sb-val" id="sbWrong">0</span><span class="sb-lbl">Wrong</span></div><div class="sb-item sb-total"><span class="sb-val" id="sbTotal">0</span><span class="sb-lbl">Total</span></div>'});
  area.appendChild(sb);
  return {
    c:0,w:0,t:0,
    update:function(correct){
      if(correct)this.c++;else this.w++;
      this.t++;
      $('#sbCorrect').textContent=this.c;
      $('#sbWrong').textContent=this.w;
      $('#sbTotal').textContent=this.t;
    }
  };
}
function labProgress(area,total){
  var p=el('div',{className:'lab-progress',innerHTML:'<div class="fill" id="labFill" style="width:0%"></div>'});
  area.appendChild(p);
  return {
    cur:0,
    advance:function(){this.cur++;$('#labFill').style.width=Math.round(this.cur/total*100)+'%';}
  };
}

/* ═══════════════════════════════════════════════════════════════════
   1.1 OSI MODEL — Terminal Classifier
   ═══════════════════════════════════════════════════════════════════ */
LABS['1.1']=function(area,id){
  var items=shuffle([
    {name:'ARP',layer:2},{name:'TCP',layer:4},{name:'HTTP',layer:7},{name:'Ethernet',layer:2},
    {name:'IP',layer:3},{name:'FTP',layer:7},{name:'UDP',layer:4},{name:'SMTP',layer:7},
    {name:'ICMP',layer:3},{name:'PPP',layer:2},{name:'TLS/SSL',layer:6},{name:'DNS (app)',layer:7},
    {name:'OSPF',layer:3},{name:'SSH',layer:7},{name:'NTP',layer:7},{name:'Fiber optic',layer:1},
    {name:'RJ-45 connector',layer:1},{name:'Switches (MAC)',layer:2},{name:'Router',layer:3},
    {name:'JPEG encoding',layer:6},{name:'Session ID tokens',layer:5},
    {name:'Wi-Fi (802.11)',layer:2},{name:'Hub',layer:1},{name:'SNMP',layer:7}
  ]);
  labHeader(area,id,'OSI Model — Terminal Classifier','A protocol or technology name appears. Type the OSI layer number (1-7). Cycle through all items.','Terminal Classifier');
  var score=labScorebar(area);
  var prog=labProgress(area,items.length);
  var idx=0;
  var layers=['','Physical','Data Link','Network','Transport','Session','Presentation','Application'];

  var termBox=el('div',{className:'term-box'});
  termBox.innerHTML='<div class="term-titlebar"><div class="term-dots"><div class="term-dot r"></div><div class="term-dot y"></div><div class="term-dot g"></div></div><span class="term-title">OSI Classifier</span></div>';
  var body=el('div',{className:'term-body',id:'termBody'});
  termBox.appendChild(body);
  area.appendChild(termBox);

  var fbArea=el('div',{id:'termFb'});
  area.appendChild(fbArea);

  function showItem(){
    if(idx>=items.length){
      saveScore(id,score.c,score.t);
      body.innerHTML='<div class="term-line ok">All items classified! Score: '+score.c+'/'+score.t+'</div>';
      fbArea.innerHTML='<div class="lab-actions"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again</button></div>';
      $('#retryBtn').onclick=function(){area.innerHTML='';LABS['1.1'](area,id)};
      return;
    }
    var it=items[idx];
    body.innerHTML='<div class="term-line" style="margin-bottom:8px">Classify: <strong style="color:#fff">'+it.name+'</strong></div><div class="term-line hint">Type the OSI layer number (1-7) and press Enter</div>';
    var row=el('div',{className:'term-input-row'});
    row.innerHTML='<span class="term-prompt">Layer&gt; </span>';
    var inp=el('input',{className:'term-input',type:'text',placeholder:'1-7',maxlength:'1',autocomplete:'off'});
    row.appendChild(inp);
    body.appendChild(row);
    inp.focus();
    inp.onkeydown=function(e){
      if(e.key==='Enter'){
        var v=parseInt(inp.value.trim());
        var ok=v===it.layer;
        score.update(ok);
        prog.advance();
        if(ok){
          fbArea.innerHTML='<div class="fb-correct">Correct! '+it.name+' is Layer '+it.layer+' ('+layers[it.layer]+')</div>';
        } else {
          fbArea.innerHTML='<div class="fb-wrong">Wrong. '+it.name+' is Layer '+it.layer+' ('+layers[it.layer]+'), not Layer '+(v||'?')+'</div>';
        }
        idx++;
        setTimeout(function(){showItem()},1200);
      }
    };
  }
  showItem();
};

/* ═══════════════════════════════════════════════════════════════════
   1.2 APPLIANCES — Scenario Picker
   ═══════════════════════════════════════════════════════════════════ */
LABS['1.2']=function(area,id){
  var scenarios=shuffle([
    {q:'Branch office needs to filter traffic by application and user identity.',opts:['NGFW','Switch','Hub','Modem'],answer:0,why:'Next-generation firewalls (NGFW) can filter by application and user identity.'},
    {q:'Connect 48 devices on the same LAN segment with dedicated bandwidth per port.',opts:['Router','Managed Switch','Wireless AP','Load Balancer'],answer:1,why:'A managed switch provides dedicated bandwidth per port for LAN devices.'},
    {q:'Distribute incoming web requests across 5 backend servers.',opts:['Firewall','DNS Server','Load Balancer','Proxy Server'],answer:2,why:'A load balancer distributes client requests across multiple servers.'},
    {q:'Translate private IPs to a single public IP for internet access.',opts:['Router with NAT','Switch','IDS','Wireless Controller'],answer:0,why:'A router with NAT translates private IPs to public IPs for internet access.'},
    {q:'Detect suspicious traffic patterns without blocking them.',opts:['IPS','IDS','Firewall','Proxy'],answer:1,why:'An IDS (Intrusion Detection System) monitors and alerts but does not block traffic.'},
    {q:'Provide centralized management for 200 wireless access points.',opts:['Wireless Controller','Router','Core Switch','RADIUS Server'],answer:0,why:'A wireless controller centrally manages large numbers of APs.'},
    {q:'Cache frequently accessed web pages to reduce bandwidth usage.',opts:['Firewall','Proxy Server','Switch','IPS'],answer:1,why:'A proxy server caches web content to reduce WAN bandwidth consumption.'},
    {q:'Convert analog phone signals to VoIP packets.',opts:['PBX','VoIP Gateway','Load Balancer','DNS Server'],answer:1,why:'A VoIP gateway converts analog voice signals to digital VoIP packets.'},
    {q:'Authenticate users before granting network access using 802.1X.',opts:['RADIUS Server','DHCP Server','Firewall','Hub'],answer:0,why:'A RADIUS server handles 802.1X authentication for network access control.'},
    {q:'Provide redundant power to network equipment during an outage.',opts:['PDU','UPS','Generator Transfer Switch','PoE Switch'],answer:1,why:'A UPS provides battery backup power during short outages.'},
  ]);
  labHeader(area,id,'Appliances — Scenario Picker','Read the scenario and pick the correct network appliance. 10 real-world scenarios.','Scenario Picker');
  var score=labScorebar(area);
  var prog=labProgress(area,scenarios.length);
  var idx=0;
  var qArea=el('div',{id:'scenarioArea'});
  area.appendChild(qArea);

  function showQ(){
    if(idx>=scenarios.length){
      saveScore(id,score.c,score.t);
      qArea.innerHTML='<div style="text-align:center;padding:var(--s-xl)"><h3 style="color:var(--np)">Lab Complete!</h3><p>Score: '+score.c+'/'+score.t+'</p><div class="lab-actions" style="justify-content:center"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again</button></div></div>';
      $('#retryBtn').onclick=function(){area.innerHTML='';LABS['1.2'](area,id)};
      return;
    }
    var s=scenarios[idx];
    qArea.innerHTML='<div class="step-indicator">Scenario '+(idx+1)+' of '+scenarios.length+'</div><div class="scenario-card">'+s.q+'</div><div class="opt-grid cols-2" id="optGrid"></div><div id="scenFb"></div>';
    var og=$('#optGrid');
    s.opts.forEach(function(o,i){
      var btn=el('button',{className:'opt-btn',textContent:o});
      btn.onclick=function(){
        var btns=og.querySelectorAll('.opt-btn');
        btns.forEach(function(b){b.classList.add('locked')});
        var ok=i===s.answer;
        btn.classList.add(ok?'correct':'wrong');
        if(!ok) btns[s.answer].classList.add('correct');
        score.update(ok);
        prog.advance();
        $('#scenFb').innerHTML='<div class="explain-box">'+s.why+'</div>';
        idx++;
        setTimeout(showQ,2000);
      };
      og.appendChild(btn);
    });
  }
  showQ();
};

/* ═══════════════════════════════════════════════════════════════════
   1.3 CLOUD — Service Model Sorter
   ═══════════════════════════════════════════════════════════════════ */
LABS['1.3']=function(area,id){
  var items=shuffle([
    {name:'Amazon EC2 virtual machines',cat:'IaaS'},{name:'Google App Engine',cat:'PaaS'},
    {name:'Microsoft 365 email',cat:'SaaS'},{name:'AWS Lambda functions',cat:'PaaS'},
    {name:'Azure Virtual Network',cat:'IaaS'},{name:'Salesforce CRM',cat:'SaaS'},
    {name:'Amazon VDI WorkSpaces',cat:'DaaS'},{name:'Heroku app hosting',cat:'PaaS'},
    {name:'Google Cloud Storage buckets',cat:'IaaS'},{name:'Slack messaging',cat:'SaaS'},
    {name:'Citrix Virtual Desktops',cat:'DaaS'},{name:'DigitalOcean Droplets',cat:'IaaS'},
  ]);
  var cats=['IaaS','PaaS','SaaS','DaaS'];
  labHeader(area,id,'Cloud — Service Model Sorter','Click a service, then click the correct cloud model category to assign it.','Service Model Sorter');
  var score=labScorebar(area);
  var prog=labProgress(area,items.length);
  var cur=0,selectedIdx=null;

  var listDiv=el('div',{className:'item-list',id:'itemList'});
  area.appendChild(listDiv);

  var catDiv=el('div',{className:'cat-btns',id:'catBtns',innerHTML:'<span style="font-family:var(--font-display);font-size:0.78rem;color:var(--ink-muted);margin-right:4px">Assign to:</span>'});
  cats.forEach(function(c,ci){
    var btn=el('button',{className:'cat-btn','data-cat':c,textContent:c});
    btn.onclick=function(){
      if(selectedIdx===null) return;
      var it=items[selectedIdx];
      var ok=it.cat===c;
      score.update(ok);
      prog.advance();
      var row=listDiv.children[selectedIdx];
      row.classList.add('done');
      row.classList.add(ok?'correct-done':'wrong-done');
      row.querySelector('.ir-result').textContent=ok?c:c+' (should be '+it.cat+')';
      row.querySelector('.ir-result').style.color=ok?'var(--prof-strong)':'var(--prof-weak)';
      selectedIdx=null;
      cur++;
      if(cur>=items.length){
        saveScore(id,score.c,score.t);
        area.insertAdjacentHTML('beforeend','<div class="lab-actions"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again</button></div>');
        $('#retryBtn').onclick=function(){area.innerHTML='';LABS['1.3'](area,id)};
      }
    };
    catDiv.appendChild(btn);
  });
  area.appendChild(catDiv);

  items.forEach(function(it,i){
    var row=el('div',{className:'item-row'});
    row.innerHTML='<span class="ir-text">'+it.name+'</span><span class="ir-result"></span>';
    row.onclick=function(){
      if(row.classList.contains('done')) return;
      listDiv.querySelectorAll('.item-row').forEach(function(r){r.style.borderColor=''});
      row.style.borderColor='var(--np)';
      selectedIdx=i;
    };
    listDiv.appendChild(row);
  });
};

/* ═══════════════════════════════════════════════════════════════════
   1.4 PORTS — Firewall Rule Builder
   ═══════════════════════════════════════════════════════════════════ */
LABS['1.4']=function(area,id){
  var rules=[
    {req:'Allow web traffic (HTTP)',port:'80',proto:'TCP'},
    {req:'Allow secure web traffic (HTTPS)',port:'443',proto:'TCP'},
    {req:'Allow DNS lookups',port:'53',proto:'UDP'},
    {req:'Allow SSH remote management',port:'22',proto:'TCP'},
    {req:'Allow email sending (SMTP)',port:'25',proto:'TCP'},
    {req:'Allow DHCP client requests',port:'67',proto:'UDP'},
    {req:'Allow SNMP monitoring',port:'161',proto:'UDP'},
    {req:'Allow FTP control connections',port:'21',proto:'TCP'},
  ];
  labHeader(area,id,'Ports — Firewall Rule Builder','For each requirement, type the correct port number and select TCP or UDP. Build 8 firewall rules.','Firewall Rule Builder');
  var score=labScorebar(area);
  var prog=labProgress(area,rules.length);
  var idx=0;
  var rArea=el('div',{id:'ruleArea'});
  area.appendChild(rArea);

  function showRule(){
    if(idx>=rules.length){
      saveScore(id,score.c,score.t);
      rArea.innerHTML='<div style="text-align:center;padding:var(--s-xl)"><h3 style="color:var(--np)">Firewall Configured!</h3><p>Score: '+score.c+'/'+score.t+'</p><div class="lab-actions" style="justify-content:center"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again</button></div></div>';
      $('#retryBtn').onclick=function(){area.innerHTML='';LABS['1.4'](area,id)};
      return;
    }
    var r=rules[idx];
    rArea.innerHTML='<div class="step-indicator">Rule '+(idx+1)+' of '+rules.length+'</div><div class="scenario-card">'+r.req+'</div><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:var(--s-md) 0"><label style="font-family:var(--font-display);font-size:0.82rem;font-weight:600">Port:</label><input type="text" id="portIn" class="fill-input" style="width:100px" placeholder="e.g. 80" autocomplete="off"><label style="font-family:var(--font-display);font-size:0.82rem;font-weight:600;margin-left:12px">Protocol:</label><button class="cat-btn" id="tcpBtn">TCP</button><button class="cat-btn" id="udpBtn">UDP</button></div><button class="lab-btn lab-btn-primary" id="submitRule" style="margin-top:8px">Submit Rule</button><div id="ruleFb" style="margin-top:8px"></div>';
    var selProto='';
    $('#tcpBtn').onclick=function(){selProto='TCP';$('#tcpBtn').style.borderColor='var(--np)';$('#tcpBtn').style.background='var(--np-dim)';$('#udpBtn').style.borderColor='';$('#udpBtn').style.background=''};
    $('#udpBtn').onclick=function(){selProto='UDP';$('#udpBtn').style.borderColor='var(--np)';$('#udpBtn').style.background='var(--np-dim)';$('#tcpBtn').style.borderColor='';$('#tcpBtn').style.background=''};
    $('#submitRule').onclick=function(){
      var p=$('#portIn').value.trim();
      var portOk=p===r.port;
      var protoOk=selProto===r.proto;
      var ok=portOk&&protoOk;
      score.update(ok);
      prog.advance();
      if(ok){
        $('#ruleFb').innerHTML='<div class="fb-correct">Correct! Port '+r.port+'/'+r.proto+'</div>';
      } else {
        $('#ruleFb').innerHTML='<div class="fb-wrong">Incorrect. Correct answer: Port '+r.port+'/'+r.proto+'</div>';
      }
      idx++;
      setTimeout(showRule,1500);

/* ═══════════════════════════════════════════════════════════════════
   1.7 IPv4 — Subnet Calculator Fill-in
   ═══════════════════════════════════════════════════════════════════ */
LABS['1.7']=function(area,id){
  labHeader(area,id,'IPv4 — Subnet Calculator','Given an IP/CIDR, fill in network address, broadcast, first usable, and last usable. Random IPs each time.','Subnet Calculator');
  var totalQ=6;
  var score=labScorebar(area);
  var prog=labProgress(area,totalQ);
  var idx=0;
  var sArea=el('div',{id:'subnetArea'});
  area.appendChild(sArea);

  function genSubnet(){
    var cidr=randInt(20,28);
    var mask=(-1<<(32-cidr))>>>0;
    var hostBits=32-cidr;
    var base=randInt(1,223);
    var second=randInt(0,255);
    var third=randInt(0,255);
    var fourth=randInt(1,254);
    var ipNum=((base<<24)|(second<<16)|(third<<8)|fourth)>>>0;
    var netNum=(ipNum&mask)>>>0;
    var bcastNum=(netNum|(~mask>>>0))>>>0;
    var firstNum=netNum+1;
    var lastNum=bcastNum-1;
    function toIP(n){return[(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.')}
    return {
      ip:toIP(ipNum)+'/'+cidr,
      network:toIP(netNum),
      broadcast:toIP(bcastNum),
      first:toIP(firstNum),
      last:toIP(lastNum),
      cidr:cidr
    };
  }

  function showQ(){
    if(idx>=totalQ){
      saveScore(id,score.c,score.t);
      sArea.innerHTML='<div style="text-align:center;padding:var(--s-xl)"><h3 style="color:var(--np)">Lab Complete!</h3><p>Score: '+score.c+'/'+score.t+'</p><div class="lab-actions" style="justify-content:center"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again (new IPs)</button></div></div>';
      $('#retryBtn').onclick=function(){area.innerHTML='';LABS['1.7'](area,id)};
      return;
    }
    var s=genSubnet();
    sArea.innerHTML='<div class="step-indicator">Question '+(idx+1)+' of '+totalQ+'</div><div class="scenario-card" style="font-family:var(--font-mono);font-size:1.1rem;font-weight:700;text-align:center">'+s.ip+'</div><div id="subFields"><div class="fill-field"><label>Network Address</label><input class="fill-input" id="fNet" autocomplete="off" placeholder="x.x.x.x"></div><div class="fill-field"><label>Broadcast</label><input class="fill-input" id="fBcast" autocomplete="off" placeholder="x.x.x.x"></div><div class="fill-field"><label>First Usable</label><input class="fill-input" id="fFirst" autocomplete="off" placeholder="x.x.x.x"></div><div class="fill-field"><label>Last Usable</label><input class="fill-input" id="fLast" autocomplete="off" placeholder="x.x.x.x"></div></div><button class="lab-btn lab-btn-primary" id="subCheck" style="margin-top:var(--s-md)">Check</button><div id="subFb"></div>';
    $('#subCheck').onclick=function(){
      var fields=[
        {id:'fNet',correct:s.network},
        {id:'fBcast',correct:s.broadcast},
        {id:'fFirst',correct:s.first},
        {id:'fLast',correct:s.last}
      ];
      var allOk=true;
      fields.forEach(function(f){
        var inp=$('#'+f.id);
        var v=inp.value.trim();
        if(v===f.correct){inp.classList.add('correct')}
        else{inp.classList.add('wrong');allOk=false}
      });
      score.update(allOk);
      prog.advance();
      var fb='Network: '+s.network+' | Broadcast: '+s.broadcast+' | First: '+s.first+' | Last: '+s.last;
      $('#subFb').innerHTML='<div class="'+(allOk?'fb-correct':'fb-wrong')+'">'+(allOk?'All correct!':'Correct answers: '+fb)+'</div>';
      idx++;
      setTimeout(showQ,2500);
    };
    $('#fNet').focus();
  }
  showQ();
};

  area.appendChild(fpDiv);

  var adjText=aps.map(function(a){return a.name+' adj: '+a.adj.map(function(i){return aps[i].name}).join(', ')}).join(' | ');
  $('#adjInfo').textContent=adjText;

  aps.forEach(function(a,i){
    var node=el('div',{className:'ap-node','data-idx':String(i)});
    node.innerHTML='<span class="ap-label">'+a.name+'</span><select class="ch-select" data-idx="'+i+'"><option value="">--</option><option value="1">Ch 1</option><option value="6">Ch 6</option><option value="11">Ch 11</option></select>';
    $('#apNodes').appendChild(node);
  });

  area.insertAdjacentHTML('beforeend','<button class="lab-btn lab-btn-primary" id="chCheck" style="margin-top:var(--s-md)">Check Channels</button><div id="chFb"></div>');

  $('#chCheck').onclick=function(){
    var sels=document.querySelectorAll('#apNodes select');
    var assignments=[];
    sels.forEach(function(s){assignments.push(parseInt(s.value)||0)});
    if(assignments.some(function(a){return a===0})){
      $('#chFb').innerHTML='<div class="fb-wrong">Assign a channel to every AP first.</div>';
      return;
    }
    var conflicts=0;
    var nodes=document.querySelectorAll('#apNodes .ap-node');
    nodes.forEach(function(n){n.classList.remove('conflict','ok')});
    aps.forEach(function(a,i){
      var hasConflict=false;
      a.adj.forEach(function(j){
        if(assignments[i]===assignments[j]) hasConflict=true;
      });
      if(hasConflict){conflicts++;nodes[i].classList.add('conflict')}
      else{nodes[i].classList.add('ok')}
    });
    if(conflicts===0){
      saveScore(id,5,5);
      $('#chFb').innerHTML='<div class="fb-correct">Zero co-channel interference! Perfect channel plan.</div><div class="lab-actions"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again</button></div>';
      $('#retryBtn').onclick=function(){area.innerHTML='';LABS['2.3'](area,id)};
    } else {
      $('#chFb').innerHTML='<div class="fb-wrong">'+conflicts+' AP(s) have co-channel interference with a neighbor. Adjust channels.</div>';
    }
  };
};

/* ═══════════════════════════════════════════════════════════════════
   2.4 PHYSICAL — Rack Builder
   ═══════════════════════════════════════════════════════════════════ */
LABS['2.4']=function(area,id){
  // Correct order (bottom to top): UPS, PDU, Switch 1, Switch 2, Router, Patch Panel
  var devices=['Patch Panel','Router','Switch 1','Switch 2','PDU','UPS'];
  var correctSlots={'UPS':1,'PDU':2,'Switch 1':3,'Switch 2':4,'Router':5,'Patch Panel':6};
  // 12U rack, items go in slots 1-6 (bottom up)
  labHeader(area,id,'Physical — Rack Builder','Place devices in the correct rack positions. UPS at bottom, patch panel at top. Click a device, then click a rack slot.','Rack Builder');

  var selectedDevice=null;
  var placed={};

  var picker=el('div',{className:'device-picker',id:'devPicker'});
  shuffle(devices).forEach(function(d){
    var chip=el('button',{className:'device-chip',textContent:d,'data-dev':d});
    chip.onclick=function(){
      if(chip.classList.contains('used')) return;
      picker.querySelectorAll('.device-chip').forEach(function(c){c.classList.remove('selected')});
      chip.classList.add('selected');
      selectedDevice=d;
    };
    picker.appendChild(chip);
  });
  area.appendChild(picker);

  var rack=el('div',{className:'rack-visual',id:'rackVis'});
  for(var u=12;u>=1;u--){
    var slot=el('div',{className:'rack-slot','data-ru':String(u)});
    slot.innerHTML='<span class="ru-label">U'+u+'</span><span class="slot-dev" data-ru="'+u+'">empty</span>';
    slot.onclick=(function(uu){return function(){
      if(!selectedDevice) return;
      if(placed[selectedDevice]) return;
      placed[selectedDevice]=uu;
      var sd=slot.querySelector('.slot-dev');
      sd.textContent=selectedDevice;
      slot.classList.add('filled');
      var chip=picker.querySelector('[data-dev="'+selectedDevice+'"]');
      if(chip){chip.classList.add('used');chip.classList.remove('selected')}
      selectedDevice=null;
      // Check if all placed
      if(Object.keys(placed).length===devices.length){
        checkRack();
      }
    }})(u);
    rack.appendChild(slot);
  }
  area.appendChild(rack);

  var fbDiv=el('div',{id:'rackFb'});
  area.appendChild(fbDiv);

  function checkRack(){
    var correct=0;
    var slots=rack.querySelectorAll('.rack-slot');
    devices.forEach(function(d){
      var placedRU=placed[d];
      var expectedRU=correctSlots[d];
      // Find the slot DOM element
      slots.forEach(function(s){
        if(parseInt(s.dataset.ru)===placedRU&&s.querySelector('.slot-dev').textContent===d){
          if(placedRU===expectedRU){
            s.classList.add('correct-slot');
            correct++;
          } else {
            s.classList.add('wrong-slot');
          }
        }
      });
    });
    saveScore(id,correct,devices.length);
    var msg=correct===devices.length?'Perfect rack layout!':'Score: '+correct+'/'+devices.length+'. Correct order (bottom up): UPS, PDU, Switch 1, Switch 2, Router, Patch Panel.';
    fbDiv.innerHTML='<div class="'+(correct===devices.length?'fb-correct':'fb-wrong')+'">'+msg+'</div><div class="lab-actions"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again</button></div>';
    $('#retryBtn').onclick=function(){area.innerHTML='';LABS['2.4'](area,id)};
  }
};

LABS['4.1']=function(area,id){
  var violations=[
    {text:'Admin account uses password "admin123"',id:'v1'},
    {text:'No MFA configured on management interfaces',id:'v2'},
    {text:'All departments share a single flat VLAN',id:'v3'},
    {text:'Telnet is enabled on all switch management ports',id:'v4'},
    {text:'Syslog/logging is not configured on any device',id:'v5'},
  ];
  var distractors=[
    {text:'HTTPS is enabled on the web server',id:'d1'},
    {text:'SSH keys are used for remote access',id:'d2'},
    {text:'Firewall rules deny all inbound by default',id:'d3'},
  ];
  var allItems=shuffle(violations.concat(distractors));
  var violationIds=violations.map(function(v){return v.id});

  labHeader(area,id,'Security — Violation Detector','This network has 5 security violations hidden among 8 items. Find all 5 before time runs out (90 seconds).','Violation Detector');

  var found=0;
  var wrong=0;
  var timeLeft=90;
  var timerEl=el('span',{className:'lab-timer',id:'secTimer',textContent:'1:30'});
  area.appendChild(el('div',{className:'lab-scorebar',style:'justify-content:space-between'},
    [el('span',{className:'sb-lbl',id:'secFound',textContent:'Found: 0/5'}),timerEl]
  ));

  var timer=setInterval(function(){
    timeLeft--;
    var m=Math.floor(timeLeft/60);
    var s=timeLeft%60;
    timerEl.textContent=m+':'+(s<10?'0':'')+s;
    if(timeLeft<=30) timerEl.className='lab-timer warn';
    if(timeLeft<=10) timerEl.className='lab-timer danger';
    if(timeLeft<=0){
      clearInterval(timer);
      finishLab();
    }
  },1000);

  var listDiv=el('div',{id:'violList',style:'margin-top:var(--s-md)'});
  allItems.forEach(function(it){
    var item=el('div',{className:'check-item','data-id':it.id});
    item.innerHTML='<span class="ck-box"></span><span>'+it.text+'</span>';
    item.onclick=function(){
      if(item.classList.contains('locked')) return;
      item.classList.add('locked');
      var isViolation=violationIds.indexOf(it.id)!==-1;
      if(isViolation){
        found++;
        item.classList.add('checked');
        item.querySelector('.ck-box').textContent='!';
        item.style.borderColor='var(--prof-strong)';
        item.style.background='var(--prof-strong-bg)';

        wrong++;
        item.style.borderColor='var(--prof-weak)';
        item.style.background='var(--prof-weak-bg)';
      }
      $('#secFound').textContent='Found: '+found+'/5';
      if(found===5){clearInterval(timer);finishLab()}
    };
    listDiv.appendChild(item);
  });
  area.appendChild(listDiv);

  var fbDiv=el('div',{id:'secFb'});
  area.appendChild(fbDiv);

  function finishLab(){
    var items=listDiv.querySelectorAll('.check-item');
    items.forEach(function(i){i.classList.add('locked')});
    saveScore(id,found,5);
    fbDiv.innerHTML='<div class="'+(found===5?'fb-correct':'fb-wrong')+'">Found '+found+'/5 violations'+(wrong>0?' ('+wrong+' false positive'+(wrong>1?'s':'')+')':'')+'</div><div class="explain-box">The 5 violations: default password, no MFA, flat VLAN (no segmentation), Telnet enabled (unencrypted), and no logging configured.</div><div class="lab-actions"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again</button></div>';

  }

  var score=labScorebar(area);
  var prog=labProgress(area,attacks.length);

  var aArea=el('div',{id:'atkArea'});

      aArea.innerHTML='<div style="text-align:center;padding:var(--s-xl)"><h3 style="color:var(--np)">Lab Complete!</h3><p>Score: '+score.c+'/'+score.t+'</p><div class="lab-actions" style="justify-content:center"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again</button></div></div>';

      $('#retryBtn').onclick=function(){area.innerHTML='';LABS['4.3'](area,id)};
      return;

    dArea.innerHTML='<div class="step-indicator">Scenario '+(idx+1)+' of '+scenarios.length+'</div><div class="scenario-card" style="border-left-color:var(--prof-weak)"><strong>Attack:</strong> '+s.attack+'</div><div style="font-family:var(--font-display);font-size:0.82rem;font-weight:600;margin:var(--s-sm) 0">Select ALL correct countermeasures:</div><div id="defOpts"></div><button class="lab-btn lab-btn-primary" id="defSubmit" style="margin-top:var(--s-md)">Submit Defenses</button><div id="defFb"></div>';

      tArea.innerHTML='<div style="text-align:center;padding:var(--s-xl)"><h3 style="color:var(--np)">Lab Complete!</h3><p>Score: '+score.c+'/'+score.t+'</p><div class="lab-actions" style="justify-content:center"><button class="lab-btn lab-btn-primary" id="retryBtn">Try Again</button></div></div>';
      $('#retryBtn').onclick=function(){area.innerHTML='';LABS['5.3'](area,id)};
      return;
    }
    var s=scenarios[idx];
    var cmds=Object.keys(s.commands);
    tArea.innerHTML='<div class="step-indicator">Scenario '+(idx+1)+' of '+scenarios.length+'</div><div class="scenario-card">'+s.problem+'</div><div style="font-family:var(--font-display);font-size:0.78rem;color:var(--ink-muted);margin-bottom:6px">Available commands: '+cmds.join(', ')+'</div><div class="term-box"><div class="term-titlebar"><div class="term-dots"><div class="term-dot r"></div><div class="term-dot y"></div><div class="term-dot g"></div></div><span class="term-title">Troubleshooting Terminal</span></div><div class="term-body" id="cliBody" style="min-height:200px"></div></div><div style="margin-top:var(--s-md)"><label style="font-family:var(--font-display);font-size:0.82rem;font-weight:600">What is the issue?</label><div style="display:flex;gap:10px;margin-top:6px"><input type="text" id="cliAnswer" class="fill-input" style="width:300px" placeholder="Describe the root cause..." autocomplete="off"><button class="lab-btn lab-btn-primary" id="cliSubmit">Submit Diagnosis</button></div></div><div id="cliFb"></div>';

    function addPrompt(){
      var body=$('#cliBody');
      var row=el('div',{className:'term-input-row'});
      row.innerHTML='<span class="term-prompt">C:\\> </span>';
      var inp=el('input',{className:'term-input',type:'text',placeholder:'Type a command...',autocomplete:'off'});
      row.appendChild(inp);
      body.appendChild(row);
      inp.focus();
      body.scrollTop=body.scrollHeight;
      inp.onkeydown=function(e){
        if(e.key==='Enter'){
          var v=inp.value.trim().toLowerCase();
          inp.disabled=true;
          // Find matching command
          var output=null;
          cmds.forEach(function(c){
            if(v===c.toLowerCase()||v.indexOf(c.split(' ')[0].toLowerCase())===0&&c.toLowerCase().indexOf(v)!==-1){
              output=s.commands[c];
            }
          });
          // Try partial match
          if(!output){
            cmds.forEach(function(c){
              if(c.toLowerCase().indexOf(v.split(' ')[0])===0){
                output=s.commands[c];
              }
            });
          }
          if(output){
            body.insertAdjacentHTML('beforeend','<div class="term-line out" style="white-space:pre-wrap">'+output+'</div>');
          } else {
            body.insertAdjacentHTML('beforeend','<div class="term-line err">Command not recognized. Try: '+cmds.join(', ')+'</div>');
          }
          addPrompt();
        }
      };
    }
    addPrompt();

    $('#cliSubmit').onclick=function(){
      var v=$('#cliAnswer').value.trim().toLowerCase();
      var ok=s.accept.some(function(a){return v.indexOf(a)!==-1});
      score.update(ok);
      prog.advance();
      $('#cliFb').innerHTML='<div class="'+(ok?'fb-correct':'fb-wrong')+'">'+(ok?'Correct diagnosis!':'Wrong. The issue is: '+s.issue)+'</div>';
      idx++;
      setTimeout(showScenario,2000);
    };
    $('#cliAnswer').onkeydown=function(e){if(e.key==='Enter')$('#cliSubmit').click()};
  }
  showScenario();
};
