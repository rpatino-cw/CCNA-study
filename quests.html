<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCNA 200-301 — Quest Map</title>
  <meta name="color-scheme" content="light">
  <link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* ── Quest page layout ────────────────────────────────── */

    .masthead {
      padding: var(--s-xl) 0 var(--s-lg);
      border-bottom: 2px solid var(--ink);
      margin-bottom: var(--s-xl);
    }

    .masthead h1 {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .masthead-sub {
      font-family: var(--font-display);
      font-size: 0.82rem;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-top: var(--s-sm);
    }

    /* ── Player stats bar ─────────────────────────────────── */

    .player-bar {
      display: flex;
      gap: var(--s-2xl);
      padding: var(--s-lg) 0;
      border-bottom: 1px solid var(--rule);
      margin-bottom: var(--s-xl);
      flex-wrap: wrap;
    }

    .player-stat {
      display: flex;
      flex-direction: column;
    }

    .player-stat .val {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .player-stat .lbl {
      font-family: var(--font-display);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-top: 4px;
    }

    .xp-bar-wrap {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .xp-bar-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-display);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      margin-bottom: 6px;
    }

    .xp-bar {
      width: 100%;
      height: 10px;
      background: var(--bg-recessed);
      border-radius: 5px;
      overflow: hidden;
    }

    .xp-bar .fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--accent), #D97706);
      transition: width 0.6s var(--ease-out);
    }

    /* ── Rank badges ──────────────────────────────────────── */

    .rank-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .rank-title.recruit { color: var(--ink-muted); }
    .rank-title.technician { color: var(--accent); }
    .rank-title.specialist { color: var(--prof-mid); }
    .rank-title.engineer { color: var(--prof-strong); }
    .rank-title.architect { color: #7C3AED; }

    /* ── Chapter (domain) sections ────────────────────────── */

    .chapter {
      margin-bottom: var(--s-2xl);
    }

    .chapter-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--s-md);
      padding-bottom: var(--s-sm);
      border-bottom: 2px solid var(--ink);
      margin-bottom: var(--s-lg);
    }

    .chapter-header h2 {
      font-size: 1.4rem;
      border: none;
      margin: 0;
      padding: 0;
    }

    .chapter-meta {
      font-family: var(--font-display);
      font-size: 0.78rem;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .chapter-progress {
      margin-bottom: var(--s-lg);
    }

    .chapter-progress-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-display);
      font-size: 0.75rem;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }

    /* ── Quest rows ───────────────────────────────────────── */

    .quest {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 0 var(--s-md);
      padding: var(--s-md) var(--s-sm);
      border-radius: var(--radius-lg);
      margin: 0 calc(-1 * var(--s-sm));
      transition: background var(--transition);
      cursor: pointer;
      position: relative;
    }

    .quest:hover { background: var(--bg-recessed); }

    .quest + .quest {
      border-top: 1px solid var(--bg-recessed);
    }

    .quest.completed { opacity: 0.55; }
    .quest.completed:hover { opacity: 0.75; }

    /* Connector line between quests */
    .quest::before {
      content: '';
      position: absolute;
      left: calc(var(--s-sm) + 19px);
      top: -1px;
      width: 2px;
      height: calc(var(--s-md) + 1px);
      background: var(--border);
    }

    .quest:first-child::before { display: none; }
    .quest.completed::before { background: var(--prof-strong); }

    /* Quest icon */
    .quest-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--ink-muted);
      background: var(--bg-surface);
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    .quest.completed .quest-icon {
      border-color: var(--prof-strong);
      background: var(--prof-strong-bg);
      color: var(--prof-strong);
    }

    .quest.active .quest-icon {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .quest-body { min-width: 0; }

    .quest-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.92rem;
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .quest.completed .quest-title {
      text-decoration: line-through;
      text-decoration-color: var(--ink-muted);
    }

    .quest-desc {
      font-size: 0.82rem;
      color: var(--ink-secondary);
      line-height: 1.5;
      margin-bottom: var(--s-sm);
    }

    /* ── Resource tags ────────────────────────────────────── */

    .quest-resources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .resource-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: var(--radius);
      text-decoration: none;
      transition: opacity var(--transition);
    }

    .resource-tag:hover { opacity: 0.8; }

    .resource-tag.jeremy {
      background: #DBEAFE;
      color: #1D4ED8;
    }

    .resource-tag.packet-tracer {
      background: #D1FAE5;
      color: #047857;
    }

    .resource-tag.boson {
      background: #FDE68A;
      color: #92400E;
    }

    .resource-tag.visual {
      background: #F5F3FF;
      color: #7C3AED;
    }

    .resource-tag.quiz {
      background: var(--accent-light);
      color: var(--accent);
    }

    .resource-tag.lab {
      background: #FCE7F3;
      color: #BE185D;
    }

    /* ── XP reward badge on quest ─────────────────────────── */

    .quest-xp {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    .quest-header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--s-sm);
    }

    /* ── Side quest (bonus) styling ───────────────────────── */

    .side-quest {
      border-left: 2px dashed var(--border);
      margin-left: calc(var(--s-sm) + 18px);
      padding-left: var(--s-lg);
      margin-top: var(--s-sm);
      margin-bottom: var(--s-sm);
    }

    .side-quest .quest {
      grid-template-columns: 28px 1fr;
    }

    .side-quest .quest::before { display: none; }

    .side-quest .quest-icon {
      width: 26px;
      height: 26px;
      font-size: 0.65rem;
      border-style: dashed;
    }

    .side-quest-label {
      font-family: var(--font-display);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      margin-bottom: var(--s-xs);
    }

    /* ── Boss fight (exam sim) ────────────────────────────── */

    .boss-fight {
      background: var(--bg-surface);
      border: 2px solid var(--ink);
      border-radius: var(--radius-lg);
      padding: var(--s-lg);
      margin: var(--s-xl) 0;
    }

    .boss-fight .boss-label {
      font-family: var(--font-display);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--prof-weak);
      font-weight: 700;
      margin-bottom: var(--s-xs);
    }

    .boss-fight h3 {
      font-size: 1.2rem;
      margin-bottom: var(--s-sm);
    }

    .boss-fight .boss-desc {
      font-size: 0.88rem;
      color: var(--ink-secondary);
      margin-bottom: var(--s-md);
    }

    .boss-fight .boss-reward {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Legend ────────────────────────────────────────────── */

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s-md);
      padding: var(--s-md) 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      margin-bottom: var(--s-xl);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-display);
      font-size: 0.75rem;
      color: var(--ink-secondary);
    }

    /* ── Footer ───────────────────────────────────────────── */

    .footer {
      margin-top: var(--s-3xl);
      padding: var(--s-lg) 0;
      border-top: 1px solid var(--rule);
      font-family: var(--font-display);
      font-size: 0.75rem;
      color: var(--ink-muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--s-sm);
    }

    .footer button {
      background: none; border: none; cursor: pointer;
      font: inherit; color: var(--accent);
      text-decoration: underline; text-underline-offset: 2px;
    }

    @media (max-width: 600px) {
      .masthead h1 { font-size: 2rem; }
      .player-bar { gap: var(--s-lg); }
      .quest { grid-template-columns: 32px 1fr; }
      .chapter-header { flex-direction: column; gap: var(--s-xs); }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="top-nav"></nav>
    <script src="js/nav.js?v=3"></script>

    <header class="masthead">
      <h1>Quest Map</h1>
      <div class="masthead-sub">Complete quests to level up. Each quest cross-references videos, labs, and practice exams.</div>
    </header>

    <div id="app">
      <p style="color:var(--ink-muted);font-style:italic;">Loading quest data...</p>
    </div>

    <footer class="footer">
      <span>CCNA 200-301 Quest System</span>
      <button onclick="resetProgress()">Reset progress</button>
    </footer>
  </div>

  <script src="./data/topics-data.js"></script>
  <script>
    // ═══════════════════════════════════════════════════════════════
    //  QUEST DATA — cross-references Jeremy's IT Lab, Packet Tracer, Boson
    // ═══════════════════════════════════════════════════════════════

    const RANKS = [
      { name: 'Recruit', min: 0, cls: 'recruit' },
      { name: 'Technician', min: 200, cls: 'technician' },
      { name: 'Specialist', min: 500, cls: 'specialist' },
      { name: 'Engineer', min: 800, cls: 'engineer' },
      { name: 'Architect', min: 1100, cls: 'architect' },
    ];

    const MAX_XP = 1400;

    // Jeremy's IT Lab free course — video numbers map to playlist order
    // https://www.youtube.com/playlist?list=PLxbwE86jKRgMpuZuLBivzlM8s2Dk5lXBQ
    const JIT = 'https://www.youtube.com/playlist?list=PLxbwE86jKRgMpuZuLBivzlM8s2Dk5lXBQ';

    // Each quest: id, title, desc, xp, topicIds (links to topics-data.js), resources[]
    // resource types: jeremy (video#), pt (Packet Tracer lab), boson (Boson domain), visual (local), quiz (local), lab (local)
    const QUESTS = [
      // ── CHAPTER 1: Network Fundamentals ────────────────────
      {
        chapter: '1', chapterName: 'Network Fundamentals', weight: 20, quests: [
          {
            id: 'q1.1', title: 'The Network Map', desc: 'Learn the role of every device on the network — routers, switches, firewalls, APs, controllers, endpoints.',
            xp: 30, topicIds: ['1.1'],
            resources: [
              { type: 'jeremy', label: 'JIT #1-3', tip: 'Network Devices, Interfaces, OSI Model' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Build a basic topology: router + switch + 4 PCs. Ping between them.' },
            ]
          },
          {
            id: 'q1.2', title: 'Topology Architect', desc: 'Compare two-tier, three-tier, spine-leaf, WAN, and SOHO architectures.',
            xp: 25, topicIds: ['1.2'],
            resources: [
              { type: 'jeremy', label: 'JIT #4-5', tip: 'Network Topologies, OSI Model deep dive' },
            ]
          },
          {
            id: 'q1.3', title: 'Cable Runner', desc: 'Identify single-mode fiber, multimode fiber, copper, and Ethernet connection types.',
            xp: 20, topicIds: ['1.3', '1.4'],
            resources: [
              { type: 'jeremy', label: 'JIT #6-7', tip: 'Cables & Connections, Interface Errors' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Connect devices with correct cable types. Introduce duplex mismatch and fix it.' },
            ]
          },
          {
            id: 'q1.4', title: 'Protocol Duel: TCP vs UDP', desc: 'Compare TCP and UDP — reliability, speed, use cases, handshakes.',
            xp: 20, topicIds: ['1.5'],
            resources: [
              { type: 'jeremy', label: 'JIT #8-9', tip: 'TCP/IP Suite, TCP vs UDP' },
              { type: 'quiz', label: 'Quiz: TCP vs UDP', tip: 'quiz.html?mode=domain&domain=1' },
            ]
          },
          {
            id: 'q1.5', title: 'Subnet Slayer', desc: 'Master IPv4 addressing, subnetting, CIDR, and private address ranges. This is the most tested skill.',
            xp: 50, topicIds: ['1.6', '1.7'],
            resources: [
              { type: 'jeremy', label: 'JIT #10-14', tip: 'IPv4 Addressing, Subnetting (5 videos)' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Subnet a /24 into 4 subnets. Assign IPs, verify with ping.' },
              { type: 'visual', label: 'Subnetting Tool', tip: 'visuals/subnetting.html' },
            ],
            boss: false,
            critical: true,
          },
          {
            id: 'q1.6', title: 'IPv6 Awakening', desc: 'Address types, GUA, link-local, EUI-64, SLAAC, NDP. The future of networking.',
            xp: 40, topicIds: ['1.8', '1.9'],
            resources: [
              { type: 'jeremy', label: 'JIT #31-33', tip: 'IPv6 Addressing, IPv6 Configuration, NDP' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Configure IPv6 GUA + link-local on 3 routers. Verify with show ipv6 interface.', href: 'labs/lab-pt3-inter-vlan-routing.html' },
              { type: 'visual', label: 'IPv6 Visualizer', tip: 'visuals/ipv6.html' },
            ]
          },
          {
            id: 'q1.7', title: 'OS Detective', desc: 'Verify IP parameters on Windows, Mac, and Linux. Know which command does what.',
            xp: 15, topicIds: ['1.10'],
            resources: [
              { type: 'jeremy', label: 'JIT #15', tip: 'IP Verification Commands' },
            ]
          },
          {
            id: 'q1.8', title: 'Wireless Scout', desc: 'Wireless principles — RF, channels, SSID, encryption basics.',
            xp: 20, topicIds: ['1.11'],
            resources: [
              { type: 'jeremy', label: 'JIT #55', tip: 'Wireless Fundamentals' },
            ]
          },
          {
            id: 'q1.9', title: 'Virtual Realm', desc: 'Server virtualization, containers, and VRFs — the abstraction layer.',
            xp: 20, topicIds: ['1.12'],
            resources: [
              { type: 'jeremy', label: 'JIT #53', tip: 'Virtualization & Cloud' },
            ]
          },
          {
            id: 'q1.10', title: 'Switch Whisperer', desc: 'MAC learning, aging, frame switching, flooding, and the MAC address table.',
            xp: 25, topicIds: ['1.13'],
            resources: [
              { type: 'jeremy', label: 'JIT #16', tip: 'Switching Fundamentals' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Watch MAC table populate: show mac address-table. Clear and re-learn.' },
            ]
          },
        ]
      },

      // ── CHAPTER 2: Network Access ──────────────────────────
      {
        chapter: '2', chapterName: 'Network Access', weight: 20, quests: [
          {
            id: 'q2.1', title: 'VLAN Kingdom', desc: 'Create VLANs, assign access ports, verify with show vlan brief. Segment the network.',
            xp: 35, topicIds: ['2.1'],
            resources: [
              { type: 'jeremy', label: 'JIT #17-18', tip: 'VLANs Part 1 & 2' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Create 3 VLANs on 2 switches. Assign ports. Verify isolation.', href: 'labs/lab-pt1-vlan.html' },
              { type: 'visual', label: 'VLAN Visualizer', tip: 'visuals/vlan.html' },
            ]
          },
          {
            id: 'q2.2', title: 'Trunk Road', desc: '802.1Q trunking, native VLAN, DTP negotiation. Connect switches properly.',
            xp: 35, topicIds: ['2.2'],
            resources: [
              { type: 'jeremy', label: 'JIT #19', tip: 'Trunking (802.1Q)' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Configure trunks between 3 switches. Set native VLAN. Disable DTP.', href: 'labs/lab-pt1-vlan.html' },
              { type: 'visual', label: 'VLAN & Trunking', tip: 'visuals/vlan.html' },
            ]
          },
          {
            id: 'q2.3', title: 'Discovery Protocols', desc: 'CDP and LLDP — find neighbors automatically.',
            xp: 15, topicIds: ['2.3'],
            resources: [
              { type: 'jeremy', label: 'JIT #20', tip: 'CDP & LLDP' },
              { type: 'pt', label: 'Packet Tracer', tip: 'show cdp neighbors detail. Compare with show lldp neighbors.' },
            ]
          },
          {
            id: 'q2.4', title: 'Channel Fusion', desc: 'EtherChannel with LACP — bundle links for bandwidth and redundancy.',
            xp: 30, topicIds: ['2.4'],
            resources: [
              { type: 'jeremy', label: 'JIT #22', tip: 'EtherChannel' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Create L2 EtherChannel with LACP between 2 switches. Verify with show etherchannel summary.', href: 'labs/lab-pt2-stp-etherchannel.html' },
            ]
          },
          {
            id: 'q2.5', title: 'Spanning Tree Guardian', desc: 'Rapid PVST+ — root bridge election, port states, PortFast, BPDU Guard. Critical exam topic.',
            xp: 45, topicIds: ['2.5'],
            critical: true,
            resources: [
              { type: 'jeremy', label: 'JIT #21', tip: 'Spanning Tree Protocol' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Build 4-switch ring. Identify root bridge. Observe blocking ports. Enable PortFast on access ports.', href: 'labs/lab-pt2-stp-etherchannel.html' },
              { type: 'visual', label: 'STP State Machine', tip: 'visuals/stp.html' },
            ]
          },
          {
            id: 'q2.6', title: 'Wireless Architect', desc: 'Cisco wireless architectures, AP modes — local, FlexConnect, monitor, sniffer.',
            xp: 30, topicIds: ['2.6', '2.7', '2.8'],
            resources: [
              { type: 'jeremy', label: 'JIT #56-57', tip: 'Wireless Architectures, WLC Configuration' },
            ]
          },
          {
            id: 'q2.7', title: 'WLAN Commander', desc: 'Configure WLANs via WLC GUI — security, QoS profiles, client connectivity.',
            xp: 25, topicIds: ['2.9'],
            resources: [
              { type: 'jeremy', label: 'JIT #58', tip: 'Wireless Security & Configuration' },
              { type: 'quiz', label: 'Quiz: Network Access', tip: 'quiz.html?mode=domain&domain=2' },
            ]
          },
        ]
      },

      // ── CHAPTER 3: IP Connectivity ─────────────────────────
      {
        chapter: '3', chapterName: 'IP Connectivity', weight: 25, quests: [
          {
            id: 'q3.1', title: 'Route Reader', desc: 'Interpret the routing table — protocol codes, prefix, mask, next hop, AD, metric, gateway of last resort.',
            xp: 35, topicIds: ['3.1', '3.2'],
            resources: [
              { type: 'jeremy', label: 'JIT #23-24', tip: 'Routing Fundamentals, Static Routing' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Build 3-router chain. Add static routes. Read show ip route output.' },
            ]
          },
          {
            id: 'q3.2', title: 'Static Pathfinder', desc: 'Configure IPv4 and IPv6 static routes — default, network, host, floating static.',
            xp: 35, topicIds: ['3.3'],
            resources: [
              { type: 'jeremy', label: 'JIT #25-26', tip: 'Static Routes, Default Routes' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Configure default route, network routes, and a floating static (AD 200). Verify failover.' },
            ]
          },
          {
            id: 'q3.3', title: 'OSPF Champion', desc: 'Single-area OSPFv2 — neighbor adjacencies, point-to-point, broadcast, DR/BDR, Router ID. Heaviest exam topic.',
            xp: 60, topicIds: ['3.4'],
            critical: true,
            resources: [
              { type: 'jeremy', label: 'JIT #27-29', tip: 'OSPF Part 1, 2, 3 (neighbor states, DR/BDR, config)' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Build 5-router OSPF area 0. Set router-id. Observe DR/BDR. Verify with show ip ospf neighbor.', href: 'labs/lab-pt4-ospf.html' },
              { type: 'visual', label: 'OSPF Visualizer', tip: 'visuals/ospf.html' },
              { type: 'lab', label: 'Lab: Campus Build', tip: 'labs/lab1-campus-build.html' },
            ]
          },
          {
            id: 'q3.4', title: 'Redundancy Shield', desc: 'FHRP concepts — HSRP, VRRP, GLBP. Default gateway redundancy.',
            xp: 25, topicIds: ['3.5'],
            resources: [
              { type: 'jeremy', label: 'JIT #30', tip: 'First Hop Redundancy (HSRP)' },
              { type: 'pt', label: 'Packet Tracer', tip: 'Configure HSRP on 2 routers. Verify with show standby. Simulate failover.' },
            ]
          },
        ]
      },

      // ── CHAPTER 4: IP Services ─────────────────────────────

    // ═══════════════════════════════════════════════════════════════
    //  STATE — localStorage persistence
    // ═══════════════════════════════════════════════════════════════

    const STORE_KEY = 'ccna-quests';

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORE_KEY)) || {};
      } catch { return {}; }
    }

    function saveState(state) {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function toggleQuest(questId) {
      const state = loadState();
      if (state[questId]) {
        delete state[questId];
      } else {
        state[questId] = Date.now();
      }
      saveState(state);
      render();
    }

    function resetProgress() {
      if (confirm('Reset all quest progress? This cannot be undone.')) {
        localStorage.removeItem(STORE_KEY);
        render();
      }
    }

    // ═══════════════════════════════════════════════════════════════
    //  COMPUTED
    // ═══════════════════════════════════════════════════════════════

    function getAllQuests() {
      const all = [];
      for (const ch of QUESTS) {
        for (const q of ch.quests) all.push(q);
      }
      return all;
    }

    function computeStats(state) {
      const all = getAllQuests();
      const completed = all.filter(q => state[q.id]);
      const totalXP = completed.reduce((sum, q) => sum + q.xp, 0);
      const maxXP = all.reduce((sum, q) => sum + q.xp, 0);
      const rank = [...RANKS].reverse().find(r => totalXP >= r.min) || RANKS[0];
      const nextRank = RANKS[RANKS.indexOf(rank) + 1] || null;
      return { completed: completed.length, total: all.length, totalXP, maxXP, rank, nextRank };
    }

    function findActiveQuest(state) {
      for (const ch of QUESTS) {
        for (const q of ch.quests) {
          if (!state[q.id]) return q.id;
        }
      }
      return null;
    }

    // ═══════════════════════════════════════════════════════════════
    //  RENDER
    // ═══════════════════════════════════════════════════════════════

    function resourceHTML(r) {
      let href = '#';
      if (r.type === 'jeremy') href = JIT;
      else if (r.type === 'visual' || r.type === 'lab' || r.type === 'quiz') href = r.tip;

      const tag = r.type === 'pt'
        ? (r.href
            ? `<a href="${r.href}" class="resource-tag packet-tracer" title="${r.tip}">${r.label}</a>`
            : `<span class="resource-tag packet-tracer" title="${r.tip}">${r.label}</span>`)
        : r.type === 'boson'
          ? `<span class="resource-tag boson" title="${r.tip}">${r.label}</span>`
          : `<a href="${href}" class="resource-tag ${r.type}" title="${r.tip}" target="_blank" rel="noopener">${r.label}</a>`;
      return tag;
    }

    function renderPlayerBar(stats) {
      const { totalXP, maxXP, completed, total, rank, nextRank } = stats;
      const pct = Math.round((totalXP / maxXP) * 100);
      const xpToNext = nextRank ? nextRank.min - totalXP : 0;

      return `
        <div class="player-bar">
          <div class="player-stat">
            <div class="val rank-title ${rank.cls}">${rank.name}</div>
            <div class="lbl">Rank</div>
          </div>
          <div class="player-stat">
            <div class="val">${totalXP}</div>
            <div class="lbl">XP earned</div>
          </div>
          <div class="player-stat">
            <div class="val">${completed}/${total}</div>
            <div class="lbl">Quests</div>
          </div>
          <div class="xp-bar-wrap">
            <div class="xp-bar-label">
              <span>${nextRank ? `${xpToNext} XP to ${nextRank.name}` : 'Max rank reached'}</span>
              <span>${pct}%</span>
            </div>
            <div class="xp-bar"><div class="fill" style="width:${pct}%"></div></div>
          </div>
        </div>
      `;
    }

    function renderLegend() {
      return `
        <div class="legend">
          <div class="legend-item"><span class="resource-tag jeremy" style="margin:0">Jeremy's IT Lab</span> Free video course</div>
          <div class="legend-item"><span class="resource-tag packet-tracer" style="margin:0">Packet Tracer</span> Hands-on CLI lab</div>
          <div class="legend-item"><span class="resource-tag boson" style="margin:0">Boson ExSim</span> Exam-level practice</div>
          <div class="legend-item"><span class="resource-tag visual" style="margin:0">Visual Tool</span> Interactive visualizer</div>
          <div class="legend-item"><span class="resource-tag quiz" style="margin:0">Quiz</span> Built-in quiz</div>
          <div class="legend-item"><span class="resource-tag lab" style="margin:0">Lab</span> Guided lab exercise</div>
        </div>
      `;
    }

    function renderChapter(ch, state, activeId) {
      const completed = ch.quests.filter(q => state[q.id]).length;
      const total = ch.quests.length;
      const pct = Math.round((completed / total) * 100);
      const color = pct >= 80 ? 'green' : pct >= 40 ? 'yellow' : 'red';

      let html = `
        <div class="chapter">
          <div class="chapter-header">
            <h2>Chapter ${ch.chapter}: ${ch.chapterName}</h2>
            <div class="chapter-meta">${ch.weight}% of exam &middot; ${completed}/${total} quests</div>
          </div>
          <div class="chapter-progress">
            <div class="chapter-progress-label">
              <span>Progress</span>
              <span>${pct}%</span>
            </div>
            <div class="progress-bar"><div class="fill ${color}" style="width:${pct}%"></div></div>
          </div>
      `;

      for (const q of ch.quests) {
        const done = !!state[q.id];
        const isActive = q.id === activeId;
        const cls = done ? 'completed' : isActive ? 'active' : '';

        html += `
          <div class="quest ${cls}" onclick="toggleQuest('${q.id}')">
            <div class="quest-icon">${done ? '\u2713' : q.critical ? '!' : '\u25CB'}</div>
            <div class="quest-body">
              <div class="quest-header-row">
                <div class="quest-title">${q.title}${q.critical ? ' <span class="badge badge-red" style="margin-left:6px;font-size:0.6rem">CRITICAL</span>' : ''}</div>
                <div class="quest-xp">+${q.xp} XP</div>
              </div>
              <div class="quest-desc">${q.desc}</div>
              <div class="quest-resources">
                ${q.resources.map(resourceHTML).join('')}
              </div>
            </div>
          </div>
        `;
      }

      html += '</div>';
      return html;
    }

    function renderBossFights(state) {
      const bosses = [
        {
          id: 'boss-midterm', title: 'Midterm Exam Simulation', desc: 'Domains 1-3 (Network Fundamentals, Network Access, IP Connectivity). 60 questions, 70 minutes. Minimum 80% to pass.',
          xp: 75, prereq: 'Complete all Chapter 1-3 quests',
          link: 'quiz.html?mode=exam',
        },
        {
          id: 'boss-final', title: 'Final Exam Simulation', desc: 'All 6 domains. 102 questions, 120 minutes. Real exam conditions. Minimum 82.5% to pass.',
          xp: 100, prereq: 'Complete all quests across all chapters',
          link: 'quiz.html?mode=exam',
        },
        {
          id: 'boss-boson', title: 'Boson ExSim Challenge', desc: 'Take a full Boson ExSim-Max practice exam. Score 850+ to clear. This is the final gate before scheduling your real exam.',
          xp: 100, prereq: 'Pass Final Exam Simulation. Purchase Boson ExSim-Max ($99).',
          link: 'https://boson.com/product/exsim-max-for-cisco-200-301-ccna/',
        },
      ];

      let html = `<h2 style="border-bottom:2px solid var(--prof-weak);padding-bottom:var(--s-sm);">Boss Fights</h2>`;

      for (const b of bosses) {
        const done = !!state[b.id];
        html += `
          <div class="boss-fight ${done ? 'completed' : ''}" style="${done ? 'opacity:0.5;border-color:var(--prof-strong);' : ''}" onclick="toggleQuest('${b.id}')">
            <div class="boss-label">${done ? 'DEFEATED' : 'BOSS FIGHT'}</div>
            <h3>${b.title}</h3>
            <div class="boss-desc">${b.desc}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--s-sm);">
              <div style="font-size:0.78rem;color:var(--ink-muted);">Prereq: ${b.prereq}</div>
              <div class="boss-reward">+${b.xp} XP</div>
            </div>
            <div style="margin-top:var(--s-sm);">
              <a href="${b.link}" class="resource-tag boson" target="_blank" rel="noopener" onclick="event.stopPropagation()">Start challenge</a>
            </div>
          </div>
        `;
      }

      return html;
    }

    function render() {
      const state = loadState();
      const stats = computeStats(state);
      const activeId = findActiveQuest(state);
      const app = document.getElementById('app');

      let html = '';
      html += renderPlayerBar(stats);
      html += renderLegend();

      for (const ch of QUESTS) {
        html += renderChapter(ch, state, activeId);
      }

      html += renderBossFights(state);
      app.innerHTML = html;
    }

    // ═══════════════════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════════════════
    render();
  </script>
