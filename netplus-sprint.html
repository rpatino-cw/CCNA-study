<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4-Week Net+ Study Plan — Network+ Sprint</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/netplus.css">
<style>
/* ═══════════════════════════════════════════════════════════════
   Net+ 4-Week Sprint — Red accent — uses css/netplus.css
   ═══════════════════════════════════════════════════════════════ */

/* ── Start date picker ───────────────────────────────────── */
.start-row{display:flex;align-items:center;gap:14px;margin-bottom:var(--s-lg);flex-wrap:wrap}
.start-label{font-family:var(--font-display);font-size:.78rem;font-weight:700;color:var(--ink-secondary)}
.start-input{font-family:var(--font-mono);font-size:.85rem;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-surface);color:var(--ink)}
.start-input:focus{outline:none;border-color:var(--np)}

/* ── Overall progress ────────────────────────────────────── */
.sprint-progress{margin-bottom:var(--s-xl)}
.sp-label{font-family:var(--font-display);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);margin-bottom:6px}
.sp-row{display:flex;align-items:center;gap:14px}
.sp-pct{font-family:var(--font-display);font-size:1.8rem;font-weight:800;color:var(--np);line-height:1}
.sp-bar{flex:1;height:8px;background:var(--bg-recessed);border-radius:4px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--np),var(--np-light));border-radius:4px;transition:width .5s var(--ease-out)}
.sp-stats{font-family:var(--font-mono);font-size:.75rem;color:var(--ink-muted);margin-top:6px}
.sp-stats strong{color:var(--ink)}

/* ── Week sections ───────────────────────────────────────── */
.week{margin-bottom:var(--s-xl)}
.week-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.week-title{font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--ink)}
.week-title span{color:var(--np)}
.week-focus{font-family:var(--font-display);font-size:.72rem;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.04em}
.week-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.week-bar{flex:1;height:5px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
.week-fill{height:100%;background:var(--np);border-radius:3px;transition:width .4s var(--ease-out)}
.week-pct{font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted);min-width:28px;text-align:right}
.week-dates{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted)}

/* ── Day cards ───────────────────────────────────────────── */
.days{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.day{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;transition:border-color .15s,background .15s;position:relative}
.day:hover{border-color:var(--border-strong)}
.day.today{border-color:var(--np);background:rgba(var(--np-rgb),.03)}
.day.today::before{content:'TODAY';position:absolute;top:8px;right:10px;font-family:var(--font-mono);font-size:.58rem;font-weight:800;color:var(--np);letter-spacing:.08em}
.day.completed{opacity:.65}
.day.completed .day-topic{text-decoration:line-through;color:var(--ink-muted)}
.day-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.day-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border-strong);cursor:pointer;appearance:none;-webkit-appearance:none;flex-shrink:0;transition:all .15s}
.day-check:checked{background:var(--np);border-color:var(--np)}
.day-check:checked::after{content:'';position:absolute;top:2px;left:5px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);position:relative;display:block}
.day-label{font-family:var(--font-display);font-size:.72rem;font-weight:700;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.04em}
.day-date{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted);margin-left:auto}
.day-topic{font-family:var(--font-display);font-size:.88rem;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.3}
.day-details{font-family:var(--font-body);font-size:.82rem;color:var(--ink-secondary);line-height:1.5;margin-bottom:8px}
.day-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.day-time{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted);display:flex;align-items:center;gap:4px}
.day-link{font-family:var(--font-display);font-size:.68rem;font-weight:600;color:var(--np);text-decoration:none;padding:3px 8px;border:1px solid rgba(var(--np-rgb),.2);border-radius:3px;transition:all .15s}
.day-link:hover{background:rgba(var(--np-rgb),.08);border-color:var(--np)}

@media(max-width:600px){
  .days{grid-template-columns:1fr}
  .start-row{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="container">
  <nav class="top-nav"></nav>

  <header class="page-header">
    <h1>4-Week Net+ Sprint</h1>
    <p class="subtitle">28-day study plan mapped to all 5 N10-009 domains</p>
  </header>

  <!-- Start date -->
  <div class="start-row">
    <span class="start-label">Start Date</span>
    <input type="date" class="start-input" id="startDate">
  </div>

  <!-- Overall progress -->
  <div class="sprint-progress">
    <div class="sp-label">Sprint Progress</div>
    <div class="sp-row">
      <span class="sp-pct" id="spPct">0%</span>
      <div class="sp-bar"><div class="sp-fill" id="spFill" style="width:0%"></div></div>
    </div>
    <div class="sp-stats" id="spStats"></div>
  </div>

  <div id="weeksContainer"></div>
</div>

<script src="js/nav.js"></script>
<script src="js/tutor.js"></script>
<script src="js/group-chat.js"></script>
<script>
(function(){
  var WEEKS = [
    { title:'Foundations', focus:'Domains 1.0 + parts of 2.0', days:[
      {topic:'OSI Model & TCP/IP',details:'All 7 OSI layers, TCP/IP model comparison, encapsulation/decapsulation, PDUs at each layer',time:'1.5 hrs',links:[{text:'OSI Interactive',href:'netplus-osi.html'}]},
      {topic:'Ports & Protocols',details:'TCP vs UDP, well-known ports (21, 22, 23, 25, 53, 67/68, 80, 110, 143, 443, 3389), protocol functions',time:'1.5 hrs',links:[{text:'Glossary',href:'netplus-glossary.html'}]},
      {topic:'Cabling & Connectors',details:'UTP categories (Cat5e/6/6a/8), fiber types (SMF/MMF), connectors (RJ-45, LC, SC, ST), T568A/B pinouts',time:'1.5 hrs',links:[]},
      {topic:'Network Devices & Topologies',details:'Routers, switches, APs, firewalls, load balancers. Star, mesh, bus, ring, hybrid topologies. LAN, WAN, MAN, PAN',time:'1.5 hrs',links:[{text:'Topology Explorer',href:'netplus-topology.html'}]},
      {topic:'IPv4 Addressing & Subnetting',details:'Network/host portions, CIDR notation, subnet masks, calculating subnets, private ranges (10.x, 172.16-31.x, 192.168.x)',time:'2 hrs',links:[{text:'IP Address Game',href:'netplus-ip-game.html'}]},
      {topic:'IPv6 & Cloud Concepts',details:'IPv6 address format, link-local, global unicast, SLAAC, NDP. IaaS, PaaS, SaaS, hybrid/public/private cloud',time:'1.5 hrs',links:[]},
      {topic:'Week 1 Review + Practice Quiz',details:'Review OSI, ports, cabling, topologies, addressing. Take practice quiz covering all week 1 material',time:'2 hrs',links:[{text:'Exam Sim',href:'netplus-exam.html'}]}
    ]},
    { title:'Implementation', focus:'Domains 2.0 + 3.0', days:[
      {topic:'Routing Fundamentals',details:'Static vs dynamic routing, distance-vector vs link-state, administrative distance, routing tables',time:'1.5 hrs',links:[{text:'Routing Protocols',href:'netplus-routing.html'}]},
      {topic:'Routing Protocols Deep Dive',details:'RIP (v1/v2), OSPF areas and costs, EIGRP metrics, BGP basics (eBGP/iBGP), route summarization',time:'2 hrs',links:[{text:'Routing Protocols',href:'netplus-routing.html'}]},
      {topic:'Switching & VLANs',details:'VLANs, 802.1Q trunking, native VLANs, STP (802.1D), RSTP, port states, EtherChannel (LACP/PAgP)',time:'2 hrs',links:[]},
      {topic:'Wireless Standards',details:'802.11a/b/g/n/ac/ax (Wi-Fi 6/6E), frequencies (2.4/5/6 GHz), channels, SSID, encryption (WPA2/WPA3)',time:'1.5 hrs',links:[{text:'Wireless Standards',href:'netplus-wireless.html'}]},
      {topic:'WAN Technologies',details:'MPLS, SD-WAN, DSL, cable, fiber, satellite, cellular (4G/5G), DMVPN, site-to-site VPNs, Metro Ethernet',time:'1.5 hrs',links:[]},
      {topic:'Network Operations',details:'Documentation (diagrams, baselines, policies), change management, incident response, SNMP, syslog, NTP',time:'1.5 hrs',links:[]},
      {topic:'Week 2 Review + Practice Quiz',details:'Review routing, switching, wireless, WAN, operations. Take practice quiz covering all week 2 material',time:'2 hrs',links:[{text:'Exam Sim',href:'netplus-exam.html'}]}
    ]},
    { title:'Security + Troubleshooting', focus:'Domains 4.0 + 5.0', days:[
      {topic:'Security Concepts',details:'CIA triad, AAA, zero trust, defense in depth, least privilege, role-based access, security policies',time:'1.5 hrs',links:[]},
      {topic:'Attack Types',details:'DoS/DDoS, MITM, ARP spoofing, DNS poisoning, phishing, social engineering, brute force, VLAN hopping, evil twin',time:'2 hrs',links:[]},
      {topic:'Network Hardening',details:'Firewalls (stateful/stateless), ACLs, IDS/IPS, port security, 802.1X, DHCP snooping, DAI, disabling unused ports',time:'1.5 hrs',links:[]},
      {topic:'Remote Access & Physical Security',details:'VPN types (IPSec, SSL/TLS, split tunnel), RDP, SSH, Telnet risks, access control vestibules, cameras, locks',time:'1.5 hrs',links:[]},
      {topic:'Troubleshooting Methodology',details:'CompTIA 7-step: identify, theory, test, plan, implement, verify, document. Top-down, bottom-up, divide-and-conquer',time:'1.5 hrs',links:[]},
      {topic:'Troubleshooting Tools & Scenarios',details:'ping, traceroute, nslookup/dig, ipconfig/ifconfig, netstat, nmap, Wireshark, cable testers, OTDR, Wi-Fi analyzers',time:'2 hrs',links:[]},
      {topic:'Week 3 Review + Practice Quiz',details:'Review security concepts, attacks, hardening, troubleshooting methodology and tools',time:'2 hrs',links:[{text:'Exam Sim',href:'netplus-exam.html'}]}
    ]},
    { title:'Review + Exam Prep', focus:'All Domains', days:[
      {topic:'Full Practice Exam #1',details:'Take a full 90-question practice exam. Time yourself (90 minutes). Review every wrong answer carefully',time:'2.5 hrs',links:[{text:'Exam Sim',href:'netplus-exam.html'}]},
      {topic:'Review Weak Areas',details:'Based on practice exam results, revisit your weakest domain. Re-read notes, watch targeted videos',time:'2 hrs',links:[{text:'Objectives',href:'netplus-objectives.html'}]},
      {topic:'PBQ Practice',details:'Performance-based question practice: subnetting scenarios, topology diagrams, firewall rule configuration, cable selection',time:'2 hrs',links:[]},
      {topic:'Port Number & Protocol Drill',details:'Memorize all key ports. Flash drill: port number to protocol and protocol to port. Include TCP/UDP distinction',time:'1.5 hrs',links:[{text:'Glossary',href:'netplus-glossary.html'}]},
      {topic:'Subnetting Speed Drill + Wireless',details:'Rapid subnetting problems (under 30 seconds each). Review wireless channel planning, interference, security',time:'1.5 hrs',links:[{text:'IP Game',href:'netplus-ip-game.html'},{text:'Wireless',href:'netplus-wireless.html'}]},
      {topic:'Final Practice Exam',details:'Full 90-question practice exam under timed conditions. Target: 80%+ before sitting for the real exam',time:'2.5 hrs',links:[{text:'Exam Sim',href:'netplus-exam.html'}]},
      {topic:'Light Review & Rest',details:'Skim your notes one final time. Review flagged items only. Get a good night of sleep. You are ready',time:'1 hr',links:[]}
    ]}
  ];

  var STORE_KEY = 'np_sprint_checks';
  var DATE_KEY = 'np_sprint_start';
  var completed = JSON.parse(localStorage.getItem(STORE_KEY)||'{}');

  // Start date
  var dateInput = document.getElementById('startDate');
  var savedDate = localStorage.getItem(DATE_KEY);
  if(savedDate){
    dateInput.value = savedDate;
  } else {
    var today = new Date();
    dateInput.value = today.toISOString().split('T')[0];
    localStorage.setItem(DATE_KEY, dateInput.value);
  }
  dateInput.addEventListener('change', function(){
    localStorage.setItem(DATE_KEY, dateInput.value);
    render();
  });

  function getStartDate(){
    return new Date(dateInput.value+'T00:00:00');
  }

  function formatDate(d){
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()]+' '+d.getDate();
  }

  function isToday(d){
    var t = new Date();
    return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
  }

  function render(){
    var container = document.getElementById('weeksContainer');
    container.innerHTML = '';
    var start = getStartDate();
    var dayIndex = 0;
    var totalDays = 28;
    var completedCount = 0;

    WEEKS.forEach(function(week, wi){
      var weekDiv = document.createElement('div');
      weekDiv.className = 'week';

      var weekStart = new Date(start);
      weekStart.setDate(weekStart.getDate() + wi*7);
      var weekEnd = new Date(weekStart);
      weekEnd.setDate(weekEnd.getDate()+6);

      var weekCompleted = 0;
      week.days.forEach(function(_,di){
        var key = 'w'+wi+'d'+di;
        if(completed[key]) weekCompleted++;
      });
      completedCount += weekCompleted;
      var weekPct = Math.round(weekCompleted/week.days.length*100);

      weekDiv.innerHTML =
        '<div class="week-header">'+
          '<div class="week-title"><span>Week '+(wi+1)+'</span> — '+week.title+'</div>'+
          '<span class="week-focus">'+week.focus+'</span>'+
        '</div>'+
        '<div class="week-dates">'+formatDate(weekStart)+' — '+formatDate(weekEnd)+'</div>'+
        '<div class="week-bar-row">'+
          '<div class="week-bar"><div class="week-fill" style="width:'+weekPct+'%"></div></div>'+
          '<span class="week-pct">'+weekPct+'%</span>'+
        '</div>'+
        '<div class="days" id="week'+wi+'days"></div>';

      container.appendChild(weekDiv);
      var daysContainer = document.getElementById('week'+wi+'days');

      week.days.forEach(function(day, di){
        var key = 'w'+wi+'d'+di;
        var dayDate = new Date(start);
        dayDate.setDate(dayDate.getDate() + dayIndex);
        var isDone = !!completed[key];
        var isTodayDay = isToday(dayDate);

        var linksHtml = day.links.map(function(l){
          return '<a class="day-link" href="'+l.href+'">'+l.text+'</a>';
        }).join('');

        var card = document.createElement('div');
        card.className = 'day'+(isTodayDay?' today':'')+(isDone?' completed':'');
        card.innerHTML =
          '<div class="day-top">'+
            '<input type="checkbox" class="day-check" data-key="'+key+'"'+(isDone?' checked':'')+'>'+
            '<span class="day-label">Day '+(dayIndex+1)+'</span>'+
            '<span class="day-date">'+formatDate(dayDate)+'</span>'+
          '</div>'+
          '<div class="day-topic">'+day.topic+'</div>'+
          '<div class="day-details">'+day.details+'</div>'+
          '<div class="day-meta">'+
            '<span class="day-time">'+day.time+'</span>'+
            linksHtml+
          '</div>';
        daysContainer.appendChild(card);
        dayIndex++;
      });
    });

    // Overall progress
    var pct = Math.round(completedCount/totalDays*100);
    document.getElementById('spPct').textContent = pct+'%';
    document.getElementById('spFill').style.width = pct+'%';
    document.getElementById('spStats').innerHTML =
      '<strong>'+completedCount+'</strong> of <strong>'+totalDays+'</strong> days completed';
  }

  // Delegate checkbox events
  document.addEventListener('change', function(e){
    if(e.target.classList.contains('day-check')){
      var key = e.target.getAttribute('data-key');
      completed[key] = e.target.checked;
      if(!e.target.checked) delete completed[key];
      localStorage.setItem(STORE_KEY, JSON.stringify(completed));
      render();
    }
  });

  render();
})();
</script>
</body>
</html>
