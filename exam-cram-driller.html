<!DOCTYPE html>
<html lang="en">
<head>

<title>Exam Cram Driller : CCNA 200-301</title>

<style>
  .cd-wrap { max-width: 760px; margin: 0 auto; padding: 0 var(--s-md) var(--s-2xl); }

  /* minimal header */
  .cd-head { text-align: center; padding: var(--s-xl) 0 var(--s-sm); }
  .cd-head h1 { font-family: var(--font-display); font-size: 1.55rem; font-weight: 700; color: var(--ink); margin: 0; letter-spacing: -0.02em; }
  .cd-ready { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-muted); margin-top: 8px; letter-spacing: 0.02em; }
  .cd-ready b { color: var(--prof-strong); font-weight: 700; }
  .cd-ready .due { color: var(--accent); font-weight: 700; }
  .cd-readybar { height: 4px; border-radius: 3px; background: var(--bg-recessed); overflow: hidden; max-width: 280px; margin: 8px auto 0; }
  .cd-readybar > i { display: block; height: 100%; width: 0; background: var(--prof-strong); transition: width 0.4s var(--ease-out); }

  /* scope pills */
  .cd-scope { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: var(--s-md) 0 var(--s-lg); }
  .cd-pill { padding: 5px 12px; border: 1px solid var(--border); border-radius: 18px; background: var(--bg-surface); cursor: pointer; font-family: var(--font-display); font-size: 0.74rem; font-weight: 600; color: var(--ink-secondary); transition: all var(--transition); }
  .cd-pill:hover { border-color: var(--border-strong); }
  .cd-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* drill card */
  #cd-drill { min-height: 50vh; display: flex; flex-direction: column; align-items: center; }
  .cd-card { width: 100%; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--s-xl) var(--s-lg); text-align: center; box-shadow: var(--shadow-md); }
  .cd-chip { display: inline-block; font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 9px; border-radius: 4px; margin-bottom: var(--s-lg); }
  .chip-concept, .chip-num, .chip-pair { background: var(--accent-dim); color: var(--accent); }
  .chip-config, .chip-cmd, .chip-ver { background: var(--prof-strong-bg); color: var(--prof-strong); }
  .chip-trouble, .chip-step { background: var(--prof-weak-bg); color: var(--prof-weak); }
  .chip-tactics, .chip-trap { background: var(--purple-dim); color: var(--purple); }

  .cd-cue { font-family: var(--font-body); font-size: 1.4rem; line-height: 1.45; color: var(--ink); margin: 0 auto var(--s-lg); max-width: 540px; }
  .cd-cue code { font-family: var(--font-mono); font-size: 1.1rem; background: var(--bg-recessed); padding: 2px 8px; border-radius: 4px; }

  .cd-answer { font-size: 1.15rem; line-height: 1.5; color: var(--ink); margin: var(--s-lg) auto 0; max-width: 560px; padding: var(--s-md); background: var(--accent-dim); border: 1px solid var(--accent-light); border-radius: var(--radius-lg); text-align: left; display: none; }
  .cd-answer.show { display: block; animation: cdrise 0.25s var(--ease-out); }
  .cd-answer.mono { font-family: var(--font-mono); font-size: 1rem; white-space: pre-wrap; }
  @keyframes cdrise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .cd-actions { display: flex; gap: var(--s-sm); justify-content: center; margin-top: var(--s-xl); }
  .cd-btn { padding: 12px 26px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-surface); color: var(--ink); cursor: pointer; font-family: var(--font-display); font-size: 0.92rem; font-weight: 600; transition: all var(--transition); }
  .cd-btn:hover { background: var(--bg-hover); }
  .cd-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cd-btn.primary:hover { opacity: 0.92; }
  .cd-btn.miss { border-color: var(--prof-weak); color: var(--prof-weak); }
  .cd-btn.miss:hover { background: var(--prof-weak); color: #fff; }
  .cd-btn.got { border-color: var(--prof-strong); color: var(--prof-strong); }
  .cd-btn.got:hover { background: var(--prof-strong); color: #fff; }
  .cd-btn .k { font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.6; margin-left: 6px; }

  /* number keypad */
  .cd-entry { font-family: var(--font-mono); font-size: 2rem; font-weight: 700; color: var(--accent); margin: var(--s-md) 0; min-height: 2.2rem; letter-spacing: 0.05em; }
  .cd-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 280px; margin: var(--s-lg) auto 0; }
  .cd-key { height: 56px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-surface); font-family: var(--font-mono); font-size: 1.3rem; font-weight: 600; color: var(--ink); cursor: pointer; transition: all var(--transition); }
  .cd-key:hover { background: var(--bg-hover); }
  .cd-key:active { transform: scale(0.96); }
  .cd-key.wide { font-size: 0.9rem; }
  .cd-key.go { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cd-pad .cd-key[data-n='0'] { grid-column: 1; }

  /* option buttons (CLI fill, trap quiz) */
  .cd-opts { display: flex; flex-direction: column; gap: 8px; margin: var(--s-lg) 0 0; }
  .cd-opt { padding: 13px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-surface); color: var(--ink); cursor: pointer; font-family: var(--font-mono); font-size: 0.92rem; text-align: left; transition: all var(--transition); }
  .cd-opt:hover { background: var(--bg-hover); border-color: var(--border-strong); }
  .cd-opt.opt-ok { background: var(--prof-strong-bg); border-color: var(--prof-strong); color: var(--prof-strong); font-weight: 700; }
  .cd-opt.opt-no { background: var(--prof-weak-bg); border-color: var(--prof-weak); color: var(--prof-weak); }

  /* visuals: STP/OSPF node boxes */
  .vis-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: var(--s-lg) 0 0; }
  .vis-node { position: relative; display: flex; flex-direction: column; gap: 3px; min-width: 130px; padding: 16px 14px; border: 2px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-surface); cursor: pointer; transition: all var(--transition); }
  .vis-node:hover { border-color: var(--border-strong); background: var(--bg-hover); }
  .vis-node .vl1 { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; color: var(--ink); }
  .vis-node .vl2 { font-family: var(--font-mono); font-size: 0.78rem; color: var(--ink-secondary); }
  .vis-node.inelig { opacity: 0.5; border-style: dashed; }
  .vis-node.win { border-color: var(--prof-strong); background: var(--prof-strong-bg); }
  .vis-node.win2 { border-color: var(--accent); background: var(--accent-dim); }
  .vis-node.bad { border-color: var(--prof-weak); background: var(--prof-weak-bg); }
  .vis-badge { position: absolute; top: -10px; right: -8px; font-family: var(--font-mono); font-size: 0.6rem; font-weight: 700; color: #fff; background: var(--prof-strong); padding: 2px 6px; border-radius: 4px; }
  .vis-node.win2 .vis-badge { background: var(--accent); }
  .vis-rule { font-size: 0.84rem; color: var(--ink-secondary); margin-top: var(--s-md); min-height: 1rem; line-height: 1.5; }

  /* visuals: ACL rule list */
  .acl-list { margin: var(--s-md) 0 0; text-align: left; }
  .acl-rule { font-family: var(--font-mono); font-size: 0.82rem; color: var(--ink); padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 5px; background: var(--bg-surface); }
  .acl-rule.implicit { color: var(--ink-muted); font-style: italic; border-style: dashed; }
  .acl-rule.hit-ok { background: var(--prof-strong-bg); border-color: var(--prof-strong); color: var(--prof-strong); font-weight: 700; }
  .acl-rule.hit-no { background: var(--prof-weak-bg); border-color: var(--prof-weak); color: var(--prof-weak); font-weight: 700; }

  @media (prefers-reduced-motion: reduce) { .vis-node, .cd-answer, .cd-key { transition: none; } .cd-answer.show { animation: none; } }

  /* CLI sim terminal */
  .cli-ctx { font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.55; background: var(--bg-recessed); color: var(--ink-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin: var(--s-md) 0; text-align: left; white-space: pre-wrap; overflow-x: auto; }
  .cli-term { background: #1C1917; border-radius: var(--radius-lg); padding: 12px 14px; margin: var(--s-md) 0 0; text-align: left; }
  .cli-scroll { font-family: var(--font-mono); font-size: 0.86rem; line-height: 1.7; color: #E7E5E4; max-height: 180px; overflow-y: auto; }
  .cli-line { white-space: pre-wrap; word-break: break-word; }
  .cli-input-row { display: flex; align-items: baseline; gap: 8px; margin-top: 6px; }
  .cli-input-row.solo { background: var(--bg-recessed); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 4px 10px; margin-top: var(--s-md); }
  .cli-prompt { font-family: var(--font-mono); font-size: 0.86rem; color: #A8A29E; flex: none; }
  .cli-input { flex: 1; background: transparent; border: none; outline: none; font-family: var(--font-mono); font-size: 1rem; line-height: 1.7; color: var(--ink); }
  .cli-term .cli-input { color: #FAFAF9; caret-color: var(--accent); }
  .cli-input:disabled { opacity: 0.6; }

  .cd-foot { margin-top: var(--s-xl); text-align: center; }
  .cd-link { font-family: var(--font-mono); font-size: 0.74rem; color: var(--ink-muted); text-decoration: underline; cursor: pointer; background: none; border: none; }
  .cd-link:hover { color: var(--accent); }
  .cd-tiphint { font-size: 0.78rem; color: var(--ink-muted); margin-top: var(--s-md); font-family: var(--font-mono); }

  /* browse (reference) surface, hidden by default */
  body.drill #cd-browse { display: none; }
  body:not(.drill) #cd-drill, body:not(.drill) #cd-scope, body:not(.drill) .cd-ready, body:not(.drill) .cd-readybar { display: none; }
  .cd-back { display: inline-block; margin: var(--s-md) 0; font-family: var(--font-mono); font-size: 0.78rem; color: var(--accent); cursor: pointer; text-decoration: none; }
  .cd-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: var(--s-lg); }
  .cd-tab { padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg-surface); cursor: pointer; font-family: var(--font-display); font-size: 0.8rem; font-weight: 600; color: var(--ink-secondary); transition: all var(--transition); }
  .cd-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .cd-tab .n { font-family: var(--font-mono); opacity: 0.7; font-size: 0.72rem; margin-left: 5px; }

  .cd-sec-head { display: flex; align-items: baseline; gap: 10px; margin: var(--s-lg) 0 var(--s-md); padding-bottom: 8px; border-bottom: 2px solid var(--ink); }
  .cd-sec-head h2 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; margin: 0; color: var(--ink); }
  .cd-sec-head .desc { font-size: 0.8rem; color: var(--ink-muted); }

  .cd-block { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: var(--s-sm); overflow: hidden; }
  .cd-b-head { display: flex; align-items: center; gap: 10px; padding: 13px var(--s-md); cursor: pointer; }
  .cd-b-head:hover { background: var(--bg-hover); }
  .cd-b-title { font-family: var(--font-display); font-weight: 600; font-size: 0.95rem; color: var(--ink); flex: 1; }
  .cd-b-toggle { color: var(--ink-muted); transition: transform var(--transition); font-size: 0.8rem; }
  .cd-block.open .cd-b-toggle { transform: rotate(180deg); }
  .cd-b-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s var(--ease-out); }
  .cd-block.open .cd-b-body { grid-template-rows: 1fr; }
  .cd-b-inner { overflow: hidden; }
  .cd-b-pad { padding: 0 var(--s-md) var(--s-md); }
  .cd-why { font-style: italic; color: var(--ink-secondary); font-size: 0.84rem; margin: 4px 0 12px; padding-left: 10px; border-left: 3px solid var(--accent-light); }
  .cd-grp-label { font-family: var(--font-display); font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); margin: 14px 0 7px; }
  .cd-nums { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
  @media (max-width: 600px){ .cd-nums { grid-template-columns: 1fr; } .cd-cue { font-size: 1.2rem; } }
  .cd-num { display: flex; justify-content: space-between; gap: 12px; padding: 6px 9px; background: var(--bg-recessed); border-radius: var(--radius); font-size: 0.82rem; align-items: baseline; }
  .cd-num .k { color: var(--ink-secondary); }
  .cd-num .v { font-family: var(--font-mono); font-weight: 600; color: var(--ink); text-align: right; }
  .cd-pair { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; font-size: 0.82rem; }
  .cd-pair .vs { font-family: var(--font-display); font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .cd-pair .vs em { font-style: normal; color: var(--accent); }
  .cd-pair .diff { color: var(--ink-secondary); }
  .cd-cmd { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px dashed var(--border); align-items: baseline; }
  .cd-cmd:last-child { border-bottom: none; }
  .cd-cmd code { font-family: var(--font-mono); font-size: 0.8rem; color: var(--ink); background: var(--bg-recessed); padding: 2px 7px; border-radius: 4px; white-space: pre-wrap; flex: 1; }
  .cd-cmd .note { font-size: 0.76rem; color: var(--ink-muted); flex: 1; }
  .cd-step { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px dashed var(--border); }
  .cd-step:last-child { border-bottom: none; }
  .cd-step .dot { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; color: #fff; background: var(--accent); width: 19px; height: 19px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex: none; margin-top: 1px; }
  .cd-step .do { font-weight: 600; color: var(--ink); font-size: 0.84rem; }
  .cd-step .why { color: var(--ink-secondary); font-size: 0.78rem; }
  .cd-symptom { background: var(--prof-weak-bg); border: 1px solid var(--prof-weak); border-radius: var(--radius); padding: 9px 11px; font-size: 0.84rem; margin-bottom: 6px; }
  .cd-symptom b { color: var(--prof-weak); }
  .cd-fix { background: var(--prof-strong-bg); border: 1px solid var(--prof-strong); border-radius: var(--radius); padding: 9px 11px; font-size: 0.84rem; margin-top: 10px; }
  .cd-fix b { color: var(--prof-strong); }
  .cd-trap { padding: 8px 10px; background: var(--accent-dim); border-left: 3px solid var(--accent); border-radius: 0 var(--radius) var(--radius) 0; margin-bottom: 6px; font-size: 0.82rem; }
  .cd-trap .trig b { color: var(--accent); font-weight: 600; }
  .cd-trap .ans { color: var(--ink); margin-top: 3px; font-weight: 600; }
  .cd-trap .ans::before { content: '➜ '; color: var(--accent); }
</style>

<div class="cd-wrap">
  <header class="cd-head">
    <h1>Cram Driller</h1>
    <div class="cd-ready" id="cd-ready">building deck...</div>
    <div class="cd-readybar"><i id="cd-readybar"></i></div>
  </header>

  <div class="cd-scope" id="cd-mode"></div>

  <div id="cd-browse">
    <a class="cd-back" id="cd-back">← Back to drill</a>

<script defer src="data/cram-driller-data.js"></script>
<script defer src="data/cli-sim-data.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function(){
  var DATA = (window.CRAM_DRILLER_DATA && window.CRAM_DRILLER_DATA.blocks) || [];

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function bid(b,i){ return (b.kind||'x')+'-'+i+'-'+(b.title||'').slice(0,12).replace(/\s+/g,'_'); }

  // ---- domain normalization ----
  function normDom(b){
    if(b.domain && /^[1-6]$/.test(String(b.domain).trim())) return String(b.domain).trim();
    var t=((b.title||'')+' '+(b.kind||'')).toLowerCase();
    if(/tactic|exam-day/.test(t)) return 'X';
    if(/vlan|stp|trunk|etherchannel|spanning|wireless/.test(t)) return '2';
    if(/ospf|rout|inter-vlan|fhrp|hsrp/.test(t)) return '3';
    if(/\bacl\b|security|port-sec|aaa/.test(t)) return '5';
    if(/nat|dhcp|dns|ntp|snmp|syslog|service/.test(t)) return '4';
    if(/automat|json|rest|ansible|sdn/.test(t)) return '6';
    return '1';
  }

  // ---- flatten to atoms ----
  function shortT(b){ return (b.title||'').replace(/\s*\(.*$/,'').slice(0,42); }
  var ATOMS = [];
  DATA.forEach(function(b,i){
    var base=bid(b,i), dom=normDom(b), kind=b.kind||'concept';
    (b.numbers||[]).forEach(function(n,j){ ATOMS.push({id:base+':num:'+j, dom:dom, kind:kind, type:'num',  cue:n.k, answer:n.v}); });
    (b.pairs||[]).forEach(function(p,j){ ATOMS.push({id:base+':pair:'+j, dom:dom, kind:kind, type:'pair', cue:'How do you tell '+p.a+' from '+p.b+'?', answer:p.diff}); });
    (b.commands||[]).forEach(function(c,j){ ATOMS.push({id:base+':cmd:'+j, dom:dom, kind:kind, type:'cmd', cue:'Command: '+c.note, answer:c.cmd}); });
    (b.verify||[]).forEach(function(v,j){ ATOMS.push({id:base+':ver:'+j, dom:dom, kind:kind, type:'ver', cue:'Verify ('+shortT(b)+'): which show command, and what confirms it?', answer:v.cmd+'   ➜   '+v.look}); });
    (b.steps||[]).forEach(function(s,j){ ATOMS.push({id:base+':step:'+j, dom:dom, kind:kind, type:'step', cue:'Why this step: '+s.do, answer:s.why}); });
    (b.traps||[]).forEach(function(t,j){ ATOMS.push({id:base+':trap:'+j, dom:dom, kind:kind, type:'trap', cue:'If you see: '+t.trigger, answer:t.answer}); });
    if(b.symptom && b.fix) ATOMS.push({id:base+':sf', dom:dom, kind:kind, type:'trouble', cue:'Symptom: '+b.symptom, answer:b.fix});
  });

  // ---- Leitner scheduler (compressed for 2-day cram) ----
  var SR_KEY='ccna_cram_sr_v1';
  var INTERVALS=[10*60e3, 60*60e3, 4*60*60e3]; // box1 10m, box2 1h, box3 4h
  var sr={}; try{ sr=JSON.parse(localStorage.getItem(SR_KEY)||'{}'); }catch(e){ sr={}; }
  function saveSr(){ try{ localStorage.setItem(SR_KEY, JSON.stringify(sr)); }catch(e){} }
  function srGet(id){ return sr[id] || {box:1,due:0,seen:0,miss:0,last:0}; }
  function grade(id, ok){
    var r=srGet(id); r.seen++; r.last=Date.now();
    if(ok){ r.box=Math.min(3, r.box+1); r.due=Date.now()+INTERVALS[r.box-1]; }
    else  { r.box=1; r.miss++; r.due=Date.now()+45e3; }
    sr[id]=r; saveSr();
  }

  // ---- interleaved, due-first, weighted queue ----
  var scope='all';
  try{ scope=localStorage.getItem('ccna_cram_scope')||'all'; }catch(e){}
  var recent=[], recentDom=[];
  function inScope(a){ return scope==='all' || a.dom===scope || (scope==='trap' && a.type==='trap'); }
  var WEIGHT={trap:3,num:3,pair:2,ver:2,cmd:1,step:1,trouble:1};
  var BOXF={1:1.6,2:0.8,3:0.3};
  function nextAtom(){
    var scoped=ATOMS.filter(inScope);
    if(!scoped.length) return null;
    var t=Date.now();
    var pool=scoped.filter(function(a){ return srGet(a.id).due<=t; });
    if(!pool.length){ pool=scoped.slice().sort(function(x,y){return srGet(x.id).due-srGet(y.id).due;}).slice(0,12); }
    var interDom=(scope==='all');
    var elig=pool.filter(function(a){
      if(a.id===recent[0]) return false;
      if(interDom && recentDom.indexOf(a.dom)>=0) return false;
      return true;
    });
    if(!elig.length) elig=pool.filter(function(a){ return a.id!==recent[0]; });
    if(!elig.length) elig=pool;
    var sum=0, cum=[];
    elig.forEach(function(a){ sum += (WEIGHT[a.type]||1)*(BOXF[srGet(a.id).box]||1); cum.push(sum); });
    var r=Math.random()*sum, idx=0;
    while(idx<cum.length && r>cum[idx]) idx++;
    var chosen=elig[Math.min(idx, elig.length-1)];
    recent.unshift(chosen.id); recent=recent.slice(0,3);
    recentDom.unshift(chosen.dom); recentDom=recentDom.slice(0,2);
    return chosen;
  }

  // ---- opt-in drill modes (default stays recall) ----
  var KP=[], BL=[], MQ=[], VIS=[], CLISIM=[];
  if(window.CramDrills){ try{ KP=CramDrills.buildKeypad(DATA); BL=CramDrills.buildBlanks(DATA); MQ=CramDrills.buildTrapMCQ(DATA); VIS=CramDrills.buildVisuals(); }catch(e){} }
  CLISIM = window.CLI_SIM_ITEMS || [];
  var clideck='all';
  try{ clideck=localStorage.getItem('ccna_cram_clideck')||'all'; }catch(e){}
  function clisimPool(){ return clideck==='all' ? CLISIM : CLISIM.filter(function(i){return i.deck===clideck;}); }
  var MODES=[
    {key:'recall',label:'Recall', pool:function(){ return ATOMS.filter(inScope); }},
    {key:'num',   label:'Numbers',pool:function(){ return KP; }},
    {key:'cli',   label:'CLI fill',pool:function(){ return BL; }},
    {key:'trap',  label:'Trap quiz',pool:function(){ return MQ; }},
    {key:'vis',   label:'Visuals',pool:function(){ return VIS; }},
    {key:'clisim',label:'CLI sim', pool:function(){ return clisimPool(); }}
  ];
  var mode='recall'; try{ mode=localStorage.getItem('ccna_cram_mode')||'recall'; }catch(e){}
  function curMode(){ for(var i=0;i<MODES.length;i++) if(MODES[i].key===mode) return MODES[i]; return MODES[0]; }

  // ---- single-card drill view ----
  var drillEl=document.getElementById('cd-drill');
  var phase='cue', cur=null;
  var MONO={num:1, cmd:1, ver:1};
  function chipLabel(a){
    var names={num:'Number',pair:'A vs B',cmd:'Config',ver:'Verify',step:'Step',trap:'Exam trap',trouble:'Troubleshoot'};
    var d = a.dom==='X' ? 'Tactics' : 'D'+a.dom;
    return (names[a.type]||a.type)+'  ·  '+d;
  }
  function shuffleStable(arr,seed){ return arr.map(function(o,k){ return {o:o,key:CramDrills.hash(seed+k)}; }).sort(function(a,b){return a.key-b.key;}).map(function(x){return x.o;}); }

  // generic interleaved picker over any pool (reuses Leitner sr + recent)
  function pickFrom(pool){
    if(!pool || !pool.length) return null;
    var t=Date.now(), BF={1:1.6,2:0.8,3:0.3};
    var due=pool.filter(function(a){ return srGet(a.id).due<=t; });
    if(!due.length){ due=pool.slice().sort(function(x,y){ return srGet(x.id).due-srGet(y.id).due; }).slice(0,12); }
    var elig=due.filter(function(a){ return a.id!==recent[0]; });
    if(!elig.length) elig=due;
    var sum=0, cum=[]; elig.forEach(function(a){ sum+=(BF[srGet(a.id).box]||1); cum.push(sum); });
    var r=Math.random()*sum, idx=0; while(idx<cum.length && r>cum[idx]) idx++;
    var ch=elig[Math.min(idx,elig.length-1)];
    recent.unshift(ch.id); recent=recent.slice(0,3);
    return ch;
  }
  function nextItem(){ return mode==='recall' ? nextAtom() : pickFrom(curMode().pool()); }
  function advance(){ updateReady(); render(); }
  function render(){
    var it=nextItem();
    if(mode==='num')  return renderNum(it);
    if(mode==='cli')  return renderCli(it);
    if(mode==='trap') return renderTrap(it);
    if(mode==='vis')  return renderVisual(it);
    if(mode==='clisim') return renderClisim(it);
    return renderRecall(it);
  }
  function foot(tip){
    return '<div class="cd-foot"><button class="cd-link" id="cd-browselink">Browse all '+ATOMS.length+' facts</button><div class="cd-tiphint">'+(tip||'')+'</div></div>';
  }
  function wireFoot(){ var b=document.getElementById('cd-browselink'); if(b) b.addEventListener('click', toBrowse); }
  function empty(msg){ drillEl.innerHTML='<div class="cd-card"><div class="cd-cue">'+msg+'</div></div>'+foot(''); wireFoot(); }

  // RECALL (default) with 3-button confidence grade
  function renderRecall(a){
    cur=a; phase='cue';

      +'<div class="cd-actions" id="cd-acts"><button class="cd-btn primary" id="cd-show">Show answer<span class="k">space</span></button></div>'
      +'</div>'+foot('space = reveal · 1 missed · 2 slow · 3 got');
    document.getElementById('cd-show').addEventListener('click', reveal);
    drillEl.querySelector('.cd-cue').addEventListener('click', function(){ if(phase==='cue') reveal(); });

  function reveal(){

      +'<button class="cd-btn got" id="cd-c2">Got it<span class="k">3</span></button>';
    document.getElementById('cd-c0').addEventListener('click',function(){ rateConf(0); });
    document.getElementById('cd-c1').addEventListener('click',function(){ rateConf(1); });
    document.getElementById('cd-c2').addEventListener('click',function(){ rateConf(2); });
  }
  function gradeConf(id, conf){
    if(conf===0){ grade(id,false); return; }
    if(conf===2){ grade(id,true); return; }
    var r=srGet(id); r.seen++; r.last=Date.now(); r.due=Date.now()+5*60e3; sr[id]=r; saveSr(); // Slow: keep box, short bump
  }
  function rateConf(c){ if(phase!=='revealed'||!cur) return; gradeConf(cur.id,c); advance(); }

  // NUMBERS keypad (type the port/AD/timer)
  function renderNum(a){
    cur=a; phase='cue';
    if(!a) return empty('No number items.');
    var keys=[1,2,3,4,5,6,7,8,9,0].map(function(n){ return '<button class="cd-key" data-n="'+n+'">'+n+'</button>'; }).join('');
    var pad='<div class="cd-pad" id="cd-pad">'+keys+'<button class="cd-key wide" data-act="back">del</button><button class="cd-key wide go" data-act="go">enter</button></div>';

      +'<div class="cd-entry" id="cd-entry">_</div>'
      +'<div class="cd-answer mono" id="cd-ans">'+esc(a.raw)+'</div>'
      +pad+'</div>'+foot('tap digits, enter to check');
    var entry='', entryEl=document.getElementById('cd-entry');
    function paint(){ entryEl.textContent=entry||'_'; }

      k.addEventListener('click',function(){

      });

  }
  function submitNum(entry, a){
    if(phase!=='cue') return; phase='revealed';

    document.getElementById('cd-next').addEventListener('click', advance);

  function renderCli(a){

  function visNode(l1, l2, i, extra){

  function renderVisual(v){

  function renderStp(v){

  function renderAcl(v){

  // ---- CLI SIM: typed terminal + input/choice cards (grading is in the pure engine) ----
  function renderClisim(it){
    cur=it; phase='cue';

  function finishCli(){
    document.getElementById('cd-acts').innerHTML='<button class="cd-btn primary" id="cd-next">next</button>';
    document.getElementById('cd-next').addEventListener('click', advance);
    var inp=document.getElementById('cli-input'); if(inp) inp.disabled=true;
  }
  function renderTerminal(it){
    var typed=[], hist=[], hi=-1;
    drillEl.innerHTML='<div class="cd-card">'
      +'<span class="cd-chip chip-config">CLI sim · '+esc(it.deck)+(it.kind==='fix'?' · fix':'')+'</span>'
      +'<div class="cd-cue" style="font-size:1.05rem">'+esc(it.goal||'')+'</div>'
      +(it.context?'<pre class="cli-ctx">'+esc(it.context)+'</pre>':'')
      +'<div class="cli-term"><div class="cli-scroll" id="cli-scroll"></div>'
      +  '<div class="cli-input-row"><span class="cli-prompt">'+esc(it.prompt||'R1(config)#')+'</span>'
      +  '<input class="cli-input" id="cli-input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" /></div></div>'
      +'<div class="cd-actions" id="cd-acts"><button class="cd-btn primary" id="cli-check">Check</button><button class="cd-btn" id="cli-reveal">Reveal</button></div>'
      +'<div class="vis-rule" id="cli-msg"></div>'
      +'</div>'+foot('type a line, Enter adds it, Check grades');
    var inp=document.getElementById('cli-input'), scroll=document.getElementById('cli-scroll');
    function echo(line){ var d=document.createElement('div'); d.className='cli-line'; d.textContent=(it.prompt||'R1(config)#')+' '+line; scroll.appendChild(d); scroll.scrollTop=scroll.scrollHeight; }
    inp.addEventListener('keydown', function(e){
      if(e.key==='Enter'){ e.preventDefault(); var v=inp.value.trim(); if(!v) return; typed.push(v); hist.push(v); hi=hist.length; echo(v); inp.value=''; }
      else if(e.key==='ArrowUp'){ e.preventDefault(); if(hi>0){ hi--; inp.value=hist[hi]; } }
      else if(e.key==='ArrowDown'){ e.preventDefault(); if(hi<hist.length-1){ hi++; inp.value=hist[hi]; } else { hi=hist.length; inp.value=''; } }
    });
    setTimeout(function(){ try{ inp.focus(); }catch(e){} }, 0);
    document.getElementById('cli-check').addEventListener('click', function(){
      if(phase!=='cue') return;
      var lines=typed.slice(); var pend=inp.value.trim(); if(pend) lines.push(pend);
      var r=CramDrills.gradeConfig(lines, it), msg=document.getElementById('cli-msg');
      if(r.ok){ phase='revealed'; msg.style.color='var(--prof-strong)'; msg.textContent='Correct. '+(it.explain||''); grade(it.id,true); finishCli(); }
      else { msg.style.color='var(--accent)'; msg.textContent=r.hint||'Not yet. Keep going or Reveal.'; }
    });
    document.getElementById('cli-reveal').addEventListener('click', function(){
      if(phase!=='cue') return; phase='revealed';
      var want=it.steps.map(function(s){ return s.canonical||s.accept[0]; }).join('\n');
      var msg=document.getElementById('cli-msg'); msg.style.color='var(--ink-secondary)';
      msg.innerHTML='Needed:<pre class="cli-ctx">'+esc(want)+'</pre>'+(it.explain?esc(it.explain):'');
      grade(it.id,false); finishCli();
    });
  }

      +'<div class="vis-rule" id="cli-msg"></div>'
      +'</div>'+foot('pick one');
    Array.prototype.forEach.call(drillEl.querySelectorAll('.cd-opt'), function(btn){
      btn.addEventListener('click', function(){
        if(phase!=='cue') return; phase='revealed';
        var k=parseInt(btn.getAttribute('data-k'),10), ok=CramDrills.gradeItem(it, k);
        Array.prototype.forEach.call(drillEl.querySelectorAll('.cd-opt'), function(b,i){ b.style.pointerEvents='none'; if(i===it.correctIndex) b.classList.add('opt-ok'); else if(i===k) b.classList.add('opt-no'); });
        var msg=document.getElementById('cli-msg'); msg.style.color='var(--ink-secondary)'; msg.textContent=it.explain||'';
        grade(it.id, ok);
        drillEl.querySelector('.cd-card').insertAdjacentHTML('beforeend','<div class="cd-actions"><button class="cd-btn primary" id="cd-next">next</button></div>');
        document.getElementById('cd-next').addEventListener('click', advance);
      });
    });
  }

  document.addEventListener('keydown', function(e){
    if(document.body.classList.contains('drill')===false) return;
    if(mode!=='recall') return; // keyboard shortcuts only for recall; other modes are tap-driven
    if(e.key===' '){ if(phase==='cue'){ e.preventDefault(); reveal(); } }
    else if(phase==='revealed'){ if(e.key==='1') rateConf(0); else if(e.key==='2') rateConf(1); else if(e.key==='3') rateConf(2); }
  });

  // ---- readiness meter (item-level, honest) ----
  function updateReady(){
    var t=Date.now(), b3=0, due=0;
    var pool = mode==='recall' ? ATOMS : curMode().pool();
    pool.forEach(function(a){ var r=srGet(a.id); if(r.seen>0 && r.box>=3) b3++; if(r.due<=t) due++; });
    var noun = mode==='recall' ? 'facts' : (curMode().label.toLowerCase());
    document.getElementById('cd-readybar').style.width = (pool.length? Math.round(b3/pool.length*100):0)+'%';
    document.getElementById('cd-ready').innerHTML =
      pool.length + ' ' + noun + '  ·  <b>'+b3+' solid</b>  ·  <span class="due">'+due+' due</span>';
  }

  // ---- mode pills (opt-in drill styles) ----
  function syncScopeVis(){ var s=document.getElementById('cd-scope'); if(s) s.style.display = (mode==='recall') ? 'flex' : 'none'; }
  function syncDeckVis(){ var d=document.getElementById('cd-deck'); if(d) d.style.display = (mode==='clisim') ? 'flex' : 'none'; }
  function renderDeck(){
    var defs=[['all','All'],['vlan','VLAN'],['acl','ACL'],['ospf','OSPF'],['stp','STP'],['static','Static'],['etherchannel','EtherCh'],['l2sec','L2 sec'],['ipv6','IPv6'],['routetable','Routes'],['subnet','Subnet'],['aclproto','ACL proto'],['wlan','WLAN']];
    var el=document.getElementById('cd-deck');
    el.innerHTML=defs.map(function(d){ return '<button class="cd-pill'+(d[0]===clideck?' active':'')+'" data-d="'+d[0]+'">'+d[1]+'</button>'; }).join('');
    Array.prototype.forEach.call(el.querySelectorAll('.cd-pill'), function(p){
      p.addEventListener('click', function(){
        clideck=p.getAttribute('data-d');
        try{ localStorage.setItem('ccna_cram_clideck', clideck); }catch(e){}
        recent=[];
        renderDeck(); updateReady(); render();
      });
    });
  }
  function renderMode(){
    var el=document.getElementById('cd-mode');
    el.innerHTML=MODES.map(function(m){ return '<button class="cd-pill'+(m.key===mode?' active':'')+'" data-m="'+m.key+'">'+m.label+'</button>'; }).join('');
    Array.prototype.forEach.call(el.querySelectorAll('.cd-pill'), function(p){
      p.addEventListener('click', function(){
        mode=p.getAttribute('data-m');
        try{ localStorage.setItem('ccna_cram_mode', mode); }catch(e){}
        recent=[]; recentDom=[];
        renderMode(); syncScopeVis(); syncDeckVis(); render();
      });
    });
    syncScopeVis(); syncDeckVis();
  }

  // ---- scope pills (filter recall pool by domain / traps) ----
  function renderScope(){
    var defs=[['all','All'],['trap','Traps'],['1','D1'],['2','D2'],['3','D3'],['4','D4'],['5','D5'],['6','D6']];
    var el=document.getElementById('cd-scope');
    el.innerHTML=defs.map(function(d){ return '<button class="cd-pill'+(d[0]===scope?' active':'')+'" data-s="'+d[0]+'">'+d[1]+'</button>'; }).join('');
    Array.prototype.forEach.call(el.querySelectorAll('.cd-pill'), function(p){
      p.addEventListener('click', function(){
        scope=p.getAttribute('data-s');
        try{ localStorage.setItem('ccna_cram_scope', scope); }catch(e){}
        recent=[]; recentDom=[];
        renderScope(); render();
      });
    });
  }

  // ================= BROWSE (reference) surface =================
  var SECTIONS=[
    {key:'concept',label:'Concepts',desc:'facts, numbers, confusable pairs'},
    {key:'config', label:'Configs', desc:'exact IOS command sequences'},
    {key:'trouble',label:'Troubleshoot',desc:'symptom to root cause to fix'},
    {key:'tactics',label:'Tactics', desc:'exam-day strategy and triggers'},
  ];
  var bActive='concept', browseBuilt=false;
  var contentEl=document.getElementById('cd-content'), tabsEl=document.getElementById('cd-tabs');
  function countFor(k){ return DATA.filter(function(b){ return (b.kind||'concept')===k; }).length; }
  function renderTabs(){
    tabsEl.innerHTML=SECTIONS.map(function(s){ return '<button class="cd-tab'+(s.key===bActive?' active':'')+'" data-k="'+s.key+'">'+s.label+'<span class="n">'+countFor(s.key)+'</span></button>'; }).join('');
    Array.prototype.forEach.call(tabsEl.querySelectorAll('.cd-tab'), function(t){
      t.addEventListener('click', function(){ bActive=t.getAttribute('data-k'); renderTabs(); renderSection(); });
    });
  }
  function numbersH(a){ if(!a||!a.length) return ''; return '<div class="cd-grp-label">Numbers</div><div class="cd-nums">'+a.map(function(n){return '<div class="cd-num"><span class="k">'+esc(n.k)+'</span><span class="v">'+esc(n.v)+'</span></div>';}).join('')+'</div>'; }
  function pairsH(a){ if(!a||!a.length) return ''; return '<div class="cd-grp-label">Confusable pairs</div>'+a.map(function(p){return '<div class="cd-pair"><div class="vs"><em>'+esc(p.a)+'</em> vs <em>'+esc(p.b)+'</em></div><div class="diff">'+esc(p.diff)+'</div></div>';}).join(''); }
  function cmdsH(a){ if(!a||!a.length) return ''; return '<div class="cd-grp-label">Commands</div>'+a.map(function(c){return '<div class="cd-cmd"><code>'+esc(c.cmd)+'</code><span class="note">'+esc(c.note)+'</span></div>';}).join(''); }
  function verifyH(a){ if(!a||!a.length) return ''; return '<div class="cd-grp-label">Verify</div>'+a.map(function(v){return '<div class="cd-cmd"><code>'+esc(v.cmd)+'</code><span class="note">'+esc(v.look)+'</span></div>';}).join(''); }
  function stepsH(a){ if(!a||!a.length) return ''; return '<div class="cd-grp-label">Steps</div>'+a.map(function(s,i){return '<div class="cd-step"><span class="dot">'+(i+1)+'</span><div><div class="do">'+esc(s.do)+'</div><div class="why">'+esc(s.why)+'</div></div></div>';}).join(''); }
  function trapsH(a){ if(!a||!a.length) return ''; return '<div class="cd-grp-label">Exam traps</div>'+a.map(function(t){return '<div class="cd-trap"><div class="trig"><b>If you see:</b> '+esc(t.trigger)+'</div><div class="ans">'+esc(t.answer)+'</div></div>';}).join(''); }
  function renderBlock(b,i){
    var body='';
    if(b.why) body+='<div class="cd-why">'+esc(b.why)+'</div>';
    if(b.symptom) body+='<div class="cd-symptom"><b>Symptom:</b> '+esc(b.symptom)+'</div>';
    body+=numbersH(b.numbers)+pairsH(b.pairs)+cmdsH(b.commands)+stepsH(b.steps)+verifyH(b.verify);
    if(b.fix) body+='<div class="cd-fix"><b>Root cause:</b> '+esc(b.fix)+'</div>';
    body+=trapsH(b.traps);
    return '<div class="cd-block" data-id="b-'+i+'">'
      + '<div class="cd-b-head"><span class="cd-b-title">'+esc(b.title||'Untitled')+'</span><span class="cd-b-toggle">▼</span></div>'
      + '<div class="cd-b-body"><div class="cd-b-inner"><div class="cd-b-pad">'+body+'</div></div></div></div>';
  }
  function renderSection(){
    var sec=SECTIONS.filter(function(s){return s.key===bActive;})[0];
    var blocks=DATA.map(function(b,i){return {b:b,i:i};}).filter(function(o){ return (o.b.kind||'concept')===bActive; });
    var html='<div class="cd-sec-head"><h2>'+sec.label+'</h2><span class="desc">'+sec.desc+'</span></div>';
    html+=blocks.map(function(o){ return renderBlock(o.b,o.i); }).join('');
    contentEl.innerHTML=html;
    Array.prototype.forEach.call(contentEl.querySelectorAll('.cd-block'), function(blk){
      blk.querySelector('.cd-b-head').addEventListener('click', function(){ blk.classList.toggle('open'); });
    });
  }
  function toBrowse(){
    if(!browseBuilt){ renderTabs(); renderSection(); browseBuilt=true; }
    document.body.classList.remove('drill');
    window.scrollTo({top:0});
  }
  function toDrill(){ document.body.classList.add('drill'); window.scrollTo({top:0}); }
  document.getElementById('cd-back').addEventListener('click', toDrill);

  // ---- boot ----
  if(!ATOMS.length){
    drillEl.innerHTML='<div class="cd-card"><div class="cd-cue">No cram data loaded.</div></div>';
    document.getElementById('cd-ready').textContent='no data';
  } else {
    renderMode();
    renderScope();
    renderDeck();
    updateReady();
    render();
  }
});
</script>
<script defer src="js/tutor.js?v=7.15.8"></script>
