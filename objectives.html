<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA 200-301 Exam Objectives — CCNA Study</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css">
<style>
/* ═══════════════════════════════════════════════════════════════
   CCNA Objectives Tracker — Amber accent — uses css/shared.css
   ═══════════════════════════════════════════════════════════════ */

/* ── Overall Readiness ───────────────────────────────────── */
.readiness{margin-bottom:var(--s-xl)}
.readiness-label{font-family:var(--font-display);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);margin-bottom:6px}
.readiness-row{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.readiness-pct{font-family:var(--font-display);font-size:2rem;font-weight:800;color:var(--accent);line-height:1}
.readiness-bar{flex:1;height:10px;background:var(--bg-recessed);border-radius:5px;overflow:hidden}
.readiness-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:5px;transition:width .5s var(--ease-out)}
.readiness-stats{display:flex;gap:24px;flex-wrap:wrap}
.readiness-stat{font-family:var(--font-mono);font-size:.75rem;color:var(--ink-muted)}
.readiness-stat strong{color:var(--ink)}

/* ── Legend ───────────────────────────────────────────────── */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:var(--s-lg);padding:12px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius)}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--font-display);font-size:.7rem;color:var(--ink-secondary)}
.legend-dot{width:10px;height:10px;border-radius:2px}
.legend-dot.not-started{background:#E2DFD9}
.legend-dot.learning{background:#F59E0B}
.legend-dot.review{background:#3B82F6}
.legend-dot.mastered{background:#16A34A}

/* ── Domain Accordion ────────────────────────────────────── */
.domain{margin-bottom:12px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg-surface)}
.domain-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:background .15s;user-select:none}
.domain-header:hover{background:var(--accent-dim)}
.domain.open .domain-header{background:var(--accent-dim);border-bottom:1px solid var(--border)}
.domain-num{font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--accent);min-width:36px}
.domain-info{flex:1}
.domain-title{font-family:var(--font-display);font-size:.92rem;font-weight:700;color:var(--ink);line-height:1.3}
.domain-weight{font-family:var(--font-mono);font-size:.72rem;color:var(--accent);font-weight:700;margin-top:2px}
.domain-progress{width:100px;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.domain-bar{width:100%;height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
.domain-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .5s var(--ease-out)}
.domain-pct{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted)}
.domain-arrow{font-size:.7rem;color:var(--ink-muted);transition:transform .25s var(--ease-out);flex-shrink:0}
.domain.open .domain-arrow{transform:rotate(180deg)}

/* ── Objectives List ─────────────────────────────────────── */
.objectives{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s var(--ease-out)}
.domain.open .objectives{grid-template-rows:1fr}
.objectives-inner{overflow:hidden}
.objective{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);transition:background .1s}
.objective:last-child{border-bottom:none}
.objective:hover{background:var(--accent-dim)}
.obj-check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border-strong);cursor:pointer;appearance:none;-webkit-appearance:none;flex-shrink:0;transition:all .15s;position:relative}
.obj-check:checked{background:var(--accent);border-color:var(--accent)}
.obj-check:checked::after{content:'';position:absolute;top:3px;left:6px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.obj-id{font-family:var(--font-mono);font-size:.78rem;font-weight:700;color:var(--accent);min-width:32px;flex-shrink:0}
.obj-text{font-family:var(--font-body);font-size:.88rem;color:var(--ink);flex:1;line-height:1.45}
.obj-confidence{font-family:var(--font-display);font-size:.68rem;font-weight:600;padding:4px 10px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:var(--bg-recessed);color:var(--ink-muted);transition:all .15s;white-space:nowrap;min-width:80px;text-align:center}
.obj-confidence[data-level="learning"]{background:#FFFBEB;border-color:#F59E0B;color:#B45309}
.obj-confidence[data-level="review"]{background:#EFF6FF;border-color:#3B82F6;color:#1D4ED8}
.obj-confidence[data-level="mastered"]{background:#F0FDF4;border-color:#16A34A;color:#15803D}
.obj-study{font-family:var(--font-display);font-size:.68rem;font-weight:600;color:var(--accent);text-decoration:none;padding:4px 10px;border:1px solid rgba(180,83,9,.2);border-radius:3px;transition:all .15s;white-space:nowrap}
.obj-study:hover{background:var(--accent-dim);border-color:var(--accent)}

/* ── Confidence Popup ────────────────────────────────────── */
.conf-popup{position:absolute;z-index:200;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.12);padding:4px;display:none}
.conf-popup.show{display:block}
.conf-opt{display:block;width:100%;padding:6px 14px;border:none;background:none;text-align:left;font-family:var(--font-display);font-size:.72rem;font-weight:600;cursor:pointer;border-radius:2px;transition:background .1s}
.conf-opt:hover{background:var(--bg-recessed)}
.conf-opt[data-val="not-started"]{color:var(--ink-muted)}
.conf-opt[data-val="learning"]{color:#B45309}
.conf-opt[data-val="review"]{color:#1D4ED8}
.conf-opt[data-val="mastered"]{color:#15803D}

/* ── Reset button ────────────────────────────────────────── */
.reset-row{text-align:right;margin-top:var(--s-md)}

@media(max-width:600px){
  .domain-header{padding:12px 14px;gap:10px}
  .domain-progress{width:70px}
  .objective{padding:10px 14px;gap:8px;flex-wrap:wrap}
  .obj-study{display:none}
  .readiness-row{flex-direction:column;align-items:flex-start}
  .readiness-pct{font-size:1.5rem}
}
</style>
</head>
<body>
<div class="container">
  <nav class="top-nav"></nav>
  <script defer src="js/nav.js?v=3"></script>

  <header class="page-header">
    <a href="core.html" class="back-link">Dashboard</a>
    <h1>CCNA 200-301 Exam Objectives</h1>
    <p class="subtitle">Track every sub-objective across all 6 Cisco CCNA domains</p>
    <p style="margin-top:8px"><a href="https://learningcontent.cisco.com/documents/marketing/exam-topics/200-301-CCNA-v1.1.pdf" target="_blank" style="font-family:var(--font-display);font-size:.82rem;font-weight:600;color:var(--accent);text-decoration:none;border:1px solid var(--accent);padding:6px 14px;border-radius:var(--radius);transition:all .15s" onmouseover="this.style.background='var(--accent-dim)'" onmouseout="this.style.background='transparent'">Download Official Cisco Exam Objectives (PDF)</a></p>
  </header>

  <!-- Overall Readiness -->
  <div class="readiness">
    <div class="readiness-label">Exam Readiness</div>
    <div class="readiness-row">
      <span class="readiness-pct" id="totalPct">0%</span>
      <div class="readiness-bar"><div class="readiness-fill" id="totalFill" style="width:0%"></div></div>
    </div>
    <div class="readiness-stats" id="totalStats"></div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><span class="legend-dot not-started"></span> Not Started</div>
    <div class="legend-item"><span class="legend-dot learning"></span> Learning</div>
    <div class="legend-item"><span class="legend-dot review"></span> Review</div>
    <div class="legend-item"><span class="legend-dot mastered"></span> Mastered</div>
  </div>

  <!-- Domains rendered by JS -->
  <div id="domainsContainer"></div>

  <div class="reset-row">
    <button class="btn btn-ghost btn-sm" onclick="if(confirm('Reset all CCNA objectives progress?')){localStorage.removeItem('ccna_obj_checks');localStorage.removeItem('ccna_obj_confidence');location.reload()}">Reset Progress</button>
  </div>
</div>

<script defer src="js/tutor.js"></script>
<script defer src="js/group-chat.js"></script>
<script>document.addEventListener('DOMContentLoaded',function(){

(function(){
  /* ══════════════════════════════════════════════════════════════
     LOCKED — Verified against 200-301-CCNA-v1.1.pdf (2024 Cisco)
     DO NOT EDIT this array. Every word matches the official PDF.
     Last verified: 2026-04-14
     ══════════════════════════════════════════════════════════════ */
  var DOMAINS = [
    { id:'1.0', name:'Network Fundamentals', weight:20, subs:[
      {id:'1.1',text:'Explain the role and function of network components (routers, Layer 2 and Layer 3 switches, next-generation firewalls and IPS, access points, controllers, endpoints, servers, PoE)',link:'devices.html'},
      {id:'1.2',text:'Describe characteristics of network topology architectures (two-tier, three-tier, spine-leaf, WAN, small office/home office (SOHO), on-premises and cloud)'},
      {id:'1.3',text:'Compare physical interface and cabling types (single-mode fiber, multimode fiber, copper; connections (Ethernet shared media and point-to-point))',link:'learn-visually.html'},
      {id:'1.4',text:'Identify interface and cable issues (collisions, errors, mismatch duplex, and/or speed)'},
      {id:'1.5',text:'Compare TCP to UDP'},
      {id:'1.6',text:'Configure and verify IPv4 addressing and subnetting',link:'subnetting-mastery.html'},
      {id:'1.7',text:'Describe private IPv4 addressing'},
      {id:'1.8',text:'Configure and verify IPv6 addressing and prefix'},
      {id:'1.9',text:'Describe IPv6 address types (unicast (global, unique local, and link local), anycast, multicast, Modified EUI 64)'},
      {id:'1.10',text:'Verify IP parameters for Client OS (Windows, Mac OS, Linux)'},
      {id:'1.11',text:'Describe wireless principles (nonoverlapping Wi-Fi channels, SSID, RF, encryption)'},
      {id:'1.12',text:'Explain virtualization fundamentals (server virtualization, containers, and VRFs)'},
      {id:'1.13',text:'Describe switching concepts (MAC learning and aging, frame switching, frame flooding, MAC address table)',link:'learn-visually.html'}
    ]},
    { id:'2.0', name:'Network Access', weight:20, subs:[
      {id:'2.1',text:'Configure and verify VLANs (normal range) spanning multiple switches (access ports (data and voice), default VLAN, InterVLAN connectivity)',link:'quiz.html?topic=2.1'},
      {id:'2.2',text:'Configure and verify interswitch connectivity (trunk ports, 802.1Q, native VLAN)'},
      {id:'2.3',text:'Configure and verify Layer 2 discovery protocols (Cisco Discovery Protocol and LLDP)'},
      {id:'2.4',text:'Configure and verify (Layer 2/Layer 3) EtherChannel (LACP)'},
      {id:'2.5',text:'Interpret basic operations of Rapid PVST+ Spanning Tree Protocol (root port, root bridge (primary/secondary), and other port names; port states and roles; PortFast; root guard, loop guard, BPDU filter, and BPDU guard)',link:'learn-visually.html'},
      {id:'2.6',text:'Describe Cisco Wireless Architectures and AP modes'},
      {id:'2.7',text:'Describe physical infrastructure connections of WLAN components (AP, WLC, access/trunk ports, and LAG)'},
      {id:'2.8',text:'Describe network device management access (Telnet, SSH, HTTP, HTTPS, console, TACACS+/RADIUS, and cloud managed)'},
      {id:'2.9',text:'Interpret the wireless LAN GUI configuration for client connectivity, such as WLAN creation, security settings, QoS profiles, and advanced settings'}
    ]},
    { id:'3.0', name:'IP Connectivity', weight:25, subs:[
      {id:'3.1',text:'Interpret the components of routing table (routing protocol code, prefix, network mask, next hop, administrative distance, metric, gateway of last resort)'},
      {id:'3.2',text:'Determine how a router makes a forwarding decision by default (longest prefix match, administrative distance, routing protocol metric)'},
      {id:'3.3',text:'Configure and verify IPv4 and IPv6 static routing (default route, network route, host route, floating static)',link:'console-labs.html'},
      {id:'3.4',text:'Configure and verify single area OSPFv2 (neighbor adjacencies, point-to-point, broadcast (DR/BDR selection), router ID)',link:'ospf-mastery.html'},
      {id:'3.5',text:'Describe the purpose, functions, and concepts of first hop redundancy protocols'}
    ]},
    { id:'4.0', name:'IP Services', weight:10, subs:[
      {id:'4.1',text:'Configure and verify inside source NAT using static and pools',link:'network-lab.html'},
      {id:'4.2',text:'Configure and verify NTP operating in a client and server mode'},
      {id:'4.3',text:'Explain the role of DHCP and DNS within the network'},
      {id:'4.4',text:'Explain the function of SNMP in network operations'},
      {id:'4.5',text:'Describe the use of syslog features, including facilities and severity levels'},
      {id:'4.6',text:'Configure and verify DHCP client and relay',link:'console-labs.html'},
      {id:'4.7',text:'Explain the forwarding per-hop behavior (PHB) for QoS such as classification, marking, queuing, congestion, policing, and shaping'},
      {id:'4.8',text:'Configure network devices for remote access using SSH',link:'console-labs.html'},
      {id:'4.9',text:'Describe the capabilities and functions of TFTP/FTP in the network'}
    ]},
    { id:'5.0', name:'Security Fundamentals', weight:15, subs:[
      {id:'5.1',text:'Define key security concepts (threats, vulnerabilities, exploits, and mitigation techniques)'},
      {id:'5.2',text:'Describe security program elements (user awareness, training, and physical access control)'},
      {id:'5.3',text:'Configure and verify device access control using local passwords'},
      {id:'5.4',text:'Describe security password policy elements, such as management, complexity, and password alternatives (multifactor authentication, certificates, and biometrics)'},
      {id:'5.5',text:'Describe IPsec remote access and site-to-site VPNs'},
      {id:'5.6',text:'Configure and verify access control lists',link:'console-labs.html'},
      {id:'5.7',text:'Configure and verify Layer 2 security features (DHCP snooping, dynamic ARP inspection, and port security)'},
      {id:'5.8',text:'Compare authentication, authorization, and accounting concepts'},
      {id:'5.9',text:'Describe wireless security protocols (WPA, WPA2, and WPA3)'},
      {id:'5.10',text:'Configure and verify WLAN within the GUI using WPA2 PSK'}
    ]},
    { id:'6.0', name:'Automation and Programmability', weight:10, subs:[
      {id:'6.1',text:'Explain how automation impacts network management'},
      {id:'6.2',text:'Compare traditional networks with controller-based networking'},
      {id:'6.3',text:'Describe controller-based, software defined architecture (overlay, underlay, and fabric; separation of control plane and data plane; Northbound and Southbound APIs)'},
      {id:'6.4',text:'Explain AI (generative and predictive) and machine learning in network operations'},
      {id:'6.5',text:'Describe characteristics of REST-based APIs (authentication types, CRUD, HTTP verbs, and data encoding)'},
      {id:'6.6',text:'Recognize the capabilities of configuration management mechanisms such as Ansible and Terraform'},
      {id:'6.7',text:'Recognize components of JSON-encoded data'}
    ]}
  ];

  var LEVELS = ['not-started','learning','review','mastered'];
  var LEVEL_LABELS = {'not-started':'Not Started','learning':'Learning','review':'Review','mastered':'Mastered'};
  var LEVEL_WEIGHT = {'not-started':0,'learning':0.33,'review':0.66,'mastered':1};

  var checks = JSON.parse(localStorage.getItem('ccna_obj_checks')||'{}');
  var confidence = JSON.parse(localStorage.getItem('ccna_obj_confidence')||'{}');

  function save(){
    localStorage.setItem('ccna_obj_checks',JSON.stringify(checks));
    localStorage.setItem('ccna_obj_confidence',JSON.stringify(confidence));
  }

  function getLevel(id){ return confidence[id]||'not-started'; }

  function calcDomainProgress(domain){
    var total=0, sum=0;
    domain.subs.forEach(function(s){
      total++;
      sum += LEVEL_WEIGHT[getLevel(s.id)];
    });
    return total ? Math.round(sum/total*100) : 0;
  }

  function calcTotalProgress(){
    var totalWeight=0, weightedSum=0;
    DOMAINS.forEach(function(d){
      var pct = calcDomainProgress(d);
      weightedSum += pct * d.weight;
      totalWeight += d.weight;
    });
    return totalWeight ? Math.round(weightedSum/totalWeight) : 0;
  }

  function countByLevel(){
    var counts={'not-started':0,'learning':0,'review':0,'mastered':0};
    DOMAINS.forEach(function(d){
      d.subs.forEach(function(s){
        counts[getLevel(s.id)]++;
      });
    });
    return counts;
  }

  function updateReadiness(){
    var pct = calcTotalProgress();
    document.getElementById('totalPct').textContent = pct+'%';
    document.getElementById('totalFill').style.width = pct+'%';
    var c = countByLevel();
    var total = c['not-started']+c['learning']+c['review']+c['mastered'];
    document.getElementById('totalStats').innerHTML =
      '<span class="readiness-stat"><strong>'+total+'</strong> objectives</span>'+
      '<span class="readiness-stat"><strong>'+c['mastered']+'</strong> mastered</span>'+
      '<span class="readiness-stat"><strong>'+c['review']+'</strong> review</span>'+
      '<span class="readiness-stat"><strong>'+c['learning']+'</strong> learning</span>'+
      '<span class="readiness-stat"><strong>'+c['not-started']+'</strong> not started</span>';

    // Update each domain bar
    DOMAINS.forEach(function(d){
      var dp = calcDomainProgress(d);
      var fill = document.getElementById('dfill-'+d.id);
      var label = document.getElementById('dpct-'+d.id);
      if(fill) fill.style.width = dp+'%';
      if(label) label.textContent = dp+'%';
    });
  }

  // Render domains
  var container = document.getElementById('domainsContainer');
  DOMAINS.forEach(function(d){
    var div = document.createElement('div');
    div.className = 'domain';
    div.innerHTML =
      '<div class="domain-header" data-domain="'+d.id+'">'+
        '<span class="domain-num">'+d.id+'</span>'+
        '<div class="domain-info">'+
          '<div class="domain-title">'+d.name+'</div>'+
          '<div class="domain-weight">'+d.weight+'% of exam</div>'+
        '</div>'+
        '<div class="domain-progress">'+
          '<div class="domain-bar"><div class="domain-fill" id="dfill-'+d.id+'" style="width:0%"></div></div>'+
          '<span class="domain-pct" id="dpct-'+d.id+'">0%</span>'+
        '</div>'+
        '<span class="domain-arrow">&#9662;</span>'+
      '</div>'+
      '<div class="objectives"><div class="objectives-inner">'+
        d.subs.map(function(s){
          var lvl = getLevel(s.id);
          var chk = checks[s.id] ? ' checked' : '';
          var studyLink = s.link ? '<a class="obj-study" href="'+s.link+'">Study This</a>' : '';
          return '<div class="objective">'+
            '<input type="checkbox" class="obj-check" data-id="'+s.id+'"'+chk+'>'+
            '<span class="obj-id">'+s.id+'</span>'+
            '<span class="obj-text">'+s.text+'</span>'+
            '<button class="obj-confidence" data-id="'+s.id+'" data-level="'+lvl+'">'+LEVEL_LABELS[lvl]+'</button>'+
            studyLink+
          '</div>';
        }).join('')+
      '</div></div>';
    container.appendChild(div);
  });

  // Accordion toggle
  container.addEventListener('click', function(e){
    var header = e.target.closest('.domain-header');
    if(header){
      header.parentElement.classList.toggle('open');
    }
  });

  // Checkbox toggle
  container.addEventListener('change', function(e){
    if(e.target.classList.contains('obj-check')){
      var id = e.target.getAttribute('data-id');
      checks[id] = e.target.checked;
      // Auto-set confidence to mastered if checked and currently not-started
      if(e.target.checked && getLevel(id)==='not-started'){
        confidence[id] = 'mastered';
        var btn = container.querySelector('.obj-confidence[data-id="'+id+'"]');
        if(btn){ btn.setAttribute('data-level','mastered'); btn.textContent='Mastered'; }
      }
      save();
      updateReadiness();
    }
  });

  // Confidence popup
  var popup = document.createElement('div');
  popup.className = 'conf-popup';
  popup.innerHTML = LEVELS.map(function(l){
    return '<button class="conf-opt" data-val="'+l+'">'+LEVEL_LABELS[l]+'</button>';
  }).join('');
  document.body.appendChild(popup);

  var activeConfBtn = null;

  container.addEventListener('click', function(e){
    var btn = e.target.closest('.obj-confidence');
    if(!btn) return;
    e.stopPropagation();
    activeConfBtn = btn;
    var rect = btn.getBoundingClientRect();
    popup.style.top = (rect.bottom + window.scrollY + 4)+'px';
    popup.style.left = (rect.left + window.scrollX)+'px';
    popup.classList.add('show');
  });

  popup.addEventListener('click', function(e){
    var opt = e.target.closest('.conf-opt');
    if(!opt || !activeConfBtn) return;
    var val = opt.getAttribute('data-val');
    var id = activeConfBtn.getAttribute('data-id');
    confidence[id] = val;
    activeConfBtn.setAttribute('data-level', val);
    activeConfBtn.textContent = LEVEL_LABELS[val];
    // Auto-check if mastered
    if(val==='mastered'){
      var chk = container.querySelector('.obj-check[data-id="'+id+'"]');
      if(chk && !chk.checked){ chk.checked=true; checks[id]=true; }
    }
    save();
    updateReadiness();
    popup.classList.remove('show');
    activeConfBtn = null;
  });

  document.addEventListener('click', function(){
    popup.classList.remove('show');
    activeConfBtn = null;
  });

  // Open first domain by default
  var first = container.querySelector('.domain');
  if(first) first.classList.add('open');

  updateReadiness();
})();

});</script>
</body>
</html>
