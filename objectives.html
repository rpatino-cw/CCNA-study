<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCNA 200-301 — Objective Sheet</title>
  <meta name="color-scheme" content="light">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* ── Objective Sheet Layout ─────────────────────────── */

    .obj-stats-strip {
      display: flex;
      gap: var(--s-xl);
      padding: var(--s-lg) 0;
      border-bottom: 1px solid var(--rule);
      margin-bottom: var(--s-xl);
      flex-wrap: wrap;
    }

    .obj-stats-strip .stat .value {
      font-size: 1.6rem;
    }

    /* ── Domain sections ───────────────────────────────── */

    .domain {
      margin-bottom: var(--s-2xl);
    }

    .domain-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      cursor: pointer;
      padding: var(--s-md) 0;
      border-bottom: 2px solid var(--ink);
      margin-bottom: 0;
      user-select: none;
      gap: var(--s-md);
    }

    .domain-header:hover .domain-title {
      color: var(--accent);
    }

    .domain-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: color var(--transition);
    }

    .domain-title .num {
      color: var(--ink-muted);
      font-weight: 400;
      margin-right: 6px;
    }

    .domain-meta {
      display: flex;
      align-items: center;
      gap: var(--s-md);
      flex-shrink: 0;
    }

    .domain-weight {
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .domain-progress-mini {
      width: 80px;
      height: 4px;
      background: var(--bg-recessed);
      border-radius: 2px;
      overflow: hidden;
    }

    .domain-progress-mini .fill {
      height: 100%;
      border-radius: 2px;
      background: var(--prof-strong);
      transition: width 0.4s var(--ease-out);
    }

    .domain-chevron {
      font-size: 0.7rem;
      color: var(--ink-muted);
      transition: transform 0.2s var(--ease-out);
    }

    .domain.open .domain-chevron {
      transform: rotate(90deg);
    }

    .domain-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s var(--ease-out);
    }

    .domain.open .domain-body {
      grid-template-rows: 1fr;
    }

    .domain-body-inner {
      overflow: hidden;
    }

    /* ── Objective rows ────────────────────────────────── */

    .obj-row {
      border-bottom: 1px solid var(--border);
    }

    .obj-trigger {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 14px 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--ink);
      line-height: 1.5;
      gap: var(--s-md);
      transition: background var(--transition);
    }

    .obj-trigger:hover {
      background: var(--bg-recessed);
      margin: 0 calc(-1 * var(--s-md));
      padding-left: var(--s-md);
      padding-right: var(--s-md);
    }

    .obj-id {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink-muted);
      min-width: 36px;
      flex-shrink: 0;
    }

    .obj-name {
      flex: 1;
    }

    .obj-proficiency {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .obj-proficiency.green { background: var(--prof-strong); }
    .obj-proficiency.yellow { background: var(--prof-mid); }
    .obj-proficiency.red { background: var(--prof-weak); }

    .obj-quiz-score {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-muted);
      min-width: 32px;
      text-align: right;
      flex-shrink: 0;
    }

    .obj-expand-icon {
      font-size: 0.65rem;
      color: var(--ink-muted);
      transition: transform 0.2s var(--ease-out);
      flex-shrink: 0;
    }

    .obj-row.open .obj-expand-icon {
      transform: rotate(90deg);
    }

    /* ── Expanded objective panel ──────────────────────── */

    .obj-panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s var(--ease-out);
    }

    .obj-row.open .obj-panel {
      grid-template-rows: 1fr;
    }

    .obj-panel-inner {
      overflow: hidden;
    }

    .obj-panel-content {
      padding: var(--s-lg) 0 var(--s-xl);
      border-left: 3px solid var(--accent);
      margin-left: 17px;
      padding-left: var(--s-lg);
    }

    /* ── Tabs ──────────────────────────────────────────── */

    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--s-lg);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: color var(--transition), border-color var(--transition);
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--ink); }

    .tab-btn.active {
      color: var(--ink);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Stats gauges ─────────────────────────────────── */

    .gauge-row {
      display: flex;
      align-items: center;
      gap: var(--s-md);
      margin-bottom: var(--s-md);
    }

    .gauge-label {
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-secondary);
      min-width: 120px;
      flex-shrink: 0;
    }

    .gauge-track {
      flex: 1;
      height: 8px;
      background: var(--bg-recessed);
      border-radius: 4px;
      overflow: hidden;
      max-width: 200px;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s var(--ease-out);
    }

    .gauge-fill.low { background: var(--prof-strong); }
    .gauge-fill.mid { background: var(--prof-mid); }
    .gauge-fill.high { background: var(--prof-weak); }

    .gauge-value {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-muted);
      min-width: 32px;
    }

    /* ── Cheat sheet ──────────────────────────────────── */

    .cheat-sheet {
      background: var(--bg-recessed);
      border-radius: var(--radius-lg);
      padding: var(--s-lg);
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .cheat-sheet h4 {
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--ink-muted);
      margin-bottom: var(--s-sm);
      margin-top: var(--s-md);
    }

    .cheat-sheet h4:first-child { margin-top: 0; }

    .cheat-sheet ul {
      list-style: none;
      padding: 0;
    }

    .cheat-sheet li {
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
    }

    .cheat-sheet li:last-child { border: none; }

    .cheat-sheet code, .cmd {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1px 6px;
      color: var(--accent);
    }

    /* ── Resources list ───────────────────────────────── */

    .resource-item {
      display: flex;
      align-items: flex-start;
      gap: var(--s-md);
      padding: var(--s-md) 0;
      border-bottom: 1px solid var(--border);
    }

    .resource-item:last-child { border: none; }

    .resource-type {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: var(--radius);
      flex-shrink: 0;
      min-width: 52px;
      text-align: center;
    }

    .resource-type.video { background: var(--prof-weak-bg); color: var(--prof-weak); }
    .resource-type.article { background: var(--accent-light); color: var(--accent); }
    .resource-type.lab { background: #F5F3FF; color: #7C3AED; }
    .resource-type.tool { background: var(--prof-strong-bg); color: var(--prof-strong); }

    .resource-info { flex: 1; }

    .resource-title {
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--ink);
    }

    .resource-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color var(--transition);
    }

    .resource-title a:hover { border-color: var(--ink); }

    .resource-desc {
      font-size: 0.82rem;
      color: var(--ink-secondary);
      margin-top: 2px;
    }

    /* ── Prerequisites tree ───────────────────────────── */

    .prereq-list {
      list-style: none;
      padding: 0;
    }

    .prereq-item {
      display: flex;
      align-items: center;
      gap: var(--s-sm);
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .prereq-item:last-child { border: none; }

    .prereq-arrow {
      color: var(--ink-muted);
      font-size: 0.7rem;
    }

    .prereq-name { flex: 1; }

    .prereq-obj {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-muted);
    }

    /* ── Vocab quiz ──────────────────────────────────── */

    .vocab-quiz { }

    .vocab-term {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: var(--s-md);
      color: var(--ink);
    }

    .vocab-term .context {
      display: block;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--ink-muted);
      margin-top: 4px;
    }

    .vocab-options {
      display: flex;
      flex-direction: column;
      gap: var(--s-sm);
      margin-bottom: var(--s-md);
    }

    .vocab-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--ink);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      line-height: 1.5;
    }

    .vocab-option:hover:not(.answered) { border-color: var(--ink); }
    .vocab-option.correct { border-color: var(--prof-strong); background: var(--prof-strong-bg); }
    .vocab-option.wrong { border-color: var(--prof-weak); background: var(--prof-weak-bg); }

    .vocab-feedback {
      padding: var(--s-md);
      border-radius: var(--radius);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: var(--s-md);
    }

    .vocab-feedback.correct { background: var(--prof-strong-bg); border-left: 3px solid var(--prof-strong); }
    .vocab-feedback.wrong { background: var(--prof-weak-bg); border-left: 3px solid var(--prof-weak); }

    .vocab-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .vocab-progress {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--ink-muted);
    }

    /* ── Why section ──────────────────────────────────── */

    .why-section {
      font-size: 0.92rem;
      line-height: 1.75;
    }

    .why-section .cisco-intent {
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: var(--s-xs);
    }

    /* ── Proficiency toggle ──────────────────────────── */

    .prof-toggle {
      display: flex;
      gap: var(--s-xs);
      margin-top: var(--s-md);
    }

    .prof-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color var(--transition), transform var(--transition);
    }

    .prof-btn:hover { transform: scale(1.15); }
    .prof-btn.g { background: var(--prof-strong); }
    .prof-btn.y { background: var(--prof-mid); }
    .prof-btn.r { background: var(--prof-weak); }
    .prof-btn.active { border-color: var(--ink); transform: scale(1.15); }

    /* ── Filter bar ──────────────────────────────────── */

    .filter-bar {
      display: flex;
      gap: var(--s-sm);
      margin-bottom: var(--s-lg);
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar label {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--ink-muted);
      margin-right: var(--s-sm);
    }

    .filter-chip {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--ink-secondary);
      cursor: pointer;
      transition: all var(--transition);
    }

    .filter-chip:hover { border-color: var(--ink); }
    .filter-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    /* ── Parent objective header (non-expandable) ───── */

    .obj-parent-header {
      display: flex;
      align-items: baseline;
      gap: var(--s-md);
      padding: 14px 0 6px;
      border-bottom: 1px solid var(--border-strong);
      margin-top: var(--s-md);
    }

    .obj-parent-header:first-child { margin-top: 0; }

    .obj-parent-id {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 36px;
      flex-shrink: 0;
    }

    .obj-parent-name {
      font-family: var(--font-display);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
    }

    /* ── Sub-objective row (indented) ─────────────── */

    .obj-row.sub {
      padding-left: 20px;
    }

    .obj-row.sub .obj-id {
      min-width: 46px;
      font-size: 0.72rem;
    }

    /* ── Mobile ──────────────────────────────────────── */

    @media (max-width: 700px) {
      .obj-stats-strip { gap: var(--s-lg); }
      .gauge-label { min-width: 90px; font-size: 0.72rem; }
      .gauge-track { max-width: 140px; }
      .obj-panel-content { margin-left: 8px; padding-left: var(--s-md); }
      .tab-btn { padding: 8px 10px; font-size: 0.68rem; }
    }
  </style>
</head>
<body>
  <div class="container-wide">
    <a href="index.html" class="back-link">Dashboard</a>

    <nav class="top-nav">
      <a href="index.html">Dashboard</a>
      <a href="knowledge-map.html">Knowledge Map</a>
      <a href="diagnostic.html">Diagnostic</a>
      <a href="quiz.html">Quiz</a>
      <a href="study.html">Daily Study</a>
      <a href="quests.html">Quests</a>
      <a href="strategy.html">Strategy</a>
      <a href="sprint.html">Sprint</a>
      <a href="labs/index.html">Labs</a>
      <a class="active" href="objectives.html">Objectives</a>
    </nav>

    <header class="page-header">
      <h1>Objective Sheet</h1>
      <p class="subtitle">CCNA 200-301 v1.1 — Every testable concept, quizzable and tracked</p>
    </header>

    <!-- Stats strip -->
    <div class="obj-stats-strip" id="statsStrip">
      <div class="stat">
        <div class="value" id="totalObjectives">—</div>
        <div class="label">Objectives</div>
      </div>
      <div class="stat">
        <div class="value" id="totalTerms">—</div>
        <div class="label">Key Terms</div>
      </div>
      <div class="stat">
        <div class="value text-green" id="greenCount">—</div>
        <div class="label">Confident</div>
      </div>
      <div class="stat">
        <div class="value text-yellow" id="yellowCount">—</div>
        <div class="label">Review</div>
      </div>
      <div class="stat">
        <div class="value text-red" id="redCount">—</div>
        <div class="label">Weak</div>
      </div>
      <div class="stat">
        <div class="value" id="quizAvg">—</div>
        <div class="label">Quiz Avg</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <label>Filter:</label>
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="red">Weak</button>
      <button class="filter-chip" data-filter="yellow">Review</button>
      <button class="filter-chip" data-filter="green">Confident</button>
      <button class="filter-chip" data-filter="configure">Configure & Verify</button>
      <button class="filter-chip" data-filter="describe">Describe & Explain</button>
      <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="resetAllStats()">Reset All Stats</button>
    </div>

    <!-- Domains container -->
    <div id="domainsContainer"></div>

  </div>

  <script src="data/topics-data.js?v=1775577476"></script>
  <script src="data/objectives-app.js?v=1775577476"></script>
</body>
