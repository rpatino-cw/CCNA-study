<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
  <title>Learn Visually — CCNA 200-301</title>
  <meta name="color-scheme" content="light">
  <link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
  <style>
    /* ── Page Layout ───────────────────────────────────────── */
    .page-header { padding: var(--s-md) 0 var(--s-sm); margin-bottom: var(--s-lg); border-bottom: 2px solid var(--ink); }
    .page-header h1 { font-size: 2.4rem; margin-bottom: 4px; }
    .page-header .subtitle { font-family: var(--font-body); color: var(--ink-secondary); font-size: 0.95rem; font-style: italic; }

    /* Domain nav pills */
    .domain-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--s-xl); }
    .domain-pill { font-family: var(--font-display); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--ink-secondary); cursor: pointer; transition: all var(--transition); text-decoration: none; }
    .domain-pill:hover, .domain-pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .domain-pill[data-domain="all"].active { background: var(--ink); }
    .domain-pill[data-domain="1"].active { background: #2563EB; border-color: #2563EB; }
    .domain-pill[data-domain="2"].active { background: #16A34A; border-color: #16A34A; }
    .domain-pill[data-domain="3"].active { background: #D97706; border-color: #D97706; }
    .domain-pill[data-domain="4"].active { background: #7C3AED; border-color: #7C3AED; }
    .domain-pill[data-domain="5"].active { background: #DC2626; border-color: #DC2626; }
    .domain-pill[data-domain="6"].active { background: #0891B2; border-color: #0891B2; }

    /* Visual cards grid */
    .visuals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: var(--s-lg); margin-bottom: var(--s-2xl); }
    @media (max-width: 480px) { .visuals-grid { grid-template-columns: 1fr; } }

    .visual-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color var(--transition), box-shadow var(--transition); }
    .visual-card:hover { border-color: var(--border-strong); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .visual-card.hidden { display: none; }

    .card-domain-bar { height: 3px; }
    .card-domain-bar[data-d="1"] { background: #2563EB; }
    .card-domain-bar[data-d="2"] { background: #16A34A; }
    .card-domain-bar[data-d="3"] { background: #D97706; }
    .card-domain-bar[data-d="4"] { background: #7C3AED; }
    .card-domain-bar[data-d="5"] { background: #DC2626; }
    .card-domain-bar[data-d="6"] { background: #0891B2; }

    .card-label { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 0; }
    .card-label .domain-tag { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; }
    .card-label .domain-tag[data-d="1"] { background: #EFF6FF; color: #2563EB; }
    .card-label .domain-tag[data-d="2"] { background: #F0FDF4; color: #16A34A; }
    .card-label .domain-tag[data-d="3"] { background: #FFFBEB; color: #D97706; }
    .card-label .domain-tag[data-d="4"] { background: #F5F3FF; color: #7C3AED; }
    .card-label .domain-tag[data-d="5"] { background: #FEF2F2; color: #DC2626; }
    .card-label .domain-tag[data-d="6"] { background: #ECFEFF; color: #0891B2; }
    .card-label .deep-dive { font-family: var(--font-display); font-size: 0.72rem; color: var(--accent); text-decoration: none; font-weight: 600; letter-spacing: 0.02em; }
    .card-label .deep-dive:hover { text-decoration: underline; }

    .card-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; padding: 8px 16px 4px; color: var(--ink); letter-spacing: -0.01em; }
    .card-desc { font-family: var(--font-body); font-size: 0.82rem; color: var(--ink-secondary); padding: 0 16px 12px; line-height: 1.5; }

    .card-svg { padding: 8px 12px 16px; display: flex; justify-content: center; }
    .card-svg svg { width: 100%; height: auto; }

    /* SVG shared styles */
    svg text { font-family: 'Space Grotesk', system-ui, sans-serif; }
    svg .layer-label { font-size: 11px; font-weight: 700; fill: #fff; letter-spacing: 0.5px; }
    svg .layer-sub { font-size: 8.5px; fill: rgba(255,255,255,0.8); }
    svg .anno { font-size: 9px; fill: var(--ink-secondary, #57534E); font-weight: 500; }
    svg .anno-bold { font-size: 9px; fill: var(--ink, #1C1917); font-weight: 700; }
    svg .pkt-label { font-size: 8px; font-weight: 700; fill: #fff; letter-spacing: 0.3px; }
    svg .dim-text { font-size: 8px; fill: #A8A29E; }
    svg .cmd-text { font-size: 8.5px; fill: #B45309; font-family: 'JetBrains Mono', monospace; font-weight: 500; }

    /* Interactive: hover highlight */
    svg .hover-group { cursor: pointer; }
    svg .hover-group:hover rect, svg .hover-group:hover circle { filter: brightness(1.15); }
    svg .hover-group:hover .layer-sub { fill: #fff; }

    /* Packet animation */
    @keyframes packetMove { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
    .pkt-anim { animation: packetMove 3s ease-in-out infinite; }

    /* Pulse for interactive hints */
    @keyframes subtlePulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    .hint-pulse { animation: subtlePulse 2s ease-in-out infinite; }

    /* Section dividers */
    .domain-section { margin-bottom: var(--s-xl); }
    .domain-section h2 { font-size: 1.15rem; margin-top: 0; margin-bottom: var(--s-md); padding-bottom: var(--s-sm); border-bottom: 1px solid var(--rule); }

    /* Count badge */
    .count-badge { font-family: var(--font-mono); font-size: 0.7rem; color: var(--ink-muted); margin-left: 8px; font-weight: 400; }

    /* Proficiency badges */
    .prof-badge{font-family:var(--font-mono);font-size:.55rem;font-weight:700;padding:2px 6px;border-radius:8px;margin-left:auto}
    .prof-badge.weak{background:rgba(220,38,38,.1);color:#DC2626}
    .prof-badge.mid{background:rgba(217,119,6,.1);color:#D97706}
    .prof-badge.strong{background:rgba(22,163,74,.1);color:#16A34A}
    .prof-badge.none{background:var(--bg-recessed);color:var(--ink-muted)}

    /* Domain section headers */
    .domain-header{display:flex;align-items:baseline;gap:8px;margin-bottom:var(--s-md);padding-bottom:var(--s-sm);border-bottom:1px solid var(--rule)}
    .domain-header h2{font-family:var(--font-display);font-size:1.1rem;font-weight:700;margin:0}
    .domain-header .weight-tag{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted)}
    .domain-section{margin-bottom:var(--s-xl)}

    /* Card action row */
    .card-actions{display:flex;gap:6px;padding:0 16px 12px}
    .card-action{font-family:var(--font-display);font-size:.68rem;font-weight:600;padding:4px 10px;border-radius:4px;text-decoration:none;cursor:pointer;border:1px solid var(--border);background:var(--bg-surface);color:var(--ink-muted);transition:all .15s}
    .card-action:hover{border-color:var(--accent);color:var(--accent)}
    .card-action.quiz-link{color:var(--accent);border-color:var(--accent)}
    .card-action.quiz-link:hover{background:var(--accent);color:#fff}

    /* Groups */
    .visual-group{margin-bottom:var(--s-md)}
    .visual-group summary{font-family:var(--font-display);font-size:.82rem;font-weight:700;color:var(--ink-secondary);cursor:pointer;padding:8px 12px;background:var(--bg-recessed);border-radius:var(--radius);margin-bottom:var(--s-sm);list-style:none;display:flex;align-items:center;gap:6px}
    .visual-group summary::-webkit-details-marker{display:none}
    .visual-group summary::before{content:'\\25B6';font-size:.6rem;color:var(--ink-muted);transition:transform .2s}
    .visual-group[open] summary::before{transform:rotate(90deg)}

    /* Search */
    .search-row{display:flex;gap:12px;align-items:center;margin-bottom:var(--s-md)}
    .search-input{flex:1;padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.85rem;background:var(--bg-surface);color:var(--ink);outline:none}
    .search-input:focus{border-color:var(--accent)}
    .search-count{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted)}

    /* Check modal */
    .check-overlay{position:fixed;inset:0;z-index:9500;background:rgba(28,25,23,.5);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .check-overlay.open{opacity:1;pointer-events:auto}
    .check-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);width:420px;max-width:90vw;max-height:80vh;overflow-y:auto;padding:24px}
    .check-box h3{font-family:var(--font-display);font-size:1rem;margin-bottom:4px}
    .check-box .check-topic{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted);margin-bottom:16px}
    .check-box .check-q{font-family:var(--font-body);font-size:.92rem;color:var(--ink);line-height:1.55;margin-bottom:14px}
    .check-opts{display:flex;flex-direction:column;gap:6px}
    .check-opt{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.85rem;cursor:pointer;transition:all .15s;text-align:left;background:var(--bg-surface);color:var(--ink)}
    .check-opt:hover:not(.locked){border-color:var(--ink)}
    .check-opt.correct{border-color:#16A34A;background:rgba(22,163,74,.08);color:#16A34A}
    .check-opt.wrong{border-color:#DC2626;background:rgba(220,38,38,.08);color:#DC2626}
    .check-opt.locked{cursor:default;opacity:.6}
    .check-explain{font-family:var(--font-body);font-size:.82rem;color:var(--ink-secondary);line-height:1.5;margin-top:12px;padding:10px;background:var(--bg-recessed);border-radius:var(--radius);display:none}
    .check-close{font-family:var(--font-display);font-size:.78rem;padding:8px 20px;background:var(--ink);color:var(--bg);border:none;border-radius:var(--radius);cursor:pointer;margin-top:12px;display:none}

    @media (prefers-reduced-motion: reduce) {
      .pkt-anim, .hint-pulse { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container-wide">
    <nav class="top-nav" id="main-nav"></nav>

    <header class="page-header">
      <h1>Learn Visually</h1>
      <p class="subtitle">Every concept drawn, not described. Network topologies, protocol flows, frame structures, and architecture maps.</p>
    </header>

    <!-- Search -->
    <div class="search-row">
      <input type="text" class="search-input" id="searchInput" placeholder="Search visuals..." autocomplete="off">
      <span class="search-count" id="searchCount"></span>
    </div>

    <!-- Domain filter pills -->
    <div class="domain-nav" id="domainNav">
      <button class="domain-pill" data-domain="weak">Needs Work</button>
      <button class="domain-pill active" data-domain="all">All</button>
      <button class="domain-pill" data-domain="1">1 &middot; Fundamentals</button>
      <button class="domain-pill" data-domain="2">2 &middot; Access</button>
      <button class="domain-pill" data-domain="3">3 &middot; Connectivity</button>
      <button class="domain-pill" data-domain="4">4 &middot; Services</button>
      <button class="domain-pill" data-domain="5">5 &middot; Security</button>
      <button class="domain-pill" data-domain="6">6 &middot; Automation</button>
    </div>

    <div id="visualsGrid"></div>
  </div>

  <!-- Check Yourself Modal -->
  <div class="check-overlay" id="checkOverlay">
    <div class="check-box" id="checkBox"></div>
  </div>

  <script defer src="js/nav.js"></script>
  <script defer src="js/group-chat.js?v=4"></script>
  <script defer src="data/visuals-data.js"></script>
  <script defer src="js/store.js"></script>
  <script defer src="data/topics-data.js"></script>
  <script defer src="data/questions-data.js"></script>
  <script defer src="data/questions-extra.js"></script>
  <script>document.addEventListener('DOMContentLoaded',function(){

  (function(){
    var allCards=window.visualsData||[];
    var isNetPlus=localStorage.getItem('ccna_cert_track')==='net+';
    var DOMAIN_COLORS={'1':'#2563EB','2':'#16A34A','3':'#D97706','4':'#7C3AED','5':'#DC2626','6':'#0891B2'};
    var DOMAIN_ORDER=['3','1','2','5','4','6']; // by exam weight desc
    var DOMAIN_WEIGHTS={'1':'20','2':'20','3':'25','4':'10','5':'15','6':'10'};
    var DOMAIN_NAMES={'1':'Network Fundamentals','2':'Network Access','3':'IP Connectivity','4':'IP Services','5':'Security Fundamentals','6':'Automation'};
    var GROUP_NAMES={'network-models':'Network Models','transport':'Transport Layer','ip-addressing':'IP Addressing','ipv6':'IPv6','poe':'Power over Ethernet','dhcp-dns':'DHCP & DNS','wireless':'Wireless','l2-security':'Layer 2 Security'};
    var activeFilter='all', searchQuery='';

    // Init proficiency
    if(window.store&&window.topicsData)store.initProficiency(window.topicsData);

    // Build question lookup: topic -> questions[]
    var qBank=[];
    try{
      var qd=window.questionsData;qBank=Array.isArray(qd)?qd:(qd.questions||[]);
      if(window.questionsExtra)qBank=qBank.concat(window.questionsExtra);
    }catch(e){}
    var qByTopic={};
    qBank.forEach(function(q){if(!qByTopic[q.topic])qByTopic[q.topic]=[];qByTopic[q.topic].push(q);});

    // Net+ subtitle
    if(isNetPlus)document.querySelector('.page-header .subtitle').textContent='Network+ relevant diagrams highlighted. CCNA-only automation diagrams dimmed.';

    // ── Proficiency helpers ──────────────────────────────────
    function getProf(topic){
      if(!window.store)return-1;
      var p=store.getAllProficiency();
      return p[topic]!==undefined?p[topic]:-1;
    }
    function profBadge(topic){
      var p=getProf(topic);
      if(p<0)return'<span class="prof-badge none">Not Started</span>';
      var pct=Math.round(p*100);
      if(p<0.4)return'<span class="prof-badge weak">'+pct+'%</span>';
      if(p<0.7)return'<span class="prof-badge mid">'+pct+'%</span>';
      return'<span class="prof-badge strong">'+pct+'%</span>';
    }

    // ── Card HTML builder ────────────────────────────────────
    function cardHtml(c){
      var hasQ=qByTopic[c.topic]&&qByTopic[c.topic].length>0;
      var np=isNetPlus&&c.domain==='6';
      return'<div class="visual-card'+(np?' ccna-only':'')+'" data-domain="'+c.domain+'" data-topic="'+c.topic+'"'+(np?' style="opacity:.55;pointer-events:none"':'')+'>'+
        '<div class="card-domain-bar" data-d="'+c.domain+'"></div>'+
        '<div class="card-label">'+
          '<span class="domain-tag" data-d="'+c.domain+'">D'+c.domain+'</span>'+
          profBadge(c.topic)+
          (c.deepDive?'<a href="'+c.deepDive+'" class="deep-dive">Deep Dive ></a>':'')+
          (np?'<span style="font-family:var(--font-mono);font-size:.55rem;color:var(--ink-muted)">CCNA ONLY</span>':'')+
        '</div>'+
        '<div class="card-title">'+c.title+'</div>'+
        '<div class="card-desc">'+c.desc+'</div>'+
        '<div class="card-svg">'+c.svg+'</div>'+
        '<div class="card-actions">'+
          '<a class="card-action quiz-link" href="quiz.html?topic='+c.topic+'">Quiz '+c.topic+'</a>'+
          (hasQ?'<button class="card-action" onclick="openCheck(\''+c.topic+'\',\''+c.title.replace(/'/g,"\\'")+'\')">Check Yourself</button>':'')+
        '</div>'+
      '</div>';
    }

    // ── Render ────────────────────────────────────────────────
    function render(){
      var grid=document.getElementById('visualsGrid');
      var filtered=allCards.slice();

      // Search filter
      if(searchQuery){
        var q=searchQuery.toLowerCase();
        filtered=filtered.filter(function(c){return c.title.toLowerCase().indexOf(q)>=0||c.desc.toLowerCase().indexOf(q)>=0;});
      }

      // Domain / weak filter
      if(activeFilter==='weak'){
        filtered=filtered.filter(function(c){var p=getProf(c.topic);return p<0.4;});
      }else if(activeFilter!=='all'){
        filtered=filtered.filter(function(c){return c.domain===activeFilter;});
      }

      // Update count
      document.getElementById('searchCount').textContent='Showing '+filtered.length+' of '+allCards.length+' visuals';

      // Group by domain, sorted by exam weight
      var byDomain={};
      filtered.forEach(function(c){if(!byDomain[c.domain])byDomain[c.domain]=[];byDomain[c.domain].push(c);});

      var html='';
      DOMAIN_ORDER.forEach(function(d){
        var cards=byDomain[d];
        if(!cards||cards.length===0)return;

        // Sort by proficiency ascending (weakest first)
        cards.sort(function(a,b){return getProf(a.topic)-getProf(b.topic);});

        html+='<div class="domain-section">';
        html+='<div class="domain-header"><h2 style="color:'+DOMAIN_COLORS[d]+'">Domain '+d+' — '+DOMAIN_NAMES[d]+'</h2><span class="weight-tag">'+DOMAIN_WEIGHTS[d]+'% of exam</span></div>';

        // Group cards within domain
        var grouped={}, ungrouped=[];
        cards.forEach(function(c){
          if(c.group&&GROUP_NAMES[c.group]){
            if(!grouped[c.group])grouped[c.group]=[];
            grouped[c.group].push(c);
          }else{ungrouped.push(c);}
        });

        // Render groups first
        Object.keys(grouped).forEach(function(g){
          html+='<details class="visual-group" open><summary>'+GROUP_NAMES[g]+' <span class="count-badge">'+grouped[g].length+'</span></summary>';
          html+='<div class="visuals-grid">'+grouped[g].map(cardHtml).join('')+'</div></details>';
        });

        // Then ungrouped
        if(ungrouped.length>0){
          html+='<div class="visuals-grid">'+ungrouped.map(cardHtml).join('')+'</div>';
        }
        html+='</div>';
      });

      if(filtered.length===0)html='<div style="text-align:center;padding:40px;font-family:var(--font-body);color:var(--ink-muted)">No visuals match your filters.</div>';
      grid.innerHTML=html;
    }

    // ── Check Yourself Modal ─────────────────────────────────
    window.openCheck=function(topic,title){
      var qs=qByTopic[topic];
      if(!qs||qs.length===0)return;
      var q=qs[Math.floor(Math.random()*qs.length)];
      var overlay=document.getElementById('checkOverlay');
      var box=document.getElementById('checkBox');
      var opts=q.options.map(function(o,i){
        return'<button class="check-opt" data-idx="'+i+'" onclick="answerCheck(this,'+q.correct+',\''+topic+'\')">'+o+'</button>';
      }).join('');
      box.innerHTML='<h3>'+title+'</h3><div class="check-topic">Topic '+topic+'</div>'+
        '<div class="check-q">'+q.question+'</div>'+
        '<div class="check-opts">'+opts+'</div>'+
        '<div class="check-explain" id="checkExplain">'+q.explanation+'</div>'+
        '<button class="check-close" id="checkClose" onclick="closeCheck()">Got it</button>';
      overlay.classList.add('open');
    };
    window.answerCheck=function(btn,correctIdx,topic){
      if(btn.classList.contains('locked'))return;
      var opts=document.querySelectorAll('.check-opt');
      opts.forEach(function(o){o.classList.add('locked');});
      var idx=parseInt(btn.dataset.idx);
      var isCorrect=idx===correctIdx;
      btn.classList.add(isCorrect?'correct':'wrong');
      opts[correctIdx].classList.add('correct');
      document.getElementById('checkExplain').style.display='block';
      document.getElementById('checkClose').style.display='inline-block';
      // Update proficiency
      if(window.store)store.updateProficiency(topic,isCorrect);
    };
    window.closeCheck=function(){
      document.getElementById('checkOverlay').classList.remove('open');
      render(); // refresh badges
    };
    document.getElementById('checkOverlay').addEventListener('click',function(e){
      if(e.target===this)closeCheck();
    });

    // ── Filters ──────────────────────────────────────────────
    var pills=document.querySelectorAll('.domain-pill');

    // Default: "Needs Work" if user has weak topics, else "All"
    var hasData=window.store&&Object.keys(store.getAllProficiency()).length>0;
    var weakCount=hasData?allCards.filter(function(c){return getProf(c.topic)<0.4;}).length:0;
    if(hasData&&weakCount>0){
      activeFilter='weak';
      pills.forEach(function(p){p.classList.remove('active');if(p.dataset.domain==='weak')p.classList.add('active');});
      // Update weak pill label with count
      pills.forEach(function(p){if(p.dataset.domain==='weak')p.textContent='Needs Work ('+weakCount+')';});
    }

    pills.forEach(function(pill){
      pill.addEventListener('click',function(){
        pills.forEach(function(p){p.classList.remove('active');});
        pill.classList.add('active');
        activeFilter=pill.dataset.domain;
        render();
      });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input',function(e){
      searchQuery=e.target.value.trim();
      render();
    });

    // Initial render
    render();
  })();
  
});</script>
  <script defer src="js/tutor.js"></script>
</body>
</html>
