<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Visually — CCNA 200-301</title>
  <meta name="color-scheme" content="light">
  <link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
  <link rel="stylesheet" href="css/shared.css">
  <style>
    /* ── Page Layout ───────────────────────────────────────── */
    .page-header { padding: var(--s-xl) 0 var(--s-lg); margin-bottom: var(--s-lg); border-bottom: 2px solid var(--ink); }
    .page-header h1 { font-size: 2.4rem; margin-bottom: 4px; }
    .page-header .subtitle { font-family: var(--font-body); color: var(--ink-secondary); font-size: 0.95rem; font-style: italic; }

    /* Domain nav pills */
    .domain-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--s-xl); }
    .domain-pill { font-family: var(--font-display); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--ink-secondary); cursor: pointer; transition: all var(--transition); text-decoration: none; }
    .domain-pill:hover, .domain-pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .domain-pill[data-domain="all"].active { background: var(--ink); }
    .domain-pill[data-domain="1"].active { background: #2563EB; border-color: #2563EB; }
    .domain-pill[data-domain="2"].active { background: #16A34A; border-color: #16A34A; }
    .domain-pill[data-domain="3"].active { background: #D97706; border-color: #D97706; }
    .domain-pill[data-domain="4"].active { background: #7C3AED; border-color: #7C3AED; }
    .domain-pill[data-domain="5"].active { background: #DC2626; border-color: #DC2626; }
    .domain-pill[data-domain="6"].active { background: #0891B2; border-color: #0891B2; }

    /* Visual cards grid */
    .visuals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: var(--s-lg); margin-bottom: var(--s-2xl); }
    @media (max-width: 480px) { .visuals-grid { grid-template-columns: 1fr; } }

    .visual-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color var(--transition), box-shadow var(--transition); }
    .visual-card:hover { border-color: var(--border-strong); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .visual-card.hidden { display: none; }

    .card-domain-bar { height: 3px; }
    .card-domain-bar[data-d="1"] { background: #2563EB; }
    .card-domain-bar[data-d="2"] { background: #16A34A; }
    .card-domain-bar[data-d="3"] { background: #D97706; }
    .card-domain-bar[data-d="4"] { background: #7C3AED; }
    .card-domain-bar[data-d="5"] { background: #DC2626; }
    .card-domain-bar[data-d="6"] { background: #0891B2; }

    .card-label { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 0; }
    .card-label .domain-tag { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; }
    .card-label .domain-tag[data-d="1"] { background: #EFF6FF; color: #2563EB; }
    .card-label .domain-tag[data-d="2"] { background: #F0FDF4; color: #16A34A; }
    .card-label .domain-tag[data-d="3"] { background: #FFFBEB; color: #D97706; }
    .card-label .domain-tag[data-d="4"] { background: #F5F3FF; color: #7C3AED; }
    .card-label .domain-tag[data-d="5"] { background: #FEF2F2; color: #DC2626; }
    .card-label .domain-tag[data-d="6"] { background: #ECFEFF; color: #0891B2; }
    .card-label .deep-dive { font-family: var(--font-display); font-size: 0.72rem; color: var(--accent); text-decoration: none; font-weight: 600; letter-spacing: 0.02em; }
    .card-label .deep-dive:hover { text-decoration: underline; }

    .card-title { font-family: var(--font-display); font-size: 1rem; font-weight: 700; padding: 8px 16px 4px; color: var(--ink); letter-spacing: -0.01em; }
    .card-desc { font-family: var(--font-body); font-size: 0.82rem; color: var(--ink-secondary); padding: 0 16px 12px; line-height: 1.5; }

    .card-svg { padding: 8px 12px 16px; display: flex; justify-content: center; }
    .card-svg svg { width: 100%; height: auto; }

    /* SVG shared styles */
    svg text { font-family: 'Space Grotesk', system-ui, sans-serif; }
    svg .layer-label { font-size: 11px; font-weight: 700; fill: #fff; letter-spacing: 0.5px; }
    svg .layer-sub { font-size: 8.5px; fill: rgba(255,255,255,0.8); }
    svg .anno { font-size: 9px; fill: var(--ink-secondary, #57534E); font-weight: 500; }
    svg .anno-bold { font-size: 9px; fill: var(--ink, #1C1917); font-weight: 700; }
    svg .pkt-label { font-size: 8px; font-weight: 700; fill: #fff; letter-spacing: 0.3px; }
    svg .dim-text { font-size: 8px; fill: #A8A29E; }
    svg .cmd-text { font-size: 8.5px; fill: #B45309; font-family: 'JetBrains Mono', monospace; font-weight: 500; }

    /* Interactive: hover highlight */
    svg .hover-group { cursor: pointer; }
    svg .hover-group:hover rect, svg .hover-group:hover circle { filter: brightness(1.15); }
    svg .hover-group:hover .layer-sub { fill: #fff; }

    /* Packet animation */
    @keyframes packetMove { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
    .pkt-anim { animation: packetMove 3s ease-in-out infinite; }

    /* Pulse for interactive hints */
    @keyframes subtlePulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    .hint-pulse { animation: subtlePulse 2s ease-in-out infinite; }

    /* Section dividers */
    .domain-section { margin-bottom: var(--s-xl); }
    .domain-section h2 { font-size: 1.15rem; margin-top: 0; margin-bottom: var(--s-md); padding-bottom: var(--s-sm); border-bottom: 1px solid var(--rule); }

    /* Count badge */
    .count-badge { font-family: var(--font-mono); font-size: 0.7rem; color: var(--ink-muted); margin-left: 8px; font-weight: 400; }

    @media (prefers-reduced-motion: reduce) {
      .pkt-anim, .hint-pulse { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container-wide">
    <nav class="top-nav" id="main-nav"></nav>

    <header class="page-header">
      <h1>Learn Visually</h1>
      <p class="subtitle">Every concept drawn, not described. Network topologies, protocol flows, frame structures, and architecture maps.</p>
    </header>

    <!-- Domain filter pills -->
    <div class="domain-nav" id="domainNav">
      <button class="domain-pill active" data-domain="all">All</button>
      <button class="domain-pill" data-domain="1">1 &middot; Fundamentals</button>
      <button class="domain-pill" data-domain="2">2 &middot; Access</button>
      <button class="domain-pill" data-domain="3">3 &middot; Connectivity</button>
      <button class="domain-pill" data-domain="4">4 &middot; Services</button>
      <button class="domain-pill" data-domain="5">5 &middot; Security</button>
      <button class="domain-pill" data-domain="6">6 &middot; Automation</button>
    </div>

    <div class="visuals-grid" id="visualsGrid"></div>
  </div>

  <script src="js/nav.js"></script>
<script src="js/group-chat.js"></script>
  <script src="data/visuals-data.js"></script>
  <script src="js/store.js"></script>
  <script src="data/topics-data.js"></script>
  <script>
    // Render cards from data
    function renderCards(filter) {
      var grid = document.getElementById('visualsGrid');
      var cards = window.visualsData || [];
      if (filter && filter !== 'all') cards = cards.filter(function(c) { return c.domain === filter; });
      grid.innerHTML = cards.map(function(c) {
        return '<div class="visual-card" data-domain="' + c.domain + '" data-topic="' + c.topic + '">' +
          '<div class="card-domain-bar" data-d="' + c.domain + '"></div>' +
          '<div class="card-label"><span class="domain-tag" data-d="' + c.domain + '">Domain ' + c.domain + '</span>' +
          (c.deepDive ? '<a href="' + c.deepDive + '" class="deep-dive">Deep Dive ></a>' : '') +
          '</div>' +
          '<div class="card-title">' + c.title + '</div>' +
          '<div class="card-desc">' + c.desc + '</div>' +
          '<div class="card-svg">' + c.svg + '</div>' +
          '</div>';
      }).join('');
    }

    // Initial render
    renderCards('all');

    // Domain filter logic
    var nav = document.getElementById('domainNav');
    var pills = nav.querySelectorAll('.domain-pill');
    var isNetPlus = localStorage.getItem('ccna_cert_track') === 'net+';

    // Net+ cert awareness
    if (isNetPlus) {
      document.querySelector('.page-header .subtitle').textContent = 'Network+ relevant diagrams highlighted. CCNA-only automation diagrams dimmed.';
    }

    function applyNetPlusStyles() {
      if (!isNetPlus) return;
      var grid = document.getElementById('visualsGrid');
      var allCards = grid.querySelectorAll('.visual-card');
      allCards.forEach(function(card) {
        if (card.dataset.domain === '6') {
          card.style.opacity = '.25';
          card.style.pointerEvents = 'none';
          var label = card.querySelector('.card-label');
          if (label && !label.querySelector('.netplus-tag')) {
            label.insertAdjacentHTML('beforeend', '<span class="netplus-tag" style="font-family:var(--font-mono);font-size:.55rem;color:var(--ink-muted)">CCNA ONLY</span>');
          }
        } else {
          card.style.borderLeft = '3px solid #7C3AED';
        }
      });
    }
    applyNetPlusStyles();

    pills.forEach(function(pill) {
      pill.addEventListener('click', function() {
        pills.forEach(function(p) { p.classList.remove('active'); });
        pill.classList.add('active');
        var domain = pill.dataset.domain;
        renderCards(domain);
        applyNetPlusStyles();
      });
    });
  </script>
<script src="js/tutor.js"></script>
</body>
</html>
