<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<title>Network Lab — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CCNA Lab 5">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
/* Hide shared chrome — immersive page */
.beta-badge,.beta-badge *,#guidePill,.gc-bar,.gc-chat-panel{display:none!important}

/* ── Layout ─────────────────────────────────────────── */
.lab-page { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.lab-page nav.top-nav { flex-shrink: 0; margin-bottom: 0; }

.lab-selector {
  flex-shrink: 0;
  padding: 16px var(--s-lg);
  border-bottom: 1px solid var(--rule);
  background: var(--bg);
  display: none;
}
.lab-selector.visible { display: block; }
.lab-selector h1 { font-size: 1.6rem; margin-bottom: 8px; }
.lab-cards { display: flex; gap: 10px; flex-wrap: wrap; }
.lab-card-sel {
  font-family: var(--font-display);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--bg-surface);
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; gap: 8px;
}
.lab-card-sel:hover { border-color: var(--border-strong); background: var(--bg-hover); }
.lab-card-sel.active { border-color: var(--ink); background: var(--ink); color: var(--bg); }
.lab-card-sel .lab-diff-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.lab-card-sel .lab-diff-dot.beginner { background: var(--prof-strong); }
.lab-card-sel .lab-diff-dot.medium { background: var(--prof-mid); }
.lab-card-sel .lab-diff-dot.hard { background: var(--prof-weak); }
.lab-card-sel .lab-complete-mark { color: var(--prof-strong); font-weight: 700; display: none; }
.lab-card-sel.completed .lab-complete-mark { display: inline; }

/* ── Bug Hunt badge ───────────────────────────────── */
.lab-card-sel .bughunt-badge {
  font-size: 0.58rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.08em; padding: 2px 6px; border-radius: 3px;
  background: #DC2626; color: #fff; flex-shrink: 0;
}
.lab-card-sel.active .bughunt-badge { background: #fff; color: #DC2626; }

/* ── Bug Hunt timer ───────────────────────────────── */
.bughunt-timer {
  display: none; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 1.1rem; font-weight: 700;
  color: var(--ink); padding: 6px 14px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.bughunt-timer.active { display: flex; }
.bughunt-timer .timer-label {
  font-family: var(--font-display); font-size: 0.68rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted);
}
.bughunt-timer .timer-value { min-width: 50px; text-align: center; }
.bughunt-timer.complete { color: var(--prof-strong); border-color: var(--prof-strong); }
.bughunt-timer.complete .timer-label { color: var(--prof-strong); }

/* ── Minimal active-lab bar ───────────────────────── */
.lab-minibar {
  display: none; align-items: center; gap: 12px;
  padding: 10px var(--s-lg); border-bottom: 1px solid var(--rule);
  background: var(--bg); flex-shrink: 0;
}
.lab-minibar.visible { display: flex; }
.lab-minibar .lab-back {
  font-family: var(--font-display); font-size: 0.78rem; font-weight: 600;
  color: var(--ink-muted); background: none; border: none; cursor: pointer; padding: 0;
}
.lab-minibar .lab-back:hover { color: var(--ink); }
.lab-minibar .lab-name {
  font-family: var(--font-display); font-size: 0.92rem; font-weight: 700; color: var(--ink);
}
.lab-minibar .mini-timer {
  margin-left: auto; font-family: var(--font-mono);
  font-size: 0.92rem; font-weight: 700; color: var(--ink); display: none;
}
.lab-minibar .mini-timer.active { display: block; }
.lab-minibar .mini-timer.complete { color: var(--prof-strong); }

/* Hide duel UI — secondary feature */
.duel-btn, .join-duel-bar { display: none !important; }

/* ── Main split ────────────────────────────────────── */
.lab-workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.top-pane { display: flex; flex: 0 0 auto; min-height: 200px; max-height: 50vh; overflow: hidden; border-bottom: 2px solid var(--ink); }
.bottom-pane { flex: 1; display: flex; flex-direction: column; min-height: 0; }

/* ── Topology ──────────────────────────────────────── */
.topology-panel { flex: 1; min-width: 0; padding: var(--s-md); display: flex; align-items: center; justify-content: center; background: var(--bg); }
.topology-panel svg { width: 100%; height: 100%; max-height: 340px; }
.topo-device { cursor: pointer; }
.topo-device:hover rect, .topo-device:hover circle { filter: brightness(1.1); }
.topo-device.selected rect, .topo-device.selected circle {
  stroke: #F59E0B; stroke-width: 3; filter: drop-shadow(0 0 6px rgba(245,158,11,0.5));
}
.topo-link { stroke: var(--ink-muted); stroke-width: 2; }
.topo-port-label { font-family: var(--font-mono); font-size: 9px; fill: var(--ink-muted); }
.topo-device-label { font-family: var(--font-display); font-size: 13px; font-weight: 700; fill: #fff; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
.topo-device-sublabel { font-family: var(--font-mono); font-size: 9px; fill: var(--ink-muted); text-anchor: middle; }

/* ── Objectives ────────────────────────────────────── */
.objectives-panel {
  width: 280px; flex-shrink: 0;
  border-left: 1px solid var(--rule);
  padding: var(--s-md);
  overflow-y: auto;
  background: var(--bg-surface);
}
.objectives-panel h3 {
  font-size: 0.82rem; margin-bottom: var(--s-md);
  text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted);
}
.obj-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0; font-family: var(--font-display); font-size: 0.78rem;
  color: var(--ink-secondary); line-height: 1.4;
}
.obj-check {
  width: 16px; height: 16px; border: 2px solid var(--border-strong);
  border-radius: 3px; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: transparent; transition: all 0.2s;
}
.obj-item.done .obj-check { border-color: var(--prof-strong); background: var(--prof-strong); color: #fff; }
.obj-item.done .obj-text { color: var(--ink-muted); text-decoration: line-through; }
.obj-hint-btn {
  font-family: var(--font-mono); font-size: 0.65rem;
  color: var(--ink-muted); background: none; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 2px 6px; cursor: pointer;
  margin-left: auto; flex-shrink: 0; transition: all var(--transition);
}
.obj-hint-btn:hover { border-color: var(--accent); color: var(--accent); }
.hint-toast {
  margin-top: var(--s-sm); padding: 8px 10px;
  background: var(--accent-dim); border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent);
}
.obj-progress {
  margin-top: var(--s-md); padding-top: var(--s-md);
  border-top: 1px solid var(--border);
}
.obj-progress .progress-text {
  font-family: var(--font-display); font-size: 0.72rem;
  color: var(--ink-muted); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.hints-remaining {
  font-family: var(--font-display); font-size: 0.72rem;
  color: var(--ink-muted); margin-top: var(--s-sm);
}
.lab-complete-banner {
  margin-top: var(--s-md); padding: 12px;
  background: var(--prof-strong-bg); border: 1px solid var(--prof-strong);
  border-radius: var(--radius-lg); text-align: center;
  font-family: var(--font-display); font-size: 0.82rem;
  font-weight: 600; color: var(--prof-strong); display: none;
}

/* ── Device tabs ───────────────────────────────────── */
.device-tabs {
  flex-shrink: 0; display: flex; gap: 0;
  border-bottom: 1px solid #292524;
  background: #292524;
}
.device-tab {
  font-family: var(--font-mono); font-size: 0.75rem; font-weight: 600;
  padding: 8px 16px; cursor: pointer;
  color: #a8a29e; background: #292524;
  border: none; border-right: 1px solid #1c1917;
  transition: all 0.1s;
}
.device-tab:hover { color: #fde68a; background: #3a3633; }
.device-tab.active { color: #fde68a; background: #1c1917; }

/* ── Terminal ──────────────────────────────────────── */
.term-container {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
}
.term-wrap {
  flex: 1; background: #1c1917; overflow-y: auto;
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.5;
  cursor: text;
}
.term-line { color: #d6d3d1; white-space: pre-wrap; word-break: break-all; }
.term-line.cmd { color: #fde68a; }
.term-line.success { color: #4ade80; }
.term-line.error { color: #f87171; }
.term-line.info { color: #60a5fa; }
.term-line.system { color: #a78bfa; font-style: italic; }
.term-input-row {
  display: flex; align-items: center;
  padding: 0 16px 12px; background: #1c1917;
  flex-shrink: 0;
}
.term-prompt {
  color: #a8a29e; font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem; white-space: pre; flex-shrink: 0;
}
.term-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #fde68a; font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem; caret-color: #fde68a;
}

/* ── Welcome screen ────────────────────────────────── */
.welcome-screen {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: var(--bg-recessed); overflow-y: auto;
}
.welcome-inner {
  text-align: left; max-width: 600px; padding: var(--s-xl);
  max-height: 100%; margin: auto;
}
.welcome-inner h2 { font-size: 1.4rem; margin-bottom: var(--s-sm); border: none; padding: 0; }
.welcome-inner p { color: var(--ink-secondary); font-size: 0.9rem; margin: 0 auto; }

/* ── Responsive ────────────────────────────────────── */
/* ── Duel button ──────────────────────────────────────── */
.duel-btn {
  font-family: var(--font-display); font-size: 0.68rem; font-weight: 600;
  padding: 4px 10px; border: 1px solid #B45309; border-radius: var(--radius);
  background: transparent; color: #B45309; cursor: pointer;
  transition: all var(--transition); margin-left: -4px;
}
.duel-btn:hover { background: #B45309; color: #fff; }

/* ── Join Duel bar ────────────────────────────────────── */
.join-duel-bar {
  display: flex; align-items: center; gap: 8px;
  margin-left: auto; flex-shrink: 0;
}
.join-duel-bar input {
  font-family: var(--font-mono); font-size: 0.78rem;
  width: 90px; padding: 5px 8px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg-surface);
  color: var(--ink); text-transform: uppercase; letter-spacing: 0.1em;
  text-align: center;
}
.join-duel-bar input::placeholder { text-transform: none; letter-spacing: normal; color: var(--ink-muted); }
.join-duel-bar button {
  font-family: var(--font-display); font-size: 0.72rem; font-weight: 600;
  padding: 5px 12px; border: 1px solid #B45309; border-radius: var(--radius);
  background: #B45309; color: #fff; cursor: pointer; transition: all var(--transition);
}
.join-duel-bar button:hover { background: #92400E; }

/* ── Duel Lobby Modal ─────────────────────────────────── */
.duel-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  animation: duelFadeIn 0.2s ease;
}
@keyframes duelFadeIn { from { opacity: 0; } to { opacity: 1; } }
.duel-modal {
  background: var(--bg); border-radius: var(--radius-lg);
  box-shadow: 0 24px 60px rgba(0,0,0,0.25);
  max-width: 480px; width: 92%; padding: 28px 32px;
  font-family: var(--font-display);
}
.duel-modal h2 { font-size: 1.3rem; margin: 0 0 4px; }
.duel-modal .duel-lab-name { font-size: 0.82rem; color: var(--ink-secondary); margin-bottom: 16px; }
.duel-code-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
  padding: 10px 14px; background: var(--bg-recessed); border-radius: var(--radius);
}
.duel-code-row .code {
  font-family: var(--font-mono); font-size: 1.4rem; font-weight: 700;
  letter-spacing: 0.15em; color: var(--ink);
}
.duel-code-row .copy-btn {
  font-size: 0.7rem; padding: 3px 8px; border: 1px solid var(--border);
  border-radius: var(--radius); background: var(--bg-surface); cursor: pointer;
  color: var(--ink-muted); transition: all var(--transition);
}
.duel-code-row .copy-btn:hover { border-color: var(--ink); color: var(--ink); }
.duel-code-row .mode-badge {
  margin-left: auto; font-size: 0.7rem; font-weight: 600;
  padding: 2px 8px; border-radius: var(--radius);
  background: #FEF3C7; color: #92400E;
}
.duel-players { margin-bottom: 18px; }
.duel-player-card {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--rule);
}
.duel-player-card:last-child { border-bottom: none; }
.duel-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: #2563EB; color: #fff; font-weight: 700; font-size: 0.82rem;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.duel-player-card .name { font-weight: 600; font-size: 0.85rem; }
.duel-player-card .status {
  margin-left: auto; font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.04em;
}
.duel-player-card .status.waiting { color: var(--ink-muted); }
.duel-player-card .status.ready { color: #16A34A; }
.duel-player-card .status.you { color: #2563EB; }
.duel-waiting-slot {
  padding: 8px 0; color: var(--ink-muted); font-style: italic; font-size: 0.8rem;
  border-bottom: 1px solid var(--rule);
}
.duel-waiting-slot:last-child { border-bottom: none; }
.duel-actions {
  display: flex; gap: 10px; margin-top: 8px;
}
.duel-actions button {
  flex: 1; padding: 10px; font-family: var(--font-display);
  font-size: 0.82rem; font-weight: 600; border-radius: var(--radius);
  cursor: pointer; border: none; transition: all var(--transition);
}
.duel-ready-btn { background: #16A34A; color: #fff; }
.duel-ready-btn:hover { background: #15803D; }
.duel-ready-btn:disabled { background: #86EFAC; cursor: default; }
.duel-start-btn { background: #B45309; color: #fff; }
.duel-start-btn:hover { background: #92400E; }
.duel-start-btn:disabled { background: #FCD34D; color: #92400E; cursor: default; }
.duel-cancel-btn { background: var(--bg-surface); color: var(--ink-muted); border: 1px solid var(--border) !important; }
.duel-cancel-btn:hover { color: var(--ink); border-color: var(--ink) !important; }

/* ── Countdown ────────────────────────────────────────── */
.countdown-overlay {
  position: fixed; inset: 0; z-index: 9100;
  background: rgba(0,0,0,0.8);
  display: flex; align-items: center; justify-content: center;
}
.countdown-num {
  font-family: var(--font-display); font-size: 6rem; font-weight: 800;
  color: #FDE68A; animation: countPulse 0.8s ease;
}
.countdown-go {
  font-family: var(--font-display); font-size: 4rem; font-weight: 800;
  color: #4ADE80; animation: countPulse 0.5s ease;
}
@keyframes countPulse {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* ── Opponent Panel ───────────────────────────────────── */
.opponent-panel {
  position: fixed; right: 0; top: 0; width: 220px; height: 100vh;
  background: #1c1917; border-left: 2px solid #292524;
  z-index: 800; padding: 16px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 12px;
  font-family: var(--font-display); color: #d6d3d1;
  transition: transform 0.3s ease;
}
.opponent-panel.hidden { transform: translateX(100%); }
.opponent-panel h3 {
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: #a8a29e; margin: 0;
}
.opp-header {
  display: flex; align-items: center; gap: 8px;
}
.opp-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: #DC2626; color: #fff; font-weight: 700; font-size: 0.75rem;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.opp-name { font-weight: 600; font-size: 0.85rem; color: #fde68a; }
.opp-timer {
  font-family: var(--font-mono); font-size: 1.3rem; font-weight: 700;
  color: #fde68a; text-align: center; padding: 6px 0;
}
.opp-progress-bar {
  height: 6px; background: #292524; border-radius: 3px; overflow: hidden;
}
.opp-progress-fill {
  height: 100%; background: #DC2626; border-radius: 3px;
  transition: width 0.3s ease;
}
.opp-progress-text {
  font-size: 0.72rem; color: #a8a29e; text-align: center; margin-top: 4px;
}
.opp-objectives { display: flex; flex-direction: column; gap: 4px; }
.opp-obj {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.72rem; color: #78716c;
}
.opp-obj.done { color: #4ade80; }
.opp-obj .check { width: 14px; text-align: center; flex-shrink: 0; }
.opp-obj.flash { animation: oppFlash 0.5s ease; }
@keyframes oppFlash {
  0% { background: rgba(74,222,128,0.3); }
  100% { background: transparent; }
}
.opp-forfeit { color: #f87171; font-size: 0.75rem; text-align: center; font-style: italic; }

/* ── Finish Screen ────────────────────────────────────── */
.finish-overlay {
  position: fixed; inset: 0; z-index: 9200;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  animation: duelFadeIn 0.3s ease;
}
.finish-card {
  background: #1c1917; border-radius: 16px;
  padding: 36px 40px; max-width: 440px; width: 90%;
  text-align: center; font-family: var(--font-display);
  box-shadow: 0 32px 80px rgba(0,0,0,0.5);
}
.finish-result {
  font-size: 2rem; font-weight: 800; margin-bottom: 16px;
}
.finish-result.win { color: #FDE68A; text-shadow: 0 0 20px rgba(253,230,138,0.4); }
.finish-result.lose { color: #F87171; }
.finish-times {
  display: flex; justify-content: center; gap: 24px; margin-bottom: 20px;
}
.finish-time-col { text-align: center; }
.finish-time-col .label { font-size: 0.72rem; color: #a8a29e; text-transform: uppercase; letter-spacing: 0.04em; }
.finish-time-col .time { font-family: var(--font-mono); font-size: 1.2rem; font-weight: 700; color: #d6d3d1; margin-top: 2px; }
.finish-objectives {
  display: flex; justify-content: center; gap: 24px; margin-bottom: 20px;
  font-size: 0.82rem; color: #a8a29e;
}
.finish-xp {
  font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; padding: 10px;
  border-radius: var(--radius); background: rgba(253,230,138,0.1);
}
.finish-xp.win { color: #FDE68A; }
.finish-xp.lose { color: #a8a29e; }
.finish-actions { display: flex; gap: 10px; justify-content: center; }
.finish-actions button {
  padding: 10px 20px; font-family: var(--font-display);
  font-size: 0.82rem; font-weight: 600; border-radius: var(--radius);
  cursor: pointer; border: none; transition: all var(--transition);
}
.finish-rematch-btn { background: #B45309; color: #fff; }
.finish-rematch-btn:hover { background: #92400E; }
.finish-back-btn { background: #292524; color: #d6d3d1; }
.finish-back-btn:hover { background: #3a3633; }

/* ── Workspace shift when opponent panel is open ──────── */
.lab-workspace.duel-active { margin-right: 220px; transition: margin-right 0.3s ease; }

/* ── Lab Menu (TurboTax-style progressive chooser) ── */
.lab-menu{max-width:560px;margin:0 auto;padding:var(--s-xl) var(--s-lg)}
.lab-menu-header{margin-bottom:var(--s-xl)}
.lab-menu-header h2{font-size:1.8rem;margin-bottom:6px;border:none;padding:0}
.lab-menu-header p{font-family:var(--font-body);font-size:.9rem;color:var(--ink-secondary);line-height:1.6}
.lab-menu-question{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:var(--s-md)}
.lab-menu-choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lab-menu-card{text-align:left;padding:20px;background:var(--bg-surface);border:2px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s;display:block;width:100%}
.lab-menu-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.lab-menu-card.bughunt{border-color:rgba(220,38,38,.2)}
.lab-menu-card.bughunt:hover{border-color:#DC2626}
.lmc-title{font-family:var(--font-display);font-size:1rem;font-weight:700;margin-bottom:6px}
.lab-menu-card.bughunt .lmc-title{color:#DC2626}
.lmc-desc{font-family:var(--font-body);font-size:.82rem;color:var(--ink-secondary);line-height:1.5;margin-bottom:8px}
.lmc-meta{font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted)}
.lab-menu-back{font-family:var(--font-display);font-size:.78rem;color:var(--ink-muted);background:none;border:none;cursor:pointer;padding:0;margin-bottom:var(--s-md)}
.lab-menu-back:hover{color:var(--ink)}
.lab-menu-labs{display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 320px);overflow-y:auto}
.lab-menu-lab{display:flex;align-items:center;gap:16px;padding:16px 20px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all .15s}
.lab-menu-lab:hover{border-color:var(--accent);background:var(--bg-hover)}
.lab-menu-lab .lml-diff{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lab-menu-lab .lml-info{flex:1}
.lab-menu-lab .lml-name{font-family:var(--font-display);font-size:.88rem;font-weight:700;margin-bottom:2px}
.lab-menu-lab .lml-detail{font-family:var(--font-body);font-size:.78rem;color:var(--ink-secondary)}
.lab-menu-lab .lml-start{font-family:var(--font-display);font-size:.75rem;font-weight:700;color:var(--accent);flex-shrink:0}
.lab-menu-lab.completed .lml-name::after{content:' \2713';color:var(--prof-strong)}
@media(max-width:600px){.lab-menu-choices{grid-template-columns:1fr}}
/* ── Refresher type-drill (mirrors the lab look) ── */
.lab-menu-card.refresh{border-color:rgba(37,99,235,.25)}
.lab-menu-card.refresh:hover{border-color:#2563EB}
.lab-menu-card.refresh .lmc-title{color:#2563EB}
.drill-screen{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;background:var(--bg)}
.drill-bar{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.drill-exit{font-family:var(--font-display);font-size:.8rem;color:var(--ink-muted);background:none;border:none;cursor:pointer;padding:0}
.drill-exit:hover{color:var(--ink)}
.drill-topic-name{font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--ink)}
.drill-progress{margin-left:auto;font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted)}
.drill-task-banner{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0}
.dtb-num{font-family:var(--font-mono);font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted);flex-shrink:0}
.dtb-task{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);line-height:1.3;flex:1;min-width:0}
.drill-reveal{flex-shrink:0;font-family:var(--font-display);font-size:.75rem;color:var(--ink-muted);background:none;border:1px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;transition:all var(--transition);max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drill-reveal:hover{border-color:var(--accent);color:var(--accent)}
.drill-left{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0}
#drillTopo{flex:1;min-height:0}
#drillTopo svg{width:100%;height:100%;max-height:280px}
.topo-device.selected circle,.topo-device.selected rect{stroke:var(--accent);stroke-width:4}
.drill-tip{flex-shrink:0;margin:0 var(--s-md) var(--s-md);padding:11px 13px;background:var(--accent-dim);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-family:var(--font-body);font-size:.8rem;color:var(--ink);line-height:1.5}
.drill-tip .dt-tag{font-family:var(--font-display);font-weight:700;font-size:.62rem;letter-spacing:.05em;color:var(--accent);margin-right:7px}
.drill-tip.empty{background:none;border-left-color:var(--border);color:var(--ink-muted)}
.drill-tip.mission{background:rgba(220,38,38,.06);border-left-color:#DC2626}
.drill-tip.mission .dt-tag{color:#DC2626}
.term-line.mission{color:#fbbf24;font-weight:700}
#drillConfetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
.confetti-piece{position:fixed;bottom:130px;left:50%;width:9px;height:9px;border-radius:2px;pointer-events:none;will-change:transform,opacity;animation:confettiPop .9s ease-out forwards}
@keyframes confettiPop{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) rotate(var(--rot));opacity:0}}
@media(prefers-reduced-motion:reduce){.confetti-piece{display:none}}
.obj-item.revealed .obj-text{color:var(--accent)}
.obj-item.revealed .obj-text::after{content:' (revealed)';font-size:.62rem;color:var(--ink-muted)}
.drill-done{text-align:center;padding:44px 18px;font-family:var(--font-display)}
.drill-done h3{font-size:1.3rem;color:var(--prof-strong);margin-bottom:8px;border:none;padding:0}
.drill-done .score{font-family:var(--font-mono);font-size:1.6rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.drill-done p{color:var(--ink-secondary);font-size:.9rem;margin-bottom:22px}
.drill-done button{font-family:var(--font-display);font-weight:700;font-size:.85rem;padding:10px 18px;margin:0 6px;border-radius:8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--ink);cursor:pointer}
.drill-done button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}

@media (max-width: 768px) {
  .top-pane { flex-direction: column; max-height: 60vh; }
  .objectives-panel { width: 100%; max-height: 150px; border-left: none; border-top: 1px solid var(--rule); }
  .lab-cards { gap: 6px; }
  .lab-card-sel { font-size: 0.7rem; padding: 6px 10px; }
  .opponent-panel { width: 180px; }
  .lab-workspace.duel-active { margin-right: 180px; }
  .join-duel-bar { display: none; }
  .duel-btn { display: none; }
}

/* ── RAILS PANEL (Lab 5 force-type guided flow) ───────────── */
.rails-header { padding: 10px 12px; border-bottom: 1px solid var(--rule); position: sticky; top: 0; background: var(--bg); z-index: 4; }
.rails-progress-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.rails-progress-label { font-family: var(--font-display); font-size: 0.78rem; font-weight: 700; color: var(--ink); }
.rails-reset-btn { font-family: var(--font-display); font-size: 0.66rem; font-weight: 600; color: var(--ink-muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; cursor: pointer; }
.rails-reset-btn:hover { color: var(--ink); border-color: var(--ink); }
.rails-progress-bar { width: 100%; height: 6px; background: var(--bg-surface); border-radius: 3px; overflow: hidden; }
.rails-progress-fill { height: 100%; background: var(--prof-strong); transition: width 240ms cubic-bezier(.16,1,.3,1); }

.rails-current { padding: 14px 12px; border-bottom: 1px solid var(--rule); background: var(--bg-surface); }
.rails-current-label { font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; color: var(--ink-muted); text-transform: uppercase; }
.rails-current-device { font-family: var(--font-display); font-size: 0.7rem; font-weight: 600; color: var(--accent, #d97706); margin-top: 2px; }
.rails-current-text { font-family: var(--font-display); font-size: 1.02rem; font-weight: 600; color: var(--ink); margin-top: 6px; line-height: 1.35; }
.rails-current-hint { margin-top: 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.rails-hint-label { font-family: var(--font-display); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; color: var(--ink-muted); text-transform: uppercase; }
.rails-current-hint code { font-family: var(--font-mono); font-size: 0.85rem; background: var(--bg); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; color: var(--ink); }

.rails-complete { padding: 20px 12px; text-align: center; }
.rails-complete h3 { font-family: var(--font-display); font-size: 1.2rem; color: var(--prof-strong); margin: 0 0 8px 0; }
.rails-complete p { font-size: 0.85rem; color: var(--ink-muted); margin: 6px 0; }
.rails-time { font-family: var(--font-mono); font-weight: 700; }

.rails-tasklist { padding: 10px 12px; border-top: 1px solid var(--rule); }
.rails-tasklist summary { font-family: var(--font-display); font-size: 0.72rem; font-weight: 700; color: var(--ink-muted); cursor: pointer; padding: 4px 0; }
.rails-tasklist ol { margin: 8px 0 0 0; padding-left: 20px; font-size: 0.78rem; line-height: 1.55; }
.rails-task { color: var(--ink-muted); padding: 2px 0; }
.rails-task.done { color: var(--prof-strong); text-decoration: line-through; opacity: 0.7; }
.rails-task.current { color: var(--ink); font-weight: 700; }
.rails-task-dev { font-family: var(--font-mono); font-size: 0.7rem; background: var(--bg-surface); padding: 1px 5px; border-radius: 3px; margin-right: 4px; color: var(--ink); }

/* ── MOBILE: rails-aware sticky layout + ergonomic bar ───── */
@media (max-width: 768px) {
  .objectives-panel { max-height: 260px; overflow-y: auto; }
  .rails-current-text { font-size: 0.95rem; }
  .device-tab { min-height: 44px; min-width: 56px; font-size: 0.85rem; }
  .term-input { font-size: 16px; /* prevent iOS zoom-on-focus */ }
  .topology-panel { max-height: 200px; overflow: hidden; }
}

@media (max-width: 600px) {
  .top-pane { max-height: 50vh; }
  .objectives-panel { max-height: 240px; }
  .rails-current { padding: 10px; }
  .rails-current-text { font-size: 0.92rem; }
}

/* ── Ergonomic quick-bar (mobile) — NO full-command buttons (force-type) ── */
.ergo-bar { display: none; gap: 6px; padding: 6px 8px; border-top: 1px solid var(--rule); background: var(--bg-surface); flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.ergo-bar button { font-family: var(--font-mono); font-size: 0.78rem; font-weight: 700; min-height: 36px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--ink); cursor: pointer; flex-shrink: 0; }
.ergo-bar button:active { background: var(--ink); color: var(--bg); }
@media (max-width: 768px) {
  .ergo-bar.rails-active { display: flex; }
}

/* ── PWA install banner ───────────────────────────────────── */
.pwa-banner { display: none; position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 14px; background: var(--ink); color: var(--bg); font-family: var(--font-display); font-size: 0.82rem; z-index: 100; align-items: center; justify-content: space-between; gap: 12px; }
.pwa-banner.show { display: flex; }
.pwa-banner button { font-family: var(--font-display); font-size: 0.75rem; font-weight: 600; padding: 6px 12px; border: 1px solid var(--bg); border-radius: 6px; background: transparent; color: var(--bg); cursor: pointer; }
.pwa-banner button.pwa-dismiss { border-color: transparent; opacity: 0.6; }
</style>
</head>
<body>

<div class="lab-page">
  <nav class="top-nav"></nav>

  <!-- Lab selector bar -->
  <div class="lab-selector">
    <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:8px">
      <h1>Network Lab</h1>
      <span style="font-family:var(--font-body);color:var(--ink-secondary);font-size:0.85rem;font-style:italic">Browser-based Packet Tracer</span>
      <div class="bughunt-timer" id="bughuntTimer">
        <span class="timer-label">Timer</span>
        <span class="timer-value" id="bughuntTimerValue">0:00</span>
      </div>
      <div class="join-duel-bar">
        <input type="text" id="joinDuelCode" maxlength="6" placeholder="CODE">
        <button onclick="joinDuelFromInput()">Join Duel</button>
      </div>
    </div>
    <div class="lab-cards" id="labCards"></div>
  </div>

  <!-- Minimal active-lab bar -->
  <div class="lab-minibar" id="labMinibar">
    <button class="lab-back" onclick="exitLab()">&larr; Labs</button>
    <span class="lab-name" id="miniLabName"></span>
    <span class="mini-timer" id="miniTimer">0:00</span>
  </div>

  <!-- Opponent panel (shown during duels) -->
  <div class="opponent-panel hidden" id="opponentPanel"></div>

  <!-- Workspace: topology + objectives above, terminal below -->
  <div class="lab-workspace" id="labWorkspace">
    <!-- Welcome state -->
    <div class="welcome-screen" id="welcomeScreen" style="background:var(--bg);padding:var(--s-xl)">
      <div class="welcome-inner">
        <div class="lab-menu" id="labMenu">
          <div class="lab-menu-header">
            <h2>Network Lab</h2>
            <p>Practice IOS commands on virtual routers and switches. No install needed.</p>
          </div>

          <!-- Step 1: Choose category -->
          <div class="lab-menu-step" id="menuStep1">
            <div class="lab-menu-question">What do you want to practice?</div>
            <div class="lab-menu-choices">
              <button class="lab-menu-card" onclick="showLabCategory('config')">
                <div class="lmc-title">Config Labs</div>
                <div class="lmc-desc">Build from scratch — VLANs, trunking, OSPF, ACLs, NAT, SSH</div>
                <div class="lmc-meta">5 labs &middot; Beginner &rarr; Hard</div>
              </button>
              <button class="lab-menu-card bughunt" onclick="showLabCategory('bughunt')">
                <div class="lmc-title">Bug Hunt</div>
                <div class="lmc-desc">Pre-broken configs — diagnose with show commands, find and fix the bugs</div>
                <div class="lmc-meta">3 labs &middot; Timed challenges</div>
              </button>
              <button class="lab-menu-card refresh" onclick="showLabCategory('refresh')">
                <div class="lmc-title">Refresher</div>
                <div class="lmc-desc">Type-drill every config topic. The command is shown, you just type it to lock in muscle memory before an exam.</div>
                <div class="lmc-meta">19 topics &middot; or Drill All (mega)</div>
              </button>
            </div>
          </div>

          <!-- Step 2: Choose specific lab (populated by JS) -->
          <div class="lab-menu-step hidden" id="menuStep2">
            <button class="lab-menu-back" onclick="showMenuStep1()">&larr; Back</button>
            <div class="lab-menu-question" id="menuStep2Title">Pick a lab</div>
            <div class="lab-menu-labs" id="menuLabList"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Active lab state (hidden initially) -->
    <div class="top-pane" id="topPane" style="display:none">
      <div class="topology-panel" id="topologyPanel"></div>
      <div class="objectives-panel" id="objectivesPanel"></div>
    </div>
    <div class="bottom-pane" id="bottomPane" style="display:none">
      <div class="device-tabs" id="deviceTabs"></div>
      <div class="term-container" id="termContainer">
        <div class="term-wrap" id="termOutput"></div>
        <div class="ergo-bar" id="ergoBar" aria-label="ergonomic shortcuts">
          <button type="button" data-ergo="history-up" aria-label="previous command">&#8593;</button>
          <button type="button" data-ergo="history-down" aria-label="next command">&#8595;</button>
          <button type="button" data-ergo="tab" aria-label="tab complete">tab</button>
          <button type="button" data-ergo="qmark" aria-label="help">?</button>
          <button type="button" data-ergo="space" aria-label="space">space</button>
          <button type="button" data-ergo="paste-hint" aria-label="paste hint">paste hint</button>
        </div>
        <div class="term-input-row">
          <span class="term-prompt" id="termPrompt"></span>
          <input type="text" class="term-input" id="termInput" spellcheck="false" autocomplete="off" autocapitalize="off">
        </div>
      </div>
    </div>
    <!-- Refresher type-drill (recall: task shown, command hidden) -->
    <div class="drill-screen" id="drillScreen" style="display:none">
      <div class="drill-bar">
        <button class="drill-exit" onclick="exitDrill()">&larr; Refresher</button>
        <span class="drill-topic-name" id="drillTopicName"></span>
        <span class="drill-progress" id="drillProgress"></span>
      </div>
      <div id="drillConfetti"></div>
      <div class="top-pane" id="drillTopPane">
        <div class="drill-left">
          <div class="topology-panel" id="drillTopo"></div>
          <div class="drill-tip empty" id="drillTip"></div>
        </div>
        <div class="objectives-panel">
          <h3>Tasks</h3>
          <div id="drillObjList"></div>
        </div>
      </div>
      <div class="bottom-pane" id="drillBottomPane">
        <div class="drill-task-banner" id="drillTaskBanner">
          <span class="dtb-num" id="drillTaskNum"></span>
          <span class="dtb-task" id="drillTaskText"></span>
          <button class="drill-reveal" id="drillRevealBtn">Reveal command</button>
        </div>
        <div class="device-tabs"><button class="device-tab active" id="drillDevTab">R1</button></div>
        <div class="term-container">
          <div class="term-wrap" id="drillTerm"></div>
          <div class="term-input-row" id="drillInputRow">
            <span class="term-prompt" id="drillPrompt"></span>
            <input type="text" class="term-input" id="drillInput" spellcheck="false" autocomplete="off" autocapitalize="off" aria-label="type the command for the task">
          </div>
        </div>
      </div>
    </div>
    <div class="pwa-banner" id="pwaBanner" role="status">
      <span>Install Lab 5 for offline study on the road.</span>
      <span>
        <button type="button" id="pwaInstallBtn">Install</button>
        <button type="button" class="pwa-dismiss" id="pwaDismissBtn">Dismiss</button>
      </span>
    </div>
  </div>
</div>

<script defer src="js/store.js"></script>
<script defer src="js/lab-engine.js?v=7.15.8"></script>
<script defer src="js/nav.js"></script>
<script>document.addEventListener('DOMContentLoaded',function(){

(function() {
  'use strict';

  // ═══════════════════════════════════════════════════════════════
  //  LAB DEFINITIONS
  // ═══════════════════════════════════════════════════════════════

    {

        { name: 'SW1', type: 'switch' }

        { text: 'Set R2 router-id 2.2.2.2', hint: 'In router config: router-id 2.2.2.2' },
        { text: 'Advertise 10.0.12.0/24 on R2 in Area 0', hint: 'network 10.0.12.0 0.0.0.255 area 0' },
        { text: 'Advertise 10.0.23.0/24 on R2 in Area 0', hint: 'network 10.0.23.0 0.0.0.255 area 0' },

  // Loose match: case/space-insensitive, comma + range spacing, common IOS abbreviations.
  function normCmd(s) {
    var x = (s || '').toLowerCase().replace(/\s+/g, ' ').trim();
    x = x.replace(/,\s*/g, ',').replace(/\s*-\s*/g, '-');
    x = x.replace(/gigabitethernet/g, 'gi').replace(/fastethernet/g, 'fa');
    if (x === 'en') x = 'enable';
    if (x === 'conf t' || x === 'config t' || x === 'configure t') x = 'configure terminal';
    if (x.indexOf('int ') === 0) x = 'interface ' + x.slice(4);
    if (x === 'no shut') x = 'no shutdown';
    if (x.indexOf('do ') === 0) x = x.slice(3);
    if (x.indexOf('sh ') === 0) x = 'show ' + x.slice(3);
    return x;
  }
  function matchCmd(typed, expected) {
    var nt = normCmd(typed), ne = normCmd(expected);
    if (nt === ne) return true;
    // accept the crypto one-liner `crypto key generate rsa modulus <n>` for the rsa step
    if (ne === 'crypto key generate rsa' && /^crypto key generate rsa modulus \d+$/.test(nt)) return true;
    return false;
  }

  function promptStr(dev, mode) {
    switch (mode) {
      case 'user': return dev + '>';
      case 'priv': return dev + '#';
      case 'config-if': return dev + '(config-if)#';
      case 'config-line': return dev + '(config-line)#';
      case 'config-router': return dev + '(config-router)#';
      case 'config-vlan': return dev + '(config-vlan)#';
      case 'config-dhcp': return dev + '(dhcp-config)#';
      case 'config-acl': return dev + '(config-ext-nacl)#';
      case 'config': return dev + '(config)#';
      default: return dev + '#';
    }
  }
  function updateMode(cmd) {
    var x = (cmd || '').toLowerCase().trim();
    if (/^en(able)?$/.test(x)) drillState.mode = 'priv';
    else if (/^(conf|configure)\b/.test(x)) drillState.mode = 'config';
    else if (/^ip dhcp pool\b/.test(x)) drillState.mode = 'config-dhcp';
    else if (/^ip access-list\b/.test(x)) drillState.mode = 'config-acl';
    else if (/^(access-list|ip route|ipv6 route|ipv6 unicast-routing|ip routing|ip nat (inside source|pool)|ip dhcp snooping vlan|ip arp inspection|ntp |cdp run|lldp run)/.test(x)) drillState.mode = 'config';
    else if (/^interface\b/.test(x)) drillState.mode = 'config-if';
    else if (/^line\b/.test(x)) drillState.mode = 'config-line';
    else if (/^router\b/.test(x)) drillState.mode = 'config-router';
    else if (/^vlan\s+\d/.test(x)) drillState.mode = 'config-vlan';
    else if (x === 'end') drillState.mode = 'priv';
    else if (x === 'exit') drillState.mode = (drillState.mode === 'config' ? 'priv' : 'config');
  }

  function withVerify(t) {
    var v = DRILL_VERIFY[t.name];
    if (!v) return t;
    return { name: t.name, dev: t.dev, startMode: t.startMode, steps: t.steps.concat([{ t: v.t, c: v.c }]) };
  }
  function writeStory(topic) {
    var s = DRILL_STORY[topic.name];
    if (s) { writeTerm('▶ MISSION: ' + s, 'mission'); showTip(['MISSION', s]); }
  }
  function stepPrompt(topic, step) {
    if (step && /^show\b/.test(step.c)) return topic.dev + '#';
    return promptStr(topic.dev, drillState.mode);
  }
  function confettiBurst(big) {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var host = document.getElementById('drillConfetti');
    if (!host) return;
    var n = big ? 46 : 16, colors = ['#2563EB', '#16A34A', '#fbbf24', '#DC2626', '#a78bfa', '#4ade80'];
    for (var i = 0; i < n; i++) {
      var p = document.createElement('div');
      p.className = 'confetti-piece';
      var spread = big ? 320 : 220;
      p.style.setProperty('--tx', (Math.random() * spread * 2 - spread).toFixed(0) + 'px');
      p.style.setProperty('--ty', (-120 - Math.random() * (big ? 320 : 220)).toFixed(0) + 'px');
      p.style.setProperty('--rot', (Math.random() * 720 - 360).toFixed(0) + 'deg');
      p.style.background = colors[i % colors.length];
      p.style.left = (45 + Math.random() * 10) + '%';
      host.appendChild(p);
      (function (el) { setTimeout(function () { el.remove(); }, 950); })(p);
    }
  }

  window.startDrill = function(which) {
    var base = which === 'all' ? REFRESH_DRILLS.slice() : [REFRESH_DRILLS[which]];
    var topics = base.map(withVerify);
    drillState = { which: which, topics: topics, ti: 0, li: 0, mega: which === 'all',
                   mode: topics[0].startMode, revealed: {}, clean: 0, totalDone: 0 };
    document.querySelector('.lab-selector').classList.remove('visible');
    $welcome.style.display = 'none';
    $topPane.style.display = 'none';
    $bottomPane.style.display = 'none';
    document.getElementById('drillScreen').style.display = 'flex';
    document.getElementById('drillTerm').innerHTML = '';
    var tip = document.getElementById('drillTip');
    tip.className = 'drill-tip empty';
    tip.textContent = 'Tip appears here after each correct command.';
    wireDrill();
    writeTerm('*** ' + topics[0].name + ' — type each command from memory. Press ? for the next keyword, or hit Reveal. ***', 'system');
    renderDrillObjectives();
    writeStory(topics[0]);
    var inp = document.getElementById('drillInput');
    if (inp) { inp.value = ''; inp.focus(); }
  };

  window.exitDrill = function() {
    drillState = null;
    document.getElementById('drillScreen').style.display = 'none';
    $welcome.style.display = '';
    showLabCategory('refresh');
  };

  window.restartDrill = function() {
    var w = drillState ? drillState.which : 'all';
    startDrill(w);
  };

  function wireDrill() {
    if (drillWired) return;
    drillWired = true;
    var inp = document.getElementById('drillInput');
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); submitDrillStep(inp.value); }
      else if (e.key === '?') { e.preventDefault(); showHelp(inp.value); }
    });
    document.getElementById('drillRevealBtn').addEventListener('click', revealStep);
  }

  // IOS-style context help: `?` reveals only the NEXT keyword of the current command.
  function showHelp(partial) {
    if (!drillState) return;
    var topic = currentDrillTopic();
    var step = topic.steps[drillState.li];
    writeTerm(stepPrompt(topic, step) + ' ' + partial + '?', 'cmd');
    var exp = normCmd(step.c).split(' ');
    var typed = normCmd(partial).split(' ').filter(Boolean);
    var i = 0;
    while (i < typed.length && i < exp.length && typed[i] === exp[i]) i++;
    if (i < typed.length) {
      writeTerm('% That does not match this task. Next expected keyword: ' + (exp[i] || '<cr>'), 'info');
    } else if (i < exp.length) {
      writeTerm('  ' + exp[i] + '   <- next keyword', 'info');
      drillState.revealed[drillState.ti + ':' + drillState.li] = true; // counts as assisted
      renderDrillObjectives();
    } else {
      writeTerm('  <cr>   command is complete, press Enter', 'info');
    }
    document.getElementById('drillInput').focus();
  }

  function submitDrillStep(val) {
    if (!drillState || !val.trim()) return;
    var topic = currentDrillTopic();
    var step = topic.steps[drillState.li];
    writeTerm(stepPrompt(topic, step) + ' ' + val, 'cmd');
    if (matchCmd(val, step.c)) {
      var wasRevealed = drillState.revealed[drillState.ti + ':' + drillState.li];
      if (!wasRevealed) drillState.clean++;
      drillState.totalDone++;
      updateMode(step.c);
      showTip(tipFor(step));
      if (!wasRevealed) confettiBurst(false);
      advanceStep();
      // the crypto one-liner (with modulus) also satisfies the standalone "1024" step
      if (normCmd(val).indexOf('crypto key generate rsa modulus') === 0 &&
          drillState.topics[drillState.ti] && currentDrillTopic().steps[drillState.li] &&
          currentDrillTopic().steps[drillState.li].c === '1024') {
        drillState.totalDone++;
        if (!wasRevealed) drillState.clean++;
        writeTerm('  (RSA modulus set inline)', 'info');
        advanceStep();
      }
    } else {
      writeTerm('% Incomplete or incorrect command. Try again, or hit Reveal.', 'error');
    }
    var inp = document.getElementById('drillInput');
    inp.value = ''; inp.focus();
  }

  function advanceStep() {
    drillState.li++;
    if (drillState.li >= currentDrillTopic().steps.length) {
      drillState.ti++;
      drillState.li = 0;
      if (drillState.ti >= drillState.topics.length) { renderDrillDone(); return; }
      var nt = currentDrillTopic();
      drillState.mode = nt.startMode;
      writeTerm('', 'term-line');
      writeTerm('*** ' + nt.name + ' ***', 'system');
      renderDrillObjectives();
      writeStory(nt);
      return;
    }
    renderDrillObjectives();
  }

  function revealStep() {
    if (!drillState) return;
    var step = currentDrillTopic().steps[drillState.li];
    drillState.revealed[drillState.ti + ':' + drillState.li] = true;
    writeTerm('hint  ' + step.c, 'info');
    renderDrillObjectives();
    document.getElementById('drillInput').focus();
  }

  function renderDrillObjectives() {
    var topic = currentDrillTopic();
    var step = topic.steps[drillState.li];
    var revKey = drillState.ti + ':' + drillState.li;
    var topoEl = document.getElementById('drillTopo');
    topoEl.innerHTML = drillTopo(DRILL_TOPO[topic.name]);
    var act = topoEl.querySelector('[data-device="' + topic.dev + '"]');
    if (act) act.classList.add('selected');
    document.getElementById('drillTopicName').textContent = topic.name;
    document.getElementById('drillProgress').textContent = drillState.mega
      ? 'Topic ' + (drillState.ti + 1) + '/' + drillState.topics.length + ' · task ' + (drillState.li + 1) + '/' + topic.steps.length
      : 'Task ' + (drillState.li + 1) + '/' + topic.steps.length;
    document.getElementById('drillDevTab').textContent = topic.dev;
    document.getElementById('drillPrompt').textContent = stepPrompt(topic, step) + ' ';
    document.getElementById('drillTaskNum').textContent = 'Task ' + (drillState.li + 1) + ' of ' + topic.steps.length;
    document.getElementById('drillTaskText').textContent = step.t;
    var rb = document.getElementById('drillRevealBtn');
    rb.style.display = '';
    rb.textContent = drillState.revealed[revKey] ? step.c : 'Reveal command';
    document.getElementById('drillInputRow').style.display = '';
    document.getElementById('drillObjList').innerHTML = topic.steps.map(function(s, i) {
      var done = i < drillState.li;
      var rev = drillState.revealed[drillState.ti + ':' + i];
      var cls = 'obj-item' + (done ? ' done' : '') + (rev ? ' revealed' : '');
      return '<div class="' + cls + '"><span class="obj-check">✓</span><span class="obj-text">' + escapeDrill(s.t) + '</span></div>';
    }).join('');
  }

  function renderDrillDone() {
    var total = drillState.totalDone, clean = drillState.clean, rev = total - clean;
    document.getElementById('drillTopicName').textContent = 'Complete';
    document.getElementById('drillProgress').textContent = '';
    writeTerm('', 'term-line');
    writeTerm('*** Drill complete — recalled ' + clean + '/' + total + ' unaided ***', 'success');
    document.getElementById('drillTaskNum').textContent = '';
    document.getElementById('drillTaskText').textContent = 'Complete';
    document.getElementById('drillTopo').innerHTML =
      '<div class="drill-done"><div class="score">' + clean + ' / ' + total + '</div>' +
      '<p>recalled unaided' + (rev > 0 ? ' · ' + rev + ' revealed' : '') + '</p>' +
      '<button class="primary" onclick="restartDrill()">Run again</button>' +
      '<button onclick="exitDrill()">Topics</button></div>';
    document.getElementById('drillRevealBtn').style.display = 'none';
    document.getElementById('drillInputRow').style.display = 'none';
    confettiBurst(true);
  }

  // ── Shared show command output generators ───────────────────
  function showVlanBrief(dev) {
    var lines = ['VLAN Name                             Status    Ports', '---- -------------------------------- --------- ------'];
    var ids = Object.keys(dev.vlans).map(Number).sort(function(a,b){return a-b;});
    ids.forEach(function(vid) {
      var v = dev.vlans[vid];
      var name = (v.name || 'VLAN' + vid).substring(0, 32);
      var ports = (v.ports || []).join(', ');
      lines.push(String(vid).padEnd(5) + name.padEnd(33) + 'active    ' + ports);
    });
    return lines.join('\n');
  }

  function showIpIntBrief(dev) {
    var lines = ['Interface                  IP-Address      OK? Method Status                Protocol', ''];
    Object.keys(dev.interfaces).forEach(function(ifName) {
      var iface = dev.interfaces[ifName];
      var ip = iface.ip || 'unassigned';
      var mask = iface.mask || '';
      var status = iface.up ? 'up' : 'administratively down';
      var proto = iface.up ? 'up' : 'down';
      lines.push(ifName.padEnd(27) + ip.padEnd(16) + 'YES manual  '.padEnd(12) + status.padEnd(22) + proto);
    });
    return lines.join('\n');
  }

  function showIpRoute(dev) {
    var lines = ['Codes: C - connected, S - static, O - OSPF', ''];
    dev.routes.forEach(function(r) {
      lines.push(r.code + '    ' + r.network + '/' + r.prefix + ' [' + r.ad + '/' + r.metric + '] via ' + r.nextHop);
    });
    if (dev.ospf && dev.ospf.networks) {
      dev.ospf.networks.forEach(function(n) {
        lines.push('C    ' + n.network + ' is directly connected');
      });
    }
    return lines.join('\n');
  }

  function showOspfNeighbor(dev) {
    if (!dev.ospf) return '% OSPF not configured';
    return 'Neighbor ID     Pri   State           Dead Time   Address         Interface\n(Simulated — configure OSPF on all routers to see neighbors)';
  }

  function showAccessLists(dev) {
    if (Object.keys(dev.acls).length === 0) return '% No access lists configured';
    var lines = [];
    Object.keys(dev.acls).forEach(function(num) {
      lines.push('Standard IP access list ' + num);
      dev.acls[num].forEach(function(entry) {
        lines.push('    ' + entry.action + ' ' + entry.source + ' ' + (entry.wildcard || ''));
      });
    });
    return lines.join('\n');
  }

  // ── Shared handleCommand for common IOS commands ───────────
  function sharedHandleCommand(lab, dev, raw, lower) {
    // hostname
    var hostMatch = raw.match(/^hostname\s+(\S+)/i);
    if (hostMatch && (dev.mode === 'config')) {
      dev.hostname = hostMatch[1];
      lab.checkObjectives();
      return '';
    }

    // switchport mode access / trunk
    if (lower === 'switchport mode access' && (dev.mode === 'config-if')) {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].switchportMode = 'access';
      }
      lab.checkObjectives();
      return '';
    }
    if (lower === 'switchport mode trunk' && (dev.mode === 'config-if')) {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].switchportMode = 'trunk';
        dev.trunks[dev.currentInterface] = true;
      }
      lab.checkObjectives();
      return '';
    }

    // switchport trunk encapsulation dot1q
    if (lower === 'switchport trunk encapsulation dot1q' && dev.mode === 'config-if') {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].trunkEncap = 'dot1q';
      }
      return '';
    }

    // switchport trunk allowed vlan <list> (incl. add/remove)
    var allowedMatch = raw.match(/^switchport\s+trunk\s+allowed\s+vlan\s+(?:(add|remove|all|none)\s+)?(.+)?/i);
    if (allowedMatch && dev.mode === 'config-if') {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        var iface = dev.interfaces[dev.currentInterface];
        var op = (allowedMatch[1] || '').toLowerCase();
        var listStr = allowedMatch[2] || '';
        var newList = listStr.split(',').map(function(x){return parseInt(x.trim());}).filter(function(x){return !isNaN(x);});
        if (op === 'all') iface.allowedVlans = 'all';
        else if (op === 'none') iface.allowedVlans = [];
        else if (op === 'add') {
          var existing = Array.isArray(iface.allowedVlans) ? iface.allowedVlans : [];
          newList.forEach(function(v){ if (existing.indexOf(v) === -1) existing.push(v); });
          iface.allowedVlans = existing;
        } else if (op === 'remove') {
          var cur = Array.isArray(iface.allowedVlans) ? iface.allowedVlans : [];
          iface.allowedVlans = cur.filter(function(v){ return newList.indexOf(v) === -1; });
        } else {
          iface.allowedVlans = newList;
        }
      }
      lab.checkObjectives();
      return '';
    }

    // channel-group <N> mode <active|passive|desirable|auto|on>
    var cgMatch = raw.match(/^channel-group\s+(\d+)\s+mode\s+(active|passive|desirable|auto|on)/i);
    if (cgMatch && dev.mode === 'config-if') {
      var cgNum = parseInt(cgMatch[1]);
      var cgMode = cgMatch[2].toLowerCase();
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].channelGroup = { num: cgNum, mode: cgMode };
        // auto-create Port-channel parent interface
        var poName = 'Port-channel' + cgNum;
        if (!dev.interfaces[poName]) {
          dev.interfaces[poName] = { up: true, members: [], channelMode: cgMode };
        }
        var po = dev.interfaces[poName];
        if (!po.members) po.members = [];
        if (po.members.indexOf(dev.currentInterface) === -1) {
          po.members.push(dev.currentInterface);
        }
        po.channelMode = cgMode;
      }
      lab.checkObjectives();
      return '';
    }

    // switchport access vlan X
    var svMatch = raw.match(/^switchport\s+access\s+vlan\s+(\d+)/i);
    if (svMatch && dev.mode === 'config-if') {
      var vid = parseInt(svMatch[1]);
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].accessVlan = vid;
        // add port to vlan
        if (dev.vlans[vid]) {
          if (dev.vlans[vid].ports.indexOf(dev.currentInterface) === -1) {
            dev.vlans[vid].ports.push(dev.currentInterface);
          }
        }
      }
      lab.checkObjectives();
      return '';
    }

    // encapsulation dot1Q X (subinterface)
    var encapMatch = raw.match(/^encapsulation\s+dot1[Qq]\s+(\d+)/i);
    if (encapMatch && (dev.mode === 'config-subif')) {
      var vlanId = parseInt(encapMatch[1]);
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].dot1q = vlanId;
      }
      lab.checkObjectives();
      return '';
    }

    // ip address
    var ipMatch = raw.match(/^ip\s+address\s+(\d+\.\d+\.\d+\.\d+)\s+(\d+\.\d+\.\d+\.\d+)/i);
    if (ipMatch && (dev.mode === 'config-if' || dev.mode === 'config-subif')) {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].ip = ipMatch[1];
        dev.interfaces[dev.currentInterface].mask = ipMatch[2];
      }
      lab.checkObjectives();
      return '';
    }

    // no shutdown
    if (lower === 'no shutdown' && (dev.mode === 'config-if' || dev.mode === 'config-subif')) {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].up = true;
      }
      lab.checkObjectives();
      return '%LINK-3-UPDOWN: Interface ' + dev.currentInterface + ', changed state to up';
    }

    // shutdown
    if (lower === 'shutdown' && (dev.mode === 'config-if' || dev.mode === 'config-subif')) {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].up = false;
      }
      return '';
    }

    // OSPF network statement
    var netMatch = raw.match(/^network\s+(\d+\.\d+\.\d+\.\d+)\s+(\d+\.\d+\.\d+\.\d+)\s+area\s+(\d+)/i);
    if (netMatch && dev.mode === 'config-router') {
      if (dev.ospf) {
        dev.ospf.networks.push({ network: netMatch[1], wildcard: netMatch[2], area: parseInt(netMatch[3]) });
      }
      lab.checkObjectives();
      return '';
    }

    // OSPF router-id
    var ridMatch = raw.match(/^router-id\s+(\d+\.\d+\.\d+\.\d+)/i);
    if (ridMatch && dev.mode === 'config-router') {
      if (dev.ospf) dev.ospf.routerId = ridMatch[1];
      lab.checkObjectives();
      return '';
    }

    // ip route (static)
    var routeMatch = raw.match(/^ip\s+route\s+(\d+\.\d+\.\d+\.\d+)\s+(\d+\.\d+\.\d+\.\d+)\s+(\d+\.\d+\.\d+\.\d+)/i);
    if (routeMatch && dev.mode === 'config') {
      dev.routes.push({
        code: 'S', network: routeMatch[1], mask: routeMatch[2],
        prefix: maskToPrefix(routeMatch[2]),
        nextHop: routeMatch[3], ad: 1, metric: 0
      });
      lab.checkObjectives();
      return '';
    }

    // access-list
    var aclMatch = raw.match(/^access-list\s+(\d+)\s+(permit|deny)\s+(\d+\.\d+\.\d+\.\d+)\s+(\d+\.\d+\.\d+\.\d+)/i);
    if (aclMatch && dev.mode === 'config') {
      var aclNum = aclMatch[1];
      if (!dev.acls[aclNum]) dev.acls[aclNum] = [];
      dev.acls[aclNum].push({ action: aclMatch[2].toLowerCase(), source: aclMatch[3], wildcard: aclMatch[4] });
      lab.checkObjectives();
      return '';
    }

    // ip access-group
    var agMatch = raw.match(/^ip\s+access-group\s+(\d+)\s+(in|out)/i);
    if (agMatch && (dev.mode === 'config-if')) {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].accessGroup = { num: agMatch[1], direction: agMatch[2].toLowerCase() };
      }
      lab.checkObjectives();
      return '';
    }

    // ip nat inside / outside
    if (lower === 'ip nat inside' && dev.mode === 'config-if') {
      if (dev.currentInterface) {
        if (dev.nat.inside.indexOf(dev.currentInterface) === -1) dev.nat.inside.push(dev.currentInterface);
      }
      lab.checkObjectives();
      return '';
    }
    if (lower === 'ip nat outside' && dev.mode === 'config-if') {
      if (dev.currentInterface) {
        if (dev.nat.outside.indexOf(dev.currentInterface) === -1) dev.nat.outside.push(dev.currentInterface);
      }
      lab.checkObjectives();
      return '';
    }

    // ip nat inside source list X interface Y overload
    var natMatch = raw.match(/^ip\s+nat\s+inside\s+source\s+list\s+(\d+)\s+interface\s+(\S+)\s+overload/i);
    if (natMatch && dev.mode === 'config') {
      dev.nat.overload = true;
      dev.nat.acl = natMatch[1];
      dev.nat.overloadInterface = lab.normalizeInterface(natMatch[2]);
      lab.checkObjectives();
      return '';
    }

    // ip domain-name
    var domainMatch = raw.match(/^ip\s+domain[- ]name\s+(\S+)/i);
    if (domainMatch && dev.mode === 'config') {
      dev.custom.domainName = domainMatch[1];
      lab.checkObjectives();
      return '';
    }

    // crypto key generate rsa
    var cryptoMatch = raw.match(/^crypto\s+key\s+generate\s+rsa/i);
    if (cryptoMatch && dev.mode === 'config') {
      var modMatch = raw.match(/modulus\s+(\d+)/i);
      dev.custom.rsaModulus = modMatch ? parseInt(modMatch[1]) : 1024;
      dev.custom.rsaKeys = true;
      lab.checkObjectives();
      return 'The name for the keys will be: ' + dev.hostname + '.' + (dev.custom.domainName || 'local') + '\n% Generating ' + dev.custom.rsaModulus + ' bit RSA keys ... [OK]';
    }

    // username X secret Y
    var userMatch = raw.match(/^username\s+(\S+)\s+secret\s+(\S+)/i);
    if (userMatch && dev.mode === 'config') {
      if (!dev.custom.users) dev.custom.users = {};
      dev.custom.users[userMatch[1]] = userMatch[2];
      lab.checkObjectives();
      return '';
    }

    // line vty 0 4
    var lineMatch = raw.match(/^line\s+vty\s+(\d+)\s+(\d+)/i);
    if (lineMatch && dev.mode === 'config') {
      dev.mode = 'config-line';
      dev.custom._currentLine = 'vty ' + lineMatch[1] + ' ' + lineMatch[2];
      return '';
    }

    // transport input ssh
    if (lower === 'transport input ssh' && dev.mode === 'config-line') {
      dev.custom.transportSSH = true;
      lab.checkObjectives();
      return '';
    }

    // login local
    if (lower === 'login local' && dev.mode === 'config-line') {
      dev.custom.loginLocal = true;
      lab.checkObjectives();
      return '';
    }

    // switchport port-security
    if (lower === 'switchport port-security' && dev.mode === 'config-if') {
      if (dev.currentInterface) {
        if (!dev.portSecurity[dev.currentInterface]) dev.portSecurity[dev.currentInterface] = {};
        dev.portSecurity[dev.currentInterface].enabled = true;
      }
      lab.checkObjectives();
      return '';
    }

    // switchport port-security maximum X
    var psMaxMatch = raw.match(/^switchport\s+port-security\s+maximum\s+(\d+)/i);
    if (psMaxMatch && dev.mode === 'config-if') {
      if (dev.currentInterface && dev.portSecurity[dev.currentInterface]) {
        dev.portSecurity[dev.currentInterface].maximum = parseInt(psMaxMatch[1]);
      }
      lab.checkObjectives();
      return '';
    }

    // switchport port-security violation X
    var psVioMatch = raw.match(/^switchport\s+port-security\s+violation\s+(\S+)/i);
    if (psVioMatch && dev.mode === 'config-if') {
      if (dev.currentInterface && dev.portSecurity[dev.currentInterface]) {
        dev.portSecurity[dev.currentInterface].violation = psVioMatch[1].toLowerCase();
      }
      lab.checkObjectives();
      return '';
    }

    // show commands (work from priv mode)
    if (dev.mode === 'priv' || dev.mode === 'user') {
      if (lower === 'show vlan brief' || lower === 'sh vlan br') return showVlanBrief(dev);
      if (lower === 'show ip interface brief' || lower === 'sh ip int br') return showIpIntBrief(dev);
      if (lower === 'show ip route' || lower === 'sh ip ro') return showIpRoute(dev);
      if (lower === 'show ip ospf neighbor' || lower === 'sh ip ospf nei') return showOspfNeighbor(dev);
      if (lower === 'show access-lists' || lower === 'sh access-lists' || lower === 'show access-list') return showAccessLists(dev);
      if (lower === 'show ip nat translations') return 'Pro Inside global      Inside local       Outside local      Outside global\n(No active translations)';
      if (lower === 'show running-config' || lower === 'sh run') return '! Simulated running-config for ' + dev.hostname;
      if (lower.startsWith('show') || lower.startsWith('sh ')) return '(Simulated output for: ' + raw + ')';
    }

    // do show ... from config modes
    if (lower.startsWith('do ') && dev.mode.startsWith('config')) {
      var savedMode = dev.mode;
      dev.mode = 'priv';
      var result = lab.processCommand(raw.substring(3));
      dev.mode = savedMode;
      return result;
    }

    return undefined; // not handled
  }

  function maskToPrefix(mask) {
    return mask.split('.').reduce(function(sum, octet) {
      return sum + (octet >>> 0).toString(2).split('1').length - 1;
    }, 0);
  }

  // ── Full running-config generator for Bug Hunt ──────────────
  function showRunningConfig(dev) {
    var lines = ['Building configuration...', '', 'Current configuration:', '!', 'hostname ' + dev.hostname, '!'];

    // Interfaces
    var ifNames = Object.keys(dev.interfaces);
    ifNames.forEach(function(ifName) {
      var iface = dev.interfaces[ifName];
      lines.push('interface ' + ifName);
      if (iface.subinterface && iface.dot1q !== undefined) {
        lines.push(' encapsulation dot1Q ' + iface.dot1q);
      }
      if (iface.switchportMode === 'trunk') {
        lines.push(' switchport mode trunk');
        if (iface.trunkNativeVlan !== undefined) {
          lines.push(' switchport trunk native vlan ' + iface.trunkNativeVlan);
        }
      }
      if (iface.switchportMode === 'access' && iface.accessVlan) {
        lines.push(' switchport mode access');
        lines.push(' switchport access vlan ' + iface.accessVlan);
      }
      if (iface.ip) {
        lines.push(' ip address ' + iface.ip + ' ' + (iface.mask || '255.255.255.0'));
      }
      // NAT markings
      if (dev.nat && dev.nat.inside && dev.nat.inside.indexOf(ifName) !== -1) {
        lines.push(' ip nat inside');
      }
      if (dev.nat && dev.nat.outside && dev.nat.outside.indexOf(ifName) !== -1) {
        lines.push(' ip nat outside');
      }
      // ACL applied
      if (iface.accessGroup) {
        lines.push(' ip access-group ' + iface.accessGroup.num + ' ' + iface.accessGroup.direction);
      }
      // err-disabled state
      if (iface.errDisabled) {
        lines.push(' ! PORT IS ERR-DISABLED');
      }
      if (iface.up === false && !iface.subinterface) {
        lines.push(' shutdown');
      } else if (iface.up !== false) {
        lines.push(' no shutdown');
      }
      // port-security
      var ps = dev.portSecurity && dev.portSecurity[ifName];
      if (ps && ps.enabled) {
        lines.push(' switchport port-security');
        if (ps.maximum) lines.push(' switchport port-security maximum ' + ps.maximum);
        if (ps.violation) lines.push(' switchport port-security violation ' + ps.violation);
      }
      lines.push('!');
    });

    // OSPF
    if (dev.ospf) {
      lines.push('router ospf ' + dev.ospf.processId);
      if (dev.ospf.routerId) lines.push(' router-id ' + dev.ospf.routerId);
      dev.ospf.networks.forEach(function(n) {
        lines.push(' network ' + n.network + ' ' + n.wildcard + ' area ' + n.area);
      });
      lines.push('!');
    }

    // ACLs
    Object.keys(dev.acls).forEach(function(num) {
      lines.push('access-list ' + num + ':');
      dev.acls[num].forEach(function(entry) {
        lines.push(' ' + entry.action + ' ' + entry.source + ' ' + (entry.wildcard || ''));
      });
    });

    // NAT overload
    if (dev.nat && dev.nat.overload) {
      lines.push('ip nat inside source list ' + dev.nat.acl + ' interface ' + (dev.nat.overloadInterface || 'GigabitEthernet0/0') + ' overload');
    }

    // Static routes
    if (dev.routes && dev.routes.length > 0) {
      dev.routes.forEach(function(r) {
        if (r.code === 'S') lines.push('ip route ' + r.network + ' ' + r.mask + ' ' + r.nextHop);
      });
    }

    // SSH / crypto
    if (dev.custom.domainName) lines.push('ip domain-name ' + dev.custom.domainName);
    if (dev.custom.rsaKeys) lines.push('crypto key rsa generated (modulus ' + (dev.custom.rsaModulus || 2048) + ')');
    else if (dev.custom.rsaKeys === false) lines.push('! NO RSA KEYS GENERATED — SSH will not work');

    // VLANs
    var vids = Object.keys(dev.vlans).map(Number).sort(function(a,b){return a-b;});
    if (vids.length > 1 || (vids.length === 1 && vids[0] !== 1)) {
      lines.push('!');
      vids.forEach(function(vid) {
        if (vid === 1) return;
        lines.push('vlan ' + vid);
        if (dev.vlans[vid].name && dev.vlans[vid].name !== 'VLAN' + vid) {
          lines.push(' name ' + dev.vlans[vid].name);
        }
      });
    }

    lines.push('!', 'end');
    return lines.join('\n');
  }

  // ── Bug Hunt shared command handler (extends shared) ────────
  function bugHuntHandleCommand(lab, dev, raw, lower) {
    // "no access-list X" — remove an ACL entirely
    var noAclMatch = raw.match(/^no\s+access-list\s+(\d+)/i);
    if (noAclMatch && dev.mode === 'config') {
      var aclNum = noAclMatch[1];
      delete dev.acls[aclNum];
      // Also remove access-group references on interfaces
      Object.keys(dev.interfaces).forEach(function(ifName) {
        if (dev.interfaces[ifName].accessGroup && dev.interfaces[ifName].accessGroup.num === aclNum) {
          delete dev.interfaces[ifName].accessGroup;
        }
      });
      lab.checkObjectives();
      return '';
    }

    // "switchport trunk native vlan X"
    var nativeVlanMatch = raw.match(/^switchport\s+trunk\s+native\s+vlan\s+(\d+)/i);
    if (nativeVlanMatch && dev.mode === 'config-if') {
      var nvid = parseInt(nativeVlanMatch[1]);
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].trunkNativeVlan = nvid;
      }
      lab.checkObjectives();
      return '';
    }

    // "no ip nat inside" / "no ip nat outside" — remove NAT marking from current interface
    if (lower === 'no ip nat inside' && dev.mode === 'config-if') {
      if (dev.currentInterface) {
        var idx = dev.nat.inside.indexOf(dev.currentInterface);
        if (idx !== -1) dev.nat.inside.splice(idx, 1);
      }
      lab.checkObjectives();
      return '';
    }
    if (lower === 'no ip nat outside' && dev.mode === 'config-if') {
      if (dev.currentInterface) {
        var idx2 = dev.nat.outside.indexOf(dev.currentInterface);
        if (idx2 !== -1) dev.nat.outside.splice(idx2, 1);
      }
      lab.checkObjectives();
      return '';
    }

    // "clear ip ospf process" — allow re-seating OSPF (just acknowledge it)
    if (lower === 'clear ip ospf process' && (dev.mode === 'priv')) {
      lab.checkObjectives();
      return 'Reset ALL OSPF processes? [no]: y\n%OSPF: Process reset complete.';
    }

    // Shutdown on err-disabled port clears err-disabled
    if (lower === 'shutdown' && (dev.mode === 'config-if' || dev.mode === 'config-subif')) {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        dev.interfaces[dev.currentInterface].up = false;
        dev.interfaces[dev.currentInterface].errDisabled = false;
      }
      lab.checkObjectives();
      return '';
    }

    // No shutdown after clearing err-disabled
    if (lower === 'no shutdown' && (dev.mode === 'config-if' || dev.mode === 'config-subif')) {
      if (dev.currentInterface && dev.interfaces[dev.currentInterface]) {
        var nsIface = dev.interfaces[dev.currentInterface];
        if (!nsIface.errDisabled) {
          nsIface.up = true;
        }
        lab.checkObjectives();
        return nsIface.up ? '%LINK-3-UPDOWN: Interface ' + dev.currentInterface + ', changed state to up' : '%LINK-3-UPDOWN: Interface ' + dev.currentInterface + ' is err-disabled, shutdown first';
      }
      lab.checkObjectives();
      return '';
    }

    // Override show running-config to use full generator
    if ((dev.mode === 'priv' || dev.mode === 'user') && (lower === 'show running-config' || lower === 'sh run')) {
      return showRunningConfig(dev);
    }

    // show port-security interface X
    var showPsMatch = lower.match(/^show\s+(?:port-security|port-sec)\s+(?:interface\s+)?(.+)/);
    if (showPsMatch && (dev.mode === 'priv' || dev.mode === 'user')) {
      var psIfName = lab.normalizeInterface(showPsMatch[1].trim());
      var ifc = dev.interfaces[psIfName];
      var ps = dev.portSecurity[psIfName];
      if (ifc && ps) {
        var psLines = ['Port Security              : Enabled'];
        psLines.push('Port Status                : ' + (ifc.errDisabled ? 'Secure-shutdown (err-disabled)' : 'Secure-up'));
        psLines.push('Violation Mode             : ' + (ps.violation || 'shutdown'));
        psLines.push('Maximum MAC Addresses      : ' + (ps.maximum || 1));
        return psLines.join('\n');
      }
    }

    // show interfaces status (shows err-disabled)
    if ((lower === 'show interfaces status' || lower === 'sh int status') && (dev.mode === 'priv' || dev.mode === 'user')) {
      var statusLines = ['Port      Name               Status       Vlan       Duplex  Speed Type', ''];
      Object.keys(dev.interfaces).forEach(function(ifName) {
        var i = dev.interfaces[ifName];
        if (i.subinterface) return;
        var status = i.errDisabled ? 'err-disabled' : (i.up ? 'connected' : 'disabled');
        var vlan = i.accessVlan || (i.switchportMode === 'trunk' ? 'trunk' : '1');
        statusLines.push(ifName.substring(0, 10).padEnd(10) + ''.padEnd(19) + status.padEnd(13) + String(vlan).padEnd(11) + 'auto    auto');
      });
      return statusLines.join('\n');
    }

    // Delegate to standard shared handler
    return sharedHandleCommand(lab, dev, raw, lower);
  }

  var railsState = null; // { taskIdx, completedIds[], startedAt, totalTimeMs }
  var LAB5_PROGRESS_KEY = 'lab5_progress';

  function loadRailsProgress() {
    try {
      var raw = localStorage.getItem(LAB5_PROGRESS_KEY);
      if (!raw) return null;
      var p = JSON.parse(raw);
      if (typeof p.taskIdx !== 'number') return null;
      return p;
    } catch(e) { return null; }
  }
  function saveRailsProgress() {
    if (!railsState) return;
    try { localStorage.setItem(LAB5_PROGRESS_KEY, JSON.stringify(railsState)); } catch(e) {}
  }
  function resetRailsProgress() {
    try { localStorage.removeItem(LAB5_PROGRESS_KEY); } catch(e) {}
    railsState = null;
  }
  window._resetLab5 = resetRailsProgress;

  // Detect if a typed cmd looks like a real Cisco command (so we soft-lock instead of "invalid input")
  var CISCO_CMD_PREFIX = /^(en|enable|disable|conf|configure|exit|end|interface|int|ip|router|vlan|name|switchport|sw|show|sh|do|no|hostname|line|password|access-list|service|crypto|username|transport|login|network|encapsulation|enc|channel-group|host)\b/i;

  function evaluateRails(rawCmd, deviceName) {
    if (!railsState) return null;
    var lab = LABS[currentLabIdx];
    if (!lab || !lab.tasks) return null;
    var t = lab.tasks[railsState.taskIdx];
    if (!t) return { kind: 'lab-complete' };

    var cmd = rawCmd.trim();
    if (cmd === '') return { kind: 'empty' };

    // Universal navigation that's free-flowing (we still respect device + mode but allow without advancing if not matched)
    // Try matching the current task's expected regexes
    for (var i = 0; i < t.expected.length; i++) {
      var re = new RegExp(t.expected[i], 'i');
      if (re.test(cmd)) {
        if (deviceName !== t.device) {
          return { kind: 'wrong-device', expectedDevice: t.device };
        }
        return { kind: 'advance', task: t, taskIdx: railsState.taskIdx };
      }
    }

    // Off-rail but looks Cisco → soft lock
    if (CISCO_CMD_PREFIX.test(cmd)) {
      return { kind: 'off-rail', current: t, expectedDevice: t.device };
    }

    return { kind: 'invalid' };
  }

  function applyRailsAdvance(task) {
    var dev = currentLab.devices[task.device];
    if (!dev) return;
    // Apply mode + hostname shifts directly (rails owns state)
    if (task.modeAfter) dev.mode = task.modeAfter;
    if (task.hostnameAfter) dev.hostname = task.hostnameAfter;
    if (task.iface) dev.currentInterface = task.iface;

    // Track completion + advance
    if (!railsState.completedIds) railsState.completedIds = [];
    if (railsState.completedIds.indexOf(railsState.taskIdx) === -1) {
      railsState.completedIds.push(railsState.taskIdx);
    }
    railsState.taskIdx++;
    railsState.totalTimeMs = Date.now() - (railsState.startedAt || Date.now());

    saveRailsProgress();
    // Vibrate on mobile
    if (navigator.vibrate) { try { navigator.vibrate(40); } catch(e) {} }
  }

  function railsCurrentTaskText() {
    if (!railsState) return '';
    var lab = LABS[currentLabIdx];
    if (!lab || !lab.tasks) return '';
    var t = lab.tasks[railsState.taskIdx];
    return t ? t.text : 'Lab complete!';

    var lab = LABS[currentLabIdx];

  function renderRailsPanel() {
    if (!railsState || !currentLab) return;
    var lab = LABS[currentLabIdx];
    var tasks = lab.tasks || [];
    var idx = railsState.taskIdx;

        inp.focus();
        if (k === 'history-up') {
          var ev = new KeyboardEvent('keydown', { key: 'ArrowUp' });
          inp.dispatchEvent(ev);
        } else if (k === 'history-down') {
          var ev2 = new KeyboardEvent('keydown', { key: 'ArrowDown' });
          inp.dispatchEvent(ev2);
        } else if (k === 'tab') {
          var ev3 = new KeyboardEvent('keydown', { key: 'Tab' });
          inp.dispatchEvent(ev3);
        } else if (k === 'qmark') {
          inp.value = (inp.value || '') + '?';
        } else if (k === 'space') {
          inp.value = (inp.value || '') + ' ';
        } else if (k === 'paste-hint') {
