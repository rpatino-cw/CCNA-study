<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>Book Reader — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
  .page-header{padding:var(--s-md) 0 var(--s-sm);margin-bottom:var(--s-lg);border-bottom:2px solid var(--ink)}
  .page-header h1{font-size:2.4rem;margin-bottom:4px}
  .page-header .subtitle{font-family:var(--font-body);color:var(--ink-secondary);font-size:.95rem;font-style:italic}
  .book-nav{display:flex;gap:8px;margin-bottom:var(--s-md);flex-wrap:wrap;align-items:center}
  .book-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.85rem;background:var(--bg-surface);color:var(--ink)}
  .book-page{font-family:var(--font-mono);font-size:.82rem;color:var(--ink-muted)}
  .pdf-frame{width:100%;height:80vh;border:1px solid var(--border);border-radius:var(--radius-lg)}
  .no-book{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;text-align:center}
  .no-book h2{font-size:1.2rem;margin-bottom:8px}
  .no-book p{font-family:var(--font-body);font-size:.88rem;color:var(--ink-secondary);line-height:1.6;max-width:50ch;margin:0 auto}
  .book-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--s-md);margin-bottom:var(--s-lg)}
  .book-ref{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;text-align:left}
  .book-ref h3{font-family:var(--font-display);font-size:.95rem;font-weight:700;margin-bottom:4px}
  .book-ref .book-author{font-family:var(--font-body);font-size:.78rem;color:var(--ink-muted);margin-bottom:8px}
  .book-ref .book-desc{font-family:var(--font-body);font-size:.82rem;color:var(--ink-secondary);line-height:1.5;margin-bottom:10px}
  .book-ref .book-chs{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted)}
  .book-ref-badge{font-family:var(--font-display);font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
  .book-ref-badge.primary{background:rgba(180,83,9,.1);color:#B45309}
  .book-ref-badge.supplement{background:rgba(37,99,235,.1);color:#2563EB}
  .online-toc{margin-top:var(--s-lg)}
  .online-toc h2{font-family:var(--font-display);font-size:1.1rem;margin-bottom:var(--s-sm)}
  .setup-box h3{font-size:1.3rem}
  .setup-box .setup-sub{font-size:.85rem;opacity:.75;margin-bottom:16px}
  .toc-list{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--s-lg)}
  .toc-part{font-family:var(--font-display);font-size:.82rem;font-weight:700;padding:10px 16px;background:var(--bg-recessed);color:var(--ink)}
  .toc-ch{display:flex;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);cursor:pointer;font-size:.82rem;transition:background .1s}
  .toc-ch:hover{background:var(--bg-recessed)}
  .toc-ch:last-child{border-bottom:none}
  .toc-ch-name{font-family:var(--font-body);color:var(--ink-secondary)}
  .toc-ch-page{font-family:var(--font-mono);color:var(--ink-muted);font-size:.72rem}

  /* Reading progress bar */
  .read-progress{display:flex;align-items:center;gap:var(--s-md);margin-bottom:var(--s-lg);font-family:var(--font-display)}
  .read-progress-text{font-size:.82rem;font-weight:600;color:var(--ink);white-space:nowrap}
  .read-progress-bar{flex:1;height:6px;background:var(--bg-recessed);border-radius:100px;overflow:hidden}
  .read-progress-fill{height:100%;background:var(--prof-strong);border-radius:100px;transition:width .4s ease}

  /* Chapter checkbox */
  .ch-check{width:14px;height:14px;accent-color:var(--prof-strong);cursor:pointer;flex-shrink:0;margin-right:6px}
  .toc-ch-row{display:flex;align-items:flex-start;padding:0;border-bottom:1px solid var(--border);font-size:.82rem;transition:background .1s}
  .toc-ch-row:hover{background:var(--bg-recessed)}
  .toc-ch-row:last-child{border-bottom:none}
  .toc-ch-row.ch-read{background:var(--prof-strong-bg)}
  .toc-ch-main{display:flex;align-items:center;justify-content:space-between;flex:1;padding:8px 16px;cursor:pointer}
  .toc-ch-check-wrap{display:flex;align-items:center;padding:8px 0 8px 12px}

  /* Chapter summary */
  .ch-summary{font-family:var(--font-body);font-size:.78rem;color:var(--ink-secondary);line-height:1.5;padding:0 16px 4px 38px}

  /* Key exam points details */
  .ch-details{margin:0 16px 8px 38px}
  .ch-details summary{font-family:var(--font-display);font-size:.72rem;font-weight:600;color:var(--accent);cursor:pointer;padding:4px 0;letter-spacing:.02em;text-transform:uppercase}
  .ch-details summary:hover{color:var(--ink)}
  .ch-details ul{font-family:var(--font-body);font-size:.78rem;color:var(--ink-secondary);line-height:1.7;padding-left:16px;margin:4px 0 0}
  .ch-details ul li{margin-bottom:2px}

  /* Cross-link pills */
  .ch-links{display:flex;gap:4px;flex-wrap:wrap;padding:0 16px 10px 38px}
  .ch-links a{font-family:var(--font-mono);font-size:.68rem;background:var(--bg-recessed);color:var(--ink-muted);padding:2px 6px;border-radius:3px;text-decoration:none;transition:all .15s}
  .ch-links a:hover{background:var(--accent-light);color:var(--accent)}

  /* PDF.js viewer */
  .pdf-toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;position:sticky;top:0;z-index:10}
  .pdf-toolbar button{padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--ink);font-family:var(--font-display);font-size:.82rem;cursor:pointer;transition:background .15s}
  .pdf-toolbar button:hover{background:var(--bg-recessed)}
  .pdf-toolbar input[type="number"]{width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-mono);font-size:.82rem;text-align:center;background:var(--bg);color:var(--ink);-moz-appearance:textfield}
  .pdf-toolbar input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
  .pdf-toolbar .toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
  #pageTotalDisplay,#zoomDisplay{font-family:var(--font-mono);font-size:.82rem;color:var(--ink-muted);min-width:40px}
  .pdf-canvas-wrap{width:100%;height:78vh;overflow:auto;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);background:var(--bg-recessed);display:flex;justify-content:center;padding:12px 0}
  .pdf-canvas-wrap canvas{display:block;box-shadow:0 2px 12px rgba(0,0,0,.1)}
  .pdf-loading{text-align:center;padding:40px;font-family:var(--font-body);color:var(--ink-muted);font-size:.88rem}

  /* ── Chapter reading view ── */
  .reading-view{max-width:760px;margin:0 auto;padding:0 0 80px}
  .reading-back{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-display);font-size:.82rem;font-weight:600;color:var(--ink-muted);text-decoration:none;padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:var(--s-lg);transition:all .15s;cursor:pointer;background:var(--bg-surface)}
  .reading-back:hover{color:var(--ink);border-color:var(--ink);background:var(--bg)}
  .reading-ch-title{font-family:var(--font-display);font-size:1.8rem;font-weight:800;line-height:1.2;margin-bottom:6px;color:var(--ink)}
  .reading-ch-book{font-family:var(--font-body);font-size:.82rem;color:var(--ink-muted);margin-bottom:var(--s-lg)}

  .reading-topic{margin-bottom:48px;padding-bottom:40px;border-bottom:1px solid var(--border)}
  .reading-topic:last-child{border-bottom:none;margin-bottom:0}
  .topic-header{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
  .topic-badge{font-family:var(--font-mono);font-size:.7rem;font-weight:700;background:var(--ink);color:var(--bg);padding:3px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0}
  .topic-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--ink)}

  .topic-summary{font-family:var(--font-body);font-size:.92rem;color:var(--ink-secondary);line-height:1.7;margin-bottom:20px}
  .topic-section-label{font-family:var(--font-display);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted);margin-bottom:8px}
  .topic-keypoints{list-style:none;padding:0;margin:0 0 24px}
  .topic-keypoints li{font-family:var(--font-body);font-size:.88rem;color:var(--ink);line-height:1.6;padding:6px 0 6px 20px;position:relative}
  .topic-keypoints li::before{content:'';position:absolute;left:0;top:14px;width:6px;height:6px;border-radius:50%;background:var(--prof-strong,#B45309)}

  .topic-commands{margin-bottom:24px}
  .topic-cmd-block{background:var(--bg-recessed);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:8px;overflow-x:auto}
  .topic-cmd-code{font-family:var(--font-mono);font-size:.82rem;color:var(--ink);display:block;margin-bottom:4px;font-weight:600}
  .topic-cmd-desc{font-family:var(--font-body);font-size:.76rem;color:var(--ink-muted)}

  .topic-callout{border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px;font-family:var(--font-body);font-size:.85rem;line-height:1.6}
  .topic-callout-label{font-family:var(--font-display);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
  .callout-memory{background:rgba(59,130,246,.06);border-left:3px solid rgba(59,130,246,.5);color:var(--ink)}
  .callout-memory .topic-callout-label{color:rgba(59,130,246,.8)}
  .callout-exam{background:rgba(180,83,9,.06);border-left:3px solid rgba(180,83,9,.5);color:var(--ink)}
  .callout-exam .topic-callout-label{color:rgba(180,83,9,.8)}

  /* Clickable TOC chapters for GitHub Pages */
  .toc-ch.toc-ch-clickable{cursor:pointer;position:relative}
  .toc-ch.toc-ch-clickable:hover{background:rgba(180,83,9,.06)}
  .toc-ch.toc-ch-clickable::after{content:'Read';position:absolute;right:60px;top:50%;transform:translateY(-50%);font-family:var(--font-display);font-size:.65rem;font-weight:700;color:rgba(180,83,9,.6);opacity:0;transition:opacity .15s}
  .toc-ch.toc-ch-clickable:hover::after{opacity:1}

  .toc-ch-row.toc-ch-clickable .toc-ch-main{position:relative}
  .toc-ch-row.toc-ch-clickable .toc-ch-main::after{content:'Read';position:absolute;right:60px;top:50%;transform:translateY(-50%);font-family:var(--font-display);font-size:.65rem;font-weight:700;color:rgba(180,83,9,.6);opacity:0;transition:opacity .15s}
  .toc-ch-row.toc-ch-clickable:hover .toc-ch-main::after{opacity:1}

  /* Compact drop zone when reading view is active */
  #dropZone.compact-drop{padding:16px 24px !important}
  #dropZone.compact-drop div:first-child{font-size:.95rem !important;margin-bottom:4px !important}
  #dropZone.compact-drop div:nth-child(2){display:none !important}
  #dropZone.compact-drop label{font-size:.78rem !important;padding:6px 16px !important}

  /* ══ Core-concept + animated visuals (active filtering) ══ */
  /* SVG text classes (sourced from learn-visually so book visuals render correctly) */
  .reading-visual svg{max-width:100%;height:auto;display:block;margin:0 auto}
  .reading-visual svg .layer-label{font-size:11px;font-weight:700;fill:#fff;letter-spacing:.5px}
  .reading-visual svg .layer-sub{font-size:8.5px;fill:rgba(255,255,255,.8)}
  .reading-visual svg .anno{font-size:9px;fill:var(--ink-secondary,#57534E);font-weight:500}
  .reading-visual svg .anno-bold{font-size:9px;fill:var(--ink,#1C1917);font-weight:700}
  .reading-visual svg .pkt-label{font-size:8px;font-weight:700;fill:#fff;letter-spacing:.3px}
  .reading-visual svg .dim-text{font-size:8px;fill:#A8A29E}
  .reading-visual svg .cmd-text{font-size:8.5px;fill:#B45309;font-family:'JetBrains Mono',monospace;font-weight:500}
  .reading-visual svg .hover-group{cursor:pointer}
  .reading-visual svg .hover-group:hover rect,.reading-visual svg .hover-group:hover circle{filter:brightness(1.15)}

  /* Core concept hero — the one central idea */
  .core-concept{background:linear-gradient(135deg,rgba(180,83,9,.08),rgba(59,130,246,.05));border:1px solid var(--border);border-left:4px solid var(--prof-strong,#B45309);border-radius:var(--radius-lg);padding:18px 22px;margin-bottom:24px}
  .core-concept-tag{font-family:var(--font-display);font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--prof-strong,#B45309);margin-bottom:6px}
  .core-concept-line{font-family:var(--font-display);font-size:1.12rem;font-weight:700;line-height:1.4;color:var(--ink);margin-bottom:10px}
  .core-concept-why{font-family:var(--font-body);font-size:.84rem;color:var(--ink-secondary);line-height:1.6}

  /* Signal / noise split — memorize vs understand */
  .signal-split{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
  @media(max-width:560px){.signal-split{grid-template-columns:1fr}}
  .signal-col{border-radius:var(--radius);padding:13px 15px}
  .signal-col h4{font-family:var(--font-display);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:0 0 8px}
  .signal-col.memorize{background:rgba(180,83,9,.06);border:1px solid rgba(180,83,9,.22)}
  .signal-col.memorize h4{color:#B45309}
  .signal-col.understand{background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.22)}
  .signal-col.understand h4{color:#2563EB}
  .signal-col ul{list-style:none;padding:0;margin:0}
  .signal-col li{font-family:var(--font-body);font-size:.8rem;color:var(--ink);line-height:1.5;padding:4px 0 4px 16px;position:relative}
  .signal-col li::before{content:'\25B8';position:absolute;left:0;color:var(--ink-muted)}

  /* Exam trap */
  .concept-trap{background:rgba(220,38,38,.06);border-left:3px solid rgba(220,38,38,.5);border-radius:var(--radius);padding:12px 16px;margin-bottom:26px;font-family:var(--font-body);font-size:.84rem;line-height:1.6;color:var(--ink)}
  .concept-trap .topic-callout-label{color:#DC2626;font-family:var(--font-display);font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}

  /* Visual card */
  .reading-visual{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:16px}
  .reading-visual-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
  .reading-visual-title{font-family:var(--font-display);font-size:.86rem;font-weight:700;color:var(--ink)}
  .viz-replay{font-family:var(--font-display);font-size:.64rem;font-weight:600;color:var(--ink-muted);background:var(--bg-recessed);border:1px solid var(--border);border-radius:100px;padding:4px 12px;cursor:pointer;transition:all .15s;white-space:nowrap}
  .viz-replay:hover{color:var(--ink);border-color:var(--ink)}
  .reading-visual-cap{font-family:var(--font-body);font-size:.78rem;color:var(--ink-secondary);line-height:1.5;margin-top:10px;font-style:italic}
  .visuals-label{font-family:var(--font-display);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted);margin:0 0 12px}

  /* Supporting detail (de-emphasized — the filtered-out noise, kept on demand) */
  .supporting-detail{margin-top:8px}
  .supporting-detail > summary{font-family:var(--font-display);font-size:.72rem;font-weight:600;color:var(--ink-muted);cursor:pointer;padding:8px 0;letter-spacing:.03em;text-transform:uppercase;list-style:none}
  .supporting-detail > summary::-webkit-details-marker{display:none}
  .supporting-detail > summary::before{content:'\25B8  ';color:var(--ink-muted)}
  .supporting-detail[open] > summary::before{content:'\25BE  '}
  .supporting-detail > summary:hover{color:var(--ink)}

  /* ── Animation engine ── */
  @keyframes vizFadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes vizDash{to{stroke-dashoffset:-14}}
  @keyframes vizPulse{0%,100%{opacity:1}50%{opacity:.35}}
  .reading-visual svg .viz-flow{stroke-dasharray:4 3;animation:vizDash 1.1s linear infinite}
  .reading-visual svg .viz-pulse{animation:vizPulse 1.6s ease-in-out infinite}
  @media(prefers-reduced-motion:reduce){
    .reading-visual svg .viz-flow,.reading-visual svg .viz-pulse{animation:none}
  }

  /* Configuration block — exam priority, terminal look */
  .config-block{background:#1c1917;border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:24px;border:1px solid #292524}
  .config-head{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:.82rem;font-weight:700;color:#fafaf9;margin-bottom:12px}
  .config-badge{font-family:var(--font-mono);font-size:.6rem;font-weight:700;background:#B45309;color:#fff;padding:2px 7px;border-radius:3px;letter-spacing:.05em}
  .config-group{margin-bottom:12px}
  .config-group:last-child{margin-bottom:0}
  .config-label{font-family:var(--font-display);font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#a8a29e;margin-bottom:5px}
  .config-pre{font-family:var(--font-mono);font-size:.8rem;line-height:1.6;color:#e7e5e4;background:#0c0a09;border-radius:var(--radius);padding:12px 14px;overflow-x:auto;margin:0;white-space:pre}

  /* TOC: clean clickable rows — one look with the reading view */
  .toc-ch-main{gap:12px}
  .toc-ch-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .toc-obj{font-family:var(--font-mono);font-size:.62rem;font-weight:600;background:var(--bg-recessed);color:var(--ink-muted);padding:1px 6px;border-radius:3px}
  .toc-go{font-family:var(--font-display);font-weight:700;color:rgba(180,83,9,.55);font-size:1.1rem;line-height:1}
  .toc-ch-row.toc-ch-clickable:hover .toc-ch-name,.toc-ch-row.toc-ch-clickable:hover .toc-go{color:var(--accent,#B45309)}
  /* retire the old floating "Read" hint — the chevron is the new affordance */
  .toc-ch-row.toc-ch-clickable .toc-ch-main::after,.toc-ch.toc-ch-clickable::after{content:none}

  /* Reading view: practice footer (relocated quick links) */
  .reading-practice{margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
  .reading-practice-label{font-family:var(--font-display);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted);display:block;margin-bottom:10px}
  .reading-practice-links{display:flex;gap:6px;flex-wrap:wrap}
  .reading-practice-links a{font-family:var(--font-mono);font-size:.72rem;background:var(--bg-recessed);color:var(--ink-secondary);padding:5px 12px;border-radius:100px;text-decoration:none;border:1px solid var(--border);transition:all .15s}
  .reading-practice-links a:hover{background:var(--accent-light,rgba(180,83,9,.1));color:var(--accent,#B45309);border-color:var(--accent,#B45309)}
</style>
</head>
<body>
<div class="container-wide">
  <nav class="top-nav" id="main-nav"></nav>

  <header class="page-header">
    <h1>Book Reader</h1>
    <p class="subtitle">CCNA 200-301 Official Cert Guide — Wendell Odom. Jump to any chapter directly from CORE.</p>
  </header>

  <!-- Reading progress (Vol 2 only) -->
  <div class="read-progress" id="readProgress" style="display:none">
    <span class="read-progress-text" id="readProgressText">0/20 chapters read</span>
    <div class="read-progress-bar">
      <div class="read-progress-fill" id="readProgressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="book-nav">
    <select class="book-select" id="bookSelect" onchange="location.search='?book='+this.value">
      <option value="odom-library">Odom — Official Cert Guide (Vol 1+2 Library)</option>
      <option value="odom-vol2">Odom — Vol 2 Only (ACLs, Security, Services, Automation)</option>
      <option value="mcdowell">McDowell — Acing the CCNA Exam (MEAP v3)</option>
      <option value="singh">Singh — CCNA Exam Guide (Full Scope)</option>
    </select>
    <span class="book-page" id="pageInfo"></span>
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('tocSection').style.display=document.getElementById('tocSection').style.display==='none'?'block':'none'">Table of Contents</button>
  </div>

  <!-- TOC -->
  <div id="tocSection" style="display:none">
    <div class="toc-list" id="tocList"></div>
  </div>

  <!-- PDF viewer or setup instructions -->
  <div id="viewer"></div>

  <!-- Chapter reading view (shown when clicking a chapter on GitHub Pages) -->
  <div id="chapterReadingView" style="display:none"></div>
</div>

// --- Reading progress (unified for all books) ---
function updateProgressBar(bookId, toc) {
  var key = 'ccna_book_read_' + bookId;
  var read = JSON.parse(localStorage.getItem(key) || '[]');
  var total = toc.filter(function(i) { return i.ch; }).length;
  var count = read.length;
  var pct = total > 0 ? Math.round((count / total) * 100) : 0;
  var el = document.getElementById('readProgress');
  if (el) {
    el.style.display = 'flex';
    document.getElementById('readProgressText').textContent = count + '/' + total + ' chapters read';
    document.getElementById('readProgressFill').style.width = pct + '%';
  }
}

// --- Get topic map for a given book ---
function getTopicMap(bookId) {
  if (bookId === 'odom-library') return ODOM_MAP;
  if (bookId === 'mcdowell') return MCDOWELL_MAP;
  if (bookId === 'singh') return SINGH_MAP;
  if (bookId === 'odom-vol2') {
    // Convert CH_MAP (ch number → single string) to arrays
    var map = {};
    for (var k in CH_MAP) { map[k] = Array.isArray(CH_MAP[k]) ? CH_MAP[k] : [CH_MAP[k]]; }
    return map;
  }
  return {};
}

// --- Build the chapter reading view ---
function openChapterReading(bookId, chId, chTitle) {
  var topicMap = getTopicMap(bookId);
  var topicIds = topicMap[chId] || [];
  var book = BOOKS[bookId];
  if (!topicIds.length || !window.studyContent) {
    // No mapped topics — show a message
    var readingHtml = '<div class="reading-view">';
    readingHtml += '<a class="reading-back" onclick="closeChapterReading()">&#8592; Back to Table of Contents</a>';
    readingHtml += '<h2 class="reading-ch-title">Ch ' + chId + ' — ' + chTitle + '</h2>';
    readingHtml += '<p class="reading-ch-book">' + (book ? book.title : '') + '</p>';
    readingHtml += '<div class="topic-callout callout-memory"><span class="topic-callout-label">No study content mapped</span>This chapter does not have mapped CCNA topics yet. Drop a PDF above to read the original text.</div>';
    readingHtml += '</div>';
    document.getElementById('chapterReadingView').innerHTML = readingHtml;
    document.getElementById('chapterReadingView').style.display = 'block';
    document.getElementById('chapterReadingView').scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  var readingHtml = '<div class="reading-view">';
  readingHtml += '<a class="reading-back" onclick="closeChapterReading()">&#8592; Back to Table of Contents</a>';
  readingHtml += '<h2 class="reading-ch-title">Ch ' + chId + ' — ' + chTitle + '</h2>';
  readingHtml += '<p class="reading-ch-book">' + (book ? book.title : '') + ' &mdash; ' + topicIds.length + ' topic' + (topicIds.length > 1 ? 's' : '') + ' covered</p>';

  topicIds.forEach(function(tid) {
    var t = window.studyContent[tid];
    if (!t) return;
    var cc = (window.coreConcepts && window.coreConcepts[tid]) ? window.coreConcepts[tid] : null;
    var vds = (window.visualsData || []).filter(function(v) { return v.topic === tid; });

    readingHtml += '<div class="reading-topic">';
    // Header
    readingHtml += '<div class="topic-header"><span class="topic-badge">' + tid + '</span><span class="topic-title">' + t.title + '</span></div>';

    if (cc) {
      // Core concept hero — the one central idea (signal over noise)
      readingHtml += '<div class="core-concept">';
      readingHtml += '<div class="core-concept-tag">Core concept &middot; Objective ' + tid + '</div>';
      readingHtml += '<div class="core-concept-line">' + cc.core + '</div>';
      if (cc.why) readingHtml += '<div class="core-concept-why">' + cc.why + '</div>';
      readingHtml += '</div>';
      // Configuration — TOP PRIORITY, always shown when the chapter has config
      if (cc.config && cc.config.length) {
        readingHtml += '<div class="config-block"><div class="config-head"><span class="config-badge">CONFIG</span>Configuration</div>';
        cc.config.forEach(function(g) {
          readingHtml += '<div class="config-group">';
          if (g.label) readingHtml += '<div class="config-label">' + g.label + '</div>';
          readingHtml += '<pre class="config-pre">' + (g.cmds || []).map(esc).join('\n') + '</pre></div>';
        });
        if (cc.verify && cc.verify.length) {
          readingHtml += '<div class="config-group"><div class="config-label">Verify</div><pre class="config-pre">' + cc.verify.map(esc).join('\n') + '</pre></div>';
        }
        readingHtml += '</div>';
      }
      // Signal / noise split — memorize vs understand
      if ((cc.memorize && cc.memorize.length) || (cc.understand && cc.understand.length)) {
        readingHtml += '<div class="signal-split">';
        readingHtml += '<div class="signal-col memorize"><h4>Memorize</h4><ul>';
        (cc.memorize || []).forEach(function(m) { readingHtml += '<li>' + m + '</li>'; });
        readingHtml += '</ul></div>';
        readingHtml += '<div class="signal-col understand"><h4>Understand</h4><ul>';
        (cc.understand || []).forEach(function(u) { readingHtml += '<li>' + u + '</li>'; });
        readingHtml += '</ul></div>';
        readingHtml += '</div>';
      }
      if (cc.trap) {
        readingHtml += '<div class="concept-trap"><span class="topic-callout-label">Exam trap</span>' + cc.trap + '</div>';
      }
    } else {
      readingHtml += '<p class="topic-summary">' + t.summary + '</p>';
    }

    // Animated book visuals tied to the core concept
    if (vds.length) {
      readingHtml += '<div class="visuals-label">Visualize it</div>';
      vds.forEach(function(v) {
        var spec = null;
        if (cc && cc.visuals) {
          for (var i = 0; i < cc.visuals.length; i++) { if (cc.visuals[i].id === v.id) { spec = cc.visuals[i]; break; } }
        }
        var anim = (spec && spec.anim) ? spec.anim : 'cascade flow';
        var cap = (spec && spec.caption) ? spec.caption : (v.desc || '');
        readingHtml += '<div class="reading-visual" data-anim="' + anim + '">';
        readingHtml += '<div class="reading-visual-head"><span class="reading-visual-title">' + v.title + '</span><button type="button" class="viz-replay">&#9654; Replay</button></div>';
        readingHtml += '<div class="reading-visual-svg">' + v.svg + '</div>';
        if (cap) readingHtml += '<div class="reading-visual-cap">' + cap + '</div>';
        readingHtml += '</div>';
      });
    }

    // Supporting detail — the filtered-out noise, kept on demand
    var hasDetail = (t.keyPoints && t.keyPoints.length) || (t.commands && t.commands.length) || t.memoryTip || t.examTip;
    if (cc && hasDetail) {
      readingHtml += '<details class="supporting-detail"><summary>Full detail (key points, commands, tips)</summary>' + detailHtml(t) + '</details>';
    } else if (hasDetail) {
      readingHtml += detailHtml(t);
    }

    readingHtml += '</div>'; // close reading-topic
  });

  // Practice footer — quick links (relocated here from the TOC list)
  readingHtml += '<div class="reading-practice"><span class="reading-practice-label">Practice this chapter</span><div class="reading-practice-links">';
  topicIds.forEach(function(tid) { readingHtml += '<a href="core.html#' + tid + '">CORE ' + tid + '</a>'; });
  readingHtml += '<a href="mini-lab.html?topic=' + topicIds[0] + '">Mini Lab</a>';
  readingHtml += '<a href="quiz.html?learn=' + topicIds[0] + '">Quiz</a>';
  readingHtml += '</div></div>';

  readingHtml += '</div>'; // close reading-view
  var rv = document.getElementById('chapterReadingView');
  rv.innerHTML = readingHtml;
  rv.style.display = 'block';
  wireVisuals(rv);
  rv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Minimal HTML escape for config/command text rendered into <pre>
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// Renders the detailed key-points/commands/tips block (the "noise", shown on demand)
function detailHtml(t) {
  var h = '';
  if (t.keyPoints && t.keyPoints.length) {
    h += '<div class="topic-section-label">Key Points</div><ul class="topic-keypoints">';
    t.keyPoints.forEach(function(kp) { h += '<li>' + kp + '</li>'; });
    h += '</ul>';
  }
  if (t.commands && t.commands.length) {
    h += '<div class="topic-section-label">Commands</div><div class="topic-commands">';
    t.commands.forEach(function(c) {
      h += '<div class="topic-cmd-block"><code class="topic-cmd-code">' + c.cmd + '</code><span class="topic-cmd-desc">' + c.desc + '</span></div>';
    });
    h += '</div>';
  }
  if (t.memoryTip) h += '<div class="topic-callout callout-memory"><span class="topic-callout-label">Memory Tip</span>' + t.memoryTip + '</div>';
  if (t.examTip) h += '<div class="topic-callout callout-exam"><span class="topic-callout-label">Exam Tip</span>' + t.examTip + '</div>';
  return h;
}

// ── Visual animation engine: cascade (stagger reveal), flow (marching dashes), pulse (key labels) ──
function animateVisual(card) {
  var svg = card.querySelector('svg'); if (!svg) return;
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var presets = (card.getAttribute('data-anim') || 'cascade flow').split(/\s+/);
  if (presets.indexOf('cascade') > -1) {
    var kids = svg.querySelectorAll(':scope > g, :scope > rect, :scope > line, :scope > polygon, :scope > text');
    var n = 0;
    Array.prototype.forEach.call(kids, function(el) {
      if (el.hasAttribute('stroke-dasharray')) return; // leave dashed lines for flow
      el.style.opacity = '0';
      el.style.animation = 'vizFadeUp .45s ease forwards';
      el.style.animationDelay = (n * 55) + 'ms';
      n++;
    });
  }
  if (presets.indexOf('flow') > -1) {
    Array.prototype.forEach.call(svg.querySelectorAll('[stroke-dasharray]'), function(el) { el.classList.add('viz-flow'); });
  }
  if (presets.indexOf('pulse') > -1) {
    Array.prototype.forEach.call(svg.querySelectorAll('.anno-bold'), function(el) { el.classList.add('viz-pulse'); });
  }
}
function resetVisual(card) {
  var svg = card.querySelector('svg'); if (!svg) return;
  Array.prototype.forEach.call(svg.querySelectorAll('*'), function(el) {
    el.style.animation = ''; el.style.animationDelay = ''; el.style.opacity = '';
    el.classList.remove('viz-flow'); el.classList.remove('viz-pulse');
  });
  void svg.offsetWidth; // force reflow so animations restart
  animateVisual(card);
}
function wireVisuals(root) {
  Array.prototype.forEach.call(root.querySelectorAll('.reading-visual'), function(card) {
    var btn = card.querySelector('.viz-replay');
    if (btn) btn.addEventListener('click', function() { resetVisual(card); });
    setTimeout(function() { animateVisual(card); }, 140);
  });
}

function closeChapterReading() {
  document.getElementById('chapterReadingView').style.display = 'none';
  document.getElementById('chapterReadingView').innerHTML = '';
  document.getElementById('tocSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// buildVol2Toc removed — all books use unified buildSimpleToc now

// --- Build unified TOC for all books (same design) ---
function buildSimpleToc(toc, bookId) {
  var isGH = location.hostname.includes('github.io');
  var topicMap = getTopicMap(bookId);
  var read = JSON.parse(localStorage.getItem('ccna_book_read_' + bookId) || '[]');
  var html = '';
  toc.forEach(function(item) {
    if (item.part) { html += '<div class="toc-part">' + item.part + '</div>'; return; }
    var chId = bookId + '-ch' + item.ch;
    var isRead = read.indexOf(chId) !== -1;
    var hasMapped = topicMap[item.ch] && topicMap[item.ch].length > 0 && !!window.studyContent;
    var clickable = hasMapped ? ' toc-ch-clickable' : '';
    var topics = hasMapped ? topicMap[item.ch] : [];

    // Clean, clickable title row. The full core-concept view opens on click.
    html += '<div id="ch-' + item.ch + '" class="toc-ch-row' + (isRead ? ' ch-read' : '') + clickable + '" data-ch="' + item.ch + '" data-book="' + bookId + '" data-title="' + item.title.replace(/"/g, '&quot;') + '" data-page="' + item.page + '" data-mapped="' + (hasMapped ? '1' : '0') + '">';
    html += '<div class="toc-ch-check-wrap"><input type="checkbox" class="ch-check" data-chid="' + chId + '" data-book="' + bookId + '"' + (isRead ? ' checked' : '') + ' onclick="event.stopPropagation(); toggleBookChapterRead(this)"></div>';
    html += '<div class="toc-ch-main">';
    html += '<span class="toc-ch-name">Ch ' + item.ch + ' — ' + item.title + '</span>';
    html += '<span class="toc-ch-right">';
    if (topics.length) { topics.forEach(function(t) { html += '<span class="toc-obj">' + t + '</span>'; }); }
    html += '<span class="toc-ch-page">p.' + item.page + '</span>';
    if (hasMapped) { html += '<span class="toc-go" aria-hidden="true">&#8250;</span>'; }
    html += '</span>';
    html += '</div>';
    html += '</div>';
  });
  return html;
}

window.toggleBookChapterRead = function(checkbox) {
  var chId = checkbox.dataset.chid;
  var bookId = checkbox.dataset.book;
  var key = 'ccna_book_read_' + bookId;
  var read = JSON.parse(localStorage.getItem(key) || '[]');
  if (checkbox.checked) { if (read.indexOf(chId) === -1) read.push(chId); }
  else { read = read.filter(function(c) { return c !== chId; }); }
  localStorage.setItem(key, JSON.stringify(read));
  var row = checkbox.closest('.toc-ch-row');
  if (row) row.classList.toggle('ch-read', checkbox.checked);
};

function init() {
  const params = new URLSearchParams(location.search);
  const bookId = params.get('book') || 'odom-vol2';
  const page = parseInt(params.get('page')) || 0;
  const book = BOOKS[bookId];
  if (!book) return;

  // Render TOC (unified for all books)
  document.getElementById('tocList').innerHTML = buildSimpleToc(book.toc, bookId);
  updateProgressBar(bookId, book.toc);

  document.getElementById('bookSelect').value = bookId;

  // Event delegation for TOC clicks (avoids inline onclick escaping issues)
  document.getElementById('tocList').addEventListener('click', function(e) {
    // Find the closest toc-ch or toc-ch-main
    var row = e.target.closest('.toc-ch[data-book], .toc-ch-row[data-book]');
    if (!row) return;
    // Skip if click was on checkbox
    if (e.target.closest('.toc-ch-check-wrap')) return;
    var bk = row.getAttribute('data-book');
    var ch = row.getAttribute('data-ch');
    var title = row.getAttribute('data-title');
    var pg = parseInt(row.getAttribute('data-page'));
    var mapped = row.getAttribute('data-mapped') === '1';
    if (mapped) {
      // Convert ch to number if it looks numeric (for vol2, mcdowell, singh)
      var chVal = /^\d+$/.test(ch) ? parseInt(ch) : ch;
      openChapterReading(bk, chVal, title);
    } else {
      goToPage(pg);
    }
  });

  const pdfPage = page > 0 ? page + book.pageOffset : 1;
  document.getElementById('pageInfo').textContent = page > 0 ? 'Page ' + page : '';

  // Check if we're on GitHub Pages (no local PDFs)
  const isGitHubPages = location.hostname.includes('github.io');

  // --- Hash-based chapter navigation (#ch-X) ---
  function scrollToChapterHash() {
    var hash = location.hash;
    if (!hash || hash.indexOf('#ch-') !== 0) return;
    document.getElementById('tocSection').style.display = 'block';
    var target = document.getElementById(hash.slice(1));
    if (!target) return;
    setTimeout(function() {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.style.outline = '2px solid var(--accent)';
      target.style.outlineOffset = '-2px';
      target.style.borderRadius = 'var(--radius)';
      // Auto-open reading view on GitHub Pages if chapter has mapped content
      if (isGitHubPages && target.getAttribute('data-mapped') === '1') {
        var ch = target.getAttribute('data-ch');
        var title = target.getAttribute('data-title');
        var chVal = /^\d+$/.test(ch) ? parseInt(ch) : ch;
        openChapterReading(bookId, chVal, title);
      }
    }, 100);
  }

  if (isGitHubPages) {
    // On GitHub Pages, skip PDF viewer — go straight to study content TOC
    document.getElementById('viewer').innerHTML = '';
    document.getElementById('tocSection').style.display = 'block';
    scrollToChapterHash();
    return;
  }

  // PDF.js viewer
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

  document.getElementById('viewer').innerHTML =
    '<div class="pdf-toolbar">' +
      '<button onclick="prevPage()" title="Previous page (Left arrow)">&#9664;</button>' +
      '<input type="number" id="pageInput" min="1" value="' + pdfPage + '" onchange="jumpToPage(this.value)">' +
      '<span id="pageTotalDisplay">/ ...</span>' +
      '<button onclick="nextPage()" title="Next page (Right arrow)">&#9654;</button>' +
      '<span class="toolbar-sep"></span>' +
      '<button onclick="zoomOut()" title="Zoom out (-)">&#8722;</button>' +
      '<span id="zoomDisplay">--</span>' +
      '<button onclick="zoomIn()" title="Zoom in (+)">+</button>' +
      '<button onclick="zoomFit()" title="Fit to width">Fit</button>' +
    '</div>' +
    '<div class="pdf-canvas-wrap" id="canvasWrap">' +
      '<div class="pdf-loading">Loading PDF...</div>' +
      '<canvas id="pdfCanvas" style="display:none"></canvas>' +
    '</div>';

  pdfjsLib.getDocument(book.file).promise.then(function(pdf) {
    pdfDoc = pdf;
    document.getElementById('pageTotalDisplay').textContent = '/ ' + pdf.numPages;
    document.getElementById('pageInput').max = pdf.numPages;
    currentPageNum = pdfPage;
    zoomFit();
  }).catch(function(err) {
    document.getElementById('canvasWrap').innerHTML =
      '<div class="pdf-loading">Could not load PDF. Make sure <code>' + book.file + '</code> exists in the project folder.</div>';
  });

  // Local mode: also handle chapter hash navigation
  scrollToChapterHash();
}

function goToPage(page) {
  const isGitHubPages = location.hostname.includes('github.io');
  if (isGitHubPages) {
    // On GitHub Pages, highlight the selected chapter instead of reloading
    document.querySelectorAll('.toc-ch-row .toc-ch-main, .toc-ch').forEach(function(el) { el.style.background = ''; el.style.fontWeight = ''; });
    var allRows = document.querySelectorAll('.toc-ch-row .toc-ch-main, .toc-ch');
    allRows.forEach(function(el) {
      if (el.textContent.includes('p.' + page)) {
        el.style.background = 'rgba(180,83,9,.1)';
        el.style.fontWeight = '700';
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
    // Show a toast explaining PDFs work locally only
    var toast = document.getElementById('bookToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'bookToast';
      toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);font-family:var(--font-display);font-size:.78rem;padding:10px 20px;border-radius:var(--radius-lg);z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.15);transition:opacity .3s';
      document.body.appendChild(toast);
    }
    toast.textContent = 'Chapter highlighted — page ' + page + '. To read the actual PDF, run the site locally (see instructions below).';
    toast.style.opacity = '1';
    setTimeout(function() { toast.style.opacity = '0'; }, 4000);
    return;
  }
  // PDF.js: render the page without reloading
  const params = new URLSearchParams(location.search);
  const bookId = params.get('book') || 'odom-vol2';
  const book = BOOKS[bookId];
  if (book && pdfDoc) {
    var pdfPage = page + book.pageOffset;
    renderPage(pdfPage);
  }
}

// --- PDF.js rendering ---
var pdfDoc = null;
var currentPageNum = 1;
var currentScale = 1.5;
var rendering = false;

function renderPage(num) {
  if (!pdfDoc || rendering) return;
  rendering = true;
  pdfDoc.getPage(num).then(function(page) {
    var viewport = page.getViewport({ scale: currentScale });
    var canvas = document.getElementById('pdfCanvas');
    if (!canvas) { rendering = false; return; }
    var ctx = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    canvas.style.display = 'block';
    var loadingEl = document.querySelector('.pdf-loading');
    if (loadingEl) loadingEl.style.display = 'none';
    page.render({ canvasContext: ctx, viewport: viewport }).promise.then(function() {
      currentPageNum = num;
      document.getElementById('pageInput').value = num;
      document.getElementById('zoomDisplay').textContent = Math.round(currentScale * 100) + '%';
      rendering = false;
    });
  });
}

function prevPage() { if (currentPageNum > 1) renderPage(currentPageNum - 1); }
function nextPage() { if (pdfDoc && currentPageNum < pdfDoc.numPages) renderPage(currentPageNum + 1); }
function jumpToPage(val) { var n = parseInt(val); if (pdfDoc && n >= 1 && n <= pdfDoc.numPages) renderPage(n); }
function zoomIn() { currentScale = Math.min(currentScale + 0.25, 4); renderPage(currentPageNum); }
function zoomOut() { currentScale = Math.max(currentScale - 0.25, 0.5); renderPage(currentPageNum); }
function zoomFit() {
  var wrap = document.getElementById('canvasWrap');
  if (!pdfDoc || !wrap) return;
  pdfDoc.getPage(currentPageNum).then(function(page) {
    var vp = page.getViewport({ scale: 1 });
    currentScale = (wrap.clientWidth - 40) / vp.width;
    renderPage(currentPageNum);
  });
}

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); nextPage(); }
  if ((e.key === '+' || e.key === '=') && !e.ctrlKey && !e.metaKey) zoomIn();
  if (e.key === '-' && !e.ctrlKey && !e.metaKey) zoomOut();
});

init();


    window.closeChapterReading = closeChapterReading;
    window.jumpToPage = jumpToPage;
    window.nextPage = nextPage;
    window.prevPage = prevPage;
    window.zoomFit = zoomFit;
    window.zoomIn = zoomIn;
    window.zoomOut = zoomOut;
  });</script>
