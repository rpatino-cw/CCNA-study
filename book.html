<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Reader — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  .page-header{padding:var(--s-xl) 0 var(--s-lg);margin-bottom:var(--s-lg);border-bottom:2px solid var(--ink)}
  .page-header h1{font-size:2.4rem;margin-bottom:4px}
  .page-header .subtitle{font-family:var(--font-body);color:var(--ink-secondary);font-size:.95rem;font-style:italic}
  .book-nav{display:flex;gap:8px;margin-bottom:var(--s-md);flex-wrap:wrap;align-items:center}
  .book-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.85rem;background:var(--bg-surface);color:var(--ink)}
  .book-page{font-family:var(--font-mono);font-size:.82rem;color:var(--ink-muted)}
  .pdf-frame{width:100%;height:80vh;border:1px solid var(--border);border-radius:var(--radius-lg)}
  .no-book{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;text-align:center}
  .no-book h2{font-size:1.2rem;margin-bottom:8px}
  .no-book p{font-family:var(--font-body);font-size:.88rem;color:var(--ink-secondary);line-height:1.6;max-width:50ch;margin:0 auto}
  .book-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--s-md);margin-bottom:var(--s-lg)}
  .book-ref{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;text-align:left}
  .book-ref h3{font-family:var(--font-display);font-size:.95rem;font-weight:700;margin-bottom:4px}
  .book-ref .book-author{font-family:var(--font-body);font-size:.78rem;color:var(--ink-muted);margin-bottom:8px}
  .book-ref .book-desc{font-family:var(--font-body);font-size:.82rem;color:var(--ink-secondary);line-height:1.5;margin-bottom:10px}
  .book-ref .book-chs{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted)}
  .book-ref-badge{font-family:var(--font-display);font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
  .book-ref-badge.primary{background:rgba(180,83,9,.1);color:#B45309}
  .book-ref-badge.supplement{background:rgba(37,99,235,.1);color:#2563EB}
  .online-toc{margin-top:var(--s-lg)}
  .online-toc h2{font-family:var(--font-display);font-size:1.1rem;margin-bottom:var(--s-sm)}
  .setup-box{background:var(--bg-recessed);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-top:var(--s-lg);text-align:left;max-width:600px;margin-left:auto;margin-right:auto}
  .setup-box h3{font-family:var(--font-display);font-size:.88rem;margin-bottom:8px}
  .setup-box ol{font-family:var(--font-body);font-size:.82rem;color:var(--ink-secondary);line-height:1.8;padding-left:20px}
  .setup-box code{font-family:var(--font-mono);font-size:.78rem;background:var(--bg-surface);padding:2px 6px;border-radius:3px}
  .toc-list{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:var(--s-lg)}
  .toc-part{font-family:var(--font-display);font-size:.82rem;font-weight:700;padding:10px 16px;background:var(--bg-recessed);color:var(--ink)}
  .toc-ch{display:flex;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);cursor:pointer;font-size:.82rem;transition:background .1s}
  .toc-ch:hover{background:var(--bg-recessed)}
  .toc-ch:last-child{border-bottom:none}
  .toc-ch-name{font-family:var(--font-body);color:var(--ink-secondary)}
  .toc-ch-page{font-family:var(--font-mono);color:var(--ink-muted);font-size:.72rem}
</style>
</head>
<body>
<div class="container-wide">
  <nav class="top-nav" id="main-nav"></nav>

  <header class="page-header">
    <h1>Book Reader</h1>
    <p class="subtitle">CCNA 200-301 Official Cert Guide — Wendell Odom. Jump to any chapter directly from CORE.</p>
  </header>

  <div class="book-nav">
    <select class="book-select" id="bookSelect" onchange="location.search='?book='+this.value">
      <option value="odom-library">Odom — Official Cert Guide (Vol 1+2 Library)</option>
      <option value="odom-vol2">Odom — Vol 2 Only (ACLs, Security, Services, Automation)</option>
      <option value="mcdowell">McDowell — Acing the CCNA Exam (MEAP v3)</option>
      <option value="singh">Singh — CCNA Exam Guide (Full Scope)</option>
    </select>
    <span class="book-page" id="pageInfo"></span>
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('tocSection').style.display=document.getElementById('tocSection').style.display==='none'?'block':'none'">Table of Contents</button>
  </div>

  <!-- TOC -->
  <div id="tocSection" style="display:none">
    <div class="toc-list" id="tocList"></div>
  </div>

  <!-- PDF viewer or setup instructions -->
  <div id="viewer"></div>
</div>

<script src="js/store.js"></script>
<script src="js/sync.js"></script>
<script src="js/group-chat.js"></script>
<script src="js/nav.js"></script>
<script src="js/tutor.js"></script>
<script>
const BOOKS = {
  'odom-library': {
    file: 'books/odom-library.pdf',
    title: 'CCNA 200-301 Official Cert Guide Library (Vol 1+2)',
    pageOffset: 0,
    toc: [
      {part:'Volume 1'},
      {ch:'V1-5',title:'Analyzing Ethernet LAN Switching',page:95},
      {ch:'V1-8',title:'Configuring Ethernet Switching',page:157},
      {ch:'V1-11',title:'Perspectives on IPv4 Subnetting',page:241},
      {ch:'V1-12',title:'Analyzing Classful IPv4 Networks',page:259},
      {ch:'V1-14',title:'Analyzing Subnet Masks',page:305},
      {ch:'V1-16',title:'Configuring IPv4 Addresses and Static Routes',page:359},
      {ch:'V1-17',title:'IP Routing in the LAN',page:385},
      {ch:'V1-18',title:'Troubleshooting IPv4 Routing',page:415},
      {ch:'V1-19',title:'Understanding OSPF Concepts',page:441},
      {ch:'V1-20',title:'Implementing OSPF',page:471},
      {ch:'V1-21',title:'OSPF Network Types and Neighbors',page:503},
      {ch:'V1-23',title:'Fundamentals of VLANs',page:543},
      {ch:'V1-24',title:'Implementing VLANs and STP',page:567},
      {ch:'V1-25',title:'Troubleshooting VLANs and Trunking',page:603},
      {ch:'V1-26',title:'Fundamentals of Wireless LANs',page:623},
      {ch:'V1-27',title:'Analyzing Cisco Wireless Architectures',page:655},
      {part:'Volume 2 (starts ~page 700+)'},
      {ch:'V2-1',title:'TCP/IP Transport and Applications',page:710},
      {ch:'V2-2',title:'Basic IPv4 ACLs',page:730},
      {ch:'V2-3',title:'Advanced IPv4 ACLs',page:750},
      {ch:'V2-4',title:'Security Architectures',page:775},
      {ch:'V2-5',title:'Securing Network Devices',page:793},
      {ch:'V2-10',title:'NAT',page:908},
      {ch:'V2-11',title:'QoS',page:932},
      {ch:'V2-16',title:'Controller-Based Networking',page:1062},
      {ch:'V2-18',title:'REST and JSON',page:1112},
      {ch:'V2-19',title:'Ansible, Puppet, and Chef',page:1134},
    ]
  },
  'mcdowell': {
    file: 'books/mcdowell-ccna.pdf',
    title: 'Acing the CCNA Exam — Jeremy McDowell (MEAP v3)',
    pageOffset: 2,
    toc: [
      {ch:1,title:'Introduction to the CCNA',page:1},
      {ch:2,title:'Network Devices',page:20},
      {ch:3,title:'Cables, Connectors, and Ports',page:50},
      {ch:4,title:'The TCP/IP Networking Model',page:80},
      {ch:5,title:'The Cisco IOS CLI',page:100},
      {ch:6,title:'Ethernet LAN Switching',page:130},
      {ch:7,title:'IPv4 Addressing',page:160},
      {ch:8,title:'Router and Switch Interfaces',page:190},
      {ch:9,title:'Routing Fundamentals',page:220},
      {ch:10,title:'The Life of a Packet',page:250},
      {ch:11,title:'Subnetting IPv4 Networks',page:280},
      {ch:12,title:'VLANs',page:310},
      {ch:13,title:'DTP and VTP',page:340},
      {ch:14,title:'Spanning Tree Protocol',page:370},
      {ch:15,title:'Rapid Spanning Tree Protocol',page:400},
    ]
  },
  'singh': {
    file: 'books/singh-ccna.pdf',
    title: 'Implementing and Administering Cisco Solutions — Glen D. Singh',
    pageOffset: 18,
    toc: [
      {part:'Section 1 — Network Fundamentals'},
      {ch:1,title:'Introduction to Networking',page:20},
      {ch:2,title:'Getting Started with Cisco IOS Devices',page:70},
      {part:'Section 2 — Network Access'},
      {ch:3,title:'VLANs and Trunking',page:122},
      {ch:4,title:'STP and EtherChannel',page:170},
      {part:'Section 3 — IP Connectivity'},
      {ch:5,title:'IPv4 and IPv6 Addressing',page:220},
      {ch:6,title:'Routing Concepts and Protocols',page:280},
      {ch:7,title:'OSPF',page:330},
      {part:'Section 4 — IP Services'},
      {ch:8,title:'NAT, DHCP, DNS, NTP',page:380},
      {ch:9,title:'Network Management (SNMP, Syslog)',page:430},
      {part:'Section 5 — Security'},
      {ch:10,title:'Network Security Fundamentals',page:480},
      {ch:11,title:'ACLs and Firewalls',page:530},
      {part:'Section 6 — Automation'},
      {ch:12,title:'Automation and Programmability',page:580},
    ]
  },
  'odom-vol2': {
    file: 'books/odom-vol2.pdf',
    title: 'CCNA 200-301 Official Cert Guide, Volume 2',
    pageOffset: 30,
    toc: [
      {part:'Part I — IP Access Control Lists'},
      {ch:1,title:'Introduction to TCP/IP Transport and Applications',page:4},
      {ch:2,title:'Basic IPv4 Access Control Lists',page:24},
      {ch:3,title:'Advanced IPv4 Access Control Lists',page:44},
      {part:'Part II — Security Services'},
      {ch:4,title:'Security Architectures',page:68},
      {ch:5,title:'Securing Network Devices',page:86},
      {ch:6,title:'Implementing Switch Port Security',page:106},
      {ch:7,title:'Implementing DHCP',page:122},
      {ch:8,title:'DHCP Snooping and ARP Inspection',page:144},
      {part:'Part III — IP Services'},
      {ch:9,title:'Device Management Protocols',page:172},
      {ch:10,title:'Network Address Translation',page:202},
      {ch:11,title:'Quality of Service (QoS)',page:226},
      {ch:12,title:'Miscellaneous IP Services',page:254},
      {part:'Part IV — Network Architecture'},
      {ch:13,title:'LAN Architecture',page:288},
      {ch:14,title:'WAN Architecture',page:302},
      {ch:15,title:'Cloud Architecture',page:328},
      {part:'Part V — Network Automation'},
      {ch:16,title:'Introduction to Controller-Based Networking',page:356},
      {ch:17,title:'Cisco Software-Defined Access (SDA)',page:382},
      {ch:18,title:'Understanding REST and JSON',page:406},
      {ch:19,title:'Understanding Ansible, Puppet, and Chef',page:428},
      {part:'Part VI — Final Review'},
      {ch:20,title:'Final Review',page:448},
    ]
  }
};

// Chapter-to-CCNA-objective mapping (Vol 2)
const CH_MAP = {
  1:'1.5', 2:'5.6', 3:'5.6',
  4:'5.1', 5:'5.3', 6:'5.7', 7:'4.3', 8:'5.7',
  9:'4.5', 10:'4.1', 11:'4.7', 12:'4.9',
  13:'1.2', 14:'5.5', 15:'1.12',
  16:'6.2', 17:'6.3', 18:'6.5', 19:'6.6',
};

function init() {
  const params = new URLSearchParams(location.search);
  const bookId = params.get('book') || 'odom-vol2';
  const page = parseInt(params.get('page')) || 0;
  const book = BOOKS[bookId];
  if (!book) return;

  // Render TOC
  document.getElementById('tocList').innerHTML = book.toc.map(item => {
    if (item.part) return '<div class="toc-part">' + item.part + '</div>';
    return '<div class="toc-ch" onclick="goToPage(' + item.page + ')"><span class="toc-ch-name">Ch ' + item.ch + ' — ' + item.title + '</span><span class="toc-ch-page">p.' + item.page + '</span></div>';
  }).join('');

  document.getElementById('bookSelect').value = bookId;

  const pdfPage = page > 0 ? page + book.pageOffset : 1;
  document.getElementById('pageInfo').textContent = page > 0 ? 'Page ' + page : '';

  // Check if we're on GitHub Pages (no local PDFs)
  const isGitHubPages = location.hostname.includes('github.io');

  if (isGitHubPages) {
    // Show book reference guide + TOC instead of blank page
    document.getElementById('viewer').innerHTML =
      '<div class="book-cards">' +
        '<div class="book-ref">' +
          '<span class="book-ref-badge primary">PRIMARY</span>' +
          '<h3>CCNA 200-301 Official Cert Guide Library</h3>' +
          '<div class="book-author">Wendell Odom — Cisco Press</div>' +
          '<div class="book-desc">The gold standard. Vol 1 covers fundamentals through wireless, Vol 2 covers ACLs, security, services, and automation. Every CORE objective maps to a chapter.</div>' +
          '<div class="book-chs">Vol 1+2 combined — 27 chapters mapped</div>' +
        '</div>' +
        '<div class="book-ref">' +
          '<span class="book-ref-badge supplement">SUPPLEMENT</span>' +
          '<h3>Acing the CCNA Exam</h3>' +
          '<div class="book-author">Jeremy McDowell — MEAP v3</div>' +
          '<div class="book-desc">Concise, exam-focused chapters. Great for people who find Odom too dense. Covers the same 200-301 objectives with a practical approach.</div>' +
          '<div class="book-chs">15 chapters — one per major topic area</div>' +
        '</div>' +
        '<div class="book-ref">' +
          '<span class="book-ref-badge supplement">SUPPLEMENT</span>' +
          '<h3>Implementing and Administering Cisco Solutions</h3>' +
          '<div class="book-author">Glen D. Singh — Packt</div>' +
          '<div class="book-desc">Full-scope CCNA guide organized by exam domain. Strong on hands-on labs and practical scenarios.</div>' +
          '<div class="book-chs">12 chapters across 6 sections</div>' +
        '</div>' +
        '<div class="book-ref">' +
          '<span class="book-ref-badge primary">PRIMARY</span>' +
          '<h3>Official Cert Guide, Volume 2</h3>' +
          '<div class="book-author">Wendell Odom — Cisco Press</div>' +
          '<div class="book-desc">ACLs, security, NAT, QoS, network architecture, SDN, and automation. The second half of the exam lives here.</div>' +
          '<div class="book-chs">20 chapters — each mapped to CORE objectives</div>' +
        '</div>' +
      '</div>' +
      '<div class="online-toc">' +
        '<h2>Chapter Reference — ' + book.title.split('—')[0].trim() + '</h2>' +
      '</div>' +
      '<div class="setup-box">' +
        '<h3>Want the full PDF reader?</h3>' +
        '<ol>' +
          '<li>Clone the repo: <code>git clone https://github.com/rpatino-cw/CCNA-study.git</code></li>' +
          '<li>Get the PDFs (purchase or download legally)</li>' +
          '<li>Place them in the <code>books/</code> folder</li>' +
          '<li>Open <code>book.html</code> locally — your PDFs never leave your machine</li>' +
        '</ol>' +
      '</div>';
    // Show TOC on GitHub Pages too (visible by default)
    document.getElementById('tocSection').style.display = 'block';
    return;
  }

  const pdfUrl = book.file + '#page=' + pdfPage;
  document.getElementById('viewer').innerHTML =
    '<iframe class="pdf-frame" src="' + pdfUrl + '" id="pdfFrame"></iframe>';

  // If iframe fails to load, show fallback
  document.getElementById('pdfFrame').onerror = function() {
    document.getElementById('pdfFrame').style.display = 'none';
    document.getElementById('fallback').style.display = 'block';
  };
}

function goToPage(page) {
  const params = new URLSearchParams(location.search);
  params.set('page', page);
  location.search = params.toString();
}

init();
</script>
</body>
</html>
