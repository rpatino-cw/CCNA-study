<style>
  /* Mode tabs */
  .mode-tabs { display: flex; gap: 0; margin-bottom: var(--s-lg); border-bottom: 2px solid var(--rule); }
  .mode-tab { font-family: var(--font-display); font-size: .82rem; font-weight: 600; padding: 10px 20px; cursor: pointer; border: none; background: none; color: var(--ink-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all var(--transition); }
  .mode-tab:hover { color: var(--ink); }
  .mode-tab.active { color: var(--np); border-bottom-color: var(--np); }

  /* Search + filters */
  .search-row { display: flex; gap: 12px; margin-bottom: var(--s-md); flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 200px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font-body); font-size: .9rem; background: var(--bg-surface); color: var(--ink); outline: none; }
  .search-input:focus { border-color: var(--np); }
  .search-count { font-family: var(--font-mono); font-size: .75rem; color: var(--ink-muted); }

  .cat-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: var(--s-md); }
  .cpill { font-family: var(--font-display); font-size: .7rem; font-weight: 600; padding: 4px 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--ink-secondary); cursor: pointer; transition: all var(--transition); }
  .cpill:hover, .cpill.active { background: var(--np); color: #fff; border-color: var(--np); }

  /* Alpha jump */
  .alpha-bar { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: var(--s-md); }
  .alpha-btn { font-family: var(--font-mono); font-size: .7rem; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-surface); color: var(--ink-muted); cursor: pointer; transition: all var(--transition); }
  .alpha-btn:hover { background: var(--np); color: #fff; }
  .alpha-btn.disabled { opacity: .5; cursor: default; pointer-events: none; }

  /* Term cards */
  .letter-group { margin-bottom: var(--s-lg); }
  .letter-header { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; color: var(--np); padding: 8px 0; border-bottom: 1px solid var(--rule); margin-bottom: 4px; opacity: .75; }

  .term-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--radius); cursor: pointer; transition: background var(--transition); }
  .term-row:hover { background: var(--bg-recessed); }
  .term-row.open { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .term-name { font-family: var(--font-display); font-size: .9rem; font-weight: 700; color: var(--ink); min-width: 160px; }
  .term-brief { font-family: var(--font-body); font-size: .82rem; color: var(--ink-secondary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .term-cat { font-family: var(--font-display); font-size: .6rem; font-weight: 700; padding: 1px 8px; border-radius: 8px; flex-shrink: 0; }
  .term-cat[data-c="Networking"] { background: #EFF6FF; color: #2563EB; }
  .term-cat[data-c="Security"] { background: var(--np-dim); color: var(--np); }
  .term-cat[data-c="Wireless"] { background: #F0FDF4; color: #16A34A; }
  .term-cat[data-c="Troubleshooting"] { background: #FFFBEB; color: #D97706; }
  .term-cat[data-c="Cloud"] { background: var(--np-dim); color: var(--np); }
  .term-cat[data-c="WAN"] { background: #ECFEFF; color: #0891B2; }
  .term-cat[data-c="Protocols"] { background: #FFF7ED; color: #C2410C; }

  .term-expand { display: none; padding: 12px 14px 14px 14px; }
  .term-row.open + .term-expand { display: block; }
  .term-def { font-family: var(--font-body); font-size: .88rem; color: var(--ink); line-height: 1.6; margin-bottom: 8px; max-width: none; }
  .term-tip { font-family: var(--font-body); font-size: .8rem; color: var(--np); background: var(--np-dim); padding: 8px 12px; border-radius: var(--radius); margin-bottom: 8px; border-left: 3px solid var(--np); }
  .term-tip strong { font-family: var(--font-display); }
  .term-related { font-family: var(--font-display); font-size: .75rem; color: var(--ink-muted); }
  .term-related a { color: var(--np); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }

  .no-results { text-align: center; padding: var(--s-xl); color: var(--ink-muted); font-family: var(--font-display); }

  /* Quiz mode */
  .quiz-mode { display: none; }
  .quiz-mode.active { display: block; }
  .browse-mode { display: block; }
  .browse-mode.hidden { display: none; }

  .quiz-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; max-width: 620px; margin: 0 auto; }
  .quiz-prompt-label { font-family: var(--font-display); font-size: .72rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .quiz-prompt { font-family: var(--font-body); font-size: 1.1rem; color: var(--ink); line-height: 1.5; margin-bottom: 20px; }
  .quiz-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .quiz-opt { padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-lg); font-family: var(--font-display); font-size: .88rem; cursor: pointer; transition: all var(--transition); background: var(--bg-surface); color: var(--ink); text-align: left; }
  .quiz-opt:hover:not(.locked) { border-color: var(--np); background: var(--np-dim); }
  .quiz-opt.correct { border-color: var(--correct); background: var(--correct-bg); }
  .quiz-opt.wrong { border-color: var(--wrong); background: var(--wrong-bg); }
  .quiz-opt.locked { cursor: default; opacity: .6; }
  .quiz-score { font-family: var(--font-mono); font-size: .85rem; color: var(--ink-muted); text-align: center; margin-bottom: 12px; }
  .quiz-next { display: none; text-align: center; margin-top: var(--s-md); }
  .quiz-next.show { display: block; }

  @media (max-width: 600px) {
    .term-brief { display: none; }
    .term-name { min-width: auto; flex: 1; }
  }
</style>

<script>document.addEventListener('DOMContentLoaded',function(){

(function(){
  /* ═══════════════════════════════════════════════════════════════
     GLOSSARY DATA — 85 Network+ terms
     ═══════════════════════════════════════════════════════════════ */
  var TERMS = [
    // ── Networking ──
    {t:"OSI Model",c:"Networking",b:"7-layer reference model for network communication",d:"The Open Systems Interconnection model divides network communication into 7 layers: Physical, Data Link, Network, Transport, Session, Presentation, Application. Each layer has specific responsibilities and communicates with adjacent layers.",tip:"Remember the layers with 'Please Do Not Throw Sausage Pizza Away' (1-7) or 'All People Seem To Need Data Processing' (7-1).",r:["TCP/IP Model"]},
    {t:"TCP/IP Model",c:"Networking",b:"4-layer practical model used by the internet",d:"The TCP/IP model has 4 layers: Network Access (combines OSI layers 1-2), Internet (layer 3), Transport (layer 4), and Application (combines OSI layers 5-7). This is the model actually used in practice on the internet.",tip:"The exam loves comparing OSI and TCP/IP layers. Know which OSI layers map to which TCP/IP layers.",r:["OSI Model"]},
    {t:"Subnet Mask",c:"Networking",b:"Determines network vs host portion of an IP address",d:"A 32-bit number that divides an IP address into network and host portions. Bits set to 1 indicate the network portion, bits set to 0 indicate the host portion. Common masks: 255.255.255.0 (/24), 255.255.0.0 (/16), 255.0.0.0 (/8).",tip:"Always convert to binary when troubleshooting subnetting questions.",r:["CIDR","IPv4"]},
    {t:"CIDR",c:"Networking",b:"Classless Inter-Domain Routing — flexible IP addressing",d:"CIDR replaced classful addressing, allowing subnet masks at any bit boundary (not just /8, /16, /24). Written as IP/prefix-length (e.g., 192.168.1.0/26). Enables more efficient IP address allocation and route aggregation (supernetting).",tip:"CIDR notation /26 = 255.255.255.192 = 64 addresses per subnet (62 usable).",r:["Subnet Mask","IPv4"]},
    {t:"VLAN",c:"Networking",b:"Virtual LAN — logical segmentation at Layer 2",d:"VLANs logically segment a physical switch into separate broadcast domains. Devices in different VLANs cannot communicate without a Layer 3 device (router or L3 switch). Configured per switch port. Default VLAN is typically VLAN 1.",tip:"Each VLAN = its own broadcast domain. Traffic between VLANs requires inter-VLAN routing.",r:["Trunk","Broadcast Domain"]},
    {t:"Trunk",c:"Networking",b:"Link carrying multiple VLANs between switches",d:"A trunk port carries traffic for multiple VLANs over a single physical link using 802.1Q tagging. Each frame gets a 4-byte VLAN tag inserted. The native VLAN's traffic is sent untagged by default.",tip:"802.1Q is the standard trunking protocol. ISL is Cisco-proprietary and deprecated.",r:["VLAN","STP"]},
    {t:"STP",c:"Networking",b:"Spanning Tree Protocol — prevents Layer 2 loops",d:"STP (802.1D) prevents broadcast storms by creating a loop-free topology. It elects a root bridge, calculates shortest paths, and blocks redundant links. Port states: Blocking, Listening, Learning, Forwarding, Disabled. Convergence takes 30-50 seconds.",tip:"Know the STP port states and timers (Hello: 2s, Forward Delay: 15s, Max Age: 20s).",r:["RSTP","Broadcast Domain"]},
    {t:"RSTP",c:"Networking",b:"Rapid STP — faster convergence than STP",d:"RSTP (802.1w) improves on STP with convergence in seconds rather than 30-50 seconds. Port roles: Root, Designated, Alternate, Backup. Port states simplified to: Discarding, Learning, Forwarding.",tip:"RSTP is backward-compatible with STP but loses its speed benefits when connected to legacy STP switches.",r:["STP"]},
    {t:"EtherChannel",c:"Networking",b:"Bundle multiple physical links into one logical link",d:"EtherChannel (or link aggregation) combines 2-8 physical Ethernet links into a single logical channel. Provides redundancy and increased bandwidth. Load balancing distributes traffic across member links.",tip:"If one link in the bundle fails, traffic shifts to remaining links without STP reconvergence.",r:["LACP"]},
    {t:"LACP",c:"Networking",b:"Link Aggregation Control Protocol — dynamic EtherChannel",d:"LACP (802.3ad) dynamically negotiates EtherChannel formation between switches. Modes: Active (initiates negotiation) and Passive (responds only). At least one side must be Active. Preferred over static or PAgP for vendor interoperability.",tip:"LACP is the standards-based option. PAgP is Cisco-proprietary.",r:["EtherChannel"]},
    {t:"MAC Address",c:"Networking",b:"Unique 48-bit hardware identifier for NICs",d:"A Media Access Control address is a 48-bit (6-byte) hardware address burned into network interface cards. Format: XX:XX:XX:XX:XX:XX. First 3 bytes = OUI (manufacturer). Used for Layer 2 (Data Link) communication within a broadcast domain.",tip:"MAC addresses work at Layer 2. They don't cross router boundaries (routers rewrite them).",r:["ARP","Broadcast Domain"]},
    {t:"ARP",c:"Networking",b:"Resolves IP addresses to MAC addresses",d:"Address Resolution Protocol maps Layer 3 IP addresses to Layer 2 MAC addresses. A device broadcasts an ARP request ('Who has 10.0.0.1?'), and the owner replies with its MAC. Results are cached in the ARP table to avoid repeated broadcasts.",tip:"ARP is a broadcast — it only works within the local subnet/broadcast domain.",r:["MAC Address","DAI"]},
    {t:"Broadcast Domain",c:"Networking",b:"Network segment where broadcasts reach all devices",d:"A broadcast domain is the set of all devices that receive a broadcast frame. Each VLAN or routed interface defines its own broadcast domain. Routers (Layer 3) break up broadcast domains; switches (Layer 2) do not by default.",tip:"More broadcast domains = smaller failure blast radius. VLANs segment broadcast domains on a switch.",r:["VLAN","Collision Domain"]},
    {t:"Collision Domain",c:"Networking",b:"Segment where frame collisions can occur",d:"A collision domain is a network segment where simultaneous transmissions cause collisions. Hubs create one large collision domain. Each switch port is its own collision domain. Full-duplex links eliminate collisions entirely.",tip:"Switches break up collision domains (one per port). Hubs do not — everything is one domain.",r:["Broadcast Domain","Full Duplex","Half Duplex"]},
    {t:"MTU",c:"Networking",b:"Maximum Transmission Unit — largest frame size",d:"MTU is the largest packet (in bytes) that can traverse a network link without fragmentation. Standard Ethernet MTU is 1500 bytes. If a packet exceeds MTU and DF (Don't Fragment) is set, it's dropped and an ICMP 'fragmentation needed' is sent back.",tip:"MTU mismatches cause mysterious connectivity issues. Path MTU Discovery (PMTUD) finds the lowest MTU along a path.",r:["Jumbo Frame"]},
    {t:"Jumbo Frame",c:"Networking",b:"Frames with MTU larger than 1500 bytes",d:"Jumbo frames support MTU sizes up to 9216 bytes (sometimes 9000). Used in data centers and SANs to reduce CPU overhead by sending fewer, larger frames. All devices on the path must support the same jumbo frame size.",tip:"Jumbo frames must be configured on every device in the path — one mismatch breaks everything.",r:["MTU"]},
    {t:"QoS",c:"Networking",b:"Quality of Service — prioritize critical traffic",d:"QoS mechanisms prioritize certain traffic types (voice, video) over others (file downloads). Techniques include classification, marking (DSCP), queuing, shaping, and policing. Ensures latency-sensitive applications perform well under congestion.",tip:"Voice traffic needs < 150ms latency, < 30ms jitter, and < 1% packet loss.",r:["DSCP"]},
    {t:"DSCP",c:"Networking",b:"Differentiated Services Code Point — packet marking",d:"DSCP uses 6 bits in the IP header's ToS field to mark packets with priority levels (64 possible values). Common values: EF (Expedited Forwarding, 46) for voice, AF classes for video/data, CS values for backward compatibility.",tip:"EF (46) = voice. AF41 (34) = video conferencing. Know the common DSCP values.",r:["QoS"]},
    {t:"PoE",c:"Networking",b:"Power over Ethernet — deliver power via network cable",d:"PoE delivers electrical power along with data over Cat5e/Cat6 cables. Standards: 802.3af (15.4W), 802.3at/PoE+ (25.5W), 802.3bt/PoE++ (up to 90W). Powers devices like IP phones, wireless APs, and cameras without separate power cables.",tip:"PoE budget matters — a 24-port PoE switch doesn't mean all 24 ports can run at max power simultaneously.",r:[]},
    {t:"Full Duplex",c:"Networking",b:"Simultaneous send and receive on a link",d:"Full-duplex communication allows data to flow in both directions simultaneously. Eliminates collisions. Modern switched Ethernet operates in full duplex by default. Requires both endpoints to support it.",tip:"Full duplex doubles effective bandwidth — a 1Gbps full-duplex link can do 1Gbps each way simultaneously.",r:["Half Duplex","Collision Domain"]},
    {t:"Half Duplex",c:"Networking",b:"One direction at a time — collisions possible",d:"Half-duplex allows communication in only one direction at a time, like a walkie-talkie. Uses CSMA/CD to handle collisions. Found on legacy hubs and some wireless connections. Significantly lower throughput than full duplex.",tip:"Wi-Fi is half duplex — it can't send and receive at the same time.",r:["Full Duplex","Collision Domain"]},
    {t:"Multicast",c:"Networking",b:"One-to-many targeted delivery",d:"Multicast sends data from one source to multiple specific receivers who have joined a multicast group. Uses Class D addresses (224.0.0.0 - 239.255.255.255). More efficient than broadcast (doesn't flood everyone) or unicast (doesn't duplicate per receiver).",tip:"IGMP manages multicast group membership on a LAN. PIM routes multicast between networks.",r:["Unicast","Anycast"]},
    {t:"Unicast",c:"Networking",b:"One-to-one communication",d:"Unicast delivers data from exactly one source to exactly one destination. The most common type of network traffic. Uses a specific destination MAC and IP address.",tip:"Most traffic on a network is unicast (web browsing, email, SSH, etc.).",r:["Multicast","Anycast"]},
    {t:"Anycast",c:"Networking",b:"One-to-nearest — same IP on multiple servers",d:"Anycast assigns the same IP address to multiple servers in different locations. Traffic routes to the nearest (topologically closest) server. Commonly used for DNS root servers, CDNs, and IPv6 gateway addresses.",tip:"DNS root servers use anycast — there are 13 logical root servers but hundreds of physical instances worldwide.",r:["Unicast","Multicast"]},
    {t:"IPv4",c:"Networking",b:"32-bit Internet Protocol addressing",d:"IPv4 uses 32-bit addresses written in dotted decimal (e.g., 192.168.1.1). Provides approximately 4.3 billion unique addresses. Supports classful and classless addressing, subnetting, NAT, and various header options. Still the dominant IP version.",tip:"IPv4 exhaustion is real — NAT and CIDR extended its life, but IPv6 is the long-term solution.",r:["IPv6","Subnet Mask","CIDR"]},
    {t:"IPv6",c:"Networking",b:"128-bit next-generation IP addressing",d:"IPv6 uses 128-bit addresses written in hexadecimal (e.g., 2001:0db8::1). Provides 3.4 x 10^38 addresses. Features: no broadcast (uses multicast), mandatory IPsec support, simplified header, autoconfiguration (SLAAC). Colon-separated, with :: for zero compression.",tip:"Know the IPv6 address types: link-local (fe80::/10), global unicast (2000::/3), multicast (ff00::/8).",r:["IPv4"]},
    {t:"APIPA",c:"Networking",b:"Automatic fallback IP when DHCP fails",d:"Automatic Private IP Addressing assigns an address from 169.254.0.0/16 when a device cannot reach a DHCP server. APIPA addresses are link-local only — devices can communicate on the same subnet but cannot reach the internet or other networks.",tip:"If you see a 169.254.x.x address, the device failed to get a DHCP lease — check the DHCP server.",r:["DHCP"]},
    {t:"NAT",c:"Networking",b:"Translates private IPs to public IPs",d:"Network Address Translation converts private (RFC 1918) addresses to public addresses for internet access. Static NAT = 1:1 mapping. Dynamic NAT = pool of public IPs. Allows many internal devices to share fewer public addresses.",tip:"NAT operates at the router level and modifies IP headers. It breaks end-to-end connectivity (which can be a security feature).",r:["PAT"]},
    {t:"PAT",c:"Networking",b:"Port Address Translation — many-to-one NAT",d:"PAT (also called NAT overload) maps multiple private IP addresses to a single public IP by using unique source port numbers to track sessions. This is how most home routers work — one public IP serves the entire household.",tip:"PAT is the most common form of NAT. The router tracks sessions using the combo of private IP + source port.",r:["NAT"]},
    {t:"Default Gateway",c:"Networking",b:"Router IP used to reach other networks",d:"The default gateway is the IP address of the local router interface. When a device needs to communicate with a host on a different subnet, it sends the traffic to its default gateway. Typically the first or last usable IP in the subnet.",tip:"If a device can ping local hosts but not remote ones, check the default gateway configuration.",r:["NAT","DHCP"]},
    {t:"DNS",c:"Protocols",b:"Resolves domain names to IP addresses",d:"The Domain Name System translates human-readable names (google.com) to IP addresses. Uses a hierarchical structure: root servers, TLD servers, authoritative servers. Record types: A (IPv4), AAAA (IPv6), MX (mail), CNAME (alias), PTR (reverse), NS, SOA.",tip:"DNS uses UDP port 53 for queries and TCP port 53 for zone transfers. Know the common record types.",r:["DHCP","NTP"]},
    {t:"DHCP",c:"Protocols",b:"Automatically assigns IP configuration",d:"Dynamic Host Configuration Protocol assigns IP addresses, subnet masks, default gateways, and DNS servers to clients automatically. Process: Discover (broadcast) → Offer → Request → Acknowledge (DORA). Leases expire and must be renewed.",tip:"Remember DORA: Discover, Offer, Request, Acknowledge. DHCP relay agents forward requests across subnets.",r:["DNS","APIPA","DHCP Snooping"]},
    {t:"NTP",c:"Protocols",b:"Synchronizes clocks across network devices",d:"Network Time Protocol synchronizes system clocks to within milliseconds of a reference source. Uses a stratum hierarchy (Stratum 0 = atomic clocks, Stratum 1 = directly connected servers). Accurate time is critical for log correlation and authentication.",tip:"NTP uses UDP port 123. Consistent timestamps across devices are essential for troubleshooting and security.",r:["SNMP","Syslog"]},
    {t:"SNMP",c:"Protocols",b:"Monitors and manages network devices",d:"Simple Network Management Protocol collects device metrics (CPU, bandwidth, errors) via polling and traps. Components: Manager (NMS), Agent (on devices), MIB (database of objects). Versions: v1 (community strings), v2c (bulk operations), v3 (encryption + auth).",tip:"Always use SNMPv3 in production — v1 and v2c send community strings in plaintext.",r:["Syslog","NTP"]},
    {t:"Syslog",c:"Protocols",b:"Centralized logging for network events",d:"Syslog collects log messages from network devices to a central server. Severity levels 0-7: Emergency(0), Alert(1), Critical(2), Error(3), Warning(4), Notice(5), Informational(6), Debug(7). Uses UDP port 514 by default.",tip:"Remember severity levels: 'Every Alley Cat Eats Watery Noodle Ice Daily' (0-7).",r:["SNMP","NTP"]},
    {t:"TFTP",c:"Protocols",b:"Trivial File Transfer — simple, no authentication",d:"Trivial File Transfer Protocol is a simplified FTP used for transferring files like firmware images and configurations to/from network devices. No authentication, no directory listing. Uses UDP port 69.",tip:"TFTP is commonly used to back up and restore switch/router configs and upload firmware images.",r:["DNS"]},

    // ── Security ──
    {t:"Firewall",c:"Security",b:"Filters traffic based on rules",d:"A firewall controls traffic flow between networks based on defined rules (ACLs). Types: packet filtering (Layer 3-4), stateful inspection (tracks connections), application/proxy (Layer 7), NGFW (deep packet inspection + IPS). Can be hardware or software.",tip:"Stateful firewalls track connection state — they know if a packet is part of an established session.",r:["ACL","IDS","IPS"]},
    {t:"IDS",c:"Security",b:"Intrusion Detection System — monitors and alerts",d:"An IDS passively monitors network traffic for suspicious patterns and alerts administrators. It does NOT block traffic — only detects and reports. Types: Network-based (NIDS) monitors traffic on a segment, Host-based (HIDS) monitors a single system.",tip:"IDS = passive (detect + alert). IPS = active (detect + block). Know the difference.",r:["IPS","Firewall"]},
    {t:"IPS",c:"Security",b:"Intrusion Prevention System — detects and blocks",d:"An IPS sits inline with traffic and actively blocks detected threats in real-time. It combines detection (like IDS) with prevention (dropping malicious packets). Must be carefully tuned to avoid false positives that block legitimate traffic.",tip:"IPS is inline (traffic flows through it). IDS is passive (gets a copy of traffic). IPS can cause outages if misconfigured.",r:["IDS","Firewall"]},
    {t:"ACL",c:"Security",b:"Access Control List — permit/deny traffic rules",d:"ACLs filter traffic based on source/destination IP, port, and protocol. Standard ACLs (1-99) filter by source IP only. Extended ACLs (100-199) filter by source/dest IP, port, and protocol. Applied inbound or outbound on interfaces. Processed top-down, implicit deny at end.",tip:"Place standard ACLs close to the destination. Place extended ACLs close to the source.",r:["Firewall"]},
    {t:"802.1X",c:"Security",b:"Port-based network access control",d:"802.1X authenticates devices before granting network access. Three components: Supplicant (client software), Authenticator (switch/AP), Authentication Server (RADIUS). The port stays unauthorized until the supplicant proves identity via EAP.",tip:"802.1X is the standard for enterprise wired and wireless authentication. Always pairs with RADIUS.",r:["RADIUS","TACACS+"]},
    {t:"RADIUS",c:"Security",b:"Remote authentication for network access",d:"RADIUS provides centralized Authentication, Authorization, and Accounting (AAA) for network access. Commonly used with 802.1X and VPN. Encrypts only the password in transit. Uses UDP ports 1812 (auth) and 1813 (accounting).",tip:"RADIUS encrypts only the password. TACACS+ encrypts the entire packet. Know the difference for the exam.",r:["TACACS+","802.1X","AAA"]},
    {t:"TACACS+",c:"Security",b:"Cisco-enhanced remote authentication protocol",d:"TACACS+ provides AAA services with full packet encryption (unlike RADIUS). Uses TCP port 49. Separates authentication, authorization, and accounting into independent processes. Preferred for device administration (switch/router login).",tip:"TACACS+ = device admin (who can log into switches). RADIUS = network access (who can connect to the network).",r:["RADIUS","AAA"]},
    {t:"VPN",c:"Security",b:"Encrypted tunnel over public networks",d:"A Virtual Private Network creates an encrypted tunnel between two endpoints over an untrusted network (like the internet). Types: Site-to-site (connects networks), Remote access (connects users), Client-based vs clientless. Common protocols: IPsec, SSL/TLS, WireGuard.",tip:"Split tunnel = only corporate traffic goes through VPN. Full tunnel = all traffic goes through VPN.",r:["IPsec","SSL/TLS"]},
    {t:"IPsec",c:"Security",b:"Encrypts IP packets between endpoints",d:"Internet Protocol Security provides encryption and authentication at the network layer (Layer 3). Two modes: Transport (encrypts payload only) and Tunnel (encrypts entire original packet). Protocols: AH (authentication only) and ESP (encryption + authentication).",tip:"ESP (Encapsulating Security Payload) provides both encryption AND authentication. AH provides only authentication.",r:["VPN","SSL/TLS"]},
    {t:"SSL/TLS",c:"Security",b:"Encrypts transport-layer connections",d:"SSL (deprecated) and TLS encrypt data between applications over TCP. TLS 1.2 and 1.3 are current standards. Uses certificates for server authentication and key exchange. HTTPS = HTTP + TLS. Operates between Transport and Application layers.",tip:"TLS 1.3 removed older ciphers and reduced the handshake to 1 round trip (faster). SSL is deprecated.",r:["VPN","IPsec"]},
    {t:"WPA2",c:"Security",b:"Wi-Fi Protected Access 2 — current wireless security",d:"WPA2 uses AES-CCMP encryption (replacing TKIP from WPA). Two modes: Personal (pre-shared key/PSK) and Enterprise (802.1X/RADIUS authentication). WPA2-Enterprise is required for corporate environments.",tip:"WPA2-Personal uses a shared password. WPA2-Enterprise uses individual credentials via RADIUS.",r:["WPA3","802.1X"]},
    {t:"WPA3",c:"Security",b:"Latest Wi-Fi security standard",d:"WPA3 improves on WPA2 with Simultaneous Authentication of Equals (SAE) replacing PSK, providing forward secrecy and resistance to offline dictionary attacks. WPA3-Enterprise adds 192-bit security mode. Also introduces Enhanced Open (OWE) for public Wi-Fi.",tip:"WPA3's SAE prevents offline brute-force attacks that were possible with WPA2-PSK's 4-way handshake capture.",r:["WPA2"]},
    {t:"DHCP Snooping",c:"Security",b:"Prevents rogue DHCP servers",d:"DHCP snooping validates DHCP messages on a switch. Trusted ports (connected to legitimate DHCP servers) forward all DHCP messages. Untrusted ports (user ports) only forward client messages. Builds a binding table of IP-to-MAC-to-port mappings used by DAI.",tip:"DHCP snooping is the foundation for Dynamic ARP Inspection (DAI). Enable snooping first, then DAI.",r:["DAI","DHCP"]},
    {t:"DAI",c:"Security",b:"Dynamic ARP Inspection — prevents ARP spoofing",d:"DAI validates ARP packets against the DHCP snooping binding table. It drops ARP packets with IP-to-MAC mismatches, preventing ARP poisoning/spoofing attacks. Trusted ports skip inspection. Requires DHCP snooping to be enabled first.",tip:"DAI relies on the DHCP snooping database. No snooping = no DAI.",r:["DHCP Snooping","ARP"]},
    {t:"Port Security",c:"Security",b:"Limits MAC addresses per switch port",d:"Port security restricts which and how many MAC addresses can use a switch port. Violation modes: Protect (drops unknown, no log), Restrict (drops + logs), Shutdown (disables port). Can use static MACs, sticky learning, or a maximum count.",tip:"Default violation mode is Shutdown — the port goes err-disabled. Use 'errdisable recovery' to auto-recover.",r:["MAC Address"]},
    {t:"MFA",c:"Security",b:"Multi-Factor Authentication — multiple proof types",d:"MFA requires two or more authentication factors: Something you know (password), Something you have (token/phone), Something you are (biometric). Dramatically reduces the risk of compromised credentials being used for unauthorized access.",tip:"Factors must be from different categories. Two passwords is NOT MFA (both are 'something you know').",r:["AAA"]},
    {t:"Zero Trust",c:"Security",b:"Never trust, always verify",d:"Zero Trust security assumes no user, device, or network segment is inherently trustworthy. Every access request must be authenticated, authorized, and encrypted regardless of location. Principles: least privilege, microsegmentation, continuous verification.",tip:"Zero Trust = 'never trust, always verify.' Traditional = 'trust the internal network.' The exam tests the concept.",r:["Least Privilege","MFA"]},
    {t:"CIA Triad",c:"Security",b:"Confidentiality, Integrity, Availability",d:"The three pillars of information security: Confidentiality (only authorized access), Integrity (data is accurate and unmodified), Availability (systems are accessible when needed). Every security control maps to one or more of these.",tip:"Encryption = confidentiality. Hashing = integrity. Redundancy/backups = availability.",r:["AAA"]},
    {t:"AAA",c:"Security",b:"Authentication, Authorization, Accounting",d:"The AAA framework: Authentication (who are you?), Authorization (what can you do?), Accounting (what did you do?). Implemented via protocols like RADIUS and TACACS+. Central to network access control and device management.",tip:"Authentication = identity. Authorization = permissions. Accounting = logging/auditing.",r:["RADIUS","TACACS+"]},
    {t:"Least Privilege",c:"Security",b:"Minimum access needed to do the job",d:"The principle of least privilege grants users and systems only the minimum access rights necessary to perform their function. Reduces attack surface and limits damage from compromised accounts. Applied to user accounts, services, and network segments.",tip:"Least privilege applies everywhere: user accounts, firewall rules, VLAN access, admin rights.",r:["Zero Trust","ACL"]},
    {t:"Social Engineering",c:"Security",b:"Manipulating people to bypass security",d:"Social engineering attacks exploit human psychology rather than technical vulnerabilities. Types include phishing, pretexting, baiting, tailgating, shoulder surfing, dumpster diving, and vishing (voice phishing). Training and awareness are the primary defenses.",tip:"Social engineering is often the easiest attack vector. User training is the best defense.",r:["Phishing","Evil Twin"]},
    {t:"Phishing",c:"Security",b:"Fraudulent messages to steal credentials",d:"Phishing uses deceptive emails, messages, or websites to trick users into revealing sensitive information. Variants: spear phishing (targeted), whaling (executives), smishing (SMS), vishing (voice). Look for urgency, spoofed sender, suspicious links.",tip:"Spear phishing targets specific individuals. Whaling targets executives. Both are more dangerous than mass phishing.",r:["Social Engineering","Evil Twin"]},
    {t:"Evil Twin",c:"Security",b:"Rogue AP impersonating a legitimate network",d:"An evil twin is a malicious wireless access point that mimics a legitimate network's SSID. Victims connect thinking it's the real network, allowing the attacker to intercept traffic (man-in-the-middle). Defense: 802.1X, certificate-based auth, WIDS.",tip:"Evil twin attacks work because devices auto-connect to known SSIDs. Enterprise WPA2/WPA3 with certificates prevents this.",r:["SSID","Phishing"]},
    {t:"Deauthentication",c:"Security",b:"Forcing wireless clients to disconnect",d:"A deauthentication attack sends forged deauth frames to disconnect clients from a wireless AP. Often used as a precursor to evil twin attacks (force reconnection to the rogue AP) or to capture WPA handshakes for offline cracking. 802.11w (PMF) mitigates this.",tip:"802.11w (Protected Management Frames) prevents deauth attacks by authenticating management frames.",r:["Evil Twin","WPA3"]},

    // ── Wireless ──
    {t:"SSID",c:"Wireless",b:"Service Set Identifier — Wi-Fi network name",d:"The SSID is the human-readable name of a wireless network. Devices use it to identify and connect to specific networks. SSIDs can be broadcast (visible) or hidden (must be manually entered). Multiple SSIDs can exist on a single AP.",tip:"Hiding the SSID does NOT provide real security — it's easily discovered with any wireless scanner.",r:["BSS","ESS"]},
    {t:"BSS",c:"Wireless",b:"Basic Service Set — single AP coverage area",d:"A BSS is the coverage area of a single wireless access point and its associated clients. Each BSS is identified by a BSSID (typically the AP's MAC address). The simplest wireless network configuration.",tip:"BSS = one AP. ESS = multiple APs with the same SSID for seamless roaming.",r:["ESS","SSID"]},
    {t:"ESS",c:"Wireless",b:"Extended Service Set — multiple APs, one network",d:"An ESS combines multiple BSSs (access points) under the same SSID to create a larger coverage area with seamless roaming. APs overlap coverage by 10-15% to ensure continuous connectivity as clients move between them.",tip:"For seamless roaming, adjacent APs should overlap 10-15% and use non-overlapping channels (1, 6, 11 for 2.4GHz).",r:["BSS","Roaming","WLC"]},
    {t:"Beamforming",c:"Wireless",b:"Directs Wi-Fi signal toward specific clients",d:"Beamforming focuses the wireless signal toward a specific client rather than broadcasting in all directions. Uses multiple antennas and phase adjustment to create constructive interference in the client's direction. Improves signal strength and throughput.",tip:"Beamforming is mandatory in 802.11ac (Wi-Fi 5) and later. It significantly improves range and performance.",r:["MU-MIMO"]},
    {t:"MU-MIMO",c:"Wireless",b:"Multi-User MIMO — serve multiple clients simultaneously",d:"MU-MIMO (Multi-User, Multiple Input, Multiple Output) allows an AP to transmit to multiple clients at the same time using spatial multiplexing. Introduced in 802.11ac Wave 2 (downlink) and expanded in 802.11ax (uplink + downlink).",tip:"MU-MIMO works with beamforming to serve multiple clients. More antennas = more simultaneous streams.",r:["Beamforming","OFDMA"]},
    {t:"OFDMA",c:"Wireless",b:"Divides channels into sub-channels for efficiency",d:"Orthogonal Frequency-Division Multiple Access (new in Wi-Fi 6/802.11ax) divides a channel into smaller sub-channels called Resource Units (RUs). Multiple clients can transmit simultaneously on different RUs, dramatically improving efficiency in dense environments.",tip:"OFDMA is Wi-Fi 6's biggest improvement for dense environments (stadiums, offices, apartments).",r:["MU-MIMO","Channel Bonding"]},
    {t:"Channel Bonding",c:"Wireless",b:"Combine channels for wider bandwidth",d:"Channel bonding combines adjacent channels to increase bandwidth. 802.11n: 40MHz (2 channels). 802.11ac: 80MHz or 160MHz. 802.11ax: up to 160MHz. Wider channels = more throughput but fewer non-overlapping channels available.",tip:"In 2.4GHz, channel bonding is impractical (only 3 non-overlapping channels). Use it on 5GHz and 6GHz.",r:["OFDMA"]},
    {t:"Band Steering",c:"Wireless",b:"Pushes capable clients to 5GHz/6GHz",d:"Band steering encourages dual-band clients to connect to the less congested 5GHz (or 6GHz) band instead of the crowded 2.4GHz band. The AP may delay or withhold 2.4GHz probe responses to nudge clients toward the preferred band.",tip:"Band steering improves overall network performance by reducing congestion on 2.4GHz.",r:["ESS"]},
    {t:"Roaming",c:"Wireless",b:"Seamless movement between APs",d:"Roaming allows wireless clients to move between access points without dropping the connection. Standards: 802.11r (Fast BSS Transition) pre-authenticates with the next AP. Controller-based networks handle roaming centrally for faster handoffs.",tip:"802.11r (Fast Transition) reduces roaming time to under 50ms — critical for voice and video.",r:["ESS","WLC"]},
    {t:"WLC",c:"Wireless",b:"Wireless LAN Controller — centralized AP management",d:"A WLC manages multiple lightweight APs from a central point. Handles configuration, firmware updates, channel assignment, power levels, security policies, and roaming. APs use CAPWAP (Control and Provisioning of Wireless Access Points) tunnels to communicate with the WLC.",tip:"CAPWAP uses UDP ports 5246 (control) and 5247 (data). Lightweight APs can't function without their WLC.",r:["ESS","Roaming","Captive Portal"]},
    {t:"Captive Portal",c:"Wireless",b:"Web page for guest Wi-Fi authentication",d:"A captive portal intercepts web requests from unauthenticated users and redirects them to a login/agreement page. Common in hotels, airports, and guest networks. After authentication or acceptance, full network access is granted.",tip:"Captive portals work by intercepting HTTP traffic and redirecting. They can break with HSTS and some apps.",r:["WLC"]},

    // ── Troubleshooting ──
    {t:"Baseline",c:"Troubleshooting",b:"Normal performance reference point",d:"A network baseline is a documented snapshot of normal network performance metrics (bandwidth utilization, latency, error rates, CPU load) taken during typical operation. Used to identify anomalies — if current performance deviates significantly from baseline, something is wrong.",tip:"Without a baseline, you're guessing whether current performance is abnormal. Document everything.",r:["MTBF","MTTR"]},
    {t:"MTBF",c:"Troubleshooting",b:"Mean Time Between Failures",d:"MTBF is the average time a system operates before experiencing a failure. Higher MTBF = more reliable. Calculated from historical failure data. Used for capacity planning, maintenance scheduling, and evaluating hardware reliability.",tip:"MTBF measures reliability (how long things work). MTTR measures recoverability (how fast you fix them).",r:["MTTR","Baseline"]},
    {t:"MTTR",c:"Troubleshooting",b:"Mean Time To Repair",d:"MTTR is the average time required to repair a failed system and restore it to operation. Includes diagnosis, repair, testing, and restoration. Lower MTTR = faster recovery. Depends on documentation, spare parts availability, and team skill.",tip:"Good documentation and hot spares reduce MTTR dramatically. Know where your spares are.",r:["MTBF","RTO"]},
    {t:"RTO",c:"Troubleshooting",b:"Recovery Time Objective — max acceptable downtime",d:"RTO defines the maximum acceptable time to restore a system after a failure. Example: RTO of 4 hours means the system must be back online within 4 hours. Drives decisions about redundancy, backup strategies, and DR planning.",tip:"RTO = how long can you be down? RPO = how much data can you lose? Together they define your DR requirements.",r:["RPO","MTTR"]},
    {t:"RPO",c:"Troubleshooting",b:"Recovery Point Objective — max acceptable data loss",d:"RPO defines the maximum acceptable amount of data loss measured in time. Example: RPO of 1 hour means you need backups at least every hour. If you lose more than 1 hour of data, the business impact exceeds acceptable limits.",tip:"RPO drives backup frequency. RPO of 0 = real-time replication. RPO of 24h = daily backups.",r:["RTO"]},
    {t:"Cable Tester",c:"Troubleshooting",b:"Verifies cable continuity and wiring",d:"A cable tester checks copper cables for continuity, shorts, opens, miswires, and split pairs. Basic testers show pass/fail. Advanced testers (certifiers) verify cable meets Cat5e/Cat6/Cat6a specifications including length, crosstalk, and attenuation.",tip:"A cable tester finds if a cable works. A cable certifier proves it meets a specific standard (Cat6a, etc.).",r:["OTDR","Tone Generator"]},
    {t:"OTDR",c:"Troubleshooting",b:"Optical Time Domain Reflectometer — fiber testing",d:"An OTDR tests fiber optic cables by sending light pulses and measuring reflections. It maps the entire fiber run, showing length, splices, connectors, bends, and breaks. Essential for fiber troubleshooting — pinpoints the exact distance to a fault.",tip:"OTDR shows you WHERE along a fiber the problem is — not just that there IS a problem.",r:["Cable Tester"]},
    {t:"Tone Generator",c:"Troubleshooting",b:"Traces cables through walls and patch panels",d:"A tone generator and probe (toner and wand) identify specific cables in a bundle or behind walls. The generator injects a signal onto the cable; the probe detects the tone when held near the correct cable. Essential for cable identification in messy wiring closets.",tip:"The tone generator is your best friend in a rat's nest of cables. Use it with a probe (wand/fox and hound).",r:["Cable Tester"]},
    {t:"Loopback Plug",c:"Troubleshooting",b:"Tests NIC functionality by looping signal back",d:"A loopback plug redirects a port's output back to its input, allowing you to test if the NIC and port are functioning without needing a remote device. If a loopback test fails, the local interface is the problem — not the cable or remote end.",tip:"Loopback test passes = local port works fine. Problem is elsewhere (cable, remote device, configuration).",r:["Cable Tester"]},
    {t:"Traceroute",c:"Troubleshooting",b:"Maps every hop between source and destination",d:"Traceroute (tracert on Windows) shows each router hop between source and destination by sending packets with incrementing TTL values. Each router decrements TTL and returns a 'time exceeded' message when TTL hits 0, revealing its IP and latency.",tip:"Traceroute uses ICMP (Windows) or UDP (Linux/Mac). Firewalls may block responses, showing * * * for some hops.",r:["Pathping"]},
    {t:"Pathping",c:"Troubleshooting",b:"Combines ping and traceroute with stats",d:"Pathping (Windows) combines traceroute and ping. First traces the route, then sends packets to each hop over 25 seconds, calculating packet loss and latency statistics per hop. More thorough than either tool alone for identifying where packet loss occurs.",tip:"Pathping takes time (several minutes) but gives you per-hop packet loss stats that traceroute doesn't.",r:["Traceroute","Wireshark"]},
    {t:"Wireshark",c:"Troubleshooting",b:"Network protocol analyzer — capture and inspect packets",d:"Wireshark captures and analyzes network traffic at the packet level. Supports hundreds of protocols, advanced filtering, flow analysis, and protocol dissection. Essential for deep troubleshooting, security analysis, and understanding network behavior.",tip:"Wireshark capture filter = what to capture. Display filter = what to show from captured data. Learn both syntaxes.",r:["Protocol Analyzer"]},
    {t:"Protocol Analyzer",c:"Troubleshooting",b:"Captures and decodes network traffic",d:"A protocol analyzer (packet sniffer) captures network traffic for inspection. Wireshark is the most common software analyzer. Hardware analyzers exist for specialized tasks. Can reveal application issues, security problems, and performance bottlenecks at the packet level.",tip:"Place the analyzer correctly: use a mirror/SPAN port on a switch, or a network TAP for reliable captures.",r:["Wireshark"]},

    // ── Cloud / WAN ──
    {t:"IaaS",c:"Cloud",b:"Infrastructure as a Service — virtual servers/storage",d:"IaaS provides virtualized computing resources (VMs, storage, networking) over the internet. The provider manages physical infrastructure; you manage OS, middleware, and applications. Examples: AWS EC2, Azure VMs, Google Compute Engine.",tip:"IaaS = you manage the most. SaaS = you manage the least. PaaS is in between.",r:["PaaS","SaaS"]},
    {t:"PaaS",c:"Cloud",b:"Platform as a Service — managed development environment",d:"PaaS provides a platform for developing and deploying applications without managing underlying infrastructure. The provider handles OS, middleware, runtime. You manage applications and data. Examples: Heroku, Azure App Service, Google App Engine.",tip:"PaaS is for developers who want to focus on code without worrying about servers or OS patches.",r:["IaaS","SaaS"]},
    {t:"SaaS",c:"Cloud",b:"Software as a Service — ready-to-use applications",d:"SaaS delivers complete applications over the internet. The provider manages everything — infrastructure, platform, and application. Users access via web browser. Examples: Microsoft 365, Salesforce, Google Workspace, Slack.",tip:"SaaS = user manages nothing except their data and settings. Most consumer cloud apps are SaaS.",r:["IaaS","PaaS"]},
    {t:"Hybrid Cloud",c:"Cloud",b:"Mix of public and private cloud resources",d:"A hybrid cloud combines public cloud services with private cloud or on-premises infrastructure. Allows organizations to keep sensitive data on-premises while using public cloud for scalable workloads. Requires secure connectivity between environments.",tip:"Hybrid cloud = best of both worlds, but more complex to manage and secure.",r:["IaaS","Elasticity"]},
    {t:"Elasticity",c:"Cloud",b:"Automatically scale resources with demand",d:"Elasticity is the ability to automatically scale computing resources up or down based on demand. During peak load, resources increase; during low demand, resources decrease. Enables cost efficiency (pay only for what you use) and performance.",tip:"Elasticity = automatic scaling. Scalability = the ability to scale (but may be manual).",r:["Hybrid Cloud","Hypervisor"]},
    {t:"Hypervisor",c:"Cloud",b:"Software that creates and manages virtual machines",d:"A hypervisor is software that creates and manages virtual machines (VMs) on physical hardware. Type 1 (bare-metal): runs directly on hardware (VMware ESXi, Hyper-V). Type 2 (hosted): runs on top of an OS (VirtualBox, VMware Workstation).",tip:"Type 1 hypervisors are used in data centers (better performance). Type 2 is for desktops/testing.",r:["NFV","IaaS"]},
    {t:"NFV",c:"Cloud",b:"Network Functions Virtualization",d:"NFV replaces dedicated network hardware appliances (routers, firewalls, load balancers) with software running on standard servers/VMs. Reduces cost, increases flexibility, and enables rapid deployment of network services.",tip:"NFV virtualizes the network devices themselves. SDN virtualizes the network control plane. They complement each other.",r:["Hypervisor","SD-WAN"]},
    {t:"SD-WAN",c:"WAN",b:"Software-Defined WAN — intelligent path selection",d:"SD-WAN abstracts WAN management, allowing centralized control over multiple connection types (MPLS, broadband, LTE). Automatically selects the best path based on application requirements, cost, and link quality. Reduces dependence on expensive MPLS circuits.",tip:"SD-WAN can use cheap broadband alongside MPLS, routing critical traffic over MPLS and bulk traffic over broadband.",r:["MPLS","DMVPN","NFV"]},
    {t:"MPLS",c:"WAN",b:"Multi-Protocol Label Switching — fast label-based routing",d:"MPLS uses labels (instead of IP lookups) to forward packets through a provider network. Faster than traditional routing. Supports traffic engineering, QoS, and VPNs. Labels are pushed, swapped, and popped as packets traverse the MPLS network.",tip:"MPLS operates between Layer 2 and Layer 3 (sometimes called Layer 2.5). It's protocol-agnostic.",r:["SD-WAN","Metro Ethernet"]},
    {t:"DMVPN",c:"WAN",b:"Dynamic Multipoint VPN — hub-and-spoke mesh",d:"DMVPN creates dynamic, on-demand VPN tunnels between sites without requiring a full mesh of static tunnels. Uses a hub-and-spoke topology that can create spoke-to-spoke tunnels dynamically. Built on mGRE and NHRP (Next Hop Resolution Protocol).",tip:"DMVPN Phase 3 allows direct spoke-to-spoke tunnels without going through the hub — most efficient.",r:["VPN","SD-WAN"]},
    {t:"Metro Ethernet",c:"WAN",b:"Ethernet-based WAN service from ISPs",d:"Metro Ethernet extends Ethernet technology across metropolitan areas. Service types: E-Line (point-to-point), E-LAN (multipoint-to-multipoint), E-Tree (rooted multipoint). Simpler and often cheaper than MPLS for metro-area connectivity.",tip:"Metro Ethernet is familiar (just Ethernet) but across a city. Know the three service types: E-Line, E-LAN, E-Tree.",r:["MPLS"]},
    {t:"Mantrap",c:"Security",b:"Double-door physical access control vestibule",d:"A mantrap (or access control vestibule) is a small room with two interlocking doors. Only one door can open at a time, preventing tailgating. The person must authenticate (badge, biometric) to open the second door. Used in data centers and secure facilities.",tip:"The exam now calls this an 'access control vestibule' instead of mantrap. Same concept, updated terminology.",r:["MFA"]}
  ];

  var CATEGORIES = ['All','Networking','Security','Wireless','Troubleshooting','Cloud','WAN','Protocols'];
  var activeCat = 'All';
  var searchQuery = '';

  /* ── DOM refs ────────────────────────────────────────────────── */
  var searchInput = document.getElementById('searchInput');
  var searchCount = document.getElementById('searchCount');
  var catPills = document.getElementById('catPills');
  var alphaBar = document.getElementById('alphaBar');
  var termList = document.getElementById('termList');
  var noResults = document.getElementById('noResults');

  /* ── Render category pills ──────────────────────────────────── */
  catPills.innerHTML = CATEGORIES.map(function(c){
    return '<button class="cpill'+(c==='All'?' active':'')+'" data-cat="'+c+'">'+c+'</button>';
  }).join('');
  catPills.addEventListener('click',function(e){
    var btn = e.target.closest('.cpill');
    if(!btn) return;
    activeCat = btn.dataset.cat;
    catPills.querySelectorAll('.cpill').forEach(function(p){p.classList.toggle('active',p.dataset.cat===activeCat)});
    render();
  });

  /* ── Search ─────────────────────────────────────────────────── */
  searchInput.addEventListener('input',function(){
    searchQuery = this.value.toLowerCase().trim();
    render();
  });

  /* ── Filter + sort ──────────────────────────────────────────── */
  function filtered(){
    return TERMS.filter(function(t){
      var catMatch = activeCat==='All' || t.c===activeCat;
      var searchMatch = !searchQuery || t.t.toLowerCase().indexOf(searchQuery)!==-1 || t.b.toLowerCase().indexOf(searchQuery)!==-1 || t.d.toLowerCase().indexOf(searchQuery)!==-1;
      return catMatch && searchMatch;
    }).sort(function(a,b){ return a.t.localeCompare(b.t); });
  }

  /* ── Render ─────────────────────────────────────────────────── */
  function render(){
    var terms = filtered();
    searchCount.textContent = terms.length + ' / ' + TERMS.length + ' terms';

    // Group by letter
    var groups = {};
    terms.forEach(function(t){
      var letter = t.t.charAt(0).toUpperCase();
      if(!groups[letter]) groups[letter]=[];
      groups[letter].push(t);
    });

    // Alpha bar
    var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    alphaBar.innerHTML = letters.map(function(l){
      var has = !!groups[l];
      return '<button class="alpha-btn'+(has?'':' disabled')+'" data-letter="'+l+'">'+l+'</button>';
    }).join('');

    // Terms
    if(terms.length===0){
      termList.innerHTML='';
      noResults.classList.remove('hidden');
      return;
    }
    noResults.classList.add('hidden');

    var html = '';
    var sortedLetters = Object.keys(groups).sort();
    sortedLetters.forEach(function(letter){
      html += '<div class="letter-group" id="letter-'+letter+'">';
      html += '<div class="letter-header">'+letter+'</div>';
      groups[letter].forEach(function(t,i){
        var id = 'term-'+letter+'-'+i;
        html += '<div class="term-row" data-id="'+id+'">';
        html += '<span class="term-name">'+t.t+'</span>';
        html += '<span class="term-brief">'+t.b+'</span>';
        html += '<span class="term-cat" data-c="'+t.c+'">'+t.c+'</span>';
        html += '</div>';
        html += '<div class="term-expand" id="'+id+'">';
        html += '<div class="term-def">'+t.d+'</div>';
        if(t.tip) html += '<div class="term-tip"><strong>Exam Tip:</strong> '+t.tip+'</div>';
        if(t.r && t.r.length){
          html += '<div class="term-related">Related: '+t.r.map(function(r){return '<a data-jump="'+r+'">'+r+'</a>'}).join(', ')+'</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    });
    termList.innerHTML = html;
  }

  /* ── Click handlers ─────────────────────────────────────────── */
  // Toggle term expansion
  termList.addEventListener('click',function(e){
    var row = e.target.closest('.term-row');
    if(row){
      var wasOpen = row.classList.contains('open');
      termList.querySelectorAll('.term-row.open').forEach(function(r){r.classList.remove('open')});
      if(!wasOpen) row.classList.add('open');
      return;
    }
    // Related term jump
    var link = e.target.closest('[data-jump]');
    if(link){
      var name = link.dataset.jump;
      searchInput.value = name;
      searchQuery = name.toLowerCase();
      activeCat = 'All';
      catPills.querySelectorAll('.cpill').forEach(function(p){p.classList.toggle('active',p.dataset.cat==='All')});
      render();
      var firstRow = termList.querySelector('.term-row');
      if(firstRow){
        firstRow.classList.add('open');
        firstRow.scrollIntoView({behavior:'smooth',block:'center'});
      }
    }
  });

  // Alpha jump
  alphaBar.addEventListener('click',function(e){
    var btn = e.target.closest('.alpha-btn:not(.disabled)');
    if(!btn) return;
    var el = document.getElementById('letter-'+btn.dataset.letter);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  });

  /* ── Mode tabs ──────────────────────────────────────────────── */
  var quizCorrect=0, quizTotal=0, quizUsed=[];

  document.querySelector('.mode-tabs').addEventListener('click',function(e){
    var tab = e.target.closest('.mode-tab');
    if(!tab) return;
    document.querySelectorAll('.mode-tab').forEach(function(t){t.classList.remove('active')});
    tab.classList.add('active');
    var mode = tab.dataset.mode;
    document.getElementById('browseMode').classList.toggle('hidden',mode!=='browse');
    document.getElementById('quizMode').classList.toggle('active',mode==='quiz');
    if(mode==='quiz'){ quizCorrect=0; quizTotal=0; quizUsed=[]; nextQuizQ(); }
  });

  /* ── Quiz ───────────────────────────────────────────────────── */
  window.nextQuizQ = function(){
    if(quizUsed.length >= TERMS.length) quizUsed = [];
    var available = TERMS.filter(function(t,i){return quizUsed.indexOf(i)===-1});
    var idx = Math.floor(Math.random()*available.length);
    var term = available[idx];
    var realIdx = TERMS.indexOf(term);
    quizUsed.push(realIdx);

    // Build 4 options: 1 correct + 3 wrong
    var wrong = TERMS.filter(function(t){return t!==term}).sort(function(){return Math.random()-.5}).slice(0,3);
    var opts = [term].concat(wrong).sort(function(){return Math.random()-.5});

    document.getElementById('quizScore').textContent = quizCorrect + ' / ' + quizTotal;
    document.getElementById('quizPrompt').textContent = term.t;
    document.getElementById('quizNext').classList.remove('show');

    var optsEl = document.getElementById('quizOpts');
    optsEl.innerHTML = opts.map(function(o){
      return '<button class="quiz-opt" data-correct="'+(o===term)+'">'+o.b+'</button>';
    }).join('');

    optsEl.querySelectorAll('.quiz-opt').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(btn.classList.contains('locked')) return;
        quizTotal++;
        var correct = btn.dataset.correct==='true';
        if(correct) quizCorrect++;
        btn.classList.add(correct?'correct':'wrong');
        // Show correct answer
        optsEl.querySelectorAll('.quiz-opt').forEach(function(b){
          b.classList.add('locked');
          if(b.dataset.correct==='true') b.classList.add('correct');
        });
        document.getElementById('quizScore').textContent = quizCorrect + ' / ' + quizTotal;
        document.getElementById('quizNext').classList.add('show');
      });
    });
  };

  /* ── Init ───────────────────────────────────────────────────── */
  render();
})();

});</script>
</body>
</html>
