<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOS Command Reference — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  .page-header { padding: var(--s-xl) 0 var(--s-lg); margin-bottom: var(--s-lg); border-bottom: 2px solid var(--ink); }
  .page-header h1 { font-size: 2.4rem; margin-bottom: 4px; }
  .page-header .subtitle { font-family: var(--font-body); color: var(--ink-secondary); font-size: 0.95rem; font-style: italic; max-width: 60ch; }

  /* Search */
  .search-wrap { position: relative; margin-bottom: var(--s-md); }
  .search-input { width: 100%; padding: 12px 16px 12px 40px; border: 1px solid var(--border); border-radius: var(--radius-lg); font-family: var(--font-body); font-size: 0.9rem; background: var(--bg-surface); color: var(--ink); outline: none; transition: border-color var(--transition); }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--ink-muted); font-size: 0.9rem; pointer-events: none; }
  .search-hint { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-family: var(--font-mono); font-size: 0.65rem; color: var(--ink-muted); background: var(--bg-recessed); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); pointer-events: none; }
  .search-count { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-muted); margin-bottom: var(--s-sm); }

  /* Category pills */
  .cat-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: var(--s-lg); }
  .cat-pill { font-family: var(--font-display); font-size: 0.7rem; font-weight: 600; padding: 5px 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--ink-secondary); cursor: pointer; transition: all var(--transition); white-space: nowrap; }
  .cat-pill:hover, .cat-pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* Category section */
  .cat-section { margin-bottom: var(--s-2xl); scroll-margin-top: 20px; }
  .cat-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; padding: 10px 0 10px 14px; border-left: 4px solid var(--accent); margin-bottom: var(--s-md); letter-spacing: -0.01em; }
  .cat-count { font-family: var(--font-mono); font-size: 0.7rem; color: var(--ink-muted); margin-left: 8px; font-weight: 400; }

  /* Command entry */
  .cmd-entry { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 8px; transition: border-color var(--transition); }
  .cmd-entry:hover { border-color: var(--border-strong); }
  .cmd-entry.hidden { display: none; }
  .cmd-top { display: flex; align-items: start; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .cmd-syntax { font-family: var(--font-mono); font-size: 0.88rem; font-weight: 600; color: var(--ink); line-height: 1.4; flex: 1; }
  .cmd-syntax em { color: var(--accent); font-style: italic; font-weight: 400; }
  .cmd-copy { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--ink-muted); cursor: pointer; transition: all var(--transition); flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.04em; }
  .cmd-copy:hover { border-color: var(--accent); color: var(--accent); }
  .cmd-copy.copied { background: var(--prof-strong); color: #fff; border-color: var(--prof-strong); }
  .cmd-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; align-items: center; }
  .cmd-mode { font-family: var(--font-display); font-size: 0.7rem; font-weight: 600; padding: 2px 10px; border-radius: 10px; background: var(--accent-light); color: var(--accent); }
  .cmd-topics { font-family: var(--font-mono); font-size: 0.62rem; color: var(--ink-muted); }
  .cmd-desc { font-family: var(--font-body); font-size: 0.85rem; color: var(--ink-secondary); line-height: 1.6; margin-top: 8px; }
  .cmd-example { font-family: var(--font-mono); font-size: 0.78rem; color: var(--ink-muted); background: var(--bg-recessed); padding: 8px 12px; border-radius: var(--radius); margin-top: 8px; white-space: pre-wrap; word-break: break-all; }

  /* No results */
  .no-results { text-align: center; padding: var(--s-2xl) var(--s-lg); color: var(--ink-muted); }
  .no-results h3 { font-family: var(--font-display); font-size: 1.1rem; margin-bottom: 6px; color: var(--ink-secondary); }
  .no-results p { font-family: var(--font-body); font-size: 0.88rem; }

  @media (max-width: 600px) {
    .cmd-top { flex-direction: column; }
    .cmd-copy { align-self: flex-end; }
    .cat-pills { gap: 4px; }
    .cat-pill { font-size: 0.65rem; padding: 4px 10px; }
  }
</style>
</head>
<body>
<div class="container-wide">
  <nav class="top-nav" id="main-nav"></nav>

  <header class="page-header">
    <h1>IOS Command Reference</h1>
    <p class="subtitle">Every Cisco IOS command you need for the CCNA, organized by category. Search, filter, copy. Keep this open while labbing.</p>
  </header>

  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search commands... (e.g. ospf, vlan, ip address)">
    <span class="search-hint" id="searchHint">/</span>
  </div>
  <div class="search-count" id="searchCount"></div>

  <div class="cat-pills" id="catPills"></div>

  <div id="cmdContainer"></div>
  <div class="no-results hidden" id="noResults">
    <h3>No commands found</h3>
    <p>Try a different search term or clear the filter.</p>
  </div>
</div>

<script src="js/nav.js"></script>
<script>
// ── Command Database ──────────────────────────────────────────
const COMMANDS = [
  // ─── Basic Device ───────────────────────────────────────
  { cat: 'Basic Device', syntax: 'enable', mode: 'User EXEC', topics: ['1.1'],
    desc: 'Enter privileged EXEC mode from user EXEC mode.',
    example: 'Switch> enable\nSwitch#' },
  { cat: 'Basic Device', syntax: 'disable', mode: 'Privileged EXEC', topics: ['1.1'],
    desc: 'Return to user EXEC mode from privileged EXEC.',
    example: 'Switch# disable\nSwitch>' },
  { cat: 'Basic Device', syntax: 'configure terminal', mode: 'Privileged EXEC', topics: ['1.1'],
    desc: 'Enter global configuration mode.',
    example: 'Router# configure terminal\nRouter(config)#' },
  { cat: 'Basic Device', syntax: 'exit', mode: 'Any', topics: ['1.1'],
    desc: 'Move back one mode level (e.g., config-if to config, config to priv EXEC).',
    example: 'Router(config-if)# exit\nRouter(config)#' },
  { cat: 'Basic Device', syntax: 'end', mode: 'Any Config', topics: ['1.1'],
    desc: 'Return directly to privileged EXEC from any config sub-mode. Same as Ctrl+Z.',
    example: 'Router(config-if)# end\nRouter#' },
  { cat: 'Basic Device', syntax: 'hostname <em>name</em>', mode: 'Global Config', topics: ['1.1','5.3'],
    desc: 'Sets the device hostname. Appears in the prompt. Required for SSH key generation.',
    example: 'Router(config)# hostname R1\nR1(config)#' },
  { cat: 'Basic Device', syntax: 'banner motd <em>delimiter text delimiter</em>', mode: 'Global Config', topics: ['5.3'],
    desc: 'Set the message of the day banner. Displayed before login. Use any delimiter character (e.g., #).',
    example: 'R1(config)# banner motd # Authorized access only! #' },
  { cat: 'Basic Device', syntax: 'service password-encryption', mode: 'Global Config', topics: ['5.3'],
    desc: 'Encrypts all plaintext passwords in the running config using Type 7 (weak) encryption.',
    example: 'R1(config)# service password-encryption' },
  { cat: 'Basic Device', syntax: 'enable secret <em>password</em>', mode: 'Global Config', topics: ['5.3'],
    desc: 'Set an MD5-hashed password for privileged EXEC access. Preferred over enable password.',
    example: 'R1(config)# enable secret Cisco123' },
  { cat: 'Basic Device', syntax: 'enable password <em>password</em>', mode: 'Global Config', topics: ['5.3'],
    desc: 'Set a plaintext password for privileged EXEC. Weaker than enable secret -- use secret instead.',
    example: 'R1(config)# enable password OldPass' },
  { cat: 'Basic Device', syntax: 'copy running-config startup-config', mode: 'Privileged EXEC', topics: ['1.1'],
    desc: 'Save the running configuration to NVRAM. Shortcut: wr (write memory).',
    example: 'R1# copy running-config startup-config\nDestination filename [startup-config]?\nBuilding configuration...\n[OK]' },
  { cat: 'Basic Device', syntax: 'show running-config', mode: 'Privileged EXEC', topics: ['1.1'],
    desc: 'Display the current running configuration in RAM.',
    example: 'R1# show running-config' },
  { cat: 'Basic Device', syntax: 'show startup-config', mode: 'Privileged EXEC', topics: ['1.1'],
    desc: 'Display the saved startup configuration in NVRAM.',
    example: 'R1# show startup-config' },
  { cat: 'Basic Device', syntax: 'show version', mode: 'User/Privileged EXEC', topics: ['1.1'],
    desc: 'Display hardware info, IOS version, uptime, config register, and license info.',
    example: 'R1# show version' },
  { cat: 'Basic Device', syntax: 'show clock', mode: 'User/Privileged EXEC', topics: ['1.1'],
    desc: 'Display the current system time and date.',
    example: 'R1# show clock\n*14:32:10.123 UTC Mon Apr 14 2026' },
  { cat: 'Basic Device', syntax: 'show history', mode: 'User/Privileged EXEC', topics: ['1.1'],
    desc: 'Display the command history buffer for the current session.',
    example: 'R1# show history' },

  // ─── Interface ──────────────────────────────────────────
  { cat: 'Interface', syntax: 'interface <em>type/number</em>', mode: 'Global Config', topics: ['1.6'],
    desc: 'Enter interface configuration mode for a specific interface.',
    example: 'R1(config)# interface GigabitEthernet0/0\nR1(config-if)#' },
  { cat: 'Interface', syntax: 'no shutdown', mode: 'Interface Config', topics: ['1.6'],
    desc: 'Administratively enable an interface. Router interfaces are shutdown by default.',
    example: 'R1(config-if)# no shutdown\n%LINK-5-CHANGED: Interface GigabitEthernet0/0, changed state to up' },
  { cat: 'Interface', syntax: 'shutdown', mode: 'Interface Config', topics: ['1.6'],
    desc: 'Administratively disable an interface.',
    example: 'R1(config-if)# shutdown' },
  { cat: 'Interface', syntax: 'ip address <em>ip-address</em> <em>subnet-mask</em>', mode: 'Interface Config', topics: ['1.6','3.1'],
    desc: 'Assign an IPv4 address and subnet mask to an interface.',
    example: 'R1(config-if)# ip address 192.168.1.1 255.255.255.0' },
  { cat: 'Interface', syntax: 'no ip address', mode: 'Interface Config', topics: ['1.6'],
    desc: 'Remove the IP address from an interface.',
    example: 'R1(config-if)# no ip address' },
  { cat: 'Interface', syntax: 'description <em>text</em>', mode: 'Interface Config', topics: ['1.6'],
    desc: 'Add a descriptive label to an interface. Appears in show interfaces output.',
    example: 'R1(config-if)# description Link to SW1' },
  { cat: 'Interface', syntax: 'duplex <em>auto|full|half</em>', mode: 'Interface Config', topics: ['1.6'],
    desc: 'Set the duplex mode of the interface. Auto is the default.',
    example: 'SW1(config-if)# duplex full' },
  { cat: 'Interface', syntax: 'speed <em>auto|10|100|1000</em>', mode: 'Interface Config', topics: ['1.6'],
    desc: 'Set the speed of the interface. Auto is the default.',
    example: 'SW1(config-if)# speed 1000' },
  { cat: 'Interface', syntax: 'show ip interface brief', mode: 'Privileged EXEC', topics: ['1.6'],
    desc: 'Display a summary of all interfaces with IP address, status, and protocol state.',
    example: 'R1# show ip interface brief\nInterface              IP-Address      OK? Method Status                Protocol\nGi0/0                  192.168.1.1     YES manual up                    up' },
  { cat: 'Interface', syntax: 'show interfaces', mode: 'Privileged EXEC', topics: ['1.6'],
    desc: 'Display detailed statistics for all interfaces (speed, duplex, errors, CRC, etc.).',
    example: 'R1# show interfaces GigabitEthernet0/0' },
  { cat: 'Interface', syntax: 'show interfaces status', mode: 'Privileged EXEC', topics: ['1.6'],
    desc: 'Display a compact table of interface status, VLAN, duplex, speed, and type (switch only).',
    example: 'SW1# show interfaces status' },

  // ─── VLAN ───────────────────────────────────────────────
  { cat: 'VLAN', syntax: 'vlan <em>id</em>', mode: 'Global Config', topics: ['2.1','2.2'],
    desc: 'Create a VLAN or enter VLAN configuration mode if it already exists.',
    example: 'SW1(config)# vlan 10\nSW1(config-vlan)#' },
  { cat: 'VLAN', syntax: 'name <em>name</em>', mode: 'VLAN Config', topics: ['2.1','2.2'],
    desc: 'Assign a descriptive name to the VLAN.',
    example: 'SW1(config-vlan)# name SALES' },
  { cat: 'VLAN', syntax: 'switchport mode access', mode: 'Interface Config', topics: ['2.1','2.2'],
    desc: 'Set the interface as a static access port (belongs to one VLAN).',
    example: 'SW1(config-if)# switchport mode access' },
  { cat: 'VLAN', syntax: 'switchport mode trunk', mode: 'Interface Config', topics: ['2.2','2.4'],
    desc: 'Set the interface as a trunk port (carries multiple VLANs with 802.1Q tags).',
    example: 'SW1(config-if)# switchport mode trunk' },
  { cat: 'VLAN', syntax: 'switchport access vlan <em>id</em>', mode: 'Interface Config', topics: ['2.1','2.2'],
    desc: 'Assign an access port to a specific VLAN.',
    example: 'SW1(config-if)# switchport access vlan 10' },
  { cat: 'VLAN', syntax: 'switchport trunk native vlan <em>id</em>', mode: 'Interface Config', topics: ['2.2','2.4'],
    desc: 'Set the native VLAN for a trunk port. Untagged frames are assigned to this VLAN.',
    example: 'SW1(config-if)# switchport trunk native vlan 99' },
  { cat: 'VLAN', syntax: 'switchport trunk allowed vlan <em>list</em>', mode: 'Interface Config', topics: ['2.2','2.4'],
    desc: 'Restrict which VLANs are allowed on the trunk. Use comma-separated list or ranges.',
    example: 'SW1(config-if)# switchport trunk allowed vlan 10,20,30' },
  { cat: 'VLAN', syntax: 'show vlan brief', mode: 'Privileged EXEC', topics: ['2.1','2.2'],
    desc: 'Display a summary of all VLANs, their names, status, and assigned ports.',
    example: 'SW1# show vlan brief\nVLAN Name                             Status    Ports\n---- -------------------------------- --------- -------\n1    default                          active    Fa0/1, Fa0/2\n10   SALES                            active    Fa0/3' },
  { cat: 'VLAN', syntax: 'show interfaces trunk', mode: 'Privileged EXEC', topics: ['2.2','2.4'],
    desc: 'Display trunk port status, native VLAN, and allowed VLANs.',
    example: 'SW1# show interfaces trunk' },

  // ─── STP ────────────────────────────────────────────────
  { cat: 'STP', syntax: 'spanning-tree mode <em>pvst|rapid-pvst</em>', mode: 'Global Config', topics: ['2.5'],
    desc: 'Set the STP mode. Rapid-PVST is recommended for faster convergence.',
    example: 'SW1(config)# spanning-tree mode rapid-pvst' },
  { cat: 'STP', syntax: 'spanning-tree vlan <em>id</em> priority <em>number</em>', mode: 'Global Config', topics: ['2.5'],
    desc: 'Set the bridge priority for a VLAN. Lower priority = more likely to be root. Must be a multiple of 4096.',
    example: 'SW1(config)# spanning-tree vlan 10 priority 4096' },
  { cat: 'STP', syntax: 'spanning-tree portfast', mode: 'Interface Config', topics: ['2.5'],
    desc: 'Enable PortFast on an access port. Skips listening/learning, goes straight to forwarding. Use only on end-host ports.',
    example: 'SW1(config-if)# spanning-tree portfast\n%Warning: portfast should only be enabled on ports connected to a single host.' },
  { cat: 'STP', syntax: 'spanning-tree bpduguard enable', mode: 'Interface Config', topics: ['2.5'],
    desc: 'Enable BPDU Guard on a port. If a BPDU is received, the port is err-disabled. Protects PortFast ports.',
    example: 'SW1(config-if)# spanning-tree bpduguard enable' },
  { cat: 'STP', syntax: 'show spanning-tree', mode: 'Privileged EXEC', topics: ['2.5'],
    desc: 'Display STP information for all VLANs -- root bridge, port roles, port states.',
    example: 'SW1# show spanning-tree' },
  { cat: 'STP', syntax: 'show spanning-tree summary', mode: 'Privileged EXEC', topics: ['2.5'],
    desc: 'Display a brief STP summary including mode, root bridge status, and port counts.',
    example: 'SW1# show spanning-tree summary' },

  // ─── EtherChannel ──────────────────────────────────────
  { cat: 'EtherChannel', syntax: 'channel-group <em>number</em> mode <em>active|passive|on</em>', mode: 'Interface Config', topics: ['2.6'],
    desc: 'Add the interface to an EtherChannel bundle. active/passive = LACP, on = static. Both sides must match.',
    example: 'SW1(config-if)# channel-group 1 mode active\nCreating a port-channel interface Port-channel 1' },
  { cat: 'EtherChannel', syntax: 'show etherchannel summary', mode: 'Privileged EXEC', topics: ['2.6'],
    desc: 'Display EtherChannel status, member ports, protocol, and flags.',
    example: 'SW1# show etherchannel summary\nGroup  Port-channel  Protocol  Ports\n------+-------------+---------+-----\n1      Po1(SU)        LACP     Gi0/1(P) Gi0/2(P)' },

  // ─── Routing ────────────────────────────────────────────
  { cat: 'Routing', syntax: 'ip route <em>network</em> <em>mask</em> <em>next-hop</em>', mode: 'Global Config', topics: ['3.1','3.3'],
    desc: 'Add a static route. Packets for the destination network are forwarded to the next-hop IP.',
    example: 'R1(config)# ip route 10.0.0.0 255.0.0.0 192.168.1.2' },
  { cat: 'Routing', syntax: 'ip route 0.0.0.0 0.0.0.0 <em>next-hop</em>', mode: 'Global Config', topics: ['3.1','3.3'],
    desc: 'Add a default route (gateway of last resort). Matches all destinations not in the routing table.',
    example: 'R1(config)# ip route 0.0.0.0 0.0.0.0 203.0.113.1' },
  { cat: 'Routing', syntax: 'show ip route', mode: 'Privileged EXEC', topics: ['3.1','3.3'],
    desc: 'Display the IP routing table. Shows connected (C), static (S), OSPF (O), and other route sources.',
    example: 'R1# show ip route\nC    192.168.1.0/24 is directly connected, GigabitEthernet0/0\nS    10.0.0.0/8 [1/0] via 192.168.1.2\nS*   0.0.0.0/0 [1/0] via 203.0.113.1' },

  // ─── OSPF ──────────────────────────────────────────────
  { cat: 'OSPF', syntax: 'router ospf <em>process-id</em>', mode: 'Global Config', topics: ['3.2','3.4'],
    desc: 'Enter OSPF router configuration mode. Process ID is locally significant (does not need to match neighbors).',
    example: 'R1(config)# router ospf 1\nR1(config-router)#' },
  { cat: 'OSPF', syntax: 'network <em>network</em> <em>wildcard</em> area <em>id</em>', mode: 'Router Config', topics: ['3.2','3.4'],
    desc: 'Enable OSPF on interfaces matching the network/wildcard and assign them to an area.',
    example: 'R1(config-router)# network 10.0.1.0 0.0.0.255 area 0' },
  { cat: 'OSPF', syntax: 'router-id <em>id</em>', mode: 'Router Config', topics: ['3.2','3.4'],
    desc: 'Manually set the OSPF router ID (format: A.B.C.D). Takes effect after clear ip ospf process.',
    example: 'R1(config-router)# router-id 1.1.1.1' },
  { cat: 'OSPF', syntax: 'passive-interface <em>interface</em>', mode: 'Router Config', topics: ['3.2','3.4'],
    desc: 'Stop sending OSPF hellos on an interface while still advertising its network. Use on LAN-facing interfaces.',
    example: 'R1(config-router)# passive-interface GigabitEthernet0/1' },
  { cat: 'OSPF', syntax: 'show ip ospf neighbor', mode: 'Privileged EXEC', topics: ['3.2','3.4'],
    desc: 'Display OSPF neighbor adjacencies -- neighbor ID, state, dead timer, interface.',
    example: 'R1# show ip ospf neighbor\nNeighbor ID     Pri   State           Dead Time   Address         Interface\n2.2.2.2           1   FULL/DR         00:00:33    10.0.1.2        Gi0/0' },
  { cat: 'OSPF', syntax: 'show ip ospf interface', mode: 'Privileged EXEC', topics: ['3.2','3.4'],
    desc: 'Display OSPF interface details -- area, cost, timers, network type, DR/BDR status.',
    example: 'R1# show ip ospf interface GigabitEthernet0/0' },
  { cat: 'OSPF', syntax: 'show ip ospf database', mode: 'Privileged EXEC', topics: ['3.2','3.4'],
    desc: 'Display the OSPF link-state database (LSDB) -- all LSAs known to the router.',
    example: 'R1# show ip ospf database' },

  // ─── NAT ───────────────────────────────────────────────
  { cat: 'NAT', syntax: 'ip nat inside', mode: 'Interface Config', topics: ['4.1','4.3'],
    desc: 'Mark an interface as the NAT inside interface (local/private network side).',
    example: 'R1(config-if)# ip nat inside' },
  { cat: 'NAT', syntax: 'ip nat outside', mode: 'Interface Config', topics: ['4.1','4.3'],
    desc: 'Mark an interface as the NAT outside interface (public/internet side).',
    example: 'R1(config-if)# ip nat outside' },
  { cat: 'NAT', syntax: 'ip nat inside source list <em>acl</em> interface <em>intf</em> overload', mode: 'Global Config', topics: ['4.1','4.3'],
    desc: 'Configure PAT (Port Address Translation). Translates multiple inside addresses to one outside interface IP using port numbers.',
    example: 'R1(config)# ip nat inside source list 1 interface GigabitEthernet0/1 overload' },
  { cat: 'NAT', syntax: 'ip nat inside source static <em>local-ip</em> <em>global-ip</em>', mode: 'Global Config', topics: ['4.1','4.3'],
    desc: 'Configure a static NAT entry. Maps one private IP to one public IP permanently.',
    example: 'R1(config)# ip nat inside source static 192.168.1.10 203.0.113.10' },
  { cat: 'NAT', syntax: 'show ip nat translations', mode: 'Privileged EXEC', topics: ['4.1','4.3'],
    desc: 'Display the NAT translation table -- inside local/global and outside local/global addresses.',
    example: 'R1# show ip nat translations' },
  { cat: 'NAT', syntax: 'show ip nat statistics', mode: 'Privileged EXEC', topics: ['4.1','4.3'],
    desc: 'Display NAT statistics -- active translations, hits, misses, expired translations.',
    example: 'R1# show ip nat statistics' },

  // ─── DHCP ──────────────────────────────────────────────
  { cat: 'DHCP', syntax: 'ip dhcp pool <em>name</em>', mode: 'Global Config', topics: ['4.3'],
    desc: 'Create a DHCP pool and enter DHCP configuration mode.',
    example: 'R1(config)# ip dhcp pool LAN\nR1(dhcp-config)#' },
  { cat: 'DHCP', syntax: 'network <em>network</em> <em>mask</em>', mode: 'DHCP Config', topics: ['4.3'],
    desc: 'Define the network and subnet mask for the DHCP pool.',
    example: 'R1(dhcp-config)# network 192.168.1.0 255.255.255.0' },
  { cat: 'DHCP', syntax: 'default-router <em>ip</em>', mode: 'DHCP Config', topics: ['4.3'],
    desc: 'Set the default gateway IP that DHCP clients will receive.',
    example: 'R1(dhcp-config)# default-router 192.168.1.1' },
  { cat: 'DHCP', syntax: 'dns-server <em>ip</em>', mode: 'DHCP Config', topics: ['4.3'],
    desc: 'Set the DNS server IP that DHCP clients will receive.',
    example: 'R1(dhcp-config)# dns-server 8.8.8.8' },
  { cat: 'DHCP', syntax: 'ip dhcp excluded-address <em>start</em> <em>end</em>', mode: 'Global Config', topics: ['4.3'],
    desc: 'Exclude a range of IP addresses from being assigned by DHCP.',

// ── Category order ──────────────────────────────────────────
const CATEGORIES = ['Basic Device', 'Interface', 'VLAN', 'STP', 'EtherChannel', 'Routing', 'OSPF', 'NAT', 'DHCP', 'ACL', 'Security', 'SSH', 'Services', 'IPv6'];

// ── State ───────────────────────────────────────────────────
let activeCategory = null;
let searchTerm = '';

// ── Build category pills ────────────────────────────────────
const pillsEl = document.getElementById('catPills');
const allPill = document.createElement('button');
allPill.className = 'cat-pill active';
allPill.textContent = `All (${COMMANDS.length})`;
allPill.onclick = () => { activeCategory = null; filterCommands(); updatePills(); };
pillsEl.appendChild(allPill);

CATEGORIES.forEach(cat => {
  const count = COMMANDS.filter(c => c.cat === cat).length;
  const pill = document.createElement('button');
  pill.className = 'cat-pill';
  pill.textContent = `${cat} (${count})`;
  pill.dataset.cat = cat;
  pill.onclick = () => { activeCategory = cat; filterCommands(); updatePills(); };
  pillsEl.appendChild(pill);
});

function updatePills() {
  pillsEl.querySelectorAll('.cat-pill').forEach(p => {
    if (!p.dataset.cat) { p.classList.toggle('active', !activeCategory); }
    else { p.classList.toggle('active', p.dataset.cat === activeCategory); }
  });
}

// ── Build command cards ─────────────────────────────────────
const cmdContainer = document.getElementById('cmdContainer');

function buildCards() {
  cmdContainer.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const cmds = COMMANDS.filter(c => c.cat === cat);
    const section = document.createElement('div');
    section.className = 'cat-section';
    section.id = 'cat-' + cat.replace(/\s+/g, '-');
    section.innerHTML = `<h2 class="cat-title">${cat}<span class="cat-count">${cmds.length} commands</span></h2>`;

    cmds.forEach((cmd, ci) => {
      const el = document.createElement('div');
      el.className = 'cmd-entry';
      el.dataset.cat = cmd.cat;
      el.dataset.search = (cmd.syntax.replace(/<\/?em>/g, '') + ' ' + cmd.desc + ' ' + cmd.mode + ' ' + cmd.cat).toLowerCase();
      const plainSyntax = cmd.syntax.replace(/<\/?em>/g, '');
      el.innerHTML = `
        <div class="cmd-top">
          <div class="cmd-syntax">${cmd.syntax}</div>
          <button class="cmd-copy" onclick="copySyntax(this, '${plainSyntax.replace(/'/g, "\\'")}')">Copy</button>
        </div>
        <div class="cmd-meta">
          <span class="cmd-mode">${cmd.mode}</span>
          ${cmd.topics.length ? '<span class="cmd-topics">CCNA ' + cmd.topics.join(', ') + '</span>' : ''}
        </div>
        <div class="cmd-desc">${cmd.desc}</div>
        <div class="cmd-example">${cmd.example}</div>
      `;
      section.appendChild(el);
    });

    cmdContainer.appendChild(section);
  });
}

buildCards();

// ── Search + Filter ─────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');
const noResults = document.getElementById('noResults');

searchInput.addEventListener('input', () => {
  searchTerm = searchInput.value.trim().toLowerCase();
  filterCommands();
});

// Keyboard shortcut: / focuses search
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape' && document.activeElement === searchInput) {
    searchInput.value = '';
    searchTerm = '';
    searchInput.blur();
    filterCommands();
  }
});

// Hide hint when focused
searchInput.addEventListener('focus', () => {
  document.getElementById('searchHint').style.display = 'none';
});
searchInput.addEventListener('blur', () => {
  if (!searchInput.value) document.getElementById('searchHint').style.display = '';
});

function filterCommands() {
  let visible = 0;
  const entries = cmdContainer.querySelectorAll('.cmd-entry');
  entries.forEach(el => {
    const matchesCat = !activeCategory || el.dataset.cat === activeCategory;
    const matchesSearch = !searchTerm || el.dataset.search.includes(searchTerm);
    const show = matchesCat && matchesSearch;
    el.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  // Show/hide category sections that have no visible commands
  cmdContainer.querySelectorAll('.cat-section').forEach(sec => {
    const has = sec.querySelectorAll('.cmd-entry:not(.hidden)').length > 0;
    sec.style.display = has ? '' : 'none';
  });

  searchCount.textContent = `${visible} of ${COMMANDS.length} commands`;
  noResults.classList.toggle('hidden', visible > 0);
}

filterCommands();

// ── Copy ────────────────────────────────────────────────────
function copySyntax(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}
