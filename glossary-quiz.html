<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>Glossary Quiz — CCNA 200-301</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
  .gq-head{display:flex;justify-content:space-between;align-items:baseline;gap:var(--s-lg);margin-bottom:var(--s-lg);padding-bottom:var(--s-md);border-bottom:1px solid var(--rule)}
  .gq-sub{font-family:var(--font-mono);color:var(--accent);font-weight:600;letter-spacing:.02em}
  .gq-title{font-family:var(--font-display);font-size:1.35rem;font-weight:600;color:var(--ink);margin:4px 0 0}
  .gq-meta{font-family:var(--font-mono);font-size:.75rem;color:var(--ink-secondary);text-align:right}

  .gq-progress{display:flex;align-items:center;gap:var(--s-md);margin-bottom:var(--s-lg);font-family:var(--font-mono);font-size:.78rem;color:var(--ink-secondary)}
  .gq-bar{flex:1;height:4px;background:var(--bg-recessed);border-radius:2px;overflow:hidden;max-width:420px}
  .gq-fill{height:100%;background:var(--accent);width:0%;transition:width .3s var(--ease-out)}

  .gq-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--s-xl) var(--s-xl);margin-bottom:var(--s-lg)}
  .gq-q{font-family:var(--font-display);font-size:1.1rem;font-weight:500;color:var(--ink);line-height:1.55;margin-bottom:var(--s-lg)}

  .gq-opts{display:flex;flex-direction:column;gap:8px}
  .gq-opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:var(--font-body);font-size:.9rem;color:var(--ink);background:var(--bg);transition:all var(--transition);text-align:left}
  .gq-opt:hover{border-color:var(--border-strong);background:var(--bg-hover)}
  .gq-opt-letter{font-family:var(--font-mono);font-size:.75rem;font-weight:700;color:var(--ink-muted);min-width:18px}
  .gq-opt.selected{border-color:var(--accent);background:var(--accent-dim)}
  .gq-opt.correct{border-color:#16A34A;background:#F0FDF4}
  .gq-opt.correct .gq-opt-letter{color:#16A34A}
  .gq-opt.wrong{border-color:#DC2626;background:#FEF2F2}
  .gq-opt.wrong .gq-opt-letter{color:#DC2626}
  .gq-opt[disabled]{cursor:default}

  .gq-expl{margin-top:var(--s-md);padding:var(--s-md);background:var(--bg-recessed);border-left:3px solid var(--accent);border-radius:var(--radius);font-size:.85rem;color:var(--ink-secondary);line-height:1.55;display:none}
  .gq-expl.show{display:block}
  .gq-expl strong{color:var(--ink);font-weight:600}

  .gq-actions{display:flex;justify-content:flex-end;gap:var(--s-sm);margin-top:var(--s-lg)}
  .gq-btn{font-family:var(--font-display);font-size:.85rem;font-weight:600;padding:10px 20px;border-radius:var(--radius);border:1px solid var(--ink);background:var(--ink);color:var(--bg);cursor:pointer;transition:opacity var(--transition)}
  .gq-btn:hover{opacity:.85}
  .gq-btn:disabled{opacity:.55;cursor:not-allowed}
  .gq-btn.ghost{background:transparent;color:var(--ink);border-color:var(--border)}

  .gq-result{text-align:center;padding:var(--s-2xl) var(--s-xl)}
  .gq-score{font-family:var(--font-display);font-size:3rem;font-weight:700;line-height:1;margin-bottom:var(--s-sm)}
  .gq-score.pass{color:#16A34A}
  .gq-score.fail{color:var(--ink-secondary)}
  .gq-verdict{font-family:var(--font-display);font-size:1.1rem;font-weight:500;color:var(--ink);margin-bottom:var(--s-md)}
  .gq-verdict-sub{font-family:var(--font-body);color:var(--ink-secondary);line-height:1.6;max-width:520px;margin:0 auto var(--s-xl)}
  .gq-result-actions{display:flex;gap:var(--s-sm);justify-content:center;flex-wrap:wrap}

  .gq-missed{margin-top:var(--s-2xl);text-align:left;max-width:720px;margin-left:auto;margin-right:auto}
  .gq-missed h3{font-family:var(--font-display);font-size:.95rem;font-weight:600;color:var(--ink);margin-bottom:var(--s-md);padding-bottom:var(--s-sm);border-bottom:1px solid var(--rule)}
  .gq-missed-item{padding:var(--s-md) 0;border-bottom:1px solid var(--rule);font-size:.85rem}
  .gq-missed-item .mq{color:var(--ink);font-weight:500;margin-bottom:4px}
  .gq-missed-item .ma{color:#16A34A;font-family:var(--font-mono);font-size:.8rem}
  .gq-missed-item .me{color:var(--ink-secondary);margin-top:4px;font-size:.82rem;line-height:1.5}

  .gq-error{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--radius-lg);padding:var(--s-lg);color:#991B1B;font-size:.9rem;line-height:1.6}
</style>
</head>
<body>
<nav class="top-nav" id="main-nav"></nav>
<nav id="ccna-nav"></nav>

<div class="container">
  <div class="gq-head">
    <div>
      <div class="gq-sub" id="gq-subId">—</div>
      <h1 class="gq-title" id="gq-title">Glossary Quiz</h1>
    </div>
    <div class="gq-meta">
      <div id="gq-domainName">—</div>
      <div id="gq-passMark">Pass: 90%+</div>
    </div>
  </div>

  <div class="gq-progress">
    <span id="gq-progressText">Question 0/0</span>
    <div class="gq-bar"><div class="gq-fill" id="gq-progressFill"></div></div>
    <span id="gq-scoreText">0 correct</span>
  </div>

  <div id="gq-main"></div>
</div>

<script defer src="js/nav.js?v=4.55"></script>
<script defer src="js/fsrs.js"></script>
<script defer src="js/store.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  'use strict';

  var SUBTITLES={
    "1.1":"Network components","1.2":"Topology architectures","1.3":"Interfaces & cabling",
    "1.4":"Interface/cable issues","1.5":"TCP vs UDP","1.6":"IPv4 addressing & subnetting",
    "1.7":"Private IPv4","1.8":"IPv6 addressing","1.9":"IPv6 address types",
    "1.10":"Client OS IP verify","1.11":"Wireless principles","1.12":"Virtualization","1.13":"Switching concepts",
    "2.1":"VLANs","2.2":"Interswitch connectivity (trunks)","2.3":"CDP & LLDP","2.4":"EtherChannel",
    "2.5":"Spanning Tree","2.6":"Wireless architectures","2.7":"WLAN physical","2.8":"AP/WLC mgmt access","2.9":"WLAN GUI",
    "3.1":"Routing table","3.2":"Forwarding decision","3.3":"Static routing","3.4":"OSPFv2 single-area","3.5":"FHRP/HSRP",
    "4.1":"NAT","4.2":"NTP","4.3":"DHCP & DNS","4.4":"SNMP","4.5":"Syslog","4.6":"DHCP client/relay",
    "4.7":"QoS PHB","4.8":"SSH","4.9":"TFTP/FTP",
    "5.1":"Security concepts","5.2":"Security program","5.3":"Device access control","5.4":"Password policies",
    "5.5":"IPsec/VPN","5.6":"ACLs","5.7":"L2 security","5.8":"AAA","5.9":"Wireless security","5.10":"WLAN WPA2 PSK",
    "6.1":"Automation impact","6.2":"Traditional vs controller","6.3":"SDN architecture","6.4":"AI/ML in networks",
    "6.5":"REST APIs","6.6":"Config management","6.7":"JSON data"
  };
  var DOMAIN_NAMES={"1":"Network Fundamentals","2":"Network Access","3":"IP Connectivity","4":"IP Services","5":"Security Fundamentals","6":"Automation & Programmability"};
  var PASS_THRESHOLD=0.9;

  function qs(n){return new URL(location.href).searchParams.get(n);}
  function $(id){return document.getElementById(id);}
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

  var sub=qs('sub');
  // ?check=N — shortened "Check" variant (Mastery mode, 3-Q after a video)
  var checkCountRaw=qs('check');
  var checkCount=checkCountRaw?parseInt(checkCountRaw,10):0;
  var isCheck=checkCount>0;
  if(isCheck){ PASS_THRESHOLD=2/checkCount; } // 2/3 pass for a 3-Q check
  if(!sub){
    $('gq-main').innerHTML='<div class="gq-error">Missing <code>?sub=X.Y</code> parameter. Try <a href="glossary-quiz.html?sub=1.1">glossary-quiz.html?sub=1.1</a>.</div>';
    return;
  }

  var domain=sub.split('.')[0];
  $('gq-subId').textContent=sub+' · '+(SUBTITLES[sub]||'Sub-objective');
  $('gq-title').textContent=isCheck?('Quick Check · '+checkCount+' questions'):'Glossary Quiz';
  $('gq-domainName').textContent='Domain '+domain+' — '+(DOMAIN_NAMES[domain]||'');

  var state={questions:[],idx:0,score:0,answered:{},missed:[]};

  fetch('data/glossary-quiz/'+sub+'.json?v='+Date.now())
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      var qs=(data&&data.questions)||[];
      if(!qs.length)throw new Error('Empty question set.');
      var pool=shuffle(qs);
      if(isCheck&&pool.length>checkCount) pool=pool.slice(0,checkCount);
      state.questions=pool.map(function(q){return Object.assign({},q,{_shuf:shuffleIndices(q.options.length)});});
      render();
    })
    .catch(function(e){
      $('gq-main').innerHTML='<div class="gq-error">Could not load quiz for <code>'+esc(sub)+'</code>.<br>'+esc(e.message)+'<br><br>Expected at <code>data/glossary-quiz/'+esc(sub)+'.json</code>.</div>';
    });

  function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
  function shuffleIndices(n){var a=[];for(var i=0;i<n;i++)a.push(i);return shuffle(a);}

  function render(){
    if(state.idx>=state.questions.length){return renderResult();}
    var q=state.questions[state.idx];
    var pct=Math.round(state.idx/state.questions.length*100);
    $('gq-progressText').textContent='Question '+(state.idx+1)+'/'+state.questions.length;
    $('gq-progressFill').style.width=pct+'%';
    $('gq-scoreText').textContent=state.score+' correct';

    var optsHtml=q._shuf.map(function(origIdx,displayIdx){
      var letter=String.fromCharCode(65+displayIdx);
      return '<button class="gq-opt" data-orig-idx="'+origIdx+'" data-display-idx="'+displayIdx+'"><span class="gq-opt-letter">'+letter+'</span><span>'+esc(q.options[origIdx])+'</span></button>';
    }).join('');

    $('gq-main').innerHTML=
      '<div class="gq-card">'+
        '<div class="gq-q">'+esc(q.question)+'</div>'+
        '<div class="gq-opts">'+optsHtml+'</div>'+
        '<div class="gq-expl" id="gq-expl"></div>'+
        '<div class="gq-actions"><button class="gq-btn" id="gq-next" disabled>Next →</button></div>'+
      '</div>';

    document.querySelectorAll('.gq-opt').forEach(function(el){
      el.addEventListener('click',function(){selectAnswer(parseInt(el.dataset.origIdx,10));});
    });
    // Note: data-* attributes use kebab-case (data-orig-idx) so dataset API
    // exposes them camelCased (dataset.origIdx). Lower-case in source would
    // silently break: dataset.origIdx → undefined → parseInt → NaN → 0 score.
    $('gq-next').addEventListener('click',function(){state.idx++;render();});
  }

  function selectAnswer(origIdx){
    var q=state.questions[state.idx];
    if(state.answered[state.idx]!==undefined)return;
    state.answered[state.idx]=origIdx;
    var correct=origIdx===q.correctIndex;
    if(correct)state.score++;
    else state.missed.push({q:q.question,correct:q.options[q.correctIndex],chosen:q.options[origIdx],expl:q.explanation||''});

    document.querySelectorAll('.gq-opt').forEach(function(el){
      el.setAttribute('disabled','');
      var oi=parseInt(el.dataset.origIdx,10);
      if(oi===q.correctIndex)el.classList.add('correct');
      else if(oi===origIdx)el.classList.add('wrong');
    });
    if(q.explanation){
      $('gq-expl').innerHTML='<strong>'+(correct?'Correct.':'Not quite.')+'</strong> '+esc(q.explanation);
      $('gq-expl').classList.add('show');
    }
    $('gq-next').removeAttribute('disabled');
    $('gq-scoreText').textContent=state.score+' correct';
  }

  function renderResult(){
    var total=state.questions.length;
    var pct=total>0?state.score/total:0;
    var pass=pct>=PASS_THRESHOLD;
    var pctDisp=Math.round(pct*100);

    if(pass){
      var key='ccna_gloss_'+sub;
      var record={pct:pctDisp,score:state.score,total:total,passedAt:Date.now()};
      // Don't overwrite a real Glossary pass record with a short Check pass.
      try{
        if(!isCheck) localStorage.setItem(key,JSON.stringify(record));
      }catch(e){}
      // Mastery-mode hook: Glossary pass → PROBED, Check pass → PRACTICING.
      try{
        if(window.store&&window.store.getLearningMode&&window.store.getLearningMode()==='mastery'
           &&window.store.promoteMasteryState&&window.store.MASTERY_STATES){
          var target=isCheck?window.store.MASTERY_STATES.PRACTICING:window.store.MASTERY_STATES.PROBED;
          window.store.promoteMasteryState(sub,target);
        }
      }catch(e){console.warn('mastery promote failed:',e);}
    }

    var missedHtml='';
    if(state.missed.length){
      missedHtml='<div class="gq-missed"><h3>Review these</h3>'+state.missed.map(function(m){
        return '<div class="gq-missed-item"><div class="mq">'+esc(m.q)+'</div><div class="ma">✓ '+esc(m.correct)+'</div>'+(m.expl?'<div class="me">'+esc(m.expl)+'</div>':'')+'</div>';
      }).join('')+'</div>';
    }

    $('gq-progressText').textContent='Question '+total+'/'+total;
    $('gq-progressFill').style.width='100%';
    $('gq-scoreText').textContent=state.score+'/'+total;

    $('gq-main').innerHTML=
      '<div class="gq-card gq-result">'+
        '<div class="gq-score '+(pass?'pass':'fail')+'">'+pctDisp+'%</div>'+
        '<div class="gq-verdict">'+(pass?'Skip eligible — '+sub+' mastered.':'Keep studying '+sub+'.')+'</div>'+
        '<div class="gq-verdict-sub">'+
          (pass
            ? 'You scored '+state.score+'/'+total+'. The core.html drawer will now show a Skip Eligible badge on this sub-objective. You can still watch Jeremy\'s videos for reinforcement, but you don\'t have to.'
            : 'You scored '+state.score+'/'+total+'. Watch Jeremy\'s videos for this sub-objective, then come back and retake.')+
        '</div>'+
        '<div class="gq-result-actions">'+
          '<button class="gq-btn" id="gq-retry">Retake</button>'+
          '<a class="gq-btn ghost" href="core.html#obj-'+sub+'">Back to core</a>'+
        '</div>'+
      '</div>'+missedHtml;

    $('gq-retry').addEventListener('click',function(){
      state={questions:shuffle(state.questions).map(function(q){return Object.assign({},q,{_shuf:shuffleIndices(q.options.length)});}),idx:0,score:0,answered:{},missed:[]};
      render();
    });
  }
});
</script>
<script defer src="js/tutor.js"></script>
</body>
</html>
