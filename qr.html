<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>QR — CCNA on phone</title>
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
.wrap{max-width:560px;margin:0 auto;padding:18px 16px 80px}
.title{font-family:var(--font-display);font-weight:700;font-size:1.6rem;text-align:center;margin:6px 0}
.sub{text-align:center;font-family:var(--font-body);font-style:italic;color:var(--ink-muted);font-size:.9rem;margin-bottom:18px}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.tab{padding:8px 12px;border:1.5px solid var(--border);border-radius:100px;background:var(--bg-surface);cursor:pointer;font-family:var(--font-display);font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-secondary)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.qr-box{background:var(--bg-surface);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center}
.qr-box canvas,.qr-box img{display:block;margin:0 auto;background:#fff;padding:14px;border-radius:10px;max-width:100%;height:auto;image-rendering:pixelated}
.qr-url{font-family:var(--font-mono);font-size:.78rem;color:var(--ink-secondary);margin-top:14px;word-break:break-all}
.qr-label{font-family:var(--font-display);font-weight:700;font-size:1.05rem;margin-bottom:8px}
.help{font-family:var(--font-body);text-align:center;color:var(--ink-muted);font-size:.85rem;margin-top:16px;line-height:1.6}
.copy{display:inline-block;margin-top:8px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg-surface);cursor:pointer;font-family:var(--font-display);font-size:.78rem;font-weight:600}
</style>
</head>
<body>
<nav class="top-nav"></nav>
<div class="wrap">
  <div class="title">Phone connect</div>
  <div class="sub">Point phone camera at QR — opens on phone.</div>
  <div class="tabs" id="tabs"></div>
  <div class="qr-box">
    <div class="qr-label" id="lbl"></div>
    <canvas id="canvas" width="280" height="280"></canvas>
    <div class="qr-url" id="urlText"></div>
    <button class="copy" onclick="copyUrl()">Copy URL</button>
  </div>
  <div class="help">Live site. All games work offline once loaded. Add to phone home screen for one-tap access.</div>
</div>
<script defer src="js/store.js"></script>
<script defer src="js/nav.js"></script>
<script defer src="js/tutor.js?v=7.17.9"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>document.addEventListener('DOMContentLoaded',function(){
const BASE='https://rpatino-cw.github.io/CCNA-study/';
const TARGETS=[
  {key:'hub',label:'Practice Hub',path:'practice-hub.html'},
  {key:'swipe',label:'Subnet Swipe',path:'subnet-swipe.html'},
  {key:'wordle',label:'Subnet Wordle',path:'subnet-wordle.html'},
  {key:'merge',label:'Mask Merge',path:'mask-merge.html'},
  {key:'osi',label:'OSI Tetris',path:'osi-tetris.html'},
  {key:'frog',label:'Packet Frogger',path:'packet-frogger.html'},
  {key:'cable',label:'Cable Connect',path:'cable-connect.html'},
  {key:'core',label:'Main Site',path:'core.html'}
];
const tabs=document.getElementById('tabs');
TARGETS.forEach((t,i)=>{
  const b=document.createElement('button');b.className='tab'+(i===0?' active':'');b.textContent=t.label;
  b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');render(t)};
  tabs.appendChild(b);
});
function render(t){
  const url=BASE+t.path;
  document.getElementById('lbl').textContent=t.label;
  document.getElementById('urlText').textContent=url;
  window._curUrl=url;
  QRCode.toCanvas(document.getElementById('canvas'),url,{width:280,margin:2,errorCorrectionLevel:'M'});
}
window.copyUrl=function(){navigator.clipboard.writeText(window._curUrl).then(()=>{event.target.textContent='Copied ✓';setTimeout(()=>event.target.textContent='Copy URL',1200)})}
render(TARGETS[0]);
});</script>
</body>
</html>
