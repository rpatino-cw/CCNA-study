<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Subnet Swipe — CCNA</title>
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<link rel="stylesheet" href="css/mobile-game.css?v=1">
<style>
.game-wrap{max-width:480px;margin:0 auto;padding:14px 14px 120px;min-height:100vh;display:flex;flex-direction:column}
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-family:var(--font-mono);font-size:.78rem}
.hud .stat{display:flex;flex-direction:column;align-items:center}
.hud .stat .v{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--accent)}
.hud .stat .l{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted)}
.deck{position:relative;flex:1;min-height:360px;display:flex;align-items:center;justify-content:center;margin:8px 0}
.card{position:absolute;width:100%;max-width:360px;background:var(--bg-surface);border:1px solid var(--border);border-radius:18px;padding:22px 18px;box-shadow:0 6px 18px rgba(0,0,0,.06);user-select:none;touch-action:pan-y;transition:transform .25s var(--ease-out),opacity .25s}
.card .net{font-family:var(--font-mono);font-size:1rem;color:var(--ink-secondary);margin-bottom:14px;text-align:center}
.card .ip{font-family:var(--font-display);font-size:2.4rem;font-weight:700;text-align:center;letter-spacing:.01em;color:var(--ink);margin:8px 0}
.card .q{font-family:var(--font-body);font-style:italic;text-align:center;color:var(--ink-secondary);font-size:.95rem;margin-top:18px}
.card.swipe-l{transform:translateX(-130%) rotate(-12deg);opacity:0}
.card.swipe-r{transform:translateX(130%) rotate(12deg);opacity:0}
.card .tag{position:absolute;top:18px;font-family:var(--font-display);font-size:1.4rem;font-weight:700;letter-spacing:.05em;padding:6px 14px;border-radius:8px;border:3px solid;opacity:0;transition:opacity .15s}
.card .tag.no{left:18px;color:#b91c1c;border-color:#b91c1c;transform:rotate(-10deg)}
.card .tag.yes{right:18px;color:#15803d;border-color:#15803d;transform:rotate(10deg)}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.btns button{padding:18px;border-radius:14px;border:2px solid;font-family:var(--font-display);font-size:1.05rem;font-weight:700;cursor:pointer;background:var(--bg-surface);transition:transform .12s}
.btns button:active{transform:scale(.96)}
.btns .no{color:#b91c1c;border-color:#b91c1c}
.btns .yes{color:#15803d;border-color:#15803d}
.feedback{text-align:center;margin-top:12px;font-family:var(--font-mono);font-size:.82rem;min-height:20px;color:var(--ink-muted)}
.feedback.right{color:#15803d}
.feedback.wrong{color:#b91c1c}
.over{text-align:center;padding:30px 16px}
.over h2{font-family:var(--font-display);font-size:1.6rem;margin-bottom:8px}
.over .score{font-family:var(--font-mono);font-size:2.2rem;color:var(--accent);font-weight:700;margin:14px 0}
.over button{padding:14px 28px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-family:var(--font-display);font-weight:700;font-size:1rem;cursor:pointer}
.title{font-family:var(--font-display);font-weight:700;font-size:1.3rem;text-align:center;margin:6px 0}
.sub{text-align:center;font-family:var(--font-body);font-style:italic;color:var(--ink-muted);font-size:.85rem;margin-bottom:8px}
</style>
</head>
<body>
<nav class="top-nav"></nav>
<div class="game-wrap">
  <div class="title">Subnet Swipe</div>
  <div class="sub">Tap or swipe — is the IP a valid host?</div>
  <div class="hud">
    <div class="stat"><div class="v" id="streak">0</div><div class="l">Streak</div></div>
    <div class="stat"><div class="v" id="best">0</div><div class="l">Best</div></div>
    <div class="stat"><div class="v" id="round">1/20</div><div class="l">Round</div></div>
  </div>
  <div class="deck" id="deck"></div>
  <div class="feedback" id="fb">&nbsp;</div>
  <div class="btns">
    <button class="no" onclick="answer(false)">✗ Invalid</button>
    <button class="yes" onclick="answer(true)">✓ Valid</button>
  </div>
</div>
<script defer src="js/store.js"></script>
<script defer src="js/nav.js"></script>
<script defer src="js/tutor.js?v=7.17.7"></script>
<script defer src="js/mobile-lights.js?v=1"></script>
<script>document.addEventListener('DOMContentLoaded',function(){
const KEY='ccna_swipe_v1';
const ROUNDS=20;
let state=JSON.parse(localStorage.getItem(KEY)||'{}');
state.best=state.best||0;
let streak=0,round=0,current=null;

function ipToInt(ip){return ip.split('.').reduce((a,o)=>a*256+parseInt(o),0)}
function intToIp(n){return [n>>>24&255,n>>>16&255,n>>>8&255,n&255].join('.')}
function genCase(){
  const prefix=8+Math.floor(Math.random()*22); // /8 to /29
  const hostBits=32-prefix;
  const mask=hostBits===32?0:(0xFFFFFFFF<<hostBits)>>>0;
  const netBase=Math.floor(Math.random()*0xFFFFFFFF)>>>0;
  const network=(netBase&mask)>>>0;
  const broadcast=(network|(0xFFFFFFFF>>>prefix))>>>0;
  const types=['host','network','broadcast','wrong-subnet'];
  const t=types[Math.floor(Math.random()*types.length)];
  let testIp,valid;
  if(prefix>=31){
    // /31 /32 edge — skip, regen
    return genCase();
  }
  if(t==='network'){testIp=intToIp(network);valid=false}
  else if(t==='broadcast'){testIp=intToIp(broadcast);valid=false}
  else if(t==='wrong-subnet'){
    const off=(Math.floor(Math.random()*0xFFFFFF)+broadcast+1)>>>0;
    testIp=intToIp(off);valid=false;
  }else{
    const range=broadcast-network-1;
    if(range<=0)return genCase();
    const offset=1+Math.floor(Math.random()*range);
    testIp=intToIp((network+offset)>>>0);valid=true;
  }
  return {network:intToIp(network)+'/'+prefix,ip:testIp,valid:valid};
}

function render(){
  const deck=document.getElementById('deck');
  deck.innerHTML='';
  const c=document.createElement('div');
  c.className='card';
  c.innerHTML='<div class="tag no" id="tagNo">INVALID</div><div class="tag yes" id="tagYes">VALID</div>'+
    '<div class="net">network <strong>'+current.network+'</strong></div>'+
    '<div class="ip">'+current.ip+'</div>'+
    '<div class="q">Usable host on this network?</div>';
  deck.appendChild(c);
  // touch swipe
  let sx=null,curDx=0;
  c.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;curDx=0},{passive:true});
  c.addEventListener('touchmove',e=>{
    if(sx===null)return;
    curDx=e.touches[0].clientX-sx;
    if(Math.abs(curDx)>10)e.preventDefault();
    c.style.transform='translateX('+curDx+'px) rotate('+(curDx/20)+'deg)';
    document.getElementById('tagYes').style.opacity=Math.max(0,Math.min(1,curDx/80));
    document.getElementById('tagNo').style.opacity=Math.max(0,Math.min(1,-curDx/80));
  },{passive:false});
  c.addEventListener('touchend',()=>{
    if(curDx>80)answer(true);
    else if(curDx<-80)answer(false);
    else{c.style.transform='';document.getElementById('tagYes').style.opacity=0;document.getElementById('tagNo').style.opacity=0}
    sx=null;curDx=0;
  });
  document.getElementById('round').textContent=(round+1)+'/'+ROUNDS;
  document.getElementById('streak').textContent=streak;
  document.getElementById('best').textContent=state.best;
}

function next(){
  if(round>=ROUNDS){return finish()}
  current=genCase();
  render();
}

function buzz(ms){if(navigator.vibrate)try{navigator.vibrate(ms)}catch(e){}}
window.answer=function(yes){
  const card=document.querySelector('.card');if(!card)return;
  const correct=yes===current.valid;
  const fb=document.getElementById('fb');
  if(correct){streak++;buzz(15);fb.textContent='✓ Correct — streak '+streak;fb.className='feedback right'}
  else{buzz([40,30,40]);fb.textContent='✗ '+(current.valid?'Was valid host':'Was '+(current.ip===current.network.split('/')[0]?'network address':'outside subnet/edge'));fb.className='feedback wrong';streak=0}
  state.best=Math.max(state.best||0,streak);
  localStorage.setItem(KEY,JSON.stringify(state));
  card.classList.add(yes?'swipe-r':'swipe-l');
  round++;
  setTimeout(next,260);
}

function finish(){
  const wrap=document.querySelector('.game-wrap');
  wrap.innerHTML='<div class="over"><h2>Round done</h2><div class="score">Best streak: '+state.best+'</div><button onclick="location.reload()">Play again</button><div style="margin-top:18px"><a href="practice-hub.html" style="color:var(--accent);font-family:var(--font-display);text-decoration:none">← Practice Hub</a></div></div>';
}

next();
});</script>
</body>
</html>
