<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Subnet Wordle — CCNA</title>
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<link rel="stylesheet" href="css/mobile-game.css?v=1">
<style>
.game-wrap{max-width:480px;margin:0 auto;padding:14px 14px 80px}
.title{font-family:var(--font-display);font-weight:700;font-size:1.3rem;text-align:center;margin:6px 0}
.sub{text-align:center;font-family:var(--font-body);font-style:italic;color:var(--ink-muted);font-size:.85rem;margin-bottom:10px}
.clue{background:var(--bg-surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;font-family:var(--font-mono);font-size:.9rem;text-align:center}
.clue strong{color:var(--accent);font-size:1.05rem}
.grid{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cell{aspect-ratio:1;border:2px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:1.3rem;background:var(--bg-surface);color:var(--ink);transition:background .25s,border-color .25s,color .25s}
.cell.green{background:#15803d;color:#fff;border-color:#15803d}
.cell.yellow{background:#d97706;color:#fff;border-color:#d97706}
.cell.gray{background:#57534E;color:#fff;border-color:#57534E}
.cell.active{border-color:var(--accent)}
.input-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.input-row input{padding:14px;text-align:center;font-family:var(--font-display);font-size:1.2rem;font-weight:700;border:2px solid var(--border);border-radius:10px;background:var(--bg-input);color:var(--ink);outline:none}
.input-row input:focus{border-color:var(--accent)}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btns button{padding:14px;border-radius:12px;border:2px solid var(--border);background:var(--bg-surface);font-family:var(--font-display);font-weight:700;font-size:1rem;cursor:pointer}
.btns .go{background:var(--accent);color:#fff;border-color:var(--accent)}
.fb{text-align:center;font-family:var(--font-mono);font-size:.85rem;margin:10px 0;min-height:18px}
.legend{display:flex;justify-content:center;gap:10px;margin-top:8px;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted)}
.legend span{display:inline-flex;align-items:center;gap:4px}
.legend i{display:inline-block;width:12px;height:12px;border-radius:3px}
.over{text-align:center;padding:24px}
.over h2{font-family:var(--font-display);font-size:1.5rem}
.over .ans{font-family:var(--font-mono);font-size:1.4rem;color:var(--accent);font-weight:700;margin:14px 0}
</style>
</head>
<body>
<nav class="top-nav"></nav>
<div class="game-wrap">
  <div class="title">Subnet Mask Wordle</div>
  <div class="sub">Guess the 4-octet subnet mask. 6 tries.</div>
  <div class="clue" id="clue"></div>
  <div class="grid" id="grid"></div>
  <div class="input-row" id="inputs">
    <input type="text" inputmode="numeric" pattern="\d*" maxlength="3" autocomplete="off" data-i="0">
    <input type="text" inputmode="numeric" pattern="\d*" maxlength="3" autocomplete="off" data-i="1">
    <input type="text" inputmode="numeric" pattern="\d*" maxlength="3" autocomplete="off" data-i="2">
    <input type="text" inputmode="numeric" pattern="\d*" maxlength="3" autocomplete="off" data-i="3">
  </div>
  <div class="fb" id="fb">&nbsp;</div>
  <div class="btns">
    <button onclick="reset()">New puzzle</button>
    <button class="go" onclick="submit()">Submit</button>
  </div>
  <div class="legend">
    <span><i style="background:#15803d"></i>exact</span>
    <span><i style="background:#d97706"></i>octet exists</span>
    <span><i style="background:#57534E"></i>not in mask</span>
  </div>
</div>
<script defer src="js/store.js"></script>
<script defer src="js/nav.js"></script>
<script defer src="js/tutor.js?v=7.17.9"></script>
<script defer src="js/mobile-lights.js?v=1"></script>
<script>document.addEventListener('DOMContentLoaded',function(){
const VALID_OCTETS=[0,128,192,224,240,248,252,254,255];
const MAX_TRIES=6;
let target=[],guesses=[],currentRow=0,done=false;

function pickPrefix(){
  // /8 to /30
  const p=8+Math.floor(Math.random()*23);
  return p;
}
function prefixToMask(p){
  const m=[0,0,0,0];
  for(let i=0;i<p;i++)m[Math.floor(i/8)]|=1<<(7-(i%8));
  return m;
}
function hostsForPrefix(p){const h=32-p;return h<=1?0:Math.pow(2,h)-2}

function setClue(){
  const p=guesses.length===0?pickPrefix():null;
  if(p!==null){
    target=prefixToMask(p);
    window._targetPrefix=p;
  }
  const hosts=hostsForPrefix(window._targetPrefix);
  document.getElementById('clue').innerHTML='Mask gives <strong>'+hosts.toLocaleString()+'</strong> usable hosts (prefix /'+window._targetPrefix+')';
}

function renderGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<MAX_TRIES;r++){
    const row=document.createElement('div');row.className='row';
    for(let c=0;c<4;c++){
      const cell=document.createElement('div');cell.className='cell';
      if(guesses[r]){
        cell.textContent=guesses[r].vals[c];
        cell.classList.add(guesses[r].colors[c]);
      }
      row.appendChild(cell);
    }
    g.appendChild(row);
  }
}

function colorize(guess){
  const colors=['gray','gray','gray','gray'];
  const tCopy=target.slice();
  for(let i=0;i<4;i++){if(guess[i]===target[i]){colors[i]='green';tCopy[i]=-1}}
  for(let i=0;i<4;i++){
    if(colors[i]==='green')continue;
    const idx=tCopy.indexOf(guess[i]);
    if(idx>=0){colors[i]='yellow';tCopy[idx]=-1}
  }
  return colors;
}

function buzz(ms){if(navigator.vibrate)try{navigator.vibrate(ms)}catch(e){}}
window.submit=function(){
  if(done)return;
  const inputs=document.querySelectorAll('#inputs input');
  const vals=[];for(const inp of inputs){const v=parseInt(inp.value,10);if(isNaN(v)){document.getElementById('fb').textContent='Fill all 4 octets';buzz(20);return}vals.push(v)}
  if(!vals.every(v=>VALID_OCTETS.includes(v))){document.getElementById('fb').textContent='Invalid mask octet — must be 0,128,192,224,240,248,252,254,255';buzz([30,20,30]);return}
  const colors=colorize(vals);
  guesses.push({vals:vals,colors:colors});
  inputs.forEach(i=>i.value='');
  inputs[0].focus();
  renderGrid();
  if(colors.every(c=>c==='green')){done=true;buzz([20,40,80]);showOver(true);return}
  buzz(10);
  if(guesses.length>=MAX_TRIES){done=true;buzz([60,40,60]);showOver(false)}
}

function showOver(won){
  document.querySelector('.btns').innerHTML='<button onclick="reset()">New puzzle</button>';
  document.getElementById('inputs').style.display='none';
  document.getElementById('fb').innerHTML=won?'<span style="color:#15803d;font-weight:700">Solved in '+guesses.length+'!</span>':'<span style="color:#b91c1c;font-weight:700">Out of tries — answer: '+target.join('.')+' (/'+window._targetPrefix+')</span>';
}

window.reset=function(){
  guesses=[];currentRow=0;done=false;
  document.getElementById('inputs').style.display='';
  document.querySelector('.btns').innerHTML='<button onclick="reset()">New puzzle</button><button class="go" onclick="submit()">Submit</button>';
  document.getElementById('fb').innerHTML='&nbsp;';
  document.querySelectorAll('#inputs input').forEach(i=>i.value='');
  setClue();renderGrid();
}

document.querySelectorAll('#inputs input').forEach((inp,i,arr)=>{
  inp.addEventListener('input',e=>{if(e.target.value.length>=3&&i<3)arr[i+1].focus()});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});
});

setClue();renderGrid();
});</script>
</body>
</html>
