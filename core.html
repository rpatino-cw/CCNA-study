<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>CORE — CCNA 200-301 Study System</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/mastery-tracker.css">
<style>
  #guidePill{display:none!important}

  /* ── Network background — subtle topology pattern ───────── */
  body::before{
    content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
    opacity:.025;
    background:
      /* nodes — dots at grid intersections */
      radial-gradient(circle 1.5px,var(--ink) 1px,transparent 1.5px) 0 0 / 52px 52px,
      radial-gradient(circle 1px,var(--ink) .8px,transparent 1px) 26px 26px / 52px 52px,
      /* diagonal links — connection lines */
      repeating-linear-gradient(45deg,transparent,transparent 72px,var(--ink) 72px,var(--ink) 72.6px),
      repeating-linear-gradient(-45deg,transparent,transparent 96px,var(--ink) 96px,var(--ink) 96.6px),
      /* horizontal data line */
      repeating-linear-gradient(90deg,transparent,transparent 130px,var(--ink) 130px,var(--ink) 130.5px);
    animation:netDrift 80s linear infinite;
  }
  @keyframes netDrift{to{background-position:52px 52px,78px 78px,72.6px 0,-96.6px 0,130.5px 0}}
  @media(prefers-reduced-motion:reduce){body::before{animation:none}}

  /* ── Header — quiet, confident ──────────────────────────── */
  .container-wide{max-width:900px;padding:0 var(--s-xl);position:relative}
  .core-header{padding:var(--s-xl) 0 var(--s-md);margin-bottom:var(--s-md);text-align:center}
  .core-title{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;line-height:1;color:var(--ink)}
  .core-meta{display:flex;justify-content:center;gap:var(--s-lg);font-family:var(--font-display);font-size:.72rem;color:var(--ink-muted);letter-spacing:.06em;text-transform:uppercase;margin-top:12px;flex-wrap:wrap}
  .core-meta .countdown{color:var(--accent);font-weight:600}
  .core-meta .progress-stat{color:var(--ink-secondary);font-weight:500}

  /* ── Guide banner — whisper, not shout ──────────────────── */
  .guide-banner{text-align:center;padding:12px 0;margin-bottom:0;font-family:var(--font-body);font-size:.82rem;color:var(--ink-muted);display:flex;justify-content:center;align-items:center;gap:4px}
  .guide-banner a{color:var(--accent);font-weight:600;text-decoration:none}
  .guide-banner a:hover{text-decoration:underline}
  .guide-banner .dismiss{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:.8rem;padding:0 6px;margin-left:8px}
  .guide-banner .dismiss:hover{color:var(--ink-muted)}

  /* ── Next-up bar ────────────────────────────────────────── */
  .next-bar{display:flex;justify-content:center;align-items:center;gap:var(--s-md);padding:12px 0;margin-bottom:0;font-family:var(--font-display);font-size:.82rem}
  .next-bar .nb-label{color:var(--ink-muted);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;flex-shrink:0}
  .next-bar .nb-topic{color:var(--ink);font-weight:600}
  .next-bar .nb-pct{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted)}
  .next-bar .nb-btn{font-size:.72rem;font-weight:700;color:var(--accent);background:none;padding:0;border:none;cursor:pointer;flex-shrink:0;text-decoration:none}
  .next-bar .nb-btn:hover{text-decoration:underline}

  /* ── Domain section — compact, grouped ────────────────── */
  .domain-section{margin-bottom:0;padding:0;scroll-margin-top:80px;contain:layout style;content-visibility:auto;contain-intrinsic-size:auto 600px}
  .ds-head{display:flex;align-items:baseline;justify-content:space-between;padding:14px 0;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
  .ds-title{font-family:var(--font-display);font-size:.88rem;font-weight:700;letter-spacing:.01em}
  .ds-meta{display:flex;align-items:baseline;gap:10px;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted)}
  .ds-pct{font-weight:600}
  .ds-weight{color:var(--ink-faint);font-weight:400}
  .ds-toggle{font-size:.75rem;color:var(--ink-faint);transition:transform .3s var(--ease-out)}
  .ds-toggle.open{transform:rotate(180deg)}
  .ds-body{display:none;padding:4px 0 20px}
  .ds-body.open{display:block}

  /* ── Objective rows — the backbone ──────────────────────── */
  .obj-card{margin:0;overflow:hidden;contain:layout style;border-radius:var(--radius);transition:background .2s}
  .obj-card+.obj-card{margin-top:2px}
  .obj-card:hover{background:var(--bg-hover)}
  .obj-card.mastered{opacity:.45}
  .obj-card.mastered:hover{opacity:.75}
  .obj-head{display:flex;align-items:center;gap:14px;padding:11px 14px;cursor:pointer}
  .obj-id{font-family:var(--font-mono);font-size:.72rem;font-weight:500;color:var(--ink-faint);min-width:36px}
  .obj-name{font-family:var(--font-display);font-size:.88rem;font-weight:500;flex:1;color:var(--ink-secondary)}
  .obj-card:hover .obj-name{color:var(--ink)}
  .obj-prof{width:56px;display:flex;align-items:center;gap:6px}
  .obj-bar{flex:1;height:2px;background:var(--bg-recessed);border-radius:1px;overflow:hidden}
  .obj-fill{height:100%;border-radius:1px;width:100%;transform-origin:left;transition:transform .4s var(--ease-out)}
  .obj-pct{font-family:var(--font-mono);font-size:.65rem;font-weight:400;min-width:28px;text-align:right;color:var(--ink-faint)}

  /* ── Expanded body ──────────────────────────────────────── */
  .obj-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .4s var(--ease-out)}
  .obj-body.open{grid-template-rows:1fr}
  .obj-body-inner{overflow:hidden;min-height:0;padding:0 14px 0 64px}
  .obj-body.open .obj-body-inner{padding:4px 14px 24px 64px}

  /* ── Subtopics ──────────────────────────────────────────── */
  .obj-subs{font-family:var(--font-body);font-size:.85rem;color:var(--ink-muted);line-height:1.75;margin-bottom:16px;padding-left:16px}
  .obj-subs li{margin-bottom:4px}

  /* ── Resources ──────────────────────────────────────────── */
  .res-section{margin-bottom:8px}
  .res-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.82rem}
  .res-row a{color:var(--ink-muted);text-decoration:none;font-family:var(--font-body)}
  .res-row a:hover{color:var(--accent)}
  .res-tag{font-family:var(--font-mono);font-size:.55rem;padding:1px 5px;border-radius:2px;font-weight:500;flex-shrink:0;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em}
  .res-more{font-family:var(--font-display);font-size:.72rem;color:var(--ink-faint);cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px;background:none;border:none}
  .res-more:hover{color:var(--ink-muted)}
  .res-extra{display:none}
  .res-extra.open{display:block}
  .study-day-row{padding:4px 0;font-family:var(--font-display);font-size:.78rem;color:var(--ink-muted);font-weight:500}
  .study-day-row a{color:var(--accent);text-decoration:none;font-weight:600}
  .study-day-row a:hover{text-decoration:underline}

  /* ── Shortcuts ──────────────────────────────────────────── */
  .obj-shortcuts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .obj-sc{font-family:var(--font-display);font-size:.72rem;padding:4px 10px;background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--ink-muted);text-decoration:none;transition:all .15s}
  .obj-sc:hover{border-color:var(--accent);color:var(--accent)}

  .mark-btn{font-family:var(--font-display);font-size:.72rem;padding:5px 12px;background:none;border:1px solid var(--border);color:var(--ink-muted);border-radius:var(--radius);cursor:pointer;margin-top:8px;transition:all .15s}
  .mark-btn:hover{border-color:var(--prof-strong);color:var(--prof-strong)}
  .mark-btn.done{background:var(--prof-strong);border-color:var(--prof-strong);color:#fff}

  /* ── Quiz badge ─────────────────────────────────────────── */
  .quiz-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:var(--radius);font-family:var(--font-display);font-size:.65rem;font-weight:500;text-decoration:none;margin-bottom:12px;color:var(--ink-faint)}
  .quiz-badge.unlocked{background:var(--ink);color:var(--bg);font-weight:600}
  .quiz-badge.unlocked:hover{opacity:.85}
  .quiz-badge.locked{font-weight:400}

  /* ── Quick Path ─────────────────────────────────────────── */
  .quick-path{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:14px}
  .qp-label{font-family:var(--font-display);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);font-weight:600;margin-bottom:10px}
  .qp-steps{display:flex;flex-direction:column;gap:8px}
  .qp-step{display:flex;align-items:center;gap:10px;font-family:var(--font-body);font-size:.82rem;color:var(--ink-secondary)}
  .qp-num{font-family:var(--font-mono);font-size:.58rem;font-weight:600;color:var(--ink-muted);background:var(--bg-recessed);width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .qp-step a{color:var(--ink);font-weight:600;text-decoration:none}
  .qp-step a:hover{color:var(--accent)}

  html{scroll-behavior:smooth}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0s!important;transition-duration:0s!important}}
  @media(max-width:640px){.obj-prof{width:44px}.obj-name{font-size:.82rem}.core-title{font-size:1.3rem}.obj-head{padding:10px 10px}.obj-body.open .obj-body-inner{padding-left:10px}}
  @media print{.guide-banner,.next-bar,.beta-badge,nav.top-nav,.ds-toggle{display:none!important}.ds-body,.obj-body{display:block!important}.obj-card{break-inside:avoid}body{font-size:10pt}}
</style>
</head>
<body>
<div class="container-wide">
  <nav class="top-nav" id="main-nav"></nav>

  <header class="core-header">
    <h1 class="core-title">CCNA 200-301</h1>
    <div class="core-meta">
      <span>Study Dashboard</span>
      <span id="progressStat" class="progress-stat"></span>
      <span id="examTarget" style="cursor:pointer;border-bottom:1px dashed var(--ink-muted)" onclick="document.getElementById('examDatePicker').showPicker()">Exam target: set date</span>
      <input type="date" id="examDatePicker" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;">
      <span class="countdown" id="countdown"></span>
    </div>
  </header>

  <div id="statusBar"></div>
  <div id="domainSections"></div>
</div>

<script defer src="data/topics-data.js"></script>
<script defer src="data/study-content.js"></script>
<script defer src="data/resources-data.js"></script>
<script defer src="js/store.js"></script>
<script>window.masteryConfig={labKey:'ccna_minilab_scores',quizBase:'quiz.html?learn=',labBase:'mini-lab.html?topic=',accent:'var(--accent)'};</script>
<script defer src="js/mastery-tracker.js"></script>
<script defer src="js/sync.js"></script>
<script defer src="js/nav.js"></script>
<script>document.addEventListener('DOMContentLoaded',function(){
// ═══════════════════════════════════════════════════════════════
// RESOURCE MAPPING — loaded from data/resources-data.js
// ═══════════════════════════════════════════════════════════════
const RES = window.topicResources || {};

const DOMAIN_COLORS=['','#2563EB','#16A34A','#D97706','#7C3AED','#DC2626','#0891B2'];
// labScores now in js/mastery-tracker.js (window.mtLabScores)
const DOMAIN_NAMES=['','Network Fundamentals','Network Access','IP Connectivity','IP Services','Security Fundamentals','Automation & Programmability'];

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function profColor(v){return v>=.7?'var(--prof-strong)':v>=.4?'var(--prof-mid)':v>0?'var(--prof-weak)':'var(--ink-faint)';}

function buildQuickPath(t,prof){
  var p=Math.round((prof[t.id]||0)*100);
  return window.buildMasteryTracker(t.id, p);
}

const NP_SET=new Set(['1.1','1.2','1.3','1.4','1.5','1.6','1.7','1.8','1.9','1.10','1.11','1.12','1.13','2.1','2.2','2.5','2.6','2.7','2.8','3.1','3.2','3.3','3.5','4.2','4.3','4.4','4.5','4.6','4.7','4.8','4.9','5.1','5.2','5.3','5.4','5.5','5.6','5.7','5.8','5.9']);

window.render=function(){
  store.initProficiency(window.topicsData);
  const prof=store.getAllProficiency();
  const mastered=JSON.parse(localStorage.getItem('ccna_core_mastered')||'{}');
  const domains=window.topicsData.domains;
  const isNetPlus=localStorage.getItem('ccna_cert_track')==='net+';

  // Auto-master objectives at 70%+ proficiency AND mini lab passed (70%+)
  let masteredChanged=false;
  domains.forEach(d=>d.topics.forEach(t=>{
    if(window.isMtMastered(t.id,prof[t.id]||0)&&!mastered[t.id]){mastered[t.id]=true;masteredChanged=true;}
  }));
  if(masteredChanged)localStorage.setItem('ccna_core_mastered',JSON.stringify(mastered));

  // Stats
  let totalMastered=0,totalTopics=0;
  domains.forEach(d=>d.topics.forEach(t=>{
    if(isNetPlus&&!NP_SET.has(t.id))return;
    totalTopics++;if(mastered[t.id])totalMastered++;
  }));

  // Progress stat in header
  document.getElementById('progressStat').textContent=totalMastered+'/'+totalTopics+' mastered';

  // Status bar — guide banner for new users, next-up bar for returning
  var hasAnyProf=Object.keys(prof).some(function(k){return prof[k]>0;});
  var statusEl=document.getElementById('statusBar');
  var guideDismissed=localStorage.getItem('ccna_guide_dismissed');

  if(!hasAnyProf&&!guideDismissed){
    statusEl.innerHTML='<div class="guide-banner">New here? The <a href="guide.html">study guide</a> walks you through objectives, quizzes, flashcards, and labs.<button class="dismiss" onclick="localStorage.setItem(\'ccna_guide_dismissed\',\'1\');this.parentElement.remove()">\u00d7</button></div>';
  } else if(hasAnyProf){
    var lowestObj=null,lowestProf=Infinity,lowestDomainId='';
    domains.forEach(function(d){d.topics.forEach(function(t){
      if(isNetPlus&&!NP_SET.has(t.id))return;
      if(!mastered[t.id]&&(prof[t.id]||0)<lowestProf){lowestProf=prof[t.id]||0;lowestObj=t;lowestDomainId=d.id;}
    });});
    if(lowestObj){
      var pct=Math.round(lowestProf*100);
      statusEl.innerHTML='<div class="next-bar"><span class="nb-label">Next</span><span class="nb-topic">'+lowestObj.id+' '+esc(lowestObj.name)+'</span><span class="nb-pct">'+pct+'%</span><button class="nb-btn" onclick="openAndScroll(\''+lowestObj.id+'\',\''+lowestDomainId+'\')">Study</button></div>';
    } else {
      statusEl.innerHTML='<div class="next-bar"><span class="nb-label">Done</span><span class="nb-topic">All objectives mastered</span><a href="exam-details.html" class="nb-btn">Book Exam</a></div>';
    }
  } else {
    statusEl.innerHTML='';
  }

  // Domain sections
  document.getElementById('domainSections').innerHTML=domains.map(d=>{
    let sum=0;d.topics.forEach(t=>sum+=(prof[t.id]||0));
    const avg=Math.round(sum/d.topics.length*100);
    const color=DOMAIN_COLORS[d.id];

    const topicsHtml=d.topics.map(t=>{try{
      const p=Math.round((prof[t.id]||0)*100);
      const r=RES[t.id]||{};
      const isMastered=!!mastered[t.id];
      const isCCNAOnly=isNetPlus&&!NP_SET.has(t.id);
      const subs=t.subtopics?'<ul class="obj-subs">'+t.subtopics.map(s=>'<li>'+esc(typeof s==='object'?s.name:s)+'</li>').join('')+'</ul>':'';

      // Deep-linked site shortcuts (quiz, domain quiz). Extra resources
      // (BOOK/READ/LAB/DRILL/CISCO) live on quiz.html now — see quiz lesson viewer.
      let siteHtml='<div class="obj-shortcuts">';
      if(r.site&&r.site.length>0)r.site.forEach(function(s){siteHtml+='<a class="obj-sc" href="'+s.h+'">'+esc(s.t)+'</a>';});
      // Always include a direct link to the topic in Study & Quiz
      siteHtml+='<a class="obj-sc" href="quiz.html?learn='+t.id+'">Study &amp; Quiz '+t.id+'</a>';
      siteHtml+='</div>';

      if(isCCNAOnly)return'<div class="obj-card" id="obj-'+t.id+'" style="opacity:.3;pointer-events:none"><div class="obj-head"><span class="obj-id" style="color:var(--ink-muted)">'+t.id+'</span><span class="obj-name" style="color:var(--ink-muted)">'+esc(t.name)+'</span><span style="font-family:var(--font-mono);font-size:.6rem;color:var(--ink-muted);margin-left:auto">CCNA ONLY</span></div></div>';

      return'<div class="obj-card'+(isMastered?' mastered':'')+'" id="obj-'+t.id+'">'+
        '<div class="obj-head" onclick="toggleObj(\''+t.id+'\')">'+
          '<span class="obj-id">'+t.id+'</span>'+
          '<span class="obj-name">'+esc(t.name)+'</span>'+
          '<div class="obj-prof"><div class="obj-bar"><div class="obj-fill" style="transform:scaleX('+(p/100)+');background:'+profColor(p/100)+'"></div></div><span class="obj-pct" style="color:'+profColor(p/100)+'">'+p+'%</span></div>'+
        '</div>'+
        '<div class="obj-body" id="objbody-'+t.id+'"><div class="obj-body-inner">'+
          subs+
          buildQuickPath(t,prof)+
          '<div class="res-section">'+siteHtml+'</div>'+
        '</div></div></div>';
    }catch(e){return'<div class="obj-card" style="padding:10px;color:var(--prof-weak);font-size:.78rem">Error rendering '+t.id+': '+e.message+'</div>';}
    }).join('');

    const at70=d.topics.filter(t=>(prof[t.id]||0)>=0.7).length;
    const allMastered=d.topics.every(t=>mastered[t.id]);
    const quizUnlocked=allMastered||avg>=70;
    const quizBadge=quizUnlocked?
      '<a href="exam-sim.html" class="quiz-badge unlocked">Domain '+d.id+' Final Quiz</a>':
      '<div class="quiz-badge locked">Domain '+d.id+' Final Quiz — '+at70+'/'+d.topics.length+' at 70%+</div>';

    // Auto-open weakest domain so user sees content immediately
    return'<div class="domain-section" id="domain-'+d.id+'">'+
      '<div class="ds-head" onclick="toggleDomain(\''+d.id+'\')">'+
        '<div class="ds-title">'+d.name+'</div>'+
        '<div class="ds-meta"><span class="ds-weight">'+d.weight+'%</span><span class="ds-pct">'+avg+'%</span><span class="ds-toggle" id="dtoggle-'+d.id+'">&#9662;</span></div>'+
      '</div>'+
      '<div class="ds-body" id="dbody-'+d.id+'">'+quizBadge+topicsHtml+'</div></div>';
  }).join('');

  // Auto-expand handled inline via class attribute in HTML above
};

window.toggleDomain=function(id){
  const body=document.getElementById('dbody-'+id);
  const toggle=document.getElementById('dtoggle-'+id);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
};

window.openAndScroll=function(objId, domainId) {
  // Open the domain section
  var dbody = document.getElementById('dbody-' + domainId);
  if (dbody) dbody.classList.add('open');
  // Open the objective body
  var obody = document.getElementById('objbody-' + objId);
  if (obody) obody.classList.add('open');
  // Scroll to the objective
  var el = document.getElementById('obj-' + objId);
  if (el) setTimeout(function(){ el.scrollIntoView({behavior:'smooth',block:'center'}); }, 100);
};

window.toggleObj=function(id){
  document.getElementById('objbody-'+id).classList.toggle('open');
};

window.toggleMastered=function(id){
  const m=JSON.parse(localStorage.getItem('ccna_core_mastered')||'{}');
  if(m[id])delete m[id];else{m[id]=true;store.updateProficiency(id,true);}
  localStorage.setItem('ccna_core_mastered',JSON.stringify(m));
  render();
};

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

render();

// ── Exam date picker + countdown ─────────────────────────────────
(function(){
  var picker=document.getElementById('examDatePicker');
  var targetEl=document.getElementById('examTarget');
  var countdownEl=document.getElementById('countdown');
  var saved=localStorage.getItem('ccna_exam_date');
  if(saved) picker.value=saved;
  function update(){
    if(!saved&&!picker.value){targetEl.textContent='Set exam date';countdownEl.textContent='';return;}
    var val=saved||picker.value;
    var d=new Date(val+'T00:00:00');
    if(isNaN(d.getTime()))return;
    targetEl.textContent='Exam: '+d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    var diff=Math.round((d-new Date(new Date().toDateString()))/86400000);
    countdownEl.textContent=diff>0?diff+' days remaining':diff===0?'Exam day':'Exam passed';
  }
  picker.addEventListener('change',function(){
    saved=this.value;
    localStorage.setItem('ccna_exam_date',saved);
    update();
  });
  update();
})();

});</script>
<script defer src="js/tutor.js"></script>
</body>
</html>
