<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE — CCNA 200-301 Study System</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<style>
  .core-header{padding:var(--s-xl) 0 var(--s-lg);border-bottom:2px solid var(--ink);margin-bottom:var(--s-lg)}
  .core-title{font-size:3rem;font-weight:900;letter-spacing:-.02em;margin-bottom:4px}
  .core-sub{font-family:var(--font-body);color:var(--ink-secondary);font-size:.92rem;line-height:1.55;max-width:65ch}

  /* Progress strip */
  .progress-strip{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:var(--s-lg);position:sticky;top:0;z-index:50;backdrop-filter:blur(8px)}
  .ps-bar{height:8px;background:var(--bg-recessed);border-radius:4px;overflow:hidden;margin-bottom:8px}
  .ps-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s ease}
  .ps-stats{display:flex;gap:20px;font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);flex-wrap:wrap}
  .ps-stat strong{color:var(--ink)}

  /* Daily goals */
  .daily-goals{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:var(--s-lg);padding:12px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius)}
  .daily-goals label{font-family:var(--font-display);font-size:.78rem;display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--ink-secondary)}

  /* Domain heatmap */
  .domain-heat{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:var(--s-xl)}
  .dh-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer;transition:border-color .15s}
  .dh-card:hover{border-color:var(--accent)}
  .dh-pct{font-family:var(--font-mono);font-size:1.4rem;font-weight:800}
  .dh-name{font-family:var(--font-display);font-size:.62rem;color:var(--ink-muted);margin-top:2px}
  .dh-bar{height:4px;background:var(--bg-recessed);border-radius:2px;margin-top:6px;overflow:hidden}
  .dh-fill{height:100%;border-radius:2px}

  /* Domain section */
  .domain-section{margin-bottom:var(--s-xl);scroll-margin-top:80px}
  .ds-head{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:2px solid var(--ink);cursor:pointer;user-select:none}
  .ds-title{font-family:var(--font-display);font-size:1.2rem;font-weight:800}
  .ds-meta{display:flex;align-items:center;gap:12px}
  .ds-pct{font-family:var(--font-mono);font-size:.88rem;font-weight:700}
  .ds-weight{font-family:var(--font-mono);font-size:.65rem;color:var(--ink-muted)}
  .ds-toggle{font-size:1.2rem;color:var(--ink-muted);transition:transform .2s}
  .ds-toggle.open{transform:rotate(180deg)}
  .ds-body{display:none;padding-top:var(--s-md)}
  .ds-body.open{display:block}

  /* Objective card */
  .obj-card{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;transition:border-color .15s}
  .obj-card.mastered{border-left:3px solid var(--prof-strong)}
  .obj-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .1s}
  .obj-head:hover{background:var(--bg-recessed)}
  .obj-id{font-family:var(--font-mono);font-size:.78rem;font-weight:700;color:var(--accent);min-width:28px}
  .obj-name{font-family:var(--font-display);font-size:.88rem;font-weight:600;flex:1}
  .obj-prof{width:80px;display:flex;align-items:center;gap:6px}
  .obj-bar{flex:1;height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
  .obj-fill{height:100%;border-radius:3px;transition:width .3s}
  .obj-pct{font-family:var(--font-mono);font-size:.68rem;font-weight:600;min-width:28px;text-align:right}
  .obj-check{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;flex-shrink:0;cursor:pointer;transition:all .15s}
  .obj-check.done{border-color:var(--prof-strong);background:var(--prof-strong);color:#fff}

  /* Objective expanded body */
  .obj-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
  .obj-body.open{display:block}

  /* Subtopics */
  .obj-subs{font-family:var(--font-body);font-size:.8rem;color:var(--ink-secondary);line-height:1.6;margin-bottom:12px;padding-left:16px}
  .obj-subs li{margin-bottom:2px}

  /* Resource rows */
  .res-section{margin-bottom:12px}
  .res-title{font-family:var(--font-display);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);margin-bottom:6px}
  .res-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--radius);font-size:.8rem;transition:background .1s}
  .res-row:hover{background:var(--bg-recessed)}
  .res-row a{color:var(--ink-secondary);text-decoration:none;font-family:var(--font-body)}
  .res-row a:hover{color:var(--accent)}
  .res-tag{font-family:var(--font-mono);font-size:.58rem;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0}
  .res-tag.book{background:rgba(180,83,9,.08);color:#B45309}
  .res-tag.video{background:rgba(220,38,38,.08);color:#DC2626}
  .res-tag.article{background:rgba(37,99,235,.08);color:#2563EB}
  .res-tag.site{background:rgba(22,163,74,.08);color:#16A34A}

  /* Internal shortcuts */
  .obj-shortcuts{display:flex;gap:6px;flex-wrap:wrap}
  .obj-sc{font-family:var(--font-display);font-size:.7rem;padding:5px 10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--ink-secondary);text-decoration:none;transition:all .15s}
  .obj-sc:hover{border-color:var(--accent);color:var(--accent)}

  .mark-btn{font-family:var(--font-display);font-size:.72rem;padding:6px 14px;background:none;border:1px solid var(--prof-strong);color:var(--prof-strong);border-radius:var(--radius);cursor:pointer;margin-top:8px;transition:all .15s}
  .mark-btn:hover{background:var(--prof-strong);color:#fff}
  .mark-btn.done{background:var(--prof-strong);color:#fff}

  @media(max-width:640px){
    .domain-heat{grid-template-columns:repeat(3,1fr)}
    .obj-prof{width:60px}
  }

  @media print{
    .progress-strip,.daily-goals,.beta-badge,nav.top-nav,.ds-toggle{display:none!important}
    .ds-body,.obj-body{display:block!important}
    .obj-card{break-inside:avoid;border:1px solid #ccc}
    body{font-size:10pt}
  }
</style>
</head>

'5.6':{book:'Vol 1, Ch. 23-24',video:'Standard ACLs | Day 34',vurl:'https://www.youtube.com/watch?v=z023_eRUtSo',articles:[{t:'NetworkLessons — ACLs',u:'https://networklessons.com/cisco/ccna-200-301/introduction-to-access-lists'}],site:[{t:'Console Lab 10',h:'console-labs.html'},{t:'PT Lab 7',h:'labs/lab-pt7-acl-portsec.html'}]},
'5.7':{book:'Vol 2, Ch. 35',video:'Port Security | Day 49',vurl:'https://www.youtube.com/watch?v=sHN3jOJIido',articles:[{t:'NetworkLessons — Port Security',u:'https://networklessons.com/cisco/ccna-200-301/cisco-port-security'}],site:[{t:'Console Lab 11',h:'console-labs.html'},{t:'PT Lab 7',h:'labs/lab-pt7-acl-portsec.html'}]},
'5.8':{book:'Vol 2, Ch. 34',video:'Security Fundamentals (AAA) | Day 48',vurl:'https://www.youtube.com/watch?v=VvFuieyTTSw',articles:[{t:'NetworkLessons — AAA',u:'https://networklessons.com/cisco/ccna-200-301/introduction-to-aaa'}],site:[{t:'Devices Page',h:'devices.html'}]},
'5.9':{book:'Vol 2, Ch. 26',video:'Wireless Security | Day 57',vurl:'https://www.youtube.com/watch?v=wHXKo9So5y8',articles:[{t:'NetworkLessons — Wireless Security',u:'https://networklessons.com/cisco/ccna-200-301/introduction-to-wireless-security'}],site:[]},
'5.10':{book:'Vol 2, Ch. 26',video:'Wireless Configuration | Day 58',vurl:'https://www.youtube.com/watch?v=r9o6GFI87go',articles:[{t:'Study-CCNA — WPA2 PSK',u:'https://study-ccna.com/wireless-security-protocols/'}],site:[]},

'6.2':{book:'Vol 2, Ch. 36',video:'Software-Defined Networking | Day 62',vurl:'https://www.youtube.com/watch?v=7HhWCeXDTpA',articles:[{t:'NetworkLessons — SDN',u:'https://networklessons.com/cisco/ccna-200-301/introduction-to-sdn'}],site:[{t:'Glossary',h:'glossary.html'}]},
'6.3':{book:'Vol 2, Ch. 37',video:'Software-Defined Networking | Day 62',vurl:'https://www.youtube.com/watch?v=7HhWCeXDTpA',articles:[{t:'Study-CCNA — SDN Architecture',u:'https://study-ccna.com/software-defined-networking/'}],site:[{t:'Glossary',h:'glossary.html'}]},
'6.4':{book:'Vol 2, Ch. 37',video:'AI & Machine Learning | Day 59',vurl:'https://www.youtube.com/watch?v=Fn_kAv35W5A',articles:[{t:'Cisco — AI Networking',u:'https://www.cisco.com/c/en/us/solutions/artificial-intelligence/index.html'}],site:[]},
'6.5':{book:'Vol 2, Ch. 38',video:'REST APIs | Day 61',vurl:'https://www.youtube.com/watch?v=Luei0p-2h10',articles:[{t:'NetworkLessons — REST APIs',u:'https://networklessons.com/cisco/ccna-200-301/introduction-to-rest-apis'}],site:[{t:'PT Lab 8',h:'labs/lab-pt8-json-api.html'}]},
'6.6':{book:'Vol 2, Ch. 38',video:'Ansible, Puppet, & Chef | Day 63',vurl:'https://www.youtube.com/watch?v=Kog9gHTjALI',articles:[{t:'NetworkLessons — Ansible',u:'https://networklessons.com/cisco/ccna-200-301/introduction-to-ansible'}],site:[{t:'Glossary',h:'glossary.html'}]},
'6.7':{book:'Vol 2, Ch. 38',video:'JSON, XML, & YAML | Day 60',vurl:'https://www.youtube.com/watch?v=nohde2-QNJ4',articles:[{t:'NetworkLessons — JSON & XML',u:'https://networklessons.com/cisco/ccna-200-301/introduction-to-json'}],site:[{t:'PT Lab 8',h:'labs/lab-pt8-json-api.html'}]},
};

const DOMAIN_COLORS=['','#2563EB','#16A34A','#D97706','#7C3AED','#DC2626','#0891B2'];
const DOMAIN_NAMES=['','Network Fundamentals','Network Access','IP Connectivity','IP Services','Security Fundamentals','Automation & Programmability'];

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function profColor(v){return v>=.7?'var(--prof-strong)':v>=.4?'var(--prof-mid)':'var(--prof-weak)';}

function render(){
  store.initProficiency(window.topicsData);
  const prof=store.getAllProficiency();
  const mastered=JSON.parse(localStorage.getItem('ccna_core_mastered')||'{}');
  const domains=window.topicsData.domains;

  // Progress strip
  let totalMastered=0,totalTopics=0;
  domains.forEach(d=>d.topics.forEach(t=>{totalTopics++;if(mastered[t.id])totalMastered++;}));
  const readiness=store.getReadinessScore?store.getReadinessScore(domains):0;
  document.getElementById('progressStrip').innerHTML=
    '<div class="ps-bar"><div class="ps-fill" style="width:'+Math.round(totalMastered/totalTopics*100)+'%"></div></div>'+
    '<div class="ps-stats"><span><strong>'+totalMastered+'/'+totalTopics+'</strong> mastered</span><span>Readiness: <strong>'+Math.round(readiness)+'%</strong></span><span>'+domains.length+' domains</span></div>';

  // Daily goals
  const today=new Date().toISOString().split('T')[0];
  // Domain heatmap
  document.getElementById('domainHeat').innerHTML=domains.map(d=>{
    let sum=0;d.topics.forEach(t=>sum+=(prof[t.id]||0));
    const avg=Math.round(sum/d.topics.length*100);
    const color=DOMAIN_COLORS[d.id]||'var(--ink-muted)';
    return'<div class="dh-card" onclick="document.getElementById(\'domain-'+d.id+'\').scrollIntoView({behavior:\'smooth\'})">'+
      '<div class="dh-pct" style="color:'+color+'">'+avg+'%</div>'+
      '<div class="dh-name">D'+d.id+' '+d.name+'</div>'+
      '<div class="dh-bar"><div class="dh-fill" style="width:'+avg+'%;background:'+color+'"></div></div></div>';
  }).join('');

  // Continue banner
  let continueObj=null;
  domains.forEach(d=>d.topics.forEach(t=>{if(!continueObj && !mastered[t.id] && (prof[t.id]||0)>0 && (prof[t.id]||0)<0.7) continueObj=t;}));
  document.getElementById('continueBar').innerHTML=continueObj?
    '<div style="padding:10px 16px;background:rgba(180,83,9,.06);border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;margin-bottom:var(--s-md);font-family:var(--font-display);font-size:.82rem;cursor:pointer" onclick="document.getElementById(\'obj-'+continueObj.id+'\').scrollIntoView({behavior:\'smooth\'});toggleObj(\''+continueObj.id+'\')">Continue: <strong>'+continueObj.id+' '+continueObj.name+'</strong> — '+Math.round((prof[continueObj.id]||0)*100)+'% proficiency</div>':'';

  // Filter weak only
  const showWeak=localStorage.getItem('ccna_core_filter')==='weak';
  document.getElementById('filterBar').innerHTML=
    '<button style="font-family:var(--font-display);font-size:.72rem;padding:6px 14px;background:'+(showWeak?'var(--accent)':'var(--bg-surface)')+';color:'+(showWeak?'#fff':'var(--ink-muted)')+';border:1px solid '+(showWeak?'var(--accent)':'var(--border)')+';border-radius:var(--radius);cursor:pointer" onclick="localStorage.setItem(\'ccna_core_filter\',localStorage.getItem(\'ccna_core_filter\')===\'weak\'?\'\':\'weak\');render()">'+
    (showWeak?'Show All':'Show Weak Only')+'</button>';

  // Spaced repetition — topics due for review
  const dueTopics=store.getDueForReview(7);
  const allTopics=domains.flatMap(d=>d.topics);
  document.getElementById('reviewDue').innerHTML=dueTopics.length>0?
    '<div style="background:rgba(220,38,38,.04);border:1px solid rgba(220,38,38,.15);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:4px">'+
    '<div style="font-family:var(--font-display);font-size:.82rem;font-weight:700;color:#DC2626;margin-bottom:6px">Due for Review ('+dueTopics.length+' topics)</div>'+
    '<div style="font-family:var(--font-body);font-size:.78rem;color:var(--ink-secondary);margin-bottom:8px">These topics were studied 7+ days ago and aren\'t mastered yet. Review them to prevent forgetting.</div>'+
    '<div style="display:flex;flex-wrap:wrap;gap:4px">'+dueTopics.slice(0,10).map(d=>{
      const t=allTopics.find(t=>t.id===d.id);
      return'<span style="font-family:var(--font-mono);font-size:.65rem;padding:3px 8px;background:rgba(220,38,38,.08);border-radius:3px;color:#DC2626;cursor:pointer" onclick="document.getElementById(\'obj-'+d.id+'\').scrollIntoView({behavior:\'smooth\'});toggleObj(\''+d.id+'\')">'+ d.id+' ('+Math.round(d.score*100)+'%, '+d.daysSince+'d ago)</span>';
    }).join('')+'</div></div>':'';

  // Book progress
  const bookProgress=JSON.parse(localStorage.getItem('ccna_book_progress')||'{}');

  // Domain sections
  document.getElementById('domainSections').innerHTML=domains.map(d=>{
    let sum=0;d.topics.forEach(t=>sum+=(prof[t.id]||0));
    const avg=Math.round(sum/d.topics.length*100);
    const color=DOMAIN_COLORS[d.id];

    const topicsHtml=d.topics.map(t=>{try{
      const p=Math.round((prof[t.id]||0)*100);
      const r=RES[t.id]||{};
      const isMastered=!!mastered[t.id];
      const hideCard=showWeak&&(isMastered||(prof[t.id]||0)>=0.7);
      const subs=t.subtopics?'<ul class="obj-subs">'+t.subtopics.map(s=>'<li>'+esc(typeof s==='object'?s.name:s)+'</li>').join('')+'</ul>':'';

      let resHtml='';
      // Books — support both single book string and books array
      const bks=r.books||[{t:r.book,id:'odom-vol2',p:0}];
      bks.forEach(bk=>{
        if(!bk||!bk.t)return;
        const bookLink=bk.p?'book.html?book='+(bk.id||'odom-vol2')+'&page='+bk.p:'book.html?book='+(bk.id||'odom-vol2');
        resHtml+='<div class="res-row"><span class="res-tag book">BOOK</span><a href="'+bookLink+'">'+esc(bk.t)+'</a></div>';
      });
      if(bks.length>0)resHtml+='<div class="res-row" style="padding-left:52px"><label style="font-family:var(--font-display);font-size:.72rem;display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--ink-secondary)"><input type="checkbox" '+(bookProgress[t.id]?'checked':'')+' onchange="toggleBookProgress(\''+t.id+'\',this.checked)" style="accent-color:var(--accent)"> Chapter read</label></div>';
      if(r.video)resHtml+='<div class="res-row"><span class="res-tag video">VIDEO</span><a href="'+(r.vurl||'#')+'" target="_blank">Jeremy\'s IT Lab — '+esc(r.video)+'</a></div>';
      if(r.articles)r.articles.forEach(a=>{resHtml+='<div class="res-row"><span class="res-tag article">READ</span><a href="'+a.u+'" target="_blank">'+esc(a.t)+'</a></div>';});

      let siteHtml='';
      if(r.site&&r.site.length>0)siteHtml='<div class="obj-shortcuts">'+r.site.map(s=>'<a class="obj-sc" href="'+s.h+'">'+esc(s.t)+'</a>').join('')+'<a class="obj-sc" href="quiz.html">Quiz '+t.id+'</a></div>';
      else siteHtml='<div class="obj-shortcuts"><a class="obj-sc" href="quiz.html">Quiz '+t.id+'</a><a class="obj-sc" href="glossary.html">Glossary</a></div>';

      return'<div class="obj-card'+(isMastered?' mastered':'')+'" id="obj-'+t.id+'"'+(hideCard?' style="display:none"':'')+'>';
        '<div class="obj-head" onclick="toggleObj(\''+t.id+'\')">'+
          '<span class="obj-id" style="color:'+color+'">'+t.id+'</span>'+
          '<span class="obj-name">'+esc(t.name)+'</span>'+
          '<div class="obj-prof"><div class="obj-bar"><div class="obj-fill" style="width:'+p+'%;background:'+profColor(p/100)+'"></div></div><span class="obj-pct" style="color:'+profColor(p/100)+'">'+p+'%</span></div>'+
          '<div class="obj-check'+(isMastered?' done':'')+'" onclick="event.stopPropagation();toggleMastered(\''+t.id+'\')">&#10003;</div>'+
        '</div>'+
        '<div class="obj-body" id="objbody-'+t.id+'">'+
          subs+
          '<div class="res-section"><div class="res-title">Study Resources</div>'+resHtml+'</div>'+
          '<div class="res-section"><div class="res-title">Practice on This Site</div>'+siteHtml+'</div>'+
        '</div></div>';
    }catch(e){return'<div class="obj-card" style="padding:10px;color:var(--prof-weak);font-size:.78rem">Error rendering '+t.id+': '+e.message+'</div>';}
    }).join('');

    return'<div class="domain-section" id="domain-'+d.id+'">'+
      '<div class="ds-head" onclick="toggleDomain(\''+d.id+'\')">'+
        '<div class="ds-title" style="color:'+color+'">Domain '+d.id+' — '+d.name+'</div>'+
        '<div class="ds-meta"><span class="ds-weight">'+d.weight+'% of exam</span><span class="ds-pct" style="color:'+color+'">'+avg+'%</span><span class="ds-toggle" id="dtoggle-'+d.id+'">&#9662;</span></div>'+
      '</div>'+
      '<div class="ds-body" id="dbody-'+d.id+'">'+topicsHtml+'</div></div>';
  }).join('');

  // Auto-expand weakest domain
  let weakestId='1', weakestAvg=Infinity;
  domains.forEach(d=>{let s=0;d.topics.forEach(t=>s+=(prof[t.id]||0));const a=s/d.topics.length;if(a<weakestAvg){weakestAvg=a;weakestId=d.id;}});
  const wb=document.getElementById('dbody-'+weakestId);
  const wt=document.getElementById('dtoggle-'+weakestId);
  if(wb)wb.classList.add('open');
  if(wt)wt.classList.add('open');
}

function toggleDomain(id){
  const body=document.getElementById('dbody-'+id);
  const toggle=document.getElementById('dtoggle-'+id);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function toggleObj(id){
  document.getElementById('objbody-'+id).classList.toggle('open');
}

function toggleMastered(id){
  const m=JSON.parse(localStorage.getItem('ccna_core_mastered')||'{}');
  if(m[id])delete m[id];else{m[id]=true;store.updateProficiency(id,true);}
  localStorage.setItem('ccna_core_mastered',JSON.stringify(m));
  render();
}

function toggleBookProgress(id,val){
  const bp=JSON.parse(localStorage.getItem('ccna_book_progress')||'{}');
  if(val)bp[id]=true;else delete bp[id];
  localStorage.setItem('ccna_book_progress',JSON.stringify(bp));
}

function toggleGoal(key,val){
  const today=new Date().toISOString().split('T')[0];
  const saved=JSON.parse(localStorage.getItem('ccna_daily_goals')||'{}');
  const goals=saved.date===today?saved:{date:today,quiz:false,study:false,questions:false};
  goals[key]=val;
  localStorage.setItem('ccna_daily_goals',JSON.stringify(goals));
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

render();
</script>
<script src="js/tutor.js"></script>
</body>
</html>
