<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE — CCNA 200-301 Study System</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/mastery-tracker.css">
<style>
  /* Hide shared chrome that clutters the dashboard */
  .gc-bar,.gc-chat-panel,#guidePill{display:none!important}

  .core-header{padding:var(--s-xl) 0 var(--s-lg);border-bottom:1px solid var(--rule);margin-bottom:var(--s-xl)}
  .core-title{font-size:2.6rem;font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:10px}
  .core-meta{display:flex;align-items:baseline;gap:var(--s-xl);font-family:var(--font-display);font-size:.88rem;color:var(--ink-muted);letter-spacing:.02em;text-transform:uppercase;margin-top:var(--s-md)}
  .core-meta .countdown{color:var(--accent);font-weight:600}

  /* (progress-strip removed — replaced by .hero-action + .stats-line) */

  /* Daily goals */
  .daily-goals{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:var(--s-xl);padding:16px 24px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius)}
  .daily-goals label{font-family:var(--font-display);font-size:.85rem;display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--ink-secondary)}

  /* Domain heatmap */
  .domain-heat{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:var(--s-2xl)}
  .dh-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 16px;text-align:center;cursor:pointer;aspect-ratio:5/4;display:flex;flex-direction:column;justify-content:center;gap:4px;contain:layout style paint;transition:transform .3s var(--ease-out),border-color .3s,box-shadow .3s;animation:cardIn .55s var(--ease-out) both}
  .dh-card:nth-child(2){animation-delay:.06s}.dh-card:nth-child(3){animation-delay:.12s}.dh-card:nth-child(4){animation-delay:.18s}.dh-card:nth-child(5){animation-delay:.24s}.dh-card:nth-child(6){animation-delay:.3s}
  .dh-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:inset 0 2px 0 var(--accent),0 10px 28px rgba(0,0,0,.07)}
  .dh-card:hover .dh-fill{filter:brightness(1.15)}
  .dh-pct{font-family:var(--font-mono);font-size:1.5rem;font-weight:800}
  .dh-name{font-family:var(--font-display);font-size:.72rem;color:var(--ink-muted);margin-top:6px}
  .dh-bar{height:5px;background:var(--bg-recessed);border-radius:3px;margin-top:10px;overflow:hidden}
  .dh-fill{height:100%;border-radius:3px;width:100%;transform-origin:left;will-change:transform;position:relative}
  .dh-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15) 50%,transparent);border-radius:inherit}

  /* Domain section */
  .domain-section{margin-bottom:var(--s-3xl);scroll-margin-top:80px;contain:layout style;content-visibility:auto;contain-intrinsic-size:auto 600px}
  .ds-head{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:2px solid var(--border-strong);cursor:pointer;user-select:none}
  .ds-title{font-family:var(--font-display);font-size:1.25rem;font-weight:800}
  .ds-meta{display:flex;align-items:center;gap:16px}
  .ds-pct{font-family:var(--font-mono);font-size:.92rem;font-weight:700}
  .ds-weight{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted)}
  .ds-toggle{font-size:1.2rem;color:var(--ink-muted);transition:transform .35s var(--ease-out)}
  .ds-toggle.open{transform:rotate(180deg)}
  .ds-body{display:none;padding-top:var(--s-xl)}
  .ds-body.open{display:block}

  /* Objective card */
  .obj-card{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:22px;overflow:hidden;contain:layout style;transition:border-color .2s var(--ease-out),box-shadow .3s var(--ease-out)}
  .obj-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.05)}
  .obj-card.mastered{border-left:3px solid var(--prof-strong)}
  .obj-head{display:flex;align-items:center;gap:16px;padding:20px 24px;cursor:pointer;transition:background .15s var(--ease-out)}
  .obj-head:hover{background:var(--bg-recessed)}
  .obj-id{font-family:var(--font-mono);font-size:.82rem;font-weight:700;color:var(--accent);min-width:44px}
  .obj-name{font-family:var(--font-display);font-size:1rem;font-weight:600;flex:1}
  .obj-prof{width:88px;display:flex;align-items:center;gap:8px}
  .obj-bar{flex:1;height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
  .obj-fill{height:100%;border-radius:3px;width:100%;transform-origin:left;transition:transform .4s var(--ease-out);position:relative}
  .obj-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2) 50%,transparent);border-radius:inherit}
  .obj-pct{font-family:var(--font-mono);font-size:.75rem;font-weight:600;min-width:36px;text-align:right}
  .obj-check{width:22px;height:22px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;flex-shrink:0;cursor:pointer;transition:all .2s var(--ease-out)}
  .obj-check.done{border-color:var(--prof-strong);background:var(--prof-strong);color:#fff}

  /* Objective expanded body */
  .obj-body{display:grid;grid-template-rows:0fr;border-top:1px solid transparent;transition:grid-template-rows .45s var(--ease-out),border-top-color .2s}
  .obj-body.open{grid-template-rows:1fr;border-top-color:var(--border)}
  .obj-body-inner{overflow:hidden;min-height:0;padding:0 24px;transition:padding .4s var(--ease-out)}
  .obj-body.open .obj-body-inner{padding:16px 24px 24px}

  /* Subtopics */
  .obj-subs{font-family:var(--font-body);font-size:.9rem;color:var(--ink-secondary);line-height:1.8;margin-bottom:24px;padding-left:20px}
  .obj-subs li{margin-bottom:10px}

  /* Resource rows */
  .res-section{margin-bottom:22px}
  .res-title{font-family:var(--font-display);font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);margin-bottom:10px}
  .res-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:var(--radius);font-size:.88rem;transition:background .2s var(--ease-out)}
  .res-row:hover{background:var(--bg-recessed)}
  .res-row a{color:var(--ink-secondary);text-decoration:none;font-family:var(--font-body)}
  .res-row a:hover{color:var(--accent)}
  .res-tag{font-family:var(--font-mono);font-size:.68rem;padding:4px 10px;border-radius:3px;font-weight:600;flex-shrink:0}
  .res-tag.book{background:rgba(180,83,9,.08);color:#B45309}
  .res-tag.video{background:rgba(220,38,38,.08);color:#DC2626}
  .res-tag.article{background:rgba(37,99,235,.08);color:#2563EB}
  .res-tag.site{background:rgba(22,163,74,.08);color:#16A34A}
  .res-tag.lab{background:rgba(8,145,178,.08);color:#0891B2}
  .res-tag.drill{background:rgba(180,83,9,.08);color:#B45309}
  .res-tag.cisco{background:rgba(37,99,235,.06);color:#2563EB}
  .study-day-row{display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(124,58,237,.05);border:1px solid rgba(124,58,237,.12);border-radius:var(--radius);margin-bottom:14px;font-family:var(--font-display);font-size:.8rem;color:#7C3AED;font-weight:600;flex-wrap:wrap}
  .study-day-row .sd-label{color:var(--ink-muted);font-weight:500}
  .study-day-row .sd-sprint{background:rgba(180,83,9,.08);color:#B45309;padding:2px 8px;border-radius:3px;font-size:.65rem}

  /* Internal shortcuts */
  .obj-shortcuts{display:flex;gap:8px;flex-wrap:wrap}
  .obj-sc{font-family:var(--font-display);font-size:.8rem;padding:8px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--ink-secondary);text-decoration:none;transition:all .2s var(--ease-out)}
  .obj-sc:hover{border-color:var(--accent);color:var(--accent)}

  .mark-btn{font-family:var(--font-display);font-size:.8rem;padding:8px 18px;background:none;border:1px solid var(--prof-strong);color:var(--prof-strong);border-radius:var(--radius);cursor:pointer;margin-top:12px;transition:all .2s var(--ease-out)}
  .mark-btn:hover{background:var(--prof-strong);color:#fff}
  .mark-btn.done{background:var(--prof-strong);color:#fff}

  /* Hero Action — TurboTax-style focused card */
  .hero-action{max-width:680px;margin:0 auto var(--s-2xl);padding:var(--s-2xl) var(--s-xl);text-align:center;min-height:200px;display:flex;flex-direction:column;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(var(--accent-rgb),.03) 0%,transparent 70%);border-radius:var(--radius-lg);animation:cardIn .6s var(--ease-out) both;animation-delay:.1s}
  .ha-label{font-family:var(--font-mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-muted);margin-bottom:var(--s-md)}
  .ha-title{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--ink);margin-bottom:var(--s-md);line-height:1.3}
  .ha-sub{font-family:var(--font-body);font-size:1rem;color:var(--ink-secondary);margin-bottom:var(--s-xl);line-height:1.7}
  .ha-bar-wrap{max-width:320px;margin:0 auto var(--s-sm)}
  .ha-bar{height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
  .ha-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#D97706);border-radius:3px;width:100%;transform-origin:left;transition:transform .8s var(--ease-out);position:relative}
  .ha-bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25) 50%,transparent);border-radius:inherit}
  .ha-pct{font-family:var(--font-mono);font-size:.78rem;color:var(--ink-muted);margin-bottom:var(--s-xl)}
  .ha-btn{display:inline-block;font-family:var(--font-display);font-size:.95rem;font-weight:700;color:#fff;background:var(--accent);padding:14px 42px;border-radius:var(--radius-lg);text-decoration:none;transition:all .3s var(--ease-out);border:none;cursor:pointer}
  .ha-btn:hover{background:#92400E;transform:translateY(-3px);box-shadow:0 10px 28px rgba(180,83,9,.3)}
  .ha-pass{font-family:var(--font-mono);font-size:.75rem;color:var(--ink-muted);margin-top:var(--s-lg)}
  .ha-pass strong{color:var(--accent)}
  .ha-review{font-family:var(--font-body);font-size:.85rem;color:var(--ink-muted);margin-top:var(--s-md)}

  /* Stats line — compact single row */
  .stats-line{display:flex;justify-content:center;gap:var(--s-2xl);padding:var(--s-lg) 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:var(--s-2xl);font-family:var(--font-mono);font-size:.82rem;color:var(--ink-muted);flex-wrap:wrap;animation:cardIn .5s var(--ease-out) both;animation-delay:.15s}
  .stats-line strong{color:var(--ink)}

  /* Quick Path */
  .quick-path{background:rgba(180,83,9,.04);border:1px solid rgba(180,83,9,.15);border-radius:var(--radius-lg);padding:22px 26px;margin-bottom:18px}
  .qp-label{font-family:var(--font-display);font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:700;margin-bottom:12px}
  .qp-steps{display:flex;flex-direction:column;gap:14px}
  .qp-step{display:flex;align-items:center;gap:12px;font-family:var(--font-body);font-size:.9rem;color:var(--ink-secondary)}
  .qp-num{font-family:var(--font-mono);font-size:.65rem;font-weight:700;color:var(--accent);background:rgba(180,83,9,.1);width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .qp-step a{color:var(--ink);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(180,83,9,.3)}
  .qp-step a:hover{color:var(--accent)}
  .qp-pass{font-family:var(--font-display);font-size:.8rem;color:var(--ink-muted);margin-top:10px;padding-left:30px}
  .res-toggle{font-family:var(--font-display);font-size:.78rem;color:var(--ink-muted);cursor:pointer;padding:8px 0;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .res-toggle:hover{color:var(--ink)}
  .res-toggle .caret{transition:transform .3s var(--ease-out);font-size:.65rem}
  .res-toggle .caret.open{transform:rotate(90deg)}
  .res-all{display:none}
  .res-all.open{display:block}

  @keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  html{scroll-behavior:smooth}
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0s!important;transition-duration:0s!important}}

  @media(max-width:640px){
    .domain-heat{grid-template-columns:repeat(3,1fr)}
    .dh-card{aspect-ratio:auto;animation:none}
    .obj-prof{width:60px}
  }

  @media print{
    .hero-action,.stats-line,.daily-goals,.beta-badge,nav.top-nav,.ds-toggle{display:none!important}
    .ds-body,.obj-body{display:block!important}
    .obj-card{break-inside:avoid;border:1px solid #ccc}
    body{font-size:10pt}
  }
</style>
</head>
<body>
<div class="container-wide">
  <nav class="top-nav" id="main-nav"></nav>

  <header class="core-header">
    <h1 class="core-title">CCNA 200-301</h1>
    <div class="core-meta">
      <span>Study Dashboard</span>
      <span id="examTarget" style="cursor:pointer;border-bottom:1px dashed var(--ink-muted)" onclick="document.getElementById('examDatePicker').showPicker()">Exam target: set date</span>
      <input type="date" id="examDatePicker" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;">
      <span class="countdown" id="countdown"></span>
    </div>
  </header>

  <div class="hero-action" id="heroAction"></div>
  <div class="stats-line" id="statsLine"></div>

  <details id="domainHeatWrap">
    <summary id="domainHeatSummary" style="font-family:var(--font-display);font-size:.82rem;font-weight:700;cursor:pointer;padding:8px 0;color:var(--ink);list-style:none;display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:.7rem;color:var(--ink-muted)">&#9662;</span> Domain Overview <span id="domainHeatMeta" style="font-family:var(--font-mono);font-size:.68rem;font-weight:500;color:var(--ink-muted)"></span></summary>
    <div class="domain-heat" id="domainHeat"></div>
  </details>
  <div id="filterBar" style="margin-bottom:var(--s-md)"></div>

  <div id="domainSections"></div>
</div>

<script src="data/topics-data.js"></script>
<script src="data/study-content.js"></script>
<script src="js/store.js"></script>

<script>

const NP_SET=new Set(['1.1','1.2','1.3','1.4','1.5','1.6','1.7','1.8','1.9','1.10','1.11','1.12','1.13','2.1','2.2','2.5','2.6','2.7','2.8','3.1','3.2','3.3','3.5','4.2','4.3','4.4','4.5','4.6','4.7','4.8','4.9','5.1','5.2','5.3','5.4','5.5','5.6','5.7','5.8','5.9']);

function render(){
  store.initProficiency(window.topicsData);
  const prof=store.getAllProficiency();
  const mastered=JSON.parse(localStorage.getItem('ccna_core_mastered')||'{}');
  const domains=window.topicsData.domains;
  const isNetPlus=localStorage.getItem('ccna_cert_track')==='net+';

  // Auto-master objectives at 70%+ proficiency AND mini lab passed (70%+)
  let masteredChanged=false;
  domains.forEach(d=>d.topics.forEach(t=>{
    if(window.isMtMastered(t.id,prof[t.id]||0)&&!mastered[t.id]){mastered[t.id]=true;masteredChanged=true;}
  }));
  if(masteredChanged)localStorage.setItem('ccna_core_mastered',JSON.stringify(mastered));

  // Stats
  let totalMastered=0,totalTopics=0;
  domains.forEach(d=>d.topics.forEach(t=>{
    if(isNetPlus&&!NP_SET.has(t.id))return;
    totalTopics++;if(mastered[t.id])totalMastered++;
  }));
  const readiness=store.getReadinessScore?store.getReadinessScore(domains):0;

  // Pass Prediction (computed first, shown inline in hero card)
  var passChance=0, passShow=false;
  try {
    var history = store.getQuizHistory();
    var quizAvg = history.length > 0 ? history.reduce(function(s,h){return s+(h.score/h.total);},0)/history.length : 0;
    var topicsAt70 = 0; domains.forEach(function(d){d.topics.forEach(function(t){if((prof[t.id]||0)>=0.7)topicsAt70++;});});
    var topicRatio = totalTopics > 0 ? topicsAt70 / totalTopics : 0;
    var streak = store.getStreak ? store.getStreak().current : 0;
    var examResults = JSON.parse(localStorage.getItem('ccna_exam_results')||'[]');
    var examAvg = examResults.length > 0 ? examResults.reduce(function(s,e){return s+(e.scaledScore||0);},0)/examResults.length/1000 : 0;
    var flashState = JSON.parse(localStorage.getItem('ccna_flashcard_state')||'{}');
    var flashTotal = Object.keys(flashState).length;
    var flashMastered = Object.values(flashState).filter(function(c){return c.interval>21;}).length;
    var flashRetention = flashTotal > 0 ? flashMastered / flashTotal : 0;
    var studyDays = Math.min(streak, 30) / 30;
    passChance = Math.round(
      (quizAvg * 0.30 +
       flashRetention * 0.15 +
       examAvg * 0.25 +
       topicRatio * 0.20 +
       studyDays * 0.10) * 100
    );
    passChance = Math.min(99, Math.max(0, passChance));
    passShow = history.length >= 3 || topicsAt70 > 0;
  } catch(e) {}

  // Hero Action Card — one clear thing to do
  var hasAnyProf = Object.keys(prof).some(function(k){return prof[k]>0;});
  var heroEl = document.getElementById('heroAction');
  var dueTopics = store.getDueForReview(7);

  if (!hasAnyProf) {
    // NEW user — welcome + guide
    heroEl.innerHTML =
      '<div class="ha-label">Welcome</div>' +
      '<div class="ha-title">Let\'s get you CCNA-ready</div>' +
      '<div class="ha-sub">The guide walks you through the study system step by step — objectives, quizzes, flashcards, and labs.</div>' +
      '<a href="guide.html" class="ha-btn">Begin with the Guide</a>';
  } else {
    // RETURNING user — find lowest-proficiency unmastered objective
    var lowestObj = null, lowestProf = Infinity, lowestDomain = '', lowestDomainId = '';
    domains.forEach(function(d){d.topics.forEach(function(t){
      if(isNetPlus && !NP_SET.has(t.id)) return;
      if(!mastered[t.id] && (prof[t.id]||0) < lowestProf){
        lowestProf = prof[t.id]||0;
        lowestObj = t;
        lowestDomain = d.name;
        lowestDomainId = d.id;
      }
    });});

    if (lowestObj) {
      var pct = Math.round(lowestProf * 100);
      heroEl.innerHTML =
        '<div class="ha-label">Your next step</div>' +
        '<div class="ha-title">' + lowestObj.id + ' ' + esc(lowestObj.name) + '</div>' +
        '<div class="ha-sub">' + esc(lowestDomain) + ' \u2014 ' + pct + '% proficiency</div>' +
        '<div class="ha-bar-wrap"><div class="ha-bar"><div class="ha-bar-fill" style="transform:scaleX(' + (pct/100) + ')"></div></div></div>' +
        '<div class="ha-pct">' + pct + '% mastered</div>' +
        '<button class="ha-btn" onclick="openAndScroll(\'' + lowestObj.id + '\',\'' + lowestDomainId + '\')">Study Now</button>' +
        (dueTopics.length > 0 ? '<div class="ha-review">' + dueTopics.length + ' topic' + (dueTopics.length===1?'':'s') + ' due for review</div>' : '') +
        (passShow ? '<div class="ha-pass">Pass prediction: <strong>' + passChance + '%</strong></div>' : '');
    } else {
      // All mastered
      heroEl.innerHTML =
        '<div class="ha-label">All objectives mastered</div>' +
        '<div class="ha-title">You\'ve covered every objective</div>' +
        '<div class="ha-sub">Take practice exams to confirm readiness.</div>' +
        '<a href="exam-details.html" class="ha-btn">Book the Exam</a>' +
        (passShow ? '<div class="ha-pass">Pass prediction: <strong>' + passChance + '%</strong></div>' : '');
    }
  }

  // Stats line — compact single row
  document.getElementById('statsLine').innerHTML =
    '<span><strong>' + totalMastered + '</strong>/' + totalTopics + ' mastered</span>' +
    '<span>Readiness: <strong>' + Math.round(readiness) + '%</strong></span>' +
    '<span>' + domains.length + ' domains</span>';

  // Daily goals
  const today=new Date().toISOString().split('T')[0];
  // Domain heatmap (open by default for context)
  let heatWeakestId='1',heatWeakestAvg=Infinity;
  document.getElementById('domainHeat').innerHTML=domains.map(d=>{
    let sum=0;d.topics.forEach(t=>sum+=(prof[t.id]||0));
    const avg=Math.round(sum/d.topics.length*100);
    if(avg<heatWeakestAvg){heatWeakestAvg=avg;heatWeakestId=d.id;}
    const color=DOMAIN_COLORS[d.id]||'var(--ink-muted)';
    return'<div class="dh-card" onclick="document.getElementById(\'domain-'+d.id+'\').scrollIntoView({behavior:\'smooth\'})">'+
      '<div class="dh-pct" style="color:'+color+'">'+avg+'%</div>'+
      '<div class="dh-name">D'+d.id+' '+d.name+'</div>'+
      '<div class="dh-bar"><div class="dh-fill" style="transform:scaleX('+(avg/100)+');background:'+color+'"></div></div></div>';
  }).join('');
  document.getElementById('domainHeatMeta').textContent='Weakest: D'+heatWeakestId+' ('+heatWeakestAvg+'%)';
  const heatWrap=document.getElementById('domainHeatWrap');
  heatWrap.setAttribute('open','');

  // Filter modes: '' = all, 'weak' = below 70%, 'speed' = speed run (below 70% + auto-expand + quick path only)
  // Default to Speed Run for returning users (have proficiency data + weak topics)
  var storedFilter=localStorage.getItem('ccna_core_filter');
  var hasProf=Object.keys(prof).some(k=>prof[k]>0);
  var filterMode=storedFilter!==null?storedFilter:(hasProf?'speed':'');
  const showWeak=filterMode==='weak'||filterMode==='speed';
  function fbtn(mode,label){
    var active=filterMode===mode;
    return'<button style="font-family:var(--font-display);font-size:.72rem;padding:6px 14px;background:'+(active?'var(--accent)':'var(--bg-surface)')+';color:'+(active?'#fff':'var(--ink-muted)')+';border:1px solid '+(active?'var(--accent)':'var(--border)')+';border-radius:var(--radius);cursor:pointer" onclick="localStorage.setItem(\'ccna_core_filter\',\''+mode+'\');render()">'+label+'</button>';
  }
  var weakCount=0;domains.forEach(d=>d.topics.forEach(t=>{if(isNetPlus&&!NP_SET.has(t.id))return;if((prof[t.id]||0)<0.7)weakCount++;}));
  document.getElementById('filterBar').innerHTML='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+
    fbtn('','Show All')+fbtn('weak','Weak Only ('+weakCount+')')+fbtn('speed','Speed Run ('+weakCount+')')+
    (filterMode==='speed'?'<span style="font-family:var(--font-body);font-size:.75rem;color:var(--ink-muted);margin-left:8px">Only objectives below 70%. Watch, quiz, pass, next.</span>':'')+
    '</div>';

  // Book progress
  const bookProgress=JSON.parse(localStorage.getItem('ccna_book_progress')||'{}');

  // Domain sections
  document.getElementById('domainSections').innerHTML=domains.map(d=>{
    let sum=0;d.topics.forEach(t=>sum+=(prof[t.id]||0));
    const avg=Math.round(sum/d.topics.length*100);
    const color=DOMAIN_COLORS[d.id];

    const topicsHtml=d.topics.map(t=>{try{
      const p=Math.round((prof[t.id]||0)*100);
      const r=RES[t.id]||{};
      const isMastered=!!mastered[t.id];
      const isCCNAOnly=isNetPlus&&!NP_SET.has(t.id);
      const hideCard=showWeak&&(isMastered||(prof[t.id]||0)>=0.7);
      const isSpeedRun=filterMode==='speed';
      const subs=t.subtopics?'<ul class="obj-subs">'+t.subtopics.map(s=>'<li>'+esc(typeof s==='object'?s.name:s)+'</li>').join('')+'</ul>':'';

      let resHtml='';

      // Study Day + Sprint Day badge
      if(r.jday){
        var sprintBadge=r.sprint&&r.sprint.length?r.sprint.map(function(d){return'<span class="sd-sprint">Sprint Day '+d+'</span>';}).join(''):'';
        resHtml+='<div class="study-day-row"><a href="jeremy-labs.html" style="text-decoration:none;color:inherit">Jeremy\'s IT Lab Day '+esc(r.jday)+'</a>'+
          (sprintBadge?' <span class="sd-label">|</span> <a href="sprint.html" class="sd-label" style="text-decoration:none;color:inherit">'+sprintBadge+'</a>':'')+'</div>';
      }

      // Books — support both single book string and books array
      const bks=r.books||[{t:r.book,id:'odom-vol2',p:0}];
      bks.forEach(bk=>{
        if(!bk||!bk.t)return;
        const bookLink=bk.p?'book.html?book='+(bk.id||'odom-vol2')+'&page='+bk.p:'book.html?book='+(bk.id||'odom-vol2');
        resHtml+='<div class="res-row"><span class="res-tag book">BOOK</span><a href="'+bookLink+'">'+esc(bk.t)+'</a></div>';
      });

      // Videos — skip first (already in Quick Path), show extras only
      if(r.videos&&r.videos.length>1){
        r.videos.slice(1).forEach(function(v){
          resHtml+='<div class="res-row"><span class="res-tag video">VIDEO</span><a href="'+(v.u||'#')+'" target="_blank">'+esc(v.ch)+' — '+esc(v.t)+'</a></div>';
        });
      }

      // Articles (may include merged extra_articles)
      if(r.articles)r.articles.forEach(a=>{resHtml+='<div class="res-row"><span class="res-tag article">READ</span><a href="'+a.u+'" target="_blank">'+esc(a.t)+'</a></div>';});

      // Labs (enriched only)
      if(r.labs&&r.labs.length){
        r.labs.forEach(function(l){
          var href=l.u||l.h||'#';
          var ext=!!l.u;
          resHtml+='<div class="res-row"><span class="res-tag lab">LAB</span><a href="'+href+'"'+(ext?' target="_blank"':'')+'>'+esc(l.t)+'</a></div>';
        });
      }

      // Drills — skip quiz.html?learn= (already in Quick Path)
      if(r.drills&&r.drills.length){
        r.drills.forEach(function(d){
          var href=d.u||d.h||'#';
          if(typeof href==='string'&&href.indexOf('learn=')!==-1)return;
          var ext=!!d.u;
          resHtml+='<div class="res-row"><span class="res-tag drill">DRILL</span><a href="'+href+'"'+(ext?' target="_blank"':'')+'>'+esc(d.t)+'</a></div>';
        });
      }

      // Cisco official docs (enriched only)
      if(r.cisco&&r.cisco.length){
        r.cisco.forEach(function(c){
          resHtml+='<div class="res-row"><span class="res-tag cisco">CISCO</span><a href="'+c.u+'" target="_blank">'+esc(c.t)+'</a></div>';
        });
      }

      // Deep-linked shortcuts — quiz filters to this topic, domain quiz filters to domain
      var domainNum=t.id.split('.')[0];
      let siteHtml='<div class="obj-shortcuts">';
      if(r.site&&r.site.length>0)r.site.forEach(function(s){siteHtml+='<a class="obj-sc" href="'+s.h+'">'+esc(s.t)+'</a>';});
      siteHtml+='</div>';

      if(isCCNAOnly)return'<div class="obj-card" id="obj-'+t.id+'" style="opacity:.3;pointer-events:none"><div class="obj-head"><span class="obj-id" style="color:var(--ink-muted)">'+t.id+'</span><span class="obj-name" style="color:var(--ink-muted)">'+esc(t.name)+'</span><span style="font-family:var(--font-mono);font-size:.6rem;color:var(--ink-muted);margin-left:auto">CCNA ONLY</span></div></div>';
      return'<div class="obj-card'+(isMastered?' mastered':'')+'" id="obj-'+t.id+'"'+(hideCard?' style="display:none"':'')+(isNetPlus?' style="border-left:3px solid #7C3AED"':'')+'>'+
        '<div class="obj-head" onclick="toggleObj(\''+t.id+'\')">'+
          '<span class="obj-id" style="color:'+color+'">'+t.id+'</span>'+
          '<span class="obj-name">'+esc(t.name)+'</span>'+
          '<div class="obj-prof"><div class="obj-bar"><div class="obj-fill" style="transform:scaleX('+(p/100)+');background:'+profColor(p/100)+'"></div></div><span class="obj-pct" style="color:'+profColor(p/100)+'">'+p+'%</span></div>'+
        '</div>'+
        '<div class="obj-body'+(isSpeedRun?' open':'')+'" id="objbody-'+t.id+'"><div class="obj-body-inner">'+
          (isSpeedRun?'':subs)+
          buildQuickPath(t,r,domainNum)+
          (isSpeedRun?'':'<div class="res-section"><div class="res-title">Resources</div>'+siteHtml+'<div style="margin-top:10px">'+resHtml+'</div></div>')+
        '</div></div></div>';
    }catch(e){return'<div class="obj-card" style="padding:10px;color:var(--prof-weak);font-size:.78rem">Error rendering '+t.id+': '+e.message+'</div>';}
    }).join('');

    const at70=d.topics.filter(t=>(prof[t.id]||0)>=0.7).length;
    const allMastered=d.topics.every(t=>mastered[t.id]);
    const quizUnlocked=allMastered||avg>=70;
    const quizBadge=quizUnlocked?
      '<a href="exam-sim.html" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:'+color+';color:#fff;border-radius:var(--radius);font-family:var(--font-display);font-size:.75rem;font-weight:700;text-decoration:none;margin-bottom:var(--s-sm)">Domain '+d.id+' Final Quiz — UNLOCKED</a>':
      '<div style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--bg-recessed);color:var(--ink-muted);border-radius:var(--radius);font-family:var(--font-display);font-size:.75rem;font-weight:600;margin-bottom:var(--s-sm);opacity:.5">Domain '+d.id+' Final Quiz — '+at70+'/'+d.topics.length+' objectives at 70%+ — keep going</div>';

    // Count visible cards in this domain (not hidden by filter)
    const visibleCount=d.topics.filter(t=>{
      if(isNetPlus&&!NP_SET.has(t.id))return false;
      if(showWeak&&(mastered[t.id]||(prof[t.id]||0)>=0.7))return false;
      return true;
    }).length;
    // Hide entire domain section if no visible cards in weak/speed mode
    const hideDomain=showWeak&&visibleCount===0;

    var autoOpen=filterMode==='speed'||filterMode==='weak';
    return'<div class="domain-section" id="domain-'+d.id+'"'+(hideDomain?' style="display:none"':'')+'>'+
      '<div class="ds-head" onclick="toggleDomain(\''+d.id+'\')">'+
        '<div class="ds-title" style="color:'+color+'">Domain '+d.id+' — '+d.name+(showWeak?' <span style="font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted);font-weight:400">('+visibleCount+' remaining)</span>':'')+'</div>'+
        '<div class="ds-meta"><span class="ds-weight">'+d.weight+'% of exam</span><span class="ds-pct" style="color:'+color+'">'+avg+'%</span><span class="ds-toggle'+(autoOpen?' open':'')+'" id="dtoggle-'+d.id+'">&#9662;</span></div>'+
      '</div>'+
      '<div class="ds-body'+(autoOpen?' open':'')+'" id="dbody-'+d.id+'">'+quizBadge+topicsHtml+'</div></div>';
  }).join('');

  // Auto-expand handled inline via class attribute in HTML above
}

function toggleDomain(id){
  const body=document.getElementById('dbody-'+id);
  const toggle=document.getElementById('dtoggle-'+id);
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function openAndScroll(objId, domainId) {
  // Open the domain section
  var dbody = document.getElementById('dbody-' + domainId);
  if (dbody) dbody.classList.add('open');
  // Open the objective body
  var obody = document.getElementById('objbody-' + objId);
  if (obody) obody.classList.add('open');
  // Scroll to the objective
  var el = document.getElementById('obj-' + objId);
  if (el) setTimeout(function(){ el.scrollIntoView({behavior:'smooth',block:'center'}); }, 100);
}

function toggleObj(id){
  document.getElementById('objbody-'+id).classList.toggle('open');
}

function toggleMastered(id){
  const m=JSON.parse(localStorage.getItem('ccna_core_mastered')||'{}');
  if(m[id])delete m[id];else{m[id]=true;store.updateProficiency(id,true);}
  localStorage.setItem('ccna_core_mastered',JSON.stringify(m));
  render();
}

function toggleBookProgress(id,val){
  const bp=JSON.parse(localStorage.getItem('ccna_book_progress')||'{}');
  if(val)bp[id]=true;else delete bp[id];
  localStorage.setItem('ccna_book_progress',JSON.stringify(bp));
}

function toggleGoal(key,val){
  const today=new Date().toISOString().split('T')[0];
  const saved=JSON.parse(localStorage.getItem('ccna_daily_goals')||'{}');
  const goals=saved.date===today?saved:{date:today,quiz:false,study:false,questions:false};
  goals[key]=val;
  localStorage.setItem('ccna_daily_goals',JSON.stringify(goals));
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

render();

// ── Exam date picker + countdown ─────────────────────────────────
(function(){
  var picker=document.getElementById('examDatePicker');
  var targetEl=document.getElementById('examTarget');
  var countdownEl=document.getElementById('countdown');
  var saved=localStorage.getItem('ccna_exam_date');
  if(saved) picker.value=saved;
  function update(){
    if(!saved&&!picker.value){targetEl.textContent='Set exam date';countdownEl.textContent='';return;}
    var val=saved||picker.value;
    var d=new Date(val+'T00:00:00');
    if(isNaN(d.getTime()))return;
    targetEl.textContent='Exam: '+d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    var diff=Math.round((d-new Date(new Date().toDateString()))/86400000);
    countdownEl.textContent=diff>0?diff+' days remaining':diff===0?'Exam day':'Exam passed';
  }
  picker.addEventListener('change',function(){
    saved=this.value;
    localStorage.setItem('ccna_exam_date',saved);
    update();
  });
  update();
})();
</script>

  }
})();
</script>
