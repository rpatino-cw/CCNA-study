<style>
  .gc-bar,.gc-chat-panel,#guidePill{display:none!important}
  :root{--ccnp:#0F766E;--ccnp-rgb:15,118,110;--ccnp-light:#5EEAD4;--ccnp-dark:#0B5249}

  .core-header{padding:var(--s-lg) 0 var(--s-md);border-bottom:3px solid var(--ccnp);margin-bottom:var(--s-md)}
  .core-title{font-size:2.4rem;font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:6px;color:var(--ccnp)}
  .core-subtitle{font-family:var(--font-display);font-size:.92rem;color:var(--ink-muted);margin-bottom:2px}
  .core-meta{display:flex;align-items:baseline;gap:var(--s-lg);font-family:var(--font-display);font-size:.82rem;color:var(--ink-muted);letter-spacing:.02em;text-transform:uppercase;margin-top:var(--s-sm)}
  .core-meta .countdown{color:var(--ccnp);font-weight:600}

  .hero-action{max-width:640px;margin:0 auto var(--s-2xl);padding:var(--s-xl) var(--s-xl);text-align:center}
  .ha-label{font-family:var(--font-mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-muted);margin-bottom:var(--s-sm)}
  .ha-title{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--ink);margin-bottom:var(--s-sm);line-height:1.3}
  .ha-sub{font-family:var(--font-body);font-size:.88rem;color:var(--ink-secondary);margin-bottom:var(--s-lg);line-height:1.6}
  .ha-bar-wrap{max-width:320px;margin:0 auto var(--s-sm)}
  .ha-bar{height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
  .ha-bar-fill{height:100%;background:var(--ccnp);border-radius:3px;transition:width .8s var(--ease-out)}
  .ha-pct{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);margin-bottom:var(--s-lg)}
  .ha-btn{display:inline-block;font-family:var(--font-display);font-size:.88rem;font-weight:700;color:#fff;background:var(--ccnp);padding:12px 36px;border-radius:var(--radius-lg);text-decoration:none;transition:all .2s;border:none;cursor:pointer}
  .ha-btn:hover{background:var(--ccnp-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(15,118,110,.25)}
  .ha-review{font-family:var(--font-body);font-size:.78rem;color:var(--ink-muted);margin-top:var(--s-sm)}

  .stats-line{display:flex;justify-content:center;gap:var(--s-xl);padding:var(--s-md) 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-bottom:var(--s-2xl);font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);flex-wrap:wrap}
  .stats-line strong{color:var(--ink)}

  /* Gist section */
  .gist-section{margin-bottom:var(--s-2xl)}
  .gist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:var(--s-xl)}
  .gist-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--s-lg)}
  .gist-card h3{font-family:var(--font-display);font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ccnp);margin-bottom:var(--s-sm)}
  .gist-card p,.gist-card ul{font-family:var(--font-body);font-size:.84rem;color:var(--ink-secondary);line-height:1.65;margin:0}
  .gist-card ul{padding-left:1.2em}
  .gist-card ul li{margin-bottom:4px}
  .gist-tag{display:inline-block;font-family:var(--font-mono);font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(15,118,110,.1);color:var(--ccnp);margin-right:4px;margin-bottom:4px;vertical-align:middle}
  .gist-tiles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:var(--s-2xl)}
  .gist-tile{font-family:var(--font-display);font-size:.78rem;font-weight:600;padding:10px 18px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);color:var(--ink-secondary);text-decoration:none;transition:all .15s}
  .gist-tile:hover{border-color:var(--ccnp);color:var(--ccnp);transform:translateY(-1px);box-shadow:0 2px 8px rgba(15,118,110,.15)}
  .gist-divider{font-family:var(--font-display);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);padding-bottom:8px;border-bottom:2px solid var(--border-strong);margin-bottom:var(--s-md)}

  .domain-heat{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:var(--s-xl)}
  .dh-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;cursor:pointer;transition:border-color .15s}
  .dh-card:hover{border-color:var(--ccnp)}
  .dh-pct{font-family:var(--font-mono);font-size:1.4rem;font-weight:800}
  .dh-name{font-family:var(--font-display);font-size:.62rem;color:var(--ink-muted);margin-top:2px}
  .dh-bar{height:4px;background:var(--bg-recessed);border-radius:2px;margin-top:6px;overflow:hidden}
  .dh-fill{height:100%;border-radius:2px}

  .domain-section{margin-bottom:var(--s-2xl);scroll-margin-top:80px}
  .ds-head{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:2px solid var(--border-strong);cursor:pointer;user-select:none}
  .ds-title{font-family:var(--font-display);font-size:1.15rem;font-weight:800}
  .ds-meta{display:flex;align-items:center;gap:12px}
  .ds-pct{font-family:var(--font-mono);font-size:.88rem;font-weight:700}
  .ds-weight{font-family:var(--font-mono);font-size:.65rem;color:var(--ink-muted)}
  .ds-toggle{font-size:1.2rem;color:var(--ink-muted);transition:transform .2s}
  .ds-toggle.open{transform:rotate(180deg)}
  .ds-body{display:none;padding-top:var(--s-lg)}
  .ds-body.open{display:block}

  .obj-card{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;transition:border-color .15s}
  .obj-card.mastered{border-left:3px solid var(--prof-strong)}
  .obj-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;transition:background .1s}
  .obj-head:hover{background:var(--bg-recessed)}
  .obj-id{font-family:var(--font-mono);font-size:.78rem;font-weight:700;color:var(--ccnp);min-width:40px}
  .obj-name{font-family:var(--font-display);font-size:.92rem;font-weight:600;flex:1}
  .obj-prof{width:80px;display:flex;align-items:center;gap:6px}
  .obj-bar{flex:1;height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden}
  .obj-fill{height:100%;border-radius:3px;transition:width .3s}
  .obj-pct{font-family:var(--font-mono);font-size:.68rem;font-weight:600;min-width:32px;text-align:right}

  .obj-body{display:none;padding:12px 20px 20px;border-top:1px solid var(--border)}
  .obj-body.open{display:block}
  .obj-subs{font-family:var(--font-body);font-size:.8rem;color:var(--ink-secondary);line-height:1.6;margin-bottom:16px;padding-left:16px}
  .obj-subs li{margin-bottom:5px}

  /* Mastery tracker styles in css/mastery-tracker.css */

  /* Practice shortcuts */
  .obj-shortcuts{display:flex;gap:6px;flex-wrap:wrap}
  .obj-sc{font-family:var(--font-display);font-size:.72rem;padding:6px 12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--ink-secondary);text-decoration:none;transition:all .15s}
  .obj-sc:hover{border-color:var(--ccnp);color:var(--ccnp)}

  .res-section{margin-bottom:16px}
  .res-title{font-family:var(--font-display);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);margin-bottom:6px}
  .res-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);font-size:.8rem;transition:background .1s}
  .res-row:hover{background:var(--bg-recessed)}
  .res-row a{color:var(--ink-secondary);text-decoration:none;font-family:var(--font-body)}
  .res-row a:hover{color:var(--ccnp)}
  .res-tag{font-family:var(--font-mono);font-size:.62rem;padding:3px 8px;border-radius:3px;font-weight:600;flex-shrink:0}
  .res-tag.video{background:rgba(220,38,38,.08);color:#DC2626}
  .res-tag.article{background:rgba(37,99,235,.08);color:#2563EB}
  .res-tag.site{background:rgba(22,163,74,.08);color:#16A34A}
  .res-tag.drill{background:rgba(180,83,9,.08);color:#B45309}
  .res-tag.lab{background:rgba(8,145,178,.08);color:#0891B2}

  @media(max-width:900px){.domain-heat{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:640px){.domain-heat{grid-template-columns:repeat(2,1fr)}.obj-prof{width:60px}.gist-grid{grid-template-columns:1fr}}
  @media print{.hero-action,.stats-line,.ds-toggle,nav.top-nav{display:none!important}.ds-body,.obj-body{display:block!important}.obj-card{break-inside:avoid;border:1px solid #ccc}body{font-size:10pt}}
</style>
</head>

<script>document.addEventListener('DOMContentLoaded',function(){

/* ═══════════════════════════════════════════════════════════════════
   CCNP ENCOR 350-401 — mirrors netplus.html rendering pattern
   ═══════════════════════════════════════════════════════════════════ */

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function profColor(p){if(p>=.7)return'var(--prof-strong,#16A34A)';if(p>=.4)return'var(--prof-mid,#CA8A04)';return'var(--prof-weak,#DC2626)';}

/* ── ENCOR v1.2 Objectives ── */
var ENCOR_OBJ = {
'1.1':{subs:['Enterprise network design: two-tier, three-tier, fabric','WAN topologies: hub-and-spoke, dual-homed, point-to-point','High availability: SSO, NSF, NSR, graceful restart','Layer 2 vs Layer 3 boundary design decisions']},
'1.2':{subs:['SD-WAN architecture: vManage, vSmart, vBond, vEdge','Control plane vs data plane separation','Overlay/underlay relationship in SD-WAN','Zero-touch provisioning, policy-based routing in SD-WAN']},
'1.3':{subs:['SD-Access fabric roles: fabric edge, border, control plane','LISP for host mobility and endpoint ID/locator separation','VXLAN encapsulation in SD-Access','Cisco DNA Center as intent-based networking controller']},
'1.4':{subs:['QoS models: IntServ (RSVP), DiffServ (DSCP/PHB)','Classification and marking: NBAR, ACL, policy-map','Queuing: CBWFQ, LLQ (priority-queue)','Shaping vs policing, WRED, trust boundaries']},
'2.1':{subs:['Type 1 vs Type 2 hypervisors: ESXi, KVM, Hyper-V','VM components: vNIC, vSwitch, vlan tagging on hypervisor','Virtual machine migration: vMotion, live migration']},
'2.2':{subs:['Container vs VM: kernel sharing, image layers, namespaces','Docker basics: image, container, Dockerfile, registry','Kubernetes: pod, deployment, service, namespace, kubelet']},
'2.3':{subs:['VRF: separate routing table per VRF, route leaking','MPLS L3VPN: PE, CE, P routers; RD, RT import/export','VRF-Lite: without MPLS, inter-VRF routing via route leaking']},
'2.4':{subs:['GRE: stateless tunnel, any payload, no encryption','DMVPN phases 1/2/3: hub-and-spoke to spoke-to-spoke','IPsec over GRE vs IPsec tunnel mode','LISP: EID vs RLOC, map-server, map-resolver, ITR/ETR']},
'3.1':{subs:['RSTP (802.1w): port states, port roles, BPDU handling','MST (802.1s): instance mapping, IST, CIST, interoperability','STP protection: PortFast, BPDU Guard, Root Guard, Loop Guard','EtherChannel: LACP (802.3ad) vs PAgP, load-balancing methods']},
'3.2':{subs:['OSPF multi-area: ABR, ASBR, backbone area 0 requirement','LSA types: 1 (router), 2 (network), 3 (summary), 4 (ASBR summary), 5 (external), 7 (NSSA external)','OSPF path selection: O, O IA, O E1/E2, O N1/N2','Stub, totally stub, NSSA area types and their LSA filtering']},
'3.3':{subs:['OSPF route redistribution: seed metric, metric-type','Route-maps: match/set clauses, permit/deny sequences','Prefix-lists vs ACLs for route filtering','Distribute-lists, offset-lists, administrative distance manipulation']},
'3.4':{subs:['EIGRP feasibility condition: RD < FD for feasible successor','EIGRP metric: bandwidth, delay (K1 and K3 by default)','EIGRP unequal-cost load balancing: variance command','EIGRP stub routing, route filtering, summarization']},
'3.5':{subs:['eBGP vs iBGP: next-hop behavior, TTL, AS-path','BGP path selection order: Weight, Local Preference, Originate, AS-path, Origin, MED, eBGP > iBGP, IGP metric','Route reflectors vs confederations for iBGP full-mesh requirement','BGP communities: standard, extended, large; route-maps to set/match']},
'3.6':{subs:['FHRP: HSRP (Cisco proprietary), VRRP (open), GLBP (load balance)','HSRP states: init, learn, listen, speak, standby, active','GLBP: AVG assigns AVF roles, round-robin or weighted forwarding','Preemption, timers, authentication for FHRPs']},
'3.7':{subs:['NAT types: static, dynamic, PAT (overload)','Verification: show ip nat translations, show ip nat statistics','NAT64 for IPv6-to-IPv4 translation','IPv6 addressing: EUI-64, SLAAC, DHCPv6 stateful/stateless']},
'4.1':{subs:['SNMP v2c vs v3: authentication (MD5/SHA), privacy (AES/DES)','NetFlow v5 vs v9 vs IPFIX: flow records, collector, exporter','IP SLA: probes (ICMP echo, UDP jitter, HTTP), threshold actions','Syslog severity levels 0-7 and their use cases']},
'4.2':{subs:['Cisco DNA Center assurance: client 360, device 360','Path trace and flow analysis in DNA Center','AI/ML-driven anomaly detection and baselining','ThousandEyes integration for end-to-end visibility']},
'4.3':{subs:['Cisco IOS troubleshooting: debug, show, ping, traceroute','Packet captures: SPAN, RSPAN, ERSPAN; Embedded Packet Capture','Netconf/RESTCONF for programmatic monitoring','Baseline comparison: interface error counters, CPU, memory']},
'5.1':{subs:['AAA: TACACS+ (TCP 49, per-command authz) vs RADIUS (UDP 1812/1813, per-session)','802.1X: supplicant, authenticator, auth server; EAP types','MAB: MAC Authentication Bypass for non-802.1X devices','CoA: Change of Authorization for dynamic policy push']},
'5.2':{subs:['TrustSec: SGT assignment, SGT propagation (inline, SXP)','MACsec (802.1AE): line-rate encryption on LAN links','Zone-based firewall policy: zones, zone-pairs, policy-map','Firepower and NGFW integration concepts']},
'5.3':{subs:['Control plane policing (CoPP): protecting the CPU','Infrastructure ACLs: protecting device management plane','Unauthenticated prefix filtering, unicast RPF (uRPF)','BGP security: prefix filtering, max-prefix, RPKI concepts']},
'6.1':{subs:['YANG data models: module, container, leaf, list','NETCONF (SSH/TCP 830): get-config, edit-config, commit','RESTCONF (HTTPS): GET, PUT, POST, DELETE on YANG paths','gRPC and gNMI for streaming telemetry']},
'6.2':{subs:['Python for network automation: netmiko, napalm, nornir, requests','Ansible: playbook, inventory, module, idempotency','Terraform basics for infrastructure as code','Version control: Git workflow for network config management']},
'6.3':{subs:['Cisco DNA Center APIs: intent API, southbound to devices','REST API concepts: authentication (token, basic), JSON/XML payloads','Postman for API testing; Python requests library pattern','Event-driven automation: webhooks, streaming telemetry consumers']},
'6.4':{subs:['AI/ML in networking: supervised vs unsupervised use cases','Cisco AI Network Analytics: anomaly detection, client experience','Predictive analytics for capacity and failure forecasting','Natural language interface concepts in network management']}
};

/* ── ENCOR v1.2 Domain structure ── */
var ENCOR_DOMAINS = [
  {id:'1',name:'Architecture',weight:15,color:'var(--ccnp)',objs:['1.1','1.2','1.3','1.4']},
  {id:'2',name:'Virtualization',weight:10,color:'var(--ccnp)',objs:['2.1','2.2','2.3','2.4']},
  {id:'3',name:'Infrastructure',weight:30,color:'var(--ccnp)',objs:['3.1','3.2','3.3','3.4','3.5','3.6','3.7']},
  {id:'4',name:'Network Assurance',weight:10,color:'var(--ccnp)',objs:['4.1','4.2','4.3']},
  {id:'5',name:'Security',weight:20,color:'var(--ccnp)',objs:['5.1','5.2','5.3']},
  {id:'6',name:'Automation & AI',weight:15,color:'var(--ccnp)',objs:['6.1','6.2','6.3','6.4']}
];

/* ── ENCOR Objective names ── */
var ENCOR_NAMES = {
'1.1':'Explain the different design principles used in an enterprise network',
'1.2':'Describe Cisco SD-WAN architecture and components',
'1.3':'Describe Cisco SD-Access architecture and components',
'1.4':'Explain quality of service (QoS) concepts',
'2.1':'Describe device virtualization technologies',
'2.2':'Configure and verify data path virtualization technologies',
'2.3':'Describe network virtualization concepts (VRF, MPLS L3VPN)',
'2.4':'Describe overlay and underlay concepts (GRE, DMVPN, LISP)',
'3.1':'Layer 2 — spanning tree and EtherChannel',
'3.2':'Configure and verify OSPF in a multi-area environment',
'3.3':'Describe the concepts of route redistribution and route filtering',
'3.4':'Configure and verify EIGRP advanced features',
'3.5':'Configure and verify eBGP between directly connected neighbors',
'3.6':'Describe the concepts of first hop redundancy protocols (HSRP, VRRP, GLBP)',
'3.7':'Describe NAT/PAT and IPv6 transition mechanisms',
'4.1':'Configure and verify SNMP, NetFlow, IP SLA, and Syslog',
'4.2':'Describe Cisco DNA Center workflows for assurance and analytics',
'4.3':'Troubleshoot network problems using the available tools',
'5.1':'Configure and verify AAA using TACACS+ and RADIUS',
'5.2':'Configure and verify network security features (TrustSec, MACsec, ZBFW)',
'5.3':'Describe device access control and infrastructure security methods',
'6.1':'Describe YANG model-driven programmability (NETCONF, RESTCONF, gRPC)',
'6.2':'Interpret Python scripts and Ansible playbooks used for network automation',
'6.3':'Describe Cisco DNA Center APIs for network provisioning and management',
'6.4':'Describe AI/ML use cases in network operations'
};

/* ── Resource mapping ── */
var ENCOR_RES = {
'1.1':{videos:[{t:'Cisco Learning — Enterprise Network Design',u:'https://www.youtube.com/watch?v=4r0A1T8K3LE'}],articles:[{t:'Study-CCNA — Three-Tier vs Spine-Leaf',u:'https://study-ccna.com/spine-leaf-network-design/'}],site:[{t:'Pillars Trainer',h:'encor-pillars.html'}],drills:[{t:'Study & Quiz 1.1',h:'encor-quiz.html?learn=1.1'}]},
'1.2':{videos:[{t:'Cisco Learning — SD-WAN Architecture',u:'https://www.youtube.com/watch?v=eRxo2eNWbw4'}],articles:[{t:'Cisco Docs — SD-WAN Overview',u:'https://www.cisco.com/c/en/us/solutions/enterprise-networks/sd-wan/index.html'}],site:[{t:'Pillars Trainer',h:'encor-pillars.html'}],drills:[{t:'Study & Quiz 1.2',h:'encor-quiz.html?learn=1.2'}]},

/* ── Exam Countdown ── */
(function(){
  var saved=localStorage.getItem('ccnp_exam_target'),picker=document.getElementById('examDatePicker'),label=document.getElementById('examTarget'),cd=document.getElementById('countdown');
  function update(ds){if(!ds){label.textContent='Exam target: set date';cd.textContent='';return;}var d=new Date(ds+'T00:00:00'),diff=Math.ceil((d-new Date())/(864e5));label.textContent='Exam: '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});cd.textContent=diff>0?diff+' days left':diff===0?'Today!':Math.abs(diff)+' days ago';}
  picker.addEventListener('change',function(){localStorage.setItem('ccnp_exam_target',picker.value);update(picker.value);});
  if(saved){picker.value=saved;update(saved);}
})();

/* ── Toggle helpers ── */
function toggleObj(id){
  var el=document.getElementById('objbody-'+id);
  if(el)el.classList.toggle('open');
}
function openAndScroll(objId,domId){
  var body=document.getElementById('ds-body-'+domId);
  if(body&&!body.classList.contains('open')){body.classList.add('open');body.previousElementSibling.querySelector('.ds-toggle').classList.add('open');}
  setTimeout(function(){
    var obj=document.getElementById('obj-'+objId);
    if(obj){obj.scrollIntoView({behavior:'smooth',block:'center'});
    var ob=document.getElementById('objbody-'+objId);if(ob&&!ob.classList.contains('open'))ob.classList.add('open');}
  },200);
}

function buildQuickPath(objId,r){

}

/* ── Gist section ── */
function renderGist(){
  var html='';
  html+='<div class="gist-divider">ENCOR Orientation</div>';
  html+='<div class="gist-grid">';

  // Card 1: What CCNP Enterprise is
  html+='<div class="gist-card"><h3>What CCNP Enterprise Is</h3><p>Two exams: <strong>ENCOR 350-401</strong> (core, required for all concentrations) plus one concentration exam of your choice. Passing ENCOR alone earns the <strong>Cisco Certified Specialist Enterprise Core</strong> badge and qualifies as the written requirement for <strong>CCIE Enterprise</strong> (Infrastructure or Wireless). Assumes solid CCNA fluency, not freshman CCNA, as the baseline.</p></div>';

  // Card 2: ENCOR + ENARSI
  html+='<div class="gist-card"><h3>ENCOR + ENARSI Path</h3><p>ENCOR is deliberately broad: routing protocols, overlays, QoS, security, automation, and architecture. ENARSI 300-410 is the recommended concentration. It goes deep on advanced routing, multi-protocol redistribution, troubleshooting at scale, MPLS L3VPN, and DMVPN. CCNP = ENCOR breadth plus ENARSI depth. Together they build the diagnostic intuition CCNA never had to cover.</p></div>';

  // Card 3: Mindset shift
  html+='<div class="gist-card"><h3>Mindset Shift from CCNA</h3><p>CCNA: configure it and know what it does. CCNP: <em>why this design</em>, what breaks under load, how to verify and automate at scale. Three new muscles to build:</p><ul><li>Read show output to <em>diagnose</em>, not confirm</li><li>Think in overlays: the underlay carries the overlay; they are separate failure domains</li><li>Automation is a first-class domain, not a bonus topic</li></ul></div>';

  // Card 4: What's new vs CCNA
  html+='<div class="gist-card"><h3>What is New vs CCNA</h3><p>';
  var newTopics=['eBGP + path selection (Weight, LP, AS-path, MED)','Multi-area OSPF + LSA types 1-7 + redistribution + route-maps','EIGRP feasible-successor depth + unequal-cost LB','Overlays: GRE, DMVPN ph1/2/3, LISP, VXLAN','VRF + MPLS L3VPN','SD-WAN + SD-Access fabric','Full QoS: MQC, CBWFQ, LLQ, WRED','TrustSec, MACsec, Zero Trust concepts','Automation and AI entire domain (NETCONF, RESTCONF, Python, Ansible)'];
  newTopics.forEach(function(t){html+='<span class="gist-tag">NEW</span>'+esc(t)+'<br>';});
  html+='<small style="font-family:var(--font-mono);font-size:.6rem;color:var(--ink-muted)">Note: ENCOR v1.2 removed wireless from core.</small></p></div>';

  // Card 5: Suggested study order
  html+='<div class="gist-card"><h3>Suggested Study Order</h3><ol style="font-family:var(--font-body);font-size:.84rem;color:var(--ink-secondary);line-height:1.65;padding-left:1.2em;margin:0"><li>Bridge CCNA gaps first: OSPF single-area, STP, ACLs</li><li>Infrastructure (30%) first: RSTP/MST, EtherChannel, EIGRP/OSPF advanced, eBGP, redistribution, FHRP, QoS</li><li>Virtualization: VRF then GRE, VXLAN, LISP</li><li>Architecture: SD-WAN and SD-Access now make sense as overlays on a routed underlay</li><li>Security: AAA, TrustSec, MACsec, ZBFW</li><li>Network Assurance: SNMPv3, NetFlow, IP SLA, DNA Center</li><li>Automation: spread throughout, not left for the end</li></ol></div>';

  html+='</div>'; // end gist-grid

  // Tool tiles
  html+='<div class="gist-divider">Tools</div>';
  html+='<div class="gist-tiles">';
  var tiles=[
    {t:'Pillars Trainer',h:'encor-pillars.html'},
    {t:'The Numbers',h:'encor-numbers.html'},
    {t:'BGP Path Walker',h:'encor-bgp-path.html'},
    {t:'OSPF/LSA Sim',h:'encor-ospf-lsa.html'},
    {t:'VXLAN Dissector',h:'encor-vxlan-dissector.html'},
    {t:'Mega Lab',h:'encor-megalab.html'}
  ];
  tiles.forEach(function(tile){html+='<a class="gist-tile" href="'+tile.h+'">'+esc(tile.t)+'</a>';});
  html+='</div>';

  document.getElementById('gistSection').innerHTML=html;
}

/* ── Main Render ── */
function render(){
  renderGist();

  var allObjs=[];ENCOR_DOMAINS.forEach(function(d){d.objs.forEach(function(id){allObjs.push(id);});});

  // Auto-master at 70% quiz AND 70% mini lab
  var mc=false;allObjs.forEach(function(id){
    if(window.isMtMastered&&window.isMtMastered(id,ccnpProf[id]||0)&&!ccnpMastered[id]){ccnpMastered[id]=true;mc=true;}
  });
  if(mc)localStorage.setItem('ccnp_core_mastered',JSON.stringify(ccnpMastered));

  var totalMastered=allObjs.filter(function(id){return ccnpMastered[id];}).length;
  var readiness=0;allObjs.forEach(function(id){readiness+=(ccnpProf[id]||0);});
  readiness=allObjs.length?Math.round(readiness/allObjs.length*100):0;

  // Hero
  var heroEl=document.getElementById('heroAction');
  var hasAny=allObjs.some(function(id){return(ccnpProf[id]||0)>0;});
  if(!hasAny){
    heroEl.innerHTML='<div class="ha-label">Welcome</div><div class="ha-title">Let\'s get you CCNP ENCOR ready</div><div class="ha-sub">Start with Domain 3 (Infrastructure, 30%) — expand the objectives below and follow the Quick Path for each one.</div><a href="encor-pillars.html" class="ha-btn">Start with Pillars Trainer</a>';
  } else {
    var lowestId=null,lowestP=Infinity,lowestDom='';
    ENCOR_DOMAINS.forEach(function(d){d.objs.forEach(function(id){if(!ccnpMastered[id]&&(ccnpProf[id]||0)<lowestP){lowestP=ccnpProf[id]||0;lowestId=id;lowestDom=d.name;}});});
    if(lowestId){
      var pct=Math.round(lowestP*100);
      var lowestDomId=lowestId.split('.')[0];
      heroEl.innerHTML='<div class="ha-label">Your next step</div><div class="ha-title">'+lowestId+' '+esc(ENCOR_NAMES[lowestId])+'</div><div class="ha-sub">'+esc(lowestDom)+' — '+pct+'% proficiency</div><div class="ha-bar-wrap"><div class="ha-bar"><div class="ha-bar-fill" style="width:'+pct+'%"></div></div></div><div class="ha-pct">'+pct+'% mastered</div><button class="ha-btn" onclick="openAndScroll(\''+lowestId+'\',\''+lowestDomId+'\')">Study Now</button>';
    } else {
      heroEl.innerHTML='<div class="ha-label">All objectives mastered</div><div class="ha-title">You\'ve covered every ENCOR objective</div><div class="ha-sub">Take practice exams to confirm readiness.</div><a href="encor-megalab.html" class="ha-btn">Take Practice Exam</a>';
    }
  }

  // Stats
  document.getElementById('statsLine').innerHTML='<span><strong>'+totalMastered+'</strong>/'+allObjs.length+' mastered</span><span>Readiness: <strong>'+readiness+'%</strong></span><span>'+ENCOR_DOMAINS.length+' domains</span>';

  // Heatmap
  var heatWeakId='1',heatWeakAvg=Infinity;
  document.getElementById('domainHeat').innerHTML=ENCOR_DOMAINS.map(function(d){
    var sum=0;d.objs.forEach(function(id){sum+=(ccnpProf[id]||0);});
    var avg=Math.round(sum/d.objs.length*100);
    if(avg<heatWeakAvg){heatWeakAvg=avg;heatWeakId=d.id;}
    return'<div class="dh-card" onclick="document.getElementById(\'domain-'+d.id+'\').scrollIntoView({behavior:\'smooth\'})"><div class="dh-pct" style="color:'+profColor(avg/100)+'">'+avg+'%</div><div class="dh-name">D'+d.id+' '+esc(d.name)+'</div><div class="dh-bar"><div class="dh-fill" style="width:'+avg+'%;background:'+profColor(avg/100)+'"></div></div></div>';
  }).join('');
  document.getElementById('domainHeatMeta').textContent='Weakest: D'+heatWeakId+' ('+heatWeakAvg+'%)';

  // Filter bar
  var storedFilter=localStorage.getItem('ccnp_core_filter')||'';
  var filterMode=storedFilter;
  var showWeak=filterMode==='weak';
  var weakCount=allObjs.filter(function(id){return(ccnpProf[id]||0)<0.7;}).length;
  function fbtn(mode,label){var active=filterMode===mode;return'<button style="font-family:var(--font-display);font-size:.72rem;padding:6px 14px;background:'+(active?'var(--ccnp)':'var(--bg-surface)')+';color:'+(active?'#fff':'var(--ink-muted)')+';border:1px solid '+(active?'var(--ccnp)':'var(--border)')+';border-radius:var(--radius);cursor:pointer" onclick="localStorage.setItem(\'ccnp_core_filter\',\''+mode+'\');render()">'+label+'</button>';}
  document.getElementById('filterBar').innerHTML='<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+fbtn('','Show All')+fbtn('weak','Weak Only ('+weakCount+')')+'</div>';

  // Domain sections
  document.getElementById('domainSections').innerHTML=ENCOR_DOMAINS.map(function(d){
    var sum=0;d.objs.forEach(function(id){sum+=(ccnpProf[id]||0);});
    var avg=Math.round(sum/d.objs.length*100);

    var topicsHtml=d.objs.map(function(id){
      var p=Math.round((ccnpProf[id]||0)*100);
      var isMastered=!!ccnpMastered[id];
      var hideCard=showWeak&&(isMastered||(ccnpProf[id]||0)>=0.7);
      var r=ENCOR_RES[id]||{};
      var obj=ENCOR_OBJ[id]||{};
      var subs=obj.subs?'<ul class="obj-subs">'+obj.subs.map(function(s){return'<li>'+esc(s)+'</li>';}).join('')+'</ul>':'';

      // Resources HTML — extras only (first video already in Quick Path)
      var resHtml='';
      if(r.videos&&r.videos.length>1)r.videos.slice(1).forEach(function(v){resHtml+='<div class="res-row"><span class="res-tag video">VIDEO</span><a href="'+v.u+'" target="_blank">'+esc(v.t)+'</a></div>';});
      if(r.articles)r.articles.forEach(function(a){resHtml+='<div class="res-row"><span class="res-tag article">READ</span><a href="'+a.u+'" target="_blank">'+esc(a.t)+'</a></div>';});
      if(r.drills)r.drills.forEach(function(dr){if(dr.h&&dr.h.indexOf('learn=')!==-1)return;var href=dr.h||dr.u||'#';resHtml+='<div class="res-row"><span class="res-tag drill">DRILL</span><a href="'+href+'"'+(dr.u?' target="_blank"':'')+'>'+esc(dr.t)+'</a></div>';});

      // Shortcut buttons
      var siteHtml='<div class="obj-shortcuts">';
      if(r.site)r.site.forEach(function(s){siteHtml+='<a class="obj-sc" href="'+s.h+'">'+esc(s.t)+'</a>';});
      siteHtml+='</div>';

      return'<div class="obj-card'+(isMastered?' mastered':'')+'" id="obj-'+id+'"'+(hideCard?' style="display:none"':'')+'>'+
        '<div class="obj-head" onclick="toggleObj(\''+id+'\')">'+
          '<span class="obj-id">'+id+'</span>'+
          '<span class="obj-name">'+esc(ENCOR_NAMES[id])+'</span>'+
          '<div class="obj-prof"><div class="obj-bar"><div class="obj-fill" style="width:'+p+'%;background:'+profColor(p/100)+'"></div></div><span class="obj-pct" style="color:'+profColor(p/100)+'">'+p+'%</span></div>'+
        '</div>'+
        '<div class="obj-body" id="objbody-'+id+'">'+
          subs+
          buildQuickPath(id,r)+
          '<div class="res-section"><div class="res-title">Resources</div>'+siteHtml+'<div style="margin-top:10px">'+resHtml+'</div></div>'+
        '</div></div>';
    }).join('');

    return'<div class="domain-section" id="domain-'+d.id+'">'+
      '<div class="ds-head" onclick="var b=document.getElementById(\'ds-body-'+d.id+'\');b.classList.toggle(\'open\');this.querySelector(\'.ds-toggle\').classList.toggle(\'open\')">'+
        '<div class="ds-title">'+d.id+'.0 '+esc(d.name)+'</div>'+
        '<div class="ds-meta"><span class="ds-weight">'+d.weight+'%</span><span class="ds-pct" style="color:'+profColor(avg/100)+'">'+avg+'%</span><span class="ds-toggle">&#9662;</span></div>'+
      '</div>'+
      '<div class="ds-body" id="ds-body-'+d.id+'">'+topicsHtml+'</div></div>';
  }).join('');
}
