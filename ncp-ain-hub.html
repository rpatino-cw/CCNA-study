<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>CORE — NVIDIA NCP-AIN Study System</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
  .gc-bar,.gc-chat-panel,#guidePill{display:none!important}
  :root{--ncp:#76B900;--ncp-rgb:118,185,0;--ncp-light:#A4D65E;--ncp-dark:#5A8C00}

  .core-header{padding:var(--s-lg) 0 var(--s-md);border-bottom:3px solid var(--ncp);margin-bottom:var(--s-md)}
  .core-title{font-size:2.4rem;font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:6px;color:var(--ncp)}
  .core-subtitle{font-family:var(--font-display);font-size:.92rem;color:var(--ink-muted);margin-bottom:2px}
  .core-meta{display:flex;align-items:baseline;gap:var(--s-lg);font-family:var(--font-display);font-size:.82rem;color:var(--ink-muted);letter-spacing:.02em;text-transform:uppercase;margin-top:var(--s-sm)}

  /* Gist section */
  .gist-section{margin-bottom:var(--s-2xl)}
  .gist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:var(--s-xl)}
  .gist-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--s-lg)}
  .gist-card h3{font-family:var(--font-display);font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ncp);margin-bottom:var(--s-sm)}
  .gist-card p,.gist-card ul,.gist-card ol{font-family:var(--font-body);font-size:.84rem;color:var(--ink-secondary);line-height:1.65;margin:0}
  .gist-card ul,.gist-card ol{padding-left:1.2em}
  .gist-card ul li,.gist-card ol li{margin-bottom:4px}
  .gist-tag{display:inline-block;font-family:var(--font-mono);font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(118,185,0,.12);color:var(--ncp);margin-right:4px;margin-bottom:4px;vertical-align:middle}
  .gist-tiles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:var(--s-2xl)}
  .gist-tile{font-family:var(--font-display);font-size:.78rem;font-weight:600;padding:10px 18px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);color:var(--ink-secondary);text-decoration:none;transition:all .15s}
  .gist-tile:hover{border-color:var(--ncp);color:var(--ncp);transform:translateY(-1px);box-shadow:0 2px 8px rgba(118,185,0,.18)}
  .gist-divider{font-family:var(--font-display);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted);padding-bottom:8px;border-bottom:2px solid var(--border-strong);margin-bottom:var(--s-md)}

  /* Domain weight bars */
  .domain-heat{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:var(--s-xl)}
  .dh-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;transition:border-color .15s}
  .dh-card:hover{border-color:var(--ncp)}
  .dh-pct{font-family:var(--font-mono);font-size:1.4rem;font-weight:800;color:var(--ncp)}
  .dh-name{font-family:var(--font-display);font-size:.62rem;color:var(--ink-muted);margin-top:2px}
  .dh-bar{height:4px;background:var(--bg-recessed);border-radius:2px;margin-top:6px;overflow:hidden}
  .dh-fill{height:100%;border-radius:2px;background:var(--ncp)}

  /* Study path */
  .path-list{list-style:none;padding:0;margin:0}
  .path-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
  .path-item:last-child{border-bottom:none}
  .path-num{font-family:var(--font-mono);font-size:.7rem;font-weight:700;color:var(--ncp);min-width:24px;padding-top:2px}
  .path-body{flex:1}
  .path-name{font-family:var(--font-display);font-size:.85rem;font-weight:600;color:var(--ink)}
  .path-meta{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-muted);margin-top:2px}
  .path-cost{display:inline-block;font-family:var(--font-mono);font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(118,185,0,.12);color:var(--ncp)}

  /* Blueprint link button */
  .blueprint-btn{display:inline-block;font-family:var(--font-display);font-size:.88rem;font-weight:700;color:#fff;background:var(--ncp);padding:12px 28px;border-radius:var(--radius-lg);text-decoration:none;transition:all .2s}
  .blueprint-btn:hover{background:var(--ncp-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(118,185,0,.3)}

  @media(max-width:900px){.domain-heat{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:640px){.domain-heat{grid-template-columns:repeat(2,1fr)}.gist-grid{grid-template-columns:1fr}}
  @media(prefers-reduced-motion:reduce){.gist-tile,.blueprint-btn{transition:none}}
  @media print{nav.top-nav{display:none!important}body{font-size:10pt}}
</style>
</head>
<body>
<div class="container-wide">
  <nav class="top-nav" id="main-nav"></nav>

  <header class="core-header">
    <h1 class="core-title">NVIDIA NCP-AIN</h1>
    <div class="core-subtitle">AI Networking: Certified Professional</div>
    <div class="core-meta">
      <span>Study Hub</span>
      <span>NCP-AIN v1.0</span>
    </div>
  </header>

  <div id="gistSection" class="gist-section"></div>

  <div id="domainSection" style="margin-bottom:var(--s-2xl)"></div>

  <div id="pathSection" style="margin-bottom:var(--s-2xl)"></div>

  <div id="toolSection" style="margin-bottom:var(--s-2xl)"></div>

  <div id="resourceSection" style="margin-bottom:var(--s-2xl)"></div>

  <div id="blueprintSection" style="margin-bottom:var(--s-2xl)"></div>
</div>

<script defer src="js/nav.js"></script>
<script>document.addEventListener('DOMContentLoaded',function(){

/* ═══════════════════════════════════════════════════════════════════
   NVIDIA NCP-AIN Study Hub — mirrors encor-hub.html rendering pattern
   ═══════════════════════════════════════════════════════════════════ */

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ── Domain weight data ── */
var NCP_DOMAINS=[
  {id:1,name:'Spectrum Networking',weight:30},
  {id:2,name:'InfiniBand Networking',weight:30},
  {id:3,name:'Troubleshooting Tools',weight:20},
  {id:4,name:'Automation & Config',weight:10},
  {id:5,name:'AI DC Design',weight:5},
  {id:6,name:'Kubernetes Integration',weight:5}
];

/* ── Gist cards ── */
function renderGist(){
  var html='';
  html+='<div class="gist-divider">NCP-AIN Orientation</div>';
  html+='<div class="gist-grid">';

  // Card 1: What NCP-AIN is
  html+='<div class="gist-card"><h3>What NCP-AIN Is</h3><p><strong>NVIDIA-Certified Professional: AI Networking.</strong> $400, 120 min, 70-75 questions, online proctored via Certiverse, valid 2 years. Assumes 2-3 years of data-center experience with NVIDIA hardware. Validates your ability to deploy and manage NVIDIA AI networking across both Spectrum-X Ethernet and InfiniBand fabrics for AI workloads.</p></div>';

  // Card 2: The two fabrics
  html+='<div class="gist-card"><h3>The Two Fabrics</h3><p><strong>Spectrum-X (Ethernet for AI):</strong> RoCEv2, lossless transport, ECN/PFC congestion control, adaptive routing, NVUE config, NetQ observability, WJH (What Just Happened). Combined with standard Ethernet tooling for GPU cluster interconnects.</p><p style="margin-top:10px"><strong>InfiniBand:</strong> subnet manager, PKeys (partition keys), UFM (Unified Fabric Manager), adaptive routing, ibdiagnet for diagnostics. Both fabrics carry roughly 30% of the exam each.</p></div>';

  // Card 3: Mindset
  html+='<div class="gist-card"><h3>Mindset</h3><p>This is a hands-on config and troubleshooting certification for GPU-cluster fabrics, not a theory exam. Three muscles to build:</p><ul><li>Lossless transport: why PFC + ECN together, and where each breaks</li><li>Fabric bring-up: cabling validation, SM discovery, partition assignment</li><li>Fabric validation: ibdiagnet, NetQ, WJH for root-cause in seconds, not minutes</li></ul></div>';

  // Card 4: The gear
  html+='<div class="gist-card"><h3>The Gear</h3><p><strong>Ethernet side:</strong></p><ul><li>Spectrum-4 switches (NVUE / Cumulus Linux)</li><li>SuperNICs and BlueField-3 DPUs</li><li>NetQ for observability, WJH for packet-path tracing</li></ul><p style="margin-top:8px"><strong>InfiniBand side:</strong></p><ul><li>Quantum InfiniBand switches</li><li>UFM (Unified Fabric Manager) for topology and routing</li><li>Ansible playbooks + Kubernetes Network Operator for RDMA pod attachment</li></ul></div>';

  html+='</div>'; // end gist-grid
  document.getElementById('gistSection').innerHTML=html;
}

/* ── Domain weight bars ── */
function renderDomains(){
  var html='<div class="gist-divider">Domain Weights</div>';
  html+='<div class="domain-heat">';
  NCP_DOMAINS.forEach(function(d){
    var w=d.weight;
    html+='<div class="dh-card">';
    html+='<div class="dh-pct">'+w+'%</div>';
    html+='<div class="dh-name">'+esc(d.name)+'</div>';
    html+='<div class="dh-bar"><div class="dh-fill" style="width:'+Math.round(w/30*100)+'%"></div></div>';
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('domainSection').innerHTML=html;
}

/* ── Suggested study path ── */
function renderPath(){
  var courses=[
    {name:'InfiniBand Essentials',provider:'NVIDIA DLI',cost:'Free'},
    {name:'InfiniBand Network Administration',provider:'NVIDIA DLI',cost:'$200'},
    {name:'Cumulus Linux Essentials',provider:'NVIDIA DLI',cost:'Free'},
    {name:'Cumulus Linux Administration',provider:'NVIDIA DLI',cost:'$100'},
    {name:'Data Center Management with UFM',provider:'NVIDIA DLI',cost:'$50'},
    {name:'BlueField DPU Administration',provider:'NVIDIA DLI',cost:'$50'}
  ];

  var html='<div class="gist-divider">Suggested Study Path</div>';
  html+='<div class="gist-card" style="margin-bottom:var(--s-xl)">';
  html+='<h3>Official NVIDIA Courses</h3>';
  html+='<ul class="path-list">';
  courses.forEach(function(c,i){
    html+='<li class="path-item">';
    html+='<span class="path-num">'+(i+1)+'</span>';
    html+='<div class="path-body">';
    html+='<div class="path-name">'+esc(c.name)+'</div>';
    html+='<div class="path-meta">'+esc(c.provider)+' &nbsp; <span class="path-cost">'+esc(c.cost)+'</span></div>';
    html+='</div>';
    html+='</li>';
  });
  html+='</ul>';
  html+='<p style="margin-top:12px;font-family:var(--font-body);font-size:.8rem;color:var(--ink-muted)">After completing the courses, reinforce with hands-on labs on this site (links below).</p>';
  html+='</div>';
  document.getElementById('pathSection').innerHTML=html;
}

/* ── Tool tiles ── */
function renderTools(){
  var tiles=[
    {t:'Pillars',h:'ncp-ain-pillars.html'},
    {t:'InfiniBand Diagnostics Lab',h:'ncp-ain-ib-lab.html'},
    {t:'Spectrum-X / NVUE Lab',h:'ncp-ain-spectrum-lab.html'},
    {t:'Perf Validation Lab',h:'ncp-ain-perf-lab.html'},
    {t:'WJH Drop Analysis Lab',h:'ncp-ain-wjh-lab.html'}
  ];

  var html='<div class="gist-divider">Labs and Tools</div>';
  html+='<div class="gist-tiles">';
  tiles.forEach(function(tile){
    html+='<a class="gist-tile" href="'+esc(tile.h)+'">'+esc(tile.t)+'</a>';
  });
  html+='</div>';
  document.getElementById('toolSection').innerHTML=html;
}

/* ── Resource hub: docs, hands-on sims, deep reading, video, practice ── */
function renderResources(){
  function linkCard(title,items){
    var h='<div class="gist-card"><h3>'+esc(title)+'</h3><ul>';
    items.forEach(function(it){
      h+='<li><a href="'+esc(it.h)+'" target="_blank" rel="noopener" style="color:var(--ncp);text-decoration:none;font-weight:600">'+esc(it.t)+' &#8599;</a>';
      if(it.note) h+=' <span style="color:var(--ink-muted)">'+esc(it.note)+'</span>';
      h+='</li>';
    });
    h+='</ul></div>';
    return h;
  }

  var html='<div class="gist-divider">Resource Hub</div>';
  html+='<div class="gist-grid">';

  html+=linkCard('Docs and References',[
    {t:'Cumulus Linux 5.x User Guide',h:'https://docs.nvidia.com/networking-ethernet-software/cumulus-linux/',note:'NVUE, QoS, EVPN'},
    {t:'NVUE CLI Reference',h:'https://docs.nvidia.com/networking-ethernet-software/cumulus-linux/System-Configuration/NVIDIA-User-Experience-NVUE/'},
    {t:'UFM Enterprise User Manual',h:'https://docs.nvidia.com/networking/display/ufmenterpriseumv6231',note:'fabric mgmt'},
    {t:'IB Cluster Bring-Up Procedure',h:'https://docs.nvidia.com/networking/display/infinibandclusterbringupprocedure/mlnx_ofed-installation'},
    {t:'BlueField / DOCA Hub',h:'https://docs.nvidia.com/networking/dpu-doca/index.html'}
  ]);

  html+=linkCard('Hands-On (Free)',[
    {t:'DSX Air',h:'https://dsx-air.nvidia.com',note:'free sim: Spectrum-X + Cumulus + NetQ (needs NGC login)'},
    {t:'NVIDIA LaunchPad',h:'https://www.nvidia.com/en-us/launchpad/',note:'time-boxed real stacks'},
    {t:'Cisco U: DCAIE',h:'https://u.cisco.com/',note:'Data Center AI Essentials, free, RDMA/RoCE lessons, 34 CE credits'},
    {t:'DC Lab Sim',h:'https://www.dclabsim.com',note:'NCP-AII focus, IB/troubleshoot overlap'}
  ]);

  html+=linkCard('Deep Reading',[
    {t:'Spectrum-X: Optimize Large-Scale AI Workloads',h:'https://developer.nvidia.com/blog/optimize-large-scale-ai-workloads-with-nvidia-spectrum-x/'},
    {t:'Spectrum-X Architecture Whitepaper',h:'https://resources.nvidia.com/en-us-accelerated-networking-resource-library/nvidia-spectrum-x',note:'form-gated'},
    {t:'DGX SuperPOD B300 Reference Arch',h:'https://docs.nvidia.com/dgx-superpod/reference-architecture/scalable-infrastructure-b300/latest/index.html'}
  ]);

  html+=linkCard('Video',[
    {t:'GTC: Wired for AI (100K+ GPU lessons)',h:'https://www.nvidia.com/en-us/on-demand/session/gtc25-s71145/'},
    {t:'GTC: New Frontier of AI Networking',h:'https://www.nvidia.com/en-us/on-demand/session/gtc24-s62293/'},
    {t:'Networking for the Era of AI (webinar)',h:'https://info.nvidia.com/networking-for-ai-webinar.html'}
  ]);

  html+='</div>'; // end grid

  // Proven study path (from people who passed the NVIDIA AI cert family)
  html+='<div class="gist-card" style="margin-top:16px;border-color:var(--ncp)">';
  html+='<h3>Proven Study Path</h3>';
  html+='<p style="margin-bottom:8px">What people who passed the NVIDIA AI certs actually did (NCP-AIN is new, so this mirrors the NCA-AIIO / NCP-AIO playbook):</p>';
  html+='<ul class="path-list">';
  var plan=[
    {n:'Watch NVIDIA Academy self-paced courses at 2x speed', m:'IB Essentials + Cumulus + Spectrum-X; ~2 weeks if focused'},
    {n:'Feed the slides into NotebookLM', m:'auto-generated podcasts for the commute, fast breakdowns'},
    {n:'Drill the pillars + Daily Drill on this app', m:'timed recall, spaced over days'},
    {n:'Run the console labs in scenario mode', m:'IB diag, NVUE, perf, WJH; the hands-on most candidates lack'},
    {n:'Get hands-on time in DSX Air or LaunchPad', m:'real Spectrum-X / Cumulus before the exam'},
    {n:'Practice questions, then schedule the exam', m:'aim 85pct+ on a bank before booking ($400, Certiverse)'}
  ];
  plan.forEach(function(s,i){
    html+='<li class="path-item"><span class="path-num">'+(i+1)+'</span><div class="path-body"><div class="path-name">'+esc(s.n)+'</div><div class="path-meta">'+esc(s.m)+'</div></div></li>';
  });
  html+='</ul></div>';

  document.getElementById('resourceSection').innerHTML=html;
}

/* ── Official blueprint link ── */
function renderBlueprint(){
  var html='<div class="gist-divider">Official Blueprint</div>';
  html+='<div style="margin-bottom:var(--s-lg)">';
  html+='<a class="blueprint-btn" href="https://www.nvidia.com/en-us/learn/certification/ai-networking-professional/" target="_blank" rel="noopener">NCP-AIN Exam Page &#8599;</a>';
  html+='</div>';
  document.getElementById('blueprintSection').innerHTML=html;
}

/* ── Boot ── */
renderGist();
renderDomains();
renderPath();
renderTools();
renderResources();
renderBlueprint();

});</script>
<script defer src="js/tutor.js"></script>
</body>
</html>
