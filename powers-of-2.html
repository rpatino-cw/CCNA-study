<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Powers of 2 — CCNA</title>
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<link rel="stylesheet" href="css/mobile-game.css?v=1">
<style>
.game-wrap{max-width:480px;margin:0 auto;padding:14px 14px 80px}
.title{font-family:var(--font-display);font-weight:700;font-size:1.3rem;text-align:center;margin:6px 0}
.sub{text-align:center;font-family:var(--font-body);font-style:italic;color:var(--ink-muted);font-size:.85rem;margin-bottom:10px}
.hud{display:flex;justify-content:space-between;margin-bottom:10px;font-family:var(--font-mono);font-size:.78rem}
.hud .stat{display:flex;flex-direction:column;align-items:center;flex:1}
.hud .stat .v{font-family:var(--font-display);font-size:1.2rem;font-weight:700;color:var(--accent)}
.hud .stat .l{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted)}
.modes{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.mode{padding:6px 11px;border:1.5px solid var(--border);border-radius:100px;background:var(--bg-surface);cursor:pointer;font-family:var(--font-display);font-size:.66rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-secondary)}
.mode.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.q-card{background:var(--bg-surface);border:2px solid var(--accent);border-radius:14px;padding:22px 18px;text-align:center;margin-bottom:14px;min-height:130px;display:flex;flex-direction:column;justify-content:center}
.q-tag{font-family:var(--font-display);font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:6px}
.q-prompt{font-family:var(--font-body);font-style:italic;color:var(--ink-secondary);font-size:.92rem;margin-bottom:10px}
.q-value{font-family:var(--font-display);font-size:2.4rem;font-weight:700;color:var(--ink);letter-spacing:.01em;line-height:1}
.q-value sup{font-size:1.4rem;vertical-align:super}
.q-value .hint{display:block;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted);margin-top:6px;font-weight:400;letter-spacing:0}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.choice{padding:18px 10px;border:2px solid var(--border);border-radius:12px;background:var(--bg-surface);font-family:var(--font-mono);font-size:1.1rem;font-weight:700;cursor:pointer;text-align:center;transition:transform .12s}
.choice:active{transform:scale(.97)}
.choice.right{background:#dcfce7;border-color:#15803d;color:#14532d}
.choice.wrong{background:#fee2e2;border-color:#b91c1c;color:#7f1d1d}
.choice.show-correct{background:#fef9c3;border-color:#ca8a04}
.fb{text-align:center;font-family:var(--font-mono);font-size:.82rem;margin:8px 0;min-height:18px;color:var(--ink-muted)}
.btns{display:flex;gap:10px;justify-content:center}
.btns button{padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--bg-surface);font-family:var(--font-display);font-weight:700;font-size:.85rem;cursor:pointer}
.over{text-align:center;padding:24px}
.over h2{font-family:var(--font-display);font-size:1.5rem;margin-bottom:8px}
.over .score{font-family:var(--font-mono);font-size:2rem;color:var(--accent);font-weight:700;margin:14px 0}
.over button{padding:14px 28px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-family:var(--font-display);font-weight:700;cursor:pointer}
.over .breakdown{font-family:var(--font-mono);font-size:.78rem;color:var(--ink-secondary);margin:14px 0;line-height:1.7}
</style>
</head>
<body>
<nav class="top-nav"></nav>
<div class="game-wrap" id="wrap">
  <div class="title">Powers of 2</div>
  <div class="sub">Memorize the table. CCNA subnetting demands it.<br><a href="math-drill.html" style="color:var(--accent);font-family:var(--font-display);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;text-decoration:none;font-style:normal">Need typed-input + walkthrough? → Math Drill</a></div>
  <div class="hud">
    <div class="stat"><div class="v" id="score">0</div><div class="l">Score</div></div>
    <div class="stat"><div class="v" id="streak">0</div><div class="l">Streak</div></div>
    <div class="stat"><div class="v" id="round">1/20</div><div class="l">Round</div></div>
    <div class="stat"><div class="v" id="best">0</div><div class="l">Best</div></div>
  </div>
  <div class="modes" id="modes"></div>
  <div class="q-card" id="qCard"></div>
  <div class="choices" id="choices"></div>
  <div class="fb" id="fb">&nbsp;</div>
  <div class="btns"><button onclick="newGame()">Restart</button></div>
</div>
<script defer src="js/store.js"></script>
<script defer src="js/nav.js"></script>
<script defer src="js/tutor.js?v=7.17.7"></script>
<script defer src="js/mobile-lights.js?v=1"></script>
<script>document.addEventListener('DOMContentLoaded',function(){
const KEY='ccna_pow2_v1';
const ROUNDS=20;
let score=0,streak=0,round=0,best=parseInt(localStorage.getItem(KEY+'_best')||'0'),locked=false,current=null;
let activeModes={fwd:true,rev:true,hosts:true,bits:true,div:true};

const MODES=[
  {k:'fwd',label:'2^N → val'},
  {k:'rev',label:'val → 2^N'},
  {k:'hosts',label:'/N → hosts'},
  {k:'bits',label:'hosts → /N'},
  {k:'div',label:'256 ÷ N (block)'}
];

function buzz(ms){if(navigator.vibrate)try{navigator.vibrate(ms)}catch(e){}}
function pow2(n){return n>=53?Number.MAX_SAFE_INTEGER:Math.pow(2,n)}
function fmt(n){return n.toLocaleString()}

// Generate 4 unique choices given correct answer + range/type
function buildChoices(correct,type){
  const set=new Set([String(correct)]);
  while(set.size<4){
    let cand;
    if(type==='val'){
      // wrong answers near the correct value (off by power)
      const exp=Math.round(Math.log2(correct));
      const variations=[exp-1,exp+1,exp-2,exp+2];
      cand=pow2(variations[Math.floor(Math.random()*variations.length)]);
      if(cand<1||cand===correct)cand=Math.max(1,correct*2);
    }else if(type==='exp'){
      const off=[1,2,-1,-2,3,-3];
      cand=correct+off[Math.floor(Math.random()*off.length)];
      if(cand<0||cand>32)cand=correct+1;
    }else if(type==='prefix'){
      const off=[1,2,-1,-2];
      cand=correct+off[Math.floor(Math.random()*off.length)];
      if(cand<8||cand>30)cand=correct+1;
    }
    if(cand!==correct)set.add(String(cand));
  }
  const arr=Array.from(set);for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
  return arr;
}

function genQ(){
  const enabled=Object.keys(activeModes).filter(k=>activeModes[k]);
  if(enabled.length===0){activeModes.fwd=true;return genQ()}
  const mode=enabled[Math.floor(Math.random()*enabled.length)];
  if(mode==='fwd'){
    // 2^N → value. CCNA-relevant N: 1..24 weighted toward 1..16
    const n=1+Math.floor(Math.random()*24);
    const correct=pow2(n);
    return {mode:'fwd',tag:'Forward',prompt:'What is 2 to the power of '+n+'?',valueHTML:'2<sup>'+n+'</sup>',hint:null,correct:correct,choices:buildChoices(correct,'val'),why:'2^'+n+' = '+fmt(correct)};
  }
  if(mode==='rev'){
    const n=2+Math.floor(Math.random()*22); // 2..23
    const correct=n;
    const val=pow2(n);
    return {mode:'rev',tag:'Reverse',prompt:'Which power of 2 equals this?',valueHTML:fmt(val),hint:null,correct:correct,choices:buildChoices(correct,'exp').map(c=>'2^'+c),correctChoice:'2^'+correct,why:fmt(val)+' = 2^'+n};
  }
  if(mode==='hosts'){
    // /N → 2^(32-N)-2 usable hosts. Pick /8../30
    const p=8+Math.floor(Math.random()*23);
    const hostBits=32-p;
    const correct=Math.max(0,pow2(hostBits)-2);
    return {mode:'hosts',tag:'Usable hosts',prompt:'How many usable host addresses?',valueHTML:'/'+p,hint:'(2^'+hostBits+' − 2)',correct:correct,choices:buildChoices(correct,'val'),why:'/'+p+' has 2^'+hostBits+' − 2 = '+fmt(correct)+' usable hosts'};
  }
  if(mode==='bits'){
    // X hosts needed → smallest /N. Pick from CCNA-realistic counts
    const targets=[2,6,14,30,62,126,254,510,1022,2046,4094,8190,50,100,200,500,1000,5000];
    const need=targets[Math.floor(Math.random()*targets.length)];
    let h=0;while(pow2(h)-2<need)h++;
    const correctP=32-h;
    return {mode:'bits',tag:'Smallest prefix',prompt:'Smallest prefix that fits at least '+fmt(need)+' usable hosts?',valueHTML:fmt(need)+'<span class="hint">hosts needed</span>',hint:null,correct:correctP,choices:buildChoices(correctP,'prefix').map(c=>'/'+c),correctChoice:'/'+correctP,why:'2^'+h+' − 2 = '+fmt(pow2(h)-2)+' ≥ '+fmt(need)+' → /'+correctP};
  }
  if(mode==='div'){
    // Magic-number block size: 256 / 2^k for k=1..8 → 128,64,32,16,8,4,2,1
    // Two flavors:
    //   a) "256 ÷ N = ?"  (N is power-of-2 subnet count)
    //   b) "/N → block size in last octet" (works for /25../30 in 4th octet, /17../24 in 3rd, etc.)
    const flavor=Math.random()<0.5?'a':'b';
    if(flavor==='a'){
      const k=1+Math.floor(Math.random()*8); // 1..8
      const divisor=pow2(k);
      const correct=256/divisor;
      return {mode:'div',tag:'Block size',prompt:'Magic number — what is 256 divided by '+divisor+'?',valueHTML:'256 ÷ '+divisor,hint:'block size for '+divisor+' subnets',correct:correct,choices:buildChoices(correct,'val'),why:'256 ÷ '+divisor+' = '+correct+' (block size, '+divisor+' subnets)'};
    }else{
      // /N in 4th octet → block. /25=128, /26=64, /27=32, /28=16, /29=8, /30=4, /31=2, /32=1
      const p=25+Math.floor(Math.random()*6); // /25../30
      const correct=pow2(32-p);
      return {mode:'div',tag:'Block size',prompt:'Block size in the 4th octet for this prefix?',valueHTML:'/'+p,hint:'2^(32−'+p+')',correct:correct,choices:buildChoices(correct,'val'),why:'/'+p+' → 2^'+(32-p)+' = '+correct+' (jumps of '+correct+' in last octet)'};
    }
  }
}

function renderModes(){
  const wrap=document.getElementById('modes');wrap.innerHTML='';
  MODES.forEach(m=>{
    const b=document.createElement('button');b.className='mode'+(activeModes[m.k]?' active':'');b.textContent=m.label;b.dataset.k=m.k;
    b.onclick=()=>{activeModes[m.k]=!activeModes[m.k];if(!Object.values(activeModes).some(v=>v)){activeModes[m.k]=true}b.classList.toggle('active',activeModes[m.k])};
    wrap.appendChild(b);
  });
}

function render(){
  const card=document.getElementById('qCard');
  card.innerHTML='<div class="q-tag">'+current.tag+'</div>'+
    '<div class="q-prompt">'+current.prompt+'</div>'+
    '<div class="q-value">'+current.valueHTML+(current.hint?'<span class="hint">'+current.hint+'</span>':'')+'</div>';
  const ch=document.getElementById('choices');ch.innerHTML='';
  current.choices.forEach(c=>{
    const d=document.createElement('div');d.className='choice';
    d.textContent=current.mode==='fwd'||current.mode==='hosts'?fmt(parseInt(c)):c;
    d.dataset.val=c;
    d.onclick=()=>pick(c);
    ch.appendChild(d);
  });
  document.getElementById('round').textContent=(round+1)+'/'+ROUNDS;
  document.getElementById('score').textContent=score;
  document.getElementById('streak').textContent=streak;
  document.getElementById('best').textContent=best;
  document.getElementById('fb').textContent=' ';
  locked=false;
}

function pick(val){
  if(locked)return;locked=true;
  const correctVal=current.correctChoice||String(current.correct);
  const correct=String(val)===correctVal;
  document.querySelectorAll('.choice').forEach(el=>{
    if(el.dataset.val===correctVal&&!correct)el.classList.add('show-correct');
    if(el.dataset.val===String(val))el.classList.add(correct?'right':'wrong');
  });
  if(correct){score+=10+streak*2;streak++;if(score>best){best=score;localStorage.setItem(KEY+'_best',best)}buzz(15);document.getElementById('fb').textContent='✓ '+current.why;document.getElementById('fb').style.color='#15803d'}
  else{streak=0;buzz([40,30,40]);document.getElementById('fb').textContent='✗ '+current.why;document.getElementById('fb').style.color='#b91c1c'}
  round++;
  setTimeout(()=>{if(round>=ROUNDS)return finish();current=genQ();render()},1200);
}

function finish(){
  document.getElementById('wrap').innerHTML='<div class="over"><h2>Drill complete</h2>'+
    '<div class="score">'+score+' pts</div>'+
    '<div class="breakdown">Best: '+best+' · Final streak: '+streak+'</div>'+
    '<button onclick="location.reload()">Play again</button>'+
    '<div style="margin-top:20px"><a href="practice-hub.html" style="color:var(--accent);font-family:var(--font-display);text-decoration:none">← Practice Hub</a></div></div>';
}

window.newGame=function(){score=0;streak=0;round=0;current=genQ();renderModes();render()}
newGame();
});</script>
</body>
</html>
