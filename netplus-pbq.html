<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBQs — Network+ Practice</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/netplus.css">
<style>
/* ═══════════════════════════════════════════════════════════════════
   PBQ Engine — Multi-Task Performance-Based Questions
   ═══════════════════════════════════════════════════════════════════ */

/* ── PBQ Selector ──────────────────────────────────────────────── */
.pbq-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:var(--s-lg)}
.pbq-sel-btn{font-family:var(--font-mono);font-size:.72rem;font-weight:600;padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-surface);color:var(--ink-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
.pbq-sel-btn:hover{border-color:var(--np);color:var(--np)}
.pbq-sel-btn.active{background:var(--np);color:#fff;border-color:var(--np)}
.pbq-sel-btn.completed{background:var(--prof-strong-bg);color:var(--prof-strong);border-color:var(--prof-strong)}
.pbq-sel-btn.partial{background:var(--prof-mid-bg);color:var(--prof-mid);border-color:var(--prof-mid)}

/* ── Score Bar ─────────────────────────────────────────────────── */
.score-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:var(--s-lg)}
.score-bar .score-label{font-family:var(--font-display);font-size:.78rem;font-weight:600;color:var(--ink-secondary);text-transform:uppercase;letter-spacing:.04em}
.score-bar .score-val{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;color:var(--np)}
.score-bar .score-pct{font-family:var(--font-mono);font-size:.78rem;color:var(--ink-muted);margin-left:8px}
.score-bar .score-progress{flex:1;max-width:200px;height:6px;background:var(--bg-recessed);border-radius:3px;overflow:hidden;margin:0 16px}
.score-bar .score-fill{height:100%;border-radius:3px;background:var(--np);transition:width .5s ease}
.score-actions{display:flex;gap:8px}

/* ── PBQ Card ──────────────────────────────────────────────────── */
.pbq-card{background:var(--bg-surface);border:2px solid var(--border);border-radius:var(--radius-lg);padding:28px;margin-bottom:var(--s-lg)}
.pbq-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--s-md);flex-wrap:wrap;gap:8px}
.pbq-title{font-family:var(--font-display);font-size:1.15rem;font-weight:700;color:var(--ink)}
.pbq-obj-tags{display:flex;flex-wrap:wrap;gap:4px}
.pbq-obj{font-family:var(--font-mono);font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:3px;background:var(--np-dim);color:var(--np);text-transform:uppercase;letter-spacing:.06em}

/* ── Scenario Box ──────────────────────────────────────────────── */
.scenario-wrap{margin-bottom:var(--s-lg)}
.scenario-label{font-family:var(--font-display);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);margin-bottom:6px}
.scenario-box{background:#0d0d1a;color:#a7f3d0;font-family:var(--font-mono);font-size:.74rem;padding:16px 20px;border-radius:var(--radius-lg);overflow-x:auto;line-height:1.7;white-space:pre;border:1px solid #1a1a2e}

/* ── Task Progress ─────────────────────────────────────────────── */
.task-progress{display:flex;gap:4px;margin-bottom:var(--s-lg);align-items:center}
.task-pip{flex:1;height:6px;border-radius:3px;background:var(--bg-recessed);transition:background .3s}
.task-pip.done{background:var(--prof-strong)}
.task-pip.wrong{background:var(--prof-weak)}
.task-pip.current{background:var(--np);box-shadow:0 0 6px rgba(var(--np-rgb),.4)}
.task-counter{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);margin-left:10px;white-space:nowrap}

/* ── Task Section ──────────────────────────────────────────────── */
.task-section{padding:20px;border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;transition:border-color .2s,background .2s}
.task-section.active-task{border-color:var(--np);background:rgba(var(--np-rgb),.02)}
.task-section.task-correct{border-color:var(--prof-strong);background:var(--prof-strong-bg)}
.task-section.task-wrong{border-color:var(--prof-weak);background:var(--prof-weak-bg)}
.task-section.task-locked{opacity:.5;pointer-events:none}
.task-label{font-family:var(--font-display);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--np);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.task-label .task-status{font-size:.65rem;padding:2px 6px;border-radius:3px;font-weight:700}
.task-label .task-status.pass{background:var(--prof-strong-bg);color:var(--prof-strong)}
.task-label .task-status.fail{background:var(--prof-weak-bg);color:var(--prof-weak)}
.task-prompt{font-family:var(--font-body);font-size:.9rem;line-height:1.6;color:var(--ink);margin-bottom:12px;max-width:70ch}

/* ── Terminal Input ────────────────────────────────────────────── */
.terminal-wrap{background:#0d0d1a;border-radius:var(--radius-lg);overflow:hidden;border:1px solid #1a1a2e;margin-bottom:8px}
.terminal-output{color:#a7f3d0;font-family:var(--font-mono);font-size:.74rem;padding:12px 16px;line-height:1.7;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.terminal-output .cmd-echo{color:#e2e8f0}
.terminal-output .err-text{color:#f87171}
.terminal-output .success-text{color:#34d399}
.terminal-input-row{display:flex;align-items:center;padding:8px 16px;border-top:1px solid #1a1a2e;background:#0a0a16}
.terminal-prompt-char{color:#a7f3d0;font-family:var(--font-mono);font-size:.74rem;margin-right:8px;user-select:none}
.terminal-input{flex:1;background:transparent;border:none;color:#e2e8f0;font-family:var(--font-mono);font-size:.74rem;outline:none;caret-color:#a7f3d0}
.terminal-input::placeholder{color:#4a5568}
.terminal-submit{background:transparent;border:1px solid #2d3748;color:#a7f3d0;font-family:var(--font-mono);font-size:.68rem;padding:4px 10px;border-radius:3px;cursor:pointer;margin-left:8px;transition:all .15s}
.terminal-submit:hover{background:#1a1a2e;border-color:#a7f3d0}

/* ── Fill-in Fields ────────────────────────────────────────────── */
.fill-grid{display:grid;gap:8px;margin-bottom:8px}
.fill-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;padding:10px 14px;background:var(--bg-recessed);border-radius:var(--radius);border:1px solid transparent}
.fill-row.correct-row{border-color:var(--prof-strong);background:var(--prof-strong-bg)}
.fill-row.wrong-row{border-color:var(--prof-weak);background:var(--prof-weak-bg)}
.fill-label{font-family:var(--font-display);font-size:.82rem;font-weight:500;color:var(--ink)}
.fill-input{font-family:var(--font-mono);font-size:.82rem;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-input);color:var(--ink);transition:border-color .15s}
.fill-input:focus{border-color:var(--np);outline:none}
.fill-input.correct-input{border-color:var(--prof-strong);background:var(--prof-strong-bg)}
.fill-input.wrong-input{border-color:var(--prof-weak);background:var(--prof-weak-bg)}
.fill-correct-answer{font-family:var(--font-mono);font-size:.72rem;color:var(--prof-strong);margin-top:2px}

/* ── Multi-select Checkboxes ───────────────────────────────────── */
.multi-select{display:flex;flex-direction:column;gap:6px}
.ms-option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;font-family:var(--font-body);font-size:.88rem;line-height:1.5}
.ms-option:hover{border-color:var(--np);background:rgba(var(--np-rgb),.03)}
.ms-option.selected{border-color:var(--np);background:rgba(var(--np-rgb),.06)}
.ms-option.correct-pick{border-color:var(--prof-strong);background:var(--prof-strong-bg)}
.ms-option.wrong-pick{border-color:var(--prof-weak);background:var(--prof-weak-bg)}
.ms-option.missed{border-color:var(--prof-mid);background:var(--prof-mid-bg)}
.ms-option.locked{pointer-events:none}
.ms-check{width:18px;height:18px;border:2px solid var(--border-strong);border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:.7rem;font-weight:700}
.ms-option.selected .ms-check{border-color:var(--np);background:var(--np);color:#fff}
.ms-option.correct-pick .ms-check{border-color:var(--prof-strong);background:var(--prof-strong);color:#fff}
.ms-option.wrong-pick .ms-check{border-color:var(--prof-weak);background:var(--prof-weak);color:#fff}
.ms-option.missed .ms-check{border-color:var(--prof-mid);background:var(--prof-mid);color:#fff}
.ms-hint{font-family:var(--font-display);font-size:.72rem;color:var(--ink-muted);font-style:italic;margin-bottom:6px}

/* ── Single-select Radio ───────────────────────────────────────── */
.single-select{display:flex;flex-direction:column;gap:6px}
.ss-option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;font-family:var(--font-body);font-size:.88rem;line-height:1.5}
.ss-option:hover{border-color:var(--np);background:rgba(var(--np-rgb),.03)}
.ss-option.selected{border-color:var(--np);background:rgba(var(--np-rgb),.06)}
.ss-option.correct-pick{border-color:var(--prof-strong);background:var(--prof-strong-bg)}
.ss-option.wrong-pick{border-color:var(--prof-weak);background:var(--prof-weak-bg)}
.ss-option.locked{pointer-events:none}
.ss-radio{width:18px;height:18px;border:2px solid var(--border-strong);border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ss-option.selected .ss-radio{border-color:var(--np)}
.ss-option.selected .ss-radio::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--np)}
.ss-option.correct-pick .ss-radio{border-color:var(--prof-strong)}
.ss-option.correct-pick .ss-radio::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--prof-strong)}
.ss-option.wrong-pick .ss-radio{border-color:var(--prof-weak)}
.ss-option.wrong-pick .ss-radio::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--prof-weak)}

/* ── Sequencer (drag-to-order) ─────────────────────────────────── */
.seq-list{display:flex;flex-direction:column;gap:4px;counter-reset:seq}
.seq-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-surface);cursor:grab;transition:all .15s;font-family:var(--font-body);font-size:.88rem}
.seq-item:active{cursor:grabbing;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.seq-item.correct-seq{border-color:var(--prof-strong);background:var(--prof-strong-bg)}
.seq-item.wrong-seq{border-color:var(--prof-weak);background:var(--prof-weak-bg)}
.seq-item.locked{pointer-events:none}
.seq-num{counter-increment:seq;font-family:var(--font-mono);font-size:.72rem;font-weight:700;width:24px;height:24px;border-radius:50%;background:var(--bg-recessed);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink-secondary)}
.seq-num::before{content:counter(seq)}
.seq-grip{color:var(--ink-muted);font-size:.8rem;cursor:grab;user-select:none}
.seq-arrows{display:flex;flex-direction:column;gap:0}
.seq-arrows button{background:none;border:none;cursor:pointer;font-size:.65rem;padding:0 4px;color:var(--ink-muted);line-height:1}
.seq-arrows button:hover{color:var(--np)}

/* ── Feedback ──────────────────────────────────────────────────── */
.task-feedback{font-family:var(--font-body);font-size:.82rem;line-height:1.6;padding:10px 14px;border-radius:var(--radius);margin-top:8px;display:none}
.task-feedback.show{display:block}
.task-feedback.correct-fb{background:var(--prof-strong-bg);color:#166534;border-left:3px solid var(--prof-strong)}
.task-feedback.wrong-fb{background:var(--prof-weak-bg);color:#991b1b;border-left:3px solid var(--prof-weak)}

/* ── Check All Button ──────────────────────────────────────────── */
.check-all-wrap{text-align:center;margin-top:var(--s-lg);margin-bottom:var(--s-lg)}
.check-all-btn{font-family:var(--font-display);font-size:.88rem;font-weight:700;padding:12px 32px;background:var(--np);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;transition:all .15s;letter-spacing:.02em}
.check-all-btn:hover{background:var(--np-dark);transform:translateY(-1px)}
.check-all-btn:disabled{background:var(--ink-muted);cursor:default;transform:none}
.pbq-result{font-family:var(--font-display);font-size:.95rem;font-weight:600;text-align:center;padding:14px;border-radius:var(--radius-lg);margin-top:var(--s-md)}
.pbq-result.pass{background:var(--prof-strong-bg);color:var(--prof-strong);border:1px solid var(--prof-strong)}
.pbq-result.fail{background:var(--prof-weak-bg);color:var(--prof-weak);border:1px solid var(--prof-weak)}

/* ── Channel Plan Grid ─────────────────────────────────────────── */
.channel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
@media(max-width:600px){.channel-grid{grid-template-columns:1fr 1fr}}
.channel-cell{padding:10px;border:1px solid var(--border);border-radius:var(--radius);text-align:center}
.channel-cell .ap-name{font-family:var(--font-display);font-size:.78rem;font-weight:600;color:var(--ink);margin-bottom:6px}
.channel-cell select{font-family:var(--font-mono);font-size:.8rem;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-input)}
.channel-cell.correct-row{border-color:var(--prof-strong);background:var(--prof-strong-bg)}
.channel-cell.wrong-row{border-color:var(--prof-weak);background:var(--prof-weak-bg)}

/* ── Zone Layout ───────────────────────────────────────────────── */
.zone-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.zone-cell{padding:12px;border:2px dashed var(--border);border-radius:var(--radius);text-align:center}
.zone-cell .zone-name{font-family:var(--font-display);font-size:.78rem;font-weight:600;color:var(--ink);margin-bottom:6px}
.zone-cell select{font-family:var(--font-mono);font-size:.8rem;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-input)}

/* ── Responsive ────────────────────────────────────────────────── */
@media(max-width:600px){
  .pbq-card{padding:16px}
  .task-section{padding:14px}
  .fill-row{grid-template-columns:1fr;gap:4px}
  .score-bar{flex-wrap:wrap;gap:8px}
  .score-bar .score-progress{max-width:100%;order:10;flex-basis:100%}
  .zone-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
  <nav class="top-nav"></nav>
  <header class="page-header">
    <h1>Performance-Based Questions</h1>
    <p class="subtitle">Complex multi-task scenarios matching the real N10-009 exam. Each PBQ tests multiple objectives simultaneously.</p>
  </header>

  <!-- Score Bar -->
  <div class="score-bar">
    <div>
      <span class="score-label">Total Score</span>
    </div>
    <div class="score-progress"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
    <span class="score-val" id="scoreVal">0</span>
    <span class="score-pct" id="scorePct">/ 0 pts</span>
    <div class="score-actions">
      <button class="btn btn-sm btn-secondary" id="resetAllBtn" style="font-family:var(--font-display)">Reset All</button>
    </div>
  </div>

  <!-- PBQ Selector -->
  <div class="pbq-selector" id="pbqSelector"></div>

  <!-- PBQ Content Area -->
  <div id="pbqArea"></div>
</div>

<script src="js/nav.js"></script>
<script src="js/tutor.js"></script>
<script src="js/group-chat.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════
   PBQ ENGINE — Multi-Task Performance-Based Questions
   ═══════════════════════════════════════════════════════════════════ */
(function(){
'use strict';

/* ── Utility ───────────────────────────────────────────────────── */
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function norm(s){return s.replace(/\s+/g,' ').trim().toLowerCase();}
function $(id){return document.getElementById(id);}

/* ══════════════════════════════════════════════════════════════════
   PBQ DATA — 10 Complex Multi-Task PBQs
   ══════════════════════════════════════════════════════════════════ */

var PBQS = [

/* ────────────────────────────────────────────────────────────────
   PBQ 1: Network Troubleshooting Workstation
   Obj 5.1, 5.3, 5.5
   ──────────────────────────────────────────────────────────────── */
{
  id: 'pbq1',
  title: 'Network Troubleshooting Workstation',
  objectives: ['5.1','5.3','5.5'],
  scenario: 'A user at workstation WS-042 reports they cannot access the internet or any internal resources.\nYou sit down at their machine and open a command prompt.\nYou need to systematically diagnose and resolve the issue.',
  tasks: [
    {
      type: 'terminal',
      label: 'Task 1',
      prompt: 'Type the correct command to check the workstation\'s current IP configuration.',
      accepts: ['ipconfig','ipconfig /all','ip a','ifconfig'],
      output: function(cmd) {
        var c = norm(cmd);
        if (c === 'ipconfig' || c === 'ipconfig /all') {
          return 'Windows IP Configuration\n\nEthernet adapter Local Area Connection:\n\n   Connection-specific DNS Suffix  . :\n   Autoconfiguration IPv4 Address. . : 169.254.45.12\n   Subnet Mask . . . . . . . . . . . : 255.255.0.0\n   Default Gateway . . . . . . . . . :';
        }
        return null;
      },
      points: 2
    },
    {
      type: 'single',
      label: 'Task 2',
      prompt: 'Based on the ipconfig output above (169.254.45.12), what is the root cause of the connectivity issue?',
      options: [
        'The DNS server is offline',
        'The workstation has an APIPA address — DHCP failed to assign an IP',
        'The default gateway was manually cleared',
        'There is a duplicate IP address on the network'
      ],
      answer: 1,
      feedback: '169.254.x.x is an APIPA (Automatic Private IP Addressing) address. This means the workstation\'s DHCP request went unanswered — no DHCP server responded within the timeout.',
      points: 2
    },
    {
      type: 'terminal',
      label: 'Task 3',
      prompt: 'Type the commands to release and renew the DHCP lease (type both, separated by Enter).',
      accepts: ['ipconfig /release','ipconfig /renew'],
      multiCmd: true,
      output: function(cmd) {
        var c = norm(cmd);
        if (c === 'ipconfig /release') return 'Ethernet adapter Local Area Connection:\n\n   IPv4 Address. . . . . . . . . . . : 0.0.0.0\n   Subnet Mask . . . . . . . . . . . : 0.0.0.0\n   Default Gateway . . . . . . . . . :';
        if (c === 'ipconfig /renew') return 'An error occurred while renewing interface Local Area Connection:\n   The DHCP server could not be contacted. Request has timed out.';
        return null;
      },
      points: 3
    },
    {
      type: 'multi',
      label: 'Task 4',
      prompt: 'The DHCP renew failed again. Select ALL items you should check next (select all that apply):',
      options: [
        'Verify the physical cable connection and link light on the NIC',
        'Check if the DHCP server service is running',
        'Restart the web browser',
        'Check the switch port status for the user\'s port',
        'Verify DHCP scope has available addresses',
        'Change the monitor resolution'
      ],
      answers: [0,1,3,4],
      feedback: 'When DHCP fails after release/renew: check Layer 1 (cable/link light), verify DHCP server is running, check the switch port isn\'t shut down, and confirm the DHCP scope isn\'t exhausted. Browser and monitor are irrelevant.',
      points: 4
    },
    {
      type: 'single',
      label: 'Task 5',
      prompt: 'You check the switch and find this output:\n\nSwitch# show interface Fa0/12\nFastEthernet0/12 is administratively down, line protocol is down\n  Hardware is Fast Ethernet\n  Last input never, output never\n\nWhat is the issue and how do you fix it?',
      options: [
        'The cable is bad — replace the patch cable',
        'The port is administratively shut down — enter "no shutdown" on the interface',
        'STP is blocking the port — wait for convergence',
        'The port is in err-disabled state — clear the error counter'
      ],
      answer: 1,
      feedback: '"Administratively down" means someone manually shut down the port with the "shutdown" command. The fix is to enter interface config mode and type "no shutdown".',
      points: 2
    }
  ]
},

/* ────────────────────────────────────────────────────────────────
   PBQ 2: Firewall & ACL Configuration
   Obj 4.3, 1.4, 3.4
   ──────────────────────────────────────────────────────────────── */
{
  id: 'pbq2',
  title: 'Firewall & ACL Configuration',
  objectives: ['4.3','1.4','3.4'],
  scenario: 'A new branch office is being deployed. You must configure the firewall rules,\nset up DNS records, and harden the network against a rogue DHCP attack\nthat was reported at another branch.',
  tasks: [
    {
      type: 'fill',
      label: 'Task 1',
      prompt: 'Complete the firewall rule table. For each service, enter the port number and protocol (e.g., "443/TCP"):',
      fields: [
        { label: 'HTTPS (Web Server)', answer: '443/tcp', accepts: ['443/tcp','443/TCP','tcp/443','TCP/443','tcp 443','TCP 443','443 tcp','443 TCP'] },
        { label: 'DNS (Name Resolution)', answer: '53/UDP', accepts: ['53/udp','53/UDP','udp/53','UDP/53','udp 53','UDP 53','53 udp','53 UDP','53/tcp','53/TCP'] },
        { label: 'SMTP (Email Sending)', answer: '25/TCP', accepts: ['25/tcp','25/TCP','tcp/25','TCP/25','tcp 25','TCP 25','25 tcp','25 TCP'] },
        { label: 'RDP (Remote Desktop)', answer: '3389/TCP', accepts: ['3389/tcp','3389/TCP','tcp/3389','TCP/3389','tcp 3389','TCP 3389','3389 tcp','3389 TCP'] },
        { label: 'SSH (Secure Shell)', answer: '22/TCP', accepts: ['22/tcp','22/TCP','tcp/22','TCP/22','tcp 22','TCP 22','22 tcp','22 TCP'] }
      ],
      points: 5
    },
    {
      type: 'multi',
      label: 'Task 2',

{

  title: 'Wireless Network Deployment',

  scenario: 'You are deploying a wireless network across a 3-floor office building.\nEach floor has 2 access points. You must configure channels, security,\nauthentication, and physical requirements.',
  tasks: [
    {
      type: 'channel',
      label: 'Task 1',
      prompt: 'Assign 2.4 GHz channels to the 6 APs. Use only non-overlapping channels (1, 6, 11). Adjacent APs on the same floor must NOT share a channel, and APs directly above/below each other must NOT share a channel.',
      aps: [
        { name: 'Floor 1 — AP-A', floor: 1, pos: 'left' },
        { name: 'Floor 1 — AP-B', floor: 1, pos: 'right' },
        { name: 'Floor 2 — AP-C', floor: 2, pos: 'left' },
        { name: 'Floor 2 — AP-D', floor: 2, pos: 'right' },
        { name: 'Floor 3 — AP-E', floor: 3, pos: 'left' },
        { name: 'Floor 3 — AP-F', floor: 3, pos: 'right' }
      ],
      validate: function(channels) {
        // channels is array of [1,6,11] for each AP
        // Rule: adjacent on same floor must differ, vertically aligned must differ
        // Pairs that must differ: (0,1), (2,3), (4,5) same floor
        // Vertical: (0,2), (2,4), (1,3), (3,5) above/below
        var pairs = [[0,1],[2,3],[4,5],[0,2],[2,4],[1,3],[3,5]];
        for (var i = 0; i < pairs.length; i++) {
          if (channels[pairs[i][0]] === channels[pairs[i][1]]) return false;
        }
        var valid = [1,6,11];
        for (var j = 0; j < channels.length; j++) {
          if (valid.indexOf(channels[j]) === -1) return false;
        }
        return true;
      },
      feedback: 'Non-overlapping 2.4 GHz channels: 1, 6, 11. A valid assignment could be: Floor 1 (1, 6), Floor 2 (6, 11), Floor 3 (1, 6) — or any permutation where adjacent and vertically-aligned APs differ.',

      ],
      points: 3
    },
    {
      type: 'single',
      label: 'Task 4',
      prompt: 'The site survey shows AP-C on Floor 2 has a signal strength of -35 dBm (very strong) and is causing co-channel interference with AP-A on Floor 1 (-52 dBm after bleed-through). What should you do?',

/* ══════════════════════════════════════════════════════════════════
   ENGINE — Rendering & Validation
   ══════════════════════════════════════════════════════════════════ */

var currentPBQ = 0;
var pbqStates = {}; // { pbqId: { taskResults: [null|true|false], score: N, maxScore: N, checked: bool } }

// Load saved states
try {
  var saved = localStorage.getItem('np_pbq_states_v2');
  if (saved) pbqStates = JSON.parse(saved);
} catch(e) {}

function saveStates() {
  try { localStorage.setItem('np_pbq_states_v2', JSON.stringify(pbqStates)); } catch(e){}
}

function getTotalScore() {
  var earned = 0, max = 0;
  PBQS.forEach(function(p) {
    var s = pbqStates[p.id];
    if (s && s.checked) { earned += s.score; max += s.maxScore; }
    else {
      p.tasks.forEach(function(t) { max += t.points; });
    }
  });
  return { earned: earned, max: max };
}

function updateScoreBar() {
  var s = getTotalScore();
  $('scoreVal').textContent = s.earned;
  $('scorePct').textContent = '/ ' + s.max + ' pts';
  var pct = s.max > 0 ? Math.round((s.earned / s.max) * 100) : 0;
  $('scoreFill').style.width = pct + '%';
}

/* ── Selector ──────────────────────────────────────────────────── */
function renderSelector() {
  var html = '';
  PBQS.forEach(function(p, i) {
    var s = pbqStates[p.id];
    var cls = 'pbq-sel-btn';
    if (i === currentPBQ) cls += ' active';
    if (s && s.checked) {
      var pct = s.maxScore > 0 ? s.score / s.maxScore : 0;
      if (pct >= 0.8) cls += ' completed';
      else cls += ' partial';
    }
    html += '<button class="' + cls + '" data-idx="' + i + '">PBQ ' + (i+1) + '</button>';
  });
  $('pbqSelector').innerHTML = html;
  $('pbqSelector').querySelectorAll('.pbq-sel-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentPBQ = parseInt(btn.dataset.idx);
      renderPBQ();
    });
  });
}

/* ── Main Render ───────────────────────────────────────────────── */
function renderPBQ() {
  var p = PBQS[currentPBQ];
  var state = pbqStates[p.id];
  var checked = state && state.checked;

  var html = '<div class="pbq-card">';

  // Header
  html += '<div class="pbq-card-header"><div><div class="pbq-title">' + esc(p.title) + '</div></div>';
  html += '<div class="pbq-obj-tags">';
  p.objectives.forEach(function(obj) { html += '<span class="pbq-obj">Obj ' + obj + '</span>'; });
  html += '</div></div>';

  // Scenario
  html += '<div class="scenario-wrap"><div class="scenario-label">Scenario</div>';
  html += '<div class="scenario-box">' + esc(p.scenario) + '</div></div>';

  // Task progress
  html += '<div class="task-progress">';
  p.tasks.forEach(function(t, i) {
    var tcls = 'task-pip';
    if (checked && state.taskResults[i] === true) tcls += ' done';
    else if (checked && state.taskResults[i] === false) tcls += ' wrong';
    html += '<div class="' + tcls + '"></div>';
  });
  var maxPts = 0; p.tasks.forEach(function(t){maxPts+=t.points;});
  html += '<span class="task-counter">' + (checked ? state.score : 0) + ' / ' + maxPts + ' pts</span></div>';

  // Tasks
  p.tasks.forEach(function(task, ti) {
    html += renderTask(p, task, ti, checked, state);
  });

  // Check All button
  html += '<div class="check-all-wrap">';
  if (!checked) {
    html += '<button class="check-all-btn" id="checkAllBtn">Check All Tasks</button>';
  } else {
    var pct = state.maxScore > 0 ? Math.round((state.score / state.maxScore) * 100) : 0;
    var rcls = pct >= 70 ? 'pass' : 'fail';
    html += '<div class="pbq-result ' + rcls + '">Score: ' + state.score + ' / ' + state.maxScore + ' (' + pct + '%)' + (pct >= 70 ? ' — Passed' : ' — Needs Review') + '</div>';
    html += '<button class="btn btn-sm btn-secondary" id="retryBtn" style="margin-top:12px;font-family:var(--font-display)">Retry This PBQ</button>';
  }
  html += '</div>';

  html += '</div>'; // end pbq-card

  $('pbqArea').innerHTML = html;
  renderSelector();
  updateScoreBar();

  // Bind events
  if (!checked) {
    bindTaskEvents(p);
    var checkBtn = $('checkAllBtn');
    if (checkBtn) checkBtn.addEventListener('click', function() { checkAll(p); });
  }
  var retryBtn = $('retryBtn');
  if (retryBtn) retryBtn.addEventListener('click', function() {
    delete pbqStates[p.id];
    saveStates();
    renderPBQ();
  });
}

/* ── Render Individual Task ────────────────────────────────────── */
function renderTask(pbq, task, ti, checked, state) {
  var html = '';
  var tcls = 'task-section';
  if (checked) {
    tcls += state.taskResults[ti] ? ' task-correct' : ' task-wrong';
  }
  html += '<div class="' + tcls + '" id="task_' + ti + '">';

  // Label
  html += '<div class="task-label">' + esc(task.label);
  if (checked) {
    html += '<span class="task-status ' + (state.taskResults[ti] ? 'pass' : 'fail') + '">' + (state.taskResults[ti] ? 'PASS' : 'FAIL') + '</span>';
  }
  html += ' <span style="font-weight:400;font-size:.65rem;color:var(--ink-muted)">(' + task.points + ' pts)</span></div>';

  // Prompt
  html += '<div class="task-prompt">' + formatPrompt(task.prompt) + '</div>';

  // Type-specific rendering
  switch(task.type) {
    case 'terminal': html += renderTerminal(task, ti, checked, state); break;
    case 'single': html += renderSingle(task, ti, checked, state); break;
    case 'multi': html += renderMulti(task, ti, checked, state); break;
    case 'fill': html += renderFill(task, ti, checked, state); break;
    case 'sequence': html += renderSequence(task, ti, checked, state); break;
    case 'channel': html += renderChannel(task, ti, checked, state); break;
  }

  // Feedback
  if (checked && task.feedback) {
    var fbcls = state.taskResults[ti] ? 'correct-fb' : 'wrong-fb';
    html += '<div class="task-feedback show ' + fbcls + '">' + esc(task.feedback) + '</div>';
  }

  html += '</div>';
  return html;
}

function formatPrompt(text) {
  // Convert \n in prompt text to breaks, and backtick-wrapped text to code
  return esc(text).replace(/\n/g, '<br>');
}

/* ── Terminal Renderer ─────────────────────────────────────────── */
function renderTerminal(task, ti, checked, state) {
  var html = '<div class="terminal-wrap" id="termWrap_' + ti + '">';
  html += '<div class="terminal-output" id="termOut_' + ti + '"></div>';
  if (!checked) {
    html += '<div class="terminal-input-row">';
    html += '<span class="terminal-prompt-char">C:\\&gt;</span>';
    html += '<input type="text" class="terminal-input" id="termIn_' + ti + '" placeholder="Type command here..." autocomplete="off" autocapitalize="off" spellcheck="false">';
    html += '<button class="terminal-submit" id="termSub_' + ti + '">Enter</button>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

/* ── Single Select Renderer ────────────────────────────────────── */
function renderSingle(task, ti, checked, state) {
  var html = '<div class="single-select" id="ss_' + ti + '">';
  task.options.forEach(function(opt, oi) {
    var cls = 'ss-option';
    if (checked) {
      cls += ' locked';
      if (oi === task.answer) cls += ' correct-pick';
      if (state.taskSelections && state.taskSelections[ti] === oi && oi !== task.answer) cls += ' wrong-pick';
    }
    html += '<div class="' + cls + '" data-ti="' + ti + '" data-oi="' + oi + '"><div class="ss-radio"></div><span>' + esc(opt) + '</span></div>';
  });
  html += '</div>';
  return html;
}

/* ── Multi Select Renderer ─────────────────────────────────────── */
function renderMulti(task, ti, checked, state) {
  var html = '<div class="ms-hint">Select all that apply</div>';
  html += '<div class="multi-select" id="ms_' + ti + '">';
  task.options.forEach(function(opt, oi) {
    var cls = 'ms-option';
    if (checked) {
      cls += ' locked';
      var wasSelected = state.taskSelections && state.taskSelections[ti] && state.taskSelections[ti].indexOf(oi) !== -1;
      var isCorrect = task.answers.indexOf(oi) !== -1;
      if (wasSelected && isCorrect) cls += ' correct-pick';
      else if (wasSelected && !isCorrect) cls += ' wrong-pick';
      else if (!wasSelected && isCorrect) cls += ' missed';
    }
    html += '<div class="' + cls + '" data-ti="' + ti + '" data-oi="' + oi + '"><div class="ms-check">' + (checked ? (task.answers.indexOf(oi) !== -1 ? '&#10003;' : '&#10005;') : '') + '</div><span>' + esc(opt) + '</span></div>';
  });
  html += '</div>';
  return html;
}

/* ── Fill-in Renderer ──────────────────────────────────────────── */
function renderFill(task, ti, checked, state) {
  var html = '<div class="fill-grid" id="fill_' + ti + '">';
  task.fields.forEach(function(f, fi) {
    var rcls = 'fill-row';
    var icls = 'fill-input';
    var val = '';
    if (checked && state.taskFills && state.taskFills[ti]) {
      val = state.taskFills[ti][fi] || '';
      var isCorr = f.accepts.some(function(a){ return norm(a) === norm(val); });
      rcls += isCorr ? ' correct-row' : ' wrong-row';
      icls += isCorr ? ' correct-input' : ' wrong-input';
    }
    html += '<div class="' + rcls + '">';
    html += '<span class="fill-label">' + esc(f.label) + '</span>';
    html += '<div><input type="text" class="' + icls + '" id="fill_' + ti + '_' + fi + '" data-ti="' + ti + '" data-fi="' + fi + '" value="' + esc(val) + '"' + (checked ? ' readonly' : '') + ' placeholder="Type answer..." autocomplete="off" autocapitalize="off" spellcheck="false">';
    if (checked) {
      var userVal = val;
      var isC = f.accepts.some(function(a){ return norm(a) === norm(userVal); });
      if (!isC) html += '<div class="fill-correct-answer">Correct: ' + esc(f.answer) + '</div>';
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

/* ── Sequence Renderer ─────────────────────────────────────────── */
function renderSequence(task, ti, checked, state) {
  // Shuffle items if not checked, otherwise use saved order
  var items;
  if (checked && state.taskSeqs && state.taskSeqs[ti]) {
    items = state.taskSeqs[ti].map(function(idx) { return task.items[idx]; });
  } else {
    // Create shuffled indices
    var indices = task.items.map(function(_, i) { return i; });
    if (!checked) indices = shuffle(indices);
    items = indices.map(function(idx) { return { text: task.items[idx].text, correctPos: task.items[idx].correctPos, origIdx: idx }; });
    // Store initial shuffle
    if (!window._seqOrders) window._seqOrders = {};
    window._seqOrders[ti] = indices;
  }

  var html = '<div class="seq-list" id="seq_' + ti + '">';
  items.forEach(function(item, si) {
    var cls = 'seq-item';
    if (checked) {
      cls += ' locked';
      var correctHere = si === item.correctPos;
      cls += correctHere ? ' correct-seq' : ' wrong-seq';
    }
    html += '<div class="' + cls + '" data-orig="' + (item.origIdx !== undefined ? item.origIdx : si) + '">';
    html += '<div class="seq-num"></div>';
    if (!checked) {
      html += '<div class="seq-arrows">';
      html += '<button class="seq-up" data-ti="' + ti + '" data-si="' + si + '">&#9650;</button>';
      html += '<button class="seq-down" data-ti="' + ti + '" data-si="' + si + '">&#9660;</button>';
      html += '</div>';
    }
    html += '<span>' + esc(item.text) + '</span></div>';
  });
  html += '</div>';
  return html;
}

/* ── Channel Renderer ──────────────────────────────────────────── */
function renderChannel(task, ti, checked, state) {
  var html = '<div class="channel-grid" id="ch_' + ti + '">';
  task.aps.forEach(function(ap, ai) {
    var cls = 'channel-cell';
    if (checked && state.taskChannels && state.taskChannels[ti]) {
      // We'll mark pass/fail at the grid level
    }
    html += '<div class="' + cls + '" id="ch_' + ti + '_' + ai + '">';
    html += '<div class="ap-name">' + esc(ap.name) + '</div>';
    html += '<select id="chsel_' + ti + '_' + ai + '" data-ti="' + ti + '" data-ai="' + ai + '"' + (checked ? ' disabled' : '') + '>';
    html += '<option value="">--</option><option value="1"' + (checked && state.taskChannels && state.taskChannels[ti] && state.taskChannels[ti][ai] === 1 ? ' selected' : '') + '>Ch 1</option>';
    html += '<option value="6"' + (checked && state.taskChannels && state.taskChannels[ti] && state.taskChannels[ti][ai] === 6 ? ' selected' : '') + '>Ch 6</option>';
    html += '<option value="11"' + (checked && state.taskChannels && state.taskChannels[ti] && state.taskChannels[ti][ai] === 11 ? ' selected' : '') + '>Ch 11</option>';
    html += '</select></div>';
  });
  html += '</div>';
  if (checked && task.feedback) {
    // Already handled in main renderer
  }
  return html;
}

/* ══════════════════════════════════════════════════════════════════
   EVENT BINDING
   ══════════════════════════════════════════════════════════════════ */

function bindTaskEvents(pbq) {
  pbq.tasks.forEach(function(task, ti) {
    switch(task.type) {
      case 'terminal': bindTerminal(task, ti); break;
      case 'single': bindSingle(task, ti); break;
      case 'multi': bindMulti(task, ti); break;
      case 'sequence': bindSequence(task, ti); break;
      // fill and channel don't need special binding (read on check)
    }
  });
}

/* ── Terminal Events ───────────────────────────────────────────── */
function bindTerminal(task, ti) {
  var input = $('termIn_' + ti);
  var btn = $('termSub_' + ti);
  var out = $('termOut_' + ti);
  if (!input || !btn) return;

  if (!window._termCmds) window._termCmds = {};
  if (!window._termCmds[ti]) window._termCmds[ti] = [];

  function submitCmd() {
    var val = input.value.trim();
    if (!val) return;
    window._termCmds[ti].push(val);

    var result = task.output(val);
    var outHtml = out.innerHTML;
    outHtml += '<div class="cmd-echo">C:\\&gt; ' + esc(val) + '</div>';
    if (result !== null) {
      outHtml += '<div>' + esc(result) + '</div>';
    } else {
      outHtml += '<div class="err-text">\'' + esc(val) + '\' is not recognized as a valid command.</div>';
    }
    out.innerHTML = outHtml;
    input.value = '';
    out.scrollTop = out.scrollHeight;
  }

  btn.addEventListener('click', submitCmd);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitCmd(); }
  });
}

/* ── Single Select Events ──────────────────────────────────────── */
function bindSingle(task, ti) {
  var container = $('ss_' + ti);
  if (!container) return;
  container.querySelectorAll('.ss-option').forEach(function(el) {
    el.addEventListener('click', function() {
      container.querySelectorAll('.ss-option').forEach(function(o) { o.classList.remove('selected'); });
      el.classList.add('selected');
    });
  });
}

/* ── Multi Select Events ───────────────────────────────────────── */
function bindMulti(task, ti) {
  var container = $('ms_' + ti);
  if (!container) return;
  container.querySelectorAll('.ms-option').forEach(function(el) {
    el.addEventListener('click', function() {
      el.classList.toggle('selected');
    });
  });
}

/* ── Sequence Events ───────────────────────────────────────────── */
function bindSequence(task, ti) {
  var container = $('seq_' + ti);
  if (!container) return;

  container.querySelectorAll('.seq-up').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var si = parseInt(btn.dataset.si);
      if (si === 0) return;
      var items = container.querySelectorAll('.seq-item');
      container.insertBefore(items[si], items[si - 1]);
      rebindSequenceButtons(task, ti);
    });
  });

  container.querySelectorAll('.seq-down').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var si = parseInt(btn.dataset.si);
      var items = container.querySelectorAll('.seq-item');
      if (si >= items.length - 1) return;
      container.insertBefore(items[si + 1], items[si]);
      rebindSequenceButtons(task, ti);
    });
  });
}

function rebindSequenceButtons(task, ti) {
  var container = $('seq_' + ti);
  if (!container) return;
  var items = container.querySelectorAll('.seq-item');
  items.forEach(function(item, i) {
    var up = item.querySelector('.seq-up');
    var dn = item.querySelector('.seq-down');
    if (up) { up.dataset.si = i; }
    if (dn) { dn.dataset.si = i; }
  });
  // Rebind
  container.querySelectorAll('.seq-up').forEach(function(btn) {
    var newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var si = parseInt(newBtn.dataset.si);
      if (si === 0) return;
      var its = container.querySelectorAll('.seq-item');
      container.insertBefore(its[si], its[si - 1]);
      rebindSequenceButtons(task, ti);
    });
  });
  container.querySelectorAll('.seq-down').forEach(function(btn) {
    var newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var si = parseInt(newBtn.dataset.si);
      var its = container.querySelectorAll('.seq-item');
      if (si >= its.length - 1) return;
      container.insertBefore(its[si + 1], its[si]);
      rebindSequenceButtons(task, ti);
    });
  });
}

/* ══════════════════════════════════════════════════════════════════
   CHECK ALL — Validate every task and score
   ══════════════════════════════════════════════════════════════════ */

function checkAll(pbq) {
  var state = {
    taskResults: [],
    taskSelections: {},
    taskFills: {},
    taskSeqs: {},
    taskChannels: {},
    score: 0,
    maxScore: 0,
    checked: true
  };

  pbq.tasks.forEach(function(task, ti) {
    var result = false;
    var pts = 0;
    state.maxScore += task.points;

    switch(task.type) {
      case 'terminal':
        result = checkTerminal(task, ti);
        if (result) pts = task.points;
        break;

      case 'single':
        var sel = getSingleSelection(ti);
        state.taskSelections[ti] = sel;
        result = sel === task.answer;
        if (result) pts = task.points;
        break;

      case 'multi':
        var picks = getMultiSelections(ti);
        state.taskSelections[ti] = picks;
        // Partial credit: proportion of correct picks minus wrong picks
        var correct = 0, wrong = 0;
        picks.forEach(function(p) {
          if (task.answers.indexOf(p) !== -1) correct++;
          else wrong++;
        });
        var missed = task.answers.length - correct;
        var partialScore = Math.max(0, (correct - wrong) / task.answers.length);
        pts = Math.round(task.points * partialScore * 10) / 10;
        result = correct === task.answers.length && wrong === 0;
        break;

      case 'fill':
        var fills = getFillValues(task, ti);
        state.taskFills[ti] = fills;
        var fillCorrect = 0;
        task.fields.forEach(function(f, fi) {
          var val = fills[fi] || '';
          if (f.accepts.some(function(a) { return norm(a) === norm(val); })) fillCorrect++;
        });
        pts = Math.round((fillCorrect / task.fields.length) * task.points * 10) / 10;
        result = fillCorrect === task.fields.length;
        break;

      case 'sequence':
        var order = getSequenceOrder(task, ti);
        state.taskSeqs[ti] = order;
        var seqCorrect = 0;
        order.forEach(function(origIdx, pos) {
          if (task.items[origIdx].correctPos === pos) seqCorrect++;
        });
        pts = Math.round((seqCorrect / task.items.length) * task.points * 10) / 10;
        result = seqCorrect === task.items.length;
        break;

      case 'channel':
        var channels = getChannelValues(task, ti);
        state.taskChannels[ti] = channels;
        result = task.validate(channels);
        if (result) pts = task.points;
        break;
    }

    state.taskResults.push(result);
    state.score += pts;
  });

  state.score = Math.round(state.score * 10) / 10;
  pbqStates[pbq.id] = state;
  saveStates();
  renderPBQ();
}

/* ── Value Getters ─────────────────────────────────────────────── */

function checkTerminal(task, ti) {
  var cmds = (window._termCmds && window._termCmds[ti]) || [];
  if (task.multiCmd) {
    // Must have typed all accepted commands
    var needed = task.accepts.map(function(a) { return norm(a); });
    var typed = cmds.map(function(c) { return norm(c); });
    var found = 0;
    needed.forEach(function(n) {
      if (typed.indexOf(n) !== -1) found++;
    });
    return found >= Math.ceil(needed.length * 0.6); // 60% threshold for multi-cmd
  } else {
    // At least one accepted command was typed
    return cmds.some(function(c) {
      return task.accepts.some(function(a) { return norm(a) === norm(c); });
    });
  }
}

function getSingleSelection(ti) {
  var container = $('ss_' + ti);
  if (!container) return -1;
  var sel = container.querySelector('.ss-option.selected');
  return sel ? parseInt(sel.dataset.oi) : -1;
}

function getMultiSelections(ti) {
  var container = $('ms_' + ti);
  if (!container) return [];
  var picks = [];
  container.querySelectorAll('.ms-option.selected').forEach(function(el) {
    picks.push(parseInt(el.dataset.oi));
  });
  return picks;
}

function getFillValues(task, ti) {
  var vals = [];
  task.fields.forEach(function(f, fi) {
    var input = $('fill_' + ti + '_' + fi);
    vals.push(input ? input.value.trim() : '');
  });
  return vals;
}

function getSequenceOrder(task, ti) {
  var container = $('seq_' + ti);
  if (!container) return [];
  var order = [];
  container.querySelectorAll('.seq-item').forEach(function(item) {
    order.push(parseInt(item.dataset.orig));
  });
  return order;
}

function getChannelValues(task, ti) {
  var vals = [];
  task.aps.forEach(function(ap, ai) {
    var sel = $('chsel_' + ti + '_' + ai);
    vals.push(sel ? parseInt(sel.value) || 0 : 0);
  });
  return vals;
}

   INIT

$('resetAllBtn').addEventListener('click', function() {
  if (confirm('Reset all PBQ progress? This cannot be undone.')) {
    pbqStates = {};
    window._termCmds = {};
    window._seqOrders = {};
    saveStates();
    currentPBQ = 0;
    renderPBQ();
  }
});

renderPBQ();

})();
