<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>Chat — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
  .page-header{padding:var(--s-md) 0 var(--s-sm);margin-bottom:var(--s-lg);border-bottom:2px solid var(--ink)}
  .page-header h1{font-size:2.2rem;margin-bottom:4px}
  .page-header .subtitle{font-family:var(--font-body);color:var(--ink-secondary);font-size:.95rem;font-style:italic}

  .chat-shell{max-width:760px;margin:0 auto var(--s-xl);background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:480px}
  .chat-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg-recessed)}
  .chat-bar-title{font-family:var(--font-display);font-weight:700;font-size:.92rem}
  .chat-bar-sub{font-family:var(--font-display);font-size:.7rem;color:var(--ink-muted)}
  .chat-bar-actions{display:flex;gap:8px}
  .chat-btn{font-family:var(--font-display);font-size:.72rem;font-weight:600;padding:6px 10px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--bg-surface);color:var(--ink);cursor:pointer;transition:background var(--transition)}
  .chat-btn:hover{background:var(--bg-hover)}

  .chat-msgs{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
  .chat-msg{max-width:86%;padding:11px 15px;border-radius:10px;font-family:var(--font-body);font-size:.95rem;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
  .chat-msg.user{align-self:flex-end;background:var(--ink);color:var(--bg);border-bottom-right-radius:3px}
  .chat-msg.bot{align-self:flex-start;background:var(--bg-surface);color:var(--ink);border:1px solid var(--border);border-bottom-left-radius:3px}
  .chat-msg.refuse{align-self:flex-start;background:var(--accent-dim);color:var(--ink);border:1px solid var(--accent);border-bottom-left-radius:3px}
  .chat-msg.refuse strong{font-family:var(--font-display);display:block;margin-bottom:4px;color:var(--accent)}
  .chat-msg.error{align-self:flex-start;background:var(--wrong-bg);color:var(--wrong);border:1px solid var(--wrong);border-bottom-left-radius:3px;font-size:.86rem}
  .chat-msg code{background:var(--bg-recessed);padding:1px 5px;border-radius:3px;font-family:var(--font-mono);font-size:.84em;color:var(--accent)}

  .chat-typing{align-self:flex-start;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;border-bottom-left-radius:3px;padding:12px 18px;display:flex;gap:5px}
  .chat-typing span{width:7px;height:7px;border-radius:50%;background:var(--ink-muted);animation:chatBounce 1.2s infinite}
  .chat-typing span:nth-child(2){animation-delay:.15s}
  .chat-typing span:nth-child(3){animation-delay:.3s}
  @keyframes chatBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

  .chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:10px 20px 0;background:var(--bg)}
  .chat-suggestion{font-family:var(--font-display);font-size:.72rem;padding:6px 10px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--bg-surface);color:var(--ink-secondary);cursor:pointer;transition:all var(--transition)}
  .chat-suggestion:hover{background:var(--accent);color:var(--bg-surface);border-color:var(--accent)}

  .chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg-surface)}
  .chat-input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-lg);font-family:var(--font-body);font-size:.95rem;color:var(--ink);background:var(--bg);outline:none;resize:none;min-height:42px;max-height:120px}
  .chat-input:focus{border-color:var(--accent)}
  .chat-input::placeholder{color:var(--ink-muted)}
  .chat-send{padding:0 18px;background:var(--ink);color:var(--bg);border:none;border-radius:var(--radius-lg);cursor:pointer;font-family:var(--font-display);font-size:.85rem;font-weight:600;transition:background var(--transition)}
  .chat-send:hover{background:var(--accent)}
  .chat-send:disabled{opacity:.4;cursor:not-allowed}

  .chat-empty{text-align:center;color:var(--ink-muted);font-family:var(--font-body);font-style:italic;font-size:.9rem;margin:auto 0}
  .chat-counter{font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted);padding:0 16px 6px;background:var(--bg-surface)}

  @media (max-width:640px){
    .chat-shell{height:calc(100vh - 160px);border-radius:0;border-left:none;border-right:none}
    .chat-msg{max-width:92%;font-size:.9rem}
  }
</style>
</head>
<body>

<nav class="top-nav"></nav>

<main class="container">
  <div class="page-header">
    <h1>Chat</h1>
    <p class="subtitle">Free-form CCNA 200-301 / Network+ tutor — your own Gemini key, locked to scope.</p>
  </div>

  <div class="chat-shell" role="region" aria-label="CCNA chat">
    <div class="chat-bar">
      <div>
        <div class="chat-bar-title">CCNA Tutor</div>
        <div class="chat-bar-sub" id="key-status">checking key…</div>
      </div>
      <div class="chat-bar-actions">
        <button class="chat-btn" id="btn-key" type="button">Set key</button>
        <button class="chat-btn" id="btn-clear" type="button">Clear</button>
      </div>
    </div>

    <div class="chat-msgs" id="msgs" aria-live="polite">
      <p class="chat-empty" id="empty">Ask anything CCNA. Subnetting, VLANs, OSPF, ACLs, NAT…</p>
    </div>

    <div class="chat-suggestions" id="suggestions">
      <button class="chat-suggestion" type="button" data-q="Walk me through subnetting 192.168.10.0/24 into 4 equal subnets.">Subnetting drill</button>
      <button class="chat-suggestion" type="button" data-q="Explain STP root election in plain language.">STP root election</button>
      <button class="chat-suggestion" type="button" data-q="When would I use OSPF over a static route?">OSPF vs static</button>
      <button class="chat-suggestion" type="button" data-q="What's the difference between standard and extended ACLs?">ACLs</button>
    </div>

    <div class="chat-counter" id="counter">0 messages this session</div>

    <div class="chat-input-row">
      <textarea class="chat-input" id="input" rows="1" placeholder="Ask a CCNA question… (Enter to send, Shift+Enter for newline)"></textarea>
      <button class="chat-send" id="send" type="button" disabled>Send</button>
    </div>
  </div>
</main>

<script defer src="js/nav.js"></script>
<script defer src="js/gemini.js"></script>
<script defer src="js/chat.js"></script>
</body>
</html>
