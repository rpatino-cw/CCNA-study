<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>Subnetting Practice — CCNA</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
  .wrap{max-width:960px;margin:0 auto;padding:var(--s-xl)}
  .hd{text-align:center;margin-bottom:var(--s-md)}
  .hd h1{font-size:1.4rem;font-weight:700;letter-spacing:-.02em;color:var(--ink);margin:0}
  .hd p{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);letter-spacing:.06em;text-transform:uppercase;margin:6px 0 0}
  .clip{
    position:relative;
    width:880px;
    height:800px;
    max-width:100%;
    margin:0 auto;
    overflow:hidden;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:#fff;
    box-shadow:0 4px 20px rgba(0,0,0,.06);
  }
  .clip iframe{
    position:absolute;
    top:-150px;
    left:-30px;
    width:1380px;
    height:1400px;
    border:0;
  }
  .meta{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:14px;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted)}
  .meta a{color:var(--ink);text-decoration:underline;text-underline-offset:2px}
  .ctrls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px}
  .ctrls button{font:inherit;font-family:var(--font-mono);font-size:.7rem;font-weight:600;padding:5px 12px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);color:var(--ink);cursor:pointer;letter-spacing:.04em;text-transform:uppercase}
  .ctrls button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<nav class="top-nav"></nav>
<div class="wrap">
  <div class="hd">
    <h1>Subnetting Practice</h1>
    <p>SubnettingPractice.com — quiz only</p>
  </div>
  <div class="clip" id="clip">
    <iframe id="frame" src="https://subnettingpractice.com/" title="Subnetting Practice"></iframe>
  </div>
  <div class="ctrls">
    <button onclick="document.getElementById('frame').src=document.getElementById('frame').src">Reload</button>
    <button onclick="window.open('https://subnettingpractice.com/','_blank')">Open Full Site</button>
  </div>
  <div class="meta">
    <span>Source: subnettingpractice.com</span>
    <a href="core.html">← Dashboard</a>
  </div>
</div>
<script defer src="js/nav.js"></script>
<script defer src="js/tutor.js?v=7.17.9"></script>
</body>
</html>
