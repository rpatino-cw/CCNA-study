name = "ccna-multiplayer"
main = "src/index.js"
compatibility_date = "2026-05-01"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[durable_objects.bindings]]
name = "AUCTIONS"
class_name = "Auction"

[[durable_objects.bindings]]
name = "ROUTES"
class_name = "Routing"

[[durable_objects.bindings]]
name = "WILDCARDS"
class_name = "Wildcard"

[[durable_objects.bindings]]
name = "PORTS"
class_name = "Ports"

[[durable_objects.bindings]]
name = "NATS"
class_name = "Nat"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Auction"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["Routing"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["Wildcard"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["Ports"]

[[migrations]]
tag = "v6"
new_sqlite_classes = ["Nat"]

