<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FAF7F2">
  <title>Subnetting Path — Prereq → Real Questions — CCNA</title>
  <meta name="description" content="Guided progression timeline. Drill the math prereqs in order. Each gate unlocks the next. Final stage: real CCNA subnetting questions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
  <link rel="stylesheet" href="css/shared.css?v=4.56">
  <style>
    .page-header { padding: var(--s-xl) 0 var(--s-lg); border-bottom: 2px solid var(--ink); margin-bottom: var(--s-xl); }
    .page-header h1 { font-family: var(--font-display); font-size: 2.6rem; font-weight: 700; letter-spacing: -0.04em; line-height: 1; margin-bottom: 6px; }
    .page-header-sub { font-family: var(--font-display); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted); }
    .page-header p { color: var(--ink-secondary); margin-top: 10px; max-width: 720px; }

    .progress-summary { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; padding: 16px 20px; margin-bottom: var(--s-lg); background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); font-family: var(--font-mono); font-size: 0.9rem; }
    .progress-summary .ps-label { color: var(--ink-muted); text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.06em; }
    .progress-summary .ps-val { color: var(--ink); font-weight: 700; font-size: 1.1rem; }
    .progress-bar { flex: 1; min-width: 200px; height: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
    .progress-summary button { font-family: var(--font-display); font-size: 0.72rem; padding: 6px 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; }

    .timeline { position: relative; padding-left: 36px; }
    .timeline::before { content: ''; position: absolute; left: 14px; top: 0; bottom: 0; width: 2px; background: var(--border); }

    .stage { position: relative; margin-bottom: var(--s-lg); padding: 20px 22px; border: 2px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-surface); transition: all 0.2s; }
    .stage.locked { opacity: 0.55; }
    .stage.unlocked { border-color: var(--ink); }
    .stage.completed { border-color: #6bbf6b; background: #f1faf1; }

    .stage-marker { position: absolute; left: -36px; top: 22px; width: 30px; height: 30px; border-radius: 15px; background: var(--bg); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 0.85rem; color: var(--ink-muted); }
    .stage.unlocked .stage-marker { border-color: var(--ink); color: var(--ink); background: var(--bg); }
    .stage.completed .stage-marker { border-color: #6bbf6b; background: #6bbf6b; color: #fff; }

    .stage-head { display: flex; gap: 14px; align-items: baseline; margin-bottom: 8px; flex-wrap: wrap; }
    .stage-name { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; color: var(--ink); }
    .stage-tier { font-family: var(--font-mono); font-size: 0.72rem; padding: 3px 10px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stage-tier.foundation { color: #8a6a3d; border-color: #d4a574; }
    .stage-tier.bridge { color: #3d6a8a; border-color: #74a4d4; }
    .stage-tier.real { color: #5a1a1a; border-color: #c46b6b; background: #fef0f0; }
    .stage-blurb { font-family: var(--font-body); font-size: 0.95rem; line-height: 1.55; color: var(--ink-secondary); margin-bottom: 12px; }
    .stage-goal { font-family: var(--font-mono); font-size: 0.82rem; color: var(--ink); padding: 8px 12px; background: var(--bg); border-left: 3px solid var(--accent); border-radius: 4px; margin-bottom: 12px; }
    .stage-goal strong { color: var(--ink); }
    .stage-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .stage-link { font-family: var(--font-display); font-size: 0.85rem; font-weight: 600; padding: 9px 18px; border-radius: 8px; border: 1px solid var(--ink); background: var(--ink); color: var(--bg); cursor: pointer; text-decoration: none; transition: all 0.15s; display: inline-block; }
    .stage-link:hover { background: var(--accent); border-color: var(--accent); }
    .stage-link.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    .stage-mark-btn { font-family: var(--font-display); font-size: 0.78rem; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; }
    .stage-mark-btn.done { background: #6bbf6b; border-color: #6bbf6b; color: #fff; }
    .stage-meta { font-family: var(--font-mono); font-size: 0.75rem; color: var(--ink-muted); margin-left: auto; }

    .lock-msg { font-family: var(--font-mono); font-size: 0.78rem; color: var(--ink-muted); padding: 8px 12px; background: var(--bg); border-radius: 4px; margin-top: 10px; }

    .legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 12px 16px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--font-mono); font-size: 0.78rem; margin-bottom: var(--s-lg); }
    .legend-item { display: flex; gap: 6px; align-items: center; }
    .legend-dot { width: 12px; height: 12px; border-radius: 6px; border: 2px solid var(--border); }
    .legend-dot.unlocked { border-color: var(--ink); }
    .legend-dot.completed { background: #6bbf6b; border-color: #6bbf6b; }
  </style>
</head>
<body>
  <nav class="top-nav"></nav>
  <div class="container">
    <header class="page-header">
      <div class="page-header-sub">CCNA · Subnetting Path</div>
      <h1>Subnetting Path</h1>
      <p>Guided progression. Drill each math prereq → bridge layer → real CCNA subnetting questions. Each stage unlocks when you mark the prior one done. Skip the path = guess the questions.</p>
    </header>

    <div class="progress-summary">
      <span class="ps-label">Progress</span>
      <span class="ps-val" id="progCount">0 / 7</span>
      <div class="progress-bar"><div class="progress-bar-fill" id="progBar" style="width:0%"></div></div>
      <button onclick="resetPath()">Reset</button>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="legend-dot"></span> locked</span>
      <span class="legend-item"><span class="legend-dot unlocked"></span> unlocked</span>
      <span class="legend-item"><span class="legend-dot completed"></span> done</span>
    </div>

    <div class="timeline" id="timeline"></div>
  </div>

<script defer src="js/nav.js?v=4.56"></script>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var STORAGE_KEY = 'ccna_subnet_path_progress';

  var STAGES = [
    {
      id: 'powers-of-2',
      name: 'Powers of 2',
      tier: 'foundation',
      blurb: 'Memorize 2¹–2¹⁶. Reverse-lookup. Divide and multiply via exponent subtract / add. The math underneath everything else.',
      goal: 'Hit a streak of 15 in Math Drill (any type).',
      href: 'math-drill.html'
    },
    {
      id: 'binary',
      name: 'Binary ↔ Decimal Octet',
      tier: 'foundation',
      blurb: 'Convert any decimal 0–255 to 8-bit binary and back. Know bit-position values 128 64 32 16 8 4 2 1 cold.',
      goal: 'Hit a streak of 12 in Bit Drill (any type).',
      href: 'bit-drill.html'
    },
    {
      id: 'magic-number',
      name: 'Magic Number',
      tier: 'bridge',
      blurb: 'Block size = 256 − interesting mask octet. Used to find subnet boundaries instantly.',
      goal: 'Run Magic Number trainer until block-size questions feel obvious.',
      href: 'magic-number.html'
    },
    {
      id: 'prefix-mask',
      name: 'Prefix ↔ Mask',
      tier: 'bridge',
      blurb: 'Translate /N to dotted decimal mask and back. /24 = 255.255.255.0, /26 = 255.255.255.192, /30 = 255.255.255.252.',
      goal: 'Drill prefix-tier trainer through /24–/30 fast.',
      href: 'prefix-tier-trainer.html'
    },
    {
      id: 'formula',
      name: 'Formula Recognition',
      tier: 'bridge',
      blurb: 'Read a CCNA-style subnet question and pick the formula (not the answer yet). Pattern recognition before computation.',
      goal: 'Pass formula quiz with 80%+.',
      href: 'formula-quiz.html'
    },
    {
      id: 'visual',
      name: 'Visual Walk-through',
      tier: 'bridge',
      blurb: 'See subnetting as a step-by-step visual. Borrow bits, find network ID, list usable hosts, broadcast.',
      goal: 'Walk through 3 examples in Subnetting Visual.',
      href: 'subnetting-visual.html'
    },
    {
      id: 'real-subnet',
      name: 'Real CCNA Subnetting Questions',
      tier: 'real',
      blurb: 'Timed infinite drill. Now you have the math, the binary, the magic number, the prefix-mask map, and pattern recognition. The question becomes mechanical.',
      goal: 'Hit 80%+ accuracy on Subnetting Trainer over 20 questions, then run Mastery track.',
      href: 'subnetting-trainer.html'
    }
  ];

  function loadProgress() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return {};
      return JSON.parse(raw);
    } catch (e) { return {}; }
  }
  function saveProgress(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

  var progress = loadProgress();

  function isUnlocked(idx) {
    if (idx === 0) return true;
    return !!progress[STAGES[idx - 1].id];
  }

  function render() {
    var tl = document.getElementById('timeline');
    var html = '';
    var doneCount = 0;
    for (var i = 0; i < STAGES.length; i++) {
      var s = STAGES[i];
      var done = !!progress[s.id];
      var unlocked = isUnlocked(i);
      var stageClass = done ? 'completed' : (unlocked ? 'unlocked' : 'locked');
      var marker = done ? '✓' : String(i + 1);
      if (done) doneCount++;

      html += '<div class="stage ' + stageClass + '">';
      html += '<div class="stage-marker">' + marker + '</div>';
      html += '<div class="stage-head">';
      html += '<span class="stage-name">' + s.name + '</span>';
      html += '<span class="stage-tier ' + s.tier + '">' + s.tier + '</span>';
      html += '<span class="stage-meta">stage ' + (i + 1) + ' / ' + STAGES.length + '</span>';
      html += '</div>';
      html += '<div class="stage-blurb">' + s.blurb + '</div>';
      html += '<div class="stage-goal"><strong>Goal:</strong> ' + s.goal + '</div>';
      html += '<div class="stage-actions">';
      if (unlocked) {
        html += '<a class="stage-link" href="' + s.href + '">Open drill →</a>';
        html += '<button class="stage-mark-btn ' + (done ? 'done' : '') + '" onclick="toggleDone(\'' + s.id + '\')">' + (done ? '✓ Done' : 'Mark done') + '</button>';
      } else {
        html += '<span class="stage-link disabled">Locked</span>';
        html += '<span class="lock-msg">Finish stage ' + i + ' to unlock.</span>';
      }
      html += '</div>';
      html += '</div>';
    }
    tl.innerHTML = html;

    document.getElementById('progCount').textContent = doneCount + ' / ' + STAGES.length;
    document.getElementById('progBar').style.width = (100 * doneCount / STAGES.length) + '%';
  }

  window.toggleDone = function(id) {
    if (progress[id]) delete progress[id];
    else progress[id] = Date.now();
    saveProgress(progress);
    render();
  };

  window.resetPath = function() {
    if (!confirm('Reset all stage progress?')) return;
    progress = {};
    saveProgress(progress);
    render();
  };

  render();
});
</script>
<script defer src="js/tutor.js"></script>
</body>
</html>
