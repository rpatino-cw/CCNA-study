<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 1 — Campus Network Build | CCNA 200-301</title>
  <meta name="color-scheme" content="light">
  <link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="../css/shared.css">
  <style>
    /* ── Lab Layout ──────────────────────────────────────────── */

    body {
      overflow: hidden;
      height: 100vh;
    }

    .lab-wrapper {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
    }

    .lab-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px var(--s-lg);
      border-bottom: 2px solid var(--ink);
      flex-shrink: 0;
      background: var(--bg);
    }

    .lab-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .lab-header-meta {
      display: flex;
      align-items: center;
      gap: var(--s-md);
    }

    .lab-header-meta .back-link {
      margin: 0;
    }

    .lab-progress-bar {
      width: 120px;
      height: 5px;
      background: var(--bg-recessed);
      border-radius: 3px;
      overflow: hidden;
    }

    .lab-progress-bar .fill {
      height: 100%;
      background: var(--prof-strong);
      border-radius: 3px;
      transition: width 0.4s var(--ease-out);
      width: 0%;
    }

    .lab-progress-text {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--ink-muted);
    }

    /* ── Top Panel (objectives + topology) ───────────────────── */

    .top-panels {
      display: flex;
      flex: 1;
      min-height: 0;
      border-bottom: 1px solid var(--border);
    }

    /* Left Panel — Objectives */
    .left-panel {
      width: 25%;
      min-width: 240px;
      max-width: 320px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      overflow: hidden;
    }

    .device-selector {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .device-btn {
      flex: 1;
      padding: 8px 12px;
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      background: var(--bg-recessed);
      color: var(--ink-muted);
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      border-bottom: 2px solid transparent;
    }

    .device-btn:hover {
      background: var(--bg-hover);
      color: var(--ink-secondary);
    }

    .device-btn.active {
      background: var(--bg-surface);
      color: var(--ink);
      border-bottom-color: var(--accent);
    }

    .objectives-title {
      font-family: var(--font-display);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
      padding: var(--s-sm) var(--s-md) 4px;
      flex-shrink: 0;
    }

    .objectives-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px var(--s-sm) var(--s-sm);
    }

    .objective-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 8px;
      border-radius: var(--radius);
      font-size: 0.78rem;
      line-height: 1.4;
      font-family: var(--font-display);
      color: var(--ink-secondary);
      transition: all var(--transition);
      cursor: default;
    }

    .objective-item:hover {
      background: var(--bg-recessed);
    }

    .objective-item.current {
      background: var(--accent-dim);
      color: var(--ink);
      font-weight: 600;
      border-left: 2px solid var(--accent);
      padding-left: 6px;
    }

    .objective-item.completed {
      color: var(--prof-strong);
    }

    .objective-item.completed .obj-check {
      color: var(--prof-strong);
    }

    .objective-item.locked {
      color: var(--ink-muted);
      opacity: 0.55;
    }

    .obj-num {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 700;
      min-width: 18px;
      color: inherit;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .obj-check {
      font-size: 0.85rem;
      line-height: 1;
      flex-shrink: 0;
      margin-top: -1px;
    }

    .obj-text {
      flex: 1;
    }

    .hint-area {
      flex-shrink: 0;
      padding: var(--s-sm) var(--s-md);
      border-top: 1px solid var(--border);
    }

    .hint-btn {
      width: 100%;
      padding: 7px 14px;
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid #F6E5A3;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
    }

    .hint-btn:hover:not(:disabled) {
      background: #FEF3C7;
      border-color: var(--accent);
    }

    .hint-btn:disabled {
      background: var(--bg-recessed);
      color: var(--ink-muted);
      border-color: var(--border);
      cursor: not-allowed;
    }

    .hint-count {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--ink-muted);
      text-align: center;
      margin-top: 4px;
    }

    /* ── Center Panel — Topology ────────────────────────────── */

    .center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--s-md);
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }

    .topology-svg {
      width: 100%;
      max-width: 640px;
      height: auto;
    }

    /* ── Hint Overlay ───────────────────────────────────────── */

    .hint-overlay {
      position: absolute;
      bottom: var(--s-md);
      left: var(--s-lg);
      right: var(--s-lg);
      background: #FFFBEB;
      border: 1px solid #F6E5A3;
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--ink);
      line-height: 1.5;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s var(--ease-out);
      pointer-events: none;
      z-index: 10;
    }

    .hint-overlay.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .hint-overlay .hint-label {
      font-family: var(--font-display);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .hint-close {
      position: absolute;
      top: 6px;
      right: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--ink-muted);
      padding: 2px 6px;
    }

    .hint-close:hover {
      color: var(--ink);
    }

    /* ── Bottom Panel — Terminal ─────────────────────────────── */

    .terminal-panel {
      height: 50vh;
      min-height: 200px;
      background: #0C0C0C;
      display: flex;
      flex-direction: column;
      position: relative;
      flex-shrink: 0;
    }

    .terminal-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 12px;
      background: #1A1A1A;
      border-bottom: 1px solid #2A2A2A;
      flex-shrink: 0;
    }

    .terminal-toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .terminal-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .terminal-dot.red { background: #FF5F56; }
    .terminal-dot.yellow { background: #FFBD2E; }
    .terminal-dot.green { background: #27C93F; }

    .terminal-tab {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: #808080;
      margin-left: 12px;
    }

    .terminal-clear-btn {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: #555;
      background: none;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .terminal-clear-btn:hover {
      color: #999;
      border-color: #555;
    }

    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.5;
      color: #E0E0E0;
      cursor: text;
    }

    .terminal::-webkit-scrollbar {
      width: 6px;
    }

    .terminal::-webkit-scrollbar-track {
      background: #0C0C0C;
    }

    .terminal::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 3px;
    }

    .term-output .term-line {
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 1.5em;
    }

    .term-line.cmd {
      color: #FFFFFF;
      font-weight: 500;
    }

    .term-line.error {
      color: #FF6B6B;
    }

    .term-line.success {
      color: #4ADE80;
      font-weight: 500;
    }

    .term-line.info {
      color: #B0B0B0;
    }

    .term-line.banner {
      color: #4ADE80;
      font-weight: 700;
      text-align: center;
      padding: 4px 0;
    }

    .term-input-line {
      display: flex;
      align-items: center;
      min-height: 1.5em;
    }

    .term-prompt {
      color: #FFFFFF;
      font-weight: 700;
      white-space: pre;
      flex-shrink: 0;
    }

    .term-input {
      flex: 1;
      outline: none;
      border: none;
      background: transparent;
      color: #FFFFFF;
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
      caret-color: transparent;
      white-space: pre;
    }

    .term-cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #4ADE80;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── Objective Complete Animation ───────────────────────── */

    @keyframes objComplete {
      0% { transform: scale(1); }
      30% { transform: scale(1.05); background: var(--prof-strong-bg); }
      100% { transform: scale(1); }
    }

    .objective-item.just-completed {
      animation: objComplete 0.6s var(--ease-out);
    }

    /* ── Completion Banner ──────────────────────────────────── */

    .completion-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .completion-banner.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .completion-card {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--s-2xl) var(--s-xl);
      text-align: center;
      max-width: 480px;
      transform: scale(0.9);
      transition: transform 0.4s var(--ease-out);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .completion-banner.visible .completion-card {
      transform: scale(1);
    }

    .completion-card h2 {
      font-size: 1.6rem;
      margin: 0 0 var(--s-sm);
      border: none;
      padding: 0;
      color: var(--prof-strong);
    }

    .completion-card p {
      color: var(--ink-secondary);
      font-size: 0.95rem;
      margin: 0 auto var(--s-lg);
    }

    /* ── SVG Topology Styles ────────────────────────────────── */

    .topo-device {
      transition: all 0.4s var(--ease-out);
    }

    .topo-device rect {
      transition: stroke 0.4s ease, fill 0.4s ease;
    }

    .topo-device.configured rect {
      stroke: var(--prof-strong);
      stroke-width: 2;
    }

    .topo-link {
      transition: stroke 0.4s ease;
      stroke: var(--border-strong);
      stroke-width: 2;
    }

    .topo-link.active {
      stroke: var(--prof-strong);
      stroke-width: 2.5;
    }

    .topo-label {
      font-family: var(--font-display);
      font-size: 10px;
      fill: var(--ink-secondary);
    }

    .topo-device-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      fill: var(--ink);
    }

    .topo-device-type {
      font-family: var(--font-mono);
      font-size: 8px;
      fill: var(--ink-muted);
    }

    .topo-port-label {
      font-family: var(--font-mono);
      font-size: 8px;
      fill: var(--ink-muted);
    }

    .topo-ip-label {
      font-family: var(--font-mono);
      font-size: 8px;
      fill: var(--accent);
    }

    .topo-vlan-label {
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 600;
    }

    /* ── Responsive ──────────────────────────────────────────── */

    @media (max-width: 900px) {
      .left-panel {
        width: 200px;
        min-width: 180px;
      }
    }

    @media (max-width: 700px) {
      .top-panels {
        flex-direction: column;
      }

      .left-panel {
        width: 100%;
        max-width: none;
        max-height: 180px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .center-panel {
        min-height: 200px;
      }

      .terminal-panel {
        height: 40vh;
      }
    }
  </style>
</head>
<body>
<nav class="top-nav" id="main-nav"></nav>
  <div class="lab-wrapper">
    <!-- Header -->
    <div class="lab-header">
      <div style="display:flex;align-items:center;gap:var(--s-md);">

        <h1>Lab 1 &mdash; Campus Network Build</h1>
      </div>
      <div class="lab-header-meta">

      </div>

        <div class="objectives-title">Objectives</div>
        <div class="objectives-list" id="objectives-list"></div>

          <div class="hint-count" id="hint-count">3 hints remaining</div>

      <!-- Center: Topology -->
      <div class="center-panel">

          <!-- R1 Device -->

            <rect x="250" y="55" width="120" height="50" rx="4" fill="#FFFFFF" stroke="#C7C3BC" stroke-width="1.5"/>
            <text x="310" y="76" text-anchor="middle" class="topo-device-label">R1</text>
            <text x="310" y="96" text-anchor="middle" class="topo-device-type">Cisco 2911</text>
          </g>

          <!-- Trunk Link: R1 to SW1 -->
          <line id="link-trunk" class="topo-link" x1="310" y1="105" x2="310" y2="170"/>
          <text x="295" y="118" class="topo-port-label">Gi0/0</text>
          <text x="322" y="140" class="topo-label" style="font-size:8px;">trunk</text>
          <text x="295" y="166" class="topo-port-label">Gi0/1</text>

          <!-- SW1 Device -->

            <text x="130" y="300" text-anchor="middle" class="topo-device-label" style="font-size:10px;">PC1</text>
            <text x="130" y="313" text-anchor="middle" class="topo-vlan-label" style="fill:#B45309;">VLAN 10</text>

        </svg>

        <!-- Hint Overlay -->
        <div class="hint-overlay" id="hint-overlay">

          <button class="hint-close" id="hint-close">&times;</button>
          <div id="hint-text"></div>
        </div>
      </div>
    </div>

    <!-- Bottom: Terminal -->
    <div class="terminal-panel">
      <div class="terminal-toolbar">
        <div class="terminal-toolbar-left">
          <span class="terminal-dot red"></span>
          <span class="terminal-dot yellow"></span>
          <span class="terminal-dot green"></span>
          <span class="terminal-tab" id="terminal-tab">SW1 &mdash; Cisco 2960 Switch</span>
        </div>
        <button class="terminal-clear-btn" id="clear-btn">clear</button>
      </div>
      <div class="terminal" id="terminal">
        <div class="term-output" id="term-output"></div>
        <div class="term-input-line">
          <span class="term-prompt" id="term-prompt">SW1> </span>
          <span class="term-input" id="term-input" contenteditable="true" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></span>

  <script defer src="../js/lab-engine.js"></script>
  <script>document.addEventListener('DOMContentLoaded',function(){

  (function() {
    'use strict';

    // ════════════════════════════════════════════════════════════
    // OBJECTIVES DEFINITION
    // ════════════════════════════════════════════════════════════

    const OBJECTIVES = [
      {
        id: 0,

      },
      {

        desc: 'OSPF process 1 advertising all networks in area 0',
        device: 'R1',

      },
      {
        id: 7,

        desc: 'Max 2 MACs, sticky learning, violation shutdown',

      },
      {

      },

        device: 'R1',

      },
      {
        id: 10,
        title: 'Configure default route on R1',
        desc: 'Static default route via 203.0.113.2',
        device: 'R1',

      },
      {
        id: 11,

        device: 'any',
        hint: null
      }
    ];

    // ════════════════════════════════════════════════════════════
    // DEVICE STATE
    // ════════════════════════════════════════════════════════════

    const devices = {
      SW1: {
        hostname: 'SW1',
        type: 'switch',
        mode: 'user',     // user, priv, config, config-if, config-vlan, config-line
        currentInterface: null,
        _currentVlan: null,
        vlans: { 1: { name: 'default', ports: ['Fa0/4','Fa0/5','Fa0/6','Fa0/7','Fa0/8','Fa0/9','Fa0/10','Fa0/11','Fa0/12','Fa0/13','Fa0/14','Fa0/15','Fa0/16','Fa0/17','Fa0/18','Fa0/19','Fa0/20','Fa0/21','Fa0/22','Fa0/23','Fa0/24','Gi0/1','Gi0/2'] } },
        interfaces: {
          'FastEthernet0/1': { mode: null, accessVlan: null, up: true },
          'FastEthernet0/2': { mode: null, accessVlan: null, up: true },
          'FastEthernet0/3': { mode: null, accessVlan: null, up: true },
          'GigabitEthernet0/1': { mode: null, encapsulation: null, nativeVlan: null, allowedVlans: null, up: true },
          'GigabitEthernet0/2': { up: true }
        },
        trunks: {},
        portSecurity: {},
        runningConfig: []
      },
      R1: {
        hostname: 'R1',
        type: 'router',
        mode: 'user',
        currentInterface: null,
        _currentVlan: null,
        _currentAcl: null,
        interfaces: {
          'GigabitEthernet0/0': { ip: null, mask: null, up: false },
          'GigabitEthernet0/1': { ip: null, mask: null, up: false }
        },
        subinterfaces: {},
        ospf: null,
        acls: {},
        standardAcls: {},
        nat: { inside: [], outside: [], overload: null },
        routes: [],
        runningConfig: []
      }
    };

    let activeDeviceName = 'SW1';
    let completedObjectives = new Set();
    let hintsUsed = 0;
    const MAX_HINTS = 3;
    let commandHistory = [];
    let historyIdx = -1;
    let verifyShowVlanRun = false;
    let verifyShowOspfRun = false;
    let verifyShowNatRun = false;

    function dev() { return devices[activeDeviceName]; }

    // ════════════════════════════════════════════════════════════
    // PROMPT
    // ════════════════════════════════════════════════════════════

    function getPrompt() {
      const d = dev();
      const h = d.hostname;
      switch (d.mode) {
        case 'user': return `${h}>`;
        case 'priv': return `${h}#`;
        case 'config': return `${h}(config)#`;
        case 'config-if': return `${h}(config-if)#`;
        case 'config-subif': return `${h}(config-subif)#`;
        case 'config-router': return `${h}(config-router)#`;
        case 'config-line': return `${h}(config-line)#`;
        case 'config-vlan': return `${h}(config-vlan)#`;
        case 'config-acl': return `${h}(config-ext-nacl)#`;
        default: return `${h}#`;
      }
    }

    // ════════════════════════════════════════════════════════════
    // INTERFACE NORMALIZATION
    // ════════════════════════════════════════════════════════════

    function normalizeInterface(name) {
      let n = name.trim();
      // Handle abbreviations
      n = n.replace(/^gi(?:gabitethernet)?/i, 'GigabitEthernet');
      n = n.replace(/^fa(?:stethernet)?/i, 'FastEthernet');
      n = n.replace(/^lo(?:opback)?/i, 'Loopback');
      n = n.replace(/^se(?:rial)?/i, 'Serial');
      // Ensure space removed between name and number
      n = n.replace(/^(GigabitEthernet|FastEthernet|Loopback|Serial)\s*/i, function(m, p1) { return p1; });
      return n;
    }

    // ════════════════════════════════════════════════════════════
    // COMMAND EXPANSION (abbreviation support)
    // ════════════════════════════════════════════════════════════

    function expandCmd(raw) {
      let s = raw.trim();
      const lower = s.toLowerCase();

      // Mode shortcuts
      if (lower === 'en' || lower === 'ena') return 'enable';
      if (lower === 'conf t' || lower === 'config t' || lower.match(/^conf(?:igure)?\s+t(?:erminal)?$/i)) return 'configure terminal';

      // Switchport abbreviations
      s = s.replace(/^sw(?:itchport)?\s+mo(?:de)?\s+ac(?:cess)?$/i, 'switchport mode access');
      s = s.replace(/^sw(?:itchport)?\s+mo(?:de)?\s+tr(?:unk)?$/i, 'switchport mode trunk');
      s = s.replace(/^sw(?:itchport)?\s+ac(?:cess)?\s+vl(?:an)?\s+(\d+)$/i, 'switchport access vlan $1');
      s = s.replace(/^sw(?:itchport)?\s+tr(?:unk)?\s+enc(?:apsulation)?\s+dot1q$/i, 'switchport trunk encapsulation dot1q');
      s = s.replace(/^sw(?:itchport)?\s+tr(?:unk)?\s+al(?:lowed)?\s+vl(?:an)?\s+(.+)$/i, 'switchport trunk allowed vlan $1');
      s = s.replace(/^sw(?:itchport)?\s+tr(?:unk)?\s+na(?:tive)?\s+vl(?:an)?\s+(\d+)$/i, 'switchport trunk native vlan $1');
      s = s.replace(/^sw(?:itchport)?\s+po(?:rt-security)?$/i, 'switchport port-security');
      s = s.replace(/^sw(?:itchport)?\s+po(?:rt-security)?\s+max(?:imum)?\s+(\d+)$/i, 'switchport port-security maximum $1');
      s = s.replace(/^sw(?:itchport)?\s+po(?:rt-security)?\s+mac(?:-address)?\s+st(?:icky)?$/i, 'switchport port-security mac-address sticky');
      s = s.replace(/^sw(?:itchport)?\s+po(?:rt-security)?\s+vi(?:olation)?\s+(shutdown|restrict|protect)$/i, 'switchport port-security violation $1');

      // Interface shorthand
      s = s.replace(/^int(?:erface)?\s+(.+)$/i, function(m, p1) { return 'interface ' + p1; });

      // No shutdown
      s = s.replace(/^no\s+sh(?:ut(?:down)?)?$/i, 'no shutdown');

      // Router OSPF
      s = s.replace(/^ro(?:uter)?\s+os(?:pf)?\s+(\d+)$/i, 'router ospf $1');

      // Show commands
      s = s.replace(/^sh(?:ow)?\s+vl(?:an)?\s+br(?:ief)?$/i, 'show vlan brief');
      s = s.replace(/^sh(?:ow)?\s+int(?:erfaces)?\s+tr(?:unk)?$/i, 'show interfaces trunk');
      s = s.replace(/^sh(?:ow)?\s+ip\s+int(?:erface)?\s+br(?:ief)?$/i, 'show ip interface brief');
      s = s.replace(/^sh(?:ow)?\s+ru(?:n(?:ning-config)?)?$/i, 'show running-config');
      s = s.replace(/^sh(?:ow)?\s+ip\s+os(?:pf)?\s+ne(?:ighbor)?$/i, 'show ip ospf neighbor');
      s = s.replace(/^sh(?:ow)?\s+ip\s+na(?:t)?\s+tr(?:anslations)?$/i, 'show ip nat translations');
      s = s.replace(/^sh(?:ow)?\s+ip\s+ac(?:cess-lists)?$/i, 'show ip access-lists');
      s = s.replace(/^sh(?:ow)?\s+po(?:rt-security)?\s+int(?:erface)?\s+(.+)$/i, 'show port-security interface $1');
      s = s.replace(/^sh(?:ow)?\s+ip\s+ro(?:ute)?$/i, 'show ip route');

      // Encapsulation
      s = s.replace(/^enc(?:apsulation)?\s+dot1q\s+(\d+)$/i, 'encapsulation dot1Q $1');
      s = s.replace(/^enc(?:apsulation)?\s+dot1Q\s+(\d+)$/i, 'encapsulation dot1Q $1');

      // IP address
      s = s.replace(/^ip\s+add(?:ress)?\s+(.+)$/i, 'ip address $1');

      // IP access-list
      s = s.replace(/^ip\s+access-list\s+ext(?:ended)?\s+(.+)$/i, 'ip access-list extended $1');

      // IP access-group
      s = s.replace(/^ip\s+access-group\s+(.+)$/i, 'ip access-group $1');

      // IP nat
      s = s.replace(/^ip\s+nat\s+ins(?:ide)?$/i, 'ip nat inside');
      s = s.replace(/^ip\s+nat\s+out(?:side)?$/i, 'ip nat outside');

      return s;
    }

    // ════════════════════════════════════════════════════════════
    // COMMAND PROCESSOR
    // ════════════════════════════════════════════════════════════

    function processCommand(rawInput) {
      if (!rawInput || !rawInput.trim()) return [];

      const expanded = expandCmd(rawInput);
      const lower = expanded.toLowerCase().trim();
      const d = dev();
      const lines = [];

      // ── Mode Navigation ───────────────────────────────
      if (lower === 'enable') {
        if (d.mode === 'user') d.mode = 'priv';
        return lines;
      }
      if (lower === 'disable') {
        d.mode = 'user';
        return lines;
      }
      if (lower === 'configure terminal') {
        if (d.mode === 'priv') {
          d.mode = 'config';
          lines.push({ text: 'Enter configuration commands, one per line.  End with CNTL/Z.', cls: 'info' });
        } else {
          lines.push({ text: '% Invalid input detected', cls: 'error' });
        }
        return lines;
      }
      if (lower === 'exit') {
        if (d.mode === 'config-if' || d.mode === 'config-subif') { d.mode = 'config'; d.currentInterface = null; }
        else if (d.mode === 'config-router') { d.mode = 'config'; }
        else if (d.mode === 'config-line') { d.mode = 'config'; }
        else if (d.mode === 'config-vlan') { d.mode = 'config'; d._currentVlan = null; }
        else if (d.mode === 'config-acl') { d.mode = 'config'; d._currentAcl = null; }
        else if (d.mode === 'config') { d.mode = 'priv'; }
        else if (d.mode === 'priv') { d.mode = 'user'; }
        return lines;
      }
      if (lower === 'end') {
        d.mode = 'priv';
        d.currentInterface = null;
        d._currentVlan = null;
        d._currentAcl = null;
        return lines;
      }

      // ── Show Commands (work in priv mode or config modes) ─────
      if (lower.startsWith('show ') || lower === 'show') {
        if (d.mode === 'user') {
          lines.push({ text: "% Type 'enable' to enter privileged EXEC mode first.", cls: 'error' });
          return lines;
        }
        return handleShow(expanded, lower);
      }

      // ── VLAN Creation ─────────────────────────────────
      const vlanMatch = expanded.match(/^vlan\s+(\d+)$/i);
      if (vlanMatch && (d.mode === 'config' || d.mode === 'config-vlan')) {
        if (d.type !== 'switch') {
          lines.push({ text: "% VLAN commands are only valid on switches.", cls: 'error' });
          return lines;
        }
        const vid = parseInt(vlanMatch[1]);
        if (!d.vlans[vid]) d.vlans[vid] = { name: 'VLAN' + String(vid).padStart(4, '0'), ports: [] };
        d.mode = 'config-vlan';
        d._currentVlan = vid;
        checkObjectives();
        return lines;
      }

      // ── VLAN Name ─────────────────────────────────────
      if (lower.startsWith('name ') && d.mode === 'config-vlan') {
        const name = expanded.substring(5).trim();
        const vid = d._currentVlan;
        if (vid && d.vlans[vid]) {
          d.vlans[vid].name = name;
        }
        checkObjectives();
        return lines;
      }

      // ── Interface ─────────────────────────────────────
      const ifMatch = expanded.match(/^interface\s+(.+)$/i);
      if (ifMatch && (d.mode === 'config' || d.mode === 'config-if' || d.mode === 'config-subif' || d.mode === 'config-vlan')) {
        const raw = ifMatch[1].trim();
        const ifName = normalizeInterface(raw);

        if (ifName.includes('.')) {
          // Subinterface
          d.mode = 'config-subif';
          d.currentInterface = ifName;
          if (d.type === 'router') {
            if (!d.subinterfaces[ifName]) {
              d.subinterfaces[ifName] = { encapsulation: null, vlanId: null, ip: null, mask: null, natDirection: null, accessGroup: null };
            }
          }
        } else {
          d.mode = 'config-if';
          d.currentInterface = ifName;
          if (!d.interfaces[ifName]) {
            d.interfaces[ifName] = { up: true };
          }
        }
        d._currentVlan = null;
        return lines;
      }

      // ── Switchport Commands ───────────────────────────
      if (lower.startsWith('switchport') && (d.mode === 'config-if')) {
        if (d.type !== 'switch') {
          lines.push({ text: "% Switchport commands are only valid on switches.", cls: 'error' });
          return lines;
        }
        return handleSwitchport(expanded, lower, d);
      }

      // ── Encapsulation (router subinterface) ───────────
      const encapMatch = expanded.match(/^encapsulation\s+dot1Q\s+(\d+)$/i);
      if (encapMatch && d.mode === 'config-subif' && d.type === 'router') {
        const vid = parseInt(encapMatch[1]);
        const ifName = d.currentInterface;
        if (d.subinterfaces[ifName]) {
          d.subinterfaces[ifName].encapsulation = 'dot1Q';
          d.subinterfaces[ifName].vlanId = vid;
        }
        checkObjectives();
        return lines;
      }

      // ── IP Address ────────────────────────────────────
      const ipAddrMatch = expanded.match(/^ip\s+address\s+(\S+)\s+(\S+)$/i);
      if (ipAddrMatch && (d.mode === 'config-if' || d.mode === 'config-subif')) {
        const ip = ipAddrMatch[1];
        const mask = ipAddrMatch[2];
        const ifName = d.currentInterface;

        if (d.mode === 'config-subif' && d.subinterfaces[ifName]) {
          d.subinterfaces[ifName].ip = ip;
          d.subinterfaces[ifName].mask = mask;
        } else if (d.interfaces[ifName]) {
          d.interfaces[ifName].ip = ip;
          d.interfaces[ifName].mask = mask;
        }
        checkObjectives();
        return lines;
      }

      // ── No Shutdown ───────────────────────────────────
      if (lower === 'no shutdown' && (d.mode === 'config-if' || d.mode === 'config-subif')) {
        const ifName = d.currentInterface;
        if (d.mode === 'config-subif' && d.subinterfaces && d.subinterfaces[ifName]) {
          d.subinterfaces[ifName].up = true;
        } else if (d.interfaces[ifName]) {
          const wasDown = !d.interfaces[ifName].up;
          d.interfaces[ifName].up = true;
          if (wasDown) {
            lines.push({ text: `%LINK-3-UPDOWN: Interface ${ifName}, changed state to up`, cls: 'info' });
            lines.push({ text: `%LINEPROTO-5-UPDOWN: Line protocol on Interface ${ifName}, changed state to up`, cls: 'info' });
          }
        }
        checkObjectives();
        return lines;
      }

      // ── Router OSPF ───────────────────────────────────
      const ospfMatch = expanded.match(/^router\s+ospf\s+(\d+)$/i);
      if (ospfMatch && d.mode === 'config') {
        if (d.type !== 'router') {
          lines.push({ text: "% OSPF is configured on routers.", cls: 'error' });
          return lines;
        }
        const pid = parseInt(ospfMatch[1]);
        if (!d.ospf) d.ospf = { processId: pid, networks: [], routerId: null };
        d.ospf.processId = pid;
        d.mode = 'config-router';
        return lines;
      }

      // ── OSPF Network Statement ────────────────────────
      const networkMatch = expanded.match(/^network\s+(\S+)\s+(\S+)\s+area\s+(\d+)$/i);
      if (networkMatch && d.mode === 'config-router') {
        const net = networkMatch[1];
        const wc = networkMatch[2];
        const area = parseInt(networkMatch[3]);
        if (d.ospf) {
          // Check for duplicate
          const exists = d.ospf.networks.some(n => n.network === net && n.wildcard === wc && n.area === area);
          if (!exists) {
            d.ospf.networks.push({ network: net, wildcard: wc, area: area });
          }
        }
        checkObjectives();
        return lines;
      }

      // ── IP Access-List Extended ────────────────────────
      const aclExtMatch = expanded.match(/^ip\s+access-list\s+extended\s+(\S+)$/i);
      if (aclExtMatch && d.mode === 'config') {
        const aclName = aclExtMatch[1];
        if (!d.acls[aclName]) d.acls[aclName] = { type: 'extended', entries: [] };
        d._currentAcl = aclName;
        d.mode = 'config-acl';
        return lines;
      }

      // ── ACL Entries (deny/permit inside ACL config mode) ──
      if (d.mode === 'config-acl' && d._currentAcl) {
        const aclEntryMatch = expanded.match(/^(deny|permit)\s+(.+)$/i);
        if (aclEntryMatch) {
          const action = aclEntryMatch[1].toLowerCase();
          const rest = aclEntryMatch[2].trim();
          d.acls[d._currentAcl].entries.push({ action: action, rule: rest });
          checkObjectives();
          return lines;
        }
      }

      // ── IP Access-Group (on interface) ────────────────
      const agMatch = expanded.match(/^ip\s+access-group\s+(\S+)\s+(in|out)$/i);
      if (agMatch && (d.mode === 'config-if' || d.mode === 'config-subif')) {
        const aclName = agMatch[1];
        const dir = agMatch[2].toLowerCase();
        const ifName = d.currentInterface;
        if (d.mode === 'config-subif' && d.subinterfaces[ifName]) {
          d.subinterfaces[ifName].accessGroup = { name: aclName, direction: dir };
        } else if (d.interfaces[ifName]) {
          if (!d.interfaces[ifName].accessGroup) d.interfaces[ifName].accessGroup = {};
          d.interfaces[ifName].accessGroup = { name: aclName, direction: dir };
        }
        checkObjectives();
        return lines;
      }

      // ── IP NAT Inside/Outside ─────────────────────────
      if (lower === 'ip nat inside' && (d.mode === 'config-if' || d.mode === 'config-subif')) {
        const ifName = d.currentInterface;
        if (d.mode === 'config-subif' && d.subinterfaces[ifName]) {
          d.subinterfaces[ifName].natDirection = 'inside';
        } else if (d.interfaces[ifName]) {
          d.interfaces[ifName].natDirection = 'inside';
        }
        if (!d.nat.inside.includes(ifName)) d.nat.inside.push(ifName);
        checkObjectives();
        return lines;
      }
      if (lower === 'ip nat outside' && (d.mode === 'config-if' || d.mode === 'config-subif')) {
        const ifName = d.currentInterface;
        if (d.interfaces[ifName]) {
          d.interfaces[ifName].natDirection = 'outside';
        }
        if (!d.nat.outside.includes(ifName)) d.nat.outside.push(ifName);
        checkObjectives();
        return lines;
      }

      // ── IP NAT Inside Source List ─────────────────────
      const natOverloadMatch = expanded.match(/^ip\s+nat\s+inside\s+source\s+list\s+(\d+)\s+interface\s+(\S+)\s+overload$/i);
      if (natOverloadMatch && d.mode === 'config') {
        d.nat.overload = {
          acl: parseInt(natOverloadMatch[1]),
          interface: normalizeInterface(natOverloadMatch[2])
        };
        checkObjectives();
        return lines;
      }

      // ── Standard ACL (access-list) ────────────────────
      const stdAclMatch = expanded.match(/^access-list\s+(\d+)\s+(permit|deny)\s+(\S+)\s+(\S+)$/i);
      if (stdAclMatch && d.mode === 'config') {
        const num = parseInt(stdAclMatch[1]);
        const action = stdAclMatch[2].toLowerCase();
        const net = stdAclMatch[3];
        const wc = stdAclMatch[4];
        if (!d.standardAcls[num]) d.standardAcls[num] = [];
        d.standardAcls[num].push({ action: action, network: net, wildcard: wc });
        checkObjectives();
        return lines;
      }

      // ── IP Route ──────────────────────────────────────
      const routeMatch = expanded.match(/^ip\s+route\s+(\S+)\s+(\S+)\s+(\S+)$/i);
      if (routeMatch && d.mode === 'config') {
        const dest = routeMatch[1];
        const mask = routeMatch[2];
        const nextHop = routeMatch[3];
        d.routes.push({ destination: dest, mask: mask, nextHop: nextHop });
        checkObjectives();
        return lines;
      }

      // ── Unknown / Error ───────────────────────────────
      if (d.mode === 'user') {
        lines.push({ text: `% Unknown command or computer name, or unable to find computer address`, cls: 'error' });
      } else {
        lines.push({ text: `% Invalid input detected at '^' marker.`, cls: 'error' });
      }
      return lines;
    }

    // ════════════════════════════════════════════════════════════
    // SWITCHPORT HANDLER
    // ════════════════════════════════════════════════════════════

    function handleSwitchport(expanded, lower, d) {
      const lines = [];
      const ifName = d.currentInterface;
      const iface = d.interfaces[ifName];
      if (!iface) { lines.push({ text: '% Interface not found.', cls: 'error' }); return lines; }

      if (lower === 'switchport mode access') {
        iface.mode = 'access';
        checkObjectives();
        return lines;
      }
      if (lower === 'switchport mode trunk') {
        iface.mode = 'trunk';
        if (!d.trunks[ifName]) d.trunks[ifName] = {};
        checkObjectives();
        return lines;
      }

      const accessVlanMatch = expanded.match(/^switchport\s+access\s+vlan\s+(\d+)$/i);
      if (accessVlanMatch) {
        const vid = parseInt(accessVlanMatch[1]);
        iface.accessVlan = vid;
        // Update VLAN port lists
        for (const v of Object.keys(d.vlans)) {
          const shortName = ifName.replace('FastEthernet', 'Fa').replace('GigabitEthernet', 'Gi');
          d.vlans[v].ports = d.vlans[v].ports.filter(p => p !== shortName);
        }
        if (!d.vlans[vid]) d.vlans[vid] = { name: 'VLAN' + String(vid).padStart(4, '0'), ports: [] };
        const shortName = ifName.replace('FastEthernet', 'Fa').replace('GigabitEthernet', 'Gi');
        if (!d.vlans[vid].ports.includes(shortName)) d.vlans[vid].ports.push(shortName);
        // Remove from VLAN 1
        if (d.vlans[1]) d.vlans[1].ports = d.vlans[1].ports.filter(p => p !== shortName);
        checkObjectives();
        return lines;
      }

      if (lower === 'switchport trunk encapsulation dot1q') {
        iface.encapsulation = 'dot1q';
        if (!d.trunks[ifName]) d.trunks[ifName] = {};
        d.trunks[ifName].encapsulation = 'dot1q';
        checkObjectives();
        return lines;
      }

      const trunkAllowedMatch = expanded.match(/^switchport\s+trunk\s+allowed\s+vlan\s+(.+)$/i);
      if (trunkAllowedMatch) {
        const vlans = trunkAllowedMatch[1].trim();
        iface.allowedVlans = vlans;
        if (!d.trunks[ifName]) d.trunks[ifName] = {};
        d.trunks[ifName].allowedVlans = vlans;
        checkObjectives();
        return lines;
      }

      const trunkNativeMatch = expanded.match(/^switchport\s+trunk\s+native\s+vlan\s+(\d+)$/i);
      if (trunkNativeMatch) {
        const vid = parseInt(trunkNativeMatch[1]);
        iface.nativeVlan = vid;
        if (!d.trunks[ifName]) d.trunks[ifName] = {};
        d.trunks[ifName].nativeVlan = vid;
        checkObjectives();
        return lines;
      }

      // Port Security commands
      if (lower === 'switchport port-security') {
        if (!d.portSecurity[ifName]) d.portSecurity[ifName] = {};
        d.portSecurity[ifName].enabled = true;
        checkObjectives();
        return lines;
      }
      const psMaxMatch = expanded.match(/^switchport\s+port-security\s+maximum\s+(\d+)$/i);
      if (psMaxMatch) {
        if (!d.portSecurity[ifName]) d.portSecurity[ifName] = {};
        d.portSecurity[ifName].maximum = parseInt(psMaxMatch[1]);
        checkObjectives();
        return lines;
      }
      if (lower === 'switchport port-security mac-address sticky') {
        if (!d.portSecurity[ifName]) d.portSecurity[ifName] = {};
        d.portSecurity[ifName].sticky = true;
        checkObjectives();
        return lines;
      }
      const psViolMatch = expanded.match(/^switchport\s+port-security\s+violation\s+(shutdown|restrict|protect)$/i);
      if (psViolMatch) {
        if (!d.portSecurity[ifName]) d.portSecurity[ifName] = {};
        d.portSecurity[ifName].violation = psViolMatch[1].toLowerCase();
        checkObjectives();
        return lines;
      }

      lines.push({ text: `% Invalid input detected at '^' marker.`, cls: 'error' });
      return lines;
    }

    // ════════════════════════════════════════════════════════════
    // SHOW COMMAND HANDLER
    // ════════════════════════════════════════════════════════════

    function handleShow(expanded, lower) {
      const lines = [];
      const d = dev();

      // ── show vlan brief ──────────────────────────────
      if (lower === 'show vlan brief') {
        lines.push({ text: '', cls: 'info' });
        lines.push({ text: 'VLAN Name                             Status    Ports', cls: 'info' });
        lines.push({ text: '---- -------------------------------- --------- -------------------------------', cls: 'info' });

        const sw = devices.SW1;
        const sortedVlans = Object.keys(sw.vlans).map(Number).sort((a, b) => a - b);
        for (const vid of sortedVlans) {
          const v = sw.vlans[vid];
          const name = (v.name || 'VLAN' + String(vid).padStart(4, '0')).padEnd(33);
          const status = 'active   ';
          const ports = (v.ports || []).join(', ');
          lines.push({ text: `${String(vid).padEnd(5)}${name}${status}${ports}`, cls: 'info' });
        }
        // Check for 10, 20, 30
        if (sw.vlans[10] && sw.vlans[20] && sw.vlans[30]) {
          verifyShowVlanRun = true;
          checkObjectives();
        }
        lines.push({ text: '', cls: 'info' });
        return lines;
      }

      // ── show interfaces trunk ────────────────────────
      if (lower === 'show interfaces trunk') {
        const sw = devices.SW1;
        const trunks = Object.keys(sw.trunks);
        if (trunks.length === 0) {
          lines.push({ text: '', cls: 'info' });
          lines.push({ text: '% No trunk interfaces configured.', cls: 'info' });
          return lines;
        }
        lines.push({ text: '', cls: 'info' });
        lines.push({ text: 'Port        Mode             Encapsulation  Status        Native vlan', cls: 'info' });
        lines.push({ text: '----------- ---------------- -------------- ------------- -----------', cls: 'info' });
        for (const ifName of trunks) {
          const t = sw.trunks[ifName];
          const short = ifName.replace('GigabitEthernet', 'Gi').replace('FastEthernet', 'Fa');
          const mode = 'on'.padEnd(17);
          const encap = (t.encapsulation || '802.1q').padEnd(15);
          const status = 'trunking'.padEnd(14);
          const native = String(t.nativeVlan || 1);
          lines.push({ text: `${short.padEnd(12)}${mode}${encap}${status}${native}`, cls: 'info' });
        }
        lines.push({ text: '', cls: 'info' });
        lines.push({ text: 'Port        Vlans allowed on trunk', cls: 'info' });
        lines.push({ text: '----------- ------------------------------------', cls: 'info' });
        for (const ifName of trunks) {
          const t = sw.trunks[ifName];
          const short = ifName.replace('GigabitEthernet', 'Gi').replace('FastEthernet', 'Fa');
          lines.push({ text: `${short.padEnd(12)}${t.allowedVlans || '1-4094'}`, cls: 'info' });
        }
        lines.push({ text: '', cls: 'info' });
        return lines;
      }

      // ── show ip interface brief ──────────────────────
      if (lower === 'show ip interface brief') {
        lines.push({ text: '', cls: 'info' });
        lines.push({ text: 'Interface                  IP-Address      OK? Method Status                Protocol', cls: 'info' });

        if (d.type === 'router') {
          const r = devices.R1;
          for (const [ifName, iface] of Object.entries(r.interfaces)) {
            const ip = (iface.ip || 'unassigned').padEnd(16);
            const ok = 'YES ';
            const meth = 'manual '.padEnd(7);
            const st = iface.up ? 'up                    ' : 'administratively down ';
            const pr = iface.up ? 'up' : 'down';
            lines.push({ text: `${ifName.padEnd(27)}${ip}${ok}${meth}${st}${pr}`, cls: 'info' });
          }
          for (const [ifName, sub] of Object.entries(r.subinterfaces)) {
            const ip = (sub.ip || 'unassigned').padEnd(16);
            const ok = 'YES ';
            const meth = 'manual '.padEnd(7);
            // Subinterface is up if parent is up
            const parentName = ifName.split('.')[0];
            const parentIf = r.interfaces[parentName];
            const isUp = parentIf && parentIf.up;
            const st = isUp ? 'up                    ' : 'down                  ';
            const pr = isUp ? 'up' : 'down';
            lines.push({ text: `${ifName.padEnd(27)}${ip}${ok}${meth}${st}${pr}`, cls: 'info' });
          }
        } else {
          const sw = devices.SW1;
          lines.push({ text: `${'Vlan1'.padEnd(27)}${'unassigned'.padEnd(16)}YES ${'manual '.padEnd(7)}${'up'.padEnd(22)}up`, cls: 'info' });
          for (const [ifName, iface] of Object.entries(sw.interfaces)) {
            const shortShow = ifName;
            const ip = 'unassigned'.padEnd(16);
            const st = iface.up ? 'up'.padEnd(22) : 'down'.padEnd(22);
            const pr = iface.up ? 'up' : 'down';
            lines.push({ text: `${shortShow.padEnd(27)}${ip}YES ${'unset  '.padEnd(7)}${st}${pr}`, cls: 'info' });
          }
        }
        lines.push({ text: '', cls: 'info' });
        return lines;
      }

      // ── show running-config ──────────────────────────
      if (lower === 'show running-config') {
        lines.push({ text: 'Building configuration...', cls: 'info' });
        lines.push({ text: '', cls: 'info' });
        lines.push({ text: 'Current configuration:', cls: 'info' });
        lines.push({ text: '!', cls: 'info' });
        lines.push({ text: `hostname ${d.hostname}`, cls: 'info' });
        lines.push({ text: '!', cls: 'info' });

        if (d.type === 'switch') {
          const sw = devices.SW1;
          for (const [vid, v] of Object.entries(sw.vlans)) {
            if (parseInt(vid) === 1) continue;
            lines.push({ text: `vlan ${vid}`, cls: 'info' });
            lines.push({ text: ` name ${v.name}`, cls: 'info' });
            lines.push({ text: '!', cls: 'info' });
          }
          for (const [ifName, iface] of Object.entries(sw.interfaces)) {
            const hasConfig = iface.mode || iface.encapsulation || iface.accessVlan || sw.portSecurity[ifName];
            if (!hasConfig) continue;
            lines.push({ text: `interface ${ifName}`, cls: 'info' });
            if (iface.mode === 'access') {
              lines.push({ text: ` switchport mode access`, cls: 'info' });
              if (iface.accessVlan) lines.push({ text: ` switchport access vlan ${iface.accessVlan}`, cls: 'info' });
            }
            if (iface.mode === 'trunk') {
              if (iface.encapsulation) lines.push({ text: ` switchport trunk encapsulation dot1q`, cls: 'info' });
              lines.push({ text: ` switchport mode trunk`, cls: 'info' });
              if (iface.allowedVlans) lines.push({ text: ` switchport trunk allowed vlan ${iface.allowedVlans}`, cls: 'info' });
              if (iface.nativeVlan) lines.push({ text: ` switchport trunk native vlan ${iface.nativeVlan}`, cls: 'info' });
            }
            if (sw.portSecurity[ifName]) {
              const ps = sw.portSecurity[ifName];
              if (ps.enabled) lines.push({ text: ` switchport port-security`, cls: 'info' });
              if (ps.maximum) lines.push({ text: ` switchport port-security maximum ${ps.maximum}`, cls: 'info' });
              if (ps.sticky) lines.push({ text: ` switchport port-security mac-address sticky`, cls: 'info' });
              if (ps.violation) lines.push({ text: ` switchport port-security violation ${ps.violation}`, cls: 'info' });
            }
            lines.push({ text: '!', cls: 'info' });
          }
        }

        if (d.type === 'router') {
          const r = devices.R1;
          for (const [ifName, iface] of Object.entries(r.interfaces)) {
            const hasConfig = iface.ip || iface.natDirection || iface.up;
            lines.push({ text: `interface ${ifName}`, cls: 'info' });
            if (iface.ip) lines.push({ text: ` ip address ${iface.ip} ${iface.mask}`, cls: 'info' });
            if (iface.natDirection) lines.push({ text: ` ip nat ${iface.natDirection}`, cls: 'info' });
            if (iface.up) lines.push({ text: ` no shutdown`, cls: 'info' });
            else lines.push({ text: ` shutdown`, cls: 'info' });
            lines.push({ text: '!', cls: 'info' });
          }
          for (const [ifName, sub] of Object.entries(r.subinterfaces)) {
            lines.push({ text: `interface ${ifName}`, cls: 'info' });
            if (sub.encapsulation && sub.vlanId) lines.push({ text: ` encapsulation dot1Q ${sub.vlanId}`, cls: 'info' });
            if (sub.ip) lines.push({ text: ` ip address ${sub.ip} ${sub.mask}`, cls: 'info' });
            if (sub.natDirection) lines.push({ text: ` ip nat ${sub.natDirection}`, cls: 'info' });
            if (sub.accessGroup) lines.push({ text: ` ip access-group ${sub.accessGroup.name} ${sub.accessGroup.direction}`, cls: 'info' });
            lines.push({ text: '!', cls: 'info' });
          }
          if (r.ospf) {
            lines.push({ text: `router ospf ${r.ospf.processId}`, cls: 'info' });
            for (const n of r.ospf.networks) {
              lines.push({ text: ` network ${n.network} ${n.wildcard} area ${n.area}`, cls: 'info' });
            }
            lines.push({ text: '!', cls: 'info' });
          }
          for (const [name, acl] of Object.entries(r.acls)) {
            lines.push({ text: `ip access-list extended ${name}`, cls: 'info' });
            for (const e of acl.entries) {
              lines.push({ text: ` ${e.action} ${e.rule}`, cls: 'info' });
            }
            lines.push({ text: '!', cls: 'info' });
          }
          for (const [num, entries] of Object.entries(r.standardAcls)) {
            for (const e of entries) {
              lines.push({ text: `access-list ${num} ${e.action} ${e.network} ${e.wildcard}`, cls: 'info' });
            }
          }
          if (r.nat.overload) {
            lines.push({ text: `ip nat inside source list ${r.nat.overload.acl} interface ${r.nat.overload.interface} overload`, cls: 'info' });
          }
          for (const route of r.routes) {
            lines.push({ text: `ip route ${route.destination} ${route.mask} ${route.nextHop}`, cls: 'info' });
          }
          lines.push({ text: '!', cls: 'info' });
        }

        lines.push({ text: 'end', cls: 'info' });
        lines.push({ text: '', cls: 'info' });
        return lines;
      }

      // ── show ip ospf neighbor ────────────────────────
      if (lower === 'show ip ospf neighbor') {
        const r = devices.R1;
        if (!r.ospf || r.ospf.networks.length === 0) {
          lines.push({ text: '', cls: 'info' });
          lines.push({ text: '% OSPF is not configured or has no neighbors.', cls: 'info' });
          return lines;
        }
        lines.push({ text: '', cls: 'info' });
        lines.push({ text: 'Neighbor ID     Pri   State           Dead Time   Address         Interface', cls: 'info' });

        // Simulate a neighbor if OSPF + WAN configured
        const wanIf = r.interfaces['GigabitEthernet0/1'];
        if (wanIf && wanIf.ip && wanIf.up) {
          lines.push({ text: '203.0.113.2     1     FULL/DR         00:00:33    203.0.113.2     GigabitEthernet0/1', cls: 'info' });
          verifyShowOspfRun = true;
          checkObjectives();
        } else {
          lines.push({ text: '% No OSPF neighbors found.', cls: 'info' });
        }
        lines.push({ text: '', cls: 'info' });
        return lines;
      }

      // ── show ip nat translations ─────────────────────
      if (lower === 'show ip nat translations') {
        const r = devices.R1;
        if (!r.nat.overload) {
          lines.push({ text: '', cls: 'info' });
          lines.push({ text: '% NAT is not configured.', cls: 'info' });
          return lines;
        }
        lines.push({ text: '', cls: 'info' });
        lines.push({ text: 'Pro Inside global      Inside local       Outside local      Outside global', cls: 'info' });
        lines.push({ text: '--- ---------------    ---------------    ---------------    ---------------', cls: 'info' });
        // Show some sample translations
        if (r.nat.inside.length > 0 && r.nat.outside.length > 0) {
          lines.push({ text: 'tcp 203.0.113.1:1024   10.0.10.10:1024    198.51.100.1:80    198.51.100.1:80', cls: 'info' });
          lines.push({ text: 'tcp 203.0.113.1:1025   10.0.20.10:1025    198.51.100.1:443   198.51.100.1:443', cls: 'info' });
          lines.push({ text: 'udp 203.0.113.1:5000   10.0.30.10:5000    198.51.100.2:53    198.51.100.2:53', cls: 'info' });
          verifyShowNatRun = true;
          checkObjectives();
        }
        lines.push({ text: '', cls: 'info' });
        return lines;
      }

      // ── show ip access-lists ─────────────────────────
      if (lower === 'show ip access-lists') {
        const r = devices.R1;
        lines.push({ text: '', cls: 'info' });
        let hasAcl = false;
        for (const [name, acl] of Object.entries(r.acls)) {
          hasAcl = true;
          lines.push({ text: `Extended IP access list ${name}`, cls: 'info' });
          let seq = 10;
          for (const e of acl.entries) {
            lines.push({ text: `    ${seq} ${e.action} ${e.rule}`, cls: 'info' });
            seq += 10;
          }
        }
        for (const [num, entries] of Object.entries(r.standardAcls)) {
          hasAcl = true;
          lines.push({ text: `Standard IP access list ${num}`, cls: 'info' });
          let seq = 10;
          for (const e of entries) {
            lines.push({ text: `    ${seq} ${e.action} ${e.network}, wildcard bits ${e.wildcard}`, cls: 'info' });
            seq += 10;
          }
        }
        if (!hasAcl) {
          lines.push({ text: '% No access lists configured.', cls: 'info' });
        }
        lines.push({ text: '', cls: 'info' });
        return lines;
      }

      // ── show port-security interface ─────────────────
      const psShowMatch = lower.match(/^show\s+port-security\s+interface\s+(.+)$/);
      if (psShowMatch) {
        const raw = psShowMatch[1].trim();
        const ifName = normalizeInterface(raw);
        const sw = devices.SW1;
        const ps = sw.portSecurity[ifName];
        lines.push({ text: '', cls: 'info' });
        if (!ps || !ps.enabled) {
          lines.push({ text: `% Port-security is not enabled on interface ${ifName}.`, cls: 'info' });
        } else {
          lines.push({ text: `Port Security              : Enabled`, cls: 'info' });
          lines.push({ text: `Port Status                : Secure-up`, cls: 'info' });
          lines.push({ text: `Violation Mode             : ${(ps.violation || 'Shutdown').charAt(0).toUpperCase() + (ps.violation || 'shutdown').slice(1)}`, cls: 'info' });
          lines.push({ text: `Aging Time                 : 0 mins`, cls: 'info' });
          lines.push({ text: `Aging Type                 : Absolute`, cls: 'info' });
          lines.push({ text: `SecureStatic Address Aging : Disabled`, cls: 'info' });
          lines.push({ text: `Maximum MAC Addresses      : ${ps.maximum || 1}`, cls: 'info' });
          lines.push({ text: `Total MAC Addresses        : 1`, cls: 'info' });
          lines.push({ text: `Configured MAC Addresses   : 0`, cls: 'info' });
          lines.push({ text: `Sticky MAC Addresses       : ${ps.sticky ? 1 : 0}`, cls: 'info' });
          lines.push({ text: `Last Source Address:Vlan   : 0050.7966.6800:10`, cls: 'info' });
          lines.push({ text: `Security Violation Count   : 0`, cls: 'info' });
        }
        lines.push({ text: '', cls: 'info' });
        return lines;
      }

      // ── show ip route ────────────────────────────────
      if (lower === 'show ip route') {
        const r = devices.R1;
        lines.push({ text: '', cls: 'info' });
        lines.push({ text: 'Codes: L - local, C - connected, S - static, R - RIP, M - mobile, B - BGP', cls: 'info' });
        lines.push({ text: '       D - EIGRP, EX - EIGRP external, O - OSPF, IA - OSPF inter area', cls: 'info' });
        lines.push({ text: '       N1 - OSPF NSSA external type 1, N2 - OSPF NSSA external type 2', cls: 'info' });
        lines.push({ text: '       E1 - OSPF external type 1, E2 - OSPF external type 2', cls: 'info' });
        lines.push({ text: '', cls: 'info' });
        lines.push({ text: 'Gateway of last resort is ' + (r.routes.length > 0 ? r.routes[0].nextHop + ' to network 0.0.0.0' : 'not set'), cls: 'info' });
        lines.push({ text: '', cls: 'info' });

        // Connected routes from subinterfaces
        for (const [ifName, sub] of Object.entries(r.subinterfaces)) {
          if (sub.ip && sub.mask) {
            const net = getNetworkAddress(sub.ip, sub.mask);
            const prefix = maskToPrefix(sub.mask);
            lines.push({ text: `C       ${net}/${prefix} is directly connected, ${ifName}`, cls: 'info' });
            lines.push({ text: `L       ${sub.ip}/32 is directly connected, ${ifName}`, cls: 'info' });
          }
        }
        // Connected route for WAN
        const wanIf = r.interfaces['GigabitEthernet0/1'];
        if (wanIf && wanIf.ip && wanIf.up) {
          lines.push({ text: `C       203.0.113.0/30 is directly connected, GigabitEthernet0/1`, cls: 'info' });
          lines.push({ text: `L       ${wanIf.ip}/32 is directly connected, GigabitEthernet0/1`, cls: 'info' });
        }
        // Static routes
        for (const route of r.routes) {
          const prefix = maskToPrefix(route.mask);
          lines.push({ text: `S*      ${route.destination}/${prefix} [1/0] via ${route.nextHop}`, cls: 'info' });
        }
        lines.push({ text: '', cls: 'info' });
        return lines;
      }

      lines.push({ text: `% Invalid show command.`, cls: 'error' });
      return lines;
    }

    // ════════════════════════════════════════════════════════════
    // IP HELPERS
    // ════════════════════════════════════════════════════════════

    function getNetworkAddress(ip, mask) {
      const ipParts = ip.split('.').map(Number);
      const maskParts = mask.split('.').map(Number);
      return ipParts.map((p, i) => p & maskParts[i]).join('.');
    }

    function maskToPrefix(mask) {
      return mask.split('.').reduce((acc, octet) => {
        let bits = 0;
        let n = parseInt(octet);
        while (n > 0) { bits += n & 1; n >>= 1; }
        return acc + bits;
      }, 0);
    }

    // ════════════════════════════════════════════════════════════
    // OBJECTIVE VALIDATION
    // ════════════════════════════════════════════════════════════

    function getCurrentObjectiveIdx() {
      for (let i = 0; i < OBJECTIVES.length; i++) {
        if (!completedObjectives.has(i)) return i;
      }
      return OBJECTIVES.length;
    }

    function checkObjectives() {
      const sw = devices.SW1;
      const r = devices.R1;

      // Objective 0: Create VLANs on SW1
      if (!completedObjectives.has(0)) {
        if (sw.vlans[10] && sw.vlans[20] && sw.vlans[30]) {
          const n10 = (sw.vlans[10].name || '').toLowerCase();
          const n20 = (sw.vlans[20].name || '').toLowerCase();
          const n30 = (sw.vlans[30].name || '').toLowerCase();
          if (n10 === 'sales' && n20 === 'engineering' && n30 === 'management') {
            completeObjective(0);
          }
        }
        return;
      }

      // Objective 1: Configure access ports
      if (!completedObjectives.has(1)) {
        const fa01 = sw.interfaces['FastEthernet0/1'];
        const fa02 = sw.interfaces['FastEthernet0/2'];
        const fa03 = sw.interfaces['FastEthernet0/3'];
        if (fa01 && fa01.mode === 'access' && fa01.accessVlan === 10 &&
            fa02 && fa02.mode === 'access' && fa02.accessVlan === 20 &&
            fa03 && fa03.mode === 'access' && fa03.accessVlan === 30) {
          completeObjective(1);
        }
        return;
      }

      // Objective 2: Configure trunk on SW1
      if (!completedObjectives.has(2)) {
        const gi01 = sw.interfaces['GigabitEthernet0/1'];
        if (gi01 && gi01.mode === 'trunk' && gi01.encapsulation === 'dot1q') {
          if (gi01.allowedVlans && gi01.nativeVlan === 99) {
            // Check allowed vlans contain 10,20,30
            const allowed = gi01.allowedVlans.replace(/\s/g, '');
            const nums = allowed.split(',').map(Number).sort((a,b) => a-b);
            if (nums.includes(10) && nums.includes(20) && nums.includes(30)) {
              completeObjective(2);
            }
          }
        }
        return;
      }

      // Objective 3: Router-on-a-Stick
      if (!completedObjectives.has(3)) {
        const s10 = r.subinterfaces['GigabitEthernet0/0.10'];
        const s20 = r.subinterfaces['GigabitEthernet0/0.20'];
        const s30 = r.subinterfaces['GigabitEthernet0/0.30'];
        if (s10 && s10.encapsulation === 'dot1Q' && s10.vlanId === 10 && s10.ip === '10.0.10.1' && s10.mask === '255.255.255.0' &&
            s20 && s20.encapsulation === 'dot1Q' && s20.vlanId === 20 && s20.ip === '10.0.20.1' && s20.mask === '255.255.255.0' &&
            s30 && s30.encapsulation === 'dot1Q' && s30.vlanId === 30 && s30.ip === '10.0.30.1' && s30.mask === '255.255.255.0') {
          completeObjective(3);
        }
        return;
      }

      // Objective 4: Bring up R1 Gi0/0
      if (!completedObjectives.has(4)) {
        if (r.interfaces['GigabitEthernet0/0'] && r.interfaces['GigabitEthernet0/0'].up) {
          completeObjective(4);
        }
        return;
      }

      // Objective 5: Configure R1 WAN interface
      if (!completedObjectives.has(5)) {
        const wan = r.interfaces['GigabitEthernet0/1'];
        if (wan && wan.ip === '203.0.113.1' && wan.mask === '255.255.255.252' && wan.up) {
          completeObjective(5);
        }
        return;
      }

      // Objective 6: Configure OSPF
      if (!completedObjectives.has(6)) {
        if (r.ospf && r.ospf.processId === 1 && r.ospf.networks.length >= 4) {
          const nets = r.ospf.networks;
          const has10 = nets.some(n => n.network === '10.0.10.0' && n.wildcard === '0.0.0.255' && n.area === 0);
          const has20 = nets.some(n => n.network === '10.0.20.0' && n.wildcard === '0.0.0.255' && n.area === 0);
          const has30 = nets.some(n => n.network === '10.0.30.0' && n.wildcard === '0.0.0.255' && n.area === 0);
          const hasWan = nets.some(n => n.network === '203.0.113.0' && n.wildcard === '0.0.0.3' && n.area === 0);
          if (has10 && has20 && has30 && hasWan) {
            completeObjective(6);
          }
        }
        return;
      }

      // Objective 7: Port security on SW1 Fa0/1
      if (!completedObjectives.has(7)) {
        const ps = sw.portSecurity['FastEthernet0/1'];
        if (ps && ps.enabled && ps.maximum === 2 && ps.sticky && ps.violation === 'shutdown') {
          completeObjective(7);
        }
        return;
      }

      // Objective 8: Extended ACL
      if (!completedObjectives.has(8)) {
        const acl = r.acls['BLOCK_ENG_TO_MGMT'];
        if (acl && acl.entries.length >= 2) {
          const hasDeny = acl.entries.some(e =>
            e.action === 'deny' &&
            e.rule.match(/ip\s+10\.0\.20\.0\s+0\.0\.0\.255\s+10\.0\.30\.0\s+0\.0\.0\.255/i)
          );
          const hasPermit = acl.entries.some(e =>
            e.action === 'permit' &&
            e.rule.match(/ip\s+any\s+any/i)
          );
          // Check applied to Gi0/0.20 inbound
          const sub20 = r.subinterfaces['GigabitEthernet0/0.20'];
          const applied = sub20 && sub20.accessGroup &&
                          sub20.accessGroup.name === 'BLOCK_ENG_TO_MGMT' &&
                          sub20.accessGroup.direction === 'in';
          if (hasDeny && hasPermit && applied) {
            completeObjective(8);
          }
        }
        return;
      }

      // Objective 9: NAT overload
      if (!completedObjectives.has(9)) {
        // Check standard ACLs
        const acl1 = r.standardAcls[1] || [];
        const has10 = acl1.some(e => e.action === 'permit' && e.network === '10.0.10.0' && e.wildcard === '0.0.0.255');
        const has20 = acl1.some(e => e.action === 'permit' && e.network === '10.0.20.0' && e.wildcard === '0.0.0.255');
        const has30 = acl1.some(e => e.action === 'permit' && e.network === '10.0.30.0' && e.wildcard === '0.0.0.255');

        // Check overload config
        const hasOverload = r.nat.overload && r.nat.overload.acl === 1;

        // Check inside/outside
        const insideSubs = ['GigabitEthernet0/0.10', 'GigabitEthernet0/0.20', 'GigabitEthernet0/0.30'];
        const allInside = insideSubs.every(ifn => {
          const sub = r.subinterfaces[ifn];
          return sub && sub.natDirection === 'inside';
        });
        const wanOutside = r.interfaces['GigabitEthernet0/1'] &&
                           r.interfaces['GigabitEthernet0/1'].natDirection === 'outside';

        if (has10 && has20 && has30 && hasOverload && allInside && wanOutside) {
          completeObjective(9);
        }
        return;
      }

      // Objective 10: Default route
      if (!completedObjectives.has(10)) {
        const hasDefault = r.routes.some(route =>
          route.destination === '0.0.0.0' && route.mask === '0.0.0.0' && route.nextHop === '203.0.113.2'
        );
        if (hasDefault) {
          completeObjective(10);
        }
        return;
      }

      // Objective 11: Verify
      if (!completedObjectives.has(11)) {
        if (verifyShowVlanRun && verifyShowOspfRun && verifyShowNatRun) {
          completeObjective(11);
        }
        return;
      }
    }

    // ════════════════════════════════════════════════════════════
    // OBJECTIVE COMPLETION
    // ════════════════════════════════════════════════════════════

    function completeObjective(idx) {
      if (completedObjectives.has(idx)) return;
      completedObjectives.add(idx);

      // Terminal message
      const obj = OBJECTIVES[idx];
      appendLine(`\u2713 Objective ${idx + 1} complete: ${obj.title}`, 'success');

      // Update objectives list
      renderObjectives();

      // Update progress
      updateProgress();

      // Update topology
      updateTopology();

      // Animate the completed objective element
      const el = document.querySelector(`.objective-item[data-idx="${idx}"]`);
      if (el) {
        el.classList.add('just-completed');
        setTimeout(() => el.classList.remove('just-completed'), 700);
      }

      // Check if all complete
      if (completedObjectives.size === OBJECTIVES.length) {
        setTimeout(() => {
          appendLine('', '');
          appendLine('========================================', 'success');
          appendLine('  LAB COMPLETE — All objectives met!', 'banner');
          appendLine('========================================', 'success');
          appendLine('', '');
          document.getElementById('completion-banner').classList.add('visible');
        }, 600);
      }
    }

    // ════════════════════════════════════════════════════════════
    // TOPOLOGY UPDATE
    // ════════════════════════════════════════════════════════════

    function updateTopology() {
      // Link colors based on completed objectives
      const linkFa01 = document.getElementById('link-fa01');
      const linkFa02 = document.getElementById('link-fa02');
      const linkFa03 = document.getElementById('link-fa03');
      const linkTrunk = document.getElementById('link-trunk');
      const linkWan = document.getElementById('link-wan');
      const devSw1 = document.getElementById('dev-sw1');
      const devR1 = document.getElementById('dev-r1');

      // Access ports (objective 1)
      if (completedObjectives.has(1)) {
        linkFa01.classList.add('active');
        linkFa02.classList.add('active');
        linkFa03.classList.add('active');
      }

      // Trunk (objectives 2+3 — switch trunk + router subinterfaces)
      if (completedObjectives.has(2) && completedObjectives.has(3)) {
        linkTrunk.classList.add('active');
      }

      // WAN link (objectives 5+6 — WAN ip + OSPF)
      if (completedObjectives.has(5)) {
        linkWan.classList.add('active');
      }

      // SW1 fully configured: VLANs + access ports + trunk + port security
      if (completedObjectives.has(0) && completedObjectives.has(1) && completedObjectives.has(2) && completedObjectives.has(7)) {
        devSw1.classList.add('configured');
      }

      // R1 fully configured: subifs + gi0/0 up + WAN + OSPF + ACL + NAT + default route
      if (completedObjectives.has(3) && completedObjectives.has(4) && completedObjectives.has(5) &&
          completedObjectives.has(6) && completedObjectives.has(8) && completedObjectives.has(9) && completedObjectives.has(10)) {
        devR1.classList.add('configured');
      }
    }

    // ════════════════════════════════════════════════════════════
    // UI — TERMINAL
    // ════════════════════════════════════════════════════════════

    const termOutput = document.getElementById('term-output');
    const termInput = document.getElementById('term-input');
    const termPrompt = document.getElementById('term-prompt');
    const terminal = document.getElementById('terminal');

    function appendLine(text, cls) {
      const div = document.createElement('div');
      div.className = 'term-line' + (cls ? ' ' + cls : '');
      div.textContent = text;
      termOutput.appendChild(div);
    }

    function updatePrompt() {
      termPrompt.textContent = getPrompt() + ' ';
    }

    function scrollTerminal() {
      terminal.scrollTop = terminal.scrollHeight;
    }

    function handleTerminalKey(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        const cmd = termInput.textContent.trim();
        termInput.textContent = '';

        // Echo
        appendLine(getPrompt() + ' ' + cmd, 'cmd');

        if (cmd) {
          commandHistory.push(cmd);
          historyIdx = -1;
        }

        // Process
        if (cmd === 'clear' || cmd === 'cls') {
          termOutput.innerHTML = '';
        } else {
          const output = processCommand(cmd);
          for (const line of output) {
            appendLine(line.text, line.cls || 'info');
          }
        }

        updatePrompt();
        scrollTerminal();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (commandHistory.length > 0) {
          if (historyIdx < commandHistory.length - 1) historyIdx++;
          termInput.textContent = commandHistory[commandHistory.length - 1 - historyIdx];
          placeCursorEnd();
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIdx > 0) {
          historyIdx--;
          termInput.textContent = commandHistory[commandHistory.length - 1 - historyIdx];
        } else {
          historyIdx = -1;
          termInput.textContent = '';
        }
        placeCursorEnd();
      } else if (e.key === 'Tab') {
        e.preventDefault();
        // Basic question mark / tab behavior — just add a space
      } else if (e.key === '?') {
        // Show available commands hint
      }
    }

    function placeCursorEnd() {
      const range = document.createRange();
      const sel = window.getSelection();
      if (termInput.childNodes.length > 0) {
        range.setStartAfter(termInput.lastChild);
      } else {
        range.setStart(termInput, 0);
      }
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    termInput.addEventListener('keydown', handleTerminalKey);
    terminal.addEventListener('click', () => termInput.focus());

    // Clear button
    document.getElementById('clear-btn').addEventListener('click', () => {
      termOutput.innerHTML = '';
      termInput.focus();
    });

    // ════════════════════════════════════════════════════════════
    // UI — DEVICE SELECTOR
    // ════════════════════════════════════════════════════════════

    const btnSW1 = document.getElementById('btn-sw1');
    const btnR1 = document.getElementById('btn-r1');
    const terminalTab = document.getElementById('terminal-tab');

    function switchDeviceTo(name) {
      activeDeviceName = name;
      // Reset mode to user on switch
      devices[name].mode = 'user';
      devices[name].currentInterface = null;

      btnSW1.classList.toggle('active', name === 'SW1');
      btnR1.classList.toggle('active', name === 'R1');

      if (name === 'SW1') {
        terminalTab.innerHTML = 'SW1 &mdash; Cisco 2960 Switch';
      } else {
        terminalTab.innerHTML = 'R1 &mdash; Cisco 2911 Router';
      }

      appendLine('', '');
      appendLine(`--- Connected to ${devices[name].hostname} ---`, 'success');
      appendLine('', '');

      updatePrompt();
      scrollTerminal();
      termInput.focus();
    }

    btnSW1.addEventListener('click', () => switchDeviceTo('SW1'));
    btnR1.addEventListener('click', () => switchDeviceTo('R1'));

    // ════════════════════════════════════════════════════════════
    // UI — OBJECTIVES LIST
    // ════════════════════════════════════════════════════════════

    function renderObjectives() {
      const list = document.getElementById('objectives-list');
      const currentIdx = getCurrentObjectiveIdx();
      let html = '';

      for (let i = 0; i < OBJECTIVES.length; i++) {
        const obj = OBJECTIVES[i];
        const isCompleted = completedObjectives.has(i);
        const isCurrent = i === currentIdx;
        const isLocked = i > currentIdx;

        let cls = 'objective-item';
        if (isCompleted) cls += ' completed';
        else if (isCurrent) cls += ' current';
        else if (isLocked) cls += ' locked';

        const check = isCompleted ? '<span class="obj-check">\u2713</span>' : `<span class="obj-num">${i + 1}</span>`;

        html += `<div class="${cls}" data-idx="${i}" title="${obj.desc}">
          ${check}
          <span class="obj-text">${obj.title}</span>
        </div>`;
      }

      list.innerHTML = html;
    }

    // ════════════════════════════════════════════════════════════
    // UI — PROGRESS BAR
    // ════════════════════════════════════════════════════════════

    function updateProgress() {
      const pct = Math.round((completedObjectives.size / OBJECTIVES.length) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `${completedObjectives.size} / ${OBJECTIVES.length}`;
    }

    // ════════════════════════════════════════════════════════════
    // UI — HINT SYSTEM
    // ════════════════════════════════════════════════════════════

    const hintBtn = document.getElementById('hint-btn');
    const hintCount = document.getElementById('hint-count');
    const hintOverlay = document.getElementById('hint-overlay');
    const hintText = document.getElementById('hint-text');
    const hintClose = document.getElementById('hint-close');

    function updateHintUI() {
      const remaining = MAX_HINTS - hintsUsed;
      if (remaining <= 0) {
        hintBtn.textContent = 'No hints remaining';
        hintBtn.disabled = true;
        hintCount.textContent = '0 hints remaining';
      } else {
        hintBtn.textContent = 'Show Hint';
        hintBtn.disabled = false;
        hintCount.textContent = `${remaining} hint${remaining !== 1 ? 's' : ''} remaining`;
      }
    }

    hintBtn.addEventListener('click', () => {
      if (hintsUsed >= MAX_HINTS) return;

      const currentIdx = getCurrentObjectiveIdx();
      if (currentIdx >= OBJECTIVES.length) return;

      const obj = OBJECTIVES[currentIdx];
      if (!obj.hint) {
        // Current objective has no hint
        hintText.textContent = 'No hint available for this objective. You can do it!';
        hintOverlay.classList.add('visible');
        return;
      }

      hintsUsed++;
      hintText.textContent = obj.hint;
      hintOverlay.classList.add('visible');
      updateHintUI();
    });

    hintClose.addEventListener('click', () => {
      hintOverlay.classList.remove('visible');
      termInput.focus();
    });

    // Auto-close hint after 12 seconds
    let hintTimer = null;
    const observer = new MutationObserver(() => {
      if (hintOverlay.classList.contains('visible')) {
        clearTimeout(hintTimer);
        hintTimer = setTimeout(() => {
          hintOverlay.classList.remove('visible');
        }, 12000);
      }
    });
    observer.observe(hintOverlay, { attributes: true, attributeFilter: ['class'] });

    // ════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ════════════════════════════════════════════════════════════

    function init() {
      renderObjectives();
      updateProgress();
      updateHintUI();
      updatePrompt();

      // Welcome banner
      appendLine('', '');
      appendLine('==========================================================', 'info');
      appendLine('  Lab 1: Campus Network Build', 'cmd');
      appendLine('  Build a full campus network from scratch using IOS CLI', 'info');
      appendLine('==========================================================', 'info');
      appendLine('', '');
      appendLine('You are connected to SW1 (Cisco 2960 Switch).', 'info');
      appendLine('Use the device buttons above to switch between SW1 and R1.', 'info');
      appendLine('', '');
      appendLine('Type "enable" to enter privileged EXEC mode.', 'info');
      appendLine('Type "configure terminal" to enter global configuration mode.', 'info');
      appendLine('', '');

      scrollTerminal();
      termInput.focus();
    }

    init();

    // Keep focus on terminal input
    document.addEventListener('keydown', (e) => {
      // If typing and not focused on terminal input, focus it
      if (e.target !== termInput && !e.target.closest('.device-selector') && !e.target.closest('.hint-area') && !e.target.closest('button') && !e.target.closest('a')) {
        if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Delete') {
          termInput.focus();
        }
      }
    });

  })();
  
});</script>
