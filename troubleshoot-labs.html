<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAF7F2">
<title>Troubleshoot Labs — CCNA 200-301</title>
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/CCNA-study/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=JetBrains+Mono:wght@400;600&display=swap">
<link rel="stylesheet" href="css/shared.css?v=4.56">
<style>
  .page-header { padding: var(--s-md) 0 var(--s-sm); margin-bottom: var(--s-lg); border-bottom: 2px solid var(--ink); }
  .page-header h1 { font-size: 2.4rem; margin-bottom: 4px; }
  .page-header .subtitle { font-family: var(--font-body); color: var(--ink-secondary); font-size: 0.95rem; font-style: italic; max-width: 60ch; }

  .cross-link { background: var(--accent-light); border: 1px solid var(--accent); border-radius: var(--radius); padding: 10px 14px; margin-bottom: var(--s-lg); font-family: var(--font-display); font-size: 0.85rem; color: var(--ink); }
  .cross-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
  .cross-link a:hover { text-decoration: underline; }

  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: var(--s-lg); }
  .filter-btn { font-family: var(--font-display); font-size: 0.78rem; font-weight: 600; padding: 6px 14px; border: 1px solid var(--border-strong); border-radius: 20px; background: var(--bg-surface); color: var(--ink-secondary); cursor: pointer; transition: all var(--transition); }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .lab-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: var(--s-lg); overflow: hidden; }
  .lab-card.completed { border-color: #16A34A; }
  .lab-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background var(--transition); gap: 12px; }
  .lab-header:hover { background: var(--bg-recessed); }
  .lab-num { font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-muted); min-width: 60px; }
  .lab-title { font-family: var(--font-display); font-size: 0.92rem; font-weight: 700; color: var(--ink); flex: 1; }
  .lab-cat { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 10px; background: var(--bg-recessed); color: var(--ink-secondary); }
  .lab-cat.l2 { background: #DBEAFE; color: #1D4ED8; }
  .lab-cat.l3 { background: #FEF3C7; color: #B45309; }
  .lab-cat.svc { background: #F3E8FF; color: #7C3AED; }
  .lab-diff { font-family: var(--font-display); font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 10px; }
  .lab-diff.beginner { background: #F0FDF4; color: #16A34A; }
  .lab-diff.intermediate { background: #FFFBEB; color: #D97706; }
  .lab-diff.advanced { background: #FEE2E2; color: #B91C1C; }
  .lab-check { font-size: 1rem; color: #16A34A; display: none; }
  .lab-card.completed .lab-check { display: inline; }
  .lab-toggle { color: var(--ink-muted); font-size: 0.8rem; transition: transform 0.2s; }
  .lab-card.open .lab-toggle { transform: rotate(180deg); }

  .lab-body { display: none; }
  .lab-card.open .lab-body { display: block; }

  .lab-scenario { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--bg-recessed); }
  .lab-scenario-label { font-family: var(--font-display); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); margin-bottom: 6px; }
  .lab-scenario-text { font-family: var(--font-body); font-size: 0.9rem; color: var(--ink); line-height: 1.6; }

  .term-wrap { background: #1c1917; padding: 14px 18px; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; line-height: 1.55; overflow-x: auto; }
  .term-line { color: #d6d3d1; white-space: pre; }
  .term-line.cmd { color: #fde68a; font-weight: 600; }
  .term-line.muted { color: #78716c; font-style: italic; }
  .term-block + .term-block { border-top: 1px solid #292524; margin-top: 8px; padding-top: 8px; }

  .show-cmd-bar { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg-surface); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .show-cmd-bar-label { font-family: var(--font-display); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-muted); margin-right: 8px; }
  .show-cmd-btn { font-family: var(--font-mono); font-size: 0.74rem; padding: 4px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--bg-surface); color: var(--ink-secondary); cursor: pointer; transition: all var(--transition); }
  .show-cmd-btn:hover { border-color: var(--accent); color: var(--accent); }
  .show-cmd-btn.used { border-color: var(--ink); background: var(--ink); color: var(--bg); }

  .qa-block { padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .qa-question { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; color: var(--ink); margin-bottom: 12px; }
  .qa-choices { display: flex; flex-direction: column; gap: 8px; }
  .qa-choice { font-family: var(--font-body); font-size: 0.88rem; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-surface); color: var(--ink); cursor: pointer; text-align: left; transition: all var(--transition); }
  .qa-choice:hover:not(.locked) { border-color: var(--accent); background: var(--accent-light); }
  .qa-choice.correct { border-color: #16A34A; background: #F0FDF4; color: #14532D; }
  .qa-choice.wrong { border-color: #DC2626; background: #FEF2F2; color: #7F1D1D; }
  .qa-choice.locked { cursor: default; opacity: 0.6; }
  .qa-choice.locked.correct, .qa-choice.locked.wrong { opacity: 1; }
  .qa-explain { font-family: var(--font-body); font-size: 0.82rem; color: var(--ink-secondary); margin-top: 4px; padding-left: 14px; font-style: italic; }

  .reveal-block { padding: 16px 20px; background: #F0FDF4; border-top: 1px solid #BBF7D0; display: none; }
  .reveal-block.show { display: block; }
  .reveal-label { font-family: var(--font-display); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #16A34A; margin-bottom: 6px; }
  .reveal-text { font-family: var(--font-body); font-size: 0.88rem; color: var(--ink); line-height: 1.6; margin-bottom: 8px; }
  .reveal-fix { font-family: var(--font-mono); font-size: 0.8rem; color: var(--ink); background: var(--bg-surface); border: 1px dashed var(--border-strong); border-radius: var(--radius); padding: 8px 12px; }
  .reveal-fix-label { display: block; font-family: var(--font-display); font-size: 0.68rem; font-weight: 700; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 4px; letter-spacing: 0.06em; }

  .progress-strip { display: flex; gap: 3px; margin-bottom: var(--s-lg); }
  .progress-pip { flex: 1; height: 6px; border-radius: 3px; background: var(--bg-recessed); transition: background 0.3s; }
  .progress-pip.done { background: #16A34A; }

  .loading-state { text-align: center; padding: 40px; font-family: var(--font-body); color: var(--ink-muted); }
</style>
</head>
<body>
<div class="container-wide">
  <nav class="top-nav" id="main-nav"></nav>

  <header class="page-header">
    <h1>Troubleshoot Labs</h1>
    <p class="subtitle">Diagnose broken networks with <strong>show</strong> commands. Each lab presents pre-broken state — you inspect the output, identify the root cause. No configuration required.</p>
  </header>

  <div class="cross-link">
    Configuration-first practice? Go to <a href="console-labs.html">Console Labs →</a>
  </div>

  <div class="progress-strip" id="progressStrip"></div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="l2">L2 (Switching)</button>
    <button class="filter-btn" data-filter="l3">L3 (Routing)</button>
    <button class="filter-btn" data-filter="svc">Services</button>
    <button class="filter-btn" data-filter="todo">Not Done</button>
  </div>

  <div id="labContainer">
    <div class="loading-state">Loading labs…</div>
  </div>
</div>

<script defer src="js/store.js"></script>
<script defer src="js/nav.js"></script>
<script defer src="js/tutor.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var STATE_KEY = 'troubleshootLabs.v1';
  var state = loadState();
  var currentFilter = 'all';
  var ALL_LABS = [];

  function loadState() {
    try { return JSON.parse(localStorage.getItem(STATE_KEY) || '{}'); }
    catch (e) { return {}; }
  }
  function saveState() {
    try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function renderTerminalBlock(cmd, output) {
    var lines = '<div class="term-line cmd">' + escapeHtml(cmd) + '</div>';
    lines += output.split('\n').map(function(l) {
      return '<div class="term-line">' + escapeHtml(l) + '</div>';
    }).join('');
    return '<div class="term-block">' + lines + '</div>';
  }

  function renderLab(lab, idx) {
    var done = !!state[lab.id];
    var catClass = lab.category === 'L2' ? 'l2' : lab.category === 'L3' ? 'l3' : 'svc';

    var initialTerm = (lab.initialView || []).map(function(b) {
      return renderTerminalBlock(b.cmd, b.output);
    }).join('');

    var cmdBtns = Object.keys(lab.showCommands || {}).map(function(cmd) {
      return '<button class="show-cmd-btn" data-cmd="' + escapeHtml(cmd) + '">' + escapeHtml(cmd) + '</button>';
    }).join('');

    var choicesHtml = (lab.choices || []).map(function(c, i) {
      return '<button class="qa-choice" data-correct="' + (c.correct ? '1' : '0') + '" data-explain="' + escapeHtml(c.explain || '') + '">' + escapeHtml(c.text) + '</button>';
    }).join('');

    return ''
      + '<div class="lab-card' + (done ? ' completed' : '') + '" data-lab-id="' + lab.id + '" data-cat="' + catClass + '" data-done="' + (done ? '1' : '0') + '">'
      +   '<div class="lab-header">'
      +     '<span class="lab-num">TS-' + String(idx + 1).padStart(2, '0') + '</span>'
      +     '<span class="lab-title">' + escapeHtml(lab.title) + '</span>'
      +     '<span class="lab-cat ' + catClass + '">' + escapeHtml(lab.category) + '</span>'
      +     '<span class="lab-diff ' + lab.difficulty + '">' + escapeHtml(lab.difficulty) + '</span>'
      +     '<span class="lab-check">✓</span>'
      +     '<span class="lab-toggle">▼</span>'
      +   '</div>'
      +   '<div class="lab-body">'
      +     '<div class="lab-scenario">'
      +       '<div class="lab-scenario-label">Scenario</div>'
      +       '<div class="lab-scenario-text">' + escapeHtml(lab.scenario) + '</div>'
      +     '</div>'
      +     '<div class="term-wrap initial-term">' + initialTerm + '</div>'
      +     (cmdBtns ? '<div class="show-cmd-bar"><span class="show-cmd-bar-label">Run a show command</span>' + cmdBtns + '</div>' : '')
      +     '<div class="term-wrap extra-term" style="display:none"></div>'
      +     '<div class="qa-block">'
      +       '<div class="qa-question">' + escapeHtml(lab.question) + '</div>'
      +       '<div class="qa-choices">' + choicesHtml + '</div>'
      +     '</div>'
      +     '<div class="reveal-block">'
      +       '<div class="reveal-label">Root Cause</div>'
      +       '<div class="reveal-text">' + escapeHtml(lab.rootCause || '') + '</div>'
      +       (lab.fixHint ? '<div class="reveal-fix"><span class="reveal-fix-label">Fix hint (not required in this lab)</span>' + escapeHtml(lab.fixHint) + '</div>' : '')
      +     '</div>'
      +   '</div>'
      + '</div>';
  }

  function applyFilter() {
    var cards = document.querySelectorAll('.lab-card');
    cards.forEach(function(card) {
      var cat = card.getAttribute('data-cat');
      var done = card.getAttribute('data-done') === '1';
      var show = currentFilter === 'all' ||
                 (currentFilter === 'todo' && !done) ||
                 cat === currentFilter;
      card.style.display = show ? '' : 'none';
    });
  }

  function renderProgress() {
    var strip = document.getElementById('progressStrip');
    strip.innerHTML = ALL_LABS.map(function(l) {
      return '<div class="progress-pip' + (state[l.id] ? ' done' : '') + '"></div>';
    }).join('');
  }

  function renderAll() {
    var container = document.getElementById('labContainer');
    if (!ALL_LABS.length) {
      container.innerHTML = '<div class="loading-state">No labs loaded yet. Run the agent fanout to populate <code>data/troubleshoot-l2.json</code>, <code>data/troubleshoot-l3.json</code>, <code>data/troubleshoot-services.json</code>.</div>';
      return;
    }
    container.innerHTML = ALL_LABS.map(renderLab).join('');
    renderProgress();
    wireCards();
    applyFilter();
  }

  function wireCards() {
    document.querySelectorAll('.lab-card').forEach(function(card) {
      var header = card.querySelector('.lab-header');
      header.addEventListener('click', function() { card.classList.toggle('open'); });

      var labId = card.getAttribute('data-lab-id');
      var lab = ALL_LABS.find(function(l) { return l.id === labId; });
      if (!lab) return;

      card.querySelectorAll('.show-cmd-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          var cmd = btn.getAttribute('data-cmd');
          var out = lab.showCommands[cmd] || '';
          var term = card.querySelector('.extra-term');
          term.style.display = 'block';
          term.insertAdjacentHTML('beforeend', renderTerminalBlock(cmd, out));
          btn.classList.add('used');
        });
      });

      card.querySelectorAll('.qa-choice').forEach(function(choice) {
        choice.addEventListener('click', function(e) {
          e.stopPropagation();
          if (card.classList.contains('answered')) return;
          card.classList.add('answered');
          var correct = choice.getAttribute('data-correct') === '1';
          card.querySelectorAll('.qa-choice').forEach(function(c) {
            c.classList.add('locked');
            var isC = c.getAttribute('data-correct') === '1';
            if (isC) c.classList.add('correct');
            if (c === choice && !correct) c.classList.add('wrong');
            var ex = c.getAttribute('data-explain');
            if (ex && (isC || c === choice)) {
              var d = document.createElement('div');
              d.className = 'qa-explain';
              d.textContent = ex;
              c.insertAdjacentElement('afterend', d);
            }
          });
          card.querySelector('.reveal-block').classList.add('show');
          if (correct) {
            state[lab.id] = { done: true, ts: Date.now() };
            saveState();
            card.classList.add('completed');
            card.setAttribute('data-done', '1');
            renderProgress();
          }
        });
      });
    });
  }

  document.getElementById('filterBar').addEventListener('click', function(e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.getAttribute('data-filter');
    applyFilter();
  });

  Promise.all([
    fetch('data/troubleshoot-l2.json').then(function(r) { return r.ok ? r.json() : []; }).catch(function() { return []; }),
    fetch('data/troubleshoot-l3.json').then(function(r) { return r.ok ? r.json() : []; }).catch(function() { return []; }),
    fetch('data/troubleshoot-services.json').then(function(r) { return r.ok ? r.json() : []; }).catch(function() { return []; }),
  ]).then(function(results) {
    var l2 = Array.isArray(results[0]) ? results[0] : (results[0].labs || []);
    var l3 = Array.isArray(results[1]) ? results[1] : (results[1].labs || []);
    var svc = Array.isArray(results[2]) ? results[2] : (results[2].labs || []);
    ALL_LABS = [].concat(l2, l3, svc);
    renderAll();
  });
});
</script>
</body>
</html>
